body:
  text: 詩緝卷一宋嚴粲撰周南國風譜曰周南者禹貢雍州岐山之陽地名今屬右扶風美陽縣太王避狄難自豳始遷焉商王帝乙之初命其子王季為西伯至紂又命文王典治南國江漢汝旁之諸侯文王作邑於豐乃分岐邦周召之地為周公旦召公奭之采地武王定天下巡狞述職陳誦諸國之詩以觀民風俗六州得二公之徳教尤純屬之太師分而國之謂之周南召南周公作樂用之鄉人焉用之邦國焉或謂之房中之樂者后妃夫人侍御於其君子女史歌之周公封魯召公封燕元子世之其次子亦世守采地在王官春秋時周公召公是也采音菜疏曰緜言太王遷於周原召是周内之别名也春秋時周公召公别於東都受采存本周召之名也朱氏曰國者諸侯所封之域而風者民俗歌謠之詩也謂之風者以其被上之化以有言而其言又足以感人是以諸侯采之以貢於天子天子受之而列於樂官於以考其俗尚之美惡而知其政治之得失焉舊説二南為正風所以用之閏門鄉黨邦國而化天下也十三國為變風則亦領在樂官以時存肄備觀省而垂監戒耳又曰周國名南南方諸侯之國也岐周在今鳳翔府岐山縣豐在今京兆府鄠縣終南山北南方之國即今興元府京西湖北等路諸州鎬在豐東二十五里其言文王之化者繫之周公以周公主内治故也其言諸侯之國被文王之化以成德者繫之召公以召公長諸侯故也鄠音戸補傳曰國風終於美周公二雅終於思召公則聖人删詩之際蓋傷衰亂之極非周召不能救也闗雎音趨臣粲曰睢七胥反以温公切韻圖正之七字在第十八圖屬清字母胥字在第三圖平聲第四等横尋清字得疽字其上聲為取去聲為覻則平聲正音趨也睢疽砠苴皆同音俗讀為沮之平聲其也後皆𩔖此后妃之德也李氏曰后妃太姒也朱氏曰太姒未嘗稱后此追稱之云耳此詩當時人所作以羙太姒之徳周公取以為周南之首篇以教天下後世以明凡為后妃者其徳皆當如是也故序者不曰羙太姒之德而特言后妃之德風之始也朱氏曰謂國風篇章之始亦風教之所由始所以風天下而正夫婦也䟽曰所以風化天下之民而使之皆正其夫婦焉故用之鄉人焉疏曰令鄉大夫以之教其民也儀禮鄉飲酒禮者鄉大夫三年賔興賢能之禮其經云乃合樂周南闗雎是用之鄉人也補傳曰近而用以化六鄉之人用之邦國焉疏曰令諸侯以之教其臣也燕禮者諸侯飲燕其臣子其經云遂歌鄉樂周南闗雎是用之邦國也補傳曰逺而用以化六服之國右第一節論闗雎之化美后妃之德所以見文王之德也故又言此文王風化之始所以風天下而正夫婦皆主文王言之非專羙后妃也治天下自齊家始善則天下隂䝉其福而人不知否則國家潛受其蠧而主不悟夷考千載理亂之故常必由之詩首闗雎淵乎哉釋文曰舊説云后妃之徳也至用之邦國焉名闗雎序謂之小序自風風也訖末名大序沈重云按鄭詩譜意大序是子夏作小序是子夏毛公合作卜商意有不盡毛更足成之或云小序是東海衛敬仲所作今謂此序止是闗雎之序總論詩之綱領無小大之異蘇氏曰大序其文反覆煩重𩔖非一人之辭者凡此皆毛氏之學而衛宏之所集錄也後漢儒林傳云衛宏從謝曼卿受學作毛詩序善得風雅之㫖至今傳于世隋經籍志云先儒相承謂詩序子夏所創毛公及衛敬仲又加潤益董氏曰宏固不能及此或以師授之言論著於書耳風風也風並如字徐上如字下去聲教也風以動之教以化之右第二節論名風之義風有二義風之優柔以感動其善心教之諄勤以變化其氣習朱氏曰如風之著物鼓舞震盪物無不化而不知為之者詩者志之所之也䟽曰之適也在心為志發言為詩情動於中而形於言言之不足故嗟歎之歎本亦作嘆嗟歎之不足故永歌之永歌之不足不知手之舞之足之蹈之也右第三節論詩出於人情之眞此更端泛説詩也詩者志之所適特藴藏在心則為志發見於言則為詩耳名二而實一也蓋詩由所感而作不能自已出於人情之真而非偽也舉手而舞動足而蹈身為心使不自覺也虚一而靜者心也言心之所主則謂之志言心之感於物而有喜怒哀樂之殊則謂之情情發於聲聲成文謂之音疏曰樂記注云雜比曰音單出曰聲哀樂之情發見於言語之聲於時雖言哀樂之事未有宮商之調唯是聲耳至於作詩之時則次序清濁節奏高下使五聲為曲似五色成文即是為音此音被諸絃管乃名為樂審聲以知音審音以知樂對文則别散則通比音備治世之音安以樂音洛其政和亂世之音怨以怒其政乖亡國之音哀以思音四其民困右第四節論聲音與政通音由人心生也心有感而聲自形聲相應而音自備所感不同政使然也黄氏曰凡此不可專以言辭求之若徒觀其言辭而不達其聲音則大田楚茨之詩不言周政之衰而言先王之盛亦可謂治世之音乎故正得失動天地感鬼神䟽曰鬼神與天地相對則唯謂人鬼耳莫近於詩右第五節論詩貫幽明詩出於情之真其感也深故正人事之得失使人捨非而從是與夫動天地感鬼神無有近於詩者吾心有此理在人在天地在鬼神亦同此理以此理之同者止之動之感之何逺之有正得失通上下言之朱氏曰和平怨怒之極又足以達隂陽之氣而致災召祥盖出於自然先王以是經夫婦朱氏曰先王指文武周公成王䟽曰經常也成孝敬朱氏曰孝者子之所以事父敬者臣之所以事君詩之始作多發於男女之間而逹於父子君臣之際厚人倫羙教化移風俗右第六節論先王用詩以化天下詩首二南故先言經夫婦夫婦之道貴乎有常以詩經之子事父以孝臣事君以敬秉彛之心欲其勿虧以詩成之三綱正則人倫厚故教化羙而風俗移詩教皆為人倫設也故詩有六義焉一曰風二曰賦三曰比四曰興去聲五曰雅六曰頌右第七節論六義詩之名三曰風雅頌此以風雅頌偕賦比興言之謂三百篇之中有此六義非指詩名之風雅頌也孔氏謂風雅頌皆以賦比興為之非也大序之六義即周官之六詩如孔氏說是風雅頌三詩之中有賦比興之三義耳何名六義六詩哉凡風動之者皆風也正言之者皆雅也稱羙之者皆頌也故得與敷陳之賦直比之比感物之興並而為六也呂氏言得風之體多者為國風得雅之體多者為二雅得頌之體多者為頌風非無雅雅非無頌其說是也若謂三詩之中止有三義則比興之外餘皆為賦然不忮不求何用不臧此於六義為雅不當謂之賦稱彼兕觥萬壽無疆此於六義為頌亦不當謂之賦程子曰國風二雅三頌詩之名也六義詩之義也風者謂風動之也賦者謂鋪陳其事也比者直比之興者因物而起雅者正言之頌者稱羙之六義隨篇求之有兼備者有偏得其一二者張子曰一詩之中有兼見風雅頌之意賦比興亦然補傳曰國風雅頌盖於六義之中取其體之大者而名之上以風化下下以風刺上風音諷主文而譎諫譎音决臣粲曰譎詭也言之者無罪聞之者足以戒故曰風右第八節論風之正變上之人用此以風化其下謂正風也下之人用此以諷刺其上謂變風也主文者謂主於文辭成章可歌使人玩其辭而樂之蓋詩主文而春秋主事也旣使人玩其辭而樂之因以寓其諷諫或託物或陳古言在於此意寓於彼詭辭以諫而不斥言其失言之者所以無罪聞之者亦足自戒上之化下下之諷上皆有優游巽入之義故正風變風皆名為風至於王道衰禮義廢政教失國異政家殊俗而變風變雅作矣䟽曰以其變改正法故謂之變焉國史明乎得失之迹䟽曰國史者周官大史小史外史御史之等皆是也曹氏曰小史掌邦國之志外史掌四方之志説者云志記也國史既掌邦國四方之圖籍則舊章民風無不通習詩采得之後屬之國史故楚左史倚相問祈招之詩而不知則右尹子革非之招音韶傷人倫之廢哀刑政之苛吟咏情性䟽曰吟咏已之情性者詩人也非史官以風其上風音諷達於事變而懷其舊俗者也右第九節論變風變雅之所以作王道以禮義為大端而政教之所自出也自文武成康之道衰禮義旣廢政教遂失王政不行不能一道德而同風俗於是變風變雅始作矣古者有采詩之官其巡守也命太師陳詩以觀民風采得之後屬之國史國史明得失之迹謂知詩人所言之意也知其意在於哀傷人倫刑政之失發於情性而吟詠之以風刺其上蓋通逹古今之變而思其先王之舊也此皆詩人之意唯國史能明之故題其事迹於篇端也程子曰國史知得失之迹載其事於篇端然後其義可知今小序之首是已其下乃説詩者之辭而後人所附或有失詩之意者或謂國史自作詩亦或有如此者不必盡是自作要之詩皆國史主之也朱氏曰舊説正風正雅皆文武成王時詩周公所定樂歌之辭變風變雅皆康昭以後所作然正變之説經無明文可考今姑從之粲曰懿王風始變厲王雅始變今無康昭變詩故變風發乎情止乎禮義𤼵乎情民之性也朱氏曰情者性之動而禮義者性之徳也性則天命之在我者也止乎禮義先王之澤也右第十節又獨論變風此申說吟詠情性之意變風發乎喜怒哀樂之情以風刺其上出於性也言性動而之情也其言止乎禮義而不失其性之德則由於先王教化之澤淪浹於人心者未冺也夫人之怨怒哀思易為血氣所亂徃往流於情之過而失其情之正非教化入人者深何以能止於禮義邪是以一國之事繫一人之本謂之風言天下之事形四方之風謂之雅朱氏曰形者體而象之之謂雅者正也言王政之所由廢興也右第十一節論風雅之别諸侯之詩為風天子之詩為雅風言國俗所漸各不同也雅言天子所以齊正萬方使歸於一也正之之道有得失故廢興異焉補傳曰風者由其下之俗而知其君雅者由其上之政而知其民永嘉陳氏曰風詩由下以觀上多作於小夫賤𨽻皆因民俗厚薄推本於一人之善惡也雅詩由上以觀下多作於公卿大臣皆以朝政臧否推廣而達之四方之理亂也政有小大故有小雅焉有大雅焉右第十二節論大小雅之别以政之小大為二雅之别驗之經而不合李氏以為大序者經師次輯其所傳授之辭不能無附益之失其說是也然二雅之别先儒亦皆未有至當之說竊謂雅之小大特以其體之不同耳蓋優柔委曲意在言外者風之體也明白正大直言其事者雅之體也純乎雅之體者為雅之大雜乎風之體者為雅之小今考小雅正經存者十六篇大抵寂寥短簡其首篇多寄興之辭次章以下則申複詠之以寓不盡之意蓋兼有風之體大雅正經十八篇皆舂容大篇其辭㫖正大氣象開闊不唯與國風夐然不同而比之小雅亦自不侔矣至於變雅亦然其變小雅中固有雅體多而風體少者然終有風體不得為大雅也離騷出於國風其文約其辭微世以風騷並稱謂其體之同也太史公稱離騷曰國風好色而不淫小雅怨誹而不亂若離騷者可謂兼之言離騷兼國風小雅而不言其兼大雅見小雅與風騷相類而大雅不可與風騷並言也詠呦呦鹿鳴食野之苹便㑹得小雅興趣誦文王在上於昭于天便識得大雅氣象小雅大雅之别則昭昭矣臣考菁莪毓材棫樸官人所言之事同也然菁莪之詩惟反覆吟詠於菁菁之莪是有風體而不純乎雅故為小雅至棫樸之詩言左右奉璋髦士攸冝周王于邁六師及之周王壽考遐不作人勉勉我王綱紀四方皆正言其事其辭㫖氣象與菁莪大有間矣故為大雅此大雅小雅正經之别其餘皆可類推也以變雅言之六月采芭常武江漢皆述宣王征伐之事而六月采芑其體與采薇出車枤杜不甚相逺比之江漢言江漢浮浮武夫滔滔匪安匪遊淮夷來求常武言赫赫明明王命卿士南仲太祖太師皇父氣象小大自是不同季札觀樂至歌小雅曰怨而不言至歌大雅曰廣哉熈熈乎此善言二雅之氣象者也至以大雅為曲而有直體却正説著小雅小雅兼有風體故曲而有直體若大雅之體安有所謂曲杜預知其說之不通乃曰此論其聲蓋謂非論其體也頌者美盛徳之形容䟽曰謂形狀容貌也以其成功告於神明者也告音梏粲曰鬼神之理隱而顯故曰神明右第十三節論頌盛徳先王先公之徳也成功先王先公所以創業垂統而授之子孫者也今也徳積而至於配天功積而至於太平作頌者羙盛徳之形狀歌其成功徧告神明所以報神恩也此解周頌也詩三百篇皆周詩也魯商頌附焉耳䟽曰商魯之頌則異於是商頌雖是祭祀之歌祭其先王之廟述其生時之功正是死後頌徳非以成功告神其體異於周頌也魯頌詠僖公功徳纔如變風之羙者耳又與商頌異也是謂四始李氏曰闗雎者風之始也鹿鳴者小雅之始也文王者大雅之始也清廟者頌之始也詩之至也曹氏曰四者皆始於文王故謂之四始以其徳之不可以復加矣孔子曰周之徳其可謂至徳也已右第十四節論四始詩之至也猶曰易其至矣乎贊羙不盡之意文王之徳雖甚盛蔑加矣然則闗雎麟趾之化朱氏曰言化者化之所自出也王者之風陳氏曰岐東之地宗周在焉故為王者之風故繫之周公曹氏曰周即羙陽之周原太王之舊都也南言化自北而南也䟽曰文王之國在於岐周東北近於紂都西北迫於戎狄故其風化南行也漢廣序云羙化行乎江漢之域是從岐周被江漢之域也朱氏解見周南之下鵲巢騶虞之徳朱氏曰言徳者蒙化以成徳也諸侯之風也陳氏曰岐西之地為召公專主諸侯之國故為諸侯之風先王之所以教朱氏曰先王文王也故繫之召公召音邵曹氏曰召即雍縣之召亭李氏曰周召之分陜在武王既得天下之後周南召南雖皆文王之風化不可繫之於文王故周公所居之地所得之詩謂之周南召公所居之地所得之詩謂之召南周公所得之詩多為文王而作故言王者之風召公所得之詩多為諸侯而作故謂之諸侯之風雖曰諸侯之風其實文王教化之所及故言先王之所以教分陜以東如江漢汝墳即陜之東也分陜以西如江沱即陜之西也䟽曰體實是風不得謂之為雅又不可以國風之詩繫之詩不可棄因二公為王行化是以繫之二公周南召南補傳曰文王分岐以為二公采邑至武王克商又分二公為左右正始之道王化之基右第十五節論二南分繫詩經首二南見夫婦之倫焉見王道之端焉二南繫周召見君臣之倫焉見文王心術之㣲盛德之至焉是以闗雎樂得淑女樂音洛以配君子憂在進賢不淫其色哀窈窕窈音杳窕迢之上濁思賢才而無傷善之心焉是闗雎之義也右第十六節論闗雎之義孔子言闗雎樂而不淫哀而不傷謂過於樂則淫過於哀則傷后妃求嬪妾之賢而未得則憂而至於輾轉反側哀而不傷也既得之則樂之以琴瑟鐘鼔樂而不淫也此序樂得淑女以下經師因孔子之言而增益之耳所謂不淫其色哀窈窕皆非詩之㫖也闗闗雎鳩曰闗闗聲也雎鳩鶚也卽郯子所謂雎鳩氏司馬也左傳睢作瞗見昭十七年釋鳥曰瞗鳩王瞗傳曰鳥摯而有别摯音至亦作鷙郭璞曰鵰類今江東呼之為鶚好在江渚食魚陸璣曰大小如鴟深目目上骨露幽州人謂之鷲鷲音就山隂陸氏曰陰陽自然變化論云雎鳩不再匹徐鉉草木蟲魚圖書云雎烏常在河洲之上為儔偶更不移處蓋鶚性好跱每立更不移處所謂鶚立義取諸此俗云雎鳩交則雙翔别則立而異處是謂鷙而有别傳云鷙烏不雙是也杜預注左傳曰鷙而有别為司馬主法制蘇氏曰烏之鷙者不淫歐陽氏曰此詩不取其鷙取其别也在河之洲朱氏曰河北方流水之通名釋水曰水中可居者曰洲窈窕淑女傳曰窈窕幽閒也淑善也閒音閑朱氏曰淑女指太姒也君子好逑好毛如字鄭去聲逑音求朱氏曰君子指文王傳曰逑匹也興也凡言興也者皆兼比興之不兼比者特表之詩記曰風之義易見惟興與比相近而難辨興多兼比比不兼興意有餘者興也直比之者比也興之兼比者徒以為比則失其意味矣興之不兼比者誤以為比則失之穿鑿矣毛氏特言興也為其理隱故也今從毛氏例書興以别之鶚鳥性不再匹立則異處是有别而不淫也又性好跱每立更不移處有幽閒正靜之象焉故以興后妃也雎鳩有闗闗然之聲在河中之洲逺人之處興后妃徳音聞於外而身居深宫之中也大姒有徽音故以闗闗興之此窈窕幽閒之善女足以為君子之良匹也言大姒之賢而文王齊家之道可見矣車牽思得賢女以配君子亦曰徳音來括白華刺襃姒以為鼓鐘于宫聲聞于外蓋宫庭雖奥而善惡流傅於外皆不可掩言闗闗雎鳩在河之洲猶鶴鳴九臯聲聞于野之意也爾雅家祖郭郭以雎鳩為鶚又云鵰類是雎鳩即鶚也釋文於鵰曰鶚屬於鶚曰鵰屬鶚屬即是鵰鵰屬即是鶚無别鶚也鵰鶚皆搏擊之鳥故曰鷙或見經有河洲之言遂以為疑山隂陸氏云今大鵰翺翔水上扇魚令出沸波攫而食之一名沸河淮南子所謂鳥有沸波是也以此言之不可謂鷙鳥不近河洲也郯子五鳩備見詩經雎鳩氏司馬此詩是也祝鳩氏司徒鵓鳩也四牡嘉魚之鵻是也鳲鳩氏司空布榖也曹風之鳲鳩是也爽鳩氏司宼大明之鷹揚是也鶻鳩氏司事鶻音骨又如字鷽鳩也非斑鳩鷽音學小宛之鳴鳩與氓詩食桑葚之鳩是也歐陽氏以居鵲巢之鳩非鳲鳩則又在五鳩之外也參差荇菜參初金反差音䳄荇音杏亦作莕行之上濁解見條例傳曰后妃共荇菜以事宗廟共音恭䟽曰參差然不齊也天官醢人陳四豆之實無荇菜或殷禮也釋草曰荇接余郭璞曰叢生水中葉圓在莖端長短隨水深淺江東食之陸璣曰莖白葉紫赤色正圓徑寸餘浮生水上根在水底大如叙股上青下白䰞其白莖以苦酒浸之味脆美䰞音煮粲曰參差訓不齊凡菜皆不齊何獨荇也今池州人稱荇為莕公鬚蓋細荇亂生有若鬚然詩人之辭不苟矣左右流之䟽曰左右嬪妾也箋曰后妃共荇𦵔必有助之者粲曰流流水也流之謂於流水以今潔之也水流則清故潔之必於流水釋言以流為求不用窈窕淑女寤寐求之求之不得寤寐思服傳曰寤覺也寐寢也覺音教朱氏曰服猶懷也臣粲曰猶人言佩服不忘之義悠哉悠哉王氏曰悠者思之長也輾轉反側輾音展箋曰卧而不周曰輾䟽曰輾轉俱是廻動箋獨以輾為不周者辨其難明反側卧而不正也賦也唯二南舉賦比以見例餘無疑者不書后妃共爼豆以事宗廟言參差不齊之荇菜必得左右嬪妾於流水潔之以為𦵔故此幽閒之后妃或寤而覺或寐而寢惟欲求左右之賢也嬪妾不必親潔荇託言求内政之取以見其不妬忌也方其未得則寤寐思懐之此其所思悠長故終夜不寐其身輾轉而不安反側而不正也楚莊王夫人樊共姬曰妾備掃除十有一年矣私捐衣食求羙人而進於王妾所進九人今賢於妾者二人與妾同列者七人妾豈不欲擅愛專寵哉不敢以私廢公也樊姬之求羙人即太姒求左右之意說者多謂詩人思得淑女以配君子如車牽之意非也車牽惡襃姒故思得賢女以代之太姒已為文王妃何待詩人思得之乎參差荇菜左右采之芣苢傳曰采取也窈窕淑女琴瑟友之釋樂釋曰廣雅云琴長三尺六寸六分五絃後加文武二絃又曰禮圖舊云雅瑟長八尺一寸廣一尺八寸二十三絃其常用者十九絃頌瑟長七尺二寸廣一尺八寸二十五絃盡用之粲曰友之親之如朋友也參差荇菜左右芼之芼音帽董氏曰芼則以熟而薦之也粲曰芼之謂為羹也内則云芼羙注云菜也䟽云用菜雜肉為羙又昏義芼之以蘋藻毛以芼為擇今不從窈窕淑女鐘鼓樂之樂音洛臣粲曰金旁從童之鐘樂器也金旁從重之鍾酒器也聚也古字鐘通作鍾監本毛詩皆作鐘求而得之則以琴瑟親友之以鐘鼔歡樂之亦謂不妬也闗雎三章一章四句二章八句鄭作五章章四句今從毛葛覃后妃之本也補傳曰王業之本在稼穡后妃之本在女功后妃在父母家則志在於女功之事躬儉節用服澣濯之衣澣音緩胡管反尊敬師傅則可以歸安父母化天下以婦道也本者務本也國史所稱此一語而已其下則說詩者之辭如言在父母家則志在女功之事非詩意也詩記曰講師以為在父母家殊不知是詩皆述既為后妃之事貴而勤儉乃為可稱若在室而服女功固其常耳葛之覃兮傳曰葛所以為絺綌女功之事煩縟者覃延也施于中谷施音異傳曰施移也中谷谷中也䟽曰施言引蔓移去其根也中谷倒其言者古語皆然維葉萋萋傳曰蔞蔞茂盛貌黄鳥于飛曰黄鳥黄鶯也傳曰摶黍也摶音團釋鳥曰皇黄鳥郭璞曰俗呼黄離留陸璣云或謂之黄栗留幽州人謂之黄鶯一名倉庚一名黧黄一名楚雀常以葚熟時來在桑間闗西謂之鸝黄郭云其色黧黒而黄因名之集于灌木傳曰灌木叢木也釋木曰木族生為灌其鳴喈喈喈音皆傳曰喈喈和聲之逺聞也興之不兼比者也述后妃之意若曰葛生覃延而施移於谷中其葉萋萋然茂盛當是之時有黄鳥飛集於叢生之木聞其鳴聲之和喈喈然我女工之事將興矣黄鳥飛鳴乃春葛初生之時未可刈也而已動女工之思見念念不忘也先時感事乃豳民艱難之俗今以后妃之貴而志念如此豈復有一毫貴驕之習邪味詩人言外之意可以見文王齊家之道矣葛之覃兮施于中谷維葉莫莫朱氏曰莫莫茂宻也張氏曰秋時也是刈是濩刈音乂濩音穫釋文曰韓詩云刈取也臣粲曰刈從刂刀也謂斬而取之傳曰濩煑之也為絺為綌絺音笞綌音隙傳曰精曰絺麤曰綌服之無斁音亦傳日斁厭也又述后妃之意若曰至葛葉莫莫然茂宻之時我則刈取之濩煑之又緝績以為絺綌而服之無有厭斁之心躬親其事知女工勤勞故服之無厭心也婦人驕侈之情何有紀極苟萌一厭心雖窮極靡麗耳目日新猶以為不足也味服之無斁一語可見后妃之徳性後世妃后以驕奢禍其俗者皆一厭心為之也詩人辭簡而㫖深矣補傳曰后妃之善莫先於不妬忌其次則能儉節也言告師氏蘇氏曰言辭也春秋傳云言歸于好傳曰師女師也古者女師教以婦徳婦言婦容婦功䟽曰昏禮云姆纚笄綃衣在其右注云姆婦人五十無子出而不復嫁能以婦道教人者姆亡候反纚顋之上聲山買反笄音鷄綃音消言告言歸張子曰言告言歸猶曰告曰歸也薄汙我私汙音烏芣苢傳曰薄辭也傳曰汙煩也私燕服也箋曰煩撋之用功深撋而縁反釋文曰煩撋猶捼莏也粲曰治汙曰汙猶治亂曰亂也薄澣我衣箋曰澣謂濯之耳衣謂褘衣以下至褖衣褘音揮褖音彖䟽曰澣其用功淺也害澣害否害音曷否音缶傳曰害何也歸寧父母此章乃説后妃將歸寕之事后妃若曰我告于師氏其告之者為歸寧也於是汙煩其䙝服澣濯其禮服又有不澣者問其何者當澣而何者可以未澣乎我將歸而問安於父母也舉動必告於師氏澣衣猶為之斟酌觀此氣象其賢可見矣朱氏曰此詩見后妃已貴而能勤已富而能儉已長而敬不弛於師傅已嫁而孝不衰於父母是皆德之厚而人所難也葛覃三章章六句卷耳卷音捲后妃之志也又當輔佐君子求賢審官知臣下之勤勞内有進賢之志而無險詖私謁之心詖音祕朝夕思念至於憂勤也言后妃之志者謂因備酒漿念及臣下之勤勞耳後序以詩之周行為列位遂支離其説非詩之㫖也求賢審官婦人何預果若序言開后妃與政之漸矣朝夕思念至于憂勤於義為衍采采卷耳芣苢傳曰采取也朱氏曰采采非一采也據本草即今蒼耳今人麴糵中多用之釋草曰菤耳芩耳郭璞曰廣雅云枲耳也亦云胡枲江東呼常枲形似鼠耳叢生似盤枲西之上陸璣曰葉青白色似胡荽白華細莖蔓生可煑為茹四月中生子如婦人耳璫或謂之耳璫草不盈頃筐頃音傾韓詩曰頃筐欹筐也錢氏曰箱之小而偏者荀子曰卷耳易得也頃筐易盈也嗟我懷人臣粲曰懷矜念也寘彼周行今從毛鹿鳴音如字舊音航傳曰寘置也呂氏曰周行周道也朱氏曰周行大道也詩記曰毛氏以為周之列位自左氏以來其傳舊矣然以經解經則不若呂氏之説也興之不兼比者也此言使臣在途歸必勞之后妃主酒漿之事豫采卷耳以為麴糵故因見采卷耳者而念使臣之勞謂卷耳易得之草頃筐易盈之器今采卷耳者非難且勞之事也采之又采尚不盈頃筐嗟乎我矜念使臣今在道路其䟦涉之勞當如何耶張子詩云閨閫忱難與國防黙嗟徒御困髙岡觥罍欲解痡瘏恨采耳元因備酒漿經有三周行卷耳鹿鳴大東也鄭皆以為周之列位唯卷耳可通鹿鳴示我周行破示為寘自不安矣大東行彼周行又為發幣於列位其義尤迂毛以卷耳為列位鹿鳴為至道大東無傳今取毛鹿鳴音義皆為道也但卷耳大東為道路鹿鳴為道義陟彼崔嵬音摧桅傳曰陟升也崔嵬土山之戴石者釋山曰石戴土謂之崔嵬䟽曰傳與爾雅正反者或傳寫誤也下解砠同我馬虺隤虺音灰隤徒回反傳曰虺隤病也我姑酌彼金罍音雷傳曰姑且也釋文曰罍酒罇也容一斛䟽曰人君以黄金飾尊刻為雲雷之象言刻則用木矣維以不永懷今曰懷即上文懷人之懷后妃念使臣升崔嵬之山其馬亦虺隤而病矣馬勞且病人勞可知永懷謂念之不忘也使臣他日竣事而歸我酌酒以勞之乃可以釋我此念今方在途則我矜念之而不忘也后妃不親酌酒以主酒漿故以我言之周南著文王之化后妃居深宮之中而能念及臣下之勞者由其君子能體羣臣故夫婦之志同也解頥新語曰周官酒人之奚為世婦役有女酒女漿則知周家酒漿之用亦内治所當察也注奚今之侍使官婢陟彼高岡傳曰山脊曰岡我馬𤣥黃傳曰𤣥馬病則黄我姑酌彼兕觥兕詞之上濁觥音肱傳曰兕觥角爵也䟽曰兕一角青色重千斤以兕角為觥古者宴饗之禮必有兕觥成十四年左傳衞侯饗苦成叔寗惠子曰兕觥其觩㫖酒思柔故知饗有兕觥也昭元年鄭人宴趙孟穆叔子皮及曹大夫興拜舉兕爵曰小國賴子知免於戾矣故知宴有兕觥也朱氏曰兕野牛也周禮有觥罰之事又云觥其不敬者但謂以觥罰之耳不必專為罰爵也維以不永傷粲曰傷亦懷也陟彼砠矣砠音趨與睢同傳曰石山戴土曰砠釋山曰土戴石為砠我馬瘏矣瘏音塗傳曰瘏病也我僕痡矣痡音敷又浦之平傳曰庯亦病也云何吁矣僕馬皆病而今云何乎長歎而已念其勞也卷耳四章章四句樛木樛音鳩后妃逮下也䟽曰言以恩意接及其下衆妾使俱進御於王也言能逮下而無嫉姤之心焉嫉音疾姤都之去讀此詩想見文王宫庭之雝穆矣南有樛木傳曰南南土也木下曲曰樛箋曰南土謂荆揚之域䟽曰揚州厥木惟喬臣粲曰左傳聲子云如杞梓皮革自楚往也見南方木羙葛藟纍之藟音壘纍音縲纍釋文曰藟似葛纒繞也樂只君子樂只音洛止也粲曰只語已辭也如仲氏任只母天只楚詞白日昭止是也樂只君子蓋曰樂哉君子也福履綏之粲曰視履考祥之履傳曰綏安也興也南土木羙葛藟亦茂故以南言之木之喬竦者物不得附託而俱升南土有下曲之木故其下葛也藟也皆得纍而纒繞之喻后妃能以惠下逮衆妾無姤忌之心則衆妾得以攀附而上進后妃如此樂哉其夫君子可謂福履安之矣動罔不吉謂之福履詩記曰漢之二趙隋之獨孤唐之武后其禍至於亡國則樛木之后妃詩人安得不深嘉而屢歎之乎南有樛木葛藟荒之傳曰荒奄也呂氏曰芘覆也樂只君子福履將之箋曰將猶扶助也南有樛木葛藟縈之縈烏營反傳曰縈旋也錢氏曰遶也樂只君子福履成之傳曰成就也樛木三章章四句螽斯螽音終后妃子孫衆多也言若螽斯不姤忌則子孫衆多也螽斯次樛木義相成也後序謂若螽斯不姤忌非也螽斯微蟲何由知其不姤忌乎螽斯羽曰螽斯蝗也蠜也斯語助也即阜螽也非七月所謂斯螽也蠜音煩詵詵兮詵音莘傳曰詵詵衆多也宜爾子孫振振兮振音真杜氏左傳注曰振振盛也粲曰振振共有二訓盛也信厚也詩言振振者三此詩當如均服振振之訓為盛麟趾殷靁當為信厚比也螽蝗生子最多信宿即羣飛因飛而見其多故以羽言之喻子孫之衆多也歸其自於后妃曰宜乎爾后妃之子孫振振然而盛也此詩之意全在宜爾二字風人意在言外見后妃子孫衆多但言宜其如此使人自思其所以宜者何故而不明言之謂由不姤忌而致此也今考爾雅云阜螽蠜李氏陸璣許氏蔡邕之說阜螽即蝗也蠜也螣也螣音特同是一物爾雅又云蜤螽蚣蝑蜤音斯蚣蝑音嵩須此别是一物蝗之類也螽斯即阜螽非蜤螽也毛氏誤以此螽斯為蚣蝑孔氏因之遂以螽斯斯螽為一物錢氏云阜螽羣飛齊一故以為比斯語助猶鸒斯鹿斯也言羽見其飛也春秋書螽即蝗也蘇氏謂螽斯一生八十一子朱氏云一生九十九子今俗言蝗一生百子不必以定數言之但以生子多者莫如蝗耳螽斯羽薨薨兮薨音轟朱氏曰薨薨羣飛聲宜爾子孫繩繩兮蘇氏抑解曰繩繩不絶也粲曰如繩之牽連不絶螽斯羽揖揖兮揖子立反又音戢傳曰揖揖㑹聚也吕氏曰螽斯始化其羽詵詵然比次而起已化則齊飛薨薨然有聲既飛復歛羽揖揖然而聚宜爾子孫蟄蟄兮蟄尺十反徐直立反傳曰蟄蟄和集也螽斯三章章四句桃夭音腰后妃之所致也不姤忌則男女以正昏姻以時䟽曰摽有梅傳云三十之男二十之女不待禮而行之則男女以正謂男未三十女未二十女自卜五至十九男自二十至二十九也東門之楊傳云男女失時不逮秋冬則秋冬嫁聚正時也鄭以三十之男二十之女仲春之月為昏是禮之正法也粲曰昏姻之時當從毛氏解見東門之楊此序男女以正上謂以禮嫁聚昏姻以時謂及盛年耳國無鰥民也鰥音闗經但言男女以正昏姻以時而序者推原於后妃之不姤忌蓋知風之自矣廣漢張氏曰乖争之風始於閨門至於使萬物不得其所而况昏姻之能以時乎此意蓋深逺矣桃之夭夭傳曰夭夭其少壯也粲曰棘心夭夭與書厥草惟夭皆少長之意物少則長而末已灼灼其華曹氏曰灼灼鮮明貌臣粲曰毛以為華之盛謂盛故鮮明非訓灼灼字為盛也之子于歸傳曰之子嫁子也于往也釋文曰婦人謂嫁曰歸宜其室家興也夭夭以桃言指桃之木也灼灼以華言指桃之華也桃之夭夭灼灼其華取相錯成文也言桃之少壯故其華鮮明木少壯則其華盛譬婦人盛年則容色麗也此行嫁之子往歸于夫家則男有室女有家夫婦皆得宜也桃之夭夭有蕡其實蕡音焚傳曰蕡實貌李氏曰桃之少壯則結實必大其葉亦蓁蓁然盛若非少壯則雖結實不復大雖有葉不復蓁蓁矣此言婦人得盛時而嫁也粲曰蕡者大也墳為大防鼖鼔為大鼔有頒其首用宏兹賁皆訓為大凡蕡同音之字皆為大義則蕡亦桃實之大貌之子于歸宜其家室桃之夭夭其葉蓁蓁音榛傳曰蓁蓁至盛貌之子于歸宜其家人不特夫婦相宜而一家之人盡以為宜言其能恊和而使無閒言也閨門雍穆風俗淳羙豈非后妃之化歟詩記曰既詠其華又詠其實又詠其葉非有他義蓋餘興未巳而反覆歌詠之耳桃夭三章章四句兔罝音嗟后妃之化也闗雎之化行則莫不好德好去聲賢人衆多也詩人因見兔罝之人處賤事而能敬便知其材之可用序者因詩人羙兔罝之賢便知當時多好德之賢又便知其為闗雎之化非知類通逹者未可與言詩也能敬即是好徳廣漢張氏曰和平之風至於使兔罝之人亦興其好徳之彛性則固有不言而信不疾而速者其要特在於脩身以齊家而已肅肅兔罝傳曰肅肅敬也兔罝兔罟也罟者罟網也椓之丁丁椓音卓丁陟耕反音近争傳曰丁丁椓杙聲也杙音弋橜也橜音掘䟽曰此丁丁連椓之今曰伐木丁丁為聲之相應此丁丁亦為連椓也赳赳武夫赳音九傳曰赳赳武貌公侯干城干如字舊音扞朱氏曰此文王時周人之詩極其尊稱不過曰公侯而已亦文王未嘗稱王之一驗也凡雅頌稱王者皆追王後所作耳箋曰干也城也皆以禦難也孫炎曰干楯所以自蔽扞也楯食允反䟽曰扞蔽如盾防守如城然賦也詩人偶見有肅肅然恭敬者乃作罝捕兔之人椓伐杙橜其連椓之聲丁丁然為賤事而能敬可以知其賢矣遂羙此兔罝之人赳赳然甚武可為公侯之干與城言勇而忠也李氏曰冀缺耕於野夫婦相敬如賔胥臣薦之於文公茅容避雨危坐郭林宗見而異之肅肅兔罝施于中逵施如字逵音葵道傳曰逵九達之赳赳武夫公侯好仇好朱如字鄭去聲朱氏曰好仇善匹也錢氏曰仇與逑通粲曰公侯好仇與君子好逑句法同善匹猶率由羣匹之匹此赳赳之夫可為公侯之善匹言勇而良也肅肅兔罝施于中林傳曰中林林中赳赳武夫公侯腹心中逵人所見之地肅肅可也以中林無人之地猶且恭敬則其賢可知也此赳赳之夫可為公侯之腹心謂機宻之事可與之謀慮言勇而智也詩記曰其辭浸重亦歎羙無巳之意爾兔罝三章章四句芣苢音浮以后妃之羙也和平則婦人樂有子矣樂音洛楊氏曰后妃無嫉姤之心則和平矣惟其和平故天下化而和平則婦人以有子為樂矣天下和平為后妃之羙家齊而國治國治而天下平矣采采芣苢傳曰采取也朱氏卷耳解曰采采非一采也釋草曰芣苢馬舄馬舄車前郭璞曰今車前草大葉長穗好生道邊江東呼為蝦蟇衣陸璣曰其子治婦人難産山隂陸氏曰神仙服食法云令人有子亦謂之陵舄列子云生於陵屯則為陵舄屯阜也薄言采之程子曰薄言發語辭也粲曰薄言震之薄言追之薄言采芭凡薄言二字皆辭也采采芣苢薄言有之賦也芣苢宜懷姙故婦人有子則采之采采非一采矣而又采之喜樂之深也有言采而得之為己所有也此詩無形容譬喻之辭讀之自見喜意采采芣苢薄言掇之掇端之入傳曰掇拾也采采芣苢薄言捋之捋鑾之入朱氏曰捋取其子也采而聚之於地既為已有於是就地掇拾之既掇拾之則捋取其子采采芣苢薄言袺之祮音結傳曰祮執袵也李巡曰袵者裳之下也采采芣苢薄言襭之襭音頡傳曰扱袵曰襭扱音揷既捋取其子則以衣貯之而執其袵謂之袺既執其袵及扱其袵於帶中謂之襭自采至襭言之序也芣苢三章章四句漢廣徳廣所及也文王之道被于南國羙化行乎江漢之域無思犯禮求而不可得也道謂脩身齊家之道也男子見游女自無犯禮之思後序言求而不可得非也南有喬木南解見樛木傳曰喬上竦也不可休息漢有游女李氏曰漢水出興元府嶓冡山至漢陽軍大别山入江又漢入江解見江漢曹氏曰漢上之游女非深居於重閨之中者不可求思傳曰思辭也項氏曰思語辭或用之句末如不可求思或用之句首如思齊大任漢之廣矣不可泳思釋水曰濳行為泳郭璞曰水底行也江之永矣朱氏曰江水出永康軍岷山不可方思釋言曰方泭泭音孚亦作桴孫炎曰方水中為泭筏論語注云編竹木為筏小曰桴今曰江水尤深澗於漢故漢止言不可泳而江言不可方興也南方之木羙故以南言之木下蟠則隂廣上竦則陰少南有喬竦之木其陰不及下故不可休息興女之高潔而不可求也漢水之上有游行之女非士君子之族深居閨閤之中者也以小家女而在曠僻可動之地見者自無狎䁥之心於是陳其不可得之辭如漢水之廣不可濳行而泳之江水之長不可乘泭而方之見其正潔之意使人望之而暴慢之志不作矣詩人偶見漢上游女人無陵犯之心知紂之淫風已變由文王風化所及故假此游女以起義耳翹翹錯薪翹音喬錢氏曰翹翹髙竦貌傳曰錯雜也言刈其楚䟽曰楚木名故樂記注以楚為荆王風鄭風皆云不流束楚是也楚在雜薪中猶翹翹之子于歸言秣其馬秣音末傳曰秣養也六尺以上曰馬說文曰秣食馬榖也漢之廣矣不可泳思江之永矣不可方思翹翹然而髙者錯雜之薪也其中之楚木尤翹翹然人所先刈也喻衆女之中其髙潔者人所先取也故言此游女之嫁人將有秣馬以禮親迎之者豈可以非禮犯之哉於是復陳其不可得之辭或謂秣馬如所謂雖為執鞭猶忻慕焉如此則敢請子珮已有狎䁥之想矣翹翹錯薪言刈其蔞音閭郭璞曰蔞蔞蒿也生下田初生可啖江東用羙魚也陸璣曰其葉似艾白色長數寸高文餘好生水邊及澤中正月根芽生旁莖正白食之香而脆羙其葉又可蒸為茹釋草曰購蔏蔞購音構蔏音商舍人曰購一名蔏蔞之子于歸言秣其駒傳曰五尺以上曰駒説文曰馬二歲曰駒漢之廣矣不可泳思江之永矣不可方思漢廣三章章八句汝墳音汾道化行也文王之化行乎汝墳之國婦人能閔其君子猶勉之以正也文王三分有二不替事殷之小心故當時化之雖汝墳婦人亦勉其夫以從王事此文王道化之盛也遵彼汝墳傳曰遵循也汝水名也李氏曰汝水出汝州魯山東南至蔡州襃信入淮周南之水也釋丘曰墳大防䟽曰謂崖㟁狀如墳墓伐其條枚傳曰枝曰條幹曰枚未見君子惄如調饑惄音溺調音周傳曰惄饑意也調朝也箋曰惄思也賦也君子從役於外其妻為樵薪之事遵循汝水之墳岸伐其枝條枚幹念其君子之未見惄然如朝饑之切也親伐薪則庶人之妻也遵彼汝墳伐其條肄音異傳曰肄餘也斬而復生曰肄程子曰伐肄則踰年矣既見君子不我遐棄前伐其條枚今生肄而復伐之見行役之久也他日已見君子庶幾不逺棄我也魴魚赬尾魴音房赬音稱曰魴鯿也鯿音鞭解見陳衡門傳曰赬赤也魚勞則尾赤張子曰謂水淺魚摇尾多則血流注尾故尾赤也吕氏曰鯉尾赤魴尾白今魴尾亦赤則勞甚矣王室如燬音毁曰王室商室也傳曰燬火也雖則如燬父母孔邇粲曰婦人指夫之父母從箋䟽義也或以為指文王今不從傳曰孔甚也邇近也魴尾本白以勞故赤婦人喻其君子勞苦而容瘁由王室之事其急如火不可緩也是時商王尚存西伯之事皆幹蠱王室也婦人從而勉其君子曰王室之事雖急如火不得少休然父母相去不逺不必念家而怠王事也魴魚赬尾閔之也父母孔邇勉以正也子于役而念父母情之至切其妻乃復權恩義之輕重欲其國爾忘家可謂正矣舊說以如燬喻紂之酷以父母喻文王之仁刻畫如此固非以服事殷者所敢安而亦烏在其為勉以正也韓詩以為思親列女傳以為其妻恐其懈於王事蓋近之矣汝墳三章章四句麟之趾關雎之應也關雎之化行則天下無犯非禮雖衰世之公子皆信厚句如麟趾之時也應效應也公子指周南國君之子公子生長富貴未嘗憂懼况當殷末俗流世敗之時宜其驕淫輕佻也今乃信厚豈非關雎風化之效歟公子猶信厚則他人可知程子曰麟趾不成辭言之時謬矣麟之趾麟者仁獸也瑞獸也陸璣曰麕身牛尾馬足黄色圓蹄一角角端有肉不履生蟲不踐生草不羣居不侣行不經陷穽不罹羅網王者至仁乃出今并州界有麟大小如鹿非瑞應之麟故司馬相如子虚賦曰射麋脚麟謂此麟也注脚謂持其脚也曹氏曰說文云麒仁獸也麐牝麒也麟大牝鹿也則字當作麐音同傳曰趾足也振振公子振音真傳曰振振信厚也振振有考見螽斯于嗟麟兮于音吁粲曰于古注無音今考韻書于字通作呼注云詩于嗟用此知當音吁也興也有足者宜踶音第蹋也莊子云馬相怒則分背相踶唯麟之足可以踶而不踶是其仁也今振振然信厚之公子有貴勢而不恃遂歎羙此公子即麟也此詩之辭寂寥簡短三歎而有餘音也麟之趾指麟言也于嗟麟兮指公子言也猶楚狂接輿稱孔子為鳯兮也麟之定丁之去傳曰定題也說文曰題頟也振振公姓王氏曰公姓公孫也孫傳姓者也于嗟麟兮有額者宜抵唯麟之額可以抵而不抵也公室子孫其傳彌逺而信厚不替也麟之角振振公族傳曰公族公同祖也于嗟麟兮有角者宜觸唯麟之角可以觸而不觸朱氏曰關雎葛覃卷耳樛木螽斯其詞雖主於后妃其實則皆所以著明文王身脩家齊之效也至於桃夭兔罝芣苢則家齊而國治之效漢廣汝墳則以南國之詩附焉而見天下已有可平之漸矣麟之趾三章章三句詩緝卷一
