body:
  text: 詩緝卷五宋嚴粲撰鄘音容國風說已見邶柏舟共姜自誓也共音恭釋文曰共姜共伯之妻也婦人從夫諡姜姓也衛世子共伯蚤死蚤音早箋曰共伯僖侯之世子疏曰共伯名餘共諡伯字以未成君故不稱爵其妻守義父母欲奪而嫁之誓而弗許故作是詩以絶之曰衛武公詩宣王時詩記曰史記載僖侯已葬共伯弟和襲攻共伯於墓上共伯入僖侯羡自殺按武公在位五十五年國語又稱武公年九十有五猶針警于國計其初即位其齒蓋已四十餘矣使果弒共伯而篡位共伯見弒之時其齒又加長於武公安得謂之蚤死乎是共伯未嘗有見弒之惡也羡音延又以戰反墓道也和即武公李氏曰武公衛人謂睿聖武公奪嫡之事未可以誣之吕氏曰序言父母詩獨云母蓋止是母意序并言之文勢當爾衛風靡矣女子之卓然自守者不多得也故聖人録之禮義之在人心雖大亂而不泯其王澤之猶存也歟泛彼柏舟粲曰泛浮也在彼中河𫝊曰中河河中曹氏曰齊地西以河為境而衛居河之西父母欲奪共姜而歸齊則當乘舟渡河而去粲曰紂都河北鄘在紂都之南則近河矣故此鄘風言中河以土風所見也髧彼兩髦髧談之上濁髦音毛朱氏曰髧髮垂貌𫝊曰髦者髮至眉子事父母之飾疏曰髦者用髮為之其制未聞項氏曰髦者以髮作僞髻垂兩眉之上如今小兒用一帶連雙髻橫繫額上是也今曰內則注云髦象幼時鬌小兒剪髮也兒生三月剪髮為鬌男角女羇夾囟曰角兩髻也午達曰羇三髻也否則男左女右長大猶為飾存之謂之髦所以順父母幼小之心內則云子事父母總拂髦是也父母既沒則去之玉藻云親沒不髦是也親死猶幸其生未忍脫之故士待既殯諸侯待小殮而後脫之也此設髦之制耳非詩意也鬌音朵囟音信補𫝊曰守義既堅必毁其容飾不事膏沐去髮至眉為幼時之狀實維我儀錢氏曰髧然兩髦實維我嫠居之容儀之死矢靡它音他𫝊曰之至也矢誓也靡無也母也天只音止朱氏曰母恩如天不諒人只𫝊曰諒信也興也共姜言柏舟之在河中猶我婦人之在夫家舟必不可以去水猶我必不可以他適也守志不嫁不事膏沐髧然垂其兩髦如幼時之狀者實是我嫠居之容儀我至死誓無它心也父母者子之天夫者婦之天今父與夫俱不存唯母是我所天也何不信我而欲奪我志也泛彼柏舟在彼河側髧彼兩髦實維我特錢氏曰特獨也實我寡獨之人所當然之死矢靡慝𫝊曰慝邪也王氏曰以再嫁為慝則其絶之甚矣母也天只不諒人只柏舟二章章七句牆有茨音慈衛人刺其上也公子頑通乎君母疏曰頑昭伯也箋曰君母惠公之母曰惠公朔即訴伋者惠公之母宣姜即宣公所納伋妻宣公卒惠公幼齊人使其庶兄昭伯蒸於宣姜生子五人齊子戴公文公宋桓夫人許穆夫人國人疾之而不可道也曰衛惠公詩桓王時朔幼而嗣國四年奔齊十二年而復入立三十有一年閲四王矣桓莊僖惠其五詩専為桓何牆茨鶉奔皆刺頑時朔尚幼也偕老桑中介其間從可知也芃蘭又目之童子知皆初年也牆有茨釋草曰茨蒺藜郭璞曰布地蔓生細葉子有三角刺人不可掃也掃音譟中冓之言冓溝之去詩記曰前漢梁王共𫝊聽聞中冓之言注應劭云中冓材構在堂之中也顔師古云謂舍之交積材木也當從應顔說蓋閫內隱奧之處今曰言話也謂此一假話也不可道也錢氏曰道言也所可道也言之醜也興也牆有蒺藜惡草欲掃去之則傷牆故不可掃閨門之話欲道之則傷君故不可道非不可道但言之可醜也中冓之言但謂閨門之事不必以為頑與夫人淫昏之話牆有茨不可襄也𫝊曰襄除也中冓之言不可詳也錢氏曰詳盡言之也所可詳也言之長也欲盡言則其說甚長蓋不欲言之也今人不欲言之事則曰其說甚長牆有茨不可束也𫝊曰束而去之中冓之言不可讀也朱氏曰讀誦言也所可讀也言之辱也言之則自辱不欲污口舌也牆有茨三章章六句君子偕老刺衛夫人也箋曰夫人惠公之母疏曰以上篇言母知此亦為宣姜夫人淫亂失事君子之道故陳人君之德箋曰人君小君也服飾之盛宜與君子偕老也曰衛惠公詩桓王時曹氏曰毛傳謂能與君子偕老乃能居尊位服盛服序文顛倒非毛意也此詩惟述夫人服飾之盛容貌之尊不及淫亂之事但中間有子之不淑一言而譏刺之意盡見碩人惟述莊姜之美不言莊公不見答但中間有大夫夙退二語猗嗟惟述魯莊之美不言不能防間其母但中間有展我甥兮一語三詩體同皆中間冷下一二語而首尾不露其意也君子偕老朱氏曰君子其夫也傳曰偕俱也副笄六珈副音覆載之覆敷救切笄音雞珈音加副曰副者后夫人祭服之首飾如漢之步搖也傳曰副者編髮為之疏曰天官追師掌王后之首服為副編次注云副之言覆所以覆首為之飾其遺像若今之步搖矣服之以從王祭祀編編列髮為之其遺像若今假紒矣服之以告桑也次次第髮長短為之所謂髲髢服之以見王是也言編若今假紒者編列他髮為之假作紒形加於首上次者亦鬄他髮與已髮相合為紒是編次所以異也追音堆編音匾又如字紒音計髲音避髢音第亦作鬄又解見召采蘩笄曰笄衡笄也以玉為之唯副有衡笄出于副之兩旁繫紞以縣瑱也疏曰唯祭服有衡笄編次則無衡笄今曰內則言女子之笄者簪也所以卷髮者唯副之笄謂之衡笄六珈曰六珈者以玉加於笄為飾有六也傅曰珈笄飾之最盛者箋曰珈之言加也副既笄而加飾如今步搖上飾古之制所有未聞疏曰必飾之有六但所施不可知據此言六珈則侯伯夫人為六王后則多少無文也此副與珈飾唯后夫人有之卿大夫以下則無委委他他委音威他音駝朱氏曰委委他他雍容自得之貌如山如河象服是宜箋曰象服謂揄翟闕翟也人君之象服則所謂豫欲觀古人之象揄音遙字又作褕粲曰翟皆刻繒以象鳥羽故謂之象翟解見下文其之翟也子之不淑云如之何言夫人之義與其夫偕老從一而終故能居夫人之位稱其服飾之盛其首飾有副既服副而著衡笄其笄之上以玉加之為飾其數有六故言六珈笄者婦人之常飾唯后夫人之副其笄謂之衡笄而有六珈之飾也委委他他雍容自得德稱其服而無愧怍也又其止如山則容貌之安重其動如河則氣象之廣大服其象服翟衣而宜也今爾宣姜之為不善失偕老之道則於此服飾之盛為如何乎宜乎不宜乎問之使自愧也𫝊以笄即衡笄一物也追師云追衡笄鄭注云王后之衡笄皆以玉為之是鄭以衡與笄為二物也其下文云唯祭服有衡釋衡為一物又云笄卷髮者釋笄為一物故鄭於此箋言笄而不言衡笄也疏混毛鄭為一說又引追師注云唯祭服有衡笄彼文無笄字疏蓋誤也今從毛義玼兮玼兮玼音此王肅曰玼衣服鮮明貌其之翟也翟音狄疏曰𫝊以翟雉名也今名衣曰翟故謂以羽飾衣鄭注周禮三翟皆刻繒為翟雉之形而彩畫之以為飾不用真羽羽施於旌旗蓋則可施於衣裳則否蓋附人身動則卷舒非可以羽飾也鄭義為長粲曰天官內司服王后六服鄭注云伊雒而南素質五色皆僃成章曰翬江淮而南青質五色皆僃成章曰揄褘衣畫翬揄翟畫揄闕翟刻而不畫此三翟之别也侯伯夫人揄翟子男夫人闕翟揄翟之上有褘衣祭統云夫人副禕謂公之夫人衛侯爵夫人當服揄翟褘音暉鬒髮如雲鬒音軫傳曰鬒黑髮也說文曰髮稠也李氏曰昭二十八年左傳有仍氏生女鬒黑而甚美光可以鑑注云美髮為鬒錢氏曰如雲稠密也不屑髢也髢音弟傳曰屑潔也髢髲也疏曰髢益髮也哀十七年左傳衛莊公見已氏之妻髮美使髠之以為吕姜髢玉之瑱也瑱天之去粲曰讀作殿最之殿者非彼丁殿反也傳曰瑱塞耳也象之揥也揥音熾韻又音替疏曰以象骨搔首因以為飾粲曰傳云揥所以摘髮蓋摘音剔故疏以搔首釋之非音摘也若音摘為摘取之義則今之鑷子矣非也搔首之摘因以為飾者若今之篦兒也揚且之晳也且如字徐音沮之平晳音錫粲曰揚起也言眉目揚起也且又也如㫖且多之且左傳築者謳曰澤門之晳傳曰晳白晳胡然而天也胡然而帝也上章子之不淑既指宣姜此章言其者承上文指宣姜也玼然鮮明者是宣姜之翟衣也重言玼兮者甚言其鮮明也婦人髮少則聚他人髮為髲髢以益之今宣姜黑髮如雲之稠密不以髲髢為潔美言不假他髮也以玉為塞耳之瑱以象骨為搔首之揥其眉目揚起而其色又且白晳胡然而尊仰之如天乎胡然而尊仰之如帝乎言其服飾之盛容貌之美望之猶天人然是何為如此也設為問辭令宣姜自省思之豈可以如是尊嚴之服飾容貌而為不淑之行乎朱氏清揚婉兮解云清目之美揚眉之美錢氏美目揚兮解云揚目峻也蓋眉目皆以揚起為美清揚竝言則當為目清眉揚也指目言揚則但為目揚也若此章單言揚則兼眉目也瑳兮瑳兮瑳七我反說文曰瑳玉色鮮白也其之展也展音戰粲曰展衣之展本音陟戰反周禮內司服張彥反在去聲三十三線韻內禮記作袒曰展六服之展衣也𫝊曰展以丹縠為衣疏釋𫝊曰此𫝊言展用丹縠餘五服𫝊無其說丹縠亦不知所出而孫育推之以為褘衣赤揄翟青闕翟黑鞠衣黃展衣赤褖衣黑鞠音菊褖音彖箋曰后妃六服之次展衣宜白此以禮見於君及賔客之盛衣也疏釋箋曰箋不同𫝊言宜者無明文鄭司農注天官內司服云展衣白鞠衣黃褖衣黑蒙彼皺絺皺鄒之去絺音笞𫝊曰蒙覆也疏曰葛之精者曰絺其精尤細靡者皺也言細而縷皺是紲袢也紲袢音薛煩疏曰紲去也袢袢延熱氣也子之清揚𫝊曰清視清明也揚且之顔也𫝊曰顔角豐滿也展如之人兮展如字今曰展情之展知輦反在上聲二十八獮韻內𫝊曰展忱也邦之媛也媛音院𫝊曰美女為媛重言瑳然甚鮮白者是其展衣也服此展衣而裏用皺絺展衣蒙覆於皺絺之上是當暑紲去袢延熱氣之服也展衣之裏不常以皺絺夏則裏之以皺絺故曰是紲袢也宣姜服展衣之禮服而又目視清明眉上揚起眉上既揚起而又額角豐滿如此人乃邦之美女歎惜不滿之意見於言外矣君子偕老三章一章七句一章九句一章八句桑中刺奔也衛之公室淫亂男女相奔至于世族在位相竊妻妾李氏曰以姜弋庸皆著姓也衛陳多淫佚之事蓋有由矣惟其公族既化則下化之矣期於幽逺政散民流而不可止曰衛惠公詩桓王時樂記曰鄭衛之音比於慢矣桑間濮上之音亡國之音也其政散其民流誣上行私而不可止也比音僃前漢地理志曰衛地有桑間濮上之阻男女亦亟聚㑹聲色生焉張子曰鄭衛地濵大河沙地土薄故其人氣輕浮其地平下故其質柔弱其地肥饒不費耕耨故其人心怠惰其人情性如此其聲音亦然故聞其樂使人如此懈慢也詩記曰桑中溱洧諸篇幾於勸矣夫子取之何也曰詩之體不同有直刺之者新臺之類是也有微諷之者君子偕老之類是也有鋪陳其事不加一辭而意自見者此類是也或曰後世狹邪之樂府冒之以此詩之序豈不可乎曰仲尼謂詩三百一言以蔽之曰思無邪詩人以無邪之思作之學者亦以無邪之思觀之閔惜懲創之意隱然自見於言外矣詩記謂詩皆雅樂此桑中非桑間濮上之音今考濮水之上地有桑間亡國之音出於此桑中即其類也詩之正經為雅樂變詩以垂戒耳非祭祀朝聘所用也然或以桑中為淫奔者所自作則非所謂止乎禮義矣當從國史所題以為刺也爰采唐矣曰唐蒙也女蘿也莵絲也解見頍辨沫之鄉矣沫音妹𫝊曰沫衛邑疏曰酒誥注云沫邦紂所都朝歌即沫也云誰之思美孟姜矣箋曰孟長也蘇氏曰姜弋庸皆著姓也錢氏曰蓋沫大姓非必實言其人也期我乎桑中朱氏曰桑中上宫又沫鄉之中小地名也要我乎上宫要音腰釋文曰要約也送我乎淇之上矣釋文曰淇衛水也解見邶泉水此作者刺淫者謂汝言采唐蒙而往沫邑之鄉矣然汝非為采唐而往也汝所思者誰乎思彼美好姜姓之長女也汝特託言采唐以往耳汝思孟姜而往㑹之或相期於桑中之地或相約於上宫之地或相送於淇水之上所㑹之地人皆知之見為不善於隱僻者終不可掩也我指淫者非詩人自我也爰采麥矣沫之北矣云誰之思美孟弋矣𫝊曰弋姓也朱氏曰春秋定姒公榖作定弋錢氏曰弋姓即姒也期我乎桑中要我乎上宫送我乎淇之上矣爰采葑矣曰葑蔓菁也解見邶谷風沫之東矣云誰之思美孟庸矣𫝊曰庸姓也期我乎桑中要我乎上宫送我乎淇之上矣桑中三章章七句鶉之奔奔鶉音純刺衛宣姜也衛人以為宣姜鶉鵲之不若也曰衛惠公詩桓王時范氏曰宣姜之惡不可勝道也國人疾而刺之或逺言焉或切言焉逺言之者君子偕老是也切言之者鶉之奔奔是也衛詩至此則人道盡天理滅矣國從而亡故次之以定之方中美文公而衛復興焉鶉之奔奔釋文曰鶉䳺鶉也䳺烏南反山隂陸氏曰鶉無常居而有常匹莊子云聖人鶉居而鷇食俗言此鳥性淳不越橫草奔奔鬪也鶉不能亂其匹鷇音寇鳥子也補𫝊曰鶉所以奔奔然喜鬪者惡亂其匹而鬪也鵲之疆疆音姜山隂陸氏曰疆疆剛也鵲能不淫其匹鵲𫝊枝受卵故曰乾鵲莊子云烏鵲孺鵲以𫝊枝少欲故曰孺李氏曰鵲性不淫人之無良我以為兄錢氏曰公子頑惠公之兄也鶉奔奔然鬭者不亂其匹也鵲疆疆然剛者不淫其匹也宣姜與頑非匹偶也鶉鵲之不若也人之不善者我乃以為兄為惠公恥之也鵲之疆疆鶉之奔奔人之無良我以為君𫝊曰君小君也箋曰謂宣姜我乃以為小君為國恥之也鶉之奔奔二章章四句定之方中定丁之去美衛文公也疏曰文公燬昭伯頑之子戴公申弟衛為狄所滅東徙渡河野處漕邑處音杵漕音曹齊桓公攘戎狄而封之文公徙居楚丘疏曰鄭志答張逸問云楚丘在濟河間疑在今東郡界衛本河北至懿公滅乃東徙渡河野處漕邑則在河南矣楚丘與漕不甚相逺亦河南明矣杜預云楚丘濟隂成武縣西南粲曰左傳僖二年城楚丘始建城市而營宫室得其時制百姓說之說音恱國家殷富焉曰衛文公詩惠王時左傳閔二年曰狄人侵衛戰于熒澤衛師敗績遂滅衛又曰宋桓公逆諸河宵濟衛之遺民男女七百有三十人益之以共滕之民為五千人立戴公以廬於漕齊侯使公子無虧帥車三百乘以戍漕注云戴公申其年卒而立文公熒户扄反共音恭又曰衛文公大布之衣大帛之冠務材訓農通商惠工敬教勸學授方任能元年革車三十乘季年乃三百乘自鄄之復㑹鄄音絹事見魯莊十五年齊桓始霸惠王嗣服王室多故子頽之難於是楚丘封衛而霸令彊矣此世道一變也定之方中曰定營室也即北方室宿孫炎曰定正也天下作宫室者皆以營室中為正粲曰左傳云水昏正而栽栽築牆長板也謂今十月定星昏而中於是植板築而興作謂小雪時定在北方水宿也栽音在去聲也作于楚宫傳曰楚丘之宫揆之以日傳曰揆度也度音鐸疏曰度日之出入謂度其景也冬官匠人云為規識日出之景與日入之景晝參之日中之景是也今考地官大司徒正日景以求地中景如字作于楚室傳曰室猶宫也粲曰箋以宫為宗廟室為居室今不從樹之榛栗榛音臻榛解見邶簡兮今曰曲禮云婦人之摯椇榛脯修棗栗椅桐梓漆椅音伊椅釋木曰椅梓郭璞曰椅即楸楸音秋陸璣曰楸之疏理白色而生子者為梓梓實桐皮曰椅大類同而小别也桐曰桐白桐也陸璣曰有青桐有白桐有赤桐白桐宜為琴瑟今雲南牂牁人績其皮而為布甚好牂牁音臧歌山隂陸氏曰此即白桐華而不實爾雅云榮桐木即此是也以其華而不實今亦謂之華桐粲曰陸璣言有青桐白桐赤桐此中琴瑟者白桐也山隂陸氏亦以此為白桐陸又言桐有三種青白之外復有岡桐即油桐也青桐即梧桐一名梧一名櫬詩所謂梧桐生矣是也如陸氏之說椅桐梓漆之桐為白桐梧桐生矣之桐為青桐梓梓解見上椅山隂陸氏曰今呼牡丹為花王梓為木王蓋木莫良於梓故書以梓材名篇禮以椊人名匠也漆釋文曰漆木名爰伐琴瑟邶擊鼓箋曰爰於也言建亥之月小雪中氣之時定星營室昏而正中農務始畢土功可興又揆度日之出入以知東西正其方位然後可以作楚丘之宫室宫室異文以協句韻耳非分而言之也既作宫室乃植榛栗及椅桐梓漆凡六木他日於此伐之以為琴瑟美其新造之初為永久之圖也椅桐可為琴瑟榛栗可僃籩實梓漆可供器用但言伐琴瑟者取成句耳他可類推也蘇氏曰種木者求用於十年之後而不求近功升彼虛矣虛音祛傳曰虛漕虛也疏曰蓋有故墟猶僖二十八年左傳所謂有莘之墟也楚丘本亦邑也朱氏曰虛故城也以望楚矣望楚與堂箋曰楚楚丘也堂楚丘之旁邑疏曰升墟而并望楚堂明其相也景山與京傳曰景大也京高丘也降觀于桑詩記曰既升彼虛以領略其大勢復降觀于桑以細察其土宜卜云其吉王氏曰云言也終然允臧上章已言作宫室矣此章追本謀遷之初程子曰一章言建國之事次章方言相土度地之初屬文之勢然也言文公始在漕邑升其故城以望楚丘及其旁之堂邑又望其大山及其高丘於是自漕邑之虛而下於楚丘之野觀其宜桑之處人謀既定乃命龜卜之而卜言此地之吉於是建國而居之今其終信善矣如卜所言也殷武陟彼景山亦言大山也釋丘云絶高謂之京非人為之丘釋云卓絶高大如丘而人力為作之者名京李氏云非人力所為自然生者為丘按爾雅言人為之京謂左傳築京觀之京也詩經言京毛氏止以為丘之高者靈雨既零箋曰靈善也粲曰靈雨猶杜詩云好雨知時節以其發生故謂之好傳曰零落也命彼倌人倌音官傳曰倌人主駕者星言夙駕傳曰雨止星見夙早也粲曰言辭也說于桑田說音稅鄭如字釋文曰說舍也匪直也人錢氏曰直猶特也非特人也今曰孟子云非直為觀美也秉心塞淵箋曰塞充實也淵深也騋牝三千騋音來傳曰馬七尺曰騋朱氏曰記云問國君之富數馬以對春時好雨既降農桑之務將興文公於是命主駕之倌人見星而早駕說止於桑田之野以勞勸之是文公能務農重本以蕃育其人也非特人也文公操心塞實而淵深故能致國富彊至於騋馬與牝馬共有三千匹舉馬之蕃息則人之蕃息可知矣蘇氏曰富彊之業必深厚者為之非輕揚淺薄者之所能致也左傳言元年革車三十乘季年乃三百乘是實有之數三百乘計一千二百匹校人邦國六間馬四種計一千二百九十六匹則三百乘正合諸侯之數今云三千者革車不用牝馬今併牝馬數之故為三千春秋諸侯各務富彊亦不盡守舊制道馬高八尺田馬七尺駑馬六尺獨言騋者舉中言之定之方中三章章七句蝃蝀音帝凍爾雅作螮蝀音同止奔也衛文公能以道化其民淫奔之恥國人不齒也箋曰不與相長稚曰衛文公詩襄王時衛風汙染已甚文公轉移之速如此所謂繫一人之本也蝃蝀在東傳曰蝃蝀虹也虹音洪疏曰郭璞云俗名為美人虹雙出色鮮盛者為雄雄曰虹暗者為雌雌曰霓程子曰蝃蝀隂陽氣之交映日而見故朝西而暮東在東者隂方之氣就交於陽也曹氏曰淮南子云天二氣則成虹說者謂隂陽相千也蓋隂氣積而上升日光映之乃成虹朱氏曰日與雨交倐然成質乃隂陽之氣不當交而交者蓋天地之淫氣也在東者暮虹也莫之敢指女子有行曹氏曰行出適也解見邶泉水逺父母兄弟逺去聲蝃蝀者日與雨交隂陽之氣相亂喻淫奔也不當交而交故不能久暮見在東須臾散矣人莫敢指之者喻淫奔之人人所惡也女子出適自當與父母兄弟相逺何苦欲急而奔乎朝隮于西隮音韲傳曰隮升也箋曰朝有升氣於西方終其朝則雨氣應自然粲曰曹風南山朝隮𫝊云隮升雲也彼詩但當為升此當為升雲不言雲而但云隮猶言有淹萋萋亦不言雲也崇朝其雨傳曰崇終也從旦至食時為終朝女子有行逺兄弟父母一章既戒其淫奔二章則陳昏姻之正禮易以雨為隂陽和此言隂陽之氣和則雲氣朝升於西方則必有終朝之雨今俗猶以西方早雲為雨之候喻昏姻以禮則家道成也女子出適於人自當與兄弟父母相逺所貴得禮之正耳彼蝃蝀淫氣暫見而旋滅不能為雨猶違禮相從暫合而易離也乃如之人也懷昏姻也箋曰懷思也大無信也程子曰女子以不自失為信不知命也詩人言乃如是淫奔之人也思昏姻之事也不待父母之命媒妁之言是無信而不自守也命言所賦之分謂男女居室自有定分今不安其分而淫奔是不知命也蝃蝀三章章四句相鼠相去聲刺無禮也衛文公能正其羣臣而刺在位承先君之化無禮儀也曰衛文公詩襄王時文公君臣涉歷禍變懲創前朝相與洗濯磨勵氣象一新矣相鼠有皮傳曰相視也人而無儀人而無儀不死何為相鼠有齒人而無止箋曰止容止也人而無止不死何俟傳曰俟待也相鼠有體傳曰體肢體也人而無禮人而無禮胡不遄死傳曰遄速也視鼠蟲之賤但有皮齒體而已人異於鼠豈可徒有形體而無禮儀容止乎謂之人而乃無禮儀容止則亦鼠之類也其不死亦何為乎不死又何待乎何不速死乎皆惡之之辭也凡獸皆有皮齒體獨言鼠者舉卑汚可惡之物以惡人之無禮也舊說鼠尚有皮人而無儀則鼠之不若以人之儀喻鼠之皮非也說詩全在點掇點平聲此由誤加尚字耳尚字當作只字言鼠則只有皮人則不可以無儀人而無儀則何異於鼠如此語意方瑩點掇人而二字分曉人亦天地一物耳饑食渴飲無休時若非道義充其腹何異鳥獸安鬚眉即此意也相鼠三章章四句干旄美好善也好去聲衛文公臣子多好善賢者樂告以善道也樂音洛曰衛文公詩襄王時臣子好善文公之化也孑孑干旄朱氏曰孑孑特出之貌疏曰干首有旄有羽其下有旒縿旄者牛尾也以旄牛尾為之羽夏翟之羽也徐州夏翟之羽有虞氏以為綏後世或無故染鳥羽而用之謂之夏采九旗皆注旄於干首縿音衫綏音妥在浚之郊浚音峻傳曰浚衛邑素絲紕之紕鄭音皮毛符至反箋曰素絲以為縷縫紕旌旗之旒縿良馬四之今曰四之見之者多也彼姝者子姝音樞東方之日箋曰姝美也朱氏曰子指所見之賢者何以畀之有賢者來自他國至衛國浚邑之郊文公臣子之在浚者聞其賢而爭先覩之有建孑孑然干首之旄出郊見之者以素絲為縷縫紕旌旗之縿乘良馬而來已四輩矣見好善者多也詩人言彼姝美之賢者將何以畀豫之乎言必有以效其忠益矣賢者來自他國若季札聘鄭子産如晉之類季札告子産以謹禮子産告叔向以實沈臺駘之事皆聞所未聞是以善道告之也若謂衛有賢者隱居浚郊文公不能用而臣子徒見之則文公愧矣曷足美乎箋以四之五之六之為見之數則止是一人往見之不見臣子多好善之意孑孑干旟傳曰鳥隼曰旟出車疏曰春官司常文也解頥新語曰干旄干旟干旌蓋分而言之以協音韻其實皆旟也鳥隼為旟謂畫鳥隼以為飾以其注旄於干首謂之干旄以其柝夏翟之羽以為緌謂之干旌在浚之都傳曰下邑曰都朱氏曰都居民所聚也素絲組之組音祖箋曰以素絲縷縫組於旌旗以為之飾疏曰釋天說龍旗云飾以組九旗皆以組為飾郭璞云用綦組飾旒之邊也良馬五之彼姝者子何以豫之豫音與賢者自郊至都則近城矣又有就都見之乘良馬而來者五輩矣孑孑干旌𫝊曰析羽為旌疏曰既設旒縿有旃旟之稱未設旒縿空有析羽謂之旌在浚之城𫝊曰城都城也素絲祝之箋曰祝當作屬屬著也著直略反良馬六之彼姝者子何以告之告音谷粲曰以下告上人告神者皆音谷然協韻者不拘易再三瀆瀆則不告是也賢者自都至城又有就城見之乘良馬而來者六輩矣五之六之者言來見者愈衆也今考大司馬百官載旟注云卿大夫也彼文謂仲秋教治兵非平常所建鄭氏引司常州里建旟謂州長之屬孔氏申其義謂州長黨正及酇長里宰鄰長同建旟酇音纂然司常之文亦謂大閲及祭祀㑹同賓客所建皆國之大禮故建之若臣子見賢而載旟禮無明文豈指乘車之儀以言其人之貴如今人以旄麾幡蓋稱郡守歟干旄三章章六句載馳許穆夫人作也譜疏曰載馳是許穆夫人所親作得入鄘風者蓋以於時國在鄘地故使其詩屬鄘也戴公東徙渡河野處漕邑漕地在鄘閔其宗國顛覆自傷不能救也衛懿公為狄人所滅譜疏曰懿公赤惠公朔公子箋曰滅者懿公死也君死於位曰滅國人分散露於漕邑漕音曹朱氏曰未有宫室而露居也箋曰謂戴公也許穆夫人閔衛之亡箋曰戴公申與許穆夫人俱公子頑蒸於宣姜所生也傷許之小力不能救思歸唁其兄又義不得故賦是詩也曰衛戴公詩惠王時味詩之意夫人蓋欲赴訴於方伯以圖救衛而託歸唁為辭耳竇氏女撫膺太息曰恨我不為男子救舅氏之患與夫人之意正同後序言自傷不能救得之矣又以為真欲歸唁則非也戴方露處漕邑豈女子歸唁之時乎載馳載驅山有樞疏曰走馬謂之馳䇿馬謂之驅馳驅但是乘車之事歸唁衛侯傳曰弔失國曰唁疏曰此據失國言之若對弔死曰弔則弔生曰唁何人斯云不入唁我左傳云齊人獲臧堅齊侯使夙沙衛唁之驅馬悠悠傳曰悠悠逺貌言至于漕傳曰漕衛東邑曰漕邑鄘地也在河南有考見邶擊鼓大夫跋涉跋蒲末反傳曰草行曰跋水行曰涉我心則憂衛有狄難越在草莽許以姻親力不能救僅遣大夫唁之夫人以為此無益於事我欲馳驅其車自歸以唁衛侯驅馬悠悠然歷逺至于漕邑不敢憚勞今大夫之往徒勞跋涉無救衛國之亡則我心以為憂不若我代其行也此非真欲歸唁蓋託為之辭有含蓄不盡之意首章婉而未露也既不我嘉箋曰嘉美也粲曰嘉臧皆訓善善猶是也猶孟子王如善之也不能旋反視爾不臧箋曰臧善也我思不逺夫人託言欲歸唁許人非之故言爾既不以我之言為善遂使我不得旋反於衛矣然我亦視爾之言為不善而我之所思其說非逺而難行也言爾未必是我未必非始微露已有意見與許人别而猶未遽言之也既不我嘉不能旋濟朱氏曰濟渡也自許歸衛必有所渡之水視爾不臧我思不閟音祕傳曰閟閉也粲曰閉塞言不通也我之所思其說非閟而不通也丁寧上章之意欲言而未言也陟彼阿丘釋丘曰偏高阿丘言采其虻音萌傳曰虻貝母也粲曰本草云治心中氣不快多愁鬱者殊有功女子善懷箋曰善猶多也朱氏曰漢書云岸善崩亦各有行傳曰行道也粲曰猶孟子言孝子仁人之掩其親亦必有道矣許人尤之衆稚且狂我宗國隕越事迫情切而許人乃沮我之歸使我無所告語愁鬱而成疾欲陟阿丘采虻草以療之人見我之愁鬱則以為女子多思是其常耳不知女子雖多思亦各有道當論其所思之是否不得一槩以為不足問許人尤我之思歸豈衆人皆幼稚且狂惑乎何其不解人意也蓋至是始慨然責之而不得不言其情矣下章發之我行其野芃芃其麥芁音蓬控于大邦控空之去朱氏曰控持而告之也誰因誰極粲曰因如因徐辟而見孟子與無因而前之因傳曰極至也大夫君子無我有尤百爾所思不如我所之錢氏曰之適也末章乃言其情謂我之所思無他思所以救衛耳我欲代諸大夫之行者蓋大夫徒能唁之而已何益於事若我自歸則將行郊野經麥田不憚勞苦以控告于大國而求其能救衛者諸國之中誰可因藉誰肯來至多方圖之必有所濟我所思蓋在此非徒歸也爾大夫君子無以我為有尤過爾為我百方思所以處此者不如我之自往爾所思不及我所思之切也以許之小而責其救衛則為不通曉於事今欲求大國之援其說非迂逺難行也非閟塞不通也赴難乞師本非女子之事諷許人當為告急於方伯不當坐視其亡止遣大夫唁之而已至哀至切之情也其後齊桓卒救衛而存之然後信夫人所思為有理而許人真狂稚無謀矣載馳五章一章六句二章章四句一章六句一章八句詩緝卷五
