body:
  text: 詩緝卷三十二宋嚴粲撰清廟之什周頌譜曰周頌者周室成功致太平德洽之時其作在周公攝政成王即位之初疏曰雅不言周頌言周者以别商魯也周蓋孔子所加也先代之頌必是獨行為一代之法孔子論詩乃次魯商於下以示三代之法既有商魯須題周以别之故知孔子加周也頌序稱祀告及朝廟於廟之事亦多矣唯敬之小毖不言廟祀而承謀廟之下亦當於廟進戒廟中求助者蘇氏曰周頌皆有所施於禮樂蓋因禮而作頌非如風雅有徒作而不用者也周頌篇第之先後則不可究矣朱氏曰周頌三十一篇多周公所定周頌多不協韻未詳其說補傳曰周頌皆一章商周二頌皆用以告神明而魯頌乃用以為善禱後世文人獻頌特効魯耳非商周之舊也清廟祀文王也周公既成洛邑朱氏曰王在新邑烝祭歲文王騂牛一武王騂牛一實周公攝政之七年而此其升歌之辭也朝諸侯朝音潮李氏曰周公時相成王以朝諸侯而已周公非自居南面而受諸侯之朝也明堂位云周公踐天子之位朝諸侯于明堂非也率以祀文王焉疏曰祀文王之樂歌也祭宗廟之盛歌文王之德莫重于清廟故為周頌之首今考疏以周頌皆樂歌下皆同於穆清廟於音烏傳曰於歎辭也穆美也釋文曰清廟者杜預云肅然清静之廟也肅雝顯相去聲傳曰肅敬也雝和也相助也箋曰有光明著見之德者來助祭詩記曰士虞禮祝辭云哀子某哀顯相夙興夜處不寧然則自主人之外餘皆顯相也成王祭主也周公及助祭之諸侯皆顯相也濟濟多士濟齊之上濟濟解見文王詩記曰顯相多士廣言助祭之人凡執事者皆在也秉文之德今曰秉持謂不忘也對越在天曹氏曰對答也越揚也對答而𤼵揚之也駿奔走在廟駿音峻疏曰駿疾也詩記大傳亦云駿奔走疾奔走言勸事也不顯不承朱氏曰承謂見尊奉也無射於人斯射音亦傳曰射厭也朱氏曰斯語辭也嗚呼美哉此祀文王清静之廟也有肅肅其敬雝雝其和者顯相之人也稱助祀之人曰顯相者謂其有顯著之德美稱之也此濟濟然衆士皆秉持文王之德不忘於心也答揚於在天之靈謂如見文王洋洋在上也鬼神本無迹對答之則如與之接𤼵揚之則在隠若顯也疾奔走於在廟之事謂敏于趨事無敢後先也於是贊美文王之德豈不顯乎豈不奉承於人乎無厭射於人矣疏曰書大傳説清廟云周公升歌文王之功烈徳澤茍在廟中嘗見文王者愀然如復見文王焉詩記曰相維辟公天子穆穆言顯相之肅雝則成王穆穆然奉祭之氣象不言可見矣劉氏曰文王之德至矣不可得而形容所可述者特見于多士所秉而已清廟一章八句維天之命太平告文王也大音泰蘇氏曰天下太平以為文王之德之致也故以告之維天之命箋曰命猶道也程子曰天命即天道也以其用言之則曰命造化之謂也又曰言天命之自然者曰天道言天之賦與萬物者曰天命於穆不已於音烏於穆解見清廟疏曰易繫辭云日往則月來暑往則寒來象曰天行健是天道不已止之事也於乎不顯於乎音烏呼文王之德之純子思子曰純亦不已程子曰純則無二無雜不已則無間斷先後張子曰純則舉大本也假以溢我假蘇音嘏毛音暇溢音逸蘇氏曰假大也箋曰溢盈溢也歐陽氏曰如水溢而旁及也我其收之朱氏曰收受也今曰收謂不敢失之也駿惠我文王駿音峻箋曰駿大也惠順也曾孫篤之箋曰曽猶重也自孫之子而下事先祖皆稱曽孫傳曰篤厚也説疏曰用意専而隆厚也詩記曰説詩者非惟有鑿之害亦有衍説之害如此詩曽孫篤之毛氏謂能厚行之於文義未有害也然詩人之意本勉後人篤厚之而不忘所謂行者固亦在其中矣但曰曽孫篤之則意味深長衍一行字意味却短至王氏遂云篤力行而有所至説益詳而無復餘味矣凡諸説皆當以此例之天之賦予萬物謂之命即天理也於乎美哉是天之運行不已也造化之機或息則其賦物者窮矣於乎甚顯者是文王之德純一也純則無二無雜矣凡言聖人如天者以此擬彼天與聖人猶為二也此詩但以天命之不已與文德之純對立而並言之天之為文王邪文王之為天邪蓋有不容擬議者子思子𤼵明之曰天之所以為天也又曰文王之所以為文也其旨深矣文王之德假大而盈溢於我我當有以收之使不失墜惟在大順文王之德而已其者自期之辭收謂保其業惠謂體其德大惠則無斯須毫釐之違戾也我既以駿惠文王自勉繼自今為文王之子孫者當世世篤厚之勿忘也去聖浸逺典刑易墜非用意篤厚不能守也維天之命一章八句維清奏象舞也蘇氏曰象文王之樂文舞也象文舞也鄭氏以象舞為象用兵時刺伐之舞如此則為武舞矣且維清象舞之樂歌舞大武之樂歌大武為武舞故武頌言勝殷遏劉之事維清不言征伐則象舞决非武舞也文王之文德至矣作樂象德乃獨象其刺伐非其義矣今考鄭於禮記文王世子明堂位祭統升歌清廟下管象皆以管象為武王之舞謂周頌舞也孔申鄭義以文王武王之舞皆名為象維清象舞為文王下管象為武王其意蓋謂清廟與管象若皆為文王不應有上下之别故耳古樂歌者在上以人歌者皆曰升歌亦曰登歌匏竹在下以管奏者皆曰下管春官大師帥瞽登歌下管奏樂器益稷下管鼗鼓是也清廟以人歌之自宜升象以管奏之自宜下凡樂皆有堂上堂下之奏也曹氏曰季札觀樂見舞象箾南籥者杜預云文王樂也又見舞韶箾者杜預云舜樂也是象有箾韶亦有箾説者謂以竿擊人曰箾然則執箾以舞猶干舞也執籥以舞即籥舞也文王雖大業未究而本其功德之所起可得而形容也故作樂以象之謂之象舞祭統明堂位文王世子所謂下管象者象即象舞也鄭氏以象舞為專象刺伐然籥非刺伐之物也箾音朔季札觀樂事見左傳襄二十九年注以象箾之箾音朔韶箾音簫皆當音朔維清緝熙句朱氏曰清清明也王氏曰緝續也熙廣也文王之典傳曰典法也肇禋音兆因傳曰肇始也箋曰周禮以禋祀祀昊天上帝迄用有成迄欣之入傳曰迄至也惟周之禎音貞傳曰禎祥也文王之舞謂之象以王業之興其兆已見也此詩乃象舞之樂歌述所以名象之意言清緝熙者文王之典也清則純一而不雜緝則悠久而不已熙則廣大而無外三言備舉文王之聖德而以典言之者謂其德寓於法也禋者王者祀天之禮也文王有典則以貽後人王業雖未成而禋祀之禮已肇始於此遂至其後而有成焉是文王之典為周之禎祥也祥者吉之先見也維清一章五句烈文成王即政諸侯助祭也疏曰謂周公居攝七年致政成王成王乃祭于祖有諸侯助王之祭既祭因而戒之蘇氏曰成王有即位有即政則周公之未嘗攝位明矣烈文辟公補傳曰烈言其功文言其德諸侯有爵為公者舉其爵之尊以寵之疏曰辟公諸侯也今曰辟君也説命云樹后王君公后王王也君公諸侯也錫兹祉福祉音恥朱氏曰諸侯錫此祉福錢氏曰但佐文武定天下也惠我無疆子孫保之無封靡于爾邦王氏曰無封以専利無靡以傷財朱氏曰封專利以自封殖靡侈也維王其崇之補傳曰維天子之是尊念兹戎功傳曰戎大也繼序其皇之朱氏曰皇大也無競維人四方其訓之李氏抑詩解曰訓效也不顯維德百辟其刑之於乎前王不忘於乎音烏呼箋曰前王文王武王黄氏曰此成王感𤼵諸侯不盡之意成王即政之初周興未久也其助祭諸侯往往身佐文武以定天下者故先稱美之乃告戒之言汝有功有德之辟公錫我以此福矣謂其夾輔以興周祚也此豈徒目前淺近計哉蓋惠我周家以無疆之休使我子孫世世永保之矣然相與平定之者爾諸侯之力也其相與扶持之者尤有望於爾諸侯也爾於爾之國無封殖以專利無侈靡以傷財當維王室之是尊也念屏翰之大功其繼序之序者益思増益而皇大之世世相承無替前功也爾歸治其國在用賢修德而已莫彊乎維得賢人也能得人則四方皆訓傚之莫光顯者修德也能修德則百君皆刑法之矣嗚呼如此則豈唯予寵嘉之實前王所念而不釋也説者多以辟公為稱諸侯之祖父念兹戎功為勉之以念祖父之功今考本紀注徐廣云武王克殷二年而崩皇甫謐云武王定位元年歲在乙酉六年庚寅崩正如謐之言武王克殷纔六年又周公攝政七年共十餘年耳烈文作于成王即政之初孟津諸侯固多存者不應專戒其子孫也詩記曰於乎前王不忘如其自唐叔以下實寵嘉之王氏曰先王之戒諸侯也欲其兢兢則中國強矣欲其顯顯則中國尊矣欲其四方訓之百辟刑之則各以德善胥訓胥效也内則百僚師師外則諸侯胥效則能以天下為一家中國為一人矣而先儒以謂先王不欲諸侯名譽出境是乃力征經營天下惴惴恐天下軋己之私意何足以語先王也烈文一章十三句天作祀先王先公也箋曰先王謂太王以下天保箋曰先公謂后稷至諸盩音籌又音舟疏曰祀先王先公謂四時之祭祠禴嘗烝時祭所及唯親廟與太祖於成王之世為時祭當太王以下上及后稷一人而已言先公者唯斥后稷且經之所陳唯有先王之事而序并言先公者以詩人因於祭祀而作此歌近舉王迹所起其辭不及后稷序以祭時實祭后稷故其言及之昊天有成命經無地而序言地般經無海而序言海亦此類也天作高山傳曰作生也疏曰作者造立之言故為生也箋曰髙山謂岐山也大王荒之大音泰蘇氏曰荒治也李氏曰始荒而闢之今曰治荒為荒猶治亂為亂也今諺言開荒即始闢之意也彼作矣箋曰彼彼萬民也民皆築作宫室以為常居文王康之箋曰康安也彼徂矣箋曰徂往也民之往者曹氏曰往歸者衆岐有夷之行如字王徐並去聲程子曰夷平也曹氏曰昔者髙山之險阻今為坦途矣今曰夷即皇矣所謂串夷載路行猶行彼周行謂道路也子孫保之遷岐非得已而周乃以岐興詩人以為是非人之所能為故言此岐山天實為之也岐山本險阻荒僻之地大王始開荒而闢之彼民皆不憚遷徙之勞築作而居之矣文王從而安之彼民又皆徂往而歸之矣作謂舊民之樂遷如百堵皆作庶殷丕作之作也徂謂新民之歸往如其子焉往之往也歸往者日衆故岐山昔之險阻今為平夷之路矣大王文王之業子孫當保守而不墜也成功告神之頌多言子孫當保守之意蓋子孫能保守則可以慰祖宗之心也天作一章七句昊天有成命郊祀天地也李氏曰蘇黄門謂冬至祀天於圜丘夏至祀地於方澤據周禮以為説東坡云昊天有成命郊祀天地也此乃合祭天地之明文昊天有成命曹氏曰成則不可易二后受之傳曰二后文武也成王不敢康箋曰成此王功夙夜基命宥密傳曰基始也宥寛也密寧也箋曰寛仁所以止苛刻安静所以息暴亂於緝熙於音烏王氏曰緝續也熙廣也李氏曰緝熙當為成王單厥心單蘇音丹舊音亶蘇氏曰單盡也肆其靖之今曰書凡𤼵語肆字皆訓故箋曰靖安也天所以有不易之成命而文武得以受之者由其能成此王功不敢康寧夙夜憂勤以肇基天命在於行寛静之政而已又嗟歎而言為子孫者當緝續而熙廣之大盡其心庶㡬可以安靖之勿墜宥密之初意也頌者成功告神必言子孫勉力保守以慰神祗祖考之意維天之命曰曽孫篤之天作曰子孫保之我將曰于時保之此所謂緝熙亦成王自勉之辭舊説以緝熙為文武味詩之意嗟歎而更端言之所謂肆其靖之即于時保之之意其者期之之辭也非言文武矣昊天有成命一章七句我將祀文王於明堂也陳氏曰古者祭天於圜丘掃地而行事器用陶匏牲用犢其禮極簡聖人之意以為未足以報本故於季秋之月有大享之禮焉天即帝也郊而曰天所以尊之也故以后稷配焉后稷逺矣配稷于郊亦以尊稷也明堂而曰帝所以親之也故以文王配焉文王親也配文王于明堂亦以親文王也然則郊者古禮而明堂者周制也周公以義起之也我將我享箋曰將猶奉也傳曰享獻也維羊維牛疏曰禮稱郊用特牲祭法云燔柴于泰壇祭天用騂犢則明堂祭天亦當特牛矣而得有羊者其配之人自當用太牢也詩記曰郊特牲云帝牛不吉以為稷牛於是知明堂用牛夏官羊人曰釁積共其羊牲積柴祭天於是知祭帝用羊以父配帝則牲牢不得異食今考釁謂邦器及軍器成則釁之維天其右之箋曰右助也下同張子曰維天其右之不必饗之儀式刑文王之典箋曰儀則也式象也傳曰刑法也錢氏曰儀式刑猶書云嚴祗敬六德也今曰累言之者謂法之不已也日靖四方陳氏曰靖安也詩記曰於天維庶其饗之不敢加一辭焉於文王則言儀式其典日靖四方天不待贊法文王所以法天也卒章惟言畏天之威而不及文王者統於尊也畏天所以畏文王也天與文王一也伊嘏文王嘏音假箋曰受福曰嘏既右饗之疏曰右助而歆饗之李氏曰天若福文王則必饗吾之祭矣我其夙夜畏天之威于時保之我所將奉我所獻享者維羊維牛而已禮之常也天其右助我而饗此乎盖不敢必也天之所饗不在於物惟自託於文王庶㡬可以格天我今儀則式象刑法文王之典日日施行之以安四方惟天惠民惟文王之典足以安民天福文王則必右助而歆饗我祭矣其右之者不敢必之辭也既右之者自必之辭也然我尤當夙興夜寐畏天之威思所以保之其敢自恃乎明堂之禮天與文王在焉成王寫其中心之誠以對越而言之也典毛於維清傳云法也於此云常也鄭以為常道法者道之所寓其實一也我將一章十句時邁廵守告祭柴望也廵守音句狩疏曰武王既定天下廵行其守土諸侯至于方嶽之下作告至之祭柴祭昊天望祭山川安祀百神乃是王者盛事周公既致太平追念武王之業故述其事而為此歌焉宣十二年左傳云昔武王克商作頌曰載戢干戈明此篇武王事也國語稱周公之頌曰載戢干戈明此詩周公作也曹氏曰諸侯為天子守土其政之得失民之利病不得以周之故天子親自廵省焉廵狩必徧于四嶽每至其方嶽之下則燔柴升煙以告至若其山川之逺而不可至者則望而祭之書所謂至于岱宗柴望秩于山川是也朱氏曰國語云金奏肆夏樊遏渠天子以饗元侯也即春官鍾師九夏之三也吕叔玉云肆夏時邁也樊遏執競也渠思文也時邁其邦傳曰邁行也箋曰武王時出行其邦國謂廵守也昊天其子之詩記曰人之宗子主一家者也天之子主天下者也時邁其邦人神莫不受職則昊天其子可知矣朱氏曰天其子我乎哉蓋不敢必也今曰昊天其子之與維天其右之語意同有天下曰天子子之謂使之為王也實右序有周箋曰右助也序次序也曹氏曰序帝王之傳序也錢氏曰次序者謂以周繼夏商也薄言震之程子曰薄言𤼵語辭傳曰震動也莫不震疊傳曰疊懼也懷柔百神傳曰懷來也柔安也曹氏曰祭法云山林川谷丘陵能出雲雨見怪物皆曰神有天下者祭百神諸侯在其地則祭之亡其地則不祭溥天之下莫非王上故廵守所至者神皆祭焉及河喬嶽傳曰喬髙也髙嶽岱宗也疏曰廵守之禮必始於東方故以岱宗言之其實兼四嶽也允王維后箋曰允信也陳氏曰信乎使我為王也明昭有周式序在位箋曰式用也李氏曰序諸侯之在位者載戢干戈戢簪之入釋文曰戢止也歛也載櫜弓矢櫜音羔傳曰櫜韜也韜音滔疏曰櫜者弓衣一名韜故内弓於衣謂之韜弓我求懿德箋曰懿美也肆于時夏箋曰肆陳也李氏曰時夏中國也允王保之廵守王者之禮武王初定天下時出廵行其邦國天其子之乎設為問辭也應之曰天實右序有周矣武王之廵守也於諸國薄警動之諸侯莫不震懼又所至方嶽之下懷柔羣神望祀河嶽初得天下而人神受職此非人之所能為也天實右序之也故天下莫不信武王之宜君天下也又應之曰天實明昭有周矣武王之廵守也以慶罰黜陟之典序諸侯之在位者又戢歛其干戈櫜韜其弓矢惟求懿美之德陳之於中國既定天下而治道彰著此亦非人之所能為也天實明昭之也故天下莫不信武王之能保天下也既右序之又明昭之是天之子之也右序有周與明昭有周語意一同明昭不言實承上省文也言天之右序有周而結之以允王維后謂膺天命而無愧也言天之明昭有周而結之以允王保之謂保天命於無窮也結上文右序及明昭之意皆以允言之時邁一章十五句執競祀武王也執競武王箋曰執持也競彊也李氏曰自強之心執而勿失無競維烈傳曰無競競也烈業也李氏曰觀武王伐紂而得天下拱揖指揮雖彊暴之國莫不趨使一戎衣而天下大定則其功烈為莫強矣不顯成康錢氏曰成王業安天下李氏曰歐陽氏以成康為成王康王有窒礙不通者上帝是皇傳曰皇美也自彼成康奄有四方傳曰奄同也釋文曰盡也斤斤其明斤音靳傳曰斤斤明察也李氏曰言照臨四方無所不察也鐘鼓喤喤音横徐音皇傳曰喤喤和也磬筦將將筦音管將音鏘傳曰將將集也錢氏曰聲之相應也降福穰穰如羊反傳曰穰穰衆也降福簡簡傳曰簡簡大也威儀反反如字賓之初筵傳曰反反重慎也既醉既飽錢氏曰主人受嘏既飲福醉飽矣福禄來反傳曰反復也能執持自強不息之志者武王也故功烈之盛天下莫強焉豈不顯乎其成王業而安天下也上帝用是皇美之自武王成王業安天下奄覆四方而有之其斤斤然明察無所不至言照臨四方也今祀武王之時鐘鼓喤喤然和磬筦將將然集而神之降福穰穰然衆簡簡然大言樂作而神福之也祭祀之威儀反反然重謹之祭終飲福醉飽福禄反復未艾言禮行而神福之也蘇氏曰凡今所以能備其禮樂脩其祭祀以受多福者皆武王之德所致也箋以鐘鼓磬筦為武王祭廟作樂今不從陳氏以為祀武王其説為長執競一章十四句思文后稷配天也疏曰國語云周文公之為頌曰思文后稷克配彼天是此篇周公所自作與時邁同也李氏曰非其餘詩乃他人所作也盖以國語所稱者惟此二詩知其周公所作其餘不可得而知之也古之祭者必以其祖配之公羊宣公三年云郊則曷為必祭稷王者必以其祖配王者則曷為必以其祖配自内出者無匹不行自外至者無主不止則后稷所以配天盖所以尊祖也黄氏曰生民為述事之辭思文為告神之辭此雅頌之所以異歟思文后稷朱氏曰思語辭也文文德也思解見思齊克配彼天曹氏曰天地能生之而不能養之茍不得其養則亦弗克遂其生矣惟后稷能養人故其功足以配天矣立我烝民疏曰存立我天下衆民之命莫匪爾極傳曰極中也曹氏曰衣食足而後知榮辱倉廩實而後知禮節民心罔中惟爾之中而已貽我來牟箋曰貽遺也遺音位釋文曰牟字書作麰或作􅓿疏曰趙岐云麰大麥也廣雅云麰小麥帝命率育蘇氏曰率育徧養也無此疆爾界陳常于時夏朱氏曰陳其君臣父子之常道陳氏曰時夏中國也李氏曰后稷教民稼穡但養而已未及教之也如舜命契敬敷五教在寛則教之者乃契之事也思文之詩推美后稷乃以陳常于時夏言者盖無常産而有常心者惟士為能若民則無常産因無常心放僻邪侈無不為已后稷人臣而周人推以配天疑于追崇之過此詩𤼵明之言德莫大於文后稷實有文德能配于天非虚尊之也蓋民心莫不有是中而阻飢則失其常心自后稷播時百穀存立衆民之命而後各復其受中之性是民之中皆是后稷之中也后稷遺我民以來牟二麥之種此乃天命后稷徧養斯民無此疆爾界之别遂使人倫常道得陳于中國也后稷播百穀獨舉來牟者以其先熟濟民之食尤切也天能予民以中后稷能全民之中天以徧覆為德后稷則達天之德推后稷以配天信無歉矣中者民心所自有特因后稷有以養之而勿䘮耳非后稷以己之中予之而曰莫匪爾極何也后稷之心與斯民之心同此一中非二物也斯民既全其中則斯民與后稷同此心亦同此理更無差别民之中即后稷之中故曰莫匪爾極康衢所詠爾極洪範所謂汝極天保所謂爾德君牙所謂惟爾之中其意一也思文一章八句詩緝卷三十二
