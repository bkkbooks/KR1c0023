  text: 欽定四庫人王書
  hash: sha256:0839fe36ee305b5887a87be403044f61b16886f1c80df90ed23d4adcce3b46db
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1c0023_WYG_026-1a, image: WYG0075/WYG0075-0361a.png}
body:
  text: 詩緝卷二十六宋嚴粲撰思齊音齎文王所以為聖也此詩五章皆言文王之所以為聖也孔氏以為文王所以得聖由其賢母所生止是首章之意耳思齊大任音泰壬朱氏曰思語辭今曰舊作思念之思然思齊思媚思文王與思皇同雅頌多周公所作措辭同也傳曰齊荘也文王之母思媚周姜傳曰媚愛也周姜大姜也朱氏曰大王之妃京室之婦傳曰京室王室也疏曰王季未為天子而言京者以其追號為王故以京師言之京有考見文王大姒嗣徽音傳曰大姒文王之妃也箋曰徽美也歐陽氏曰美聲也則百斯男傳曰大姒卜子衆妾則冝百子也朱氏曰百男舉成數而言其多也春秋傳曰管蔡郕霍魯衛毛聃郜雍曹滕畢原豐郇文之昭也并伯邑考武王為十八人然此特其見於書傳者耳亦可以見其多也疏曰定六年左傳大姒之子唯周公康叔為相睦也大姒為周公康叔之母是文王之妃也定四年左傳祝鮀曰武王之母弟八人是通武王與伯邑考為十子也其名則左傳文云周公為太宰康叔為司㓂䏥季為司宰通武王伯邑考為五人史記管蔡世家云武王同母兄弟十人母曰大姒文王正妃也其長子曰伯邑考次曰武王發次曰管叔鮮次曰周公旦次曰蔡叔度次曰曹収振鐸次曰郕叔武次曰霍叔處次曰康叔封次曰聃叔季載其次不必如此其十子之名當然也皇甫謐云文王取大姒生伯邑考武王發次管叔鮮次蔡叔度次郕叔武次霍叔處次周公旦次曹叔振鐸次康叔封次聃叔季載其名與史記皆同其次則異不知謐何所據而别於馬遷也左傳富辰之言曹在衛聃之下不以長幼為次則其弟無明文以正之鮀音駞聃音貪他甘反謐音宻此詩餘章皆美文王之聖首章専美大任為文王張本也此齊荘之大任乃文王之母謂文王生於大任而大任有敬徳其氣禀有自来矣大任上能致孝於姑媚愛太姜為周京之婦謂盡婦道也下能示法於婦使大姒繼其美聲不妬忌而子孫衆多謂由大任之賢故大姒視傚之而不妬忌也言大姒嗣大任之徽音主大任言之耳惠于宗公箋曰恵順也傳曰宗公宗神也䟽曰宗公是宗廟先公書序云班宗彛中庸六陳其宗器皆謂宗廟為宗張氏曰未追王故稱公神㒺時怨箋曰時是也神㒺時恫音通傳曰恫痛也刑于寡妻傳曰刑法也寡妻適妻也適音的疏曰適妻唯一故言寡也蘇氏曰寡妻猶言寡小君也至于兄弟以御于家邦御鄭如字毛音迓箋曰御治也陳氏曰御取其調適也今曰書御衆以寛南軒孟子解云御臨也朱氏曰家齊而後國治次章言文王以昭事神明之徳推之齊家治國也文王順守宗廟先公而鬼神歆之無有怨恚而不滿者無有痛傷而降禍者隱㣲之間一毫無愧故能施儀法於適妻推而至於兄弟言族親亦化之也寡妻兄弟即是家推之以治于家邦言由家以及國同此一理之推也孟子所謂言舉斯心加諸彼而已説者見詩有大姒及寡妻之語多以為文王内有賢妃之助以成其徳文王内有賢助固也此詩所言文王之徳皆聖人極致之事豈必由内助而後聖哉刑于寡妻美文王能儀刑之非美寡妻也闗雎美后妃之徳所以見文王之徳亦此意也詩記曰毫髮不愧於隠㣲然後近者孚故神㒺時怨神㒺時恫始可以刑于寡妻雝雝在宫雝音邕傳曰雝雝和也肅肅在廟傳曰肅肅敬也不顯亦臨朱氏曰不顯幽隱之處無射亦保射音亦傳曰無射無厭也今曰如孔子云學不厭如董仲舒云復而不厭之謂道言安行之久也歐陽氏曰保守也三章言純亦不已也文王之誠一也平居在宫中則見其雝雝然和有事在宗廟則見其肅肅然敬隨所寓而形見也不顯之處人所不見而亦若有所臨洋洋乎如在其上也無厭之時踐履已熟而亦自保守悠久無疆也肆戎疾不殄肆解見緜傳曰戎大也疾害也殄絶也詩記曰戎疾大患難也羑里之囚是也昆夷玁狁之難則其餘也烈假不瑕假毛如字鄭作厲歐陽氏曰烈光也假大也陳氏曰瑕玷也不聞亦式歐陽氏曰式法也不諫亦入四章言從容中道也文王有聖徳故遇大患難而不能殄絶其徳處光大而不見其瑕玷逆順一致無入不自得也事之無所前聞者舉必中法又不待教諫而自入於善不勉而中不思而得也傳以為性與天合是也肆成人有徳朱氏曰冠以上為成人小子有造朱氏曰小子童子也傳曰造為也今曰王制云順先王詩書禮樂以造士謂造成之也古之人無斁音亦李氏曰古之聖人指文王也傳曰斁厭也譽髦斯士釋文曰髦俊也五章言至誠為能化也文王之時長成之人則皆有成徳幼稚之子則皆有所造為以習其業所以然者由古之人文王其徳純亦不已無有厭斁故能譽髦此士謂能作成人材使人有名譽而成俊乂之美也詩記曰聖人流澤萬世者莫大於作人所以續天地生生之大徳也故此詩以是終焉文王之無斁孔子之誨人不倦其心一也典謨作於虞夏其稱堯舜禹臯陶已曰若稽古則此詩追述文王以為古之人復何疑哉思齊五章二章章六句三章章四句從故言也皇矣美周也天監代殷莫若周周世世脩徳莫若文王疏曰湯以孤聖特興禹則父無令問文王之徳不劣禹湯而以承藉父祖始當天意者欲見尊祖之心也皇矣上帝傳曰皇大也臨下有赫程子曰赫威明也監觀四方求民之莫傳曰莫定也維此二國傳曰二國夏殷也其政不獲維彼四國傳曰四國四方也爰究爰度音鐸程子曰究尋究也度謀度也上帝耆之耆音其箋曰耆老也歐陽氏曰遲久也言天意遲久之謹其所擇今曰今稱師老亦久之意憎其式廓苦霍反傳曰式用廓大也乃眷西顧此維與宅傳曰宅居也朱氏曰此謂岐周之地也天以岐周與大王為居宅也首章原天初眷大王之意也大哉上天其照臨於下赫然甚威明也其監視觀察於四方維求民之所定耳本非有私於周也維此夏商二國皆失道而不得其政天既絶之乃於彼四方之國謀究之計度之欲求民主久而未得其人上天遲久之徘徊詳審憎其用大而為虐者乃眷然廻首西顧於周而以此岐周之地與大王居之也以下章言作之屛之知云此者指岐周也眷本又作睠大東云睠言顧之小明云睠睠懐顧傳云睠反顧也反顧者廻首以顧之大東刺亂而思周道小明悔仕而思共人皆以廻顧言之此言天廻其首以西視背商而向周也作之屛之屛音丙疏曰作攻作之也朱氏曰抜起也釋文曰屛除也其菑其翳菑音恣翳音意傳曰立死曰菑自斃曰翳疏曰立死之木妨他木生長為木之害故曰菑也生木自倒枝葉覆地為陰翳朱氏曰或云小木蒙宻蔽翳者也脩之平之疏曰殺木之處有其坑坎須脩理平治之其灌其栵灌音貫栵音例又音列傳曰灌叢生也程子曰行生曰栵今曰釋水有栵栭郭璞云栭樹似檞樕而庳小子如細栗今江東呼為栭栗今不從栭音而檞樕音斛速庳音婢短也啟之辟之辟音闢疏曰啟柘之開闢之謂開柘使廣其檉其椐檉音稱椐音祛韻又音居傳曰檉河栁也椐櫃也櫃音匱疏曰某氏云檉河傍赤莖小楊也孫炎云櫃腫節可以作杖陸璣曰檉生水傍皮正赤枝葉似椐節中腫以扶老即今靈夀是也今人以為馬鞭及杖攘之剔之攘音攘剔音惕程子曰攘剔謂穿剔去其繁冗使成長也其檿其柘檿音掩柘音蔗傳曰檿山桑也疏曰檿桑柘屬材中為弓考工記曰弓人取幹柘為上檿桑次之今曰禹貢青州厥篚檿絲注云檿桑蠶絲中琴瑟弦帝遷明徳串夷載路串音慣傳曰串習也程子曰夷平也錢氏曰載語助也今曰串夷載路即周頌所謂岐有夷之行謂民歸之者衆串習其平夷而成大路也孟子用之而成路朱氏解云路大路也箋以串夷即混夷今不從天立厥配受命既固次章述大王遷岐也岐地險阻尤多林木民歸之者衆乃競刋除以立室家以治田畆曰其者皆指其地而言之作拔之屛除之者是其菑木與翳木之地也脩理之平治之者是其灌木與栵木之地也謂去其木而脩治其地之坑坎也啟拓之開闢之者是其檉栁與椐櫃之地也謂去其木而開廣其地也又相與整葺其桑事攘除剪剔以去其繁冗者是其檿桑與柘木之地也作屛脩平啟辟則皆除去其木攘剔則成長其木也桑柘之性以芟剔而後茂非除之也大王之遷岐非人之所能為也葢天遷其明徳於此故民歸往之岐周本山林險阻之地自作屛脩平啟辟之後乃始平夷民之歸者串習其平夷遂成大路猶孟子所謂山徑之蹊用之而成路也天非徒遷之也王者配天天将立之以為配使周家王天下其受命堅固不易也葢曰大王之時天命已定周之當王也久矣鄭以此章為文王諸家多以為大王此言芟除草木是初建國當是大王遷岐之始所謂天作高山大王荒之也岐山在右扶風美陽縣西京賦所謂隔閡華戎岐梁汧雍閡音礙汧音牽見秦地之險阻故多林木須刋除之帝省其山省星之上歐陽氏曰省視也柞棫斯拔音斾解見緜松柏斯兊王氏曰兊恱澤外見之謂帝作邦作對箋曰作邦謂興周國也作對謂為生明君也疏曰作邦謂使之為天子之邦傳曰對配也丘氏曰天以聖君為已配謂文王也自大伯王季大音泰維此王季因心則友傳曰善兄弟曰友李氏曰孝悌之道豈可以偽為哉因其心而然耳生而無不知愛其親長而無不知敬其兄本於良知良能豈非因心而然哉王氏曰以大伯避季則季疑於弗友故特先言其友也則友其兄朱氏曰兄謂大伯則篤其慶箋曰篤厚也載錫之光程子曰載辭也錫予也朱氏曰猶曰彰其知人之明不為徒讓耳受禄無喪去聲今曰喪失也奄有四方傳曰奄大也釋文曰獲也今曰書奄有四海註云同也三章述大伯王季相遜之事為文王張本也為室家田畆之地則刋除其木至山林之地則貴於茂盛天省視岐山之地柞棫拔而遂茂松柏兊而恱澤則氣象䓤鬱而都邑成矣天作邦於此謂興周使為王國也作對於此謂生文王以配天也孟子云文王生於岐周是也此作邦作對由於大王王季之時葢大伯遜於王季而後文王起也因説王季之徳甚大性友愛因其心之自然非彊為也則友愛於大伯既受其遜益脩其徳以篤厚周家之慶予大伯以讓國之光王季受天禄而不失其後人遂奄有四方則大伯之讓為有光矣維此王季帝度其心度音鐸今曰他人有心予忖度之之度貊其徳音貊音陌傳曰貊静也曹氏曰徳音名譽也今考貊陌從伯栢拍迫從白徳音解見假樂其徳克明克明克類今曰類倫類也猶記言知類通逹易言觸類而長之謂通於一而萬事畢也克長克君長上聲王此大邦王如字徐去聲箋曰王君也王季稱王者追王也克順克比音備丘氏曰比親也今曰如比卦之比下順從也比于文王比音同上舊如字今曰比及也比及三年之比其徳靡悔釋文曰悔恨也今曰悔自恨也如行寡悔也悔疏謂無為人所悔恨非也既受帝祉音耻箋曰祉福也施于孫子施音異箋曰施延也四章述王季之徳以及文王也天初省視岐周之山眷命已定今又監度王季之心謂王季此心之㣲與天通也天監知王季之心能以静養其令名非有心於干譽者王季雖無心於干譽然其徳明而類長而君順而比自不可掩明類是一意長君是一意順比是一意類者明之充君者長之推比者順之積也克明謂知此理克類謂觸類而通一理混融徹上徹下也言明又言類猶既醉言昭明有融融者明之盛即所謂克類也克長謂能為人之長克君謂能為人之君君又尊於長矣學記言能為長然後能為君是也以之君臨大邦則克順而能和其民克比而能親其民順言不擾比則驩然相愛矣比及文王其徳無有可悔人有過則悔恨靡悔則無過從容中道無毫髮之慊也言王季之徳傳於文王而益盛也故能受天之福也延于子孫李氏曰左傳昭二十八年成鱄曰心能制義曰度徳正應和曰莫照臨四方曰明勤施無私曰類教誨不倦曰長賞慶刑威曰君慈和徧服曰順擇善而從之曰比經緯天地曰文皆斷章取義鄭氏因以説經非也鱄音専莫音陌施始豉反帝謂文王今曰天不言以意謂之也無然畔援去聲又平聲傅曰無然無是也長樂劉氏曰畔安於疆畔而違乎中者也程子曰援攀援黨比也無然歆羡歆許金反羡涎之去傅曰歆貪也疏曰鬼神食氣謂之歆程子曰歆欲之動也羡愛羡也誕先登于岸誕音但朱氏生民解曰誕發語辭王氏曰經以涉川譬濟雖宻人不恭疏曰定四年左傅云宻須之鼓是也詩記曰漢地理志安定郡伐宻注云詩宻人國即今寜州也敢距大邦傅曰距逆也侵阮徂共音恭箋曰阮國也傳曰宻須氏侵阮遂往侵共張氏曰共阮國之地名阮共皆在今涇州今有共池即共也王赫斯怒傅曰赫怒意爰整其旅傅曰旅師也以按徂旅按音案傅曰按止也朱氏曰上旅周師也下旅宻人也以篤于周祜音戸箋曰祜福也以對于天下箋曰對答也五章六章皆述伐宻之事此章首言文王之心至公無私在於救民為下文伐宻張本也宻人侵阮於周若無預文王乃奮怒而伐宻疑於黨阮有所為而為之者故詩人設為帝謂之辭以發明文王之心畔者徧也援者黨也歆者得而貪之羡者不得而慕之四者皆私心也帝謂文王無是四者所急先者惟拯民之溺耳登岸謂出於危難之地也必託之帝謂者言文王此心天實知之也宻人敢為不恭逆距大國謂不懼方伯之討也以疆陵弱興兵侵阮遂往侵阮之共邑文王以阮民受害赫然而怒整齊其師旅以按止宻人往共之師葢宻自阮以侵共其勢漸熾文王自阮以侵宻宻還自救是按止其往共之師也凡此乃救亂安民以厚我周家之福以答天下望周之心也周能安民則福祚益隆商政不綱天下之望在周矣所救者一阮而為亂者懼小國皆安故天下之心以慰也説者多謂畔援歆羡是人欲岸是天理其説美矣與下文伐宻不相協尋繹經意止為伐宻張本與七章言順帝之則為伐崇張本文意正同且言對答天下之望則登岸為濟難無疑也以濟川喻濟難古人常語曰民墜塗炭曰若涉淵水曰若游大川曰拯民於水火之中是也依其在京程子曰依憑也箋曰京周地名京有考見文王吕氏曰用兵必有根本之地文王駐兵於國都以為三軍之鎮侵自阮疆張氏曰却自阮疆而去伐宻也今曰侵自阮疆謂自阮疆而侵宻猶春秋書公至自晉謂自晉而至魯也陟我高岡箋曰陟登也無矢我陵傳曰矢陳也釋地曰大陸曰阜大阜曰陵李巡曰土地獨高大為阜阜最大為陵我陵我阿釋地曰大陵曰阿無飲我泉今曰泉水有源也我泉我池王氏曰池水所聚也度其鮮原度音鐸鮮上聲又音仙箋曰度謀也鮮原善原也釋山曰小山别大山鮮孫炎曰别不相連也居岐之陽在渭之将傳曰将側也箋曰後竟徙都於豐疏曰大王初遷已在岐山此亦在岐山之陽是去舊都不逺也周書稱文王在程作程寤程典皇甫謐云文王徙宅於程葢謂此也箋嫌此即是豐故云後竟徙都於豐知此非豐者以此居岐之陽豐則岐之東南三百里耳吕氏曰前漢地理志曰扶風安陵縣闞駰以為本周之程邑也朱氏曰今在京兆府咸陽縣萬邦之方傳曰方則也下民之王文王以西伯討宻之罪先駐兵國都依憑此在京之師以為聲勢然後出兵自阮疆以侵宻宻在寜州阮在涇州涇寜接境也下所言高岡陵阿泉池皆師行所經阮疆之地軍行右背山陵必依山而止故升其高岡我者對爾之辭文王為阮伐宻故問罪於宻稱阮疆之地皆以為我言我所陟者是我之高岡爾宻人無得陳兵於我陵此我之陵我之阿也無得飲我之泉此我之泉我之池也罪其前之侵軼而戒其後之無復然也宻人恃疆以侵弱文王興問罪之師視阮之地如己之地可謂公天下以為心矣豈有一毫畔援歆羡之私邪阮不幸而與宻為隣幸而遇文王為伯也文王用心廣大威徳暢洽人之歸者益衆非舊邑所能容於是就周境之内謀度鮮善之平原而徙都之乃在岐山之南渭水之側謂程邑也此萬邦之所法則下民之所歸往也文王雖未為君師天下己心歸之矣伐崇有訊馘伐肆之事而伐宻止述問罪之辭是師次其境而宻人即服不待戰也舊説謂所侵宻地即為我之陵泉則是貪其土地矣或又謂戒軍以無擾師行而布陣飲泉遽為擾乎帝謂文王予懐明徳朱氏曰懐眷念也不大聲以色李氏曰未嘗大聲音於顔色之間也不長夏以革長上聲箋曰夏諸夏也傳曰革更也李氏曰未嘗長諸夏以變革之道也不識不知順帝之則帝謂文王詢爾仇方箋曰詢謀也怨耦曰仇丘氏曰仇方即崇也朱氏曰讎方仇國也同爾兄弟朱氏曰兄弟與國也以爾鉤援鉤音溝又去聲援音袁傳曰鉤梯也所以鉤引上城者疏曰鉤援一物以梯倚城相鉤引而上援即引也與爾臨衝傳曰臨臨車也衝衝車也疏曰臨者在上臨下之名衝者在傍衝突之稱兵書有臨車衝車之法以伐崇墉音容箋曰崇侯虎倡紂為無道朱氏曰按史記崇侯虎譛西伯於紂紂囚西伯於羑里紂赦西伯賜之弓矢鈇鉞得専征伐西伯歸三年伐崇侯虎而作豐邑崇國名在今京兆府鄠縣鄠音户傳曰墉城也七章八章述伐崇之事此章首言文王之心純乎天理非有私喜怒為下文伐崇張本也崇侯虎譛文王於紂遂有羑里之囚是崇者文王之所仇也崇侯譛文王而文王伐之疑於報私仇者然虎倡紂為不道乃天人所共怒文王奉天討罪何容心哉故此章亦設為帝謂之辭以發明文王之心帝謂文王予眷懐爾之明徳不以容色而大其聲謂飾貌以廣其名也不以變革而長諸夏謂變常以廣其土也文王無心於大其聲況以色而大聲乎無心於長諸夏况以革而長夏乎不識不知不作聰明也此明徳之實所謂文王有四不孔子有四毋也天理之自然謂之則即有物有則乃見天則謂理之不可踰也文王無一毫人偽之私油然大順安行乎天理之自然所謂順者由仁義行非行仁義也文王之伐崇也若天實親命之使之謀爾仇讎之方同爾兄弟之國以爾上城之梯及臨衝之車伐此崇人之城由此心純乎天理故喜怒皆與天合所仇者非私怨所同者非茍合也臨衝閑閑今曰閑閑者未用也崇墉言言傳曰言言高大也執訊連連訊音信箋曰執所生得者而言問之曹氏曰連連連續也攸馘安安馘音國傳曰馘獲也不服者殺而獻其左耳曰馘疏曰玉藻云聴響任左故不服者殺而獻其左耳罪其不聴命服罪故取其耳以計功也程子曰安安不輕暴也是類是禡音罵傳曰於内曰類於野曰禡祭也疏曰王制云天子禡於所征之地春官肆師注云類禮依郊祀而為之禡祭造軍法者其神葢蚩尤或曰黄帝是致是附王氏曰致致其至也附使之内附也四方以無侮臨衝茀茀音弗傳曰茀茀强盛也崇墉仡仡音屹韓詩云仡仡摇也䟽曰将壊之貌是伐是肆錢氏曰伐刺擊也箋曰肆犯突也疏曰文十二年左傳云若使輕者肆焉其可輕去聲是絶是忽傳云忽滅也四方以無拂音拂朱氏曰拂戾也文王之問罪於崇其始未忍攻城也故臨衝之車閑閑而不用崇墉言言然高大恃險而不服文王始薄伐之而未盡用其威埶其可問訊者連連而不絶所殺獲而截其左耳者安安而不暴出兵之初既類祭上帝及至所征之地又為禡祭暴白其罪告之神明致以招其来附以納其降從容整暇如此四方聞之已不敢侮矣然而人之頑猶未服也於是臨衝茀茀然而彊盛用力以攻之崇墉仡仡然将壊而危矣伐以擊刺之肆以犯突之絶之使救援不通忽之則滅其國克一崇而四方無敢拂戾以伐當其罪也疏曰僖十九年左傳云文王聞崇亂而伐之因壘而降則似兵合不戰此云壊城執訊者凡所褒美多過其實此言訊馘必當戰矣葢知戰不敵然後乃降彼左傳子魚欲勸宋公脩徳故隠其戰事而言其降耳朱氏曰始攻之緩戰之徐也非力不足也非示之弱也将以致附而全之也及其終不下而肆之也則天誅之可以留而罪人不可以不得故也皇矣八章章十二句靈臺箋曰天子有靈臺者所以觀祲象察氣之妖祥也祲音浸疏曰此靈臺在豐邑之都所處在國之西郊大雅靈臺一篇之詩有靈臺有靈囿有靈沼有辟廱皆同處在郊矣李氏曰孟子曰謂其臺曰靈臺非文王自名之也民始附也文王受命而民樂其有靈徳以及鳥獸昆蟲焉疏曰王制注云昆明也明蟲者得陽而生得陰而蔵魚亦蟲之别名黄氏曰民樂文王之靈徳而亦樂其鳥獸昆蟲之類也民附文王久矣序言因靈臺之役而始見其歸附因詩起義耳人心所歸即是天命言文王受命謂天命歸文王耳文王未嘗當而受之也孟子云文王以民力為臺為沼而民歡樂之樂其有麋鹿魚鱉是也及者所謂愛其人及屋上之鳥也詩記曰前二章樂文王有臺池鳥獸之樂也後二章樂文王有鐘鼓之樂也皆民樂之辭也經始靈臺今曰經度而始為之言剏建也蘇氏曰靈善也傳曰四方而高曰臺疏曰左傳注云天子曰靈臺諸侯曰觀臺僖十五年左傳云秦伯獲晉侯以歸乃舍諸靈臺杜預云在京兆鄠縣周之故臺也哀二十五年左傳云衛侯為靈臺於籍圃則是新造其時僣名之也觀去聲鄠音戸經之營之今曰朱氏孟子解云經量度也營謀為也經營皆圖度之意庶民攻之傳曰攻作也不日成之今曰不日不多日也今人言不久為不日經始勿亟音棘箋曰亟急也庶民子来首章述作臺之初文王之經度始為靈臺也經度之營謀之方見其圗度而庶民協力攻作之不多日而已成矣纔謀即成何其速也葢文王經營之始雖不欲亟而其民如子趨父事盡心竭力故其成日自速非疆之也詩記曰文王之作臺主於望氛祲觀民俗以察天人之意因以疏瀹精神宣節勞逸葢一弛一張無非事也王在靈囿音又補傳曰凡詩謂文王為王者皆非作於文王之時傳曰囿所以域養禽獸也疏曰於臺下為囿沼春秋築鹿囿則囿者築墻為界域而禽獸在其中麀鹿攸伏麀音憂釋獸曰鹿牡麚牝麀麚音加王氏曰攸伏則孳乳得其時麀鹿濯濯疏曰濯濯肥澤貌白鳥翯翯音學朱氏曰翯翯潔白貌王在靈沼傳曰沼池也於牣魚躍於如字牣音仞傳曰牣滿也次章言既作臺而遊焉臺下有囿有沼文王遊於靈囿則牝鹿乳其子伏而不動又濯濯然肥澤其白鳥翯翯然潔白文王遊於靈沼則其沼中之魚充滿而皆跳躍凡誇言其鳥獸魚鱉之美者皆民歡樂之之辭也車馬羽旄一也有見之而欣欣喜色者有見之而疾首蹙額者由人心之樂不樂也文王之鳥獸魚鼈何以異於人哉特民心樂之耳孟子最善説詩只民樂其有麋鹿魚鼈一語道盡詩意毛氏以為靈道行於囿沼今鹿養之久則自馴白鳥未有不㓗魚未有不躍者豈皆靈道之行乎後之説詩者推廣毛意其辭意美而去詩意愈逺矣虡業維樅虡音巨樅七凶反傳曰植者曰虡横者曰栒業大板也樅崇牙也栒音荀疏曰懸鐘磬者兩端有植木其上有横木謂直立者為虡謂横牽者為栒栒上加之大板為之飾謂之業刻板㨗業如鋸齒也其懸鐘磬之處又以彩色為大牙其状隆然謂之崇牙樅即崇牙之貌樅樅然也賁皷維鏞賁音焚字亦作鼖鏞音容傳曰賁大鼓也鏞大鐘也疏曰賁大也故謂大鼓為賁鼓冬官韗人云鼓長八尺鼓四尺中圍加三之一謂之鼖鼓韗音運於論鼓鐘於音烏論平聲鄭音倫箋曰論之言倫也今曰書無相奪倫記論倫無患於樂辟廱音璧容傳曰水旋丘如璧曰辟廱以節觀者疏曰辟廱即天子大學也此在辟廱合樂必行養老之禮三章四章皆述辟廱作樂之事也三靈及辟廱皆同處文王既逰囿沼遂於辟廱作樂而民歡樂之言作樂之時設植者之虡其横栒之上加大板以為業其業之上又以彩色為崇牙其状樅樅然也此虡業之上則懸賁之大鼓鏞之大鐘使人擊之遂歎美其有倫理者此鐘鼓之聲也又歎美其可樂者此辟廱之學也文王之始作靈臺民樂成之其遊於囿沼也又樂其有鳥獸魚鼈其作樂於辟廱也又樂其鐘鼓之音所謂聞王鼓樂於此欣欣然有喜色也言之不能盡而嗟歎之不能已則民之愛戴者深矣詩記曰或疑靈臺之詩叙臺池苑囿與民同樂胡為以辟廱學校勦入之彼盖未嘗深考三代人君與士大夫甚親遊宴之􅉏御征行之扈衛無所往而不與髦俊俱焉樂正司業父師司成則學者固學士之所常隷也夫豈有二事哉於論鼓鐘於樂辟廱鼉鼓逢逢鼉音駝逢音蓬傳曰鼉魚屬陸璣曰鼉形似蜥蝪四足長丈餘甲如鎧甲皮堅厚冝冐鼓今曰月令季夏命漁師取鼉上林賦樹靈鼉之鼓各注云鼉皮為鼓釋文曰逢逢鼓聲也傳曰和也矇瞍奏公矇瞍音蒙叟疏曰有眸子而無見曰矇無眸子曰瞍箋曰凡聲使瞽矇為之傳曰公事也申言鐘鼓辟廱之樂詠歎不能已又言以鼉皮為鼓其聲逢逢然而和乃矇瞍方奏其事樂之更端曰奏故九成謂之九奏言方奏其事樂之不厭之辭也靈臺四章二章章六句二章章四句舊五章章四句今從朱氏下武繼文也武王有聖徳復受天命能昭先人之功焉武王之雅二篇下武言繼文繼三后之文徳也文王有聲言繼伐繼文王之伐功也下武維周今曰下武以武為下世有哲王三后在天傳曰三后大王王季文王也朱氏曰既沒而其神在天也李氏曰書兹殷多先哲王在天王配于京傳曰王武王也箋曰京鎬京也陳氏曰在鎬京者足以配在天者人知武王以武定天下而不知武王之心上文而不上武用武非其得已也此詩為繼文而作首章欲發明武王之心先總説一代之意嚮言以武為下者周之家法也周家世世有哲王三后既往而其神在天矣武王又配合其徳于鎬京焉其在京者可以配在天者先後相傳其徳一也曷嘗以武為上哉舊説下武為後世有武功然有聲為繼伐之詩故言伐崇之事此詩為繼文之詩篇終皆言文徳略不及武事若首章第一句獨言武功尋繹文義全無歸著非詩意矣書言武王不敢替厥義徳率惟謀從容徳謂義徳乃不得已而容徳是其所尚即此詩之意也王配于京世徳作求蘇氏曰作起也今曰康誥我時其惟殷先哲王徳用康乂民作求永言配命解見文王成王之字箋曰孚信也武王所以能配三后于京者以其於先世之徳能起而求之善繼述也所求者先世之徳故能長配天地有天下而傳無窮遂成王者之信也三后之徳孚于民久矣至武王有天下然後其信成焉王者之事業莫大於信信則天下心服而王也後世以詐力取天下葢有僅成王業者而不能成王孚故世祚不長不足以永配天命也成王之孚下民之式傳曰式法也永言孝思孝思維則傳曰則則其先人也箋曰子孫以順祖考為孝武王成王字而為法於天下者以其永有孝思也其孝心所思唯法則前人也王者之孝莫大于法前人中庸云武王周公其逹孝矣乎夫孝者善繼人之志善述人之事者也媚兹一人箋曰媚愛也一人武王也應侯順徳傳曰侯維也李氏曰順徳者孝也永言孝思昭哉嗣服箋曰服事也天下媚愛於武王而應之以順徳謂天下化之也孝者徳之順故又言武王永有孝思昭昭然能嗣其先世之事也序所謂能昭先人之功也昭兹来許来毛如字鄭音賚陳氏曰許語助也繩其祖武蘇氏曰繩約也今曰以為凖繩而取正焉傳曰武迹也於萬斯年於如字受天之祜承上章昭哉嗣服而言武王繼述之業所以昭昭乎顯著有自来矣由是繩約其先祖之跡冝其萬年受天之福也受天之祜四方来賀疏曰四方謂中國諸侯也朱氏曰賀朝賀也於斯萬年不遐有佐武王受天之福祜故四方諸侯之國皆来朝賀雖至于萬年不以為久逺而常佐周皆世世藩屛王室也下武六章章四句文王有聲繼伐也武王能廣文王之聲卒其伐功也繼文之詩兼言三后以三后皆有文徳可繼不専指文王也繼伐之詩専言文王以大王王季無伐功所謂繼伐者専言繼文王也周至文王始有伐功伐崇葢其大者然而大統未集至武王伐商而後卒其功也文王有聲箋曰聲今間也遹駿有聲遹駿音律峻箋曰遹述也所述者謂大王王季也駿大也遹求厥寜遹觀厥成觀李氏如字舊去聲今曰觀視也如視乃烈祖視已成事之視文王烝哉傳曰烝君也吕氏曰衆也得衆為君也首章言文王之繼述也文王所以有聲聞者能遹述駿大大王王季所有之聲也述之而求其寜則惟欲持守而不變此豈有意於伐功以求加乎前人者文王君哉頌其得人君之道也文王受命有此武功既伐于崇疏曰别言崇者以其功最大其伐最後作邑于豐説文云酆周文王所都朱氏曰酆即崇國之地在京兆鄠縣杜陵西南鄠音户文王烝哉次章述代崇而作豐也文王惟欲述大王王季之事非有心於伐功也然受天命以討罪不容自已故有此征伐之功最後伐崇威徳益著國勢浸盛程邑又不足以容乃作邑于豐以居之文王誠得人君之道也張子曰大王邑于岐小之下既基王迹矣文王又遷于豐武王又遷于鎬者當是時民歸之者日衆無地以容之必至于遷也築城伊淢音洫字亦作洫韻音域傳曰淢成溝也箋曰方十里曰成淢其溝也廣深咎八尺作豐伊匹陳氏曰匹稱也匪棘其欲箋曰棘急也遹追来孝曹氏曰来者嗣續之意王后烝哉三章明作豐之心也文王之作豐邑也掘隍土以築城因而為池僅如成間之淢耳池非深也其作豐邑之制度唯其稱而已謂稱上公之制己所冝為不務侈大也初非急於從己之欲以廣都邑乃述追先人之事而致其方来之孝唯欲不墜先業耳尊稱文王為王后誠得人君之道也王公伊濯箋曰公事也詩記曰濯如滌言明白而不昧維豐之垣音袁垣曰垣牆也釋文曰卑曰垣四方攸同王后維翰傳曰翰榦也疏曰築牆所立之木解見維周之楨王后烝哉四章述作豐人而歸之也文王行事濯乎明白其築豐之城僅如垣牆耳城非高也然四方同心歸之皆以文王為楨翰城僅如牆而文王則如築牆所立之木喻不在險而在徳故言文王誠得人君之道也池如淢城如垣不為高城深池也文王已得人心故武王因之以伐商也豐水東注箋曰堯時豐水汎濫禹治之使入渭東注于河豐邑在豐水之西鎬京在豐水之東疏曰帝王世紀云豐鎬皆在長安之西南後漢郡國志注豐鎬相去二十五里今曰禹貢東㑹于澧注云澧水自南而合盖澧水自南而北流入渭故豐在其西鎬在其東經言東注者是㑹渭之後乃東注入河也維禹之績箋曰績功也四方攸同皇王維辟音璧傳曰皇大也箋曰變王后言皇王者武王之事又益大辟君也朱氏曰皇王者有天下之號指武王也皇王烝哉五章以武王之功配禹也豐鎬在豐水之東西二都皆可言豐水此章皇王稱武王則豐水東注指鎬京所見而言也言豐水之所以㑹渭而東注于河者是禹之功也武王作邑于豐水之東而四方之所以同歸周者以武王為天下之君也葢以武王之功配禹皆除害濟民也武王誠得人君之道也變王后言皇玉一統天下其事又大也繼伐之詩而言人心歸往者見一戎衣而天下定也鎬京辟廱鎬胡老反傳曰武王作邑於鎬京詩記曰後漢地理志云鎬在京兆尹上林苑中孟康云長安西南有鎬池古史考云武王遷鎬長安豐亭鎬池也張子曰靈臺辟廱文王之學也鎬京辟廱武王之學世至此始立為天子之學矣自西自東箋曰自由也自南自北無思不服皇王烝哉六章言辟廱之化也武王於鎬京建辟廱之學徳化流行天下之人由四方而来者無不服之思謂皆心服也武王誠得人君之道也四方之服也久矣此言辟廱之化深入其心也四方先言西鎬京在西近者先被其化也繼伐之詩而言辟廱教化者見武城之後偃武脩文也考卜維王箋曰考猶稽也曹氏曰有疑必稽焉宅是鎬京箋曰宅居也維龜正之箋曰謂得其吉兆疏曰龜出其吉兆以正定之武王成之箋曰武王遂居之成龜兆之吉武王烝哉七章述遷鎬之事也言稽考之於龜卜者武王也其所卜為欲居此鎬京也以吉凶取正於龜而龜出其吉兆以正定之也龜兆告吉而武王作都以居之是成其吉兆也武王誠得人君之道也繼伐之詩而言遷鎬者見武功既成乃建王國也文王伐崇而遷豐武王伐商而遷鎬即繼伐之功也豐水有芑音起今曰芑嘉穀也毛以為草今不從芑解見菜芑及生民陳氏曰芑以喻人材武王豈不仕今曰仕官也謂官使之也詒厥孫謀詒音移孫毛如字鄭音遜箋曰詒猶𫝊也以燕翼子傳曰燕安也今曰翼輔翼之翼表記舉此章注云安翼其子毛以為敬今不從詩記曰孫與子特互言之皆謂子孫也武王烝哉八章述用材也豐水之傍以潤澤生芑榖喻養成人材也武王豈有不仕之以官者言無不用之無遺材也武王葢欲傳其孫之謀而燕安翼輔其子耳曾孫𤣥孫以下皆孫也謀及于孫之逺則其子可知矣聖人為子孫之計莫大於遺之以人材所謂敷求哲人俾輔于爾後嗣孔子舉此章曰數世之仁也武王誠得人君之道也繼伐之詩而言以人材遺後人者見創業垂統之可繼子孫頼之也或謂武王豈不用之乎留之以遺後人也如此則遺賢矣聞兼收並蓄以貽後人未聞棄而不用而以為子孫之計也豈不仕者猶曰豈不日戒耳文王有聲八章章五句詩緝卷二十六
