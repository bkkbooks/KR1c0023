body:
  text: 詩緝卷二十五宋嚴粲撰文王之什大雅釋文曰自此以下至卷阿十八篇是文王武王成王周公之正大雅文王至靈臺八篇是文王之大雅下武至文王有聲二篇是武王之大雅文王文王受命作周也詩記曰按吕氏春秋周公旦乃作詩曰文王在上於昭于天周雖舊邦其命維新以繩文王之德熟味此詩信非周公莫能作也此詩周公述文王之德業以戒成王也文王未嘗稱王曰文王者追稱之也言受命作周者推本之辭也作造也造周之王業猶康誥言肇造區夏也天命歸於文王而文王退然不敢當故在文王時無受命之説泰誓牧誓猶皆不言文王受命至大告武成乃曰我文考文王誕膺天命蓋武王既得天下之後推本言之凡經中稱文王受命皆謂天命歸之而已文王未嘗當而受之也中庸記孔子之言曰武王末受命武王末年方受命文王何嘗受命乎史遷因詩書有受命之語因謂文王受命稱王而斷虞芮之訟漢儒又雜以讖緯之説則亦誣矣遊氏曰泰誓稱文王為文考至武成然後稱文考為文王則可知矣文王在上於昭于天於音烏疏曰於歎美也傳曰昭見也見賢遍反周雖舊邦王氏曰周受封自后稷則其為邦舊矣其命維新補傳曰始命以國今命以天下有周不顯帝命不時傳曰不顯顯也不時時也王氏曰不顯所以甚言其顯不時所以甚言其時也文王陟降傳曰陟升也在帝左右首章述文王以天德受天命也大雅皆用王者之禮周既追王文王此詩又推原受命之由而歸之故言在上尊之也於乎其德昭見于天矣歎美其德之盛言之不能盡也周自后稷以來為邦舊矣而天之命周則維新始命之以有天下也周家豈不顯乎言王業浸盛也天命豈不時乎言適當其時也蓋以文王德合乎天升降進退常若在上帝之左右無一動之非天也鄭以大王遷岐始居周原不必如此拘也周但言周家耳亹亹文王亹音尾傳曰亹亹勉也令聞不已聞音問箋曰令善也聞聲聞也陳錫哉周箋曰文王敷恩惠之施左傳宣十五年詩曰陳錫載周能施也李氏曰哉語辭也侯文王孫子傳曰侯維也補傳曰不曰子孫而曰孫子謂孫又生子言其逺也文王孫子本支百世傳曰本本宗也支支子也凡周之士疏曰上者下至諸侯及王朝公卿大夫總稱不顯亦世朱氏曰不顯亦世猶曰豈不顯乎其亦世也蓋言其傳世永久而以不顯二字歎之以足其辭也次章述文王德澤之逺也亹亹純亦不已也文王之誠不已而令聞亦不已誠之著也陳錫敷施也推懷保惠鮮之澤也言亹亹而繼以陳錫由精神心術而達於政事設施同此一誠之運不誠則不溥也陳錫於周者錫民也而及其孫子蓋文王惟知錫民而錫民者乃所以錫孫子也欲成王知今日之享有天下皆文王之澤而罔敢失墜也文王之孫子其本宗百世為天子其支庶百世為諸侯盛德必百世祀也不特孫子之盛如此凡周之士皆光明俊偉其德甚顯亦世世相傳與周匹休焉世之不顯厥猶翼翼箋曰猶謀也傳曰翼翼恭敬也箋曰忠敬也思皇多士傳曰思辭也詩記曰顔氏漢書注云皇美也生此王國王國克生維周之楨音貞傳曰楨幹也濟濟多士濟齊之上詩記曰顔氏漢書云濟濟盛貌文王以寧三章述周士之盛也周之士世世相傳其德甚顯其為君謀事翼翼然忠敬美哉衆士生此周王之國也惟周王之國能生此衆士也生此王國天生之也王國克生文王教化作成之也此多士為國之楨幹牆恃幹而立國恃人而立故濟濟然衆盛之多士文王賴之以為安也釋詁云楨翰儀幹也舍人云楨築牆所立兩木也王后維翰及維周之翰傳皆云幹也疏云幹者築牆所立之木然則楨也翰也幹也一物也字當作幹傳寫誤作幹鄭以此為幹事之臣失之矣穆穆文王釋訓曰穆穆敬也郭朴注曰容儀謹敬於緝熙敬止於音烏歐陽氏曰緝續也熙廣也緝熙云者接續而熙廣之也朱氏曰亦不已之意疏曰止語辭假哉天命假音嘏蘇氏曰假大也有商孫子箋曰有臣有之也商之孫子其麗不億曹氏曰麗附也今曰附麗言其徒黨也疏曰不止於一億上帝既命侯于周服今曰本詩侯文王孫子侯于周服皆為發語之辭孔申毛義作維是也服謂有職事也四章述文王以敬德受命代商也文王盛德之容其敬穆穆然於是歎美文王之心能緝續熙廣其敬矣蓋形諸外者皆其根諸中者表裏一始終一也穆穆者中庸之齊莊有敬即雍雍在宫肅肅在廟也緝熙敬止者中庸之至誠無息即純亦不已也所可見者容也故穆穆足以形容之所難言者心也故緝熙不足以盡而又以於發之太哉天之命文王使之臣有商家之孫子也文王之時未能有商之孫子蓋推原周之代商由於文王故以為文王能有之也商之孫子其附麗之者實繁有徒不止於一億泰誓所謂受有億兆夷人武成所謂受率其旅若林也然上天命商孫子維于周而服職其徒黨雖衆不能勝天也故孔子云仁不可為衆也朱氏曰此詩之首言文王之昭于天而不言其所以昭次章言其令聞不已而不言其所以聞至于四章然後所以昭明不已者乃可得而見焉然亦多詠嘆之言而語其所以為德之實則不越乎敬之一字而已然則後章所謂修厥德而儀刑之者豈可以他求哉釋詁云穆穆美也釋訓云穆穆敬也是穆穆有二訓也少儀言語之美穆穆皇皇曲禮天子穆穆諸侯皇皇鄭注皆以為容止之貌郭璞注穆穆云容儀敬謹是穆穆有美敬二訓而皆為容儀也舊説以侯為君謂為君於周九服之中此解侯于周服則順解侯服于周則不通今考釋文云服事也用也故為臣而見用謂之服言服行其職也曲禮云艾服官政酒誥云服休服采多士云有服在百僚多方云有服在大僚多士多方皆誥殷士而謂之有服言其見用之意即此詩所謂商之孫子侯于周服也侯服于周天命靡常殷士膚敏傳曰膚美也敏疾也祼將于京祼音貫傳曰祼灌鬯也周人尚臭將行也疏曰郊特牲云周人尚臭尚臭者一代之禮文王之時未必已然亦可據後而言也以祼是祭禮當須行之故言將行也宗廟之祭以祼為主於禮王正祼而後亞祼天官小宰凡祭祀贊祼將之事注云又從太宰助王祼言太宰贊王小宰贊太宰是祼將之事有臣助之矣此舉祼將以表祭事見殷士助祭耳不必専助行祼也朱氏曰京周之京師也京師又解見公劉厥作祼將常服黼冔音甫許董氏曰常服則不變其服存商制也黼解見采叔疏曰周冕無繢繡之飾則殷冔亦不以黼為飾黼自衣服之所有也殷之諸侯祭服亦九章而下不止於黼舉一章以表之耳董氏曰黼繡於裳雖章數不同皆以黼為裳也傳曰冔殷冠也夏后氏曰收周曰冕疏曰郊特牲及士冠禮皆云周辨殷冔夏收故知冔殷冠也彼云周辨此云冕者以周自大夫以上祭物皆用冕服故傅以冕言之實冕而謂之辨者周禮辨師注云辨古冠之大號官名辨師職掌五冕故知辨是大名也王之藎臣藎音燼從韻箋曰王斥成王傳曰藎進也詩記曰藎者忠愛之篤進退無已也朱氏曰蓋以戒成王而不敢斥言故以藎臣言之猶所謂敢告僕夫云耳無念爾祖傳曰無念念也疏曰爾祖文王也五章述殷士祼將之事以為戒也商之孫子而維服職于周見天命之不常惟德是歸也殷士總言商之孫子及其舊臣猶書稱爾殷遺多士及兹殷庶士也祼為以鬯酒獻尸尸受酒而灌於地以降神也行祼之禮謂之祼將殷士之膚美而敏疾者乃祼獻行禮于周之京師以助周祭其作祼將也服殷之常服黼裳而冔冠也黼裳商周所同黼裳冔冠則商之制也王者尊先代之後不變其服亦因以為戒也故呼成王忠藎之臣而告之曰得無念爾祖文王乎謂不以文王為念則將墜厥緒周之孫子及其臣又將服周之服而助祭于他人之廟矣詩記曰前漢劉向上疏云孔子論詩至於殷士膚敏祼將于京喟然嘆曰大哉天命善不可不傳于子孫是以富貴無常蓋傷微子之事周而痛殷之亡也郊特牲云灌以圭璋注云灌謂以圭瓉酌鬯始獻神也論語禘自既灌而往朱氏解云灌者方祭之始用鬱鬯之酒灌地以降神也字皆作灌洛誥王入太室祼夏氏解云祼灌也謂以圭瓉酌於爵以獻尸尸受酒而不飲因灌於地故謂灌也然則因其灌之於地故名之為祼經字作灌古字通也祭統云祭有三重焉獻之屬莫重於祼郊特牲又云既灌然後迎牲是祼為祭祀之始故為重也小宰注云人道宗廟有祼天地大神不祼此詩祼將于京及大明曰嬪于京于周于京毛氏皆以為大取公羊衆大之説謂京師也又以思齊京室之婦為王室亦京師也鄭氏唯祼將于京從毛説其餘以為周地之小别名皇矣依其在京毛以為大阜鄭還以為周地名公劉乃覯于京京師之野于京斯依毛以為大衆所冝居之地鄭以為丘之絶高者公劉居豳所言京自是高丘非岐周地名之京若周都稱京師則因岐周地名之小别而稱之大雅作於成王之時皆用王者之禮從後稱為京師也無念爾祖聿修厥德聿音遹朱氏曰聿發語辭詩記大明解曰左傳注云聿惟也永言配命箋曰永猶常也蘇氏終風解曰言辭也疏曰天以王者為配詩記曰王者代天理物操典禮命討之柄以臨天下故曰配命又曰配上帝自求多福殷之未喪師喪去聲箋曰師衆也克配上帝冝鑒于殷駿命不易駿音峻又音俊易毛音異鄭音亦傳曰駿大也六章戒成王念祖而鑒殷也成王得無念爾祖文王乎茍念之在修德而已修德則能長配天命而自求多福矣配命謂王者與天為配天大王亦大也天之付與萬物謂之命王者宰制天下亦謂之命以王者之命配天之命也自求多福謂求諸已而不求諸天也德者民心之所歸得民斯得天故殷未失其民之時能配天矣配命言其用配天言其體其意一也後人不修厥德則失其民而天命去之宜以殷為鑒則知大命之難矣孟子曰桀紂之失天下失其民也詩記曰大學云詩云殷之未喪師克配上帝儀鑒于殷峻命不易道得衆則得國失衆則失國命之不易無遏爾躬遏於葛反傳曰遏止也朱氏曰絶也宣昭義問疏曰宣昭布明也箋曰義問以禮義問老成人有虞殷自天箋曰有又也傳曰虞度也上天之載傳曰載事也無聲無臭釋文曰臭凡氣之總名儀刑文王朱氏曰儀象也傳曰刑法也萬邦作孚傳曰孚信也七章申六章鑒殷法祖之意也天命不易矣無使遏絶於爾身當宣布昭明以義理詢問於人而又虞度殷之所以自天者殷之亡也實自於天天命無私可以為鑒也鑒殷之所以失必法文王之所以得四時行百物生天之事也而無聲音臭氣之可求惟儀象刑法於文王則萬國孚信之矣文王即天也文王七章章八句大明文王有明德故天復命武王也朱氏曰此亦周公戒成王之詩李氏曰大雅之詩則謂之大明小雅之詩則謂之小明明明在下今曰重言明者至著也赫赫在上今曰赫赫顯而可畏之意天難忱斯傳曰忱信也不易維王易毛音異鄭音亦今曰不易本傳無音駿命不易毛音異此亦音異矣命不易哉同疏以毛亦如字非也天位殷適音的使不挾四方挾朱如字毛音浹朱氏曰挾謂挾而有之錢氏曰挾猶持也首章専述天命喪殷之事也首二句泛言天人之理明明在下君之善惡不可掩也赫赫在上天之豫奪為甚嚴也在下而明明則達乎上在上而赫赫則監乎下天人相與之際甚可畏也是故天難信而不可恃為君豈不難哉觀紂居天位而又為殷之正適以不修厥德乃使不得有其天下斯可見矣詩記曰天位殷適使不挾四方則下所陳眷顧周家冇加無己者非天私我有周也栽者培之傾者覆之因其材而篤焉耳舊説以明明在下為文王非也首章先泛言天人之理然後及殷亡之由為美文武張本次章乃述大任生文王其後乃又述文王生武王及伐殷之事以成首章之意其言皆有次序也摯仲氏任摯音至任音壬傳曰摯國任姓仲中女也中去聲自彼殷商朱氏曰殷商商之諸侯也自周而言則諸侯皆商也來嫁于周曰嬪于京嬪音頻傳曰嬪婦也朱氏曰京周京也京考見文王京師解見公劉乃及王季傅曰王季大王之子文王之父也維德之行大任有身大音泰王氏曰摯仲氏任繫其夫而言大任繫其子而言傅曰身重也箋曰謂懷孕也生此文王次章述大任生文王也摯國中女任氏從殷商之地來嫁于周將述商亡而周興故以摯繫商與周對言之也曰嬪于京謂以婦道見稱於周也乃配王季而與行德同志意也於是大任有身而生文王朱氏曰將言文王之聖而追本所從來者如此蓋曰自其父母而已然矣書嬪于虞謂能行婦道也毛以京為大謂京師鄭以為周國之地小别名蓋謂王季時其居未得稱京師也然大雅作於成王之時皆用王者之禮從後稱周京耳維此文王小心翼翼箋曰翼翼恭慎貌朱氏曰小心翼翼即前篇之所謂敬也昭事上帝箋曰昭明也聿懷多福聿解見文王蘇氏曰懷來也厥德不回朱氏曰回邪也以受方國三章言文王之德天人所與也文王小心翼翼然恭敬以明事上帝至誠之運與天周旋也遂能懷來多福蓋其德不回邪故受此四方侯國之歸也有一毫覬幸之心則邪矣天監在下箋曰監視也有命既集傳曰集就也曹氏曰翔而後集之集言有所擇而就之也文王初載朱氏曰載年也天作之合傳曰合配也在洽之陽洽音峽傳曰洽水也釋文曰馮翊有郃陽縣應劭云在洽水之陽郃音洽榖梁傳曰水北為陽朱氏曰洽水本在今同州郃陽夏陽縣今流已絶故去水而加邑渭水亦徑此入河也在渭之涘音俟渭解見邶谷風傳曰涘崖也解見王葛藟李氏曰國語鄭語云前河後莘韋昭注云莘國也左傳僖公二十八年城濮之戰晉侯登有莘之墟杜元凱注云莘故國名今此詩云在洽之陽在渭之涘則是馮翊之間與鄭衛之地全不相干涉當以此詩為證左傳國語闕之可也文王嘉止朱氏曰嘉昏禮也大邦有子朱氏曰大邦莘國也子大姒也大姒之大音泰今曰子女也論語以其子妻之女亦稱四章述天生大姒以配文王也文王有盛德而天監之於下大命集焉文王初年天為生配在洽水之北渭水之涯指莘國也當文王嘉禮之時而莘國有賢女殆非偶然天實為之朱氏曰將言武王伐商之事故此又推其本而言之大邦有子俔天之妹俔牽之去又音峴胡典反説文曰俔譬也文定厥祥朱氏曰文禮也祥吉也箋曰卜而得吉則以禮定其吉祥謂使之納幣也親迎于渭迎去聲造舟為梁造音慥傳曰天子造舟諸侯維舟大夫方舟士特舟箋曰天子造舟周制也殷時未有等制疏曰李巡云比其舟而渡曰造舟中央左右相維持曰維舟併兩船曰方舟一舟曰特舟孫炎云比舟為梁也然則造舟者比船於水加版其上即今之浮橋文王敬重昏事始作而用之後世以文王所用故制為天子法耳不顯其光五章述文王親迎之事也大邦有賢女譬天之妹尊之之辭也卜而得吉則以禮文定其吉祥而納幣焉文王親迎于渭水之傍其渡渭也敬重昏事比舟為橋梁傳曰乘船危就橋安所以去危而就安也豈不顯其光輝乎程子曰先儒以親迎于渭謂天子須親迎文王親迎時乃為公子未為君也况周國自在渭傍不是出疆有命自天命此文王于周于京京考見文王纘女維莘纘音纂傳曰纘繼也莘大姒國也長子維行長上聲傳曰長子長女也行解見邶泉水篤生武王傳曰篤厚也王氏曰天既生文王又生武王是之謂篤中庸云天之生物必因其材而篤焉保右命爾右音祐傳曰右助也燮伐大商燮蘇接反傳曰燮和也陳氏曰燮伐有和順之意順天命以伐商也六章述大姒生武王也有命自天而降命文王於周之國於京之地矣謂興王業也周為國號京其所都之邑也能繼大任之女事者惟此莘國以其長女來嫁也天又篤厚之使生武王既生文王又生武王是眷周之厚故言篤生保安之右助之而命之以伐商以順而動因天人之所欲是之謂燮伐王氏曰言大商所以大文武之德以為商大矣非德之大不能伐之也殷商之旅傳曰旅衆也其會如林會如字舊音膾疏曰會聚也矢于牧野傳曰矢陳也疏曰牧野紂南郊地名釋文曰牧野在朝敬南七十里維豫侯興箋曰侯諸侯也朱氏曰豫侯猶云我后也商人之稱武王也上帝臨女音汝箋曰臨視也無二爾心長樂劉氏曰二疑二也朱氏曰武王非必有所疑也設言以見衆心之同非武王之得已耳七章述武王伐商也牧野之戰殷商之衆其會聚如林木之盛陳于牧野雖衆而不為用維欲我侯武王之興此商衆且謂武王曰上帝臨視於爾爾勿疑二而不進承上文殷商之旅設為商衆告武王之辭見商民罔不欲喪而惟恐武王之不至也衆心所同即是天意伐商之事非特周人所欲亦商人所望武王順天應人而已武成言受率其旅若林會于牧野罔有敵于我師前徒倒戈攻于後以北此詩所陳皆事實也牧野洋洋音羊傳曰洋洋廣也檀車煌煌音皇疏曰檀木之兵車傳曰煌煌明也駟騵彭彭騵音元彭如字音棚考見出車傳曰駵馬白腹曰騵上周下殷也疏曰郭璞云駵赤色黑鬛也檀弓説三代乘馬各從正色而周不純赤明其有義故知白腹為上周下殷戰為二代革易故見此義檀弓亦言戎事乘騵明非戎事不然因此武王所乘遂為一代常法彭彭強盛也維師尚父傳曰師太師也尚父可尚可父朱氏曰太公望為太師而號尚父也時維鷹揚曰鷹爽鳩也涼彼武王涼音亮傳曰涼佐也肆伐大商箋曰肆故今也朱氏曰遂也肆解見綿會朝清明箋曰會合也曹氏曰武成云陳于商郊俟天休命孔安國云休命謂雨止畢陳也六韜云武王東伐至河上雨甚雷疾太公率衆先涉然則至畢陳乃雨止而清明八章終上章伐商之事言得天人之助也牧野之地洋洋然寬廣非用權詐間道襲之也檀木之兵車煌煌然鮮明其駟馬乘騵彭彭然強盛既整且暇所謂堂堂之陳也太公望為太師而號尚父如鷹之飛揚奪擊而無所畏以佐武王而伐商會戰之朝乃雨止而清明是天相之也史載行師以雨敗者多矣故以會朝清明為得天助太公先涉畢陳而雨止故以尚父鷹揚發之大明八章四章章六句四章章八句綿彌延反韻亦作綿文王之興本由大王也大王遷岐而人心歸之肇基王迹故曰文王之興本由大王也綿綿瓜瓞音迭傳曰綿綿不絶貌瓜紹也瓞瓝也瓝音雹箋曰瓜之本實繼先嵗之瓜必小狀似瓝故謂之瓞綿綿然若將無長大時疏曰瓜瓞瓜紹之瓞也綿綿微細之辭瓜之族類本有二種大者曰瓜小者曰瓞而瓜蔓近本之瓜必小於先嵗之大瓜以其小如瓝故謂之瓞瓞是瓝之别名故云瓞瓝也近本之實言紹者繼先嵗之瓜猶長子之繼父瓜實近本則小今驗信然后稷乃帝嚳之胄是嚳為瓜而稷為瓞自稷以下祖紺以前皆為瓞紺音贑朱氏曰瓜之近本初生者常小至末而後大曹氏曰不窋值夏后政衰去稷不務不窋以失其官而奔戎狄之間三世而至公劉公劉以前微弱甚矣僅能不絶其緒故以綿綿瓜瓞況之窋竹律反民之初生今曰生聚之生自土沮漆音趨七朱氏曰自從也土地也言周人始生在此沮漆之地也傳曰沮水漆水也疏曰不窋之時已嘗失官逃竄豳地猶尚往來邰國未即定居於豳至公劉而盡以邰民遂往居焉是定國於豳自公劉始也大王之基王業在於岐周始盛由未遷已得民心故云生王業也此沮漆謂在豳地但二水東流亦過周地故下傳云周原沮漆之間是周地亦有沮漆也詩記曰漢地理志右扶風栒邑注云有豳鄉詩豳國栒音荀古公亶父亶丹之上父音甫傳曰古公豳公也古言久也亶父字或殷質以名言也疏曰亶父大王也言其年世久故曰古公猶言先公也大王追號為王不稱王而稱公者此本其生時之事故言生存之稱也陶復陶穴復音福箋曰復者復於土上鑿地曰穴皆如陶然疏曰陶瓦器竈也覆者地上為之取土於地復築而堅之穴者鑿地為之土無所用直去其息土而已七月云入此室處即豳事也豈十世之內常穴居乎但豳近西戎處在山谷其俗多復穴而居未有家室傳曰室內曰家疏曰宫謂之室其內謂之家首章述大王初居豳之事也興也言周之初如綿綿然不絶之瓜瓞也周帝嚳之後如大瓜之種中嘗衰小如近本之瓜則小也瓜種之小者曰瓞此本大瓜之種以其近本者如瓞之小故以瓜瓞言之然瓜至末則復大喻周至大王文王而復興也將述大王復興之事言此周民初遂其生乃在地之沮漆沮漆二水名言地之沮漆者謂其地在二水之間指豳國也居此地者乃是古先之公號亶父者才取土於地覆築而堅之為土屋以居謂之復或鑿地而居謂之穴二者皆若瓦器之竈故謂之陶豳民之初未有宫室之安也沮漆名稱相亂水經云沮水出北地郡直路縣東過馮翊殳祤縣祋音對祤音詡北東入於洛此沮水之源流也漢志扶風有漆縣漆水在縣西東入渭又闞駰十三州志云漆水出漆縣西北至岐山東入渭此漆水之源流也沮出北地入洛漆出扶風入渭沮自沮漆自漆也至孔氏引水經云沮水俗謂之漆水又謂之漆沮此則名稱相亂矣諸家書解以出扶風之漆水與出北地之漆水為二謂扶風之漆水至岐山入渭在灃之上遊而書言渭水會灃會涇之後乃過漆沮則漆沮在灃水涇水之下遊故以書之漆沮為出北地之漆沮與詩扶風之漆别也但水經出北地者止是沮水而謂之漆沮耳如上所言則詩之漆沮自是二水書之漆沮止是一水即詩之沮也然水經之沮入洛書之漆沮則入渭沮水若為漆沮一名洛水則漆沮即洛也而又云入洛何也姑闕之以俟知者此詩言沮漆指豳國是漆沮之上遊也下文言周原傳以為漆沮之間指岐周是漆沮之下流也吉日及潛頌言漆沮指鎬京當亦去岐周不逺也疏云漆沮二水在豳地但二水東流亦過周其説是也古公亶父來朝走馬蘇氏曰朝早也疏曰早朝之時疾走其馬詩記曰來朝走馬形容其初遷之時略地相宅精神風采也鄭氏以為避惡早且疾茍如是之迫遽則豈杖策去邠雍容之氣象哉率西水滸音虎傳曰率循也滸水涯也滸解見王葛藟至于岐下爰及薑女箋曰爰於也及與也傳曰薑女大薑也聿來胥宇莆田鄭氏曰聿遂也傳曰胥相也宇居也相去聲次章大王相宅於岐也大王圖事敏疾其來之朝疾走其馬循西方水涯漆沮之側東行而至於岐山之下於是與其妃大薑遂來相可居者李氏曰相宅非婦人之事妃之所為必有大過人者周原膴膴音武傅曰周原沮漆之間也膴膴美也箋曰廣平曰原周之原地在岐山之南膴膴然肥美堇荼如飴堇荼音謹徒飴音移傅曰堇菜也今曰內則云堇荁枌榆注云荁似堇而葉大又公食禮鉶芼皆有滑注云滑堇荁之屬説文云堇根如薺葉如細栁蒸食之甘是堇為美菜也有瞽箋云簫如今賣餳者所吹疏云飴謂之餳釋文云乾糖也後漢明德馬后云含飴弄孫荁音九餳夕清反爰始爰謀爰契我龜契音棄傅曰契開也疏曰契開者言契龜而開出其兆非訓契為開也春官菙氏掌共燋契以待卜事注云士喪禮云楚焞置于燋在龜東楚焞即契所用灼龜者也燋謂炬其存火也士喪禮注云楚荆也然則卜用龜者以楚焞之木燒之于燋炬之火既然執之以灼龜故箋云契灼其龜而卜之既契乃開出其兆故春官卜師掌開龜之四兆注云開謂出其占書也是既契乃開之但傅文質略直言契開耳菙誰之上半濁半清燋音爵焞吐敦反曰止曰時築室于兹三章述大王定宅於岐也內則言婦養舅姑公食禮言君待其臣則以堇則堇是美菜也七月言食農夫以荼則荼非美菜也雨露所濡甘苦齊實周之原地膴膴然肥美所生堇荼皆甘如餳言美惡皆冝也大王見此地可居於是始起意而圖之謂謀及乃心也於是謀之於衆謂謀及卿士庶人也又以楚木然火謀之契者契灼其龜而卜之謂謀及卜筮也曰者龜告之兆告以冝於此居止又告以時日之吉於是築室于此而遷居之也孔氏謂堇即烏頭且引晉語驪姬置鴆於酒置堇於肉以為證蓋以此堇為爾雅芨堇之堇也芨音及説者皆祖之若為驪姬置肉之堇則與鴆毒同類與荼菜可食之物非其類矣且詩人稱周原之美當言冝稼冝蔬不應言其冝毒物也荼雖苦得霜而甜脆故可言如飴烏頭毒物不可食何由知其如飴乎賈山言江皋河濵雖有惡種無不猥大地之美者能使物無美惡皆猥太耳安能變毒物而為美物毛氏以堇為菜不言毒物釋文言堇蒸食之甘知為內則及公食禮堇荁之堇非爾雅芨堇之堇也乃慰乃止乃左乃右蘇氏曰左右東西列之也乃疆乃理疆理解見信南山乃宣乃畝蘇氏曰宣道溝洫也畝度廣狹也自西徂東箋曰豳與周原不能為西東據至時從水滸而言也疏曰豳在周原西北而經言自西據至周之時從水滸而言也鄭志云豳地今為栒邑縣西南行正東乃得周岐山在長安西北四百里豳又在岐山西北四百里如志此言發豳西南而行從沮水之南然後東行以至周也周爰執事朱氏曰周遍也傳曰爰於也今曰猶周爰咨諏箋以為於周執事今不從四章述定民居治田畝也既築室于兹矣乃慰勞之乃安止之上文曰止則龜告以宜居於此此言乃止則遂安居於此成龜告之意也乃處之於左乃處之於右公宫在中而民居左右也民居既定則治田事乃疆則畫其經界乃理則分其土冝乃宣則道其溝洫乃畝則度其廣狹於是人皆從西往東遍執事矣言競出力也乃召司空箋曰司空掌營國邑疏曰司空之屬有匠人其職有營國廣狹之度廟社朝市之位曹氏曰量地以制邑度地以居民司空之職故先召之乃召司徒箋曰司徒掌徒役之事疏曰司徒之屬有小司徒其職云凡用衆庶則掌其政教曹氏曰致衆庶令徒役司徒之職故次召之俾立室家其繩則直傳曰言不失繩直也疏曰繩無不直而云其繩則直言不失繩之直也曹氏曰審曲面勢直必以繩縮版以載疏曰郭云縮縳束之也箋曰載上下相承而起作廟翼翼傳曰君子將營宫室宗廟為先廄庫為次居室為後疏曰翼翼嚴正也今曰翼翼整齊也五章述將營宫室先作宗廟也司空掌營國邑司徒掌徒役之事故召之使立室家之位處以繩正之揆其基址則方正而直矣依此繩直之處起而築之以繩縮束其築板板滿築訖則升下於上以相承載作此宗廟翼翼然而整齊救之陾陾救音俱陾音仍錢氏曰救取土也謂盛土於虆也虆力追反疏曰虆者盛土器傳曰陾陾衆也度之薨薨度音鐸箋曰度猶投也疏曰薨薨聲也堇氏曰薨薨如蟲之聲則聲之衆也築之登登陳氏曰登登漸高也削屢馮馮音憑蘇氏曰削屢重復削治也長樂劉氏曰謂牆成就版削其堅凸以就平直凸音迭張氏曰馮馮削土聲朱氏曰其聲馮馮然堅也百堵皆興百堵解見鴻鴈箋曰興起也鼛鼓弗勝鼛音羔勝音升鼛鼓解見鼓鐘傳曰鼛大鼓也弗勝言勸事樂功也箋曰不能止之使休息也疏曰其間欲令食息不能止之六章述遂作宫室也築牆之時取土而實之於器者陾陾然衆多既取得土送至牆上牆上之人受而投之板中薨薨然其聲之衆既投之版中築之者登登然積纍而上則牆漸高矣牆成而重復削治之其聲馮馮然堅也五板為堵百堵皆同時而起上章言縮版者作廟也此言築者營宫室也民皆勸事樂功競欲出力其間欲令食息擊鼛鼓以為節不能勝而止之言大王之得民心也乃立臯門臯音羔傅曰王之郭門曰臯門疏曰宫之外郭之內臯門有伉音抗傳曰伉高貌乃立應門傅曰王之正門曰應門美大王作郭門以致臯門作正門以致應門焉疏曰孫炎云謂朝門也明堂位云庫門天子臯門雉門天子應門魯以諸侯而作庫雉則諸侯無臯應故以臯應為王門之名也朱氏曰書天子有應門春秋書魯有雉門禮記云魯有庫門家語云衛有庫門皆無云諸侯有臯應者則臯應為天子之門明矣意者大王之時未有制度特作二門其名如此及周有天下遂尊以為天子之門而諸侯不得立也應門將將音鏘傳曰將將嚴正也乃立冢土傳曰冢土大社也起大事動大衆必先有事乎社而後出謂之且美大王之社遂為大社也大社之大音泰疏曰大社者天子社名諸侯不得稱大社也冢土非諸侯之社云遂為大社皆言大王所作遂為文王之法也孫炎云大事兵也其祭之名謂之為冝冝求使見祐也祭法云王為羣姓立社曰大社郊特牲云天子大社必受霜露風雨以逹天地之氣也大社之名唯施於天子戎醜攸行傳曰戎大也醜衆也七章言作門社也大王乃立其宫之郭門其郭門伉然高大後遂為天子之臯門乃立其宫之正門其正門將將然嚴正後遂為天子之應門臯門應門皆從後稱之耳乃立大社為動大衆則告之而行也大王所立門社皆諸侯之制後乃為天子門社之名肆不殄厥愠釋詁曰肆故也肆故今也郭璞注肆既為故又為今今曰非謂肆為故今也朱氏曰肆猶遂也承上起下之辭蘇氏曰殄絶也愠怒也陳氏曰豈忘狄人之愠也亦不隕厥問傳曰隕墜也箋曰小聘曰問疏曰散則聘問通柞棫拔矣柞棫拔音鑿域斾柞曰柞櫟也即唐鴙羽所謂栩也解見鴇羽棫釋木曰棫白桵桵音綏郭璞曰桵亦小木也叢生有刺實如耳璫紫赤可啖陸璣疏曰王蒼説棫即柞也其材理全白無赤心者為白桵直理易破可為犢車輻又可為矛戟矜今人謂之白救或曰白柘此二説不同未知孰是曹氏曰拔遂茂也行道兊矣曹氏曰兊和悅也混夷駾矣混音昆駾音退從韻也釋文音兊説文曰駾馬疾行也傳曰突也維其喙矣喙許穢反釋文曰喙口也吕氏曰張喙而息也奔趨者其狀如此八章述大王能調服昆夷也不絶愠怒昆夷之心內為之備也然新遷之國未能與夷狄較亦不廢其聘問鄰國之禮外與之和也內備外和待夷狄之道盡矣及乎自治既至國勢益強柞棫之木拔然遂茂行道之人兊然和説則昆夷奔走竄伏張喙以息矣此形容昆夷逺避不侵犯之意耳詩記曰軍國之容雖備然大王猶未敢輕用其民也至於王業光大而不可掩郊關之內鬱鬱蔥蔥輪蹄輻湊則昆夷不待攘斥自奉頭鼠竄之不暇矣此章鄭氏以為指文王蓋見孟子言肆不殄厥愠亦不隕厥問文王也遂以此章為文王耳非也大王始居於豳則北有獯鬻之侵既遷於岐則西有昆夷之擾北狄大而西戎小豳地迫近強狄若以力爭傷人必多大王所不忍也故去豳而遷岐至若昆夷惟不殄不隕內備外和彼自不能為患矣此詩述大王本末謂雖退避於豳而能植立於岐也文王之始猶事昆夷則大王遷國之初雖為之備寧能遽絶其問乎此章以上皆言大王下章述虞芮之事提出文王蹶厥生方言文王耳陳氏謂孟子借之以説文王鄭氏踵之以為文王之詩其説是也下章論文王之事獨舉虞芮者謂遷岐之後治道修明傳至文王之時人心皆歸周矣雖虞芮猶且質成昆夷何能為梗乎結避狄遷岐之事也文王之興實因大王之遷岐故序曰本由大王也虞芮質厥成芮音枘蘇氏曰虞在陜之平陸芮在同之馮翊平陸有間原焉則虞芮之所讓也曹氏曰漢地理志河東大陽縣有吳山其上有吳城周武王封泰伯於此是為虞公其後為晉所滅又馮翊臨晉縣有芮鄉故芮國是虞芮二國皆在岐周之東也今曰質正也論語就有道而正焉謂求正之也毛以成為平謂曲直得其平則無爭也文王蹶厥生蹶音貴疏曰蹶動也今曰生者本然之良心與生俱生者以其生生不窮故謂之生猶孟子言生則烏可已傳曰虞芮之君相與爭田久而不平乃相與曰西伯仁人也盍往質焉乃相與朝周入其境則耕者讓畔行者讓路入其邑男女異路班白不提挈入其朝士讓為大夫大夫讓為卿王國之君感而相謂曰我等小人不可以履君子之庭乃相讓以其所爭田為間田而退天下聞之而歸者四十餘國張子曰訟獄者不之紂而之文王豫曰有疏附傳曰率下親上曰疏附疏曰率疏者令親附豫曰有先後先後皆去聲也傳曰相道前後曰先豫曰有奔走如字傳曰喻德宣譽曰奔奏疏曰喻天下以王德宣揚王之聲譽使天下皆奔走而歸趨之豫曰有禦侮傳曰武臣折衝曰禦侮九章述文王有虞芮質成之事也虞芮二國之君以爭田之訟質正而求其平意謂文王所定曲直必無偏陂也文王有以感動其本然之良心乃使之自忘其爭焉人之良心如木之有根生生不窮故謂之生虞芮以忿爭汨其良心如木有物以閼音遏其生理不得遂其暢茂然其所謂生生不窮者未嘗絶也逮夫感文王之化而翻然自悟如去其壅閼而生意沃然矣一念既改百行萬善皆由是而充之此之謂蹶厥生言撥發其生意也非有以增益之皆彼所自有也詩人推原致化之妙以為我謂其有疏附之臣而致之歟我謂其有先後之臣而致之歟我謂其有奔奏之臣而致之歟我謂其有禦侮之臣而致之歟泛言四臣之所致而不敢為一定之辭見文王之化有非四臣之所能為者矣綿九章章六句棫朴音域卜文王能官人也朱氏曰自此以下至假樂皆不知何人所作疑多出於周公也不棄微小所以為能官使人材也芃芃棫朴芃音蓬傅曰芃芃木盛號棫白桵也朴枹木也桵音綏枹音包木叢生也補傳曰芃芃短小而盛貌棫解見綿箋曰白桵相朴屬而生者疏曰考工記云凡察車之道欲其朴屬而微至注云朴屬猶附著堅固貌也此謂朴者亦謂根枝迫迮相附著之貌迮音窄薪之槱之槱音酉傳曰槱積也濟濟辟王辟音壁箋曰濟濟敬也辟君也辟王謂文王也疏曰濟濟多容儀也左右趣之趣音娶傳曰趣趨也首章述文王用材不棄微小也興也棫小木又朴屬而叢生根枝相附著若無所用然芃芄然短小而盛猶可用之為薪以烹飪其未乾者又積之以待其乾而用之喻文王用人或隨材而用或蓄之以待用雖微不棄況其大者乎得人若此故文王端拱無為濟濟然有威儀而左右之臣趨而事之也歐陽氏曰見君臣之盛也辟王從後尊稱之辭濟濟辟王左右奉璋音章傅曰半圭曰璋箋曰璋璋瓉也祭祀之禮王裸以圭瓉諸臣助之亞祼以璋瓉疏曰玉人云大璋中璋邊璋皆是璋瓉也以璋言之郊特牲云灌以圭璋與此云奉璋峩峩皆有明文故知璋為璋瓉矣祭之用瓉唯裸為然祭統云君執圭瓉祼尸大宗伯執璋瓚亞裸曹氏曰璋以為瓉柄所以為裸也裸將解見文王王瓉解見旱麓奉璋峩峩音俄傳曰峩峩盛壯也錢氏曰衣冠壯偉之貌髦士攸冝髦音毛傳曰髦俊也次章述祭事之得人也濟濟然多威儀之君王其在宗廟祭祀則左右之臣奉璋瓉以相其禮其奉璋者峩峩然壯偉此俊士之所冝為言得人也曹氏曰國之大事在祀與戎故二章言祀事三章言戎事淠彼涇舟淠音譬徐音沸王氏曰淠舟行貌涇解見邶谷風蒸徒楫之楫音接傳曰楫棹也棹直教反亦作棹釋文曰楫謂之橈或謂棹釋文云在傍撥水曰棹周王于邁疏曰周王文王也箋曰于往邁行也往行謂出兵征伐也六師及之傳曰天子六軍疏曰瞻彼洛矣云以作六師常武云整我六師皆謂六軍為六師夏官序言五師為軍萬二千五百人也詩為大雅莫非王法詩人之作或以後事言之春秋之兵雖纍萬之衆皆稱師軍之言師乃是常稱傳曰及與也三章述戎事之得人也興也涇水之舟淠淠然順流而行者乃衆徒以楫行之文王為西伯奉王命以征伐則六軍與之俱進文王未有六軍以大雅皆述王者之事故言六軍耳歐陽氏曰以見王所官人入宗廟居軍旅皆可用言文武之材各任其事也詩人指山川為喻皆以土地所見者言之若文王始居岐則當言渭水若後居豐則當言豐水涇非耳目所及而言涇舟者蓋此述行師所見也文王之時北有玁狁之難文王以天子之命命將遣戌以討之必渡涇水宣王時玁狁嘗侵至涇陽則周伐玁狁必渡涇水可見矣倬彼雲漢倬音卓桑柔箋曰倬明大貌傅曰雲漢天河也解見雲漢詩為章于天周王壽考箋曰文王是時九十餘矣故云夀考遐不作人傅曰遐思也朱氏曰作人謂變化鼓舞之也董氏曰遐不作人甚言其作也曹氏曰作者鼓舞振動之意也商之末世士氣卑弱甚矣非鼓舞振動之烏能自奮而有成哉四章言由文王之化能作成人材也興也雲漢倬然明大為文章于天人皆仰之猶文王以文治昭揭於上人所觀瞻也文王自少至老所以興起人心者非一日矣逺不作人乎言久於其道而化成也人心之善作之則興凡自暴自棄習俗益流於下者由上之人無以興起之耳孟子云經正則庶民興又云待文王而興者凡民也又云奮乎百世之上百世之下聞者莫不興起也人同此心心同此理非外立一道以疆其所無特作而興之使之自不能己不知所以然而然如樂則生矣生則烏可己不知手之舞之足之蹈之也追琢其章追音堆傳曰追雕也金曰雕王曰琢疏曰毛以此經上下相成所追瑑者即金玉也朱氏曰追之琢之今曰箋引春官追師掌追衡笄則追亦治玉今從毛金玉其相朱氏曰金之玉之傳曰相質也邱氏曰表裏如一所以為賢也勉勉我王箋曰我王謂文王也綱紀四方箋曰張之為綱理之為紀疏曰説文云綱綱絃也紀别絲也然則綱者網之大繩故盤庚云若網在綱有條而不紊以舉網能張網之目故張之為綱也紀者别理絲縷故理之為紀以喻為政有舉大綱者有理微細者五章言作成人材而提綱領以振起之也興也文王作人外則追琢之使有成器之文內則金玉之使有可貴之質作人之效如此文王猶勉勉不已以維持四方而綱紀之也棫朴五章章四句旱麓音鹿受祖也周之先祖世修后稷公劉之業大王王季申以百福千祿焉疏曰詩言文王受其祖之功業也祖謂大王王季以前也吕氏曰大雅自文王至靈臺皆文王詩故受祖不待言文王也此詩以旱麓榛楛起興言文王承前人積纍而興所謂受祖也周之先祖以下則講師附益其辭贅矣鄭氏因後序有大王王季之説遂以詩中豈弟君子為大王王季毛不見後序本自無説孔氏謂毛亦以為大王王季是承襲之訛也當從朱氏以詩中君子為文王瞻彼旱麓傳曰旱山名也麓山足也説文曰林屬於山為麓榛楛濟濟榛楛音臻戶榛解見邶簡兮陸曰楛木莖似荆而赤其葉如蓍上黨人蔑以為莒箱又屈以為叉曹氏曰楛可以為箭傳曰濟濟衆多也豈弟君子豈音愷朱氏曰君子指文王也干祿豈弟傳曰干求也首章言文王受祖以德也興也麓承山之氣者也其山高大則麓之得其氣也深厚謂峯巒回合之所芘雲雨潤澤之所漸也其氣深厚故草木茂盛培塿無松柏培音剖塿郎斗反由其氣薄也今視旱山之麓得山氣之厚故榛楛之木濟濟然衆多山喻先祖麓喻子孫榛楛喻福祿興文王承先祖積纍之厚故其福祿盛大也受祖者必有德以受之文王有豈弟之德故其求福也亦以是豈弟豈弟者德盛仁熟和順充積之謂也干祿非文王之心詩人言干祿者謂在我有以致之猶曰自求多福耳非有心求之也毛氏以旱為山名不知山之所在或取漢地理志漢中郡南鄭縣之旱山以實之詩人託山川以起興皆取其在境內者漢中逺於豐鄗豐鄗之間高山多矣何獨逺取漢中之旱山乎既非耳目所及何言瞻也旱山不知所指闕其所不知可也詩記曰周語言此章之義曰夫旱麓之榛楛殖故君子得以易樂干祿焉若夫山林匱竭林麓散亡藪澤肆既民力凋盡田疇荒蕪資民力凋盡田疇荒蕪資用乏而何易樂之有焉然則所謂榛楛濟濟者蓋當時所見之實也至于詩人發興則周語不能盡其義瑟彼玉瓉瑟音蝨瓉才贊反黃流在中程子曰瑟密也錢氏曰聘義言比德於玉縝密以栗注云縝緻也栗堅貌緻音治密也傳曰玉瓉圭瓉也黃金所以飾流鬯也九命然後賜以秬鬯圭瓉箋曰黃流秬鬯也圭瓉之狀以圭為柄黃金為勺青金為外朱中央矣殷王帝乙之時王季為西伯以功德收此賜疏曰瓉者盛鬯酒之器以黃金為勺而有鼻口鬯酒從中流出故云黃金所以飾流鬯也漢瓉槃口徑一尺則瓉如勺為槃以承之也天子之瓉其柄之圭長尺有二寸其腸諸侯蓋九寸以下孔叢子子思云王季九命作伯於西受圭瓉秬鬯之賜故文王因之得専征伐秬黑黍也秬鬯者釀秬為酒以鬱金草和之使之芬芳條鬯故謂之秬鬯草名鬱金則黃如金色酒在器流動故謂之黃流秬鬱解見江漢今考毛謂以黃金為勺酒流出而照見其黃鄭謂和以鬱金草故在中流動而黃非流出也豈弟君子福祿攸降箋曰降下也次章言盛德必得其福也興也瑟然縝密之玉瓉必有秬鬯黃流在其中豈弟之君子必有福祿下其躬言以類應也王季受圭瓉之賜而文王因之亦受祖也旱麓圭瓉皆當時所見之實朱氏曰明實器不薦於褻味而黃流不注於瓦缶則知盛德必享於祿夀而福澤不降於淫人矣鳶飛戾天鳶音沿曰鳶鴟也今曰箋以鳶為鴟之類疏引蒼頡解詁及陸璣山陰陸氏皆以為即鴟也當從衆箋曰鳥之貪惡者也疏曰説文云鳶鷙鳥擊小鳥故為貪殘釋鳥曰鳶鳥醜其飛也翔郭璞曰布翅翺翔山陰陸氏曰高飛曰翺布翼不動曰翔曲禮云前有塵埃則載鳴鳶鳶鳴則將風故也鳶鈍者也以風作之則高飛昔墨子作木鳶飛二日不集列子所謂班輸之雲梯墨翟之飛鳶是也今人乘風放紙鳶箋曰戾至也魚躍于淵豈弟君子遐不作人三章言作人之妙也興也鳶飛至天魚躍其淵言天壤之內莫不自得其性而不知所以然也豈弟文王遐不作人乎言有以興起之而使之不自已也遐言作人之久也作之以豈弟是性天感發之妙自有手舞足蹈而不自知者惟久於其道者能之非意氣鼓舞於一時之暫也作人又解見棫朴李氏曰抱朴子云鳶飛在下無力及至乎上聳身直翅而已蓋鳶飛更不用力亦如魚躍恬然自得不知其所以然而然也謝氏曰猶韓愈謂魚川泳而鳥雲飛上下自然各得其所也詩人之意言如此氣象周家作人似之詩記曰作人之盛至於鳶飛魚躍非積纍熏陶久且熟者則不能然其來蓋有自矣此序所謂受祖也朱氏曰子思云言其上下察也借此以形容道體周流充塞天地其大無外其小無內動靜之間無往不造其極無有毫髮凝滯倚著之意其旨深矣清酒既載邱氏曰清酒清潔之酒也清酒有考見信南山箋曰載謂已在尊中也今曰載猶盛也盛平聲騂牡既備騂息營反疏曰騂牡赤牡之牲也大王王季為殷之諸侯其牲亦應不毛此作者於後據周所尚而言之董氏曰方文王時周固未有所尚而騂牡蓋以色自别耳今曰充人及祭義凡祭祀之牲皆擇而養之三月備者豫備也非牲酒瘠酸取具臨時也以享以祀以介景福箋曰介助也景太也四章述祭則受福也文王既成民而後致力於神清潔之酒既載之於尊中赤色之牡牲既已豫備以之獻享以之祭祀使先祖歆饗之而助之以大福李氏曰君子之受福豈以清酒騂牡之故而得之哉古人奉牲以告所謂馨香無讒慝也如此則降之以福瑟彼柞棫程子曰瑟密茂之狀柞棫解見綿民所燎矣燎音料今曰箋以為柞棫之所以茂盛者乃人熂燎除其旁草養治之使無害也不若錢氏以為民取以供燎不費辭也熂音餼芟草燒之曰熂豈弟君子神所勞矣勞去聲箋曰勞來猶言助佑五章言受福之本也興也柞棫瑟然密茂則民取以為薪而燎之矣文王有豈弟之德則神所佑助而賜之福矣岐山柞棫斯拔亦所見之實也一説此柞棫之茂盛其長育之者非一日故民得以為薪燎之用猶文王之得福由其先祖之積纍也莫莫葛藟朱氏葛覃傅曰莫莫茂密也施于條枚施音異葛覃傅曰施移也箋曰葛藟延蔓於木之枝本喻子孫依緣先人之功而起汝墳傅曰枝曰條幹曰枚豈弟君子求福不回六章明求福之心也興也莫莫然而密茂者是葛也藟也延蔓於木之枝幹喻文王憑先祖之功而起也文王豈樂弟易其求福不回邪也表記言得之自是不得自是以聽天命遂引此章蓋有一毫覬幸之心則邪矣旱麓六章章四句詩緝卷二十五
