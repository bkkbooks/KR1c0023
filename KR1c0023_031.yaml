body:
  text: 詩緝卷三十一宋嚴粲撰韓奕音亦尹吉甫美宣王也能錫命諸侯箋曰梁山於韓國之山最髙大為國之鎮所望祀焉故美大其貌奕奕然謂之韓奕也韓姬姓之國也後為晉所滅故大夫韓氏以為邑名焉幽王九年王室始騷鄭桓公問于史伯曰周衰其孰興乎對曰武實昭文之功文之祚盡武其嗣乎武王之子應韓不在于晉乎疏曰能錫命諸侯謂賞賜韓侯命為侯伯也不言韓侯者欲見宣王之所錫命非獨一國而已故變言諸侯以廣之襄二十九年左傳說晉滅諸國云霍揚韓魏皆姬姓也此韓是武王之子晉之滅韓未知何君之世宣王之時韓為侯伯武公之世萬已受之蓋晉文侯輔平王為方伯之時滅之也李氏曰此詩言錫命者蓋宣王鍚韓侯以命耳所謂能者蓋錫之者非妄豫而得之者非妄受春秋書錫命者三莊公元年王使榮叔來錫公命文元年天王使毛伯來錫公命成八年天子使召伯來錫公命錫之者皆妄豫而得之者皆妄受何以為能鍚命乎韓侯來朝而歸尹吉甫作詩以送行也奕奕梁山傳曰奕奕大也疏曰梁山韓國所在曹氏曰漢地理志云禹貢梁山在馮翊夏陽縣西北而唐同州馮翊縣有韓城古韓國即少梁也李氏曰禹貢云治梁及岐今在同州彭城縣其後屬晉春秋時梁山崩乃晉望也爾雅云梁山晉望也孫炎注云晉國所望祭則是韓滅之後故以為晉之望維禹甸之甸音奠鄭音盛傳曰甸治也有倬其道倬音卓箋曰倬著明也疏曰有倬然著明之道韓侯受命李氏曰非韓魏趙之韓乃武王之後左氏所謂邘晉應韓也受命受命為侯伯也邘音于見僖二十四年疏曰謂為州牧也以其言奄受北國知非東西大伯也王親命之纘戎祖考箋曰戎猶汝也無廢朕命夙夜匪解音懈今曰解怠也䖍共爾位共鄭音恭毛音拱傳曰䖍固也疏曰共恭敬也朕命不易曹氏曰韓侯能繼其祖考朕豈復易其命哉幹不庭方箋曰作楨幹而正之蘇氏曰不庭不來庭也今曰隱十年左傳云以王命討不庭常武徐方來庭以佐戎辟音璧首章美宣王能錫命韓侯也宣王命韓侯為州牧是宣王興衰撥亂之事詩人因地起興以宣王之功配禹也言梁山在韓國之境內奕奕然髙大昔有水患乃大禹甸治之也今宣王中興有倬然著明之道俾韓侯受命為侯伯亦在梁山之傍其功與大禹先後相輝也有倬其道言周道粲然復興也宣王親自命之云當繼汝先祖先考之舊職無廢棄我之命見韓侯先世嘗為州牧矣親命之者見宣王丁寧告戒之意若曠瘝其官是廢棄朕命也今汝能早夜不怠䖍固共敬爾之職位故朕命不復改易言因其先世之舊也有不來庭之方國汝當作楨幹而正之以佐助汝君謂以王命討不庭也毛氏以為禹治梁山除水災宣王平大亂命諸侯有倬然之道者也其說為長孔氏釋毛以為美韓侯復禹之功以韓侯配禹擬非其倫失毛意矣功莫大於禹故詩人言人君之功多配禹言之文王有聲言豐水東注維禹之績而繼之以皇王維辟以武王之功配禹也信南山言信彼南山維禹甸之而繼之以曾孫田之以成王之功配禹也此詩亦以宣王之功配禹也四牡奕奕今曰上奕奕為大此亦大也解見車攻孔修且張傳曰修長也駉傳曰腹幹肥張也韓侯入覲傳曰覲見也以其介圭疏曰毛氏於嵩髙以介圭為所執之瑞則此言介圭亦為瑞也今曰箋以為貢國所出之寶今不從入覲于王王錫韓侯淑旗綏章綏毛音緌鄭音雖傳曰淑善也交龍為旗綏大綏也疏曰淑旗旗之善者綏即王制所謂天子殺下大綏者是也天官夏采注云徐州貢夏翟之羽有虞氏以為綏後世或無染鳥羽象而用之或以旄牛尾為之綴于幢上所謂注旄于竿首者然則綏者即交龍旗竿所建與旗共一竿為貴賤之表章故云綏章鄭以綏為所引登車者即少儀所謂執君之乘車僕者負良綏此綏是升車之索當以采絲為之故云綏章謂有采章也簟茀錯衡簟甜之上濁茀音弗箋曰茀者車之蔽簟者席之名用席為蔽傳曰錯衡文衡也疏曰錯置文采為車之衡𤣥衮赤舄音昔疏曰以𤣥為衣而畫以衮龍赤舄赤色之舄鉤膺鏤錫音漏羊鉤膺解見采芑箋曰眉上曰錫刻金飾之今當盧也疏曰以鏤金加於馬面之錫風有子之清揚抑若揚兮是揚者人面眉土之名故云眉上曰揚人既如此則馬之鏤錫施鏤於揚之上矣釋器云金謂之縷故知刻金為飾若今之當盧巾車注亦云錫馬面當盧刻金為之所謂鏤錫當盧者當馬之額盧在眉眼之上所謂鏤錫指此文也鞹鞃淺幭鞹苦郭反鞃音𢎞幭音覓又音蔑傳曰鞹革也鞃軾中也淺虎皮淺毛也幭覆軾也疏曰革去毛之皮也軾者兩較之間有橫木可憑者鞹鞃者以去毛之皮施于軾之中央持車使牢固也獸之淺毛者唯虎耳幭字禮記作幦周禮作䄙字異義同以淺毛之皮為幭也較音角鞗革金厄鞗音條鞗革解見蓼蕭箋曰金厄以金為小鐶往往纒扼之疏曰往往者言其非一二處也次章述韓侯入覲受錫豫也韓侯在道乘奕奕然大之四牡其形甚修長而且腹幹肥張將以入京師而朝覲既至京師乃以其所執之大圭入而朝見于王王於是錫賚韓侯以交龍之旗擇其善者豫之建旗之竿其上又有大綏以為表章又以漆簟為車之蔽茀又錯置文采為車之衡又以𤣥為衣而畫以衮龍又有赤色之舄馬則有婁頷之金鉤及馬胸膺有樊纓之飾又以鏤金加於馬面之錫又以去毛之皮鞹施於軾中央之鞃又以虎皮淺毛幭覆其軾又有鞗皮為轡首之革以金為小環纒扼之韓侯出祖箋曰祖將去而祀軷也既覲而反國必祖者尊其所往去則如始行焉祖于國外畢乃出宿祀軷解見生民出宿于屠音徒傳曰屠地名也顯父餞之父音甫箋曰顯父周之公卿也疏曰送行飲酒曰餞清酒百壺其殽維何炮鱉鮮魚炮音庖炮鱉解見六月箋曰鮮魚中膾者也疏曰新殺謂之鮮魚餒則不任為膾其蔌維何蔌音速傳曰蔌菜殽也疏曰蔌者菜茹之總名對肉殽故云菜殽謂為菹也維筍及蒲筍字亦作笋箋曰筍竹萌也蒲深蒲也傳曰蒲蒲蒻也蒻音弱疏曰醢人加豆之實有深蒲笋菹是菹有笋有蒲也天官醢人注云深蒲蒲始生水中是也蒲始生取其中心入地蒻大如匕柄正白生噉之甘脆鬻而以苦酒浸之如食笋法鬻煮同其贈維何箋曰贈送也王既使顯父餞之又使送以車馬疏曰贈者以物送人之名卿大夫無乘馬路車之名則非顯父贈之乘馬路車乘去聲疏曰采薇彼路斯何大夫亦為路車者以路名本施人君因其散文卿大夫亦得稱路耳籩豆有且沮之平箋曰沮多貌侯氏燕胥箋曰侯氏諸侯在京師未去者於顯父餞之時皆來相與燕胥者也今曰頌有駜于胥樂兮三章述韓侯既覲而還也出京師之門為祖道之祭祖畢將欲出宿于屠地於祖之時王使公卿餞送之其清美之酒多至于百壺其殽饌有以火煮熟之鱉與中膾之鮮魚其蔌菜有笋與深蒲王贈送之物乃有四馬與路車其籩豆且然而多其在京師未去之諸侯於是飲燕而皆在言俱來餞送之也韓侯取妻取音娶汾王之甥汾音焚箋曰汾王厲王也厲王流于彘彘在汾水之上故時人因以號之猶言莒郊公黎比公也姊妹之子為甥比音毗解頥新語曰猶晉侯居翼謂之翼侯晉人納諸鄂謂之鄂侯鄭叔段居京謂之京城大叔及出奔共謂之共叔也又楚人謂王不終者為敖葬郟者曰郟敖葬訾者曰訾敖其汾王之類乎說者以莒郊公黎比公為比非也按左氏傳莒夷無諡於是有黎比公郊公兹丕公著丘公皆以號為稱與汾王以地為稱不類矣蹶父之子父音甫傳曰蹶父卿士也疏曰韓侯取妻必于貴家蹶氏父字不書國爵則非諸侯下言靡國不到則是為王聘使之人故知卿士也韓侯迎止于蹶之里傳曰里邑也百兩彭彭兩音亮彭音棚百兩解見鵲巢彭彭考見出車八鸞鏘鏘不顯其光箋曰不顯顯也諸娣從之娣音弟釋文曰妻之女弟曰娣傳曰諸侯一娶九女二國媵之諸娣衆妾也箋曰媵者必娣姪從之獨言娣者舉其貴者疏曰莊十九年公羊傳云媵者何諸侯娶一國則二國往媵之以姪娣從姪者何兄之子娣者何女弟也諸侯一娶九女祁祁如雲傳曰祁祁徐靚也如雲言衆多也靚音靜韓侯顧之爛其盈門四章述韓侯取妻也韓侯既覲而還遂以親迎所娶乃是厲王之外甥是卿士蹶氏父字之子言尊貴也韓侯親自迎之於彼蹶父之邑里其迎之時有百乘之車彭彭然壯盛每車皆有八鸞其聲鏘鏘然而鳴車馬之盛禮儀之備豈不顯其有光榮乎其妻出於蹶父之門諸娣媵妾隨而從之其行祁祁然徐靚如雲之衆多韓侯回顧而視之見其鮮明粲爛盈滿於蹶父之門也蹶父孔武靡國不到為韓姞相攸為去聲姞其一反相去聲傳曰姞蹶父姓也箋曰攸所也莫如韓樂音洛孔樂韓土川澤訏訏音許傳曰訏訏大也魴鱮甫甫鱮音序魴鱮解見齊弊笱傳曰甫甫大也麀鹿噳噳麀音憂噳音禦傳曰噳噳衆也有熊有羆音碑解見斯干有貓有虎貓苗茅二音傳曰貓似虎淺毛者也慶既令居令去聲箋曰令善也韓姞燕譽五章述蹶父相攸也蹶父甚武健嘗為王使於天下無國不到為其女姞氏相視其所居無如韓國最樂甚樂矣韓國之土也川澤訏訏然大魴鱮甫甫然大麀鹿噳噳然衆又有熊羆猫虎此四獸能為人患而言之者見有深山大澤為大國也蹶父既喜慶其有此善居韓姞則安之而又有顯譽王氏曰韓侯取妻何預于王政而詩言此蓋汾王失道王室幾喪為諸侯所卑則王甥亦安能相攸惟宣王任賢使能然後汾王之甥更為樂國賢君之所願娶而威儀備具光顯如此乃所謂邦之榮懷也詩記曰詩人述宣王能錫命諸侯而因道其娶之盛王室尊安人情暇樂莫不在其中矣溥彼韓城溥音普箋曰溥大也燕師所完燕王肅平聲毛鄭如字完音桓王肅曰燕北燕國朱氏曰燕召公之國也韓初封時召公為司空王命以其衆為築此城如召伯營謝山甫城齊春秋諸侯城邢城楚丘城緣陵城杞之類皆合諸侯為之霸令尚如此則周之盛時命燕城韓固常政也傳曰師衆也以先祖受命傳曰韓侯之先祖武王之子也因時百蠻箋曰韓侯先祖封為韓侯居韓城為侯伯其州界外接蠻服因見使時節百蠻貢獻之往來後君微弱用失其業今王以先祖韓侯之事如是而韓侯賢故於入覲使復其先祖之舊職疏曰其有貢獻往來為之節度也四夷之名南蠻北狄散則可以相通故北狹亦謂蠻也王錫韓侯其追其貊追如字又音堆貊音陌傳曰追貊戎狄國也箋曰其後追也貊也為玁狁所逼稍稍東遷疏曰稍稍東遷者以經傳說貊多是東夷故職方掌四夷九貊鄭志答趙商云九貊即九夷也又秋官貊𨽻注云征東北夷所獲是貊者東夷之種而分居於北故於此時貊為韓侯所統魯頌云淮夷蠻貊莫不率從是於魯僖之時貊近魯也至於漢氏之初其種皆在東北於并州之北無復貊種故辨之奄受北國傳曰奄撫也因以其伯箋曰因以其先祖侯伯之事盡豫之疏曰夏官職方氏正北曰并州言受王畿北面之國當是并州牧也實墉實壑傳曰言髙其城深其壑箋曰韓侯之先祖微弱所受之國多滅絶今復舊職故興滅國繼絶世疏曰上論韓城既完則實墉實壑非韓之城壑自然是所部諸國之城壑也今言修之明是往前絶滅今韓侯既復舊職而興繼之也實畝實籍箋曰籍稅也獻其貔皮貔音皮釋獸曰貔白狐其子豰豰呼木反音熇郭璞曰一名執夷虎豹之屬陸璣曰貔似虎或云似熊赤豹黃羆疏曰毛赤而文黑謂之赤豹毛白而文黑謂之白豹有黃羆有赤羆大於熊其脂如熊白而粗理不如熊白美也禹貢梁州貢熊羆狐狸是中國之常貢此則北夷自以所有而獻之所謂各以貴寶也六章述韓侯總統百蠻也溥大矣韓國之城其初封之時乃召公為司空以燕國之衆築完之韓國之城舊矣宣王以此韓侯之先祖嘗受王命為一州之伯因其國近蠻使時節百蠻之貢獻韓侯先祖既如此故今宣王賜韓侯以追人貊人撫受北方之國因以其先祖侯伯之事盡與之使復為州牧也中間韓侯之先微弱所受之國多滅絶今復舊職興滅國繼絶世令築其城墉深其池壑正其田畝定其稅籍皆使之復於故常又令百蠻追貊獻其貔獸之皮及赤豹黃羆之皮於王而韓侯總領之也韓奕六章章十二句江漢尹吉甫美宣王也能興衰撥亂疏曰於時淮水之上有夷不服是衰亂之事而命將平定是興撥之事也此實平定淮夷耳而言興衰撥亂者見宣王之所興撥非獨淮夷而已故言興撥以廣之命召公平淮夷陳氏曰淮夷而地不一徐州在淮北徐州有夷則淮夷之在北者也揚州在淮南揚州有夷則淮夷之在南者也江漢常武二篇同為宣王之詩而同言淮夷召虎既平淮夷而告成于王矣常武之詩又曰鋪敦淮濆仍執醜虜故知淮夷之地不一以地理考之曰江漢之滸王命召虎者是淮南之夷也若在淮北則江漢非所由入之路矣曰率彼淮浦省此徐土者是淮北之夷也若在淮南則徐土非聮接之地矣疏曰召公伐淮夷當在淮水之南魯僖所伐淮夷應在淮水之北當淮之南北皆有夷矣此詩王命召虎平淮南之夷也江漢浮浮疏曰禹貢嶓冢導漾東流為漢又東為滄浪之水過三澨至于大别南入于江是至大别之南漢與江合而東流漢地理志大别在廬江安豐縣界則江漢合處在揚州之境浪音郎渤海胡氏曰杜預云禹貢漢水至大别南入江在江夏界疏謂大别在廬江安豐縣按漢水入江乃今漢陽軍之大别山山之北漢口是也漢口亦曰沔口亦曰夏口江東即鄂州江夏郡也至安豐一千五百里豈江漢相合古今不同哉今曰浮浮水滿而流貌武夫滔滔音叨王氏曰滔滔以其衆逝也蘇氏曰順流貌匪安匪遊淮夷來求疏曰正是來求淮夷古人之語多倒今曰左傳宣十二年趙括趙同云率師以來唯敵是求既出我車既設我旟旟解見鄘干旄匪安匪舒淮夷來鋪平聲朱氏曰鋪陳也陳兵以伐之也今曰即常武鋪敦淮濆之鋪首章述進兵也興也宣王命召虎平淮南之夷由江漢進兵因以起興言江漢合流浮浮然水滿而流猶士卒滔滔然順流而下其勢不可禦也即常武如江如漢之意也持重之師不貪利疾趨疑於遲緩故言非敢安處非敢遊息當時南征北伐四方略定惟淮夷未平故召公從容臨之而有餘也此行止為淮夷而來求討其罪耳見餘方已定也既已出我戎車既已張設我旟非敢安處非敢寬舒止為淮夷而來陳兵以伐之耳匪安匪遊匪安匪舒即常武匪紹匪遊之意也江漢湯湯音商釋文曰湯湯流盛也武夫洸洸音光又音汪傳曰洸洸武貌李氏曰有洸有潰是亦武貌經營四方李氏曰所謂經營四方但是經營淮夷如後世征伐夷狄則曰有事于四方夷狄耳告成于王箋曰克勝則使傳遽告成于王傳張戀反疏曰傳遽若今時乘驛遞傳而遽疾故謂之傳遽也四方既平王國庶定箋曰庶幸也時靡有爭王心載寧箋曰載之言則也次章述告成也江漢之水湯湯然流盛興武夫洸洸然武壯召公之伐淮夷所以經營四方之治也淮夷止是南方南方未寧則四方皆將騷動故經營南方而謂之四方也告功于王南方既定則四方皆已平矣外寧則內安故王國幸已安定無有叛戾乖爭者向也宣王以天下未安為憂今則可以安寧矣江漢不言戰事首章言王師之持重二章即言告成蓋淮夷望風而服不待戰也周興西北岐豐去江漢最逺故淮夷最難服從化則後孚倡亂則先動周人經理淮夷用力最多成王初年淮夷同三監以叛其後又同奄國以叛伯禽就封又同徐戎以叛至厲王之時四夷交侵宣王一命吉甫北方旋定繼命方叔伐蠻荆其後又命召公平淮南之夷又命皇父平淮北之夷蓋南方之役至再至三淮夷未平則一方倡亂天下皆危故至淮夷平然後四方平此江漢常武所以為宣王之終事而繫之宣王大雅之末也江漢之滸音虎沈音許箋曰滸水涯也今曰江漢之滸指江北接淮南之地也王命召虎式辟四方辟音闢徹我疆土匪疚匪棘疚音救箋曰疚病也棘急也王國來極箋曰極中也使來于王國受政教之中正于疆于理疆理解見信南山至于南海詩記曰淮夷在南故極其逺而言之曰至于南海三章述平賦也上章告成則淮夷平而四方無事矣古人伐叛討二之後則必去其苛政平其賦斂以慰民心故此章言徹法之事召虎既成功于江漢之滸王因命召虎由此地以開闢四方而施徹法於疆土武事僅定而即行疆理賦稅之法疑于病民且疑于急迫矣宣王謂我非疚也非棘也蓋什一天下之中正乃我周之定制欲天下皆於王國來取中焉耳召公宜往而疆之以正其疆界往而理之以分其土宜推而至于南海之逺淮夷在南故曰至于南海王命召虎來旬來宣來毛如字鄭音賚旬音巡又音荀傳曰旬遍也今曰桑柔其下侯旬傳云隂均也此亦為均又易豐卦雖旬無咎注旬均也蘇氏曰宣布也文武受命召公維翰無曰豫小子召公是似傳曰似嗣也箋曰女無減損曰我小子耳女之所為乃嗣女先祖召康公之功肇敏戎公肇音兆詩記曰肇始也傳曰敏疾也公事也箋曰戎猶汝也用錫爾祉音恥釋文曰祉福也四章述褒功錫祉也武功已成疆理已定故此章美召虎之功而錫命之言向者淮夷之民獨不霑王化是不均也由淮夷之君壅遏而不宣也王之命召虎來此南方使旬均之而無外宣布之而無壅也昔文王武王受天命之時汝祖康公為翰幹之臣汝召虎無自謙曰我小子耳今汝之功乃足以繼嗣康公我用此賜汝以福即下章所陳是也舊說以為述康公之功以勉虎如此則與用錫爾祉及下章意不接續此詩武功已成當為美其克紹康公也釐爾圭瓚釐音離瓚才贊反傳曰釐賜也九命賜圭瓚秬鬯疏曰賜汝以圭柄之玉瓚解見旱麓秬鬯一卣秬鬯音巨暢卣酉由二音秬鬯釋草曰秬黑黍傳曰鬯香草也築煮合而鬱之曰鬯箋曰秬鬯黑黍酒也謂之鬯者芬香條鬯也疏曰禮有鬱鬯者築鬱金之草而煮之使之芬香條鬯毛言秬鬯者必和鬱乃名鬯未和不為鬯鄭以黑黍之酒自名為鬯不待和鬱也春官鬯人注云秬鬯不和鬱者是黑黍之酒即名鬯也鬱人掌和鬱鬯明鬯人所掌未和鬱也故孫育云鬱是草名今之鬱金煮以和酒者也鬯是酒名非草名箋說為長卣釋器曰彜卣罍器也卣中尊也釋曰孫炎云尊彜為上罍為下卣居中郭璞云不大不小者是在罍彜之間案禮圖六彜為上受三斗六尊為中受五斗六罍為下受一斛春官鬱人掌和鬱鬯以實彛而陳之則鬯當在彜而此及尚書左傳皆云秬鬯一卣者當祭之時乃在彜未祭則在卣賜時未祭故卣盛之告于文人傳曰文人文德之人也朱氏曰先祖之有文德者謂文王也又告于文人而錫之今曰下云于岐周告先王之廟知文人為文王也錫山土田于周受命今曰此周當指豐也文王之廟在焉箋以為岐周疏申箋義以為岐周有别廟錢氏以為鎬京今皆不從解見嵩髙王餞于郿自召祖命曹氏曰自從也虎拜稽首稽音啓今曰舜典禹拜稽首首至地也春官大祝辨九􅉔一曰稽首􅉔音拜箋曰拜稽首者受王命策書也天子萬年箋曰君恩無可以報謝者稱言使君夀考而已五章述受賜報上之意也今賜汝圭柄之玉瓚副以秬鬯之酒以一卣尊盛之乃告于文德之人文王而賜之又賜之以山川又加益以土田令虎往豐邑以受命于文王之廟蓋自乃祖康公已受此命美其世勳也虎受君恩祝君夀考而已虎拜稽首對揚王休箋曰對答也休美也陳氏曰王之休命也作召公考箋曰作為也傳曰考成也天子萬夀明明天子令聞不已聞音問矢其文德傳曰矢施也洽此四國錢氏曰洽浹洽也六章申報上之意而納君於德也對揚如傅說對揚天子之休命對謂答其命揚謂奉揚而行之也成者毁之對康公立大勳於王室而後嗣子孫不能繼之則康公之功業將毁矣王稱虎能繼康公之功虎謂王命如此我不敢不勉期為康公之成謂不毁墜其功也於是祝君不徒得萬年之夀願君德明而益明其善譽垂于無窮惟施其文德以浹洽四方之國而用武之迹泯矣宣王方以武功褒虎而虎乃以文德勉宣王蓋不矜己之功而納君于德意度逺矣朱氏曰言武功之不可恃亦所以戒之也江漢六章章八句常武召穆公美宣王也有常德以立武事因以為戒然朱氏曰詩中無常武字召穆公特名其篇蓋有二義有常德以立武則可以武為常則不可此所以有美而有戒也解頥新語曰召穆公之意謂德為可常武不可黷故先極言其用兵之盛以滿其志卒章乃陳警戒之言故其言易入也昔之為詞賦者或竊取其義而後人以曲終奏雅勸百諷一譏之是不知其得古詩之意也此詩王親征淮北之夷及徐方也召公既平淮南之夷未幾淮北之夷復挾徐方以叛宣王於是親征之王肅述毛以為王不親行王基述鄭以為王自親行詩言有嚴天子王舒保作王奮厥武皆以王言之今從王基述鄭為王親征宣王憤揮天戈克淮服徐無不如意召公慮其狃勝而喜功也故因美而戒之伐淮有進厥虎臣仍執醜虜是戰而勝也徐方畏威不戰而服也赫赫明明今曰赫赫威嚴也明明光顯也王命卿士卿士解見十月之交南仲大祖大音泰大師皇父父音甫箋曰南仲文王時武臣也宣王之命卿士為大將也乃用其以南仲為大祖者今大師皇父是也命將必本其祖者因有世功於是尤顯疏曰十月之交皇父與此皇父得為一人或皇氏父字傳世稱之亦未可知也李氏曰十月之交所稱皇父疑是此詩皇父之後也陳氏曰自冢宰而下謂之六卿大師而下謂之三公既曰王命卿士又曰大師皇父古者三公官不常有或以卿士之長者上行其事春秋之時所謂宰周公是也整我六師以修我戎既敬既戒惠此南國首章述命元帥也赫赫然威嚴明明然光顯者是宣王之命卿士為大將也所命之卿士言其世則以南仲為大祖言其官則大師言其人則皇父俾之整齊我六軍之衆以治我甲兵之事也南仲大祖世將也大師將尊也六師師衆也著皇父其人賢也此王命所以威嚴光顯有以服衆望而重國勢也又命之以師嚴器備當恭敬而臨之戒懼而處之以惠南方之國淮夷徐戎挻亂南國皆被其禍宣王之師蓋除暴以安民也王謂尹氏傳曰尹氏掌命卿士箋曰天子世大夫也疏曰即內史也其職云凡命諸侯及孤卿大夫則策命之是也此時尹氏當是尹吉甫也吉甫為卿而兼內史命程伯休父傳曰程伯休父始命為大司馬疏曰楚語云重黎世敘天地其在周程伯休父其後也當宣王時失其官守而為司馬氏韋昭云程國伯爵休父名也案父宜是字而昭以為名未能審之左右陳行音航箋曰行列也戒我師旅率彼淮浦音普箋曰率循也傳曰浦涯也說文曰水濱也省此徐土疏曰此徐當謂徐州之地未必即是春秋之世徐子之國何則春秋之世徐國甚小宣王之時非能背叛而使王親征之六軍並出則是强敵者也明非春秋徐國但不知於時之君何姓名耳不留不處三事就緒箋曰三農之事皆就其業疏曰太宰九職三農生九穀注云三農原隰及平地朱氏曰上中下農夫也錢氏曰緒事端也就其緒不中輟次章述命副誓師以征淮徐也上命大師為元帥此命卿為司馬以副之王謂內史尹吉甫曰汝當為策書命此程國之伯名休父者為大司馬內史掌策命諸侯孤卿大夫司馬大師掌其戒令也即言所命之意今軍出之時使司馬令其士衆左右陳其行列戒勑我師旅曰往循淮之浦涯謂征淮夷也省察此徐之國土謂征徐方也不久留不停處以患苦其民使三農之事皆就其業不中輟也徐戎淮夷自伯禽就封之初同惡相濟其來有素今又相挻而起為禍不淺故王親征之也曹氏曰傳云師之所處荆棘生焉大軍之後必有凶年故必不留不處然後三農得以就緒赫赫業業今曰赫赫威嚴也業業考見雲漢傳曰業業動也有嚴天子嚴鄭如字毛上聲王舒保作傳曰舒徐也保安也箋曰作行也匪紹匪遊箋曰紹緩也徐方繹騷朱氏曰繹連絡也騷擾動也震驚徐方箋曰震動也如雷如霆解見采芑徐方震驚三章述親征之先聲也言王師之行赫赫然威嚴業業然震動者是尊嚴之天子也王乃舒徐而安行依於軍法日行三十里非紹緩也非遨遊也進兵不急人自畏威徐方之人皆絡繹騷動矣奮揚威武以震動驚懼於徐方如雷之發聲如霆之迅擊而徐方之人莫不震動而驚懼矣必震驚之者使懼而服也宣王先征淮夷而後及徐方此兵行猶未及淮夷而徐方已震驚蓋淮夷服屬于徐舉其大者言之也陳氏曰徐大而淮夷小淮夷即徐州之夷而服屬于徐曰徐方者兼徐淮而言之曰徐國者特言徐戎也王奮厥武釋文曰奮揚也如震如怒進厥虎臣朱氏曰進鼓而進之也闞如虓虎闞呼減反虓火交反今曰闞聲也釋文曰虓虎怒貌鋪敦淮濆鋪平聲敦如字濆音汾箋曰鋪陳也王氏曰敦厚也傳曰濆涯也疏曰濆謂崖岸狀如墳墓仍執醜虜傳曰仍就也疏曰醜衆也虜者囚繫之名為人虜獲是屈服也截彼淮浦朱氏曰截然不可犯王師之所四章述征淮也宣王親征淮浦奮揚其威武如雷之震如人之怒乃鼓而進其如虎之臣其聲闞然如虓怒之虎乃陳敦厚之陳於淮水之濆涯師衆則陳厚也就執其衆虜之降服者截然整齊於彼淮浦之上是王師之所處也王旅嘽嘽音灘朱氏曰嘽嘽衆盛也有考見四牡如飛如翰傳曰疾如飛摰如翰箋曰飛如鳥之飛翰其中豪俊也疏曰摯擊也翰是飛之疾者言其擊物尤疾若鷹鸇之類如江如漢箋曰江漢以喻盛大也以今曰征淮北之夷不由江漢而言如江如漢者江漢為九州之最大天下所共知猶弼谷風言涇以渭濁亦非土風也江漢常武之詩皆以江漢喻王師但江漢浮浮則喻盛大而不可禦如江如漢則止喻盛大下言如川之流乃言不可禦也如山之苞傳曰苞本也箋曰山本以喻不可驚動也動疏曰靜則不可驚如川之流箋曰川流以喻不可禦也疏曰動則不可禦止綿綿翼翼李氏曰綿綿不可得而絶翼翼不可得而亂陳氏曰綿綿無隙之可尋翼翼間整而不可亂歐陽氏曰綿綿連屬貌翼翼考見采薇不測不克濯征徐國傳曰濯大也五章述移師征徐也上既克淮浦此又進而伐徐王之師旅嘽嘽然衆盛其行動之疾也如鳥之飛其赴敵之速也如摯之翰其軍之衆多也如江漢之廣大其固守而不動則如山之基本其往戰而不可禦則如川之流逝綿綿然密不可得而絶翼翼然整不可得而亂不可測度不可克勝以此大征徐國言必勝也王猶允塞蘇氏曰猶道也箋曰允信也朱氏曰塞充塞也徐方既來箋曰已來告服徐方既同疏曰與他國同服于王天子之功四方既平徐方來庭傳曰來王庭也徐方不回今曰回轉也不回謂既服而不復叛也王曰還歸箋曰振旅也六章言徐服而天下定也方移師以臨徐方徐方畏懾不戰自服於是美宣王之道允信塞實故能致徐方之來服蓋以道勝非以力勝也前此三方已定唯徐自異今其來同是天子之功也徐方既服則四方皆已平定徐方來在王庭其心不復回轉則天下晏安不須用武王乃告之曰可以還歸矣不黷武也王猶允塞王曰還歸皆因以為戒也常武六章章八句瞻卬音仰凡伯刺幽王大壞也箋曰凡伯天子大夫也春秋魯隱公七年冬天王使凡伯來聘疏曰凡國伯爵禮侯伯之入王朝則為卿士故板箋以凡伯為卿士此言大夫者大夫卿之總稱也所引春秋者凡伯世稱之不謂與此為一人也曹氏曰板厲王之末而幽王大壞之時凡七十餘年矣決非一人猶家父也瞻卬昊天則不我惠箋曰惠愛也孔填不寧填音陳傳曰填久也今曰桑柔倉兄填兮降此大厲傳曰厲惡也邦靡有定士民其瘵音再傳曰瘵病也蟊賊蟊疾蟊音牟蟊賊解見大田疏曰蟊賊是害禾稼之蟲蟊疾是害禾稼之狀靡有夷届音界王氏曰夷平也箋曰届極也罪罟不收靡有夷瘳音抽傳曰瘳愈也首章述遭虐政仰天而訴之言天不惠愛我使我甚久不安矣天命幽王為君是降此大惡使邦靡有定而為士為民者皆病也小人為民之害如蟊賊之蟲以蟊疾禾稼無有夷平届極之時又施刑罪以羅網天下而不收斂無有夷平瘳愈之時人有土田女反有之人有民人女覆奪之覆音福箋曰覆猶反也此宜無罪女反收之傳曰拘收也彼宜有罪女覆說之說音稅一音脫傳曰說舍也哲夫成城傳曰哲知也知音智箋曰哲謂多謀慮也城猶國也哲婦傾城次章述刑罰無倫也諸侯卿大夫有土田人民者汝反奪而有之無故黜削之也此當無罪者汝反拘收之彼當有罪者汝反脫免之刑罰顛倒如此皆由褒姒亂政也城喻國也傾覆也言男子正位于外故以哲而立國婦人以無非無儀為善哲則適以覆國而已懿厥哲婦為梟為鴟箋曰懿有所痛傷之聲也梟鴟惡聲之鳥喻褒姒之言無善疏曰懿與噫字雖異音義同噫者心不平而為聲婦有長舌維厲之階亂匪降自天生自婦人匪教匪誨時維婦寺傳曰寺近也箋曰長舌喻多言語階所由上下也疏曰以舌動而為言故謂多言為長舌論語云駟不及舌亦謂言為舌也三章言哲婦之害而及寺人也噫哲婦而為梟鴟蓋以多言而為禍亂之階也然則亂豈降自天哉特由此婦人而已蓋其言雖多而非有教誨之者是惟哲婦與寺人耳豈可近哉上文但言婦人之禍末句兼以寺人為言蓋二者嘗相倚為奸不可不并以為戒也鞫人忮忒譖始竟背豈曰不極伊胡為慝鞫居六反忮之䜴反忒他得反譖本又作僭子念反背音佩慝他得反傳曰忮害忒變也箋曰鞫窮也譖不信也竟猶終也胡何慝惡也疏曰鞫窮釋言文釋言云爽忒也孫炎曰忒變雜不一竟者卒盡之義如賈三倍君子是識箋曰識知也婦無公事休其蠶織四章申婦寺之害也婦寺之輩以忮害變化而窮屈人不可究詰始則譖毁之終則棄背之其為惡豈不極至乎何故為慝惡而不已也商賈有三倍之利者賤丈夫之所為而君子反知之婦人不宜與外事今乃休其蠶桑織紝之事而與朝廷之事皆非其宜也天何以刺傳曰刺責也何神不富傳曰富福也舍爾介狄舍音捨蘇氏曰介大也維豫胥忌不弔不祥威儀不類傳曰類善也人之云亡箋曰奔亡也今曰猶何聞信亡之亡邦國殄瘁五章述災譴之由也天何為出譴告以責王乎何為神亦不福王而降災害乎王不能反躬修省將有夷狄之大患顧舍之不以為忌而反以我為忌惡聞忠言也天降不祥以譴告王而王曾不弔愍無恐懼之心故不敬謹其威儀其威儀不善矣又善人皆逃去無以輔正之則國之殄絶瘁病必矣天之降罔維其優矣蘇氏曰優多也人之云亡心之憂矣天之降罔維其幾矣幾當音機也傳曰幾危人之云亡心之悲矣六章七章憂亂也天降禍以為羅網多於前矣觱沸檻泉觱沸音必弗檻銜之上濁解見采菽維其深矣心之憂矣寧自今矣不自我先不自我後藐藐昊天藐音莫朱氏曰藐藐髙逺貌無不克鞏傳曰鞏固也無忝皇祖式救爾後檻泉從下上出觱沸然其來不竭喻己之憂未有已也不出我之前不居我之後適當其時是我之不幸也藐藐髙逺之昊天仁愛人君無不克鞏固其命幽王茍能改圖而為善庶幾不辱其祖宗往者不可諫來者猶可追所謂式救爾後也幽王大壞至此凡伯尚欲救之拳拳之忠不能自已也瞻卬七章三章章十句四章章八句召旻音邵閩凡伯刺幽王大壞也旻閔也閔天下無如召公之臣也朱氏曰因其首章稱旻天卒章稱召公故謂之召旻以别小旻而已序云旻閔也閔天下無如召公之臣蓋已衍說矣旻天疾威天篤降喪癲我饑饉癲音顛箋曰癲病也民卒流亡箋曰卒盡也我居圉卒荒圉音語箋曰國中至邊竟盡空虛疏曰居謂城中所居之處圉謂邊境首章訴亂也呼旻天而訴之曰天之降禍甚疾暴而威虐矣天厚降喪亡之禍病我以饑饉民盡流亡我所居國中及邊圉盡荒虛也天降罪罟詩記曰天降罪罟所謂天之降罔也蟊賊內訌音紅傳曰訌潰也昏椓靡共㧻音卓共音恭箋曰昏㧻皆奄人也昏其官名也㧻㧻毁隂也疏曰天官閽人司晨昏以啓閉者潰潰回遹傳曰潰潰亂也疏曰回遹邪僻也實靖夷我邦今曰靖安也傳曰夷平也次章及三章言羣小致亂也天降刑罪以羅網天下故使小人如害禾稼蟊賊之蟲訌潰於內又昏㧻奄人皆為不恭潰潰然亂為邪僻之行者乃使之安靖平夷於我邦任非其人也臯臯訿訿臯音羔訿音紫王氏曰臯臯緩而不供職訿訿以茍訿為能曹氏曰訿訿毁也曾不知其玷㸃店二音箋曰玷缺也兢兢業業曰危動恐懼也考見雲漢孔填不寧填音陳我位孔貶彼檢反傳曰貶隊也箋曰言見侵侮政教不行後犬戎伐之而周與諸侯無異臯臯然頑緩而不供職訿訿然以謗毁為事乃曾不知其為玷缺也天下之人兢兢而戒謹業業而危恐甚久不安也我王之位甚貶隊矣言衰微也如彼嵗旱草不潰茂傳曰潰遂也曹氏曰潰訓散又訓亂草散亂則茂盛故歲旱無雨澤則草不潰茂如彼棲苴棲音西苴音荼傳曰苴水中浮草也我相此邦相去聲無不潰止箋曰潰亂也四章言凋瘵也天下之人如旱歲之草皆枯槁無潤澤不潰遂而茂盛如木上棲枯草豈復有生理我視此邦無不潰亂矣今考弼谷風有洸有潰潰怒也小旻是用不潰于成召旻草不潰茂潰遂也召旻潰潰回遹無不潰止潰亂也項氏云水之潰者其勢橫暴而四出故怒之盛者為潰怒遂之盛者為潰遂亂之盛者為潰亂皆一理也維昔之富句不如時維今之疚句不如兹彼疏斯稗音敗箋曰疏粗也謂櫔米也糲蘭末反曰稗精米也胡不自替傳曰替廢也職兄斯引兄音况箋曰職主也傳曰兄兹也兄解見桑柔五章言小人宜退也昔時之富不如今時也今時之病未有如此之甚也本不如此特小人壞之耳茍小人退而君子進則其病去矣故言彼小人如疏粗之糲米此君子如精稗彼小人何為不自廢退以避君子乃職主援引其黨乎言小人方植黨自固豈肯退也池之竭矣不云自頻如字傳曰頻崖也泉之竭矣不云自中溥斯害矣箋曰溥猶遍也職兄斯𢎞箋曰𢎞大也不烖我躬六章申言小人之害也池水由外灌其竭也不云自頻崖之不入乎泉水從中以益其竭也不云自中之不出乎喻內外耗竭也溥遍被害而小人猶主𢎞大之是豈不烖我身乎亂則爾小人亦受禍也昔先王受命有如召公日辟國百里辟音闢傳曰闢開也今也日蹙國百里蹙音足傳曰蹙促也於乎哀哉於乎音烏呼維今之人不尚有舊七章思召康公而惜王之不用舊人也昔文王武王受命有臣如召康公日開辟國土以百里謂歸附日衆也今也日蹙國百里嗚呼可哀也已在今之人不尚有老成舊德者乎雖有之而不肯用也召旻七章四章章五句三章章七句詩緝卷三十一
