body:
  text: 詩緝卷十一宋嚴粲撰唐國風譜曰唐者帝堯舊都之地今曰太原晉陽是堯始居此後乃遷河東平陽成王封母弟叔虞於堯之故墟曰唐侯南冇晉水至子燮改為晉侯其封域在禹貢冀州太行恆山之西太原太嶽之野至曽孫成侯南徙居曲沃遲平陽焉當周公召公共和之時成侯曽孫僖侯甚嗇愛物儉不中禮國人閔之唐之變風始作其孫穆侯又徙於絳云朱氏曰唐叔所都在今太原府曲沃及絳皆在今絳州堯都有四地理志太原晉陽太原郡平陽縣注云故詩唐國晉水所出一也河東平陽河車郡平陽縣注云堯都也在平河之陽二也中山唐縣中山國張晏注云堯為唐侯國於此三也河東彘縣順帝改曰永安臣瓚於晉陽下注云所謂唐今河東永安是也去晉四百里師古云瓚説是也四也詩之唐國其説有三詩譜以為堯始居晉陽後乃遷平陽於詩唐國為晉陽皇甫謐以為堯始封於中山唐縣後徙晉陽及為天子都平陽於詩唐國為平陽臣瓚又以唐國為永安今考堯都雖有四而詩之唐國當從詩譜為晉陽何以明之蓋成王封弟叔虞於堯之故墟曰唐侯其子燮以晉水所出改為晉侯晉陽實晉水所出則唐叔虞之始封在晉陽矣唐以堯得名晉以水得名其地一也晉之遷徙不一歷歷可考自叔虞始封於晉陽其後三世至成侯叔虞曽孫自晉陽徙曲沃即河東聞喜縣蟋蟀刺成侯之曽孫僖公則都曲沃時詩也八世至穆侯僖侯之孫自曲沃徙絳即河東絳縣前都絳時無詩十世至昭侯穆叔之孫自絳徙翼在平陽絳邑縣東山有樞楊之水椒聊綢繆杕杜羔裘刺昭公鴇羽刺大亂五世皆都翼時詩也自昭公以曲沃封桓叔至其孫武公并晉又自曲沃徙絳無衣美武公有杕之杜刺之葛生采苓刺獻公則皆後都絳時詩也蟋蟀音悉率刺晉僖公也疏曰僖公司徒靖侯宜臼子儉不中禮中去聲故作是詩以閔之欲其及時以禮自虞樂也樂音洛此晉也而謂之唐本其風俗憂深思逺思去聲儉而用禮乃有堯之遺風焉曰晉僖公詩都曲沃當共和之間疏曰此實晉詩而編詩者名之為唐蓋推本其民俗所以能憂深思逺儉而用禮者皆唐堯之遺化故謂之唐也言堯之遺化使然非晉君之化能然也晉君自儉不中禮安能使民知禮觀蟋蟀之詩言職思其憂是憂深思逺言好樂無荒是能儉而用禮其風俗可見唐風諸詩皆然曹氏曰班孟堅云參為晉星其民有先王之遺教君子深思小人儉陋故唐詩蟋蟀山有樞葛生之篇皆思奢儉之中念死生之慮季札聞唐之歌云思深哉其有陶唐氏之遺民乎不然何其憂之逺也僖公之病在於鄙陋局促而無深逺之慮此詩欲開廣其志意提䇿其精神以為圖回國事之地非欲其自虞樂而已也廣漢張氏曰夫人有以自樂則庶幾舒泰和豫而無拘迫之患樂而無荒則斯能周旋四顧而所憂者必得訓夫政之矣所當務與夫患之所當防者斯可以次而理蟋蟀在堂郭璞曰蟋蟀促織也釋蟲曰蟋蟀蛬蛬音拱又音笻陸璣曰似蝗而小一名蜻蛚里語云促織嗚懶婦驚蜻蛚音精列傳曰九月在堂疏曰九月在户堂即室户之外也嵗聿其莫音暮傳曰聿遂也疏曰莫晚也當九月則嵗未莫過此月則嵗將莫是嵗實未莫而云聿莫故知聿為遂遂者從始嚮末之言也今我不樂音洛日月其除音筯傳曰除去也無已大康大音泰傳曰已甚也朱氏曰大康過於樂也職思其居協韻音據傳曰職主也廣漢張氏曰居謂其位也好樂無荒好去聲樂音洛箋曰荒廢亂也良士瞿瞿音句朱氏曰瞿瞿驚懼之貌解見齊東方未明此詩欲僖公意氣舒泰然後思慮開闊故先言九月蟋蟀入在於堂以附近於人則寒氣漸至而嵗遂將莫矣今我僖公若不自樂則日月遂去矣所謂樂者非甚太樂當主思其所居之位居國君之位則一國之事皆吾精神念慮之所當及好樂而無至於荒廢當如彼良士瞿瞿然長慮却顧也職思其居啓其憂也好樂無荒作其勤也良士瞿瞿警其懼也三言而君國之道盡矣詩人之言及此豈非堯之遺風乎十月以後至十二月皆可稱嵗莫采薇言嵗亦莫止又言嵗亦陽止十月為陽是以十月為嵗莫也此蟋蟀在堂之户止是九月過此方是十月故云聿其莫或曰周建子故以十月為嵗莫也蟋蟀在堂嵗聿其逝朱氏曰逝去也今我不樂日月其邁傳曰邁行也無已大康職思其外好樂無荒良士蹶蹶音貴傳曰蹶蹶動而敏於事前言思所居之位則在內之事皆入於念慮矣至於在外之事亦不可不慮也後來如昭公不能思其外則四鄰謀取其國家而不知矣蟋蟀在堂役車其休疏曰役車方箱可載任器以供役收納禾稼役車休是農功畢而無事也今我不樂日月其慆音叨傳曰慆過也無已大康職思其憂好樂無荒良士休休朱氏曰休休安間之貌樂而有節不至於淫所以安也農事畢而役車休民猶休息人君可以娛樂之時也既思內事又思外事內外無遺慮矣然憂患之來又有出於非常者亦不可不思慮也惟瞿瞿然驚懼故能蹶蹶然勤敏既警懼而勤敏則事事有備可以從容應之故休休然安間也蟋蟀三章章八句山有樞音謳刺晉昭公也疏曰昭公伯文侯仇之子桓二年左傳曰初晉穆侯之夫人薑氐以條之役生太子命之曰仇其弟以千𤱔之戰生命之曰成師師服曰異哉君之名子也始兆亂矣兄其替乎惠之二十四年晉始亂故封桓叔于曲沃師服曰本既弱矣其能久乎惠之三十年晉潘父弒昭侯而納桓叔不克晉人立孝侯不能修道以正其國有財不能用有鐘鼓不能以自樂有朝廷不能灑掃灑鰓之上掃音噪政荒民散將以危亡四鄰謀取其國家而不知國人作詩以刺之也曰晉昭公詩都翼平王時周以岐豐賜襄公秦崛興而周遂微晉以曲沃封桓叔曲沃強而晉不支矣唐風自山有樞至鴇羽皆都翼時詩也僖公病在鄙陋故蟋蟀欲開廣之昭公死亡已迫此詩言與其坐待死亡不若為樂欲激發之使知戒懼二詩之意所主不同皆非勸其君以虞樂也後序所謂有財不能用有鐘鼓不能自樂其辭衍矣山有樞釋木曰樞荎荎音迭郭璞曰樞今之刺榆也陸璣曰其針刺如柘其葉如榆為茹美於白榆也隰有榆音俞曰榆者總言諸榆也榆之種多不知所指也今曰釋木云榆白枌孫炎云榆白者名枌毛於東門之枌以枌為白榆是也陸璣釋榆云白枌也誤矣爾雅謂榆白為枌璣誤謂榆為白枌也枌乃榆之白者無緣榆又為枌之白者陸璣又云榆之類有十餘種葉皆相似皮及理異耳然則此言隰有榆總言榆耳子有衣裳疏曰子昭公也弗曳弗婁音閭疏曰衣裳在身行必曳之傳曰婁亦曳也今曰漢文帝贊衣不曳地曳婁有優遊娛適之意補傳曰婁者曳而至於弊壞也南楚凡人貧衣破謂之褸裂古人用字多從省故省衣作婁子有車馬弗馳弗驅疏曰走馬謂之馳䇿馬謂之驅驅馳俱是乘車之事宛其死矣秦蒹葭箋曰宛坐見貌他人是愈音俞傳曰愈樂也興也桓叔有伐晉之謀昭公禍在朝夕而不悟國人難察察言之故但言山則有樞隰則有榆不待外求猶國之有衣裳車馬也今昭公有衣裳而不曳婁之以優遊娛適有車馬而不馳驅之以快意肆志宛然坐見其死則他人取之以為愈樂矣此非勸昭公為樂也謂可惜此衣裳車馬之物將為他人所有將以喚醒昭公使之覺悟託言何不曳婁馳驅耳昭公若會其言外之意必矍然知懼汲汲然思所以為防患之計何暇曳衣裳驅車馬事鐘鼓瑟琴以為樂乎山有栲音考釋木曰栲山樗樗音攄疏曰郭璞云栲似樗色小白生山中亦類漆樹俗語櫄樗栲漆相似如一陸璣曰山樗生山中與下田樗大略無異葉似差狹耳方俗無名此為栲者似誤也今所云為栲者葉如櫟木皮厚數寸可為車輻或謂之栲今曰姑兩存之隰有杻音狃釋木曰杻檍檍音憶陸璣曰葉似杏葉而尖白色皮正赤為木多曲少直枝葉茂盛二月中葉疏開花似練而細蘂正白蓋樹今官園種之正名曰萬嵗既取名於億萬其葉又好故種之共汲山下人或謂之牛筋或謂之檍材可為弓弩幹郭云似棣細葉葉新可飼牛筋音斤子有廷內弗灑弗掃傳曰灑灑也疏曰以水濕地而掃之子有鐘鼓弗鼓弗考今曰鼓動其聲也解見鹿鳴傳曰考擊也宛其死矣他人是保疏曰保居而有之山有漆音七隰有栗漆栗並解見定之方中子有酒食何不日鼓瑟且以喜樂且以永日傳曰永引也宛其死矣他人入室言死亡迫矣不及為樂則有倉卒之恨是來日已短宜及今為樂以延引此日也詩記曰詩人豈真欲昭公馳驅飲樂者哉其激發感切之者深矣吕祿棄軍其姑吕􅎐悉出珠玉寶器散堂下曰毋為他人守也乃此詩之意也􅎐音須或説人多憂則日短飲食作樂可以引長此日然愁當覺日長作樂當覺日短不應反言之山有樞三章章八句揚之水刺晉昭公也昭公分國以封沃今曰封叔父成師即桓叔沃盛強昭公微弱國人將叛而歸沃焉曰晉昭公詩都翼平王時疏曰左傳惠公二十四年晉始亂故封桓叔於曲沃河東聞喜縣故曲沃也武帝於此聞南越破改曰聞喜將叛者潘父之徒而已國人拳拳於昭公無叛心也後序言過矣異時潘父弒昭公迎桓叔晉人發兵攻桓叔桓叔敗還歸曲沃皆可以見國人之心矣亦唐風之厚也揚之水解見王風白石鑿鑿音作傳曰鑿鑿然鮮明貌曹氏曰石非浮物終無可轉徙之理今曰石以白言又稱鑿鑿然鮮明皓皓然潔白蓋石在水中為水所蕩滌故其白如此末章言粼粼亦謂水清石見素衣朱襮音博曰素絲也以素為衣者謂中衣也中衣者朝服祭服之裏衣也大夫以上祭服中衣用素也曰朱朱緣也謂染繒為赤色為中衣之緣也曰襮領也謂繡黼領也繡刺白黑文以褗領也緣去聲褗音偃衣領也疏曰士祭以朝服中衣以布矣郊特牲云繡黼丹朱中衣大夫之僭禮也大夫服之則僭知諸侯當服之也今曰玉藻云以帛裏布非禮也注云中外宜相稱也冕服絲衣也中衣用素皮辨服朝服玄端麻衣也中衣用布又疏云凡服先以明衣親身次加中衣冬則次加裘裘上加裼衣裼衣上加朝服中衣其制如深衣但中衣之袖小長耳此以素為衣是以絲為之謂冕及爵辨之中衣也朝燕之中衣皆以布為之朝服以布為之則中衣亦用布矣公之孤及天子大夫四命皆爵辨自祭大夫士助祭於君亦服爵辨以上則中衣亦用素但不得用朱襮也箋曰國人欲進此服去從桓叔從子于沃今曰下文君子既指桓叔則此言子者設言欲叛之人如潘父之徒也于往也既見君子箋曰君子謂桓叔云何不樂音洛興也水喻昭公石喻桓叔悠揚之水淺弱豈能流動水中之石徒見其石在水中鑿鑿然鮮明耳喻昭公微弱不能去桓叔之強也又設為國人相語之辭言以素絲為中衣以丹朱為緣以繡黼為領此諸侯之服也今子欲奉此服於桓叔我將從子往沃以見此桓叔則如何不樂乎謂從之則可免禍而無憂也子指叛者設言其人其意謂國中有相與為叛以應曲沃者矣此微辭以泄其謀欲昭公聞之而戒懼早為之備也時沃有篡宗國之謀而潘父隂主之將為內應而昭公不知故此詩深警之謂昭公勿以沃為患之在外而猶緩也今國內有謀應之者欲奉沃以為君而篡汝之位腹心作難而外患乘之禍已迫矣此正發潘父之謀其忠告於昭公者可謂切至若真欲從沃則是潘父之黨必不作此詩以泄漏其事且自取敗也揚之水白石皓皓音鎬豪之上濁傳曰皓皓潔白也素衣朱繡疏曰謂於繒之上繡刺以為黼從子于鵠音斛傳曰鵠曲沃之邑既見君子云何其憂傳曰言無憂也揚之水白石粼粼音鄰本有作磷今曰巜音澮川音川粼粼從澮非從川也俗從川非傳曰粼粼清徹也朱氏曰水清石見之貌我聞有命蘇氏曰命桓叔之命也不敢以告人命謂桓叔篡晉之謀已定命其徒以舉事禍將作矣我聞其事而不敢以告人也言有命者迫切之辭言不敢告人乃所以深告昭公也昭公諸詩皆以沃強為憂山有樞言死亡之迫最激切而微辭深意未若此詩末章之云蓋反辭以見意故泄其謀欲昭公知之忠之至也諸家皆謂國人助之而匿其情且引陽生夜至於齊國人知之而不言為比晉人之心異於齊也自桓叔至武公屢得志矣而晉人終不服相與攻而去之其後更六世逾六七十載迫於王命而後不敢不聽在昭公之初晉人之心豈從沃哉若助桓叔而匿其情則此詩不作可也亦既聲之於詩使采詩者揚之以諷其君矣安在其為匿之也故言不敢告人者乃所以告昭公言我聞有命者又以見其事已成禍至甚迫所以激發昭公者至切切也執詩之辭而不能以意逆志固哉説詩風人之旨逺矣揚之水三章二章章六句一章四句椒聊刺晉昭公也君子見沃之盛強能修其政知其蕃衍盛大蕃音煩衍延之上濁子孫將有晉國焉曰晉昭公詩都翼平王時此詩言桓叔之強而不及昭公其意則憂昭公之弱而非主桓叔言在此而意在彼也説詩不用首序則以此詩為美桓叔亦可矣椒聊之實釋木曰檓大椒檓音毁郭璞曰今椒樹叢生實大者名為檓曹氏曰聊薄略也薄略之實而盈升盈掬蕃衍之至也蕃衍盈升今曰蕃茂也衍廣也古者為升上徑一寸下徑六分其深八分籥十為合合十為升升掬皆言椒之蕃衍而已不必較升掬之小大彼其之子其音紀碩大無朋李氏曰碩即大也即序所謂盛強也傳曰朋比也椒聊且沮之平逺條且錢氏曰木枝之新長曰條興也椒實蕃衍采之盈升喻桓叔子孫衆多也彼桓叔以子孫衆多之故其碩大盛強無與倫比矣然方興未艾將不止於今日之所觀故復歎是椒也其新長之條日益逺矣條益逺則實益蕃喻桓叔他日之子孫將日益衆多也桓叔日強昭公其危哉為告昭公故稱桓叔為彼也舊説蕃衍碩大逺條之意重復今分别之以見詩人紆餘之旨椒聊之實蕃衍盈掬音菊傳曰兩手為掬彼其之子碩大且篤且七野反傳曰篤厚也今曰篤如篤公劉之篤篤厚則福慶未艾也椒聊且逺條且椒聊二章章六句綢繆綢音儔繆莫彪反從韻刺晉亂也國亂則昏姻不得其時焉曰晉昭公詩都翼平王時補傳曰國亂則征役無時賦斂無節民既不得安居且乏貨財不能講禮此昏姻所以失時也此詩言刺晉亂亦猶鄭丰東門之墠溱洧言刺亂也然鄭因亂而淫晉雖亂而否可以見其篤厚純固之俗而聖人風教猶存矣綢繆束薪傳曰綢繆猶纒綿也疏曰綢繆是束薪之狀曹氏曰詩人每以薪喻昏姻如翹翹錯薪析薪如之何是也束薪者析於彼而合於此有昏姻之義焉補傳曰昏姻必有禮以綢繆之三星在天傳曰三星參也在天謂始見東方也參解見召小星王肅曰謂十月也今夕何夕見此良人朱氏曰良人夫稱也補傳曰秦風云厭厭良人子兮子兮如此良人何王氏曰言女子之失時也興也傷女子之失時言薪析而散於地必用物以綢繆之乃得合而成束男女異姓不相知亦必用禮以綢繆之乃得合而成昏昏禮自納采問名禮節不一是綢繆纒綿之意也二十八宿半隱半見故以始見東方為在天參之三星昏見東方已在天矣今夕是何月之夕乎是十月嫁娶之時也爾女子可以嫁而見此良人矣然國亂民散不能備禮猶未得嫁故又歎此女子汝當如此良人何言欲從良人而未遂無可奈何也處亂世而必待禮之綢繆不肯茍合斯其謂之唐風也毛以秋冬為昏時則以三星為參十月參星始見東方於禮可以昏矣鄭以嫁娶用仲春則以三星為心三月心星見則時已晚矣今從毛義一章言見此良人則子兮子兮指女子也綢繆束芻今曰朱氏孟子解云芻草也蕘薪也三星在隅傳曰東南隅也疏曰謂十一月十二月也今夕何夕見此邂逅音械候邂逅解見鄭野有蔓草子兮子兮如此邂逅何參星在天之東南隅是十一月十二月昏姻之時已晚矣邂逅謂欲其議速成逮其今兮之意非欲不期而會也二章言見此邂逅則子兮子兮指男子及女子也綢繆束楚三星在户傳曰參星正中直户也疏曰月令孟春之月昏參中曹氏曰户正南也今夕何夕見此粲者李氏曰國語雖曰女三為粲而又曰粲美物也是言美女也子兮子兮如此粲者何王氏曰言男子之失時也三章言見此粲者則子兮子兮指男子也綢繆三章章六句杕杜杕音弟刺時也君不能親其宗族骨肉離散獨居而無兄弟將為沃所并爾并音併曰晉昭公詩都翼平王時補傳曰曲沃之為晉禍六七十年間篡逆者四五其寡助也至矣寡助之至親戚畔之晉為曲沃所并寡助之驗也唐風刺時者三杕杜羔裘鴇羽皆為昭公以時事可憂也有杕之杜傳曰杕特生貌釋木曰杜赤棠樊光曰赤者為杜白者為棠赤棠白棠解見甘棠山隂陸氏曰赤棠木理堅韌亦可作弓弩幹其葉湑湑須之上王氏曰湑潤澤也李氏曰昭公欲去羣公子樂豫云公族公室之枝葉也葛藟猶能庇其本根獨行踽踽音矩傳曰踽踽無所親也今曰朱氏孟子解云踽踽獨行不進之貌豈無他人不如我同父嗟行之人胡不比焉比音備范氏曰比親也人無兄弟胡不佽焉佽音次傳曰佽助也興也木無枝葉則日燥其根上之土而其木易枯有杕然特生之杜其葉湑湑然潤澤雖無旁木之蔭而葉獨足以芘其本根昭公不親其兄弟則如道路獨行之人踽踽然無所親曽杕杜之不如也豈無他人乎不如我同父之人言他人不足恃也昭公既如道路獨行之人遂以同路之行人曉諭之嗟彼行路之人何不相親比乎必不相親也人之無兄弟者何不外求佽助乎必不相助也信他人不如同父也有杕之杜其葉菁菁音精傳曰菁菁葉盛也獨行睘睘音瓊傳曰睘睘無所依也曹氏曰説文云睘睘驚視也獨行多懼故睘睘也豈無他人不如我同姓王氏曰同姓雖非同父猶愈於他人耳嗟行之人胡不比焉人無兄弟胡不佽焉同姓亦謂兄弟變文成章耳杕杜二章章九句羔裘刺時也晉人刺其在位不恤其民也曰晉昭公詩都翼平王時昭公有曲沃之逼孤危將亡而其臣又不為保障之謀時事大可憂也故曰刺時羔裘豹袪羔裘解見召羔裘曰袪者袂口也疏曰袂是袖之大名袪是袖頭之小稱自我人居居如字又音據箋曰我人我人民也今曰自從也舊以為用今不從釋訓曰居居惡也傳曰懷惡不相親比之貌豈無他人維子之故羔裘上下通服君純羔大夫間之以羔皮為裘以豹皮飾袖口也在位者不恤其民故民呼服是羔裘豹袪之人謂之曰爾但從我衆人處居居然傲狠而無相親之意無奈他人何也意謂在位不能禦曲沃但能虐我民耳爾既不恤我我非無他人可以往歸也以子之故舊而不忍去耳唐風之厚可見矣羔裘豹褎音袖自我人究究釋訓曰究究惡也孫炎曰窮極人之惡今曰究究言察察也豈無他人維子之好今曰故舊之好也爾但從我衆人處究究然苛察他人有逆亂之謀則不能察也羔裘二章章四句鴇羽鴇音保刺時也昭公之後大亂五世箋曰大亂五世者昭公孝侯鄂侯哀侯小子侯疏曰左傳桓二年稱魯惠公三十年晉潘父殺昭侯而納桓叔不克晉人立孝侯惠之四十五年曲沃莊伯伐翼殺孝侯翼人立其弟鄂侯隱五年傳稱曲沃莊伯伐翼翼侯奔隨秋王命虢公伐曲沃而立哀侯于翼隱六年傳稱翼人逆晉侯于隨納諸鄂晉人謂之鄂侯桓二年傳鄂侯生哀侯哀侯侵陘庭之田陘庭南鄙啓曲沃伐翼三年曲沃武公伐翼侯于汾隰夜獲之桓七年傳冬曲沃伯誘晉小子侯殺之八年春滅翼是大亂五世之事君子下從征役不得養其父母養音樣而作是詩也今曰晉小子侯詩都翼桓王時古者親老而無兄弟當免征役況其君子乎晉亂而不暇恤故刺之肅肅鴇羽傳曰肅肅鴇羽聲也陳氏曰其羽急疾釋文曰鴇似鴈而大無後趾孔氏曰鴇連蹄性不樹止樹止則為枯集于苞栩音許傳曰集止也釋木曰苞稹又曰栩杼稹音軫孫炎曰物叢生曰苞齊人名曰稹曰栩柞也櫟也杼也櫟音歷杼舒之上郭璞曰柞樹也陸璣曰栩今作櫟也徐州人謂櫟為杼或謂之為相其子為皂或言皂斗其殼為汁可以染皂謂櫟為杼五方通語今曰綿柞棫拔矣疏云釋木不言櫟是柞陸璣云周秦人謂柞為櫟蓋據時人所名而言之二柞櫟考見秦晨風王事靡盬音古傳曰盬不攻緻也緻音治密也疏曰盬與蠱字異義同蠱害器敗榖皆謂之蠱是為不攻牢不堅緻之意也不能藝稷黍箋曰藝樹也稷黍解見王黍離父母何怙胡之上濁傳曰怙恃也悠悠蒼天曷其有所興也鴇連蹄不樹止今鴇羽之聲肅肅然急疾其飛既勞又集止于叢生之栩木失其所矣如君子不當下從征役也君子以王事不可不堅固不遺餘力遂不能種藝稷黍父母將何所怙恃乎乃呼天而訴之歎其悠悠逺而不聞曰何時使我得其所乎補傳曰語意雖切不敢怨其上詩人之忠厚也諸侯為天子牧民公家之事皆王事也或謂哀侯與緡之立皆有王命故稱王事狹矣肅肅鴇翼集于苞棘棘解見邶凱風王事靡盬不能藝黍稷父母何食悠悠蒼天曷其有極蘇氏曰極止也肅肅鴇行音航蘇氏曰行列也集于苞桑王事靡盬不能藝稻粱釋草曰稌稻又曰虋赤苗芑白苗釋曰按説文云沛國謂稻為糯粳稻屬也本草以粳米稻米為二物粳糯甚相類黏不黏異耳依説文稌稻即糯也粳音庚粳同俗作粳黏尼占反郭璞云赤苗今之赤粱粟白苗今之白粱粟朱氏曰稻即今南方所食稻米粱粟類也有數色錢氏曰粱似粟而大父母何嘗朱氏曰嘗食也悠悠蒼天曷其有常范氏曰思得休息以反其常厭亂之甚也鴇羽三章章七句無衣美晉武公也曰桓叔成師始封曲沃莊伯鱓桓叔子也武公稱莊伯子也鱓音善武公始并晉國并音併其大夫為之請命乎天子之使為使皆去聲補傳曰魯莊十六年王使虢公命曲沃伯以一軍為晉侯天子之使其虢公乎而作是詩也曰晉武公詩都絳僖王時疏曰左傳桓八年王使立緡于晉至莊十六年乃云王使虢公命曲沃伯為晉侯不言滅晉之事晉世家云晉侯緡立二十八年曲沃武公伐晉滅之盡以其寶器賂周僖王僖王命曲沃武公為晉君計緡以桓八年立至莊十六年乃得二十八年然則虢公命晉侯之年始并晉也虢公未命晉之前有使適晉晉大夫就之請命武公之事國人所不與序言美之者特武公大夫之意耳山有樞揚之水椒聊杕杜諸詩國人每以沃強為憂而拳拳願忠於昭公以晉世家考之初潘父弒昭侯而迎桓叔欲入晉晉人發兵攻桓叔桓叔敗還歸曲沃晉人共立昭侯子平是為孝侯此桓叔初舉而國人不與也其後曲沃莊伯弒孝侯于翼晉人又攻莊伯莊伯復入曲沃晉人復立孝侯子郤音隙是為鄂侯此莊伯再舉而國人又不與也及鄂侯卒莊伯伐晉晉人共立鄂侯子光是為哀侯此莊伯三舉而國人又不與也至武公虜哀侯晉人復立哀侯子小子是為小子侯此武公四舉而國人又不與也及武公誘小子侯殺之晉復立哀侯弟緡此武公五舉而國人終不與也最後武公伐晉侯緡滅之盡以其寶器賂周僖王王命武公為諸侯然後晉人力不能討無如之何然則武公之得國晉人特迫於王命不得已而從之耳豈以武公為可美哉且武公有無王之心而後動於惡篡弒大惡也王法之所不容誅也彼其請命于天子之使豈真知有王哉正以人心所不與非假王靈則終不能定晉也夫王不命焉而請之非禮也不聞朝王而請命于其使尤非禮也此正與唐藩鎮戕其主帥而代之以坐邀旌節者無以異又以賂王而得之烏取其美也聖人致嚴於名分之際征伐不出天子政逮於大夫蓋屢歎之陳成子之事至沐浴而請討蓋以人倫之大變天理之所不容人人得而誅之其亦必不與武公也已無衣之詩不刪者所以著世變之窮而傷周之衰也武公之初弒小子侯也桓王猶能命虢仲立緡于晉又命虢仲芮伯梁伯荀侯賈伯伐曲沃是則周雖微而名分猶存也至僖王受武公之賂而命之為諸侯則紀綱蕩然矣他日三家分晉周王又移其命武公者命三家矣嗚呼王者代天爵人而賄以行之君子是以知周之不復振也司馬溫公論三家之事以為晉大夫暴蔑其君剖分其地天子既不能討又寵秩之是區區之名分復不能守而并棄之也君臣之禮既壞將使生民之類糜滅幾盡遂特著以為通鑑之首愚於武公亦云故曰無衣美武公者特其大夫之意耳豈曰無衣七兮今曰春官司服注鷩冕七章衣三章一曰華蟲畫以雉即鷩也二曰火三曰宗彞皆畫為繢裳四章一曰藻二曰粉米三曰黼四曰黻皆絺以為繡鷩音鱉疏曰春官巾車云金路鉤樊纓九就建大旗以賔同姓以封注云同姓以封謂王子母弟率以功德出封雖為侯伯其車服猶如上公若魯衛之屬然則唐叔是王之母弟車服猶如上公上公之服九章此大夫不請九章之服而請七章者王子母弟車服得如上公無公文正以周之建國唯二王之後稱公其餘雖大皆侯伯也彼云同姓以封必是封為侯伯侯伯以七為節而金路樊纓九就則知王子母弟初出封者車服猶如上公故特以九為節如上公者唯王子母弟一身若唐叔耳其後世子孫自依爵命之數故請七章之衣也不如子之衣今曰子者指天子之使言之安且吉兮此述請命之辭侯伯七命其車旗衣服皆以七為節言我非不能造此衣之七章然不如子之賜我者為安且吉也就天子之使請衣故云子之衣諸侯非有天子之命則人得而討之曲沃自桓叔以來屢得志矣晉人不服每攻而去之故以請於天子者為安吉然曰我非無之雖曰不要君吾不信也劉仁恭謂使者曰旌節吾自有之但要長安本色耳與豈曰無衣之言一也武公之請命特迫於利害之計耳舊説以為武公天理未盡滅非也曲沃自桓叔以來弒逆屢矣武公踵父祖之惡卒滅其宗國而自立豈復顧天理耶豈曰無衣六兮朱氏曰天子之卿六命變七言六者謙也不敢必當侯伯七命之服得受六命之服列於天子之卿猶愈於無天子之命也不如子之衣安且燠兮燠音欲傳曰燠暖也言六者變文成章耳燠暖亦謂安也無衣二章章三句有杕之杜刺晉武公也武公寡特兼其宗族而不求賢以自輔焉曰晉武公詩都絳僖王時有杕之杜解見上杕杜生于道左箋曰道左道東也今曰以南為正則左為東彼君子兮噬肯適我蘇氏曰噬逝通朱氏曰發語辭也中心好之好去聲曷飲食之飲食音蔭嗣興也有杕然特生之杜生於道東猶武公之寡特而無輔也賢者隱伏山林武公不能招徠之國人於是自致其愛慕之意曰彼賢者其肯暫過我乎若肯過我我中心愛之將何以飲食之乎猶丘中有麻將其來食白駒縶之維之於焉逍遙之意也國人自欲飲食之見君不能養賢矣舊説特生之杜其隂至寡不足為往來之芘故賢者去之於義為贅但説孤然之杜便見得是不能求賢以自輔矣有杕之杜生于道周傳曰周曲也彼君子兮噬肯來遊中心好之曷飲食之有杕之杜二章章六句葛生刺晉獻公也疏曰獻公詭諸武公稱子好攻戰則國人多喪矣好喪皆去聲曰晉獻公詩都絳惠王時疏曰國人或死行陳或見囚虜是以多喪曹氏曰左傳莊二十八年晉伐驪戎閔元年作二軍以滅耿滅霍滅魏二年使太子申生伐東山臯落氏僖二年晉師滅下陽五年使寺人披伐蒲冬滅虢又襲虞執虞公六年使賈華伐屈八年使里克敗狄于采桑二十三年之間凡十一戰宜其喪亡者多也兵猶火也弗戢必自焚獻公嗜殺而不已反禍其子與秦皇漢武略同可不戒哉葛生蒙楚曰楚木名解見漢廣蘞蔓于野蘞音廉陸璣疏曰蘞似栝樓葉盛而細其子正黑如燕蒖不可食也幽州人謂之烏服其莖葉煮以哺牛除熱豫美亡此箋曰所美之人謂其君子也今曰亡死也誰與獨處興也婦人指其夫征役所死之地言葛生而蒙覆於楚木蘞生而蔓延於野猶婦人依託於夫之義也今我所美之人死於此地不得卒於牖下我其誰與乎獨處而已煢然無所依矣下章變野言域域塋域也謂墓域也知為征夫所死之地陳防有鵲巢云誰侜豫美國人指賢者此詩豫美亡此婦人指其夫葛生蒙棘棘解見邶凱風蘞蔓于域傳曰塋域也塋音營墓域也豫美亡此誰與獨息傳曰息止也角枕粲兮朱氏曰粲華美之貌錦衾爛兮錢氏曰爛鮮明也豫美亡此誰與獨旦枕華衾鮮思始嫁之具而歎今之獨宿也獨旦獨宿至旦也猶王仲宣詩言獨夜也思者苦夜長而難旦長夜漫漫何時旦與秋天不肯明之意也夏之日冬之夜朱氏曰夏之日日永之時也冬之夜夜永之時也百嵗之後歸于其居箋曰居墳墓也晝夜長時憂思者難度百嵗之後死乃同歸于丘猶後山所謂百年何當窮也亦誓死無他志見唐風之厚矣舊説以為思存者味百嵗之後歸于其居之辭及上章言塋墓知為悼亡矣冬之夜夏之日百嵗之後歸于其室箋曰室猶塜壙葛生五章章四句采苓音零刺晉獻公也獻公好聽讒焉好去聲曰晉獻公詩都絳惠王時朱氏曰獻公好聽讒觀驪姬譖殺太子及逐羣公子可見矣采苓采苓曰苓甘草也解見邶簡兮首陽之巔傳曰首陽山名也箋曰首陽之上信有苓疏曰首陽之山在河東蒲坂縣南曹氏曰即雷首山也夷齊居於其陽因謂首陽今曰巔山頂也人之為言茍亦無信箋曰茍且也舍旃舍旃舍音捨釋文曰旃之也苟亦無然今曰然如此也人之為言胡得焉興也雷首山在晉境興所見也其山有苓見采苓者問其何從得之必得於首陽之上喻聽言者必問其所自來也凡人之言語且未可信將舍之而不聽乎亦且不可如此但當考其言何從而得之推其所自來則虛實盡見矣讒言之得行由不問其所由來而遽信之耳漢昭帝悟燕王上書之詐蓋察其書所由來也采苦采苦曰苦荼也解見邶谷風首陽之下人之為言茍亦無與朱氏曰與許也舍旃舍旃苟亦無然人之為言胡得焉采葑采葑曰葑蔓菁也解見邶谷風首陽之東人之為言茍亦無從舍旃舍旃苟亦無然人之為言胡得焉采苓三章章八句詩緝卷十一
