body:
  text: 詩緝卷二十七宋嚴粲撰生民之什大雅生民尊祖也疏曰周公成王致大平制禮以王功起於后稷故推舉之以配天禮記稱萬物本於天人本於祖俱為其本可以相配是故王者皆以祖配天是同祖於天故為尊也今曰孝經云郊祀后稷以配天祭法云周人禘嚳而郊稷祖文王而宗武王后稷生於姜嫄音原釋文曰姜姓嫄名有邰氏之女后稷母也邰音台文武之功起於后稷故推以配天焉厥初生民時維姜嫄箋曰時是也姜姓炎帝之後有女名嫄為高辛氏之世妃疏曰毛以稷為嚳之子鄭以為帝嚳傳十世堯非嚳子姜嫄不得為帝嚳之妃謂為其後世子孫之妃生民如何克禋克祀禋音因疏曰外傳云精意以享曰禋以弗無子傳曰弗去也去無子求有子古者必立高禖焉𤣥鳥至之日以大牢祠于高禖天子親往后妃率九嬪御乃禮天子所御帶以弓韣授以弓矢于高禖之前韣音獨弓衣也箋曰弗之言祓也二王之後得用天子之禮疏曰燕來主為産乳故重其始至之日用大牢祭天而以先禖者配之變媒言禖者神之也祓音弗履帝武敏歆傳曰履踐也武迹也敏疾也箋曰帝上帝也疏曰踐迹者謂隨後行耳今曰履隨也帝武猶言祖武非實有足迹也歆感動也攸介攸止疏曰介祐祚也載震載夙傳曰震動也夙早也疏曰動謂懷任而身動也左傳云邑姜方震大叔后緡方震皆謂有身為震也載生載育傳曰育長也時維后稷首章述姜嫄禱而生后稷也其初生此民者誰與是維姜姓之女名嫄也以民賴后稷播種而生而后稷又生於姜嫄生后稷所以生此民也又問姜嫄之生此民其事如何乎下說姜嫄生后稷之事姜嫄為高辛氏後世子孫之妃能精意以享能備禮以祀祈于高禖之神以祓除其無子之疾天帝本無迹今其來格若有步武之迹姜嫄奉事周旋若隨天帝之步武即有所感也履帝武言祭神如神在洋洋乎如在其左右也敏歆言感動之速大意言上帝降格即有身耳不必如鄭氏說歆歆然如有人道感已也於是神介助之依止之則震動而有身則夙早而不遲則生産之則長育之是為后稷也閟宫言彌月不遲謂滿十月即生是早也詩書凡言天帝而假人事言之者皆形容之辭不必執其迹也監觀四方乃眷西顧不必天實有眼聞于上帝不必天實有耳帝謂文王于帝其訓不必天實有言至言祭祀曰神具醉止曰神嗜飲食曰神保聿歸曰田祖有神若與神親相接者見神人來格之意耳若稷果生於巨人迹則其事甚異閟宫之詩當首言之今止言上帝是依而已履帝武敏歆攸介攸止即上帝是依之謂也古無巨迹之說特列子異端司馬遷好竒鄭氏信纎緯以帝武疑似之辭藉口而為是說耳至謂姜嫄無人道而生子謬於理而妨於教莫此為甚神怪之事聖人所不語若詩言巨迹聖人刪之久矣毛氏不信神怪其說甚正後世猶未盡從者謂其以帝為帝嚳耳帝為帝嚳則稷乃堯之親弟堯有賢弟在位七十載而不能用待舜乃舉之帝嚳聖夫姜嫄正妃配合生子人之常道何故但歎其毋不美其父此說者所以疑之今依毛以敏為疾而不用其帝為高辛之說依鄭以帝為上帝而不用其敏為拇指之說合三家而去取之可以折𠂻矣天地之始固有化生者此可以言鴻荒之始不可以言稷或又以為麒麟之生異於犬羊蛟龍之生異於魚鱉神人之生必有異於人辭則美矣非事實也古今大聖人莫如帝舜文王孔子其生不聞有異於人也李氏曰彼以契生于卵稷生於巨迹者乃引經疑似之言以惑世也詩本無有也歐陽氏云秦漢之間學者喜為異說高辛四妃皆以神異而生子蓋堯有盛德稷契後世皆王天下數百年學者喜為之稱述欲神其事故務為其說洪駒父亦云堯舜與人同耳血氣之類父施母生耳聽目視五官四體是聖智愚不肖之所同也何必有恢詭譎怪之事然後為聖且賢哉稷名曰棄必是見棄但不知其見棄之由闕之可也誕彌厥月誕音但彌音眉朱氏曰誕發語辭也傳曰彌終也箋曰終十月而生先生如逹鄭音撻毛如字朱氏曰先生首生也說文曰達小羊也箋曰羊子也疏曰人之産子先生者多難薛琮答韋昭云羊初生達小名羔未成羊曰羜大曰羊羊子以生之易故比之不坼不副坼音䇿副音僻舊孚逼反今考曲禮上為天子削瓜者副之本注云析也普逼反是音僻也韻拍逼反音同疏曰坼副皆裂也楚世家云陸終娶於鬼方氏曰女潰孕三年不乳乃剖其左脅獲三人焉剖其右脅獲三人焉削瓜者副之是副為裂也無菑無害菑音災以赫厥靈傳曰赫顯也上帝不寧不康禋祀箋曰康寧皆安也居然生子疏曰居然無病次章述稷生之易也姜嫄之孕后稷終滿懷任之十月而生之婦人初産則多難此后稷是首生之子乃如羊子之易不坼割不副裂無菑殃無患害是天顯其神靈異於常人也上帝豈不安寧之乎豈不安享其禋祀乎而使之安然無病而生子也誕置之隘巷置音志隘於懈反巷戶降反傳曰置置也牛羊腓字之腓音肥傳曰腓避也字愛也誕置之平林㑹伐平林朱氏曰㑹值也誕置之寒氷疏曰姜嫄以元鳥至月而禋祀在母十月而生稷其生正當氷月鳥覆翼之傳曰一翼覆之一翼藉之蘇氏曰覆蓋也翼藉也鳥乃去矣后稷􅈱矣􅈱音孤蘇氏曰􅈱泣聲也書啓􅈱􅈱而泣朱氏曰泣則不死也實覃實訏覃音談訏音吁傳曰覃長也訏大也厥聲載路錢氏曰載語助也路謂聞於路也三章述稷生而見棄之事置之於狹隘巷中牛羊腓避而字愛之嬰兒未有所知當為牛羊所踐今乃避而愛之牛羊而避人者理之常也又棄此后稷置之平地林木之中值有人往伐平林伐木之人見而收取之嬰兒之在林野當為鳥獸所害乃值人收取之亦是常理又棄此后稷置之寒冰之上有大鳥來以一翼覆蓋之一翼翼藉之則為異甚矣人乃往收取鳥飛去矣后稷遂􅈱􅈱然而泣其泣聲覃長而訏大在平林而聞於路也舊以實覃實訏厥聲載路在下章朱氏移在此今從之兒生泣聲長大亦為福祥解見斯干誕實匍匐匍音蒲匐音白又音服解見邶谷風克岐克嶷岐音其嶷音逆魚極反曹氏曰岐嶷言其能立也今曰岐嶷承匍匐之下則為能立傳以岐為知以嶷為識今不從以就食食朱氏曰口食自能食也蓋六七嵗時也藝之荏菽藝字亦作藝荏音稔箋曰藝種也荏菽大豆也釋草曰戎菽為之荏菽釋曰孫炎云大豆也樊光李巡郭氏皆云今胡豆管子云北戎山戎出冬葱及荏菽布之天下今之胡豆是也荏菽斾斾音佩傳曰斾斾長也長如字朱氏曰斾斾揚起也錢氏曰如旗之斾也禾役穟穟音遂傳曰役列也疏曰種禾則有行列錢氏曰穟與穗通穟穟禾多穗也麻麥幪幪莫孔反傳曰幪幪茂盛也曹氏曰蒙密也瓜瓞唪唪瓞音迭唪布孔反傳曰唪唪多實也四章述稷幼好種殖之事也后稷之生其始實能匍而手行匐而伏地稍長則岐嶷而能立免乳以就口食才始能食其嬉戲之時即有種殖之志種殖大豆其大豆斾斾然揚起禾之行列穟穟然多穟麻麥則幪幪然䝉密瓜瓞則唪唪然多實異于常人所種也疏曰周本紀云棄為兒時其遊戲好種殖麻麥麻麥美即此章是也誕后稷之穡有相之道相去聲傳曰相助也張子曰他人之穡則任其自然惟后稷之穡則盡人力之助有相之之道焉贊化育之一端歟今曰有輔相之道即茀草一端可以類見茀厥豐草茀音弗傳曰茀治也王氏曰草盛曰茀治茀亦謂之茀猶治亂謂之亂箋曰豐茂也種之黃茂種上聲傳曰種之黃色者唯黍稷耳實方實苞傳曰方極畝也箋曰方齊等也疏曰毛言地皆方正有苗鄭言齊等與𫝊極畝亦同但齊等據苗均極畝據地滿耳今曰禹貢草木漸包注云叢生相包一本作苞毛以為本鄭以為茂其意則一言苗生成叢也詩中凡言苞並同實種實褒種上聲褒音又箋曰種生不雜也傳曰褒長也實發實秀錢氏曰發生莖也長樂劉氏曰秀將實也今曰論語秀而不實朱氏解云吐華曰秀是禾生花而將實也實堅實好今曰堅成實而堅也大田既堅言於既皂之下皂為成實未堅故堅為成實而堅也好解見大田實穎實栗傳曰穎垂穎也栗其實栗栗然今曰書異畝同穎注穎穟也是垂穟也箋曰栗成就也疏曰左傳云嘉栗㫖酒服處云榖之初熟為栗王氏曰栗不秕也秕音七即有邰家室邰音台釋文曰邰今京兆武功縣傳曰邰姜嫄之國也堯見天因邰而生后稷故國后稷於邰疏曰杜預云武功縣所治斄城是也此邰為后稷之母家其國當自有君所以得封后稷者或時君絶滅或遷之他所斄音台與邰同五章述后稷掌稼穡而封邰也后稷稼穡有輔相造化之道教民先治去其豐茂之草然後擇其種之黃色而茂盛者擇種之後始種藝之下乃言禾生之次序始而苗中而秀末而實也方者極盡壟畝方正齊等是苗生之始也既方矣則欲其苞而成叢既苞矣則欲其種而不雜既種矣則欲其褒而長以上言禾之苗也既褒矣則欲其發而生莖既發矣則欲其秀而吐華以上言禾之秀也既秀矣則欲其堅而成實既堅矣則欲其好而無損壞既好矣則欲其穎而垂穟既穎矣則欲其栗而成就以上言禾之實也所以詳言其成熟之次序者見稼穡之艱難非一日所能致或苗而不秀或秀而不實滅裂耕者報之以滅裂鹵莽耘者報之以鹵莽今后稷能教之以盡人事故其穡如此堯於是封之於邰使就邰之家室大田言既方既早鄭氏以方為孚甲始生此詩言實方實苞鄭氏以方為齊等二方字異義何也蓋大田言既方既早既堅既好皆言榖之成熟故方為孚甲始生此詩言實方實苞實發實秀發方生莖秀方吐華故方為齊等言苗生之齊未有孚甲也大田言既種既戒鄭氏以種為擇其種此詩言實種實褒鄭氏以種為生不雜二種字異義何也蓋大田言既種既戒在未耕之前故為擇其種此詩前言種之黃茂已是擇種繼言實種實褒在方苞之後故為生不雜也誕降嘉種朱氏曰降言教民稼穡是降於民也書云稷降播種是也維秬維秠秬音巨秠音匪韻披之上傳曰秬黑黍也釋草曰秬一稃二米桴音孚榖皮也李巡曰秬是黑黍之大名黑黍之中一桴有二米者别名為之秠疏曰秬秠皆黑黍而春官鬯人注云秬如黑黍一秠二米言如者以黑黍一米者多秬為正稱二米則秬中之異秬有二等一米亦可為酒鬯人之注必言二米者以宗廟之祭唯祼為重二米嘉異之物鬯酒冝用之柸即皮也維穈維芑穈音門芑音起釋草曰釁赤苗芑白苖釁穈同郭璞曰穈今之赤粱粟芑今之白粱粟穈芑皆好榖也恆之秬秠恆音亘本又作亘傳曰恆遍也疏曰言種之廣多今曰恆音衡訓常也久也無别音唯亘字古鄧反訓通也遍也竟也今毛訓遍則本作亘者為是是穫是畝箋曰成熟則穫而畝計之今曰計所穫也恆之糜芑是任是負任音壬王氏曰任肩任之也負背負之也蘇氏曰任擔也以歸肇祀傳曰肇始也王氏曰后稷始受國為祭主故曰肇祀李氏曰只當從王氏以后稷肇祀為祭宗廟末章為配天毛鄭謂后稷得郊祀是誣后稷也六章述后稷封邰之後教其國人播種嘉榖將以祭祀宗廟也秬秠穈芑四者皆嘉榖鬱鬯又用黑黍故后稷擇嘉種而降於民以教其耕種其嘉種維黑黍之秬也維黑黍而一稃二米之秠也維赤梁粟之糜也維白梁粟之芑也乃遍種之以秬秠至熟時則於是穫刈之於是畝計之遍種之以穈芑至熟時則於是肩任之於是背負之以歸而始祭焉后稷封邰初祭宗廟也誕我祀如何朱氏曰我祀承上章而言后稷之祀也或舂或揄舂傷容反揄音由又音俞釋文曰舂搗也傳曰揄抒臼也抒殊之上謂取出也疏曰謂抒米以出臼或簸或蹂簸波之上蹂音柔傳曰簸糠也長樂劉氏曰蹂以稅其穗疏曰蹂踐其黍然後舂之文當在舂之上以揄簸俱是舂進令與舂相近且退蹂以為韻也釋之叟叟音搜傳曰釋淅米也淅音昔疏曰謂洮米也洮音陶傳曰叟叟聲也蒸之浮浮傳曰浮浮氣也載謀載惟箋曰惟思也今曰惟思之専也李氏曰欲其無所不謹無所不備也取蕭祭脂曰蕭香蒿也牛尾蒿也解見蓼蕭箋曰取蕭草與祭牲之脂爇之行神之位爇如恱反疏曰蕭合黍稷臭陽逹于牆屋故既奠然後焫蕭合羶薌皆郊特牲文爇燒也言宗廟之祭以香蒿合黍稷燒之以合其馨香之氣使神歆饗之此言祭脂彼不言脂彼言黍稷此不言黍稷皆文不具耳焫音爇薌音馨香朱氏曰取蕭祭脂宗廟之祭取羝以軷羝音抵軷音跋傳曰羝牡羊也軷道祭也疏曰道祭謂祭道神秋官大人云凡祭祀供犬牲伏瘞亦如之鄭司農云伏謂伏犬以王車轢之此用羝亦伏體軷上曹氏曰內言焫蕭外言釋軷則羣祀皆舉矣載燔載烈煩音煩燔解見楚茨傳曰貫之加于火曰烈箋曰燔烈其肉疏曰烈是火猛之意不可近燒故云貫之加於火上即今之炙肉也燔是近火燒之炙是逺火炙之今曰如疏之言是烈亦炙也以興嗣嵗今曰嗣嵗者繼今嵗謂來年也七章乃述后稷祭祀之事也我后稷之祭祀其禮如何先以所得秬秠穈芑之粟或使人舂之或使人揄出之或使人簸揚其糠或使人蹂踐其禾取榖以繼之言各有司存並皆敏疾也既蹂舂得米乃浸之於盆而淅之其聲叟叟然乂盛之以甑而蒸之其氣浮浮然以為酒體及簠簋之實也及戒祭祀之事則又謀度之則又思惟之無所不至其謹也於是或取蕭之香草與祭牲之脂膏而爇燒之為宗廟之祭諸侯之祭莫大於宗廟也又或取牡羊以為犯軷之祭軷道祭也祭七祀之行神也諸侯有朝聘之事則軷祭上自宗廟下至軷祭羣祀該舉之矣或取肉𫝊火而燔之或取肉貫之加火而烈之纎悉無不盡矣凡此者皆欲以興起來嵗之事謂禱其又豐也不曰來嵗而曰嗣祭欲其豐年相續也夏官大馭掌馭玉路以祀及犯軷注云行山曰軷封土為山象以菩芻棘柏為神主菩音負又音倍芻音初既祭以車轢之而去轢音歷喻無險難也邶泉水疏引春秋傳云跋涉山川然則軷山行道之名也鄭氏於楚茨或燔或炙以炙為炙肝此詩烈亦炙也乃云燔烈其肉蓋鄭意以楚茨言宗廟之祭特牲以肝配燔故炙為炙肝此詩為后稷將郊而先軷祭以上皆言軷祭之事故烈為烈其肉今以此詩言燔烈為總說宗廟及軷祭非専指軷也卬盛于豆卬盛音昂成朱氏曰此章言尊祖配天之祭傳曰卬我也木曰豆薦菹醢也疏曰釋器云木豆謂之豆醢人掌四豆之實皆有菹醢于豆于登傳曰瓦曰登大羹也箋曰祀天用瓦豆陶器質也疏曰釋器云瓦豆謂之登公食大夫禮云大羹湆不和實於登大古之耕不調以鹽菜湆肉汁也湆音泣今曰登升之登無丿豆登之登有丿其香始升上帝居歆箋曰居安也歆饗也胡臭亶時箋曰胡何也亶誠也朱氏曰臭香也李氏曰言祭得其時也士冠禮云嘉薦亶時時有考見魚麗后稷肇祀庶無罪悔以迄于今迄欣之入傳曰迄至也李氏曰使我子孫無有罪悔至于今而有天下也末章言尊后稷以配天也我今以菹醢盛之于木豆又以大羹盛之于瓦登器用陶匏大羹不和禮至簡也其馨香之氣始升于上而上帝以安饗之何香臭之誠得其時乎言天之所饗不在物也蓋天生后稷以養民后稷能教民稼穡以相天故以功封邰而祀宗廟為周家祭祀之始天心眷之久矣自后稷肇祀以來子孫世修其業不敢失墜以獲罪于天遂至今日得以成王業而郊天天之歆饗蓋在此耳周之郊也因稷而致所謂文武之功起於后稷尊后稷以配天不亦冝乎我將文王配帝之詩生民后稷配天之詩也我將言牛羊不足以必天之右惟儀式刑文王之典庶天心右饗之此詩言豆登何足以致帝之歆惟世修后稷之業乃有今日其意皆相類生民八章四章章十句四章章八句行葦音偉忠厚也周家忠厚仁及草木故能內睦九族九族解見王葛藟外尊事黃耉音苟黃耉解見南山有臺養老乞言以成其福祿焉詩記曰自周家忠厚以下論成周盛德至治則得之然非此詩之義也意者講師見序有忠厚之語而附益之歟敦彼行葦敦音團傳曰敦聚貌行道也曰大者葭蘆葦一名華一物而四名解見七月疏曰葦初生為葭此禁牛羊勿踐則見春夏時事而言葦者此愛其為人用人之所用在於成葦故以成形名之牛羊勿踐履朱氏曰勿禁止之辭方苞方體苞解見生民張子曰草叢生以喻兄弟箋曰體成形也曹氏曰幹也錢氏曰成莖也維葉泥泥上聲傳曰葉初生泥泥今曰蓼蕭零露泥泥為霑濡貌則此言泥泥是潤澤之意蓋泥泥是濕也戚戚兄弟傳曰戚戚內相親也詩記曰唯體之深者為能識之莫逺具爾朱氏曰莫猶勿也箋曰具猶俱也蘇氏曰爾近也今曰地官肆長云實相近者相邇也注爾亦近也首章發兄弟之愛也興也言敦敦然聚者是彼道傍之蘆葦勿令牛羊踐履之此葦方苞而成叢方體而成莖其葉初生泥泥然潤澤而可愛忍傷之乎葦之叢生如兄弟之聚也戚戚然親愛之兄弟切莫疏逺冝俱相親近也此詩以行葦興兄弟維葉泥泥戚戚兄弟之辭體察精微懇欵親切惻然惟恐傷之千載之下猶能使人興起也詩記曰此詩毛氏七章二章章六句五章章四句鄭氏析為八章以文義考之當從毛氏一章以行葦興兄弟宜作六句二章言陳設冝作四句三章言燕樂冝作六句後四章則不可增損毛鄭所同也戚戚兄弟莫逺具爾忠厚之意藹然見於言語之外矣下章之燕樂皆所以樂乎此也或肆之筵音延傳曰肆陳也或授之几箋曰兄弟之年稚者為設筵而已老者加之以几曹氏曰几尊者憑之以為安肆筵設席傳曰設席重席也疏曰既言肆筵上又設席故知重席也不過下莞上簟而已春官司几筵注云筵亦席也鋪陳曰筵藉之曰席然則在下為鋪陳在上人所蹈藉故在下者稱筵在上者稱席授几有緝御箋曰緝猶續也御侍也相續代而侍者疏曰凡御者皆侍其測長樂劉氏曰不暫閧其侍從也李氏曰緝御即所謂更僕是也次章述陳設也或陳之以筵謂行燕禮也或授之以几優老也兄弟之年稚者鋪筵而已老者則鋪筵而又設席於筵之上加重席也老者既授以几又有相續代而侍者或獻或酢音胙箋曰進酒於客曰獻客答之曰酢洗爵奠斚音嘏傳曰斚爵也夏曰盞殷曰斚周曰爵盞音盞箋曰主人又洗爵酬客客受而奠之不舉也疏曰王與族人燕以異姓為賔宰夫為主人所洗所奠猶一物也而云洗爵奠斚似是異器故辦之云斚爵也爵酒器之大名故儀禮飲觶者亦云卒爵是爵為總稱作者因洗奠之别更變其文耳夏曰盞以下皆明堂位文引之者明斚非周器為之斚者彼注為畫禾稼也觶音志醓醢以薦醓他感反嗿音同醢音海箋曰薦之禮非菹則醓醢疏曰李巡云以肉作醬曰醢天官醢人注云醓肉汁也用肉為醢特有多汁故以醓為名其無汁者自以所用之肉魚鴈之屬為之名也或燔或炙燔音煩炙音隻箋曰燔用肉炙用肝解見楚茨嘉殽脾臄脾音皮臄渠略反傳曰臄函也箋曰以脾函為加故謂之嘉疏曰燔炙是正饌以脾函為加助服䖍云口上曰臄口下曰函說文曰函舌也又曰口裏肉也或歌或咢音鄂傳曰歌者比於琴瑟也徒擊鼓曰咢比音備疏曰經傳諸言歌者皆以絃和之孫炎云咢聲驚咢也三章述燕樂也燕兄弟之時或主人進酒而獻之於賔賔既卒爵酌而酢主人主人卒飲又洗爵以酬賔賔受而奠此斚不復舉之斚即爵也有肉醬多汁之醓醢以薦進之又或入火以燔其肉或近火以炙其肝以為羞其正饌之外所加善殽則有脾與臄又作樂助歡或歌而比於琴瑟或咢而徒擊鼓親親之厚也李氏曰言侍御獻酬飲食歌樂之盛也今考燕禮諸侯燕其臣以膳宰為主人主人獻賔賔卒爵賔洗爵酢主人主人卒爵主人獻公公卒爵公酌酢主人主人卒爵於是主人酌以酬賔賔遂奠而不舉也敦弓既堅敦音雕傳曰敦弓畫弓也天子敦弓疏曰敦與雕古今字之異雕是畫飾之義弓人為弓唯言用漆不言畫則漆上又畫之其諸侯公卿宜與射者自當各有其弓不必畫矣李氏曰荀子曰天子雕弓諸侯彤弓大夫黑弓何休公羊注亦云天子雕弓諸侯彤弓大夫嬰弓士盧弓此言敦弓即所謂天子雕弓也朱氏曰堅猶徑也四鍭既鈞鍭音候又音侯釋文曰鍭矢名傳曰鍭矢三亭疏曰三亭謂三分矢一在前二在後輕重鈞停四矢皆然故言四鍭既鈞冬官矢人為鍭矢三分一在前二在後注云三訂之而平者前有鐡重也方言云關西曰箭江淮謂之鍭則鍭者鐵鏃之矢名也鐵音鐵舍矢既均舍音捨傳曰已均中藝箋曰舍釋也藝質也疏曰舍放矢也四矢皆中也序賔以賢丘氏曰射以中多者為賢朱氏曰投壺云某賢於某若干純竒則曰竒均則曰左右均是也四章五章述燕射也既燕族人而射以為樂其天子親所射雕畫之弓既堅徑矣其四矢既輕重鈞停矣放舍此矢既均而皆中矣次序衆賔以射中多者為賢也諸臣不必畫弓以天子之燕射故舉天子之弓言之耳鄭以為將養老擇士大射王肅以為燕射詩記從王詩記曰以詩之所叙考之儀禮王肅之說是也然學者讀此詩當深挹順弟和樂之風以自陶治若一一拘牽禮文則其味薄矣敦弓既句溝之去疏曰彀與句字異音義同引滿也既挾四鍭挾音浹又音協箋曰射禮搢三挾一今言已挾四鍭則已遍釋之疏曰搢插也挾謂手挾之射用四矢故插三於帶間挾一以扣弦而射也謂卿大夫若其君則使人屬矢不親挾也今曰儀禮鄉射大射皆云搢三挾一個又云挾乘矢注云方持弦矢曰挾弦縱而矢橫為方凡挾矢於二指之間橫之謂左手執弓把見矢鍭於把外右手大指鉤弦二指挾持其矢故弦縱而矢橫弦與矢作十字故方也凡兩物夾一物曰挾此矢在弦之外二指之內故曰挾四鍭如樹丘氏曰如以手植之曹氏曰言其巧且力也序賔以不侮朱氏曰不侮不以中病不中者也射以中多為俊以不侮為德敦弓既引滿四鍭皆已挾則遍釋之矣四鍭皆中如以手植之然其序以不侮為貴尚德也不以中多陵人也曽孫維主傳曰曽孫成王也酒體維醹音乳傳曰醹厚也疏曰謂酒之醇者酌以大斗傳曰大斗長三尺也疏曰大斗長三尺謂其柄也漢禮器制度注勺五升徑六寸長三尺是也此蓋從大器挹之以樽用此勺耳其在樽中不當用如此之長勺也以祈黃耉疏曰祈求也黃耉解見南山有臺六章述既射而復終燕因以乞言也為之主者成王也其酒醴皆醇厚矣遂以長柄大斗從大器中酌之於樽以為體而求於黃耉之人謂乞言也二章言授几緝御之事則兄弟之中有老者存焉古者燕飲於旅也語必因以求誨言於老成人凡一話一言皆足以為熏陶漸染之益不徒為燕樂也黃耉台背台音胎徐又音臺傳曰台背大老也箋曰台之言鮐也大老則背有鮐文鮐音臺疏曰郭璞云老人氣衰皮膚消瘠背若鮐魚也劉熙釋名云九十曰鮐背以引以翼夀考維祺音其傳曰祺吉也以介景福箋曰介助也景大也七章終上章乞言之意也成王乞言於黃耉台背之大老此大老告成王以善道引而導之翼而輔之以成其德故自天祐之成王得夀考吉祥助其大福也行葦七章二章章六句五章章四句鄭氏作八章章四句今從毛氏既醉大平也大音泰後大平皆倣此醉酒飽德人有士君子之行焉行去聲此詩成王祭畢而燕羣臣也大平無事而後君臣可以燕飲相樂故曰大平也講師言醉酒飽德止是首章二語又言士君子之行非詩意矣既醉以酒既飽以德朱氏曰德王之德也陳氏曰燕接之間恩澤充足故言既飽以德君子萬年箋曰君子斥成王也介爾景福成王與羣臣祭畢而燕於寢羣臣美之言成王既醉我以酒矣燕接之間恩澤充足既飽我以德矣無以報上願其享萬年之夀而天助爾大福也既醉以酒爾殽既將箋曰殽俎實也疏曰歸俎者以牲體實之於俎也楚茨篇為俎孔碩或墦或炙詩記曰國語晉獻公令司正實爵與史蘇云賞女以爵罰女以無殽傳曰將行也朱氏曰亦奉持而進之意君子萬年介爾昭明丘氏曰謂發其智慮也羣臣又欲天助成王以昭明之德昭明有融朱氏曰融明之盛也春秋傳云明而未融高朗令終朗郎之上傳曰朗明也朱氏曰虛明也令終善終也令終有俶音觸傳曰俶始也公尸嘉告協韻音谷傳曰公尸天子以卿疏曰白虎通引曽子云王者宗廟以卿為尸不以公為尸避嫌三公尊近天子親稽首拜尸故不以公為尸白虎通又云周公祭太山用召公為尸蓋天地山川得用公也詩記曰周之追王止於大王則宗廟之祭尸之尊者乃公尸也箋曰嘉告以善言告之為嘏辭也羣臣祝成王昭明而又極於融融者一理混融徹上徹下無復疑滯明之盛也靡不有初鮮克有終始明終昏者多矣故又祝其高明而善終也過而後改迷而後復不若有始有卒之盡善故祝其善終而又欲其有始如太甲有終而無始不得為全善矣成王以幼冲嗣服欲善其終當謹其始乃始終如一也令終有俶猶仲虺言慎厥終惟其始伊尹言慎終如始也能如是則神降之福公尸以善言來告矣舊說以令終為考終命此非臣子祝君之辭也一章二章方祝君以萬年不應三章遽祝以考終命其言不倫由鄭氏鑿說以景福為五福孔氏遂牽合謂令終為考終命然鄭箋令終云以善名終則鄭意亦不然孔求之過耳其告維何籩豆靜嘉箋曰靜嘉潔清而美也長樂劉氏曰靜言其滌濯且敬也嘉言其新美而時也陳氏曰𫝊所謂馨香無讒慝之意也朋友攸攝朱氏曰朋友指助祭者疏曰攝者收斂之意蘇氏曰檢也攝以威儀疏曰祭義所謂濟濟漆漆是也漆音切公尸所告者其言何如乎言汝籩豆所盛之物潔靜而嘉姜汝之朋友助祭者能相檢攝而佐助之其檢攝以威儀莫有惰容也設為嘏辭以見主祭與助祭者皆當神意也黃氏曰祭不在物而在誠誠之所可見者寓於威儀之間威儀孔時箋曰孔甚也時冝也君子有孝子箋曰有孝子之行孝子不匱傳曰匱竭也今曰祭義云孝有三小孝用力中孝用勞大孝不匱博施備物可謂不匱矣永錫爾類箋曰長以與女之族類謂廣之以教道天下也春秋傳云頴考叔純孝也施及莊公施音異上章設為嘏辭此章以下則承嘏辭之意而衍之言威儀甚得其冝者此由成王有孝子之行也祭義說祭祀奉承薦進之容貌蓋以孝子言之蓋因其容貌之形見以知其孝敬之深厚即此詩之意也孝子之行無有匱竭能化天下皆為孝是永錫爾類也聖人之於民類也同此類則同此心孝者人心之同然以心感心放之四海而準是錫類也洪範錫福之意亦如此祭祀稱孝子其來尚矣其類維何室家之壼音閫傳曰壼廣也釋宫曰宫中巷謂之壼今曰宫中巷者由內出外之路喻行於家而逹於外也故毛以為推廣之義君子萬年永錫祚𦙍祚音助𦙍羊刃反箋曰祚福祚也傳曰𦙍嗣也朱氏曰子孫也其錫類如何乎王者之化由室家而推之天下如宫中之巷由內而行出於外也成王能如此宜其享萬年之壽而天又錫之以福祚及繼嗣之子孫也其𦙍維何天被爾祿被音避箋曰被覆被也君子萬年景命有僕李氏曰僕屬而不絶今曰孟子僕僕亟拜言拜之頻煩亦不絶之意其天錫以繼嗣者如何乎乃犬覆被女以福祿使有萬年之夀而大命僕屬不絶也此章問以繼嗣而言福祚者言天錫以繼嗣故福祚不絶也其僕維何釐爾女士釐音離傳曰釐豫也箋曰女士女而士有行者釐爾女士從以孫子箋曰從隨也其大命之僕屬如何乎乃天錫以女而有士行者以為妃又使生賢智之子孫以隨之此章問以福祚而言繼嗣者言天錫以福祚故繼嗣繁昌也與上章互言之耳既醉八章章四句鳧鷖音符伊守成也疏曰物極則反或將喪之成之既難守亦不易故美其能守之也太平之君子箋曰君子斥成王也能持盈守成神祗祖考安樂之也祗音其樂音洛疏曰神者天神祗者地神祖考則人神也祭天神地祗祖考皆有尸五章皆言公尸又四章言既燕于宗毛以為皆言祭宗廟其說是也疏曰毛以為皆祭宗廟則是祖考耳而兼言神祗者以推心事神其致一也能事宗廟則亦能事天地因祖考而廣言神祗明其皆安樂之也鳧鷖在涇曹氏曰鳧野鶩也鶩音木釋鳥曰鸍沉鳧鸍音施又音彌郭璞曰鳬似鴨而小長尾背上有文今江東亦呼為鸍陸璣曰大小如鴨青色卑腳短喙水鳥之謹願者也疏曰蒼頡解詁云鷖鷗也涇解見邶谷風公尸來燕來寧公尸解見既醉箋曰祭祀既畢明日又設禮而與尸燕疏曰言公尸來燕則是祭後燕尸非祭時也燕尸之禮大夫謂之賔尸即用其祭之日今有司徹是其事也天子諸侯則謂之繹以祭之明日春秋宣八年言辛巳有事于太廟壬午猶繹是謂在明日也此公尸來燕是繹祭之事爾酒既清箋曰爾成王也爾殽既馨傳曰馨香之逺聞也公尸燕飲福祿來成興也祭之明日行燕尸之禮鎬京近涇水指土地所見言之野鳧與鷖鷗皆水鳥也水鳥在水中得其所喻公尸來燕而安寧也成王酒清殽馨以與公尸燕飲故神以福祿來成汝矣渭水東流先會豐而後㑹涇豐水自南而入渭涇水自西北而入渭文王居豐在豐水之西則越豐而後至涇武王居鎬在豐水之東則去涇近矣張衡西京賦云欱灃吐鎬據渭踞涇見涇水近鎬也欱呼合反鳧鷖在沙傳曰沙水旁也疏曰需卦需于沙注云沙接水者公尸來燕來冝今曰來而冝之謂樂之也爾酒既多爾殽既嘉公尸燕飲福祿來為去聲箋曰為猶助也鳧鷖在渚音煮解見江有汜公尸來燕來處音杵傳曰處止也爾酒既湑胥之上毛伐木傳曰湑莤之也莤與縮音義同謂以茅泲之而去其糟也泲亦作濟上聲也爾殽伊脯疏曰乾脯也公尸燕飲福祿來下鳧鷖在潨音崇傳曰潨水㑹也說文曰小水入大水也公尸來燕來宗傳曰宗尊也李氏曰來居尊位也既燕于宗疏曰燕於宗廟福祿攸降戶江反公尸燕飲福祿來崇吕氏曰崇積而高大也鳧鷖在亹音門傳曰亹山絶水也曰亹謂山當水路令水勢斷絶也西漢地理志金城郡有浩亹縣注云浩水名也亹者水流峽山間兩岸深若門也浩音告公尸來止熏熏傳曰熏熏和悅也㫖酒欣欣傳曰欣欣樂也燔炙芬芬傳曰芬芬香也公尸燕飲無有後艱今曰後艱猶後患也鳧鷖五章章六句假樂音暇洛嘉成王也疏曰正詩例不言美以見為經之正因訓假為嘉故轉經以見義假樂君子傳曰假嘉也今曰左傳中庸皆作嘉樂則假訓為嘉也顯顯令德宜民宜人陳氏曰民在下之民也人在位之人也疏曰能安民能官人其文與此相類受祿于天言可嘉樂者此成王也有顯顯之善德冝其在下之民謂萬姓以和也宜其在位之人謂百官以和也人民皆冝是可嘉樂以此能受福祿於天也保右命之自天申之傳曰申重也重去聲千祿百福箋曰千求也子孫千億箋曰十萬曰億解見楚茨既保安之又右助之又從而命之是自天申命用休也成王有千祿之道而得百福千祿言自求多福謂在我有以致之非天私於成王也宜成王子孫之繁至于千億𫝊之無窮也穆穆皇皇釋訓曰穆穆敬也釋詁曰皇皇美也宜君宜王傳曰宜君王天下也不愆不忘箋曰愆過也率由舊章箋曰率循也由用也長樂劉氏曰舊章先王之禮樂政刑也成王之德穆穆然敬皇皇然美宜其為君冝其為王也又不愆過不遺忘以循用先王之舊法鄭氏以穆穆皇皇宜君宜王為子孫以不愆不忘率由舊章復為成王文意斷續此由分章之誤也穆穆皇皇與抑抑秩秩一體率由舊章與率由羣匹相對皆言成王也宜君宜王即所謂宜民宜人也威儀抑抑賔之初筵傳曰抑抑慎密也德音秩秩傳曰秩秩有常也錢氏曰有序也無怨無惡烏露反又如字率由羣匹今曰羣耦謂衆同德之臣也成王之威儀抑抑然謹密其德音言語秩秩然有常言行皆盛德之所著見故能無所咎怨無所憎惡推誠樂與惟循用羣臣之賢匹耦於己者言志同道合也此章與上章一體不愆不忘為率由舊章言之也無怨無惡為率由羣匹言之也音聲也德音有德之聲音也言語教令聲名皆可稱德音此詩德音秩秩可以為言語教令不可以為聲名皇矣貊其德音可以為教令聲名不可以為言語南山有臺德音不已德音是茂及有女同車德音不忘車舝德音來括皆聲名也小戎秩秩德音鹿鳴德音孔昭日月德音無良邶谷風德音莫違皆言語也受福無疆四方之綱之綱之紀燕及朋友傳曰朋友羣臣也朱氏曰燕安也言人君能綱紀四方而臣下賴之以安詩記曰泰誓云友邦冢君酒誥云太史友內史友則朋友者合百辟卿士言之也今曰朋友即丁文百辟卿士燕及朋友猶燕及皇天成王受福無窮故於天下之治惟總其大綱大綱舉而小紀自隨則大平極治可傳於永久此無窮之福也羣臣與國同休是安及羣臣也百辟卿士董氏曰百辟諸侯也卿士羣臣也媚于天子箋曰媚愛也不解于位解音懈今曰解怠也民之攸塈音餼傳曰塈息也外而百辟內而卿士皆媚愛于成王而不解怠於其職位此民之所由以休息也假樂六章章四句舊四章章六句今從陳氏詩緝卷二十七
