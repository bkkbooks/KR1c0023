body:
  text: 詩緝卷三宋嚴粲撰邶音倍國風譜曰邶鄘衛者商紂畿內之地其封域在禹貢冀州大行之東北踰衡漳東及兖州桑土之野周武王伐紂以其京師封子武庚為殷後乃三分其地置三監使管叔蔡叔霍叔尹而教之自紂城而北謂之邶南謂之鄘東謂之衛武王既喪三監導武庚叛成王既黜殷命殺武庚復伐三監更於此三國建諸侯以殷餘民封康叔於衛使為之長後世子孫稍并彼二國混而名之七世至頃侯當周夷王時衛國政衰變風始作作者各有所傷從其國本而異之為邶鄘衛之詩焉疏曰衛云至于頓丘頓丘今為縣名在朝歌紂都之東也紂都河北而鄘云在彼中河鄘境在南明矣三國如此次者以君世之首在前者為先頃公三國詩之最先故邶在前也鄘柏舟與淇奧雖同是武公之詩共薑守義事在武公入相之前故鄘次之衛為後也周南國風疏曰既以衛國為首邶鄘則衛之所滅故以邶鄘先衛也程子曰諸侯擅相侵伐衛首并邶鄘之地故為變風之首朱氏曰邶鄘之詩皆主衛事而必存其舊號者豈其聲之異與前漢地理志曰衛地有桑間濮上之阻男女亦亟聚會聲色生焉亟音器夫婦之經萬化之原關雎鵲巢為三百篇綱領風之正也反乎此者變也邶鄘衛皆衛風也衛禍基於袵席覃及宗社居變風之首二南之變也王道盛則諸侯不得擅相并存邶鄘之名不與衛之滅國也邶列其右衛後於鄘世次也邶柏舟夷王時鄘柏舟宣王時衛淇奧幽王時柏舟言仁而不遇也衛頃公之時頃音傾疏曰頃侯柏子今考世家頃侯不記名仁人不遇小人在側曰衛頃公詩夷王時衛衰世也而有柏舟之仁人非無賢也不遇合耳雖仕其朝而不得行其志也君子不遇合則小人親近而得志矣其勢相為消長也此詩皆憂國之言身雖不遇而惓惓於國今誦其詩猶想見其藹然仁人之氣象也劉向列女傳以邶柏舟為衛宣夫人之詩此魯詩説也孔叢子載孔子讀柏舟見匹夫執志之不可易則非婦人之詩也泛彼柏舟泛通作泛今曰泛浮也亦泛其流耿耿不寐耿音梗傳曰猶警警也錢氏曰耿耿小明心有所存不能忘之貌如有隱憂傳曰隱痛也微我無酒朱氏曰微猶非也以敖以遊敖音遨通作遨興也柏美材也以柏為舟美言之也詩經有柏舟松舟楊舟皆言舟耳義不在柏與松楊也泛謂浮於水流謂聽其自流而無以制之此仁人憂國之言謂舟必有人以維楫之而後能有所濟今浮舟於水而無其人以維楫之則亦浮泛而流去耳其將何所止泊乎所謂渡江河亡維楫中流而遇風波船必覆矣喻衛國無賢人以維持之則亦聽其自為敗壞耳其將何所底止乎猶言譬彼舟流不知所屆也此仁人所以憂國之將敗而警警然不能寐如有隱痛之憂也我非無酒可以敖遊而此憂非飲酒敖遊之所能釋也舊説柏木宜為舟而不用以載物故泛泛然流於水中喻仁人之不見用非也仁人憂在於國不謂已之不用今以柏舟自喻其材美以泛泛喻已之不見用即繼之以耿耿不寐如有隱憂則其辭傷於迫切而非仁人之氣象矣故舟以喻國流於水中以喻國之靡所底止為此而不寐為此而隱憂然後見仁人之心也采菽言泛泛楊舟紼纚維之棫朴言淠彼涇舟蒸徒楫之皆言舟之有待於維楫也鄘柏舟言泛彼柏舟在彼中河止謂舟在河中猶婦人在夫家耳所謂柏木宜為舟與泛泛不載物其説皆不通矣二詩皆衛人所作其言宜不甚相逺故知詩人取義不在於柏其用意皆在下句邶柏舟之意在於亦泛其流鄘柏舟之意在於在彼中河也我心匪鑒不可以茹音孺朱氏曰茹納也曹氏曰茹者容受之意鑒應而不臧歐陽氏曰鑒納影在內凡物不擇妍醜皆納其影我心不能兼容善惡粲曰柔則茹之為吞納之意此言鑒可茹與下章言石可轉席可卷意同毛以茹為度今不從亦有兄弟不可以據薄言往訴傳曰訴告也亦作訴逢彼之怒鑒雖明而不擇妍醜皆納其影我心有知善惡善則從之惡則拒之不能混雜而容納之也兄弟至親亦不可據蓋意嚮既殊則言不相入故往訴以情而反逢其怒謂已為婞直而違衆此女嬃申申詈豫也嬃音須我心匪石不可轉也我心匪席不可卷也卷音捲威儀棣棣音第錢氏曰棣棣盛也傳曰常棣華鄂相承其華繁盛故以棣棣形容威儀之盛不可選也選上聲詩記曰選擇也兄弟見怒欲已改行以趨時仁人於是自誓而言石雖堅尚可轉我心非石之比不可轉也言其堅之至也席雖平尚可卷我心非席之比不可卷也言其平之至也此不以兄弟之沮而易其守也威儀棣棣然盛自有常度不可有所選擇而自貶以苟合也此處羣小之間而雍容不失其常度也憂心悄悄鍬之上傳曰悄悄憂貌愠于羣小傳曰慍怒也覯閔既多覯溝之去草蟲傳曰覯遇也傳曰閔病也受侮不少靜言思之傳曰靜安也蘇氏曰言辭也寤辟有摽辟音闢摽飄之上傳曰辟拊心也摽拊心貌今曰摽本訓擊故摽然為拊心貌君子見遠識微憂先於事小人安其危而樂其所以亡見君子與已異趣則常疾視於君子故君子憂國之心悄悄然反見怒於羣小也君子遇小人讒譖之病既多矣小人反從而侵侮之受侮不少見君子孤而小人衆也靜而思之寤覺之中辟拊其心而手摽然痛國事之至此也日居月諸疏曰居諸者語助也箋曰日君象也李氏曰君猶日臣猶月也日月皆迭微是失其常度胡迭而微疏曰迭更也箋曰微謂不明也日月食則不明十月之交云彼月而微此日而微心之憂矣如匪浣衣靜言思之不能奮飛日食朔月食望日乎月乎何為更迭而皆微也喻衛之君臣皆昏也我心之憂如不浣濯其衣言處亂君之朝與小人同列其含垢忍辱如此是可以去矣而猶不去故靜而思之不能如鳥奮翼而飛去也箋曰臣不遇於君猶不忍去厚之至也柏舟五章章六句緑衣緑毛如字鄭改作禒音彖衛莊薑傷已也箋曰莊公夫人齊女姓薑氏曹氏曰莊公揚武公之子頃侯之曾孫也妾上僭上常之上濁箋曰謂公子州吁之母嬖而州吁驕夫人失位而作是詩也曰衛莊薑詩平王時莊公溺愛亂常實胎衛禍聖人存緑衣以明夫婦治道之原申二南之義以垂世戒非取女子之怨也此詩莊薑所自作而屬邶風者蓋邶人傳詠之而采詩者得之於邶耳疏以為邶國之人作之今不從緑兮衣兮緑衣黃裏傳曰緑間色黃正色間音澗疏曰緑蒼黃之間色黃中央之正色諸侯夫人祭服之下鞠衣為上展衣次之禒衣次之鞠衣黃展衣白禒衣黑皆以素紗為裏展音戰禒音彖傳曰玉藻云衣正色裳間色是間色不當為衣而正色當為衣也心之憂矣曷維其已傳曰憂雖欲自止何能止也興也言此間色之緑也今乃為衣也猶此本妾也今乃使之嬖寵而尊顯也以間色之緑為衣而正色之黃反以為裏猶妾上僭夫人為所掩蔽也禍亂之原將在於此莊薑言我心之憂何由得止謂家國可憂之事方來而未巳也讀詩不可鹵莽如讀緑兮衣兮不可但言是緑色之衣當玩味兩兮字詩有黃鳥白華不言黃兮鳥兮白兮華兮唯緑衣曰緑兮衣兮蓋緑字衣字皆有意義緑以喻妾衣以喻上僭故以二兮字點掇而丁寧之點平聲緑兮衣兮緑衣黃裳傳曰上曰衣下曰裳心之憂矣曷維其亡箋曰亡之言忘也曾氏曰亡失也不須訓為忘衣在上裳處下緑衣黃裏言掩蔽而已緑衣黃裳則貴賤倒置夫人失位矣緑兮絲兮女所治兮女音汝治平聲我思古人俾無訧兮訧音尤傳曰訧過也言此間色之緑也本是絲也乃女染治以為緑也女既染此絲以為緑豈可復以為衣而加諸黃色之上乎譬既以為妾則不可僭嫡也我思古人能處嫡妾使尊卑有序而無訧過也絺兮綌兮凄其以風凄音妻疏曰四月云秋日凄凄寒涼之意也箋曰妻旁二點者從冰也寒也妻旁三點者從水也雲貌此凄其以風及鄭風雨風雨凄凄四月秋日凄凄皆當從冰我思古人實獲我心絺綌暑服今當凄然寒風之時喻不適時而見棄猶班婕妤秋扇捐篋之意也我思古人能處嫡妾實得我心言當於人心也女子之情饒怨此詩但刺莊公不能正嫡妾之分其辭溫柔敦厚如此故曰詩可以怨緑衣四章章四句燕燕衛莊薑送歸妾也曰衛州吁詩桓王時朱氏曰莊薑作箋曰莊薑無子陳女戴媯生子名完莊薑以為已子莊公薨完立而州吁弒之戴媯於是大歸莊薑逺送之于野作詩見已志媯音規衛桓公也疏曰送歸妾明子死乃送之是州吁詩也日月終風擊鼓序皆云州吁凱風從上明之皆州吁詩也燕燕于飛曹氏曰燕燕兩燕也差池其羽差音叉又音雌李氏曰差池不齊貌曹氏曰差池言其相先後也之子于歸傳曰之子去者也歸歸宗也疏曰之子戴媯也逺送于野瞻望弗及泣涕如雨涕音體又音替説文曰泣無聲出涕也陳澤陂傳曰自目曰涕興也傳不言興今從朱氏燕以春來秋去有離别之義故以起興莊薑撫戴媯之子平時與戴媯恩信相親及莊公既沒嫡妾相依如雙燕之飛其羽差池相為先後而常相隨逐也今戴媯大歸而已獨留不復得如雙燕矣我逺送于野而與之别稍稍更逺瞻望不及令人念之泣涕如雨之傾也風人含不盡之意此但敘離别之恨而子弒國危之戚皆隱然在不言之中矣廣漢張氏曰蓋家國之事有不司勝悲者晉褚太后批桓溫廢立詔云未亡人不幸罹此百憂感念存沒心焉如割有合於詩人之情歟蘇氏曰婦人送迎不出門今送于野情不能已也燕鴻往來靡定别離者多以燕鴻起興如魏文帝燕歌行云燕歌之燕平聲餘並如字羣燕辭歸鴈南翔念君客遊思斷腸謝宣逺送孔令詩云巢幕無留燕老杜云秋燕已如客是也燕燕于飛頡之頏之頡音纈頏音航傳曰飛而上曰頡飛而下曰頏曹氏曰言其相上下也之子于歸逺于將之箋曰將送也瞻望弗及佇立以泣佇除之上濁傳曰佇久立也雙燕之飛或頡或頏亦常相隨逐也燕燕于飛下上其音下音暇上常之上濁傳曰飛鳴而下曰下音飛鳴而上曰上音今考韻元在物下之下上聲也自上而下之下去聲也元在物上之上去聲也自下而上之上上聲也二字雖有上聲然皆上濁讀近去聲曹氏曰言其相應和也之子于歸逺送于南傳曰陳在衛南瞻望弗及實勞我心言雙燕飛鳴上下而相隨逐也仲氏任只任鄭去聲毛平聲箋曰任者以恩相親信也朱氏曰只語助也其心塞淵李氏曰塞實也傳曰淵深也終溫且惠朱氏曰終言終始如一也淑慎其身先君之思箋曰先君莊公也以勗寡人勗凶肉反傳曰勗勉也箋曰寡人莊薑自謂也莊薑稱戴媯之字曰仲氏爾能以恩信相親又其心塞實淵深終然溫和惠順可謂善謹其身矣於其行也又以思念先君而勉我焉此章皆稱戴媯之美以為别辭所以致其愛戀無已之意末又述戴媯相勉之辭雖以見戴媯之賢而意緒黯然矣燕燕四章章六句日月衛莊薑傷已也遭州吁之難去聲傷已不見答於先君以致困窮之詩也曰衛州吁詩桓王時緑衣作於莊公之時傷已不見答也日月終風作於州吁之時傷已逢其亂也日居月諸李氏曰自古多以日比君月比夫人照臨下土乃如之人兮箋曰之人是人也謂莊公逝不古處音杵朱氏曰逝發語辭胡能有定寧不我顧粲曰説文云寧願辭也寧失不經之寧日月代明照臨下土天象之常如君與夫人之相須古之道也有如莊公不以古道相處故養成家國之亂何能有定苟能定則寧不顧我也言憂在於國而不計其身之私也日居月諸下土是冒傳曰冒覆也李氏曰亦照臨下土之意乃如之人兮逝不相好去聲胡能有定寧不我報曹氏曰報答也日居月諸出自東方李氏曰言日與月迭出於東方也乃如之人兮德音無良傳曰音聲也良善也粲曰聲音言語也此德音無良及邶谷風言德音莫違皆婦人言其夫待已之意耳故為聲音言語解見假樂朱氏曰德音美其辭無良醜其實也胡能有定俾也可忘德音無良言莊公待已其聲音言語之間皆無善意也今家國之亂何能有定是可憂也若往日之事則使我可忘不復追咎之矣詩之敦厚如此日居月諸東方自出李氏曰始則曰照臨下土既而曰下土是冒始則曰出自東方既而曰東方自出但顛倒其辭以便其韻耳父兮母兮畜我不卒箋曰畜養也卒終也胡能有定報我不述朱氏曰稱述也人窮則呼父母莊薑自傷父母養我不終而已家國之亂何能有定是我所憂若莊公所以待我者則不欲稱述之矣日月四章章六句終風衛莊薑傷已也遭州吁之暴見侮慢而不能正也曰衛州吁詩桓王時國史題日月終風二詩止曰衛莊薑傷已不言為何時詩也後序以為作於州吁之時或者以為作於莊公之時且後序有毛公所不及見者固不可盡據然莫往莫來傳云人無子道以來事己巳亦不得以母道往加之是毛公以為州吁詩矣姑從毛氏終風且暴傳曰終日風為終風暴疾也顧我則笑傳曰侮之也謔浪笑敖謔許約反敖去聲朱氏曰謔戲言也浪放蕩也中心是悼箋曰悼傷也興也莊薑言州吁之暴如終日之風既無休息而又暴疾也彼之氣習如此視我則以為笑侮戲謔放浪笑敖不敬我見其如是則亦自傷悼而已無如之何也終風且霾音埋傳曰霾雨土也雨音諭孫炎曰大風揚塵土從上而下也惠然肯來傳曰惠順也莫往莫來悠悠我思曹氏曰悠悠長也終日之風又雨塵土其暴甚矣時有順心肯來見我然不常來也彼不來則我亦不敢往當不往不來之時我則悠悠然長思之楊氏曰見侮慢則悼之而已其莫往莫來則又思之可謂極母道矣經解曰溫柔敦厚詩教也學者如此則可觀可羣可怨矣終風且曀音翳傳曰隂而風曰曀不日有曀箋曰有又也粲曰如春秋書十有一年及孟子聖人有憂之之有寤言不寐蘇氏曰言辭也願言則嚏音帝箋曰今俗人嚏云人道我此古之遺語也疏曰內則云子婦在父母之所不敢噦噫嚏咳噦音越噫於界反咳音慨終日之風且隂曀矣望其開霽不旋日而又隂曀喻州吁之暴無有休息也莊薑言我為傷悼汝之故寤覺而不寐願汝嚏也當州吁莫來之時不復省記於母故願其嚏而知己念之也曀曀其隂虺虺其靁虺音毁朱氏曰虺虺靁將發而未震之聲詩記曰驟雨迅雷其止可待至於曀曀之隂虺虺之雷則殊未有開霽之期也寤言不寐願言則懷今曰猶興懷之懷言心之感動也州吁之為不善如常隂曀曀然其暴若靁聲虺虺然將發而未震我為傷悼汝之故寤覺而不寐願汝思懷我而悔悟也終風四章章四句擊鼓怨州吁也衛州吁用兵暴亂使公孫文仲將去聲而平陳與宋箋曰平成也國人怨其勇而無禮也曰衛州吁詩桓王時朱氏曰伐鄭以結陳宋之成也按左傳州吁與宋陳伐鄭圍其東門五日而還出兵不為久而衛人之怨如此者身犯大逆衆叛親離莫肯為之用耳衆仲曰州吁阻兵而安忍阻兵無衆安忍無親兵猶火也弗戢將自焚觀擊鼓之詩衆仲之言信矣擊鼓其鏜音湯傳曰鏜擊鼓聲踊躍用兵曰踊亦作踴踴跳也躍跳躍也踴躍言喜之之意土國城漕音曹曰漕邑鄘地也在河南我獨南行鼓以進衆為三軍之號令所謂師之耳目在吾旗鼓今聞擊鼓之聲鏜然乃是州吁踊躍而喜於用兵也夫兵者聖人不得已而用之今州吁乃踊躍自喜故國人怨之言衛國之人或役土功於國或築城於漕邑非不勞苦然猶處境內也今我獨南行而伐鄭則死亡未可知雖欲為土國城漕之人不可得也內興工役外事兵爭衛人安能無怨乎載馳傳云漕衛東邑蓋以定之方中序言東徙渡河野處漕邑知為衛東之邑故疏引鄭志答張逸云漕邑在河南也譜疏又以載馳露於漕邑為鄘風知漕邑在鄘也然則擊鼓土國城漕泉水思須與漕皆為邶風者詩得於邶耳從孫子仲疏曰仲字也文諡也作詩時未死故不言諡序從後言之故以諡配字也詩記曰從孫子仲平陳與宋言所從者乃孫子仲也則輕其帥可知矣平陳與宋不我以歸憂心有忡音充疏曰忡忡為憂之意出車云憂心忡忡王仲宣詩云從軍有苦樂但問所從誰今從孫子仲以平陳宋所從非其人也憂其南行而不得以歸故憂心忡忡然爰居爰處音杵箋曰爰於也爰喪其馬喪去聲錢氏曰自知必死也不言死惟言喪馬蓋婉辭于以求之箋曰于於也于林之下士卒將行知其必敗與其室家訣别曰汝在家居處矣我必死於是行而喪其馬矣身死則馬非我所有唐人詩所謂去時鞍馬别人騎也汝若求我其於林之下乎言死於林下也舊説不知於何居處乎於何喪其馬乎文意亦通然此詩爰居爰處可通至斯干爰居爰處説不行矣詩經爰始爰謀爰衆爰有爰笑爰語之類皆無於何之意惟四月爰其適歸言何所適歸蓋其者未定之辭也爰止訓於今以為皆發語之辭爰居爰處言居者之安爰喪其馬言行者之苦觀下文其意可見死生契闊契音挈今曰漢書間何闊注云久闊不相見則契闊為間闊之義也傳以契闊為勤苦今不從與子成説今如字舊音悅執子之手與子偕老傳曰偕俱也承上章訣别之辭言居者生行者死一死一生自此間闊矣我往者初昏之時與子成其約誓之言執子之手期於偕老不謂今日便為死生之别怨辭也于嗟闊兮于音吁不我活兮傳曰活生活也于嗟洵兮洵音絢傳曰洵逺也不我信兮信音申歎從今之間闊不得相依以生活也又歎夫婦相違逺不得伸其偕老之志也其怨深矣擊鼓五章章四句凱風美孝子也衛之淫風流行雖有七子之母猶不能安其室故美七子能盡其孝道以慰其母心而成其志爾曰衛州吁詩桓王時母不復嫁則孝子養親之志成矣凱風自南疏曰凱樂也釋天曰南風謂之凱風李氏曰南風長養萬物物情喜樂故曰凱風吹彼棘心曰棘酸棗也山隂陸氏曰棘性堅強費風之長養者四時纂要云四月棗葉生凱風之時也魏風云園有棘棘酸棗也於果為下朱氏曰棘難長而心又其稚弱而未成者也經有二棘考見楚茨棘心夭夭箋曰喻七子少長夭夭解見桃夭母氏劬勞傳曰劬勞病苦也興也棘至夏始生是難長之木故必待凱風吹之而後生凱風自彼南方長養之方而來吹彼稚弱之棘心至於夭夭然少長則風之為力多矣興母以慈愛之情養我七子之身至於少長則母氏亦病苦矣母之養子於少時最勞苦故於夭夭言劬勞凱風棘心傳箋及疏皆不指為何本唯園有棘毛氏以為棗陸農師以為酸棗又釋木棗注引孟子趙岐注云樲棘小棗所謂酸棗也朱氏集解云樲棘小棗非美材也凱風自南吹彼棘薪母氏聖善我無令人箋曰令善也棘心喻子之幼小棘薪喻子之成立凱風吹彼棘心至於成薪可見長養之功而所吹之棘非美材僅堪為薪猶母氏養我七子至於成人可見聖善之德而我七子無令善之人言七子之中茍有一令善之人則母亦不舍之而欲嫁也子之成立由母之德故於棘薪言聖善聖者明達之稱善者賢淑之稱爰有寒泉在浚之下浚音峻傳曰浚衛邑有子七人母氏勞苦爰有寒泉在浚邑之下邑人賴之以生養有子七人反不能養一母使母勞苦而求嫁是寒泉之不若負罪引慝也朱氏曰母欲嫁者本為淫風流行而七子乃以勞苦為説可謂幾諫矣睍睆黃鳥睍賢之上濁睆還之上濁傳曰睍睆好貌箋曰興顔色説也錢氏曰光鮮貌粲曰檀弓華而睆睆明貌也睍從目從見亦以色言之俗訛以為黃鳥之聲載好其音疏曰載則也有子七人莫慰母心傳曰慰安也睍睆然鮮明者黃鳥也猶能好其音以説人而我七子乃不能慰安母心是黃鳥之不若言莫慰母心乃所以深慰之也凱風四章章四句雄雉刺衛宣公也疏曰宣公晉桓公太子淫亂不恤國事疏曰宣公上蒸夷薑下納宣薑軍旅數起數音朔大夫久役男女怨曠國人患之而作是詩曰衛宣公詩桓王時朱氏以此詩婦人所作非國人所為今從之雄雉于飛朱氏曰雉野雞善鬭泄泄其羽泄音曵傳曰鼓其翼泄泄然今曰泄亦作曵泄泄舒散也我之懷矣朱氏曰懷思也自詒伊阻傳曰詒遺也伊維也遺音位疏曰伊助語也朱氏曰阻隔也興也此詩及兔爰雉離于羅皆言從軍之人故以善鬭之雉興之大夫久役其妻怨曠言雄雉于飛泄泄然舒張其羽雉初飛則張其翼喻其夫始往從役之時也雄者飛而雌者留喻其夫從役而已留在家也我今思之乃自取今之阻隔悔不從行也曾氏曰大夫行役婦人本無可從之理此怨思之切耳雄雉于飛下上其音下音暇上常之上濁下上解見燕燕展矣君子傳曰展誠也實勞我心上章言奮翼初飛之時此章言但聞其音之下上則飛去漸逺矣誠然此君子實使我思之而勞心也詩人之言不必盡同燕燕言下上其音謂雙燕相追逐而飛鳴也此言雄雉下上其音則止是一雉之音或下或上也瞻彼日月悠悠我思道之云逺曷云能來朱氏曰來歸也視日月之往來則君子之從役積時已久矣使我心悠悠然長思之道路之遠如此不知何時能歸乎一章言初往之時二章言其去漸逺三章言日月之久辭之序也百爾君子不知德行去聲不忮不求忮音至傳曰忮害也何用不臧不欲斥國君而呼其夫之同寮告之言我婦人不知如何為德行也我但知人若不忮害不貪求則無往不善譏其用兵非忮則求國人所患也朱氏曰戰國之時諸侯無義戰報復私怨所謂忮也貪人土地所謂求也二者之行婦人女子知其不可足以見先王之澤猶在也雄雉四章章四句匏有苦葉匏音庖刺衛宣公也公與夫人並為淫亂曰衛宣公詩桓王時疏曰雄雉匏有苦葉序言宣公舉其始新臺二子乘舟復言宣公詳其終則谷風式微旄丘簡兮泉水北門北風靜女在其間皆宣公詩也箋曰夫人謂夷薑匏有苦葉新臺牆有茨君子偕老鶉之奔奔諸詩著衛滅之由也匏有苦葉曰匏者苦匏也短頸大腹者也非瓠也山隂陸氏曰長而瘦上曰瓠短頸大腹曰匏傳云匏謂之瓠誤矣蓋匏苦瓠甘復有長短之殊非一物也孔子云吾豈匏瓜也哉焉能繫而不食繫而不食以苦故也國語叔向云苦匏不材於人共濟而已詩云酌之用匏郊特牲云器用陶匏蓋取其質古今注云匏之有柄者曰懸瓠可用為笙濟有深涉濟音祭傳曰濟渡也由膝以上為涉深則厲傳曰以衣涉水為厲釋文曰韓詩云至心曰厲淺則揭音器傳曰揭褰衣也興也苦匏經霜其葉枯落然後乾之腰以渡水今匏尚有苦葉則其匏未堅不可用也既無匏可腰而濟渡之處又有深涉則未可以渡也今曰深則吾以衣涉水而為厲淺則吾褰衣而為揭不問水之淺深惟欲渡也喻宣公不顧禮義而惟求遂其欲也牆有茨君子偕老鶉之奔奔皆刺宣薑知此非宣薑者宣薑淫亂在宣公既卒之後此言公與夫人並為淫亂知非宣薑此時特為公所要耳有瀰濟盈瀰音敉傳曰瀰水深也有鷕雉鳴鷕音杳傳曰鷕雌雉聲也濟盈不濡􅓶音犯凡之上濁疏曰􅓶車軾前也由輈以上為􅓶粲曰舊音宄非也音宄者車旁從九謂車轍也法也音犯者車旁從己車軾前也少儀云祭左右范注云范軾前也彼􅓶作范雉鳴求其牡涉深無不濡之理今有瀰然濟水之滿而涉者自謂不濡其車􅓶興宣公惟求遂其欲而不自知其污惡也鳥鳴皆雄求其雌今有鷕然雉鳴之聲乃雌雉之求其雄興夷薑宣淫不知羞惡也傳以為飛曰雌雄走曰牝牡然詩有雄狐書有牝雞飛走通也小辨雉之朝雊尚求其雌凡鳥鳴皆雄求雌雌不甚鳴雍雍鳴鴈傳曰雍雍鴈聲和也納采用鴈旭日始旦旭許玉反傳曰旭日始出謂大昕之時昕音欣箋曰自納采至請期用昕親迎用昏疏曰旭然始旦之時旭者明著之名故為日出昕者明也日未出已名為昕生至日出益明故為大昕釋文曰旦早也士如歸妻箋曰歸妻使之來歸於已逮冰未泮音判傳曰泮散也疏曰冰未散正月以前今曰昏姻以秋冬解見陳東門之楊此章陳昏姻之正禮以刺淫亂言有雍雍然和聲之鴈於日出旭然而明始旦之時行納采之禮也士之娶妻當及九月霜降之後正月冰未泮散之前士猶以禮而成昏豈可以國君而肆情犯禮乎招招舟子疏曰王逸云以手曰招以口曰召舟子舟人也人涉卬否卬音昻傳曰卬我也人涉卬否卬須我友傳曰須待也一章二章皆以徒涉喻犯禮此章以待舟喻得禮人皆徒涉我獨招舟子而不徒涉既待舟而後濟又須待我友而同濟喻人必待禮而行又以配耦相從也刺公與夷薑犯禮相求非其匹也匏有苦葉四章章四句詩緝卷三
