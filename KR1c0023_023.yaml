body:
  text: 詩緝卷二十三宋嚴粲撰甫田之什小雅甫田刺幽王也君子傷今而思古焉䟽曰思成王甫田述徹法興甿秋報春祈及省耕倉箱之事倬彼甫田倬音卓桑柔箋曰倬明大貌傳曰明貌甫田謂天下田也今曰倬訓明大此詩無大意故止為明曹氏曰言其事顯然也疏曰甫大也甫者廣大言之故為天下田也歲取十千今曰謂什一也百取十焉萬取千焉我取其陳朱氏曰陳舊粟也食我農人食音嗣今曰我農人自我也自古有年今適南畆䟽曰今成王之時其萬民適南畆之内南畆解見七月或耘或耔耘音云耔音子傳曰耘除草也耔雝本也䟽曰前漢食貨志云后稷始甽田以二耜為耦廣尺深尺曰甽長終畮一畮三甽一夫三百甽而播種於甽中苗葉以上稍耨壠草因隤其土以附苗根比盛暑壠盡而根深能風與旱故薿薿而盛也附根即此雝本也甽亦作畎晦古畆字也耨鉏也隤音頽謂下之也能讀曰耐黍稷薿薿音擬朱氏曰薿薿茂盛貌攸介攸止王氏曰介助也止息也烝我髦士傳曰烝進也髦俊也首章述什一之賦及興甿之事也幽王政繁賦重故詩人思古者什一之法言先王之時倬然明著於彼天下之田每歲百取其十萬取其千而已十者百之一千者萬之一其事至顯而幽王不察何也一夫受田百畆故少計之則百畆取其十萬者數之盈故多計之則萬畆取其千皆什一也上無過取故下有餘粟農人皆取其陳舊之粟以自養見農有餘粟自古以來歲事常豐也言食我農人者農人自我也農足於食故樂於耕今農民皆適南畆或耘以去草或耔以雝本其黍稷薿薿然茂盛乃介以相助之止以休息之又烝進其髦俊之士也今指成王之時則自古者前乎此矣周之徹法自公劉始世世守之也周自上世以來徹法行而民富頻年屢豐至成王大平極盛之時農民樂業又進其秀民之能為士者民生斯時何其幸耶此羡慕之辭今不然而思故也詩記曰古者士出於農而工商不與焉管仲云農之子恒為農野處而不暱其秀民之能為士者必足賴也秀民即詩所謂髦士也毛以為十千言多其説太泛鄭以十千畆為一成萬畆之稅又啟紛紛之辯什一天下之中正十千者謂什一之法猶孟子千取百焉萬取千焉之意耳舊說又以我取其陳食我農人為上之人取以食之此以文害辭也七月采荼新樗食我農夫豈亦上之人復為農夫采荼薪樗乎二文句法一同皆農人自我也古者藏富於民家給人足豈待上之人一一遺之食耶雖補助之法不廢而不給不足者亦寡矣或以今適南畆為成王今從箋䟽以為農民第三章曾孫來止方言成王省耕也其攸介攸止烝我髦士若鄉大夫興其賢者能者遂大夫帥其吏而興甿皆有司之事也以我齊明齊音資傳曰器實曰齊在器曰盛䟽曰器實曰齊指穀體也在器曰盛據已盛於器也朱氏曰齊與粢同曲禮云稷曰明粢此言齊明便文以恊韻耳與我犧羊犧音僖箋曰色純曰犧以社以方傳曰社后土也方迎四方氣於郊也䟽曰鄭駁異義以為社者五土之神能生萬物者以古之有大功者配之祭法云共工氏之霸九州也其子曰后土能平九州故祀以為社昭二十九年左傳云共工氏有子曰句龍為后土后上上官之名也死以為社社而祭之故曰句龍為后上後轉為社故世人謂社為后土后土者地之大名也僖十五年左傳云履后土而戴皇天指謂地為后土也句龍職主土地故謂其官為后土中庸郊社相對郊是天則社是地言迎四方之神於郊者下曲禮云天子祭四方歳徧注云祭四方謂祭五官之神於四郊句芒在東祝融后土在南蓐収在西𤣥𡨕在北是也實五官而云四郊者火土俱在南其火土俱祀黎故鄭志荅趙商云后土轉為社無復代者故先師之説黎兼之亦因火土位在南又大宗伯注云五祀者五官之神在四郊四時迎五行之氣於郊而祭五德之帝亦食此神焉少昊氏之子曰重為句芒食於本該為蓐収食於金脩及熈為𤣥𡨕食於水顓項氏之子曰黎為祝融后土食於火土是黎兼二祀曲禮言歲徧此祀在秋而并言四方葢常祀歲徧此秋成報功則總祭故并言四方也句音鉤我田既臧箋曰臧善也農夫之慶琴瑟撃鼓箋曰周禮云凡國祈年于田祖龡豳雅擊土鼓以樂田畯䟽曰春官籥章文也彼注云豳雅七月也杜子春云土鼓以瓦為匡以革為兩面可擊也以御田祖御音迓箋曰卿迎也傳曰田祖先嗇也䟽曰春官籥章云先嗇若神農春官籥章注云田祖始耕旧者謂神農始教造田謂之田祖先為稼穡謂之先嗇神其農業謂之神農名殊而實同也以祈甘雨䟽曰以長物則為甘害物則為苦曹氏曰甘猶美也以介我稷黍箋曰介助也以穀我士女箋曰穀養也二章述秋報春祈之事也以我明潔之齊穀與我純色之羊秋祭土神之社與迎四方氣於郊由我田盡善農夫喜慶之故謂民和年豐而後致力於神也至明年春又以琴瑟及擊土鼓以迎田祖神農而祭之以求長物之甘雨以介助我稷黍以穀養我士與女欲續豐年於無窮也曾孫來止箋曰曾孫成王也解見信南山以其婦子饁彼南畆饁音葉田畯至喜畯音俊二句解見七月攘其左右攘音瀼曹氏曰攘却也嘗其㫖否禾易長畆易音異傳曰易治也長畆竟畆也今曰論語云䘮與其易也寧戚孟子曰易其田疇皆訓治也終善且有朱氏曰有猶多也曾孫不怒農夫克敏傳曰敏疾也三章述成王親省耕之事也曾孫成王來田畆之時農夫務事使其婦子饁饋於南畆之中於是田畯之官至而喜之攘却其左右之從者而親為嘗其饁之㫖否言其上下相親之甚也民盡力於田故其禾易治竟畆如一預知其終善且有也成王無所譴怒而農夫自敏於田事不待督趣之也詩記曰此章言省耕之時王者在上耕者在下田畯往來其間勸勞而撫摩之熈然其若一家也攘其左右嘗其㫖否言其相親無間也不曰喜而曰不怒者若不敏於農則怒矣葢其喜怒欣戚專在於農也洛人稱張全義曰張公他無所好見善穀大繭則喜爾正此意也曾孫之稼錢氏曰稼禾也謂未刈時也今曰伐檀傳云種之曰稼歛之曰穡䟽云若散則相通此以稼對庾先言稼後言庾是稼為在田未刈之禾庾為已刈未入倉而露積之禾也箋以稼為有藁之禾且言古之稅法近者納總總謂併禾稼納之今不從詩記曰王土所生莫非曾孫之稼鄭氏以稅言陋矣如茨如梁箋曰茨屋蓋也朱氏曰茨言密比也傳曰梁車梁也䟽曰墨子稱茅茨不剪謂以茅覆屋故箋以茨為屋葢孟子輿梁謂水上横梁得容車度則高廣者也錢氏曰橋梁也今考經有二茨牆有茨楚楚者茨皆為蒺藜此如茨如梁及瞻彼洛矣福禄如茨為葢屋茅茨非蒺藜也曾孫之庾音愈曰庾露積之禾也解見楚茨如坻如京坻音遲坻解見秦蒹葭傳曰京高丘也京解見鄘定之方中乃求千斯倉乃求萬斯箱朱氏曰箱車箱也解見大東黍稷稻粱黍稷解見王黍離稻粱解見唐鴇羽農夫之慶詩記曰執訊獲醜戰士之慶也黍稷稻粱農夫之慶也葢農夫視黍稷稻粱之豐以為天下之美盡在此矣不知其他也報以介福萬夀無疆四章述豐年民樂祝君之事也時和年豐禾穀充積農民喜恱歸恩於君以為皆吾君之稼吾君之庾謂秋毫皆君賜也未刈之禾曰稼其稼在田由高處視之則稼在下而見其密故如屋茅由平處視之則稼在上而見其高故如橋梁若使高處見其踈平處見其低則禾薄収矣露積之禾曰庾其庾在野隨意堆積有平而高者如水中高地之坻有卓絶而高者如高丘之京始言稼則未刈也繼言庾則已刈而未入倉也於是求千倉以貯之求萬車箱以載之此黍稷稻粱無所不有農夫之慶也先治倉而後箱載以輸之故先言倉後言箱也農夫喜慶不忘君恩祝君以福禄夀考也甫田四章章十句大由刺幽王也言矜寡不能自存焉矜音鰥䟽曰序不言思古以楚茨至此文指相類承上篇而略之也補傳曰大田疑為省斂而作其間雖及田祖興雨之祝葢備陳田間之事所謂穉穧秉穗皆省歛以助不給也大田述耕種以致堅好穉穧以惠寡婦及省歛祭方之事大田多稼今曰大田猶甫田謂天下田也曹氏曰或宜髙燥或宜下濕或利先種或利後種既種既戒種上聲䟽曰種擇其種也箋曰月令季冬命農計耦耕事脩耒耜具田器此之謂戒朱氏曰戒飭其具也既備乃事以我覃耜覃音掩耜音似傳曰覃利也耜解見七月俶載南畆俶音觸載音再釋文曰俶始也載事也南畆解見七月播厥百穀既庭且碩傳曰庭直也箋曰碩大也曹氏曰苖生葉以上皆條直而茂大曾孫是若箋曰若順也一章述耕種之事也天下之田廣大其種不一高下先後各有所宜故冬既擇其種又戒飭其具二者既已周備乃可以從事於耕至春則以我覃利之耜始有事於南畆而耕之既耕乃可以播種百穀種既善器又利耕者致其力種又及其時故其生者既庭直而碩大順曾孫成王之意成王所重在穡事而農民能順其意也或説既備乃事者備其事也亦通但詩中既順乃宣既登乃依皆二事也既方既皁曹之上濁箋曰方房也謂孚甲始生而未合時也䟽曰謂米外之房米生於中若人之房舍也孚者米外之粟皮甲者以在米外若鎧甲今曰生民傳一稃二米孚作稃傳曰實未堅曰皁既堅既好今曰禾雖已堅實或大風所偃或滛雨所腐或早霜所殺之類則損壊而不好不稂不莠稂郎梁二音莠音酉傳曰稂童梁也莠似苗也釋文曰童梁草也説文作莭禾粟之莠生而不成者謂之童莭也䟽曰仲虺之誥云若苖之有莠若粟之有秕秕似粟莠似苗也秕音匕去其螟螣去上聲螟螣音㝠特傳曰食心曰螟食葉曰螣䟽曰食禾心為螟言其姦𡨕𡨕難知也食禾葉者言假貸無厭故曰蟘也螣亦作蟘陸璣曰螟以虸蚄而頭不赤螣蝗也虸蚄音子方及其蟊賊蟊音謀傳曰食根曰蟊食節曰賊䟽曰食禾根者言其稅取萬民財貨故云蟊也或説云螻蛅也食禾節言貪狠故曰賊也舊説螟螣蟊賊一種蟲也如言宼賊姦宄内外言之耳故犍為文學云此四種蟲皆蝗也螻蛅音婁姑犍音䖍陸璣曰賊似桃李中蠧蠧赤頭長身而細耳無害我田穉音稚説文曰穉㓜禾也今曰閟宫稙穉菽麥傳云後種曰穉䟽云後種後熟以其遲晚故幼穉也田祖有神秉畀炎火釋文曰秉執持也畀與也二章述穀之生成無害若有神相之也既方而生孚甲矣方則未成實既皁而成實矣皁則成實而未堅既堅而成熟矣既好而無損壊矣無童粱之稂無似苗之莠去其食心之螟食葉之螣食根之蟊食節之賊無有害我田中㓜穉之禾者此田祖之神持此盡燒絶之故無遺種也歸功於神以為若有以相之有渰萋萋渰音掩萋音妻傳曰渰雲興貌長樂劉氏曰天將降雨則地氣上騰蒸為濕潤渰浸萬物朱氏曰萋萋盛貌興雨祁祁音岐傳曰祁祁徐也箋曰古者隂陽和風雨時其來祁祁然而不暴疾王氏曰雲欲盛盛則雨雨欲徐徐則入土今曰監本作祁俗本作祈誤也采蘩被之祁祁七月及出車采蘩祁祁韓奕祁祁如雲𤣥鳥來假祁祁皆作祁有考見七月雨我公田雨音諭遂及我私䟽曰此雨本主為雨公田耳因遂及我之私田彼有不穫穉穫音鑊長樂劉氏曰穉謂穗之低小刈穫之所不及者今曰亦以穉禾其熟遲晚未可刈也此有不斂穧歛上聲穧音劑䟽曰穧禾之鋪而未束者長樂劉氏曰穧謂刈而遺忘束縳之所不及者彼有遺秉䟽曰秉刈禾之把也長樂劉氏曰秉謂束而輦載之所不及者此有滯穗音遂䟽曰滯穗滯漏之禾穗也伊寡婦之利三章述民喜雨之意及豐年惠及矜寡之事也有渰然而興之雲萋萋然盛所謂天降時雨山川出雲也興雨祁祁然安徐而不暴所謂雨不破塊也農民喜雨歸功於君謂此雨為雨公田因及我之私田吾民皆蒙君之福也及穀熟収刈之時彼處有不穫刈之㓜禾此處有不収歛之鋪穧彼處有遺餘之秉把此處有滯漏之禾穗維寡婦取之以為利耳長樂劉氏曰皆縁豐稔農夫之力所不能盡取而鰥寡享其遺利朱氏曰此見其豐盛有餘而不盡取又與鰥寡共之葢既足為不費之惠而亦不棄於地也不然則粒米狼戾不殆於輕視天物而慢棄之乎曾孫來止曹氏曰甫田所言省耕時也大田所言省歛時也以其婦子饁彼南畆田畯至喜來方禋祀禋音因詩記曰國語内史過云精意以享禋也以其騂黑傳曰騂牛也黑羊豕也箋曰陽祀用騂牲隂祀用黝牲黝音酉䟽曰毛以方社連文同用太牢故以黑為羊豕通牛為三牲也地官牧人云陽祀用騂牲隂祀用黝牲陽祀南郊及宗廟隂祀北郊及社稷毛分騂黒為二牲鄭以騂黑為二色故引牧人騂黝以明騂黒為别方之牲耳非謂四方之祭在陽祀隂祀之中也詩記曰來南方則用騂牲來北方則用黒牲獨舉騂黒者孔氏所謂略舉二方以為韻句是也與其黍稷以享以祀以介景福四章述成王省歛而祭方也曾孫成王來田畆之時民皆以其婦之與子饁饋於南畆之中田畯之官至而喜之成王所來之方致其禋祀以報農功之成以其或赤或黑之牲與其粢盛以獻以祀神饗之而報以大福也大田四章二章章八句二章章九句瞻彼洛矣刺幽王也思古明王能爵命諸侯賞善罰惡焉瞻彼洛矣王氏曰洛水東都之所在也詩記曰職方氏河西曰雍州其浸渭洛故毛傳以洛為宗周之浸水洛水雖出於京兆上洛西山然其流尚微此詩所謂洛葢指東都也維水泱泱音央傳曰泱泱深廣貌君子至止朱氏曰君子指天子也補傳曰六師萬年之語可為王者之證福禄如茨箋曰茨屋葢也喻多解見甫田韎韐有奭韎韐音昧閤奭赩興之入字亦作傳曰韎韐茅蒐染草也一曰韎韐所以代韠也曰茅蒐茜也即茹藘也解見鄭東門之墠䟽曰韎韐是蔽膝之衣合韋為之以茅蒐草染之大夫以上祭服謂之韍士無韍名謂之韎韐玉藻云一命緼韍黝珩則士亦名韍矣彼注云子男大夫一命以子男大夫故言韍耳其實士正名韎韐士冠禮爵弁服韎韐不言韍是也奭赤色緼音温黝音酉王氏曰周官凡有兵事韋弁服先儒以為左傳所謂韎韋之跗注是也跗音夫今曰采芑路車有奭以作六師曹氏曰作而行之也洛為東都周未東遷之時雖宅鎬京而㑹諸侯則於東都以四方道里均也詩人瞻洛水之深廣思昔天子至此朝㑹諸侯其錫予之福禄如屋葢茅茨之多若國有征伐之事又使服韎韐之飾其色奭然而赤以作六師而行之當是之時朝覲㑹同四海來假爵賞征伐自天子出何其盛也乃今泱泱之水猶昔也而無向來之盛事矣故傷而思之瞻彼洛矣維水泱泱君子至止鞞琫有珌鞞音丙琫必孔反亦作鞛珌音必傳曰鞞容刀鞞也琫上飾珌下飾也天子玉琫而珧珌諸侯璗琫而璆珌大夫鐐琫而鏐珌士珕琫而珕珌珧音遥璗唐之上濁鏐音求玉也鐐音遼鏐音留珕音戾䟽曰鞞刀鞘也説文云珧蜃甲也爾雅云黄金謂之璗其美者謂之鏐即紫磨金也白金美者謂之鐐珕蜃屬而不及於蜃用其甲以飾物鞘音笑刀室也公劉䟽曰桓二年左傳云藻率鞞鞛鞶厲游纓昭其數也率音律君子萬年保其家室天子至此東都有容刀以為賜予之物其容刀以鞞盛之其上有琫之飾下有珌之飾天子能寵錫諸侯宜萬年保其國家也瞻彼洛矣維水泱泱君子至止福禄既同曹氏曰言受福祿者均也今曰蓼蕭采菽言萬福攸同與此一也君子萬年保其家邦瞻彼洛矣三章章六句裳裳者華刺幽王也古之仕者世禄小人在位則䜛謟並進棄賢者之類絶功臣之世焉䟽曰古者有世禄復有世位世禄者直食其先人之禄而不居其位不賢尚當然子若賢則居父位矣曹氏曰葵丘之盟士無世官禮稱大夫不世爵春秋譏世卿自卿大夫以至於士皆不可世所可世者禄而已裳裳者華曹氏曰召南云何彼禯矣唐棣之華説文以禯為衣厚貌則所謂裳裳者華亦當如衣裳之禯厚矣其葉湑兮湑須之上錢氏曰湑猶沃也葉美如沃我覯之子覯溝之去箋曰覯見也長樂劉氏曰之予謂賢者功臣之子孫也我心寫兮寫解見蓼蕭及泉水我心寫兮是以有譽處兮處音杵譽處解見蓼蕭興也此詩極言勲賢子孫之美而惜其不用也常棣以華鄂興兄弟此詩以華葉興家世裳裳禯厚之華其葉又湑然潤澤華葉上下相承猶賢者前後相繼而榮顯也我見是勲賢之子孫我心為之輸寫愛其先人喜其有後也稱是子必有名位葢為期望之辭而刺幽王之棄絶也裳裳者華芸其黄矣傳曰芸黄盛也蘇氏曰色之上也今曰老子云夫物芸芸我覯之子維其有章矣蘇氏曰章文也維其有章矣是以有慶矣錢氏曰有慶謂君寵錫之今曰王制則有慶是子文章之美如華之盛宜蒙君之寵錫何為棄絶之乎裳裳者華或黄或白丘氏曰取韻便也我覯之子乘其四駱音洛解見四牡乘其四駱六轡沃若解見皇皇者華是子宜乘駟車六轡沃然榮耀于時何為落莫如此乎左之左之君子宜之箋曰君子斥其先人也右之右之君子有之維其有之是以似之既稱是子之美因贊其先世今人見有佳子弟必曰是其前人所積鍾慶於此也言是子之先君子材全德備左之則無所不宜右之則無所不有有謂所藴不竭也惟其所有如此是以子孫肖似之然則幽王不唯棄材且忘舊德矣裳裳者華四章章六句桑扈音户刺幽王也君臣上下動無禮文焉長樂劉氏曰君臣以言其朝廷也上下以言其風俗也朝廷風俗之禮而謂之文者尊卑異位也親䟱異情也長㓜異序也内外異宜也徃來異守也動而相交合而相紀莫不成文而中於義理序其品則曰人倫也序其義則曰禮文也朝廷所以綱天下之風俗不可以一日無之也交交桑扈箋曰交交徃來貌曰桑扈有二種此色之竊脂者也解見小宛有鶯其羽傳曰鶯然有文章君子樂胥今曰箋以君子指王者朱氏以為指諸侯今以為泛稱古之君臣雨無正箋曰胥相也受天之祜胡之上濁此桑扈色之竊脂者交交然飛而徃來其羽有文章鶯然可愛喻君臣以禮文相接粲然可觀也胥相也一不獨立二則為文交際相與禮文行焉而君子樂於相與是好禮不倦宜其受天之福也刺幽王君臣不然交交桑扈有鶯其領傳曰領頸也長樂劉氏曰領所以首出於身者欲有作為未動其羽而先奮其領文綵四張鶯然可愛也君子樂胥萬邦之屏音丙曹氏曰屏塞門所以蔽外也禮者所以辨上下正紀綱誰敢侮之宜足以屏蔽萬邦也曹氏曰魯秉周禮而齊不敢圖何屏如之有禮則安無禮則危秦襄公未能用周禮則無以固其國之屏之翰傳曰翰幹也解見文王維周之禎百辟為憲箋曰辟君也傳曰憲法也不戢不難戢簪之入箋曰戢歛也受福不那傳曰那多也今曰商頌猗與那與承上文之意言君子能以禮為國屏翰則諸侯皆以之為法而謹於禮矣使其不自戢歛不自畏難則受福必不多矣曹氏曰在泰而不能自戢則放逸而無檢在易而不知思難則輕驕而生患若是則福不盈眥而禍隨其後矣眥音漬又音劑兕觥其觩兕詞之上濁觥音肱觩音求箋曰兕觥罰爵也解見卷耳詩記曰兕觥如卷耳罍觥並陳則不必指為罰爵如此詩則指為罰爵也朱氏曰觩角上曲貌頌作捄㫖酒思柔彼交匪敖去聲萬福來求今曰萬福來求猶淮夷來不言來淮夷古人之語多倒兕觥所以罰不敬者觩然其角上曲設之所以為酒戒也美酒人所甘過則反亂常思温克則兕觥設而不用矣彼古人交際之間無所敖慢是來求多福也言福備於我在反而求之耳桑扈四章章四句鴛鴦音寃央刺幽王也思古明王交於萬物有道自奉養有節焉箋曰交於萬物有道謂順其性取之以時不暴夭也呂氏曰自楚茨至鴛鴦八篇皆陳古以刺今也鴛鴦于飛傳曰鴛鴦匹鳥箋曰言其止則相耦飛則為雙䟽曰必待其長大能飛乃取之不於㓜小而暴夭也畢之羅之䟽曰月令云羅罔畢翳注云罔小而柄長謂之畢畢則執以掩物釋器云鳥罟謂之羅則張以待物君子萬年箋曰君子謂明王也福禄宜之興之不兼比者也先王之時入澤設罻皆有時殺胎覆巢皆有禁合圍掩羣皆所不為故其民漸被仁政皆有仁心鴛鴦之鳥待其長大能飛乃執畢以掩之有得有不得焉又張羅以網之待其自入皆不盡物之意也德及禽獸如此宜其夀考而受福禄也毛氏謂之興孔氏謂舉一物以興其餘興之不兼比者也長樂劉氏曰苟非禮樂刑政之治于其民而中和浹於風俗則仁民恤物之道其能及於是耶是以舟車所至人力所通天之所覆地之所載日月所照霜露所墜凡有血氣者莫不尊親故曰配天鴛鴦在梁詩記曰橋梁魚梁皆是不必專以為石絶水之梁戢其左翼戢簪之入曰戢翼歛也白華箋曰歛左翼者謂右掩左也鳥之雌雄不可别者以翼右掩左雄左掩右雌䟽曰舉其雄者而言耳解頥新語曰或云禽鳥並棲一正一倒戢其左翼以相依於内舒其右翼以防患於外葢左不用而右便君子萬年宜其遐福竭澤而漁則無魚焚山而狩則無獸畢羅取之不盡故有鴛鴦在於魚梁其雄者歛其左翼以右翼掩之遂其性也乘馬在廏乘鄭如字徐去聲廏音救摧之秣之摧音挫秣音末箋曰摧今莝字釋文曰摧芻也秣馬穀也君子萬年福禄艾之艾音礙傳曰艾養也天子所乘之馬飼之宜厚今其在廐無事則摧之以芻有事乃秣之以穀不常秣之愛國用也所乘者如此他馬可知乘馬在廐秣之摧之君子萬年福禄綏之鴛鴦四章章四句頍弁頍音跪諸公刺幽王也䟽曰同姓諸公暴戾無親不能宴樂同姓樂音洛親睦九族孤危將亡故作是詩也幽王之時亂亡已迫而不自知族人與國同休戚深竊憂之而王踈逺宗族無由進其忠告其族人之尊者遂作此詩因王不宴樂同姓藉以為辭而告以禍敗之戒非欲王宴樂之也但詩人優柔之辭先從宴樂上説來以漸及危亡警懼之意故讀者不覺真謂刺不能宴樂同姓而已當是時驪山之禍將作人情凛凛不保朝夕幽王方且飲酒無度詩人豈復勸其宴樂哉國風小雅多寓意於言外或意雖形於言而優柔紆餘讀者不覺也有言古不言時而意在刺時者如甫田采菽之類有言乙不言甲而意在刺甲者如叔于田全述叔叚之事而實刺鄭莊椒聊全述沃之盛強而實刺晉昭有首章便見意餘章變韻成歌者此類甚多有前數章皆含蓄而末章乃見意者如載驅之類有首尾全不露本意但中間冷下一二語使人黙㑹者如碩人猗嗟之類有言輕而意重者如凱風言母氏勞苦而不言欲嫁有先從輕處説起漸漸説得重者如四月憂世亂而先歎征役之勞頍弁刺危亡而先説不宴樂同姓讀詩與他書别唯涵泳浸漬乃得之有頍者弁傳曰頍弁貌皮弁也説文曰頍舉頭貌錢氏曰舉首則弁愈高箋曰禮天子諸侯朝服以宴天子之朝皮弁以日視朝䟽曰王制云周人冕而祭𤣥衣而養老注云凡養老人之服皆其時與羣臣燕之服如彼注則天子之燕用𤣥衣此言皮弁者葢天子燕服有二燕羣臣用𤣥冠親同姓用皮弁也賔之初筵三章箋云此祭末王與族人燕而經云側弁之俄是燕同姓用皮弁之事也實維伊何箋曰實猶是也爾酒既㫖爾殽既嘉箋曰㫖嘉皆美也豈伊異人兄弟匪他蔦與女蘿蔦音鳥蘿音羅傳曰蔦寄生也䟽曰陸璣云蔦一名寄生葉似當盧子如覆盆子赤黑色曰女蘿今莵絲子也即桑中所謂爰采唐矣釋草曰唐蒙女蘿女蘿莵絲陸璣曰毛云松蘿也今莵絲蔓連草上生黄赤如金今合藥莵絲子也非松蘿松蘿自蔓延松上而生與莵絲殊異本草經云蔦為女蘿此古今方俗名草不同也山隂陸氏曰舊説上有莵絲下必有伏莵之根無此莵在下則絲不得生乎上然其實不屬也淮南子云下有茯苓上有莵絲又云莵絲無根而生蛇無足而行魚無耳而聽蟬無口而鳴皆自然也施于松柏施音異䟽曰松柏存而茂松柏殞而亡未見君子箋曰君子斥幽王也憂心奕奕音亦傳曰奕奕然無所薄也䟽曰憂則心遊不定既見君子庶幾説懌音恱亦天子燕同姓則服皮弁今幽王服其皮弁頍然舉首則弁愈高宜何為乎宜燕同姓也酒㫖殽嘉非不足於禮也所與燕者豈異人䟽逺者乎皆兄弟至親非有他故無嫌疑也何為不行乎蔦與女蘿延于松柏之上視松柏以為命松柏殞則二草亡矣猶族人依託於王亦視王以為存亡也今王䟱逺族人使之不得親近故我未見王則憂心奕奕然無所薄既見王則庶幾喜恱一見之間所繋憂喜如此者以死生存亡同之思得効其忠告豈為區區之禮哉有頍者弁實維何期音基本亦作其箋曰何期猶伊何也期辭也爾酒既㫖爾殽既時楊氏曰君子之食惟其時物如春則食麥與羊之類時有考見魚麗豈伊異人兄弟具來蔦與女蘿施于松上未見君子憂心怲怲音柄韻亦作丙傳曰怲怲憂盛滿也既見君子庶幾有臧傳曰臧善也庶幾王之改圖而為善猶庶曰式臧也有頍者弁實維在首爾酒既㫖爾殽既阜箋曰阜猶多也豈伊異人兄弟甥舅長樂劉氏曰甥舅謂母姑姊妹妻族也如彼雨雪雨音諭先集維霰音線箋曰將大雨雪始必微温雪自上下遇温氣而摶謂之霰乆而寒勝則大雪矣䟽曰大戴禮曾子云陽之專氣為霰隂之專氣為雹盛陽之氣在雨水則温暖為雨隂氣薄而脅之不相入則摶為雹也盛隂之氣在雨水則凝滯而為雪陽氣薄而脅之不相入則消散而下因水而為霰是霰由陽氣所薄而為之補傳曰霰稷雪也或謂之米雪謂其粒若稷若米然錢氏曰粒雪也死喪無日喪去聲曰無有日數今曰言不乆矣無幾相見樂酒今夕君子維宴推親親之恩當由兄弟以及甥舅也霰集雪即繼之不待遲乆喻死亡之兆已見近在旦夕無多日矣上二章言族人以未見王為憂既見王為喜其辭猶緩也末章言國亡無日族人縱得見王其能幾乎當急與族人飲酒相樂於今夕葢王今維宜宴而已言今夕謂未保明日之存亡言維宴謂天下之事已無可為惟須飲耳其辭甚迫矣所以警告於王者至剴切矣族人之情迫切如此豈真望王宴樂之哉見即上二章未見既見之見謂見王也君子即上二章所指王也詩記以上二章君子為幽王末章君子為族人自相謂非也頍弁三章章十二句車舝音轄大夫刺幽王也褒姒嫉妬褒姒解見正月無道並進䜛巧敗國敗音拜德澤不加於民周人思得賢女以配君子故作是詩也間關車之舝兮傳曰間關設舝也䟽曰舝無事則脫行乃設之錢氏曰間關猶艱難也軹轄之間縝宻故設之難釋文曰舝車軸頭鐡也舝解見邶泉水思孌季女逝兮孌音臠曰孌美貌箋曰逝往也匪饑匪渴德音來括音活德音解見假樂傳曰括㑹也雖無好友好去聲式燕且喜箋曰式用也䟽曰凡人之燕飲喜樂湏賢友共之大夫言已欲間關然設其舝思得孌然美好之少女以此車往迎之我非饑也非渴也欲得有賢譽之女來與王㑹如饑渴耳時褒姒方寵而大夫欲别求淑女以配王則嫉褒姒甚矣凡人得同志相愛之友則飲酒樂甚若迎得此賢女以配王則我心自喜樂雖無同好之友但尋常之人亦可與之燕而喜樂也依彼平林傳曰依茂木貌平林林木之在平地者也有集維鷮音驕曰鷮長尾雉也䟽曰鷮是雉中之别名陸璣曰微小於翟走而且鳴音鷮鷮然其色如雌雉尾如雉尾而長其頭上有肉冠冠上藂毛長數寸如雄雉尾毛也其肉甚美故林麓山下人語曰四足之美有麃兩足之美有鷮麃者似鹿而小也藂音叢麃音標山隂陸氏曰薛綜云雉之健者為鷮尾長六尺辰彼碩女傳曰辰時也傳曰碩大也令德來教式燕且譽好爾無射好去聲射音亦箋曰射厭也王后褘衣畫翬翬者雉之五彩成章者也鷮亦雉之一種故以喻后妃言依然茂盛之平林有集止者維鷮雉興王宫之貴宜有賢女居之也當今之時若彼碩大賢女以令德來配君子而教誨之我將燕樂相慶且稱譽之恱慕爾碩女無厭也恱彼所以惡此也幽王昏亂法家拂士之言不見聽矣所信惟婦言故思得賢女教誨之耳雖無㫖酒式飲庶幾雖無嘉殽式食庶幾雖無德與女音汝錢氏曰女作詩者相謂也式歌且舞若得此賢女以配君子則我不必㫖酒嘉殽亦與朋友飲食相樂且相謂曰彼賢女雖無恩德及汝然相與歌舞不能自已也樂賢女如此則惡褒姒甚矣陟彼高岡箋曰陟登也析其柞薪析音錫柞音鑿今考釋文於此詩柞獨子洛反音作也至采菽維柞之枝作兩音云子洛反又音昨至緜柞棫拔矣又獨音子洛反止是一木自為參差今皆音鑿昨音同曰柞櫟也即唐鴇羽所謂栩也解見鴇羽析其柞薪其葉湑兮湑湏之上䟽曰湑茂盛也錢氏曰湑猶沃也葉如沃鮮我覯爾鮮上聲箋曰鮮善也錢氏曰希有也我見若爾者鮮矣我心寫兮陳氏曰析薪以興昬姻善乎我得見爾賢女則可輸寫而無憂矣高山仰止景行行止上行去聲下行如字傳曰景大也四牡騑騑音非六轡如琴覯爾新昏以慰我心此歎淑女之賢也有高山則人瞻望而仰之有景大之德行則人視法而行之賢女如高山景行之可尊仰也故我願具四牡之馬騑騑然行而不息調其六轡如琴聲之相應以往迎此賢女使我見王得此賢女為新昬則慰我心矣言新昬則外其舊者也車舝五章章六句青蠅大夫刺幽王也營營青蠅傳曰營營往來貌歐陽氏曰往來之飛聲長樂劉氏曰蛆蟲所變而成者青蠅也其飛之聲則營營然亂人之聽其止於物則穢敗之又從而生蛆復變為蠅其穢敗於物無有紀極也止于樊音煩傳曰樊藩也豈弟君子䟽曰君子謂王者也無信䜛言蠅能汙白為黑如䜛人之誣衊善類衊音蔑驅去復還如小人之易進難退故以取喻焉青蠅集于在外之樊籬若不必惡之也然其營營往來將入宫室汙几席不但止樊而已也喻䜛人為亂漸致迫近當防其微也惟王者持心樂易無信䜛言則小人不可得而入矣持心猜忌則䜛易入詩記曰前漢昌邑王傳云王夢青蠅之矢在西階東可五六石以問郎中令遂遂對曰陛下詩不云乎營營青蠅止于藩愷悌君子無信䜛言陛下左側䜛言衆多如是青蠅惡矣注惡即矢也營營青蠅止于棘丘氏曰謂植棘為藩也今曰以棘為藩謂荆棘之棘解見楚茨䜛人罔極罔極解見衛氓交亂四國李氏曰四方也䜛言無有窮極豈特迎者不安雖四國之逺亦以交亂其禍甚大矣營營青蠅止于榛傳曰榛所以為藩也䜛人罔極構我二人箋曰構合也朱氏曰已與聽者為二人䜛人罔極將交亂四國自構合我二人始耳青蠅三章章四句賔之初筵衛武公刺時也幽王荒廢媟近小人媟音薛飲酒無度天下化之君臣上下沈湎滛液沈直林反湎音免液音亦䟽曰酒誥注云齊色曰湎沈湎耆飲酒過乆若沈没然使湎然俱醉顔色齊同也樂記說樂之遲云詠歎之滛液之則滛液遲久之意也武公既入而作是詩也歐陽氏曰詩人之作常陳古以刺今此詩五章其前二章陳古如彼其後三章刺時如此也毛氏以大侯既抗為燕射鄭氏以為大射董氏云崔靈恩集注以一章為大射二章為燕射記取之今從詩記賔之初筵箋曰筵席也初即席也蘇氏曰先王將祭必大射以擇士將射必先行燕禮左右秩秩丘氏曰謂據筵上左右之人蘇氏曰秩秩有序也籩豆有楚曹氏曰楚潔也解見曹蜉蝣衣裳楚楚殽核維旅傳曰殽豆實也箋曰豆實菹醢也籩實有桃梅之屬今曰旅衆也言品之多酒既和㫖飲酒孔偕箋曰偕齊一也鐘鼓既設箋曰鐘鼓於是言既設者將射改縣也縣音𤣥䟽曰天子宫懸階間妨射位故改懸以避射也郷射禮將射乃云樂正命弟子贊工遷樂于下琴瑟之樂尚遷之明鐘鼓之懸改之矣大射不言改懸者諸侯與臣行禮略三面而已不具軒懸東西懸在兩階之外兩階之間有二建鼓耳東近東階西近西階又無鐘磬不足以妨射不須改也舉醻逸逸朱氏曰舉所奠之醻爵也曹氏曰逸逸然整而暇大侯既抗傳曰大侯君侯也抗舉也箋曰天子諸侯之射皆張三侯故君侯謂之大侯將祭而射謂之大射下章言烝衎烈祖其非祭與弓矢斯張射夫既同朱氏曰射夫既同比其耦也䟽曰天子大射賔射皆六耦詩記曰鄉射禮注云耦比選其材相近者也獻爾發功箋曰獻猶奏也各奏爾發矢中的之功發彼有的傳曰的質也䟽曰大射之侯其中制皮為鵠賔射之侯其中采畫為正正大如鵠皆居侯中三分之一其燕射則侯中畫為獸其中射處皆二尺射義云循聲而發發而不失正鵠者其唯賢者乎詩云發彼有的以祈爾爵則以的為正鵠也司裘注説皮侯之狀云以虎熊豹麋之皮飾其側又方制之以為質謂之鵠是鄭意以侯中所射之處為質也正音征以祈爾爵傳曰祈求也䟽曰射義云求中以辭爵也酒者所以養老所以養病求中以辭養也大射禮云勝者之子弟洗觶升酌散南面坐奠于豐上勝者皆袒決遂執張弓不勝者皆襲脫決拾却左手右加弛弓於其上遂執弣勝者先升堂不勝者進北面坐取豐上之觶興少退立卒觶坐奠於豐下觶音志酒器也弣音撫把中也曹氏曰求免於罰爵而已首章述古人將祭大射擇士先行燕禮也賔之初即席也賔主分為左右秩秩然有序籩豆楚而潔淨殽實於豆核實於籩其品甚衆酒既和調而㫖美飲酒之人甚偕而齊一矣又設鐘鼓以為樂醻則賔奠爵而不舉至旅乃舉所奠之醻爵旅醻交錯逸逸然整而暇也君侯謂之大侯既抗舉之弓矢又皆張之射夫既同比其耦也各奏其發矢中的之功射不中者飲豐上之觶射者與其耦發矢之時各心競云我發矢中彼正鵠之的以求免爾之罰爵論語所謂揖讓而升下而飲其爭也君子舊説謂求勝以爵不勝者不若射義求中以辭爵之為寛大也䟽曰毛以此篇為燕射鄭則為大射射禮有三有大射有賔射有燕射大射者將祭擇士於射宫賔射者謂諸侯來朝與之射於朝燕射者因燕賔客即與射於寢此三者其處不同其侯亦别冬官梓人云張皮侯而棲鵠則春以功張五彩之侯則逺國屬張獸侯則王以息燕三者别文皮侯即大射也五彩之侯賔射也獸侯燕射也春音蠢彼注云作也將祭與羣臣射以作其容體與之事鬼神籥舞笙鼓箋曰籥管也解見簡兮樂既和奏烝衎烈祖衎看之去箋曰烝進也衎樂也王氏曰烈業也以洽百禮箋曰洽合也䟽曰百禮事神之衆禮也百禮既至有壬有林傳曰壬大也李氏曰林盛也今曰大謂主祭者衆謂助祭者錫爾純嘏音假箋曰純大也嘏謂尸與主人以福子孫其湛音耽曹氏曰宗族皆烈祖之子孫鹿鳴傳曰湛樂之乆也其湛曰樂音洛各奏爾能賔載手仇蘇氏曰載則也董氏曰仇匹也所謂耦也室人入又王氏曰室人主黨也酌彼康爵傳曰酒所以安體也以奏爾時蘇氏曰薦之以時物也時物解見頍弁時有考見魚麗上章言未祭之燕故擇士而射為大射此章言既祭之燕故因燕而射為燕射也方祭之初秉籥而為文舞舞入而笙鼓交作樂聲既和平而具奏進以衎樂其烈祖以㑹合其事神之衆禮有大謂主祭者指君也有衆謂助祭者指卿大夫及諸侯也君臣皆當神之意於是尸傳嘏辭云賜爾君以大福爾與子孫宜相與湛樂助祭者皆烈祖之子孫湛者樂之乆令其從容燕飲也主人既受嘏辭於是相與湛樂而為樂留族人以燕燕而又射各奏其技賔黨射則手敵主黨射則又手敵皆善射也射畢酌彼安爵而薦之以時物賔之初筵温温其恭其未醉止威儀反反如字傳曰反反言重慎也蘇氏曰顧禮也曰既醉止威儀幡幡音翻傳曰幡幡失威儀也蘇氏曰輕數也舍其坐遷舍音捨屢舞僊僊王氏曰僊僊軒舉之貌其未醉止威儀抑抑傳曰抑抑慎宻也曰既醉止威儀怭怭音弼傳曰怭怭媟慢也是曰既醉不知其秩董氏曰秩序也三章以下陳幽王君臣飲酒則不然賔初升筵尚温温然和柔而恭敬未醉之時威儀猶能反反然重謹至於既醉幡幡然失威儀舍其本坐遷向他處數數起舞僊僊然軒舉武公疾之又重言之云方其未醉威儀尚抑抑然謹宻至於已醉威儀乃怭怭然媟慢是曰既醉昏亂無次不知其秩序矣賔既醉止載號載呶號音豪呶音譊傳曰號號呼也呶讙呶也䟽曰唱呌也亂我籩豆屢舞僛僛音欺王氏曰僛僛頃側之貌是曰既醉不知其郵音尤箋曰郵過也朱氏曰郵與尤同側弁之俄箋曰側傾也俄頃貌屢舞傞傞音蓑又音瑳傳曰傞傞不止也既醉而出並受其福醉而不出是謂伐德飲酒孔嘉維其令儀賔既醉而呼號讙呶亂我籩豆之列屢舞僛僛然頃側葢既醉則不自知其過郵也又傾側其弁而俄俄然不正屢舞傞傞然不止賔既醉而出則可以皆受其福言得禮也醉至若此而不出是自伐其德也飲酒之所以甚美者以其令儀耳今何其不令也凡此飲酒或醉或否既立之監或佐之史彼醉不臧不醉反恥式勿從謂朱氏曰謂告也錢氏曰從謂就人之位而與言也無俾大怠大音泰匪言勿言匪由勿語去聲又如字箋曰由從也由醉之言俾出童羖音古傳曰羖羊不童也箋曰羖羊之性牝牡有角三爵不識箋曰獻也酬也酢也矧敢多又今此飲酒或有醉者或有醒者立之監以正其禮佐之史以書其過政欲防失禮者也彼醉者失禮而不善乃反以醒者為恥非立監史之意也此醒者遂相告以彼人已醉勿就其位而與之言與之言則彼愈更號呶是使之大為怠慢也吾等醒者但自持謹所不當言者勿言所不當從者勿語耳非不欲忠告於彼彼醉人不可告語也童羊無角羖未有無角者彼醉人之言如使人出童羖以無為有言語無倫如此葢飲至三爵已昬然無所識矣况又多飲何由可與語乎賔之初筵五章章十四句詩緝卷二十三
