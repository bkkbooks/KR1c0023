body:
  text: 詩緝卷十宋嚴粲撰魏國風譜曰魏者舜禹所都之地在禹貢冀州雷首之北析城之西周以封同姓焉儉約之化於時猶存今魏君嗇且褊急不務廣修德於民教以義方其與秦晉鄰國日見侵削國人憂之當周平桓之世魏之變風始作至春秋閔公元年晉獻公竟滅之以其地賜大夫畢萬自爾而後晉有魏氏前漢地理志曰魏在晉之南河曲故其詩曰彼汾一曲置之河之側水經注故魏國城南西竝去大河可二十餘里北去首山十餘里處河山之間土地迫隘故魏風著十𤱔之詩也朱氏曰魏本姬姓之國不知其始封之自程子曰魏舜禹之都唐帝堯之國久被聖人之化漸成美厚之俗歷二叔之世而遺風尚存今亦變矣齊始霸也晉代興也齊之次在晉而魏晉之所滅也魏而後唐猶邶鄘先衛也魏唐無淫詩蓋猶有先代之風化焉葛屨音句刺褊也褊邉之上魏地狹隘狹音洽隘挨之去聲其民機巧趨利其君儉嗇褊急嗇音色而無德以將之按譜魏風七篇當平桓之間廣漢張氏曰儉雖失中本非惡德然而儉之過則至於吝嗇迫隘計較毫分之間而謀利之心始急矣葛屨汾沮洳園有桃三詩皆言其急迫瑣碎之意魏風莫知其世次而鄭譜以平桓當之魯閔之元庚申晉獻滅魏實惠王時也惠十六前乎惠為莊僖譜不以當之乃越莊僖而繫之平桓豈亦有據而云邪鄭以葛屨等五篇刺儉為一君伐檀碩鼠刺貪為一君蓋魏風非一世之作自桓王之時秦人圍魏癸酉魯桓四桓王十二其國迫而侵削久矣故譜以為平桓之世也曹氏曰魏晉皆有儉嗇之風然其詩若作在獻公并吞以後則其俗漸已荒侈此詩每刺勤儉知其在未并於晉以前也糾糾葛屨糾音九傳曰糾糾猶繚繚也繚音了今曰疏以為稀疏之貌非也繚繞纒也糾三合繩亦繞纒之意故云猶繚繚也葛屨解見齊南山可以履霜摻摻女手摻音杉傳曰摻摻猶纎纎也今曰讀者多作纎非也可以縫裳要之襋之要音䙅襋音棘傳曰要䙅也襋領也好人服之朱氏曰好人猶言大夫也今曰好人猶言君子尊貴者之稱也今俗稱猶然魏地狹隘其民窘於衣食故生機巧之心而急於趨利夏當用葛屨冬當用皮屨今魏之男子葛屨既弊而以繩糾纒之糾而復糾謂其可以踐霜奔走道路祁寒不休也未嫁之女其手纎纎謂其可以出而為人縫裳也要之謂治裳之䙅襋之謂治衣之領治衣裳之要領以為好人之服而利其傭資也皆急於趨利也補傳曰今所至通都大邑窶人之家男子則祁寒奔走於道路以販鬻為業女子亦不蔽藏至出市井為人刺繡之類恬不以為怪獨詩人創見魏之民俗故刺之好人提提音題傳曰提提安諦也宛然左辟音避今曰宛委曲遜順貌蘇氏曰讓而避者必左佩其象揥音熾韻又音替解見鄘君子偕老朱氏曰揥所以摘髮用象為之貴者之飾也維是褊心是以為刺上章既言其民機巧趨利此章言由君之儉嗇褊急所致尊貴之人其容止提提然安徐而審諦其辭讓而左辟也其儀宛然而遜順又以象骨為搔首之揥而佩之其威儀服飾之美無可譏者獨其中之褊急為可刺耳好人泛言尊貴者不欲斥其君也葛屨二章一章六句一章五句汾沮洳沮去聲洳音孺刺儉也其君儉以能勤刺不得禮也疏曰王肅孫育皆以為大夫采菜崔靈恩集注序云君子儉以能勤按今定本及諸本序直云其君義亦得通或以公行公路公族皆晉官汾水又出於晉疑魏風皆晉詩猶邶鄘皆衛詩非也季札觀樂邶鄘衛風為衛風而魏唐異譏知魏風非晉矣園有桃十𤱔之間皆言國之侵削非晉事也彼汾沮洳說文曰汾水出太原晉陽山西南入河蘇氏曰汾水出於晉其流入魏朱氏曰沮洳水浸處下濕之地也言采其莫音暮傳曰莫菜也陸璣曰莖大如筯赤節葉似栁葉厚而長有毛刺今人繅以取繭緒其味酢而滑始生可以為羮又可生食五方通謂之酸迷繅音酢亦作醋驗也山隂陸氏曰其子如楮實而紅今吳越之人謂之茂子彼其之子其音紀美無度疏曰非尺寸可量也美無度殊異乎公路錢氏曰殊猶特也疏曰公路與公行一也以其主君路車則謂之公路以其主兵車之行列則謂之公行宣二年左傳云初驪姬之亂詛無畜羣公子自是晉無公族及晉成公立乃宦卿之嫡子以為公族其庶子為公行趙盾請以括為公族公許之冬趙盾為軞車之族是其事也趙盾自以為庶子遜公族而為公行服䖍云軞車戎車之倅杜預云公行之官也其公族則適子為之掌君宗族軞音毛魏君儉勤於彼汾水沮洳下濕之處采其莫菜以為蔬此人之德美信無限度矣雖其德美無限度然采莫之事特異乎公路之所為耳言儉嗇不似貴人也公路之官猶不為此況於君乎公儀休為魯相猶拔其葵今魏以國君采莫逼下甚矣彼汾一方言采其桑箋曰采桑親蠶事也彼其之子美如英今曰英草木之華也美如英殊異乎公行音杭今考疏以為即公路也彼汾一曲朱氏曰謂水曲流處言采其藚音續傳曰藚水舄也舄音昔釋草曰藚牛脣郭璞曰如續斷寸寸有節釋曰陸璣以為今澤蕮郭所不取蕮音昔曹氏曰采藚以治疾今考釋草别有蕍蕮釋云蕍一名蕮本草作澤瀉知藚非澤蕮也蕍音俞彼其之子美如玉美如玉殊異乎公族解見上公路汾沮洳三章章六句園有桃刺時也大夫憂其君國小而迫而儉以嗇不能用其民而無德教日以侵削故作是詩也陳國區區而衡門欲誘掖其君檜至微矣而羔裘欲其君自彊於政治與園有桃詩意同蓋國無不可為患其君不能為耳此孟子告滕文之意也園有桃其實之殽音爻心之憂矣我歌且謠音遙傳曰曲合樂曰歌徒歌曰謠疏曰樂則瑟琴對文如此散則歌未必合樂也今曰此詩所言歌且謠但謂歌而又歌謠亦歌也不知我者謂我士也驕今曰此詩大夫所作士者人臣之通稱彼人是哉子曰何其音基心之憂矣其誰知之其誰知之蓋亦勿思桃可以為核而不可以為殽魏君不能用其民而愈趨於陋詩人以為推此氣象則園中有桃將取其實以為殽矣其者將然之辭言其必至於此憂之之辭也桃取之自己園囿之內見不能用其民也我心憂之至於歌而又歌以舒寫其心之抑鬱而不知我之憂者謂我乃士也而為驕汰君猶儉而士乃驕此見責之辭也驕與吝對儉而譏之則疑於驕汰也於是答見責者曰爾以我為非矣然則彼魏君之所行果為是乎子之所言何謂如此也於是自歎我心之憂其誰知之重言其誰知之者深歎舉國之人莫察其心也然此之可憂較然易知彼特未之思耳朱氏曰或云比也園有桃則食其實國有民則用其力或云賦也詩固有一章而三義者在人觀之如何耳舊說不知我者皆以我為驕汰而謂彼魏君所行是矣是哉當為疑辭如禹曰俞哉之意不當為是矣園有棘傳曰棘棗也山隂陸氏曰酸棗也於果為下棘解見邶凱風其實之食今曰棗亦可以為核而不可以為食心之憂矣聊以行國箋曰聊且略之辭也出行於國以寫憂不知我者謂我士也罔極今曰罔極言無窮極也廣之謂猶言責人無己也考見衛氓彼人是哉子曰何其心之憂矣其誰知之其誰知之蓋亦勿思園有桃二章章十二句陟岵音户胡之上濁孝子行役思念父母也國迫而數侵削數音朔役乎大國父母兄弟離散而作是詩也觀魏之窘迫如此能無亡乎由其無德教而不能自彊也陟彼岵兮疏曰釋山云多草木岵無草木屺傳言無草木岵有草木屺與爾雅正反當是傳寫誤也陳氏曰岵也屺也岡也皆山之髙處而可以瞻望者詩人各取其一以協韻耳瞻望父兮父曰嗟豫子行役夙夜無已上慎旃哉今曰上猶赴也謂赴役也如赴官曰上官赴工曰上工七月上入執宫功以由田野入都邑為上此以由家居赴道塗為上今俗諺猶云上路也傳曰旃之也猶來無止李氏曰左傳莊九年秦子梁子以公旗避于下道是以皆止古以見獲於敵為止孝子行役常念其親故因登髙山而瞻望其父既瞻望而不可見則思其將行之戒云我欲行之時父教戒我曰嗟我子從軍行役之時早起夜寐無得已息當赴役惟謹猶可以來歸無止於彼而不返也李氏曰狄仁傑授邠州法曹親在河陽仁傑登太行山顧見白雲飛謂左右曰吾親舍其下瞻悵久之雲移方得去陟彼屺兮屺音起瞻望母兮母曰嗟豫季行役傳曰季少子也王氏曰尤憐少子婦人之情也補傳曰兄不行而弟行故母之命已實季子也夙夜無寐今曰無寐猶今人言醒睡也上慎旃哉猶來無棄詩記曰母尚恩言無棄母而不歸也陟彼岡兮岡解見卷耳瞻望兄兮兄曰嗟豫弟行役夙夜必偕傳曰偕俱也今曰必與同役者俱毋失伍也上慎旃哉猶來無死陟岵三章章六句十𤱔之間刺時也言其國削小句民無所居焉疏曰謂土田狹隘不足耕墾非謂無居宅也十𤱔之間兮疏曰魏雖削小未必即然舉十𤱔以喻其狹隘也桑者閒閒兮閒音間本亦作間行與子還兮還音旋本亦作旋場囿之地止有十𤱔甚言其削小也地狹民稠故采桑者無所可采徒閒閒然往來閒暇相呼行與俱歸言無所得桑而空歸也舊說一夫百𤱔今止十𤱔然古者百𤱔以為田田中安得植桑或謂井廬邑居各二𤱔半合為五𤱔之宅合八家則在井者二十𤱔在邑者亦二十𤱔一處本共有二十𤱔之桑今止有十𤱔是削其半要之詩人情性之言特甚言之未必盡拘名數也若屑屑求合則意味索然矣以十𤱔言之猶言彈丸黑志之地也後世言郡之小者云得州如斗大皆甚言其小也十𤱔之外兮桑者泄泄兮泄音曳今曰舒而不迫亦閒暇之貌行與子逝兮十𤱔之外他處亦然也或相與旋而歸或相與逝而往皆見閒暇無所事也十𤱔之閒二章章三句伐檀刺貪也在位貪鄙無功而受祿君子不得進仕爾坎坎伐檀兮坎苦感反傳曰坎坎伐檀聲朱氏曰用力之聲檀木性堅可為車曹氏曰四牡檀車幝幝檀木堅韌故伐之之聲坎坎然非若丁丁之易也置之河之干兮置音至傳曰置置也干崖也河水清且漣猗音連伊傳曰風行水成文曰漣疏曰釋水云大波為瀾漣瀾義同朱氏曰猗義與兮同書斷斷猗大學作兮莊子亦云我猶為人猗詩記曰河水清且漣猗悠然於河之干厄窮而不閔者也不稼不穡傳曰種之曰稼斂之曰穡疏曰以稼穡相對皆先稼後穡故知種之曰稼斂之曰穡若散則相通胡取禾三百㕓兮箋曰胡何也傳曰一夫之居曰㕓疏曰謂田百𤱔也不狩不獵箋曰冬獵曰狩宵田曰獵胡瞻爾庭有縣貆兮縣貆音𤣥喧說文曰縣繫也箋曰貉子曰貆貉音鶴彼君子兮箋曰君子斥伐檀之人不素餐兮傳曰素空也今曰朱氏孟子解云無功而食祿謂之素餐謂空食其祿而無補也餐七丹反君子不得進仕自伐檀木其用力之聲坎坎然置之河之干崖欲以為車之輪輻而自給也伐檀則供勞賤之役河干則在寂寞之濵賢者不得其所矣然其心無入而不自得故當伐檀置河干之時見河水既清又且風行吹水成文而為漣玩而樂之悠然成趣不戚戚於得喪也蓋其心休休自得則隨寓之景皆見其可樂此其長往無悶豈復以窮達嬰懷者國人惜君子之在野憤小人之尸位自不能無臧否之論謂人而有功於國則不耕而食不獵而獲可也汝小人何功乃不稼穡而取三百夫之田榖不狩獵而庭有縣繫之貆是素餐矣彼河干之君子若用於時必有事焉以稱其祿不如是之素餐也詩記以君子親伐檀為義不素餐今不從公孫丑曰詩曰不素餐兮君子之不耕而食何也孟子曰其君用之則安富尊榮其子弟從之則孝弟忠信不素餐兮孰大於是坎坎伐輻兮輻音福疏曰伐檀為車之輻今曰輻車轑也冬官輪人為輪云輻也者所以為直指也老子云三十輻共一轂轑音毛置之河之側兮河水清且直猗傳曰直波也蘇氏曰水平則流直不稼不穡胡取禾三百億兮箋曰十萬曰億三百億謂刈禾之把數今曰傳云萬萬曰億楚茨傳同豐年傳云數萬至萬曰億與箋不同姑兩存之不狩不獵胡瞻爾庭有縣特兮傳曰獸三嵗曰特疏曰毛氏當有所據不知出何書彼君子兮不素食兮坎坎伐輪兮疏曰伐檀為車之輪置之河之漘兮漘音脣傳曰漘崖也河水清且淪兮淪音倫釋水曰小波為淪傳曰小風水成文轉如輪也不稼不穡胡取禾三百囷兮囷丘倫反傳曰圓者為囷疏曰方者為倉不狩不獵胡瞻爾庭有縣鶉兮鶉音純鶉解見鶉之奔奔彼君子兮不素飱兮飱音孫傳曰熟食曰飱說文曰水澆飯也伐檀三章章九句碩鼠刺重斂也斂去聲國人刺其君重斂蠶食於民不修其政貪而畏人若大鼠也解頥新語曰蠶之食桑無時而厭食盡而後已喻重斂者莫切於此鼠食物且食且驚四顧不寧喻貪畏者莫切於此碩鼠指聚斂之臣即伐檀序所言在位貪鄙者也此輩奉承其君以重斂於民故曰三嵗貫女謂其君任用此人而吾事之已三嵗矣國史題其事於篇端但曰刺重斂耳其後說詩者乃以為刺其君若大鼠程子謂序有失詩之意者此類是也臣之奉行由君政使然謂刺其君重斂可也便以碩鼠為稱其君不可也碩鼠碩鼠箋曰碩大也疏曰釋獸於鼠屬有鼫鼠孫炎云五技鼠郭璞云大鼠頭似兔尾有毛青黃色好在田中食􅰲豆關西呼鼩鼠舍人樊光同引此詩以碩鼠為彼五技之鼠也許慎云碩鼠五技能飛不能上屋能遊不能渡谷能緣不能窮木能走不能先人能穴不能覆身陸璣疏曰今河東有大鼠能人立食人禾苗人逐則走入樹空中亦有五技或謂之雀鼠其形大故序云大鼠也魏國今河北縣是也言其方物宜謂此鼠非鼫鼠也按此經作碩鼠訓之為大不作鼫鼠之字其義或如陸所言也鼫音石鼩音衢無食我黍三嵗貫女音汝釋詀曰貫事也莫我肯顧逝將去女今考唐風有杕之杜噬肯來遊朱氏曰發語辭蘇氏云噬逝通適彼樂土樂音洛樂土樂土爰得我所呼聚斂之臣為大鼠言汝無食我黍矣我三嵗事汝汝不肯眷顧於我言魏國用此重斂之人已三嵗矣我今將去汝而適彼樂土謂適有道之國也彼樂土樂土我得其所也連稱樂土者喜談樂道於彼以見其厭苦於此也碩鼠碩鼠無食我麥三嵗貫女莫我肯德今曰不肯德惠我也逝將去女適彼樂國樂國樂國爰得我直爾不肯德惠於我則我將求伸於他國直猶伸也謂得伸其志也受抑於此而欲求伸於彼也碩鼠碩鼠無食我苗傳曰苗嘉榖也疏曰苗之莖葉非鼠所食故云嘉榖榖生於苗以協韻三嵗貫女莫我肯勞范氏曰不肯以我為勤勞也逝將去女適彼樂郊樂郊樂郊誰之永號音毫傳曰號呼也魏人為爾重斂所迫至於長號彼樂郊則誰長號乎謂無歎息愁恨之聲也碩鼠三章章八句詩緝卷十
