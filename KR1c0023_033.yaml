body:
  text: 詩緝卷三十三宋嚴粲撰臣工之什周頌臣工諸侯助祭遣於廟也譙郡張氏曰先王深知禮義之本原起於稼穡之際故其於農事常首先天下之政諸侯助成王祭其歸而戒之以農事者由此故也先王巡守較諸侯之善惡其慶始於土地闢田野治其罰始於土地荒蕪田野不治夫惟戒諸侯之事莫急於新畬之勤制諸侯之賞罰莫先於田野土地之政則夫先王之意槩可見矣嗟嗟臣工傳曰嗟嗟勑之也工官也疏曰嗟而又嗟重歎以呼之將勑而嗟歎非訓為勑也不直戒其身為其太斥朱氏曰諸侯之羣臣百工也今曰諸侯之臣莫非王臣敬爾在公朱氏曰在公凡公家之事也王釐爾成蘇氏曰賜爾成法也來咨來茹音孺箋曰咨謀也茹度也嗟嗟保介箋曰保介車右也月令孟春天子親載耒耜措之于參保介之御間疏曰措之于參乘之人保介之與御者二人間君之車上止有御者與車右一人而己今言保介與御明保介即車右也不敕御人偏敕車右者以御人本主御車不主輔君故專敕明其衛君車也人君左載御在中央明其逺君措之故繫于車右因御字單言之以便文朱氏曰保介見月令吕覽其説不同然皆為藉田而言補傳曰命臣工以王事命保戒以民事維莫之春莫音暮朱氏曰莫春在夏正為建辰之月在周正為建寅之月然先儒謂商周雖改正朔特以是月為歲首至于朝聘蒸享猶用夏正祭用仲月則春祀宜在建卯之月祭畢遣之時春已向莫農事不可緩也亦又何求曹氏曰言不可捨農事而他求也如何新畬音餘釋地曰田二歲曰新田三歲曰畬箋曰畬和柔之意也朱氏曰今既莫春矣爾之田事如何哉於皇來牟於音烏箋曰皇美也來牟解見思文將受厥明朱氏曰來牟當夏而且將受王帝之明賜也明昭上帝迄用康年迄欣之入錢氏曰迄終也傳曰康樂也今曰孟子云樂歲命我衆人王氏曰諸侯之衆莫非王人錢氏曰衆人庶民也庤乃錢鎛庤音恥錢鎛音剪博傳曰錢銚也鏄耨也銚七遙反廣韻音挑耨音耨乃豆反疏曰説文云錢銚古田器世本云垂作銚宋仲子注云銚刈也刈物之器管子云一農之事必有一銍一耨一銚然後成農釋名云鎛鋤類也世本云垂作耨李巡云鋤也鎛耨當是一器但諸文或以為耨即鋤或云鋤類古器變易未能審之奄觀銍艾奄如字鄭音淹銍艾音窒又傳曰銍穫也説文曰銍穫禾短鎌諸侯朝正於王因助祭於廟祭終而遣之不直戒其身而戒其臣之共事者以警切之爾諸侯歸其國有王事有民事臣工者諸侯之羣臣百工所與共治其國者也故以王事戒之保介者車右之士載耒耜以輔君耕藉者也故以民事戒之先嗟歎而戒臣工曰爾臣工與聞國家之政事爾其敬哉王賜爾侯國之成法皆一定不易矣其有疑焉當來咨謀茹度於王朝勿自專以亂章改度也此以尊王之義告之也又嗟歎而戒保介與聞耕籍今助春祠而還既莫春矣他又何所求乎唯農事不可緩耳爾國之新田畬田今如何也二者皆新墾之田用力尤難故首問之欲其土地闢田野治也於乎美哉來牟二麥夏初即熟今已莫春將受天之明賜矣夏麥者秋稼之占也天意昭明終必有年豈可不盡人事以承天意乎爾歸其國命我衆農夫各具銚鋤之器以治其田奄忽之間已觀其用短鎌以艾禾矣此以重農之意告之也臣工一章十五句噫嘻音伊熙春夏祈穀于上帝也箋曰祈猶禱也求也月令孟春祈穀于上帝夏則龍見雩是也雩音餘疏曰春郊夏雩以禱求膏雨而成其榖實月令仲夏大雩帝以祈榖實是雩為祈榖之明文但雩以龍見為之當在孟夏之月為月令者錯置于仲夏失正雩之月故不引之左傳稱凡祀啓蟄而郊龍見而雩郊祀上帝于南郊所以報天德而云祈榖者報其已往又祈其將來襄七年左傳云夫郊祀后稷以祈農事故啓蟄而郊郊而後耕而郊為祈榖之事也月令孟春元日祈榖于上帝是即郊天也後乃擇元辰天子親載耒耜躬耕帝籍是郊而後耕噫嘻成王王氏曰噫嘻歎辭曹氏曰所謂吁嗟而求雨也成王成是王事也既昭假爾假音格朱氏曰昭格上帝錢氏曰爾語辭率時農夫箋曰時是也播厥百穀箋曰播猶種也李氏曰百榖之種非一故總而言之謂之百榖駿發爾私駿音峻箋曰駿疾也發伐也傳曰私民田也疏曰冬官匠人云一耦之伐伐發地故云發伐也言伐者以耜擊伐此地使之發起也言私而不及公令民知君於己之專則感而樂業故也終三十里箋曰竟三十里者一部一吏主之周禮云凡治野田夫間有遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有塗千大有澮澮上有道萬夫有川川上有路計此萬夫之地方三十三里少半里也言三十里者舉其成數疏曰一夫百畝方百步積萬夫方之是廣長各百夫以百自乘是萬也既廣長皆百夫夫有百步三夫為一里則百夫為三十三里餘百步即三分里之一為少半里是三十三里又少半里也亦服爾耕箋曰服事也十千維耦箋曰一川之間萬夫故有萬耦朱氏曰本以二人並耕為耦今乃萬人畢出而耕也農事為王道之本故嗟歎而言之我周家以農事開國致王業之成既昭格于上帝矣今我不敢廢墜前功將率是農夫以播其百榖令疾發其私田終竟一部方三十里之地服爾耕事萬夫同時而耕吾民盡力于田事如此天其念之祈穀之後即躬耕帝藉故言率時農夫以張本也言駿發爾私不及公田為民祈也噫嘻一章八句振鷺二王之後來助祭也箋曰二王夏殷也其後杞也宋也疏曰樂記稱武王伐紂既下車封夏后氏之後于杞投殷之後于宋史記杞世家云武王克殷求禹之後得東樓公封之于杞以奉夏后氏之祀是杞之初封即為夏之後矣其殷後則初封武庚于殷墟後以叛而誅之更命微子為殷後書序云成王既黜殷命殺武庚命微子啓作微子之命是宋為殷後成王始命之也曹氏曰必存二代之後者所以尊其先世受命之君俾承祀而不廢且示天下公器不主于一姓使時君常以覆車為鑒兢兢然務修其德耳振鷺于飛傳曰振振羣飛貌錢氏曰振自振其羽也釋文曰鷺一名春鉏于彼西雍傳曰雍澤也箋曰西雍之澤王氏曰西雍蓋辟雍也朱氏曰先儒多謂辟雍在西郊故曰西雍我客戾止傳曰客二王之後疏曰諸侯之於天子雖皆有賔客之義但先代之後時王偏所尊敬特謂之客昭二十五年左傳宋樂大心云我於周為客臯陶謨云虞賔在位此及有瞽皆云我客有客之篇以微子為客皆以二王之後特稱賔客也李氏曰二王之後不純臣待之故謂之我客箋曰戾至也亦有斯容箋曰興者喻杞宋之君有潔白德來助祭于周之廟得禮之宜也其至止亦有此容蓋威儀之善如鷺然曹氏曰鷺之為物羽毛潔白而容止舒間其譬則修潔之君子也振者矜持修飾之意我客戾止亦有斯容則有潔白之德而能文之以禮者也在彼無惡烏路反箋曰在彼謂居其國無怨惡之者曹氏曰國人安其豈弟也在此無斁音亦箋曰在此謂其來朝人皆愛敬之無厭之者曹氏曰周人惜其將去也黃氏曰周公居東東方之人欲其留西方之人欲其歸是亦在彼無惡在此無斁之意庶幾夙夜以永終譽箋曰永長也興也振振然羣飛之鷺集于西郊辟雍之澤其羽毛潔白容止舒間可觀也杞宋之君於周為客皆來助祭於周廟其至此亦有此容也此杞宋之君在此國無怨惡之者來朝在此人皆無厭之者然猶庶幾其能夙夜敬戒以長終此美譽愛之以德也朱氏曰陳氏云在彼不以我革其命而有惡于我知天命無常惟德是與其心服也在我不以彼墜其命而有厭于彼崇德象賢統承先王忠厚之至也曹氏曰微子之命云作賓于王家與國咸休永世無窮與以永終譽其成之之意一也振鷺一章八句豐年秋冬報也李氏曰鄭氏謂報者嘗也蒸也蘇黃門謂秋祭四方冬祭八蠟王氏則以謂祭上帝三説不同鄭氏謂蒸嘗者以詩言蒸畀祖妣也然載芟祈社稷亦曰蒸畀祖妣豈亦祭宗廟乎至於謂秋祭四方冬祭八蠟固是報成百榖之祭不如王氏以為祭上帝陳氏曰噫嘻祈之於春夏豐年報之於秋冬是一體之詩也祈曰上帝而報不言者省文也曹氏曰秋季大享于明堂秋祭四方冬祭八蠟天地百神無所不報而同歌是詩故不言其所祭耳豐年多黍多稌音杜傳曰豐大也稌稻也箋曰豐年大有年也稌稻解見唐鴇羽李氏曰天官食醫云牛宜稌鄭司農注云粳也王氏以為豐年之時或髙燥而寒或下濕而暑無所不熟故所以謂豐職方氏謂雍冀之地髙燥其穀宜黍荆揚之地下濕其榖宜稌是黍利髙燥稌利下濕也黍稌無所不熟亦有髙廩音凛什文曰廩倉也傳曰廩所以藏齊盛之穟疏曰禹貢百里賦納總即禾稼也二百里銍即穗也此言藏穗則廩唯藏粟也而地官廩人注云藏米曰廩者對則藏米曰廩藏粟曰倉其散即通也萬億及秭音姊傳曰數萬至萬曰億數億至億曰秭箋曰以言榖數多為酒為醴音禮曹氏曰酒正辨三酒之物惟清酒以供祭祀鄭氏以謂中山冬釀接夏而成者又辨五齊之物惟醴酒最濁鄭謂成而汁滓相將如今之甜酒也齊音劑蒸畀祖妣音匕箋曰蒸進也畀豫也詩記曰周以后稷為祖以薑嫄為妣然祭祀則無所不在也故總以祖妣言之以洽百禮解見賓之初筵降福孔皆傳曰皆遍也黍宜高燥而寒稌宜下濕而暑大有之年黍稌皆熟則百榖無不熟矣亦有髙大之倉廩其中榖數之多有萬與億及秭也有此黍稷以之為酒又以之為五齊之醴齊進於先祖先妣而祭祀所以會合其事神之衆禮百物皆所以為禮而行禮以酒為主也豐年故有此是上帝之降福無所不遍也敢忘報乎豐年一章七句有瞽音古始作樂而合乎祖也箋曰合者大合諸樂而奏之疏曰周公攝政六年制禮作樂合諸樂器於太祖之廟奏之經皆言合諸樂器奏之事也言合于太祖則特告太祖不因祭祀且不告餘廟以樂初成故于最尊之廟奏之耳此太祖謂文王也毛以為始作大武之樂曹氏曰周人祖文王而宗武王則祖者文王之廟也有瞽有瞽傳曰瞽樂官也箋曰瞽矇也以為樂官者目無所見於聲音審也周禮上瞽四十人中瞽百人下瞽百六十人有視瞭者相之瞭音了在周之庭疏曰周之廟庭設業設虡音巨疏曰皆視瞭設之業虡解見靈臺崇牙樹羽傳曰崇牙上飾卷然可以縣也樹羽置羽也卷音權崇牙解見靈臺維樅疏曰置羽者置之於栒虡之上角漢禮器制度云為龍頭及頷口䘖璧璧下有旄牛尾明堂位於崇牙之下又云周之璧翣注云周人畫繒為翣載以璧垂五采羽其下樹翣於簨之角上應田縣鼓縣胡涓反傳曰應小鞞也田大鼓也縣周鼓也鞞音皮疏曰釋樂云大鼓謂之鼖小鼓謂之應大射禮應鞞在建鼓東則為應和建鼓應鞞共文是為一器其鼓懸之虡業明堂位云夏后氏之足鼓殷人楹鼓周人縣鼓是周法鼓始在懸鞉磬柷圉鞉音桃柷音蓄圉音籞傳曰鞉小鼓也柷木椌也圉楬也椌音羫楬若瞎反疏曰春官小師注鞉如鼓而少持其柄搖之旁耳還自擊書益稷云合止柷敔注云柷狀如漆筒中有椎投椎于其中而撞之敔狀如伏虎背上刻之所以止鼓朱氏曰磬石磬也既備乃奏疏曰皆設之于庭宇既備具乃使瞽人擊而奏之簫管備舉箋曰簫編小竹管如今賣餳者所吹也管如笛併而吹之餳夕清反乾糖也笛字又作笛疏曰管謂並吹兩管也王氏曰簫也管也尤其器之小者言其小所以為備也喤喤厥聲喤音橫又音黃執競傳曰喤喤和也肅雍和鳴先祖是聽我客戾止箋曰我客二王之後也疏曰助祭之人多矣以二王之後尊故特言之永觀厥成朱氏曰成樂闋也如簫韶九成之成李氏曰成猶終也遍更而奏焉故謂之成重言有此瞽人者非一人也其瞽人皆在周之廟庭矣乃使視瞭為之設其垂鐘鼓之具其以板加於栒上者業也其植者虡也其業之上齒刻為崇牙也其栒虡之上角有置羽之飾也又有應之小鼓田之大鼓其鼓皆縣之虡業也又有持其柄而搖之者鞉鼓也又有石磬也有起樂之柷也有止樂之圉也設之備具乃使瞽人擊而奏之也又有編竹之簫併竹之管已備舉作之也樂聲喤喤然和皆恭敬和諧而鳴不相奪倫先祖之神於是降而聽之於時我客至止永觀我樂闋之成以先代之後來觀樂為盛事也有瞽一章十三句潛季冬薦魚春獻鮪也箋曰冬魚之牲定春鮪新來薦獻之者謂於宗廟疏曰冬言季冬春亦季春也月令季春薦鮪于寢廟天官漁人春獻王鮪冬言薦春云獻者皆謂子孫獻進于先祖其義一也冬則衆魚皆可薦故總稱魚春唯獻鮪而已故特言鮪冬寒魚不行孕性定而肥充月令季冬乃命漁師始漁天子親往乃嘗魚先薦寢廟言春鮪新來者陸璣云河南鞏縣東北崖上山腹有穴舊説云此穴與江湖通鮪從此穴而來比入河西上龍門入漆沮猗與漆沮音醫余七趨那傳曰猗嘆辭今曰與辭也箋云猗與嘆美之辭猶言美哉也傳曰漆沮岐周之二水也疏曰漆沮自豳歷岐周以至豐鎬以其薦獻所取不宜逺于京邑故不言豳言岐周者鎬京去岐不逺故繫而言之漆沮有考見綿正解潛有多魚王氏曰潛言取之深也李氏曰王氏以為潛藏之潛故言取之深也解頥新語曰魚喜潛今考傳云潛槮也什文云魚之所息謂之橬橬槮也謂積柴水中令魚依之止息因而取之也今不從槮素感反橬疏蔭反有鱣有鮪鱣音旃鮪音委鱣鮪解並見碩人鰷鱨鰋鯉音條嘗偃里箋曰鰷白鰷也山隂陸氏曰鰷形狹而長若條然魚性浮似鱨而白鱨鰋鯉並解見魚麗以享以祀以介景福歎美此漆沮岐周之二水於其深潛之處有此多魚有鱣鱑有鮪鮥有似鱨之鰷有鱨揚有似鮎之鰋有三十六鱗之鯉我取之以獻享以祭祀而神明饗之助以大福也言魚以見萬物衆多猶魚麗也魚麗當文武之時頌聲未作故云可以告神而已潛則告神之樂歌也潛一章六句雍禘大祖也禘音第大音泰箋曰禘大祭也大于四時而小于祫李氏曰鄭氏以為大于四時其説固是以為小于祫則非矣禘之祭則大于祫天子之祭有禘有祫有四時之祭諸侯之祭則有祫有四時之祭至于郊禘則非所當講也按春秋書大事于太廟大事者必祫也有事于太廟有事者必四時之祭也祫于太廟不言祫而謂之大事四時之祭不斥其名而曰有事言諸侯之事也郊禘非諸侯之祭故斥其名以見其僣也觀此則禘大于祫可知矣劉氏曰先王重宗廟之享為疏數之制春祠夏禴秋嘗冬蒸四時之祭厚矣以為未也於是有三年之祫祭未毁廟之主皆升合食于太祖祭之所及可謂衆也又以為未也於是有五年之禘祭審諦昭穆以及其祖之所自出祭之所及可謂逺矣陳氏曰周之大祖則后稷也禘其祖之所自出者若稷之所自出者嚳於周無廟故禘于大祖之廟又遷羣廟之主以配之若祫則既遷之主皆得合食于大祖之廟焉禘祫之義如斯而已朱氏曰祭法周人禘嚳周之太祖即后稷也禘嚳於其廟以后稷配所謂禘其祖之所自出以其祖配之是也有來雍雍箋曰雍雍和也至止肅肅箋曰肅肅敬也相維辟公相去聲辟音璧傳曰相助也辟公解見烈文天子穆穆穆穆解見文王王氏曰穆穆敬和也於薦廣牡於鄭如字王音烏箋曰薦進也傳曰廣大也王氏曰廣牡碩大肥腯之謂也相豫肆祀朱氏曰肆陳也假哉皇考假如字毛音暇蘇氏曰假大也箋曰皇考斥文王也綏豫孝子宣哲維人朱氏曰宣通也哲知也文武維后蘇氏曰大哉皇考之安我也其臣宣哲其君文武燕及皇天傳曰燕安也朱氏曰安人以及于天克昌厥後箋曰昌大也蘇氏曰周人以諱事神文王名昌而此曰克昌厥後何也曰周之所諱不以其名號之耳不遂廢其文也諱其名而廢其文者周禮之末失也李氏曰周人所謂以諱事神者如稱文王則不斥曰文王昌如此而已書之所稱惟有道曾孫周王發但曰元孫某史官不敢斥其名故也如穆王名滿而當時亦有王孫滿襄王名鄭而當時亦有衛侯鄭魯武公名敖而後世之臣有公孫敖觀此則知此詩言克昌厥後噫嘻之詩言駿發爾私昌文王之名也發武王之名也皆未嘗諱孔子作春秋如匡王名班而春秋亦書曹伯班簡王名夷而春秋亦書晉侯夷吾皆未嘗為之諱綏我眉夀介以繁祉箋曰繁多也既右烈考傳曰烈考武王也疏曰洛誥云烈考武王𢎞朕恭亦右文母傳曰文母太姒也有從彼國而來雍雍然和既至於此肅肅然敬者是助祭之君公諸侯也是時天子之容穆穆然敬而和於我薦進大牡牲之時其辟公助我肆陳祭祀之饌言得天下之歡心以奉其先王也此由先王之德使然於是贊美大哉皇考文王綏安于孝子以已成之業其臣宣通明哲其君有文武之德故能安人以及于天昌大其子孫而安祐於我使得秀眉之夀助以繁多之福也此又見右助於光烈之考武王及見右助於有文德之母大姒故也古注以皇考為文王烈考為武王朱氏從之王氏以皇考為武王烈考為文王詩記從之李氏則以皇考烈考皆稱其祖三説不同今考祭法父曰考祖曰王考曽祖曰皇考髙祖曰顯考此説天子諸侯大夫廟制其實考者祖父之通稱也康誥云丕顯考文王酒誥云穆考文王顯考穆考皆明稱文王也洛誥既明稱烈考武王載見始見乎武王廟而言率見昭考則烈考昭考皆稱武王也武王無競維烈故稱烈考猶商稱湯為烈祖文王當穆故武王當昭也唯皇考通稱文王武王此詩後稱烈考為武王則皇考稱文王矣閔豫小子言皇考能念皇祖訪落言皇考能紹文王之直道則皇考又皆稱武王矣雍一章十六句載見賢之去諸侯始見乎武王廟也載見辟王傳曰載始也補傳曰諸侯始見謂成王初即政也箋曰君王謂成王也曰求厥章宋氏曰章法度也補傳曰諸侯始見則欲求其法度而謹守之龍旗陽陽龍旗解見出車曹氏曰陽陽色之鮮明也今曰我朱孔陽和鈴央央於良反徐音英傳曰和在軾前鈴在旗上疏曰和亦鈴也釋文云有鈴曰旗郭璞云懸鈴于竿頭央央然有音聲曹氏曰臧哀伯云錫鸞和鈴昭其聲也杜預云鸞在鑣和在衡鈴在旗動皆有聲然此乃田車耳若乘車則鸞在衡和在軾錫音揚馬面當盧鞗革有鶬鞗音條鶬音鏘鞗革解見蓼蕭箋曰鶬金飾貌休有烈光朱氏曰休美也李氏曰烈大也率見昭考昭如字訪落箋曰昭明也朱氏曰廟制太祖居中左昭右穆周廟文王當穆武王當昭故書稱穆考文王而此詩及訪落皆謂武王為昭考也今考小宗伯辨廟祧之昭穆古注昭音韶朱氏中庸章句如字以孝以享傳曰享獻也以介眉夀永言保之思皇多祜李氏曰與思皇多士同思語辭也皇美也烈文辟公解見烈文詩綏以多福俾緝熙于純嘏箋曰純大也諸侯始見成王以其初即政欲求法度以歸而遵守之也其所建交龍之旗陽陽然鮮明其軾前之和與旗上之鈴央央然有音聲其轡首鶬然以金為飾其來朝之車服如此見成王得萬國之歡心為國之光華故休美而有大光也成王於是率之以見昭考武王以致其孝敬以行其獻享以助我受福而得秀眉之夀長保享之美哉多福如此皆爾有功有德之諸侯以時助祭而致之是安我以多福使之緝續熙廣于大福也載見一章十四句有客微子來見祖廟也見賢之去曹氏曰微子啓紂之諸兄封於微而爵為子微蓋商畿內國名疏曰不言所祭之名不指所在之廟無得而知之也有客有客疏曰客止一人而重言有客有客是丁寧殊異以尊大之也李氏曰按左傳云宋先代之後於周為客亦白其馬李氏曰商人尚白故微子來朝而乘白馬檀弓云殷人戎事乘翰翰白色馬也以戎事乘之則微子亦乘白馬也文王之詩云殷士膚敏祼將于京厥作祼將常服黼冔則是殷人助祭所服之冠也微子助祭故亦乘其白馬蓋其一代之所尚雖已易代矣而其臣猶服其冠乘其馬也翰平去二音有萋有且萋音妻且音取貌傳曰萋且敬慎敦琢其旅敦音堆徐又音雕琢音卓曹氏曰旅微子之卿大夫也有客宿宿傳曰一宿曰宿有客信信傳曰再宿曰信言授之縶音執傳曰欲執其馬而留之箋曰縶絆也絆音半以縶其馬薄言追之箋曰追送也疏曰餞送之左右綏之箋曰左右之臣又欲從而安樂之厚之無已疏曰與之歡燕以安樂其心既有淫威補傳曰天道福善禍淫王者體天而行賞罰使淫人懼焉善人勸焉降福孔夷傳曰夷易也易音異什方張氏曰自管蔡以武庚祿父叛周公誅之故於微子之來見也則告之曰昔者既有淫威矣而今也降福孔夷蓋逆順之理如此凡吾之威福非茍而已也微子殷代之後於周為客重言有客者喜之也仍殷之舊乘其所尚白色之馬見不純臣之也又威儀萋萋且且然敬謹者乃其隨行之衆如敦琢之金玉然稱其衆臣之有文則其主之賢可見猶杜詩云侍立小童清也微子宿而又宿信而又信樂其留之久也授之縶絆以縶其馬懼其去之速也蓋至於行有日矣又餞送之左右之臣相與飲酒以安樂之殷勤無已也昔紂武庚為亂我周既有罰淫之威今錫福於微子則又甚易而不吝此以見微子之賢而且示吾之威福一出於公也今考棫朴傳云追雕也金曰雕玉曰琢箋引周禮追師掌追衡笄則追亦治玉與毛異義追敦同音則此敦琢毛亦分金玉矣以敦琢併為治玉自是箋義非傳意也有客一章十二句武奏大武也疏曰謂周公攝政六年之時象武王伐紂之事作大武之樂既成而於廟奏之經之所陳皆武王生時之功也明堂位云周公攝政六年制禮作樂以武王用武除暴為天下所樂故謂其樂為武樂朱氏曰春秋傳以此為大武之首章也於皇武王於音烏蘇氏曰皇大也無競維烈傳曰烈業也允文文王克開厥後嗣武受之錢氏曰嗣武繼之以武勝殷遏劉箋曰遏止也傳曰劉殺也耆定爾功耆音指鄭音其傳曰耆致也箋曰耆老也年老乃定女之初功武王以武功定天下故樂名大武此武頌大武之樂章發明武王之功言於乎大哉武王有莫強之功烈也信乎文王有文德以開其後人之基緒矣然殷虐未除則文王之文德未能盡達於天下故必得武王繼之以武而受之伐紂以止殺然後致定其功所以歸重武王之功明非武王之武無以成文王之文也武頌言文王之德不可無武王之功為奏大武而言之維清言周之成功皆本於文王之德為奏象舞而言之各有攸當也武一章七句詩緝卷三十三
