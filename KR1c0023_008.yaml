body:
  text: 詩緝卷八宋嚴粲撰鄭國風譜曰初宣王封母弟友於宗周畿內咸林之地是為鄭桓公今京兆鄭縣是其都也為幽王大司徒甚得周衆與東土之人問於史伯曰王室多故余懼及焉其何所可以逃死史伯曰其濟洛河潁之問乎是其子男之國虢鄶為大虢叔恃勢鄶仲恃險皆有驕侈怠慢之心加之以貪冒君若以周難之故寄帑與賄不敢不許是驕而貪必將背君君以成周之衆奉辭伐罪無不克矣若克二邑鄢敝補丹依疇歷華君之土也修典刑以守之惟是可以少固桓公從之後三年幽王為犬戎所殺桓公死之其子武公與晉文侯定平王於東都王城卒取史伯所云十邑之地右洛左濟前華後河食溱洧焉今河南新鄭是也武公又作卿士國人宜之鄭之變風又作疏曰謂濟西洛東河南潁北八國皆在四水之間若克虢鄶二邑則其餘八邑自然可滅食謂居其土而食其水也對上鄶風已作故云又作朱氏曰鄭桓公食於西都畿內之鄭邑今華之鄭是也其後又得虢鄶之地施舊號於新邑則今鄭是也又曰鄭聲之淫有甚於衛矣故夫子論為邦獨以鄭聲為戒蓋舉重而言也程子曰廢法失道則王畿之內亦不能保鄭本畿內之封因周之衰遂自為列國故次以鄭前漢地理志曰鄭俗淫季札聞鄭之歌曰美哉其細已甚民弗堪也是其先亡乎自武公後二十三世為韓所滅魏文侯聽鄭衛之音則不知倦蓋鄭衛皆淫風而鄭尤甚緇衣緇音資美武公也疏曰武公掘突桓公友子索隱曰名滑突滑一作掘音鶻父子並為周司徒疏曰父謂武公父桓公友善於其職國人宜之朱氏曰周人作是詩詩記曰若鄭人所作何為三章皆言適子之館兮故美其德以明有國善善之功焉曰鄭武公詩平王時詩記曰好賢如緇衣所謂賢即武公父子也講師誤以為武公好賢遂曰有國善善之功焉失其旨矣説者多以此詩為鄭人所作謂周人之詩當在王風非也破斧伐柯九罭狼跋皆周大夫所作而附於豳此武公入為周司徒善於其職周人善之而作此詩耳周人愛武公欲其常為卿士至其子莊公不克肖其德周人遂畀虢公政而緇衣之意替矣緇衣之宜兮傳曰緇黑色卿士聽朝之正服也疏曰冬官鍾氏言染法三入為纁五入為緅七入為緇注云染纁者三入而成又再染以黑則為緅又復再染以黑則成緇緇衣即士冠禮所云主人玄冠朝服緇帶素鞸是也諸侯與其臣服之以日視朝故禮通謂此服為朝服纁音熏緅音鄒曹氏曰玉藻云天子皮辨以日視朝諸侯朝服以日視朝於內朝是天子常服之服用皮辨諸侯常服之服用羔裘玄冠也皮辨以白鹿皮為冠以狐白皮為裘以素錦為衣而裼之其上加朝服十五升白布為之衣冠同色故也羔裘以緇布為冠以黑羊皮為裘以緇布為衣而裼之其上加朝服十五升緇布為之其裳皆素凡朝服君與卿大夫同今天子之卿而服緇衣者蓋既朝於天子而退治事則釋皮辨而服緇布衣以聽其所朝之政也裼音錫敝豫又改為兮敝音弊本又作弊適子之館兮傳曰館舍也李氏曰言諸侯各有館舍也還豫授子之粲兮還音旋王氏曰粲粟治之精者朱氏曰漢有白粲之刑給舂導之役武公之賢周人愛之故作此詩言武公為王卿士而服此緇衣也甚宜德稱其服也此衣若敝我周人當為子更為之願其久於位矣我適汝武公所寓之館以其自鄭而至省問其舍止之安否也既見之而歸我又取米之精者以遺之猶白飯青芻之意也士無賢不肖入朝見疾武公以諸侯入為卿士宜周人之所疾忌今稱譽之願望之親往省之又即饋遺之且不以粗糲進也糲辣厲二音拳拳如此豈非好賢之至乎孔子云於緇衣見好賢之至孔叢子又云好賢如緇衣惡惡如巷伯禮記緇衣緇衣之詩繾綣殷勤可謂好之之至故曰好賢如緇衣巷伯之詩欲取讒人投畀豺虎豺虎不食則投畀有北有北不受則投畀有昊可謂惡之之至故曰惡惡如巷伯詩之好賢惡惡者多矣獨舉二詩以其至者言之也緇衣之好兮傳曰好猶宜也敝豫又改造兮適子之館兮還豫授子之粲兮緇衣之席兮席音席程子曰席舒安之義服稱其德則安舒傳曰席大也敝豫又改作兮適子之館兮還豫授子之粲兮緇衣三章章四句將仲子將音鏘刺莊公也疏曰莊公寤生武公掘突子不勝其母勝音升以害其弟疏曰弟名段字叔弟叔失道而公弗制祭仲諫而公弗聽祭音再小不忍以致大亂焉曰鄭莊公詩平王時左傳隱元年初鄭武公娶于申曰武薑生莊公及共叔段莊公寤生驚薑氏遂惡之愛共叔段欲立之亟請於武公公弗許及莊公即位為之請制公曰制巖邑也虢叔死焉他邑唯命請京使居之謂之京城大叔祭仲曰都城過百雉國之害也今京不度非制也君將不堪公曰薑氏欲之焉辟害對曰不如早為之所公曰多行不義必自斃子姑待之既而大叔命西鄙北鄙二於已公子吕請除之公曰無庸將自及大叔又收二以為已邑至於廩延子封曰可矣公曰不義不昵厚將崩大叔將襲鄭夫人將啓之公曰可矣命子封帥車二百乘以伐京京叛大叔段段入於鄢公伐諸鄢大叔出奔共書曰鄭伯克段于鄢段不弟故不言弟如二君故曰克稱鄭伯譏失教也謂之鄭志亟音器大音泰鄢音於晚於建於然三音共音恭子封公子吕也補傳曰將仲子之序與左氏合信乎詩序經聖人之手而左氏之好惡與聖人同也穀梁曰何甚乎鄭伯甚鄭伯處心積慮成於殺也公羊曰曷為大鄭伯之惡母欲立之已殺之如勿與而已矣胡氏曰用兵大事也必君臣合謀而後動則當書國命公子吕為主帥則當稱將出車二百乘則當稱師三者咸無稱焉而専目鄭伯是罪之在伯也猶以為未足又書克段于鄢克者力勝之辭不稱弟路人也于鄢操之為己蹙矣薑氏當武公存之時嘗欲立段矣公既沒薑以國君適母主乎內段以寵弟多才居乎外國人又悅而歸之莊公恐其終將軋已為後患也故授之大邑而不為之所縱使失道以至於亂然後以叛逆討之則國人不敢從薑氏不敢主而大叔屬籍當絶不可使居父母之邦此鄭伯志也莊公克段之事左氏以為譏失教此詩後序以為小不忍皆責之也輕穀梁公羊及胡氏深誅其心以為大惡後之説詩者祖其意以後序為非且謂詩人探莊公之心在於殺段而託諸父母諸兄國人以為説冀以稔成其惡耳竊謂此駁後序未盡莊公之惡則然而説詩之本意則未也叔段舊有奪嫡之謀莊公固以不能釋然于懷矣而又挾材武怙母寵結羣小將不利於宗國此莊公之所深忌也請制弗許請京與之迫於母意不得已焉耳始答祭仲曰多行不義必自斃繼答公子吕曰無庸將自及至公子吕又言之則曰不義不昵厚將崩蓋挾數用術為秋實黃落之計設心不仁矣觀段之淺露為羣小所縱臾而欲謀宗國何能為者邪固易之矣及段將襲鄭公曰可矣蓋幸其釁自彼作謂人不得以議我豈有涕泣而道之之意哉公固非不忍者然春秋乃聖人褒貶之法變風乃國人諷諫之辭不可以並論也此詩止以公與祭仲有殺段之謀故設為公拒祭仲之辭以天理感動之公論開悟之耳如此則不失詩人溫柔敦厚之旨將仲子兮傳曰將請也仲子祭仲也曹氏曰仲子祭仲足也祭其氏也名仲而字仲足無踰我里傳曰踰越也里居也二十五家為里無折我樹杞疏曰杞柳屬陸璣曰生水傍樹如柳葉粗而白木理微赤其材堅韌今人以為車轂韌音仞今曰樹杞猶言杞樹耳杞桑檀皆美木以喻兄弟三杞考見四牡豈敢愛之畏我父母疏曰於時其父亡與母連言之耳仲可懷也今曰懷念也父母之言亦可畏也祭仲之謀迫而淺欲速去其逼曰早為之所莊公之謀狡而深故養成其惡曰子姑待之公與祭仲皆欲致段於死地所爭遲速之間耳公非拒祭仲也國人知公與祭仲有殺段之謀乃反其意設為公拒祭仲之辭以諷之謂公若曰請仲子無踰越我所居之里無損折我美樹之杞喻無入我家而害我兄弟也我豈敢愛段而私之哉乃畏我父母也仲子之言固可念也然父母之言亦可畏也公未嘗有是言也而詩人代公言之若謂公之已踰者諷公縱不愛段獨不畏父母乎蓋譎諫也將仲子兮無踰我牆無折我樹桑吕氏曰孟子云樹牆下以桑則桑在牆下也豈敢愛之畏我諸兄傳曰諸兄公族仲可懷也諸兄之言亦可畏也諷公縱不愛段獨不畏公族之義乎將仲子兮無踰我園傳曰園所以樹木也疏曰園者圃之藩故其內可以種木也無折我樹檀傳曰檀強韌之木疏曰檀材可以為車陸璣曰檀木皮正青滑澤豈敢愛之畏人之多言仲可懷也人之多言亦可畏也諷公縱不愛段獨不畏國人之多言乎將仲子三章章八句叔于田刺莊公也叔處于京處音杵曹氏曰滎陽故東虢國也有京水索水楚漢戰於京索之間即其地也京邑在滎陽縣東敖倉鴻溝在縣西官渡在中牟皆古戰爭處制即成皋舊虎牢也索師古音求索之索繕甲治兵繕音擅箋曰繕之言善也甲鎧也鎧音慨韻又音愷今曰繕補也繕甲修治之意以出于田國人説而歸之説音悅曰鄭莊公詩平王時二叔于田皆美叔段之材武無一辭他及而首序以為刺莊公蓋與春秋書鄭伯克段譏失教之意同首序經聖人之手矣説詩不用首序則二叔于田皆為美叔段椒聊為美桓叔叔段桓叔可美也乎哉此詩言段出田而京邑之黨相媚説以從之耳後謂國人説而歸之非也鄭師臨其境京人亦叛之矣叔于田傳曰叔大叔段也田取禽也大音泰箋曰于往也巷無居人傳曰巷里塗也疏曰里內之途道也豈無居人不如叔也洵美且仁洵音荀箋曰洵信也段好田獵馳騁其黨諛説之謂叔之往田獵也人皆從之里巷之內無復居人豈盡無居人乎雖有居人但不如叔之信美且仁也段豈真美且仁哉其黨私之之言猶河朔之人謂安史為聖也詩人之意謂段之不令而羣小相與縱臾如此必為厲階以自禍莊公曷為不禁止之乎故序曰刺莊公也叔于狩音守傳曰冬獵曰狩巷無飲酒豈無飲酒不如叔也洵美且好叔適野箋曰適之也郊外曰野巷無服馬箋曰服馬猶乘馬今曰易繫辭服牛乘馬豈無服馬不如叔也洵美且武曹氏曰言其有藝也叔于田三章章五句大叔于田大如字刺莊公也叔多才而好勇好去聲不義而得衆也曰鄭莊公詩平王時蘇氏曰二詩皆曰叔于田故此加大以别之非謂段為大叔也然不知者又加大于首章失之矣兩叔于田其三章章五句短篇者止曰叔于田其三章章十句長篇者加大以别之采詩之初未有序故於首章加大後有序因存而不去猶書序作堯典之下復有堯典二字存其舊也公子吕云厚將得衆謂其所憑者厚則羣小將以利合也序祖其説以為得衆非謂其真能得人心也大叔于田乘乘馬曰上乘如字駕也下乘去聲四馬也執轡如組朱氏曰轡今之韁也錢氏曰組文五采相間手執六轡如組之文言其齊比今曰疏謂織組者總紕於此成文於彼御者執轡於手馬騁於道言如織組之為不若言如組之文為簡徑也紕必二反兩驂如舞箋曰在旁曰驂傳曰驂之與服諧和中節董氏曰五御之法有舞交衢者蓋詩所謂如舞也服制於衡不得如舞其言舞者驂也叔在藪傳曰藪澤禽之府也疏曰澤水所鍾水希曰藪鄭有圃田此言藪圃田也火烈具舉今曰烈如載燔載烈之烈謂以火焚烈之也孟子益烈山澤而焚之大司馬注火弊火止也春田用火因焚萊除陳草皆殺而火止曹氏曰王制云昆蟲未蟄不以火田故爾雅謂火田為狩惟冬田乃用火耳若夫刈草以為防驅禽而納諸防中然後焚而射焉則四時之田皆然也傳曰具俱也袒裼暴虎袒裼音但錫但上濁也傳曰袒裼肉袒也疏曰李巡云脫衣見體曰肉袒獻于公所將叔無狃將音鏘狃音紐傳曰狃習也朱氏曰國人謂之戒其傷女音汝上篇叔于田段在京自出田也此大叔于田段在鄭從莊公出田也叔之從公往田也駕一乘之馬矜其多能代御人御自執馬轡如組文之齊比其兩驂之焉如舞者之中於樂節皆見其善御也叔在林藪禽獸所聚之地以火烈而焚之同時皆舉叔乃袒去裼衣徒手搏虎以獻于莊公國君介弟之貴而氣習如此見失教矣莊公不教誨禁止之其私昵之黨乃致媚愛之辭曰請叔無狃習此事數數為之恐其或傷汝也莊公為可刺矣舊説執轡如組叔之御人下文又良御忌乃言叔身善御自為支離也正以叔執轡如組為善御耳叔于田乘乘黃傳曰四馬皆黃兩服上襄箋曰兩服中央夾轅者襄駕也上駕言為衆馬之最良也朱氏曰馬之上者為上駕猶史所謂上駟也今曰終日七襄兩驂鴈行音航疏曰兩驂與服其首差退如鴈行之有次序叔在藪火烈具揚傳曰揚光也疏曰言舉火而揚其光也叔善射忌音記傳曰忌辭也又良御忌抑磬控忌控空之去朱氏曰抑發語辭傳曰騁馬曰磬止馬曰控補傳曰騁馬曰磬謂使之曲折如磬也止馬曰控謂有所控制不逸也今曰今人稱馬韁為磬控抑縱送忌朱氏曰舍拔曰縱拔音跋兩服馬皆上駕其馬最良也兩驂馬如鴈行其首差退也既言叔良御忌遂言其能磬以騁馬控以止馬則馬之進退惟其意所以實其良御也既言叔善射忌遂言其能後手絶而縱絶音蕝子悅切前手攧而送則矢去徑而有力所以實其善射也縱放箭也送送箭也今射者云前手攧後手絶攧即送也絶即縱也舊説從禽曰送今不用叔于田乘乘鴇音保依字作鴇釋獸曰驪白雜毛曰鴇釋曰毛色黑白而復有雜毛相錯者名鴇今所謂烏驄兩服齊首傳曰馬首齊也兩驂如手箋曰如人左右手之相佐助也叔在藪火烈具阜傳曰阜盛也叔馬慢忌傳曰慢遲也叔發罕忌抑釋掤忌掤音冰傳曰掤所以覆矢疏曰昭二十五年左傳云公徒執氷而踞字異音義同箭筒蓋也筒音同箭室也今曰用矢則舉掤以開筒既用則納矢筒中釋下其掤以覆筒也抑鬯弓忌鬯音暢傳曰鬯弓韜弓韜音滔弓衣也疏曰鬯者盛弓之器鬯弓謂韜弓而納之鬯中鬯韻作韔注云弓衣也田事既畢則叔馬行遲矣叔發矢希罕矣釋掤以覆矢矣以鬯鬯其弓矣言其從容得意如庖丁解牛提刀而立為之四顧為之躊躇滿志善刀而藏之也亦可想叔段洋洋之意矣段有不義之謀兄弟之間人所難言詩人優柔之意但言段矜能恃勇暴虎以獻氣陵其兄私黨諂事甘言媚説方且踴躍馳騁不能自已從容畢事意氣自得其氣習輕揚粗暴如此殆非令終之器所謂智伯射御足力則賢而以不仁行之者也公何為不早禁止之乎大叔于田三章章十句清人刺文公也疏曰文公踕厲公突子踕音捷髙克好利而不顧其君好去聲文公惡而欲逺之不能惡烏路反逺去聲使髙克將兵而禦狄于竟將去聲竟音境陳其師旅翺翔河上久而不召衆散而歸髙克奔陳公子素惡髙克進之不以禮疏曰鄭之公子名素文公退之不以道危國亡師之本故作是詩也曰鄭文公詩平王時疏曰春秋閔公二年冬十二月狄入衛鄭棄其師衛在河北鄭在河南恐其渡河侵鄭故使髙克將兵於河上禦之公子素作詩以刺之胡氏曰人君擅一國之名寵殺生豫奪惟我所制耳使髙克不臣之罪已著按而誅之可也情狀未明黜而退之可也愛惜其才以禮馭之亦可也烏有假之以兵權委諸境上坐視其卒伍離散而莫之恤乎然則棄師者鄭伯乃以國稱何也二三執政股肱心膂休戚之所同也不能進諫于君協志同力黜逐小人而國事至此是謂危而不持顛而不扶則將焉用彼相矣春秋書曰鄭棄其師君臣同責矣春秋經書鄭棄其師罪文公也與首序合清人在彭傳曰清邑也彭衛之河上鄭之郊也箋曰清者髙克所帥衆之邑也駟介旁旁音絣箋曰駟四馬也傳曰介甲也疏曰旁旁然不息今曰北山王事傍傍字異音義同二矛重英重平聲箋曰二矛酋矛夷矛也疏曰考工記云酋矛常有四尺夷矛三尋注云八尺曰尋倍尋曰常魯頌以矛與重弓共文弓無二等直是一弓而重之則知二矛亦一矛而有二故彼箋云二矛重弓備折壞直是首矛有二無夷矛也英傳曰矛各有英飾也疏曰經言重英嫌一矛有重飾故云各有英飾言其各自有飾並建而重纍魯頌説矛之飾謂之朱英則以朱染為英飾河上乎翺翔載驅傳曰翺翔猶倣徉也倣徉音旁羊錢氏曰如鳥之翺翔也髙克所率清邑之人在於河上之彭地狄去無事乃使四馬被甲驅馳旁旁然不息其車之上建酋矛夷矛長短不同其英飾相重纍翺翔於河上之地何為者耶詩意謂彼既無事不召之使還將潰散矣永嘉鄭氏曰夫擁大衆於外而無所事不為亂則潰散爾清人在消傳曰消河上地也駟介麃麃音標傳曰麃麃武貌二矛重喬毛音橋鄭音驕傳曰重喬纍荷也釋文曰荷舊音何謂刻矛頭為荷葉相重纍也沈胡可反謂兩矛之釋相負荷也疏釋毛曰喬髙也以矛建於車上五兵之最髙者也而二矛同髙復有等級故謂之重喬謂此二矛刀有髙下重纍而相負揭箋曰喬矛矜近上及室題所以縣毛羽縣音玄疏釋鄭曰矜謂豫柄也室謂矛之銎孔襄十年左傳曰舞師題以旌夏杜預云題識也題者表識之言箋曰喬者矛之柄近於上頭及矛之銎室之下當有物以題識之銎音如芎識音志河上乎逍遙錢氏曰逍遙行樂也清人在軸音逐傳曰軸河上地也疏曰彭消軸皆河上之地久不得歸師有遷移三地亦應不甚相逺駟介陶陶音道傳曰陶陶驅馳之貌左旋右抽中軍作好去聲箋曰左人謂御者右車右也中軍將也疏曰左傳成二年説晉之伐齊云郤克將中軍解張御鄭丘緩為右郤克傷於矢流血及屨未絶鼓音曰余病矣張侯曰自始合而矢貫余手及肘余折以御左輪朱殷豈敢言病張侯即解張也郤克傷矢言未絶鼓音是郤為將在鼓下也張侯傷手而血染左輪是御者在左也此謂將之所乘車耳兵車之法左人持弓右人持矛中人御御不在左也解音蟹殷於間反師久不歸厭其處則復遷故自彭而消自消而軸翺翔遍於河上之地既間暇無所作為乃使在左之御者習旋其車車右勇力之士抽兵刃以習擊刺將居中央為容好而已遊戲以自樂也一説好如字左軍旋而歸右軍抽而退皆已逃散唯中軍髙克所自將雖作好而強留亦不能久也亦通清人三章章四句羔裘刺朝也朝音潮言古之君子以風其朝焉風音諷曰鄭莊公詩在平桓之間箋曰朝無忠正之臣故刺之或謂檜羔裘専刺其君唐羔裘専刺其臣鄭羔裘兼刺君臣按此詩言豹飾止是臣下之服舍命不渝及邦之司直邦之彥兮皆臣事也止當為刺在朝之臣羔裘如濡疏曰緇衣羔裘諸侯與其臣服之以日視朝也傳曰如濡潤澤也今曰霑濡也洵直且侯歐陽氏曰洵信也韓詩曰侯美也彼其之子其音記朱氏曰其語助辭舍命不渝舍音赦傳曰渝變也言古之君子服羔裘之衣其色潤澤如濡濕之信其直而且美謂德稱其服也美其有德故謂其裘若有潤澤喜慕之辭也直者大公至正之謂也充實之謂美直而且美則養其剛犬而至於充實矣命者天之所以賦豫於我者舍則居之而安也人惟不安於命所守不固故不能剛大充實彼古之君子能安於命臨利害而不變所以直而美也稱彼所以譏此也羔裘豹飾傳曰豹飾緣以豹皮也緣去聲疏曰君用純物臣下之故袖飾異皮孔武有力傳曰孔甚也彼其之子邦之司直傳曰司主也今曰猶屠蒯言女為君耳將司聰也之司言古之君子服其羔裘而豹皮為袖之緣其人甚武而有力然非賁育之謂也繼言彼其之子可以司國之直謂敢行禮義不畏強禦斯以為孔武有力也司直謂直道之宗主官名多稱司言主掌之也羔裘晏兮錢氏曰晏安也三英粲兮傳曰三英三德也箋曰剛克柔克正直也朱氏曰粲鮮明貌彼其之子邦之彥兮傳曰彥士之美稱羔裘晏兮言德稱其服故服之而安猶云緇衣之宜兮三英粲兮言三俊為國光華也三英或以為裘之英飾前後有三如五紽五緎五總之類只是臆度無文可據毛氏以為三德或疑牽合於三之數今考立政三俊注以為剛柔正直英即俊也毛氏之説有源流矣此詩每章第二句皆言德美知三英非言英飾也羔裘三章章四句遵大路思君子也莊公失道君子去之國人思望焉曰鄭莊公詩在平桓之間詩記曰武公之朝蓋多君子矣至於莊公尚權謀専武力氣象一變左右前後無非祭仲髙渠彌祝聃之徒也君子安得不去之乎曹氏曰莊公殺弟幽母加兵於天子其失道多矣失道之君胡可與久處宜君子之去之也不有君子其能國乎是以身死而國亂至於公子五爭兵甲不息有由然也鄭莊克段誓母交質之事在平王時鄭莊前二十四年交惡歸祊繻葛之事在桓王時鄭莊後十九年入春秋首惡也羔裘遵大路女曰雞鳴三詩之時無以明之疑而繫之平桓之間毋質也舊圖列之莊王誤矣鄭莊卒於桓之十九年不及莊王之世遵大路兮傳曰遵循也摻執子之袪兮摻音糝袪音驅傳曰摻攬也今曰攬韻亦作攬釋云撮持也袪袖口也袪袂之袪從衣祛去之祛從示祛解見唐羔裘無我惡兮惡烏路反不寁故也寁子感反從韻傳曰寁速也今曰速猶言倉卒也莊公失道君子惡之遵循大路而去其國人欲攬持其裾袖以留之曰子無惡我而不留不可倉卒於故舊也謂棄去之速也不言其惡莊公而以為惡我婉辭也言故舊以先君之義諷之庶其或留也此詩止惜賢者之去而莊公身不行道為君子所棄可見矣大路非隱僻之所而君子遵此以去觀瞻所繫衆所共惜莊公不留之乃使國人欲留之是可刺也曹氏曰申公白生強起穆生曰獨不念先王之德歟即此詩欲留君子之意遵大路兮摻執子之手兮無我魗兮魗毛音讎鄭音醜傳曰魗棄也箋曰亦惡也不寁好也好去聲蘇氏曰好舊好也遵大路二章章四句女曰雞鳴刺不説德也説音悅陳古義以刺今不説德而好色也好去聲曰鄭莊公詩在平桓之間古者夫婦相警以勤生又能同心以親賢是好德而不淫於色也女曰雞鳴士曰昧旦詩記曰昧晦也旦明也昧旦天欲旦晦明未辨之時也列子曰將旦昧爽之交日夕昏明之際子興視夜明星有爛傳曰言小星已不見也將翺將翔今曰翺翔雍容和緩之意弋鳧與鴈弋音翼鳧音符箋曰弋繳射也繳音灼疏曰謂以繩繫矢而射也繳謂生絲為繩也曹氏曰鳧鷖解曰鳧野鶩解見鳧鷖此詩述夫婦相警之辭始婦警其夫曰雞鳴可興矣夫曰姑俟昧旦也婦又警其夫曰子宜興而視夜之如何蓋小星已不見唯明大之星爛然天將曉矣方將雍容翺翔而往弋取鳧鴈而歸早則從容晏則忽遽起不可以不早也蘇氏以明星為啓明蓋今俗所謂曉星也毛氏謂天將曉則小星不見惟明大之星爛然雖不指為啓明然將曉而明大者惟啓明耳至陳東門之楊明星煌煌但言夜深則星明又不必専為曉星矣弋言加之蘇氏曰加中也史記云以弱弓微繳加諸鳧鴈之上與子宜之朱氏曰和其所宜也內則云牛宜稌羊宜黍豕宜稷犬宜粱鴈宜麥魚宜苽宜言飲酒與子偕老琴瑟在御莫不靜好婦人謂其夫曰子弋射鳧鴈加而中之我當與子和其滋味之所宜既和其所宜以之飲酒相樂期于子以偕老飲酒之時琴瑟在於侍御莫不安靜而和好言夫婦相愛之意也朱氏曰射者男子之事而中饋者婦人之職也知子之來之雜佩以贈之傳曰雜佩者珩璜琚瑀衝牙之類音行黃居禹朱氏曰珩佩之上橫者也下垂三道貫以蠙珠璜如半璧繫於兩旁之下端琚如圭而兩端正方在珩璜之中瑀如大珠在中央之中别以珠貫下繫於璜而交貫於瑀復上繫於珩之兩端衝牙如牙兩端皆鋭橫繫於瑀下與璜齊行則衝橫出聲也箋曰贈送也知子之順之雜佩以問之傳曰問遺也遺音位疏曰曲禮云凡以苞苴簟笥問人者左傳衛侯使人以弓問子貢皆遺人物謂之問知子之好之好去聲雜佩以報之婦語其夫謂知汝所招來而新相知者吾將解雜佩以贈送之知汝所和順而莫逆於心者吾將解雜佩以遺問之知汝所好慕而尊敬之者吾將解雜佩以報答之雜佩難得之物未必常有特言苟有賢者之至當有以結其歡心而無所愛於服玩之物此由其夫好德故其妻能奉承其意也女曰雞鳴三章章六句有女同車尺奢反刺忽也疏曰昭公忽莊公寤生世子祭仲逐之而立突鄭人刺忽之不昏于齊太子忽常有功于齊齊侯請妻之妻音砌齊女賢而不取音娶卒以無大國之助至於見逐故國人刺之曰鄭昭公初立詩桓王時疏曰桓六年傳曰北戎侵齊齊侯乞師于鄭鄭大子忽帥師救齊六月大敗戎師獲其二帥大良少良甲首三百以獻于齊是大子忽嘗有功於齊也傳又云公之未昏于齊也齊侯欲以文薑妻鄭大子忽大子忽辭人問其故大子曰人各有耦齊大非吾耦也詩云自求多福在我而已大國何為君子曰善自為謀及其敗戎師也齊侯又請妻之固辭人問其故大子曰無事於齊吾猶不敢今以君命奔齊之急而受室以歸是以師昏也人其謂我何遂辭諸鄭伯如左傳文齊侯前欲以文薑妻忽後復欲以他女妻忽再請之此言齊女賢而忽不取謂復請妻者非文薑也妻音砌廣漢張氏曰忽之不昏于齊未為失也而詩人追恨其失大國之助者蓋見忽之弱為甚追念其資於大國或有以自立此國人之情也蓋忽者先君之世子其立也正故其始也國人見其逐而憐其無助耳突挾宋之援以逐忽故國人惜忽之無援而作此詩也春秋桓五年經書鄭忽出奔衛以其失國故不稱子十五年經書鄭世子忽復歸于鄭以其歸國故稱世子以其終失國出入皆不稱鄭伯此首序稱忽擊鼓稱州吁墓門稱陳他皆用春秋書法知經聖人之手矣有女同車傳曰親迎同車也疏曰士昏禮云女始乘車壻御輪三周是同車也顔如舜華如字傳曰舜木槿也釋草曰椵木槿櫬木槿椵音假樊光曰别二名也其樹如李其華朝生暮落陸璣曰五月始華故仲夏月令云木槿榮山隂陸氏曰取瞬之義曹氏曰舜華易落而無實以況有色而德不稱焉將翺將翔今曰翺翔雍容和緩之意佩玉瓊琚解是衛木瓜彼美孟薑傳曰孟薑齊之長女也疏曰他女必幼於文薑未必實長假言其長而美之洵美且都洵音荀箋曰洵信也傳曰都間也疏曰都者美好間習之言司馬相如上林賦云妖冶間都忽以弱見逐國人追恨其不取齊女言忽所取他國之女行親迎之禮而與之同車者特取其色爾此女色如木槿之華朝生暮落不足恃也而今也且翺且翔於此佩其瓊琚之玉徒有威儀服飾之可觀而無益於事也曷若彼美好齊國之長女信美而且間雅向來忽若取之則有大國以為援而不至於見逐矣舊説以有女即孟薑其文重復彼乃别指之辭有女同車指忽所取者彼美孟薑指忽所不取者忽之辭齊昏也祭仲曰君多內寵子無大援將不立正此詩之意也有女同行錢氏曰同以車行也顔如舜英傳曰英英華也將翺將翔佩玉將將音鏘釋文曰將將玉佩聲彼美孟薑德音不忘德音解見假樂言齊女有賢譽至今使人不能忘恨不取之也車舝德音來括言其有賢譽此言德音不忘即所謂齊女賢而不取也詩記曰不借助於大國而自求多福忽非奮然誠有是志也蓋其為人淺狹而多所拘攣暗滯而動皆疑畏浮易而不知審量孑孑然以文義自喜而國勢人情與其身之安危皆懵然莫之察也適足以取亡而已矣使忽誠有是志而深求其實則質之弱固可強而所以持國者固無待於外助也惟其為善有名而無情所以卒見嗤於祭仲而為詩人所閔此功利之説所以多勝而信道者所以益寡也有女同車二章章六句山有扶蘇刺忽也所美非美然今曰鄭昭公詩桓莊之間疏以山有扶蘇蘀兮狡童三詩為忽後立時事則為莊王時然未有以明之為君在辨君子小人而已忽暗於知人所美之人非真美也山有扶蘇傳曰扶蘇扶胥小木也疏曰釋木無文毛當有以知之未詳其所出也隰有荷華如字傳曰荷華扶蕖也釋文曰未開曰菡萏已發曰芙蓉菡酣之上濁頷撼同音萏談之上濁禫髧同音不見子都釋文曰都美也傳曰子都世之美好者也乃見狂且沮之平傳曰狂狂人也且辭也興也山有扶蘇之小木朴􅈪不足道喻么麼之小人此非美也隰有扶蕖之名華自拔於汚泥之中喻修潔之君子此美也美惡本不難見忽乃所美非美用捨倒置君子去之在其朝者皆小人耳故不見都美之賢人惟見狂人也世稱美好之人為子都孟子所稱子都以貌之美此詩所稱子都以德之美猶美人之名或稱美貌或稱美德詩彼姝者子兩出一為賢者一為女子也若以此子都為美貌則與狂且意義不貫鄭氏以狂為醜其説牽強此詩子都子充皆指賢人耳都美好也充充實也非有人名子都子充也或謂山隰有草木喻國之有人材耳不必強為分别此説非也凡詩言山隰有草木其草木皆相類故不必分别此詩以扶蘇對荷華以喬松對遊龍皆不相類荷名華也扶蘇小木不知其為何木其名不顯其木可知是荷華與扶蘇非類也松名木也其材可為棟梁以喬言之則又髙竦而挺持龍凡草也又以遊言之則枝葉放縱與喬木亦非類也周子以蓮有君子之德夫子稱松有後凋之操晉人稱和嶠為千尺松皆以荷松喻賢豈扶蘇遊龍輩所可同日語哉時人比並言之蓋美惡相形矣山有喬松王氏曰喬髙也隰有遊龍箋曰遊放縱也傳曰龍紅草也釋草曰紅蘢古其大者蘬蘢音龍舍人曰紅名龍古陸璣曰一名馬蓼葉大而赤白色生水澤中髙丈餘不見子充疏曰充實忠良者乃見狡童今曰狡獪也從犬非從人山有喬髙之松木挺特而秀拔喻特立之君子此美也隰有放縱之龍草縱橫而亂生喻縱恣之小人此非美也今忽所美非美故不見充實之賢人乃見狡獪之小子也李德裕言正人如松柏特立不倚邪人如藤蘿非附他物不能自起遊龍正堪與藤蘿為伍耳山有扶蘇二章章四句蘀兮蘀音託刺忽也君弱臣強不倡而和也倡音唱和去聲曰鄭昭公詩桓莊之間補傳曰後篇權臣擅命指祭仲此篇亦指祭仲也此詩小臣願忠於國而力不能自為也後序之言非詩意也蘀兮蘀兮疏曰七月傳云蘀落也落葉謂之蘀今曰稿葉未辭柯以風所吹而必落故呼稿葉為蘀也風其吹女音汝叔兮伯兮錢氏曰叔伯謂諸大夫也倡豫和女興也此小臣有憂國之心呼諸大夫而告之言此稿葉在柯風將吹女不能久矣天大風則稿葉無不落喻國有難則大夫皆不安禍將及矣豈可坐視以為無與於已而不相與扶持之乎叔伯諸大夫其亟圖之汝倡我則我和汝矣謂患無其倡不患無和之者也當時卒無倡之者由忽無忠臣良士也二女字皆呼諸大夫蘀兮蘀兮風其漂女漂音飄傳曰漂猶吹也叔兮伯兮倡豫要女要音腰傳曰要成也成女謂相與成其事也蘀兮二章章四句狡童刺忽也不能與賢人圖事權臣擅命也擅音繕箋曰祭仲専也今曰鄭昭公詩桓莊之間狡童或以為指忽或以為指祭仲春秋書忽乃聖人筆削以示褒貶首序稱忽亦國史所題經聖人之手忽以世子為鄭君其當時國人作詩義不得目為狡童也若指祭仲則祭仲自莊公時已為卿且為莊公取鄧曼而生昭公當昭公即位仲已老矣不應目為童也今考山有扶蘇之詩刺忽所美非美乃見狂且狡童是所用之人非狂即狡此詩正指忽所用之人耳聖人刪詩以垂世教安取目君為狡童乎彼狡童兮不與我言兮維子之故使我不能餐兮餐粲之平忽所美非美以狡童為賢而信用之不與賢人圖事賢者憂之不欲斥忽而斥其所用之人也為告忽言之故指狡童為彼而稱忽為子曰彼狡獪之童少不更事恃權寵而侮老成故不與我言也彼狡童不足恤吾惟憂君之故恐為所誤至於不能餐也舊説既以狡童指忽又以子為指忽非也彼以指忽之所用子以稱忽則語意抑揚分明矣彼者薄之之辭子者親之之辭也權臣擅命將有他志惡察察言故但言憂之而不能餐微辭也彼狡童兮不與我食兮維子之故使我不能息兮朱氏曰息安也共食則可以從容謀事耳不能息謂不安息也食息俱廢憂之深也舊説謂不與食天祿今不從此詩蓋忽之朝猶有賢人在焉而忽不與之謀耳非謂在野之賢也詩記曰賢者於忽懇懇如此而忽不之察焉上下可謂不交矣疏其可親親其可疏斯其所以亡也狡童二章章四句褰裳褰音愆思見正也狂童恣行去聲疏曰忽是莊公世子於禮宜立非詩人所當疾故知狂童恣行謂突也正謂正爭者之是非去突而定忽國人思大國之正已也曰鄭昭公初立詩桓王時鄭人始作蘀兮望大夫相與扶持之既無其人則又作褰裳望大國之見正蓋惓惓於忽也説者多以狂童指忽非也忽以世子嗣位其立也正國人憂之至於不能餐其情可見此詩及有女同車皆欲求援大國以扶植之也王道既微小國無所控訴往往思方伯之拯己霸圖能無興乎是可以觀世變矣子惠思我今曰惠言恩惠我也褰裳涉溱釋文曰褰摳也摳挈也摳恪侯反釋文曰溱水名出鄭字作潧補傳曰洧溱未必褰裳可涉詩人此言欲其急於拯亂耳子不我思豈無他人狂童之狂也且沮之平朱氏曰且語助辭也突以庶奪嫡忽位已定而篡之國人無如之何故思大國正其孰為當立孰為不當立子斥大國之人也大國有以恩惠而念我鄭國之亂欲來為我討正之者非道逺而難至但褰揭其裳涉溱水則至矣子不我思則豈無他國思我者乎何為皆不來也望大國之正已其情甚切不主一國也所以告急者突乃狂童以庶奪嫡其狂已甚也舊説謂爾不我思則當有他國思我者如此則自為悠緩之辭非告急之意子惠思我褰裳涉洧音委傳曰洧水名李氏白説文云洧出潁川陽城山東南入潁子不我思豈無他士箋曰他士猶他人也狂童之狂也且褰裳二章章五句丰音峰刺亂也昏姻之道缺箋曰謂嫁取之禮陽倡而隂不和倡音唱和去聲男行而女不隨曰昭公詩桓莊之間疏曰丰東門之墠風兩子襟直云刺亂世耳或當突篡之時或當忽入之後其時難知要之是忽為主亦宜繫忽皆昭公詩忽初立在桓王時復立在莊王時扶蘇蘀兮狡童丰東門之墠風雨子襟揚之水詩不明何時作則疑而附之桓莊之間疏指山有扶蘇至狡童為忽後立時事唯丰以下其時難知要之八詩一體皆難定其時也子之丰兮傳曰丰豐滿也俟我乎巷兮傳曰巷門外也疏曰門外之道也悔豫不送兮此詩述婦人之辭也男子親迎女有他志而不從其後復思親迎之人謂子之面貌丰丰然豐滿出門而待我於門外之巷悔我當時不送是子而去也子之昌兮傳曰昌盛壯貌俟我乎堂兮疏曰士昏禮主人揖賔入于廟主人升堂西面賔升堂北面奠鴈再拜稽首降出婦從降自西階是則士禮受于廟堂庶人雖無廟堂亦受女于寢堂悔豫不將兮箋曰將送也衣錦褧衣二衣皆如字褧傾之上字亦作絅解見衛碩人裳錦褧裳箋曰庶人之妻嫁服也叔兮伯兮駕豫與行今曰行出適也解見鄘蝃蝀女失其配耦悔前不行自説衣服之備望夫更來迎已言已衣用錦為之其上加褧衣裳用錦為之其上加褧裳衣裳備足可以行嫁乃呼迎者之字云叔兮伯兮若復駕車而來我則與之行矣裳錦褧裳衣錦褧衣叔兮伯兮駕豫與歸葛覃傳曰婦人謂嫁曰歸丰四章二章章三句二章章四句東門之墠音善禪之上濁刺亂也男女有不待禮而相奔者也曰昭公詩桓莊之間丰東門之墠溱洧三詩皆以鄭亂之故而男女不正故皆曰刺亂也出其東門言閔亂亦此意東門之墠傳曰城東門也今曰東門鄭要會之地隱公四年左傳宋公陳侯蔡人衛人伐鄭圍其東門疏曰墠除地去草也封土為壇除地為墠茹藘在阪茹藘音如閭阪音反曰茹藘者蒨草也蒨韻亦作茜釋草曰茹藘茅搜李巡曰一名茜可以染絳疏曰陂陀不平而可種者名阪其室則邇其人甚逺東門有墠其墠之外有阪茹藘之草生焉此男子所居之處也女欲奔之而未遂故言其室則近不難至也其人甚逺未得就之也東門之栗疏曰栗樹生於路上有踐家室伐柯傳曰踐行列貌豈不爾思子不我即女欲奔而未得望男之就已也東門之墠二章章四句風雨思君子也亂世則思君子不改其度焉曰昭公詩桓莊之間鄭公子之亂時事反覆士之怵於利害隨勢變遷失其常度者多矣故詩人思見君子焉風雨淒淒音妻曰淒淒寒涼之意考見邶緑衣雞鳴喈喈音皆葛覃傳曰喈喈和聲之逺聞既見君子云胡不夷今曰傳以夷為悅心悅則夷平憂則鬱結也興也風雨淒淒然寒涼雞猶守時而鳴喈喈然其聲之和興君子雖居亂世不變改其節度我得見此人則我心豈不坦然而平夷哉感當時無此人思而不得見之辭也風雨瀟瀟傳曰瀟瀟暴疾也朱氏曰風雨聲雞鳴膠膠錢氏曰膠膠聲雜也今曰膠膠擾擾是雜之意謂羣雞之聲也既見君子云胡不瘳音抽傳曰瘳愈也李氏曰言如病之瘳愈也風雨如晦傳曰晦昏也雞鳴不已既見君子云胡不喜晝而如晦風雨之甚而雞晝鳴不已也風雨三章章四句子襟音今刺學校廢也亂世則學校不修焉曰昭公詩桓莊之間學校興者治之象也學校廢者亂之證也青青子襟傳曰襟領也疏曰襟交領也襟與襟音義同悠悠我心程子曰悠悠我心賢者悲傷當時如此縱我不往子寧不嗣音鄭以國亂學校不修生徒解散賢者憂之言汝學子服青青之襟領宜會聚於學校以講習今散而何所之乎使我心悠悠然深長思之縱我不往見汝汝寧不繼聲以問我乎言此者以學校廢而朋徒解散不相聞知見時之亂也非要其來見而責望之也青青子佩傳曰佩玉也士佩瓀珉而青組綬瓀音軟疏曰玉藻士佩瓀玫而緼組綬此云青組綬者蓋毛讀禮記作青字緼音溫今曰玉藻一命緼韍幽衡注云緼赤黃之間色幽音酉悠悠我思縱我不往子寧不來既不繼聲問亦不來訪挑兮達兮挑音叨又音恌達音撻朱氏曰挑輕儇跳躍之貌達放恣也在城闕兮一日不見如三月兮人既廢學乃挑然輕躍達然放恣但好登城上之髙闕以候望為樂賢者念之一日不見已如三月之久況非止一日乎傷時事之至此念朋會之無從也子襟三章章四句揚之水閔無臣也君子閔忽之無忠臣良士終以死亡而作是詩也曰昭公詩桓莊之間今曰忽時未死亡終必死亡耳忽非無臣也臣非忠良雖有之如無之揚之水三篇王風言平王不能令諸侯唐風言晉昭不能制沃此詩言忽不能制權臣皆興微弱也忽能用忠臣良士則轉弱為強矣揚之水不流束楚解見王風曹氏曰此先楚後薪以見臣之愈強耳終鮮兄弟鮮上聲維豫與女音汝無信人之言人實迋女迋徐音薑之去本音狂之上濁傳曰迋誑也興也楚本浮物一束之楚本非不可流轉而悠揚之水不能流轉之猶忽之微弱不能號今其臣也昭公兄弟甚衆無與忽同心者故言今兄弟雖多終竟是少謂要其終必不相助雖多猶少也此詩忽兄弟所作故曰維豫二人外此無與同心者也兄弟且如此況他人乎故言無信他人之言他人實欺迋汝耳見無忠臣也曹氏曰按左傳忽突爭國而子儀子亹更立及至莊十四年忽與子儀子亹皆已死而原繁謂厲公曰莊公之子猶有八人不得為鮮詩記曰無信人之言非教之以不信人言也忽既微弱強公子復多其臣大抵懷二心而外市僅有一二人實心向之者乃暗於情偽不知所倚故提耳而告之也揚之水不流束薪終鮮兄弟維豫二人無信人之言人實不信揚之水二章章六句出其東門閔亂也公子五爭兵革不息男女相棄民人思保其室家也曰厲公詩僖王時疏曰桓十一年左傳云祭仲為公取鄧曼生昭公故祭仲立之宋雍氏女於鄭莊公生厲公故宋人誘祭仲而執之曰不立突將死祭仲與宋人盟以厲公歸而立之秋九月昭公奔衛己亥厲公立是一爭也十五年傳云祭仲専鄭伯患之使其壻雍糾殺之雍姬知之以告祭仲祭仲殺雍糾厲公出奔蔡六月乙亥鄭世子忽復歸于鄭是二爭也十七年傳云初鄭伯將以髙渠彌為卿昭公惡之固諫不聽昭公立懼其殺已也弒昭公而立公子亹是三爭也十八年傳云齊侯師于首止子亹會之髙渠彌相七月齊人殺子亹而轘髙渠彌祭仲逆鄭子于陳而立之服虔云鄭子昭公弟子儀也是四爭也莊十四年傳云鄭厲公自櫟侵鄭及大陵獲傅瑕曰苟舍我吾請納君與之盟而舍之六月傅瑕殺鄭子而納厲公是五爭也忽亦再為鄭君前以太子嗣立不為爭篡故唯數後為五爭也雍平聲女尼據反亹音尾轘音患此詩與中谷有蓷皆以世亂之故而男女不相保故序皆以閔傷言之出其東門東門解見東門之墠有女如雲傳曰如雲衆多也雖則如雲匪我思存縞衣綦巾縞音杲綦音其傳曰縞衣白色綦巾蒼艾色疏曰縞細繒也戰國䇿云強弩之末不能穿魯縞然則縞是薄繒不染故色白也綦者青色之小别艾謂青而微白為艾草之色箋云綦文亦以為青色但巾上為此蒼文非全用蒼色為巾也與毛異聊樂我員樂音洛員音云園有桃箋曰聊且略之辭疏曰云員古今字助語辭也鄭國之亂男女相棄有出其東門見婦人之見棄者其多如雲雖如雲之多皆非我思慮所存也我心所存在於服白繒之衣綦文之巾者是我之室且得相樂幸不相棄足矣何暇閔憐他人之室家乎此感時之亂自顧其室家亦恐不能相保也縞衣綦巾稱其妻猶云荆叉布裙也出其闉闍二字音因都傳曰闉曲城也闍城臺也疏曰闉是門外之城即今之門外曲城是也闍是城上之臺謂當門臺也有女如荼音徒曰此荼茅草秀出之穗也疏曰鄭於地官掌荼注及既夕注與此箋皆云荼茅秀然則此言如荼乃是茅草秀出之穗非苦菜及委葉二種荼草也茅之秀者其穗色白言女皆喪服色如荼然吳語説吳王夫差於黃池之會陳兵以脅晉萬人為方陳皆白常白旗素甲白羽之矰望之如荼韋昭云荼茅秀亦以白色為如荼與此傳意同女見棄所以喪服者王肅云見棄又遭兵革之禍故皆喪服也矰音曽短矢也三荼考見邶谷風雖則如荼匪我思且音徂釋文曰爾雅云存也舊子徐反縞衣茹藘音如閭傳曰茹藘茅搜之染女服也解見東門之墠聊可與娛傳曰娛樂也出其東門二章章六句野有蔓草蔓音萬思遇時也君之澤不下流民窮於兵革男女失時思不期而會焉曰厲公詩僖王時思遇時者厭亂而思治也不期而會非詩意野有蔓草傳曰蔓延也零露溥兮溥音團傳曰溥溥然盛多也有美一人清揚婉兮清揚考見鄘君子偕老邂逅相遇邂逅音械候陳氏曰綢繆詩言昏姻云見此邂逅邂逅正謂昏姻非淫奔也今曰邂逅謂其議速成猶逮其今兮之意今人言事之速者云邂逅而成適我願兮今曰適意適興皆快適之意興也野有蔓延之草者由天零落其露溥溥然盛多以潤澤之興國有蕃庶之民者由君下恩澤以養育之謂民免兵革之禍男女及時也有美好之女其目清明其眉揚起婉然而美者使昏姻之議邂逅而成則適我之願也遭時之亂昏姻之道若願之而不可得之辭也野有蔓草零露瀼瀼音穰朱氏曰瀼瀼露多貌有美一人婉如清揚邂逅相遇與子偕臧傳曰臧善也與子偕臧猶言各得其所欲也野有蔓草二章章六句溱洧音臻委刺亂也兵革不息男女相棄淫風大行莫之能救焉曰厲公詩僖王時王氏曰羞惡之心莫不有之而其為至於此者豈其人性之固然哉兵革不息男女相棄而無所從歸也是以至於如此然則民之失性也為可哀君之失道也為可刺鄭衛多淫詩衛由上之化鄭由時之亂也漢地理志皆以為風土之習固然若是則教化為虛言而二南之義誣矣溱與洧傳曰鄭兩水名解見褰裳前漢地理志鄭地右雒左沛食溱洧焉土狹而險山居谷汲男女亟聚會故其俗淫亟音器方渙渙兮渙音喚傳曰渙渙春水盛也箋曰冰已釋水則渙渙然李氏曰説文云渙流散也蓋春冰解釋而流散也韓詩注云鄭國之俗三月上巳之辰往溱洧兩水之上招魂續魄秉蕳草以祓除不祥士與女方秉蕳兮蕳音艱傳曰蕳蘭也陸璣曰香草也楚辭紉秋蘭以為佩女曰觀乎士曰既且音徂徐音沮之平釋文曰且往也且往觀乎洧之外且如字洵訏且樂洵音荀訏音吁樂音洛箋曰洵信也傳曰訏大也維士與女伊其相謔贈之以芍藥芍音杓傳曰芍藥香草陸璣曰今藥草芍藥無香氣未審今何草詩記曰即今之芍藥陸璣必指以他物蓋泥毛公香草之言欲求香於柯葉置其花而不論爾鄭國之俗以上巳出遊溱洧之上男女雜沓今以淫風既行有因出遊而相挑誘者言溱洧之間春冰既泮方渙渙然流散有士與女適野遊行秉執蕳草女謂士曰盍往觀乎邀其偕行也士曰既以觀矣未從之也女又勸男云且復更往觀乎洧水之外聞其土信訏大而可樂士於是從之因相與戲謔又以芍藥香草為贈所以結恩情之厚也溱與洧瀏其清矣瀏音留傳曰瀏深貌説文曰流清也士與女殷其盈矣傳曰殷衆也女曰觀乎士曰既且且往觀乎洧之外洵訏且樂維士與女伊其將謔今曰將相將也方且也猶將安將樂之將贈之以芍藥鄭衛皆淫聲孔子獨先於鄭今鄭之淫詩顧少於衛何也詩之見在者孔子所存以為世戒也聖筆所刪多矣言鄭聲淫者舉其大體言之不繫今詩之多寡不必盡黜國史所題例目之為男女之詩以求合於鄭聲淫之説也溱洧二章章十二句詩緝卷八
