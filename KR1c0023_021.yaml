body:
  text: 詩緝卷二十一宋嚴粲撰小旻音閩大夫刺幽王也吕氏曰小旻小宛小辨小明言小者篇在小雅恐與大雅相亂以别之今大雅止有夫明餘篇疑亡蘇氏曰其在小雅者謂之小旻在大雅者謂之召旻小旻刺不能聽謀將致亂也旻天疾威釋天曰秋曰旻天王肅曰仁覆憫下曰旻天敷于下土傳曰敷布也謀猶回遹音聿傳曰回邪也遹僻也何日斯沮音咀箋曰沮止也今曰沮有所憚而止也謀臧不從不臧覆用箋曰覆反也我視謀猶亦孔之卭音窮傳曰卭病也首章次章言謀而不能擇也旻天以仁憫為稱今乃迅烈威虐敷布于下土使遍受其害言災禍荐臻也是皆人事有以召之幽王宜恐懼而改圖矣今謀猶邪僻不反其轍不知更待何時而後畏沮也謂天怒已甚王改過豈可緩乎羣臣之謀非無可從者但王於謀之善者不從謀之不善者反用我視其謀猶亦甚病矣潝潝訿訿潝音吸訿音紫蘇氏曰潝潝言相和也訿訿言相詆也李氏曰劉向云潝潝相是而背君子亦孔之哀謀之其臧則具是違箋曰具俱也謀之不臧則具是依我視謀猶伊于胡底音旨箋曰底至也羣小相聚潝潝然相和而苟合訿訿然相詆而苟毁同乎已者以為是異乎已者以為非小人之好惡如此甚可哀矣謀之善者俱背違之謀之不善者俱依就之我視其謀猶則亦何所底至乎至於亂亡而已我龜既厭去聲不我告猶謀夫孔多是用不集傳曰集就也發言盈庭誰敢執其咎李氏曰左傳楚子伐鄭其六卿三欲從楚三欲待晉子駟曰請從楚騑也受其咎如匪行邁謀釋文曰邁逺行也是用不得于道三章言謀之非其人也易曰再三瀆瀆則不告卜筮既數龜亦厭之不復告其所圖之吉凶言卜之不中也謀事者雖多而不能斷則惑於議論之不定是以不能有就發言滿庭而無敢決然任其責者謂事若不成則咎有所歸故皆持兩端也如人欲行路必問於曾行之人非行邁之人而與之謀問其所不知宜其無得於道路之事也如沈慶之言耕當問奴織當訪婢也哀哉為猶匪先民是程疏曰民者人之大名其實是聖賢也今曰書相古先民有夏傳曰程法也匪大猶是經箋曰大猶大道也傳曰經常也維邇言是聽維邇言是爭如彼築室于道謀是用不潰于成傳曰潰遂也四章言謀而不能斷也哀哉今之為謀不以古人為程法不以大道為經常維淺近之言是聽受是爭辨言所見止於目前而無逺圖也如築室於道傍與行道之人謀之人人異見故不得遂有成也朱氏曰古語云作舍道傍三年不成國雖靡止蘇氏曰止定也或聖或否音缶民雖靡膴音呼疏曰膴大也無大有人言少也或哲或謀或肅或艾音刈傳曰艾治也朱氏曰聖哲謀肅乂即洪範五事之德如彼泉流無淪胥以敗箋曰淪率也胥相也五章言賢愚將同受其禍也國雖無所止定而人有通聖者或有不然者民雖寡少亦或有明哲者或有善謀者或有恭肅者或有能理治者豈可厚誣天下為無人哉人主能擇其賢者而用之則天下之人皆賴以濟今乃使小人用事於上則政亂國敗賢愚皆喪亡矣如衆泉之流更相灌注一處決潰則衆流俱竭是淪率相與以敗也蘇氏曰雖世亂民僻猶有賢者在焉苟能用之愚者可賴以皆濟也苟廢而不用而使愚者壅之於上則相與皆敗無能為矣不敢暴虎傳曰徒搏曰暴虎不敢馮河馮音憑傳曰馮陵也徒涉曰馮河人知其一莫知其他戰戰兢兢傳曰戰戰恐也兢兢戒也如臨深淵如履薄氷末章言懼禍也虎不可以徒搏河不可以徒涉人特知此一等事耳不知其他更有可畏之事謂國將亡而禍及已也暴虎馮河其禍立至則知畏之亡國之禍稍緩則不知畏也我則戰戰而恐兢兢而戒如臨深淵之恐墜如履薄氷之恐陷懼之甚也荀子云人不肖而不敬則是押虎也遂引此章蓋斷章取義耳毛祖其師之説以為不敬小人之危殆今考本詩諸章止言不能聽謀無畏懼小人之意小旻六章三章章八句三章章七句小宛音婉大夫刺幽王也小宛刺不能自強而昏於酒下不能撫其子上不能紹其先也宛彼鳴鳩傳曰宛小貌曰鳴鳩鶻雕也即氓詩食椹之鳩郯子所謂鶻鳩氏司事莊子所謂鷽鳩也非斑鳩也鶻音骨又如字雕音嘲亦作鵃鷽音學釋鳥曰鶌鳩鶻鵃鶌九勿反郭璞曰似山鵲而小短尾青黑色多聲今江東亦呼為鶻鵃杜預曰春來秋去故為司事釋曰按舊説及廣雅皆云斑鳩非也山隂陸氏曰莊子所謂鷽鳩笑之者是也多聲故名鳴鳩鳴鳩小物決起而飛搶榆枋時則不至控於地而已矣今飛鳴戾天勉強故也性食桑椹陸璣云一名斑鳩似鵓鳩而大項有繡文斑然與此鶻鳩全異璣之言非此鳥喜朝鳴故曰鶻嘲也此鳥朝鳴曰嘲夜鳴曰㖡搶音鏘枋音坊木名㖡音夜翰飛戾天翰去聲蘇氏曰翰羽也傳曰戾至也我心憂傷念昔先人陳氏曰先人據幽王以言宣王也明發不寐疏曰明發從夕至明也夜地而暗至旦而明明地開發故謂之明發也有懷二人蘇氏曰二人文武也首章刺不能自強也興也宛然而小之鳴鳩決起而飛搶榆枋不至而控於地者也然亦有羽飛至天之志事在強勉而已幽王不自奮起曾鳴鳩之不若將日就衰替墜其祖宗之業矣故我心憂傷其如此追念先人宣王能自夕至明憂勤不寐永懷文武之烈惟恐失墜遂致中興此幽王家庭所親見而曾不念之乃令臣下念之乎人之齊聖今曰謂整齊也疏曰聖通也飲酒溫克傳曰克勝也彼昏不知一醉日富今曰一専也一醉専務酣飲也陳氏曰富益也各敬爾儀天命不又傳曰又復也次章刺沈湎也人之整肅通逹者其飲酒也能以溫和自克彼昏昧而不知者専務酣飲日以增益唯酒是務焉知其餘也以酒喪德君臣沈湎則天命將改矣故戒羣臣以各敬爾威儀恐天命一去不復來也齊聖廣淵底至齊信生而徇齊彼皆言聖人之事此言齊者止謂整肅也或疑飲酒小節未必係天命之去留殊不知蕩心敗德縱欲荒政疏君子而狎近幸玩冦讎而忘憂患皆自飲酒啓之禹惡旨酒曰後世必有以酒亡國者歷觀前史其事可監晉元帝以王導一言而覆杯其能植立江左宜哉中原有菽音叔傳曰中原原中也菽藿也采菽箋曰菽大豆也采其葉以為藿疏曰以言采之明采取其葉采菽疏曰公食禮云鉶芼牛藿羊苦豕薇皆有滑注云藿豆葉也苦苦荼也滑堇萑之屬是也以鼎煮牛取其骨體置之於爼其汁則芼之以藿調以鹹酸乃盛之於鉶謂之鉶羹萑音完今曰箋於生民荏菽及采菽皆云大豆是鄭意以菽即荏菽也庶民采之螟蛉有子螟蛉音銘零傳曰螟蛉桑蟲也陸氏曰桑上小青蟲也其色青而細小或在草葉也蜾螺負之蜾音果螺羅之上曰蜾螺者細腰蜂也俗呼為蠮螉記所謂蒲盧也蠮音一螉音翁釋蟲曰蜾螺蒲盧郭璞曰即細腰蜂鄭注中庸曰土蜂山隂陸氏曰即今細腰土蜂解頥新語曰説者考之不精乃謂蜾螺取桑蟲負之七日化為其子雖揚雄亦有類我類我久則肖之之説近世詩人取蜾螺之巢毁而視之乃自有細卵如栗寄螟蛉之身以養之其螟蛉不生不死蠢然在穴中久則螟蛉盡枯其卵日益長大乃為蜾螺之形穴竅而出蓋此物不獨取螟蛉亦取小蜘蛛置穴中寄卵於蜘蛛腹脅之間其蜘蛛亦不生不死久之蜘蛛盡枯其子乃成今人養晚蠶者蒼蠅亦寄卵於蠶之身久之其卵為蠅穴繭而出殆物類之相似者列子云純雌其名大腰純雄其名稚蜂莊子云細腰者化説文云天地之性細腰純雄無子此皆信説詩者之言也古人名物多取形似瓠之細腰者曰蒲盧故蜂之細腰者亦名蒲盧正如綬草綬鳥皆名以鷊青黑之菼青黑之鳩皆名以隼也傳曰負持也教誨爾子式榖似之箋曰式用也榖善也三章刺黜其子也幽王黜太子宜臼宜臼奔申侯此章刺之言中原有菽庶民乃采之而去桑蟲有子蜾螺乃持之而去喻王有太子不能撫愛而申侯乃挾而去之也王若以宜臼為不肖何不教誨之用善道而使之似續於已乎錢氏曰庶民采而去則非我所有矣蜾螺持而去則非我所保矣今王有子乃黜棄之將有挾之而為不善者題彼脊令題音弟傳曰題視也曰脊令雪姑也飛則鳴解見常棣載飛載鳴箋曰載之言則也我日斯邁箋曰邁行也而月斯征箋曰征行也夙興夜寐無忝爾所生歐陽氏曰所生謂宣王也今曰即首章先人也四章申首章之意也他鳥飛則不常鳴唯脊令且飛且鳴口翼俱勞無有止息可以人而自暴自棄乎今日月逝矣王宜愛惜日力夙夜勉勵無辱宣王也脊令飛鳴即鳴鳩戾天之意宣王承衰亂之後而能中興幽王繼中興之緒反致衰亂故一曰先人二曰所生以其所親見者勉之言非上世久逺難知之事也交交桑扈胡之上濁歐陽氏曰交交參雜相亂之謂也曰桑扈有二種此青雀也性之竊脂者也釋鳥曰桑扈竊脂郭璞曰俗呼青雀觜曲食肉喜盜脂膏食之因以名云山隂陸氏曰淮南子云馬不食脂桑扈不啄粟非廉也桑扈蓋一名而二種若魯有兩曽參也釋鳥云桑扈竊脂鷯剖葦此桑扈之一種也桑扈竊脂棘扈竊丹此桑扈之一種也蓋對剖葦言之則竊脂者所謂青質觜曲食肉好盜脂膏者是也對竊丹者言之則竊脂者所謂素質其翅與領皆鶯然而有文章者是也所謂交交桑扈率場啄粟者正以其性之竊脂者言之也故以啄粟為失其性交交桑扈有鶯其羽者正以其色之竊脂者言之也故其序曰君臣上下動無禮文焉蓋君臣素以為質而文之者禮也釋獸云虎竊毛謂之虦貓又云魋如小熊竊毛而黃竊毛皆謂淺毛則下扈竊玄言淺黑秋扈竊藍言淺青冬扈竊黃言淺黃棘扈竊丹言淺赤桑扈竊脂言淺白固其理也且爾雅主詩言之而小雅桑扈所取者有兩竊脂故爾雅亦兩解也音刁鷯音僚虦潺棧二音貓苗茅二音魋音隤補傳曰或指其色或指其性實一物耳率場啄粟哀我填寡填田之上濁傳曰填盡也箋曰窮盡也宜岸宜獄傳曰岸訟也握粟出卜今曰史曰者傳云卜而有不審不見奪糈見古以粟問卜也糈音所自何能榖長樂劉氏曰穀善也五章述民病也此桑扈性之竊脂者乃食肉之鳥而交交然亂雜以循場而啄粟失其性也可哀哉我此貧窮寡獨之人迫於朝夕之計宜其相與爭訟而入於獄也言宜者謂勢使之然雖在縲紲而非其罪也又持粟行卜問其勝負卜之曰何自而能善乎亦可憐矣溫溫恭人傳曰溫溫和柔貌如集于木惴惴小心惴追之去如臨于谷戰戰兢兢如履薄氷末章言懼禍也溫溫然恭謹之人無過可指然處今亂世如集于木而恐墜如臨于谷而恐隕戰戰而恐兢兢而戒如履薄氷而恐陷不敢不懼也小宛六章章六句小辨音槃刺幽王也大子之傅作焉大音泰朱氏曰幽王娶於申生大子宜臼後得褒姒而惑之信其讒黜申后逐宜臼宜臼之傅知其無罪而憫之故述大子之情而為之作是詩也周東遷之禍基於此人倫廢而後夷狄乘之辨彼鸒斯鸒音豫傳曰辨樂也鸒雅鳥也釋鳥曰鸒斯鵯鶋鵯音匹又音卑釋曰小而多羣腹下白不反哺山隂陸氏曰法言云頻頻之黨甚於鸒斯亦賊夫糧食而已矣鸒斯賊夫糧食以衆故也東都賦云鵯鶋秋棲鶻鳩春鳴今衆鳥秋分多羣集非時鳥也然至春分輒兩兩而翔不復羣矣里俗謂之分羣疏曰此鳥名鸒而云斯者語辭猶蓼彼蕭斯菀彼栁斯以劉孝標之博學而類苑鳥部立鸒斯之目是不精也歸飛提提音匙傳曰提提羣貌民莫不榖箋曰穀養也我獨于罹音離箋曰罹憂也何辜于天我罪伊何心之憂矣云如之何首章負罪引慝也興也幽王放大子宜臼將殺之其傅述大子之情而作此詩鴉鳥不能反哺猶已之不能致養是為不孝自罪之辭也鴉鳥雖不能反哺然出食在野飽則提提然羣飛而歸是其父子相隨為可樂也凡民莫不得以相養而我獨不容於父鴉鳥之不若也我何以得罪於天乎我之罪伊何乎心之憂矣云如之何則無可奈何而順受之烏有三種廣雅云純黑而反哺者謂之烏小而腹下白不反哺者謂之鴉烏白項而羣飛者謂之燕烏爾雅所謂白脰烏也脰音豆項也踧踧周道踧音敵傳曰踧踧平易也朱氏匪風解曰周道適周之道也鞠為茂草鞠音菊傳曰鞠窮也李氏曰猶伍被謂淮南王曰臣將見宫中荆棘露沾衣也非是當時已如此特預言之耳我心憂傷惄焉如搗惄音溺傳曰惄思也疏曰有如物之搗心也假寐永歎箋曰不脫衣冠而寐曰假寐維憂用老心之憂矣疢如疾首疾音趂箋曰疢猶病也疏曰疾首頭痛也次章憂國將亡也周之道路以朝會往來如織故車馬蹂踐踧踧然平易今將鞠為茂草矣國亡則路少行人唯草生之言周之興者以歸往之衆曰串夷載路曰岐有夷之行言周之衰者以行人之稀曰鞠為茂草也我心憂傷其如是惄焉思之如有物之搗心不脫衣冠而假寐終夜永歎身未老而以憂故老也維桑與梓音子解見定之方中必恭敬止靡瞻匪父靡依匪母不屬于毛屬音燭疏曰屬連屬也朱氏曰毛體膚之餘氣末屬也不離于裏曰離麗也解見邶新臺朱氏曰衷心腹也天之生我我辰安在疏曰辰十二辰也三章怨而慕也桑梓謂祖父所植以遺子孫者今人以桑梓為鄉里者謂有祖父所植之木有存焉祖父植木猶不敢不敬况人無有瞻望而非父無有依恃而非母者烏有不敬恭敬如此而父母之不我愛豈我不連屬于父母之毛乎謂不得皮膚之氣也豈我不離麗于父母之腹乎謂不處母之胞胎也父母無不愛子之理但恐我命自薄不知天之生我我所遇值之辰安所在乎豈皆值凶時而生乎何其不祥也疏曰此大子為父所放耳非母放之而并言母者以人皆得父母之恩故言連之其意不怨申后也李氏曰如韓退之云我生不辰月宿南斗菀彼栁斯菀音鬱疏曰菀茂也鳴蜩嘒嘒蜩音條嘒音諱曰蜩蟬也諸蟬之總名也解見七月傳曰嘒嘒聲也有漼者淵漼崔之上傳曰漼深也萑葦淠淠萑葦咅完偉淠徐音沸本字音譬萑葦解見七月傳曰淠淠衆也譬彼舟流不知所屆箋曰屆至也心之憂矣不遑假寐四章言如窮人無所歸也菀然而茂者桞也其上則有蟬聲嘒嘒然漼然而深者淵也其旁則有萑葦生之淠淠然衆言物皆有所依也我獨如不繫之舟流於水中無所依泊不知所至也初猶假寐至此雖假寐猶不遑其憂深矣鹿斯之奔疏曰斯辭也維足伎伎音岐傳曰伎伎舒貌雉之朝雊溝之去箋曰雊雉鳴也尚求其雌譬彼壞木壞回之上濁字與瘣同傳曰壞傷病也疾用無枝心之憂矣寧莫之知五章憂王孤立也鹿見人則奔宜速矣而伎伎然舒緩者顧其羣也雉朝作而鳴者求其雌也今王黜后而放子兀然如傷病之木內有蠧病而外無附枝也我心之憂如此而王寧不之知乎冀其感悟也相彼投相去聲箋曰相視也尚或先之先音線行有死人箋曰行道也尚或墐之墐音覲疏曰墐埋藏之名君子秉心箋曰秉執也維其忍之心之憂矣涕既隕之隕音尹傳曰隕墜也六章述親親之怨也視之見迫逐而投人人哀其窮則及驅者未至而先存之行路之死人初非親識乃或墐埋之使免暴露人皆有不忍之心也幽王乃獨黜后放子何其忍也是以心之憂而涕隕墜也君子信讒如或酬之酬音讎箋曰酬旅酬也疏曰酬酢皆作酬此作酬者古字得通用酬有二等既酢而酬賓奠之不舉謂之奠酬至三爵之後乃舉嚮者所奠之爵以行之行於後交錯相酬名曰旅酬此喻得讒即受而行之故知是旅酬非奠酬也君子不惠箋曰惠愛也不舒究之朱氏曰舒緩也伐木掎矣掎音紀今曰釋文云掎從後牽也析薪杝矣杝音侈錢氏曰杝以手離之今曰杝從才者離也廣韻亦作栘俗作扯其析薪之杝從木亦離之義也舍彼有罪舍音捨豫之他矣虛齋趙氏音如字今從之舊音唾今曰韻他亦作他他與它同無别音之他猶孟子反顧而之他七章言讒人離間父子也幽王信讒言如賓主飲酒相酬得即飲之喻聞讒即行不違拒之也幽王心不惠愛太子之故不肯舒緩而究察之茍徐察之則知讒人之情矣木附著於本根伐木者既以斤斧伐之又以繩索從其後牽拽之以倒其木使絶離其本根又薪本一木相聨屬析薪者既斧之又以手杝而離之使一木析而為二皆喻幽王父子天性本附著聨屬為一體而讒人橫離絶之也彼離絶人之父子者為有罪王乃捨之不問而反黜逐我令之他所釋文以掎為從後牽左傳諸戎掎之襄十四年注云掎其足是從後牽也今伐木者斧其前乃以繩索繫其末從後牽而倒之故云伐木掎矣舊説掎為掎其巔不欲妄踣之踣音白又説杝為順其理義亦迂曲而先儒承襲之發上下文讒人離間父子之意不出莫髙匪山莫浚匪泉浚音濬傳曰浚深也君子無易由言易音異耳屬于垣屬音燭垣音袁無逝我梁無發我笱梁笱解見邶谷風我躬不閲遑恤我後末章憂讒人不已將為國禍也莫髙莫深言無有髙深於此者謂極髙極深也極髙者豈非山乎極深者豈非泉乎然山雖髙而人能登之泉雖深而人能入之王勿謂處髙深之地而人不得聞之也王不可輕易自由以言恐屬耳垣牆者將窺伺意嚮而為讒也我已被讒見逐不可解矣但慮讒人不已將敗我家事故謂外人無逝我梁無發我笱猶顧念家國之事而不能忘也既而自歎我身尚不容何暇惜後事乎小辨八章章八句巧言刺幽王也大夫傷於讒故作是詩也小辨巧言何人斯巷伯之詩作而內外上下皆困於讒矣悠悠昊天李氏曰悠悠言天逺大之意曰父母且沮之平歐陽氏曰且語助無罪無辜亂如此憮音呼傳曰憮大也昊天已威箋曰已甚也豫慎無罪昊天泰憮箋曰泰甚也豫愼無辜首章傷已被讒也人窮則呼天呼父母此大夫被讒乃呼天呼父母而訴之言悠悠然逺大之昊天也及我之父母也其聽我之訴也我無罪辜而使我遭亂如此之大上天降此喪亂亦甚威大矣然我其實畏謹無罪無辜也亂之初生僭始既涵朱氏曰僭始不信之端也傳曰涵容也亂之又生君子信讒君子如怒亂庶遄沮遄市專反沮音咀傳曰遄疾也沮止也君子如祉音恥傳曰祉福也朱氏曰猶喜也亂庶遄已次章言亂生於讒讒生於優柔不斷所謂懷狐疑之心者來讒賊之口持不斷之意者開羣枉之門也讒言無實僭而不信小人為讒以漸而入初為不根之言以嘗試君之喜怒此不信之端所謂僭始也幽王既涵容之則讒人將無所憚日月既久浸潤益深禍亂愈生是君子信讒之過也凡聞人之言當别白其是非所言者非王若怒而責之則小人不敢為讒亂庶幾速止矣所言者是王若祉而福之則君子得行其言亂庶幾速已矣今忠讒不分是以邪正渾淆是非易位而亂天下也李氏曰子張問明子曰浸潤之潛膚受之訴不行焉可謂明也已矣孔子此言最盡小人之情狀夫以水之浸潤漸於壞物皮膚之受塵漸於垢汙小人之讒亦其以漸人君苟不察則小人得以逞其志漢元帝優遊不斷是以恭顯之徒周堪蕭望之劉更生張猛四人重相辨論其始也元帝不之察其終也蕭望之等皆為恭顯所排原其所由則僭始既涵之所致也司馬溫公嘗舉君子如怒亂庶遄沮君子如祉亂庶遄己此言無所臧否為患大矣君子屢盟箋曰屢數也亂是用長音掌今曰長加益也君子信盜亂是用暴今曰暴驟進也盜言孔甘亂是用餤音談傳曰餤進也匪其止共音恭維王之卭音窮箋曰卭病也三章言信讒致亂也周官有司盟凡邦國有疑則殺牲歃血告神以相要束今幽王信讒君臣相疑屢為盟誓此亂之所以加長也盜以名小人小人讒言不可信而幽王信之此亂之所以驟進也小人之言先務諛説其君甘言卑辭以入之使人君如嗜甘物而不厭此亂之所以日益進也為人臣止於敬此讒人非止於敬徒為王之卭病耳李氏曰考之春秋如伯冇之亂鄭伯與其臣下盟蓋盟者生於君臣相疑而致也禮云與其有聚斂之臣寧有盜臣以其害人如盜賊然奕奕寢廟奕音亦傳曰奕奕大貌錢氏曰宫室後曰寢前曰廟君子作之秩秩大猷秩音帙李氏曰秩秩序也箋曰猷道也聖人莫之王氏曰莫定也他人有心豫忖度之忖村之上度音鐸錢氏曰忖默度也躍躍毚免躍音惕毚音讒疏曰躍疾也傳曰毚狡也遇犬獲之四章言已知讒人之情也奕奕然髙大之寢廟唯君子能作之秩秩然有序之大道唯聖人能定之此非我所能也至於忖度他人之心則我能之爾讒人見讒自謂深密我不得而知不知我能忖度爾心而知之爾讒人如之狡躍躍然疾跳謂人無如之何然遇犬則獲之言讒人雖狡險得志又更有狡險者中傷於汝自古小人更相傾陷豈有善終者哉兔犬皆喻小人也忖度讒人之心如下篇何人斯皆忖度之辭也荏染柔木荏音稔染音冉傳曰荏染柔意也柔木梧桐梓漆也君子樹之往來行言心焉數之焉本義音煙本注如字數上聲錢氏曰數猶記也蛇蛇碩言蛇音移歐陽氏曰蛇蛇舒遲安間之貌箋曰碩大也出自口矣今曰與正月好言自口莠言自口同意巧言如簧顔之厚矣五章戒王愛護善類勿信讒言也荏染然之柔木良材也君子當封殖之俾無牛羊斧斤之患往來道塗之言誣謗善人何可介意乎若數記此道塗之言則小人得駕飛語以中傷君子矣蓋小人蛇蛇然舒遲安間敢為大言而無忌憚惟其口之所出非由中之言無真實也其言之巧如笙簧之可聽然皆不根之談以誣善人而不知恥其顔厚矣人有愧於心必形於色中心逹於面目也今小人面皮厚故無愧恥之色彼何人斯箋曰何人者斥讒人也賤而惡之故曰何人居河之麋音眉傳曰水草交謂之麋李氏曰左氏吾賜汝孟諸之麋無拳無勇傳曰拳力也職為亂階箋曰職主也既微且腫慵之上濁傳曰骭瘍為微腫足為腫骭音限腳脛也瘍音羊瘡也箋曰居下濕之地故生微腫之疾爾勇伊何為猶將多箋曰猶謀也將大也爾居徒幾何末章指讒人而惡之言彼何等人居河濱水草之交其居室陋既無拳力又無徑勇其人至弱而敢主為此亂之階梯此人自謂勇而有謀既患脛瘡有微之疾又患腫足有腫之疾爾假有勇伊何能為汝為謀大多矣汝所聚居之徒衆亦幾何人無能為也讒者多摘人之短而矜已之長此人實無所長王惑而信其言耳巧言六章章八句何人斯蘇公刺暴公也暴公為卿士而譖蘇公焉故蘇公作是詩以絶之箋曰暴也蘇也皆畿內國名疏曰左傳云昔周克商使諸侯撫封蘇忿生以溫為司冦則蘇國在溫春秋時蘇稱子此云公者蓋子爵而為三公也彼何人斯其心孔艱胡逝我梁箋曰逝之也梁魚梁也在蘇國之門外蘇氏曰梁橋也不入我門伊誰云從維暴之云暴公與其侣同見王而譖蘇公蘇公作詩首章未及譖事姑為優柔之辭以疑之言彼是何人乎薄之之辭也彼人之心艱險而難知何以言之我所居有魚梁彼人逝我魚梁而不過我是其心艱險而可疑矣既而問其所從則暴公也首章但言二人相從同見王而不見我其情可疑矣鄭氏以首章彼何人斯為指暴公之侣歐陽氏以首章彼何人斯為指暴公然下章云二人從行誰為此禍猶未有所指則首章不應便指其人也二人從行誰為此禍胡逝我梁不入唁我唁音彥始者不如今云不我可今曰不以我為可言不恱我也漢劉向傳上問楊興朝臣斷斷不可光祿勳何耶斷牛斤反忿疾之意光祿勳謂周堪次章方言已被譖也言二人同見王而不見我我固疑其艱險今我果被譖不知此二人之中誰實譖我乎猶未敢指定一人也然我與暴公為友我已得譴暴公當弔唁我何為亦逝我魚梁過我門而入不弔我乎暴公初焉與我厚不如今之薄也其不以我為可乎是可不能無疑於暴公矣彼何人斯胡逝我陳傳曰陳堂塗也孫炎曰堂下至門之徑解見陳防有鵲巢我聞其聲不見其身不愧於人不畏于天三章四章始責暴公彼何人斯皆薄之之辭也何故近我堂塗使我得聞女之聲音不得覩女之身乎是汝譖我其心有愧不欲見我也汝不愧于人不畏于天乎責之之辭也彼何人斯其為飄風飄如字從韻書本注音飄錢氏曰飄風暴起之風也今曰釋天云回風為飄郭璞注云旋風也毛於匪風詩引回風為飄又云飄風非有道之風旋風回旋無定故不自北不自南胡不自北胡不自南胡逝我梁祗攪我心祗攪音支狡箋曰祗適也傳曰攪亂也彼人如暴起之回風又不自北又不自南言無準也喻讒者之反覆不測也何為逝我魚梁不入我門適攪亂我心使我疑汝也爾之安行亦不遑舍爾之亟行亟音棘箋曰亟疾也遑脂爾車解見泉水一者之來云何其盱箋曰盱病也五章六章反覆委曲以情責之也汝之不來見我謂無暇耳我謂爾行之緩乎亦不見爾舍息固不可謂有暇也我謂爾行之急乎又間暇而脂其車不可謂無暇也依違言之謂未必全無暇也汝不遑舍則多出汝脂車則又將出因其出而一來見我又何害乎今屢出而不來見我是可疑矣爾還而入還音旋我心易也易音異還而不入否難知也一者之來俾我祗也祗音祁箋曰祗安也爾方往見王之時固未暇見我既見王而還若入見我則我心平易無疑矣爾還而不入見我則謂不譖我為難知也見王而還之時既不見我他時一來我心亦安然竟不一來安能使我無疑乎反覆委曲以責之故舊之情也伯氏吹塤音暄仲氏吹篪音池箋曰伯仲喻兄弟也傳曰土曰塤竹曰篪疏曰春官小師職作塤古今字異耳注云塤燒土為之大如鴈卵鄭司農云塤六孔釋樂云大塤謂之嘂音呌孫炎云音大如呌呼也郭璞云大如鵝子鋭上平底形似稱錘小者如雞子釋樂又云大篪謂之沂郭璞云篪以竹為之長尺四寸圍三寸一孔上出徑三分橫吹之小者尺二寸即引廣雅云八孔小師注鄭司農云篪七孔蓋不數其上出者故七也世本云暴辛公作塤蘇成公作篪譙周古史考云古有塤篪尚矣周幽王時暴辛公善塤蘇成公善篪世本之謬信如周言其云蘇公暴公所善亦未知所出及爾如貫箋曰如物之在繩索之貫也蘇氏曰如貫辨貫珠皆以繩結之諒不我知朱氏曰諒誠也出此三物傳曰三物豕犬雞也民不相信則盟詛之疏曰隱十一年左傳云鄭伯使卒出豭行出犬雞以詛射穎考叔者豭即豕也司盟云盟萬民之犯命者詛其不信者是不相信有盟詛之法也盟大而詛小皆殺牲插血告誓明神後若背違令神加其禍使民畏而不敢犯襄十一年左傳季武子將作三軍盟諸僖閎詛諸五父之衢定六年既逐陽虎及三桓盟於周社盟國人於毫社詛諸五父之衢豭音加俗作豭行音航父音甫以詛爾斯詛側助反六章乃直以義責之也我始與汝義同兄弟兄吹塤而弟吹篪言唱和以相應也勢相次比如物在繩索之貫言聨事合治也汝豈誠不我知而譖我汝若不譖我則出犬豕雞三物以盟詛要之於神可也蘇公之義直矣為鬼為蜮或域二音傳曰蜮短狐也疏曰洪範五行傳云蜮如鱉三足生於南越南越婦人多淫故其地多蜮淫女惑亂之氣所生也陸璣疏云一名射影江淮水皆有之人在岸上影見水中投人影則殺人故曰射影南人將入水先以瓦石投水中令水濁然後入或曰含沙射人皮肌其瘡如疥是也則不可得有靦面目靦音腆傳曰靦姡也姡音活疏曰孫炎云靦與姡皆面見人之貌也李氏曰後世用此句者以為愧恥非也視人罔極作此好歌以極反側疏曰反側者翻覆不正直之意末章峻辭責之不復含隱也言鬼無形而禍人蜮潛伏沙中射人之影汝若是鬼是蜮則我不得而見汝汝亦人耳靦然以面目與我相視無窮極汝之譖我何顔見我乎我與汝同僚有夙昔之好而汝反覆傾側如此故我作此歌以究極汝反側之情狀也暴公無所逃責矣何人斯八章章六句巷伯刺幽王也寺人傷於讒故作是詩也蘇氏曰巷伯即寺人是也曹氏曰周官寺人王之正內五人掌王之內人及女宫之戒令注云寺之言侍也正內路寢也侍王於路寢之內蓋奄人也巷永巷也內人之所居伯長也其官為寺人而職長永巷故寺人而稱巷伯焉萋兮斐兮萋音妻斐音匪傳曰萋斐文章相錯也曺氏曰萋如卉木萋止之萋斐如斐然成章之斐成是貝錦傳曰貝錦錦文也箋曰文如餘泉餘蚳之貝文也蚳音遲疏曰釋魚説貝文狀云餘蚳黃白文餘泉白黃文李巡云餘蚳貝甲黃為質白為文彩餘泉貝甲白為質黃為文彩陸璣云貝水蟲也其文彩之異大小之殊甚衆古者貨貝是也彼譖人者亦已大甚大音泰首章言讒人織成已罪也錦文如貝由萋兮斐兮錯雜衆采織而成之也甚之者言為禍痛深疾之之辭哆兮侈兮哆昌者反説文曰哆張口也蘇氏曰哆侈皆張也成是南箕傳曰南箕箕星也箋曰箕星踵狹而舌廣疏曰二十八宿有箕星無南箕故曰南箕即箕星也南箕解見大東彼譖人者誰適與謀箋曰適往也次章言所讒無實也箕東方之宿考星者多驗於南方故曰南箕箕星以哆然侈然其口張大而成其名耳錦之萋斐由人所織故以喻人織成已之罪箕星以其狀哆侈本非箕而得箕之名故以喻已之無事實而虛成其罪若曰錦織已成則實已為錦如已為有罪之人無可復言矣若箕星名為箕而實非箕不難辨也彼讒人者誰往就汝謀乎何為以虛名無實之事加於我乎舊説以錦箕作一體説錦無本質而為人所織箕是本狀哆侈非人為之取義不同也緝緝翩翩音篇傳曰緝緝口舌聲翩翩往來貌説文曰緝緝績也謀欲譖人慎爾言也謂爾不信三章四章述讒人情狀而戒之也接續增益緝緝然如女之績往來輕飄翩翩然如鳥之飛相與經營謀為讒譖而已爾讒人當謹慎其言無專飾虛為實虛言無實有時而敗露聽者將謂爾不足信矣捷捷幡幡音翻錢氏曰捷捷利口貌陳氏曰捷捷儇利貌幡幡反覆貌謀欲譖言豈不爾受既其女遷女音汝捷捷然儇利幡幡然反覆相與謀為讒譖上之人好聽讒豈不信受汝之言乎然汝能譖人人亦能譖汝其禍將遷及汝矣驕人好好今曰好好甚言其好也勞人草草曹氏曰草草苟活而言也蒼天蒼天視彼驕人矜此勞人五章訴之於天也譖人者得意而驕好而又好也被譖者失所而勞草草忽遽也無可奈何而訴之於天曰天其監彼驕人之大甚而矜閔此勞人之無辜乎彼譖人者誰適與謀朱氏曰甚嫉之故重言之也取彼譖人投畀豺虎説文曰豺狼屬狗聲豺虎不食投畀有北傳曰北方寒涼而不毛有北不受投畀有昊六章疾惡讒人也取彼讒人投棄之以與豺虎豺虎若不食當投棄之北方寒涼之地使凍殺之有北有北若不受當付與昊天制其罪言讒譖之人物所共惡唯昊天能治之必不容譖人使之得生以害人惡之必欲其死所謂惡惡如巷伯也楊園之道傳曰楊園園名猗于畝丘猗音倚傳曰猗加也畝丘丘名寺人孟子疏曰寺人字孟子作為此詩凡百君子敬而聽之末章警大臣言讒將及之楊園下地以况卑人畝丘髙地以况大臣欲陵畝丘則必道楊園言將譖大臣必始於卑人也王氏曰讒人罔極不獨譖已而已也必將上及大臣骨肉但先自已始也故曰凡百君子敬而聽之巷伯七章四章章四句一章五句一章八句一章六句詩緝卷二十一
