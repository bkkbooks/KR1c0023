body:
  text: 詩緝卷十二宋嚴粲撰秦國風譜曰秦者隴西谷名於禹貢近雍州鳥鼠山堯時有伯翳者實臯陶之子佐禹治水賜姓曰嬴歴夏商興衰亦世有人焉周孝王使其末孫非子養馬於汧渭之間封為附庸邑之於秦谷至曾孫秦仲宣王又命作大夫始有車馬禮樂侍御之好國人美之秦之變風始作秦仲之孫襄公平王之初興兵討西戎以救周平王東遷王城乃以岐豐之地賜之始列為諸侯遂有周西都宗周畿内八百里之地其封域在荆岐終南惇物之野至𤣥孫徳父又徙於雍云汧音牽疏曰秦今秦州也伯益伯翳聲轉字異猶一人也其後費昌當夏桀之時為湯御以敗桀中衍之後遂世有功以佐殷其𤣥孫曰中潏在西戎保西垂生蜚㢘蜚㢘生惡來惡來有力蜚㢘善走父子俱以材力事紂潏音聿西漢志曰天水隴西及安定北地上郡西河皆迫近戎狄修習戰備髙上氣力以射獵為生漢興六郡良家子選給羽林期門以材力為官名將多出焉朱氏曰岐豐之地文王用之以興二南之化如彼其忠且厚也秦人用之未幾而一變其俗見於詩者大扺尚氣槩先勇力已悍然有招八州而朝同列之氣矣葢雍州土厚水深其民重厚質直不為浮靡以善道之則易以興起以猛驅之則其彊毅果敢之資亦足以彊兵力農而成富彊之業也論至於此以見厚重彊直者之可與有為而又以見上之道民不可不謹其所之也魏唐堯舜禹之故都至是而風亦變則帝王風教中國禮義蕩然而夷狄乘之故次以秦中國將變於夷矣車鄰美秦仲也疏曰秦仲以字配國者附庸未得爵命無諡可稱秦仲始大補傳曰秦仲未為諸侯謂之始大葢視其先為大耳有車馬禮樂侍御之好焉曰秦仲詩宣王時秦反周之政者也秦興而帝王之影響盡矣車鄰其濫觴也世道興衰升降之機在是歟有車鄰鄰傳曰鄰鄰衆車聲曹氏曰宻比之意言車之衆今曰杜子美詩云車轔轔其字從車古字通有馬白顛傳曰白顛的顙也疏曰的白也顙額也額有白毛今之戴星馬也未見君子寺人之令平聲曰寺人閹官也疏曰齊有寺人貂晉有寺人披蘇氏曰凡此皆人君之常禮而秦之先君昔所未有也秦仲有車甚衆其車鄰鄰然宻比有馬甚多其中有白額之馬舉一以見其餘也是時又始有寺人閹官未見君子秦仲之時必先令寺人通之然後得見言侍御使令之備也秦前此所未有故詩人美其始有也阪有漆陂音反釋地曰可食者曰原陂者曰阪下者曰隰陂音坡釋曰三者地形雖有髙下不平皆可種榖給食陂陀不平而可食者名阪曹氏曰阪山脅也前地理志隴西有隴坻師古曰隴坻謂隴陂即今之隴山也此郡在隴之西故曰隴西三秦記云其陂九回不知髙幾許欲上者七日乃越髙處東望秦川然則阪固秦地所有也坻音底隰有栗釋地曰下濕曰隰漆栗解見定之方中既見君子竝坐鼓瑟解見關雎今者不樂音洛逝者其耋音迭傳曰耋老也八十曰耋疏曰離卦大耋之嗟注云年踰七十僖九年左傳伯舅耋老服䖍云七十曰耋耋有七十八十無正文也興也阪則有漆木隰則有栗木猶君國之有禮樂也士之既見此君子秦仲也則與之燕飲相樂竝坐而鼓瑟曰今者若不為樂則自此以往其將老矣言貴生前得意否則虚老嵗月耳此彊毅果敢之氣勇於有為已有安能邑邑以待數十百年之意矣秦之能彊者在此而周人之氣象變矣詩記曰既見君子竝坐鼓瑟簡易相親之俗也今日不樂逝者其耋悲壯感慨之氣也秦之彊以此而止於為秦者亦以此阪有桑隰有楊釋木曰楊蒲栁郭璞曰左傳所謂董澤之蒲釋曰楊一名蒲柳生澤中可為箭笴笴歌之上山隂陸氏曰楊今有黄白青赤四種白楊葉圓青楊葉長赤楊霜降則葉赤材理亦赤黄楊木性堅緻難長俗云嵗長一寸閏年倒長一寸易大過云枯楊生稊齊民要術云白楊性勁直堪為屋材寧折終不曲撓揄性懦軟乆無不曲緻音治既見君子並坐鼔簧曰笙之簧也解見鹿鳴今也不樂逝者其亡錢氏曰亡死也車鄰三章一章四句二章章六句駟驖美襄公也驖音鐵疏曰秦仲生莊公莊公生襄公始命句箋曰始命為諸侯也疏曰秦自非子以來世為附庸未得王命平王封襄公為諸侯賜之岐西之地有田狩之事園囿之樂焉疏曰有藩曰園有牆曰囿囿者域養禽獸之所曰秦襄公詩平王時平王以秦之救周而命之異時諸夏之憂反生於所救事之倚伏可預料邪是故禦戎以自治為上䇿駟驖孔阜傳曰驖驪也疏曰檀弓云夏后氏尚黒戎事乘驪則驪黒色驖者色黒如鐵朱氏曰阜肥大也六轡在手疏曰每馬兩轡四馬八轡兩驂之内轡納之於觖故在手者六轡耳觖音決公之媚子朱氏曰媚愛也從公于狩傳曰冬獵曰狩襄公駕四馬皆鐵色之驖甚肥大矣言馬之良也御者執六轡於手馬之遲速在我言御之良也公所親愛之人從公而往冬狩見便嬖足使令於前也馬之有轡所以制馬之出入使之隨人意也在手言把握其轡能制馬之遲速惟手之是聽也在如師之耳目在吾旗鼓之在舊説六轡在手而已不須控制之今不從奉時辰牡傳曰時是日辰時也冬獻狼夏獻麋春秋獻鹿豕羣獸疏曰皆天官獸人文獸之供食各有時節故謂之時牡辰牡孔碩公曰左之曰射必中左乃為中殺董氏曰五御三曰逐禽左自左膘而射之達于右腢為上殺膘音縹腢音愚詳見車攻舍拔則𫉬舍拔音捨跋傳曰拔矢末也箋曰括也疏曰以鏃為首故拔為末襄公田獵之時虞人奉此時節之牡獸驅以待公之發此時牡甚碩大矣公謂御者令左其車以射獸之左公舍放矢末則應弦而𫉬其獸曹氏曰所謂命中也遊于北園四馬既閑傳曰閑習也輶車鸞鑣輶有由二音鑣音標傳曰輶輕也箋曰輕車驅逆之車疏曰夏官田僕掌設驅逆之車注驅驅禽使前趨𫉬逆御還之使不出圍故知輕車即驅逆之車若君所乘則謂之田車鸞在衡和在軾謂乘車之鸞也此云鸞鑣則鸞在於鑣異於乘車也朱氏曰鸞鈴也效鸞鳥之聲今曰鑣馬䘖外鐵也載獫歇驕獫音聚斂之斂驕音枵傳曰獫田犬也補傳曰毛云長喙曰獫短喙曰歇驕今田犬長喙誠然短喙非田犬也爾雅攻歇驕皆從犬以合毛氏不若謂犬性驕逸以車載之所以歇其驕逸也朱氏曰韓愈畫記有騎擁田犬者亦此類田事已畢遊于北園四馬既調習而閑矣乃以驅逆之輕車置鸞鈴於馬䘖兩旁之鑣載田犬之獫歇其驕逸謂休其足力也田而𫉬𫉬而休常事也秦人美之者亦喜其見之新也駟驖三章章四句小戎美襄公也備其兵甲以討西戎西戎方彊而征伐不休國人則矜其車甲婦人能閔其君子焉曰秦襄公詩平王時李氏曰史記秦仲誅西戎西戎殺之宣王召其子莊公與兵七千人使伐西戎破之至殺幽王驪山下襄公將兵救周有功平王封襄公為諸侯十二年伐戎至岐而卒善乎蘇東坡有言云秦民好戰之心囂然而未已也是故不可與休息而至於亡夫為國家者豈可使其風俗有好戰之心哉觀后稷之稼穡則可以知周家卜世卜年之過其歴觀襄公之使民矜其車甲則可以知秦之傳祚二世而不及其期非一朝一夕之故其所由者有漸矣朱氏曰西戎方彊則征伐宜休矣而不休征伐不休則國人宜怨矣而不怨反為詩以美其上而聖人亦有取焉何哉西戎者秦之臣子不共戴天之讎也襄公上承天子之命以報君父之讎其所以不能自已者豈忮忿之私心哉乃人倫之正天理之發以大義驅其人而戰之敵之彊弱戰之勝負皆不暇有所顧而惟知仇讎之不可以不復此襄公所以能用其人而秦人所以樂為之用也聖人有取乎此亦春秋大復讎而與討賊之意歟小戎之詩鋪陳兵車器械之事津津然夸説不已以婦人閔其君子而猶有鼔勇之意其真秦風也哉小戎俴收俴音踐前之上濁傳曰小戎兵車也俴淺也收軫也疏曰軫車之前後兩端之横木也所以收斂所載故名收焉兵車言淺軫者對大車平地任載之車為淺也車當輿之内從前軫至後軫惟深四尺四寸大車前軫至後軫其深八尺兵車之軫比之為淺人之升車也自後登之入於車内故以深淺言之五楘梁輈楘音木輈音舟傳曰楘歴録也梁輈輈上句衡也録音禄句音鉤曰五楘者輈上五處以皮束之歴録然有文章也曰梁輈者輈轅如梁也輈者轅也衡者服馬之􅓶也轅直一木從後軫至前軫稍曲而上以便服馬之進􅅲至衡則駕於衡之上而嚮下句之衡居於輈下而輈形穹窿上曲如屋之梁謂之梁輈懼輈之不堅一輈之上五分其穹每處以皮革束之游環脅驅曰游環者以環貫驂馬之靷游移無定處所以止驂馬之外出也曰脅驅者以皮繫衡軫之兩端當服馬之脅所以止驂馬之内入也疏曰游環在服馬之背上驂馬欲出此環牽之脅驅以一條皮上繫於衡之兩端後繫於軫之兩端驂馬欲入則此皮約之隂靷鋈續靷羊晉反鋈音沃隂曰隂者隂夜也傳曰隂揜􅓶也箋曰揜􅓶在軾前今曰以板横側置車之前及左右三面以隂映車􅓶故為之隂也􅓶舊無音言在軾前當音犯字作􅓶解見匏有苦葉濟盈不濡軌靷曰隂靷者隂板之上繫驂馬之靷也傳曰靷所以引也疏曰靷以皮為之令驂馬引之車衡之長唯六尺六寸止容二服馬而已驂馬頸不當衡别為二靷以引車前繫驂馬之頸後繫於車前隂板之上此所謂靷也鋈續曰鋈者沃也續者靷端續靷之環也鋈續曰以白金灌沃續靷之環也傳曰鋈白金也續續靷也疏曰銷此白金以鋈灌靷環非訓鋈為白金也金銀銅鐵總名為金此兵車之飾或是白銅未必皆白金也靷言鋈續則作環相續文茵暢轂音谷文茵曰文茵者以虎皮為茵褥車中所坐也疏曰茵褥也以虎皮為之有文采也暢轂傳曰暢轂長轂也説文曰轂輻所湊也疏曰言長於大車之轂也今曰考功記輪人為輪注兵車之轂三尺二寸車人為車注大車轂徑尺有五寸駕我騏馵音其注騏傳曰騏騏文也疏曰色之青黑者名為綦馵釋畜曰馬後右足白驤左白馵疏曰謂後左足也言念君子曰婦人謂其夫也温其如玉在其板屋傳曰西戎板屋疏曰漢地理志云天水隴西山多林木民以板為屋秦之西垂民亦板屋此想君子伐得而居乏也亂我心曲錢氏曰心之委曲也國人夸其兵車之善言我兵車其收軫淺短也其輈轅穹窿上曲如屋之梁五節以皮束之楘謂歴録然有文章也驂馬欲出則有游移之環貫驂之外轡以止其出驂馬欲入則有皮為脅驅繫於衡軫以止其入也又於隂板之上繫驂馬之靷靷端作環相接謂之續以白金鋈灌之也其車中所坐有虎皮文章之茵褥也其貫車輪之轂又暢而長也又駕騏馬及馵馬也婦人言其君子以此車馬往伐西戎我念君子温然如玉今乃在西戎板屋之中思而不得見亂我心中之委曲也閨門之情若曰戰陣乃武勇者之事而我君子之温然恐其不堪勞苦序所謂閔也四牡孔阜朱氏駟驖解曰阜肥大也六轡在手在手解見駟驖騏駵是中駵音留箋曰赤身黒鬛曰駵疏曰釋畜有駵曰駁説者皆以駵為赤色若身鬛俱赤則為騂故為赤身黑鬛朱氏曰中兩服馬也騧驪是驂騧驪音𤓰离釋畜曰黑喙騧傳曰黄馬黑喙曰騧驪解見駟驖龍盾之合盾純之上傳曰畫龍於盾也合合而載之今曰盾干也以木為之畫龍於上曹氏曰夏官司兵掌五盾注云五盾干櫓之屬先儒以為干櫓伐皆盾也其大者謂之櫓中者謂之伐干盾亦其類也疏曰合而載之車上以為蔽也鋈以觼軜音決納疏曰驂馬内轡之末鋈金以為觼馬之有轡者所以制馬之左右令之隨逐人意驂馬欲入則偪於脅驅内轡不須牽挽故知軜者納驂内轡繫於軾前其繫之處以白金為觼也朱氏曰觼環之有舌者言念君子温其在邑朱氏曰西鄙之邑也方何為期朱氏曰方將也胡然我念之四牡之馬甚肥大矣言馬之良也六轡在手馬之遲速在我言御之良也騏與駵是其中之服馬也騧與驪是其外之驂馬也又以木為干盾畫龍於上合二盾而載之以為車之前蔽也又於軾前以白金鋈其觼環以納驂馬之内轡謂之觼軜也婦人言其君子以此車馬往伐西戎我念君子温然在西鄙之邑方將何以為歸期乎何為使我念之極也俴駟孔羣疏曰用淺薄之金以為駟馬之甲箋曰羣言和調也李氏曰不和則不得羣居厹矛鋈錞厹音求錞音隊傳曰厹矛三隅矛也錞鐏也鐏存之去聲徂寸反疏曰厹矛刃有三角曲禮云進戈者前其鐏後其刃進矛㦸者前其鐓是矛之下端當有鐓也彼注云鋭底曰鐏平底曰鐓言鐓鐏者取類相明非訓為鐏也錞鐓同蒙伐有苑曰蒙伐者畫蒙雜羽文以為干伐也傳曰蒙討羽也伐中干也苑文貌箋曰蒙厖也討雜也疏曰畫雜鳥之羽以為盾節夏官司兵掌五盾其名未盡聞也言辨其等則盾有大小襄十年左傳説狄虒彌建大車之輪而蒙之以甲以為櫓櫓是大盾故以伐為中干干伐皆盾之别名也虒音斯虎韔鏤膺韔音暢鏤音漏傳曰韔弓室也箋曰鏤刻金飾也補傳曰韔以虎皮為之而以金鏤飾其膺也膺胷也謂弓室之胷也爾雅金謂之鏤交韔二弓竹閉緄縢音衮滕傳曰閉紲也緄繩也縢約也紲音薛疏曰既夕禮説明器之弓云有柲注云柲弓檠也弛則縛之於弓裏以竹為之竹閉一名柲也紲繫也以繩繫之因名柲為紲所紲之事即緄縢是也謂以繩約弓然後納之韔中也朱氏曰檠弓體使正也言念君子載寢載興厭厭良人厭音淹傳曰厭厭安靜也秩秩徳音蘇氏曰秩秩有序也徳音解見假樂以淺薄之金為駟馬之甲欲其輕而便於馳逐孔羣則駟馬和調也又有三角刃之厹矛其下端平底曰錞以白金鋈之也又有中干曰伐盡䝉雜鳥羽以為飾苑然有文也又以虎皮為弓室謂之韔以金鏤弓室之胷也又交二弓於韔中顛倒安置之以備壊折也又以竹為弓檠謂之竹閉置弓於柲内以緄繩縢約之然後納之韔中也婦人言其君子以此兵甲往伐西戎我思君子之深既寢又興朝夕未嘗忘也厭厭然安靜之良人其徳音秩秩然有序何為親此勞苦之事乎亦閔之也傳以膺為馬帶疏釋之為鏤胷之鞶即鉤膺也然采芑鉤膺鞗革崧髙鉤膺濯濯韓奕鉤膺鏤錫上下文皆言車馬之飾則膺當為馬胷之帶此首言虎韔繼言鏤膺下文又言交韔二弓竹閉緄縢則皆言弓耳不得以此鏤膺為彼鉤膺也補傳義長小戎三章章十句蒹葭音兼加刺襄公也未能用周禮將無以固其國焉曰秦襄公詩平王時蘇氏曰蒹葭之方盛也蒼蒼其彊勁而不適於用至於白露凝戾為霜然後堅成可施用於人秦起於西垂與戎狄雜居本以彊兵富國為先襄公耕戰自力而不知以禮義終成之豈不蒼然盛哉然君子以為未成故其後世狃於利而不知義至商君厲之以法卒以此勝天下既勝之後二世而亡其數有以取之矣戾祭義為燥之義曹氏曰禮者國之幹也有禮則雖弱而猶存無禮則雖彊而必亡昔齊桓公欲取魯仲孫湫曰魯秉周禮周禮所以本也國將亡本必先顛而後枝葉從之魯不棄周禮未可動也其後景公患陳氏之偪問於晏子晏子曰惟禮可以己之君令臣恭父慈子孝兄愛弟敬夫和妻柔姑慈婦聽禮之善物也然則禮者豈直威儀文辭之末節而已哉葢有所謂辯上下而定民志者焉是以先王尚之為國者不可一日而忘也襄公乆處戎狄之中以戰爭為國今始命為諸侯土地益廣車甲日多而不知以禮漸變其俗其風聲氣習末流益甚專以詐力取勝終以㓕亡詩人識㣲所以刺焉湫子小反事見閔元年周弱而緜秦彊而顛由其禮之存亡異焉耳蒹葭蒼蒼曰蒹也葭也萑也三物共十一名蒹曰小者蒹薕荻也一物而三名也釋草云蒹薕釋云蒹一名薕郭璞云江東呼為薕荻似萑而細髙數尺陸璣云蒹水草也牛食之令牛肥彊山隂陸氏曰今人以為薕箔因此得名蒹萑之小者菼葦之小者葭曰大者葭蘆葦也又名華一物而四名也解見豳七月萑曰中者菼薍萑也又名鵻一物而四名也解見豳七月菼覃之上濁薍頑之去萑音完今曰此詩蒹葭舉小與大者言之豳風萑葦舉中與大者言之三物皆待霜凝戾而後可用三物共十一名説者多混而難考故辯之傳曰蒼蒼盛也白露為霜所謂伊人陳氏曰伊人斥襄公也在水一方朱氏曰一方彼一方也曹氏曰秦地在黄河之西言其僻處西河不與中國通其朝聘㑹盟孤陋而無與也遡洄從之遡洄音素回傳曰逆流而上曰遡洄道阻且長遡游從之傳曰順流而涉曰遡游宛在水中央箋曰宛坐見貌興也蒹葭雖蒼蒼然盛必待白露凝戾為霜然後堅實譬秦雖彊盛勁健必用周禮然後堅固也伊人指襄公也在水一方謂水中别一所在也喻襄公僻處一隅陷溺於夷狄之俗不聞中國之禮義也將使之逆流而上以往求攸濟歟則路險阻而且長逺喻其狃於功利以道為逺而難致必不能彊勉而行之也將使之順流以涉而聽其所止歟則宛然唯在水之中央喻由今之道無變今之俗終夷狄而已矣道本非逺而秦人以為逺所謂安能邑邑以待數百十年而為帝王也故詩人因秦人之意以道阻且長言之蒹葭淒淒音淒本亦作萋傳曰淒淒猶蒼蒼也白露未晞音希傳曰晞乾也所謂伊人在水之湄音眉釋水曰水草交為湄遡洄從之道阻且躋傳曰躋升也箋曰升者言其難至如升阪遡游從之宛在水中坻音遲傳曰坻小渚也釋水曰小沚曰坻疏曰傳以渚易知故繫渚言之甫田箋曰坻水中之髙地也白露未晞則未為霜也蒹葭雖淒淒然盛不適於用也蒹葭采采朱氏曰采采言其盛而可采也白露未已所謂伊人在水之涘音俟上濁曰涘厓也解見王葛藟遡洄從之道阻且右疏曰若正與相當行則易到今乃出其右是迂迴難至也其左亦迂迴右取韻耳遡游從之宛在水中沚音止傳曰小渚曰沚白露未已亦未為霜也蒹葭雖可采而不適於用也蒹葭三章章八句終南戒襄公也能取周地始為諸侯受顯服大夫美之故作是詩以戒勸之曰秦襄公詩平王時歐陽曰按史記平王封襄公為諸侯賜之以岐西之地襄公十二年伐戎至岐而卒子文公立十六年以兵伐戎戎敗走遂取周餘民而有之地至岐葢自戎侵奪岐豐周遂東遷雖以岐豐賜秦使自攻取而終襄公之世不能取之但嘗以一兵至岐至文公始逐戎而取岐豐之地朱氏曰襄公雖未能遽有周地然既有天子之命矣榖梁子云王者無外命之則成矣補傳曰周地雖有王命尚為戎有戒其無負天子之託而勸其必取也終南何有傳曰周之名山中南也疏曰昭四年左傳云荆山中南九州之險此一名中南也李氏曰終南西距鳳翔武功北距萬年長安有條有梅條傳曰條槄也槄音叨釋木曰槄山榎榎音假檟同郭璞曰今之山楸陸璣曰皮葉白色亦白宜為車板梅釋木曰梅柟柟音髯郭璞曰似杏實酢酢音醋酸也君子至止錦衣狐裘曰狐白裘也錦衣狐白裘諸侯在天子朝廷之服其歸在國則不服之疏曰白狐毛為裘其上加錦衣以為禓其上又加皮弁服也玉藻云君衣狐白裘錦衣以裼之注云君衣狐白毛之裘則以素錦為衣覆之使可裼也袒而有衣曰裼必覆之者裘䙝也詩云衣錦褧衣裳錦褧裳然則錦衣復有上衣明矣天子狐白之上衣皮弁服歟凡裼衣象裘色也是鄭以錦衣之上有皮弁服也正以錦文大著上有衣衣象裘裘是狐白則上亦白皮弁服以白布為之衣之白者惟皮弁服耳玉藻又云錦衣狐裘諸侯之服也諸侯與其臣服皮弁以視朔朝服以日視朝論語云素衣麑裘云素衣諸侯視朔之服諸侯在國視朔及受鄰國之聘其皮弁服皆服麑裘不服狐白此言裘為朝廷之服者謂諸侯在天子之朝廷服此服耳諸侯受天子之賜歸則服之以告廟而已於後不服之知視朔受聘服麑裘此美其受賜而歸故言錦衣狐裘顔如渥丹箋曰渥厚漬也今曰邶簡兮赫如渥赭其君也哉朱氏曰言容貌衣服稱其為君也賦也周都豐鎬面對終南故天保祝君斯干考室節南山刺師尹皆指此山也平王以岐西之地賜襄公岐西之地其名山莫如終南舉終南則可以該岐西北終南山其中何所有乎有條又有梅地有名山山多材木誇言雍州之為上􅃾隩區也以素錦為裼衣其下有狐白裘諸侯之服也顔如厚漬之丹容貌之盛也言岐西山髙木茂氣象葱鬱我襄公自受周命而歸其將被顯服正顔色儼然君臨於此土也哉其者將然之辭哉者疑而未定之辭天子賜之則為其有矣猶為疑之之辭未能取之也此所以戒勸之而勉其為必取之計也君哉舜也有歎美不盡之意與君王哉有諷諫不盡之意其君也哉有戒勸不盡之意前地理志終南在武功縣東張衡西京賦云於前則終南太一李善云終南南山之總名太一一山之别號耳是終南在長安之南也豐鎬在長安之西而近李善引説文云鎬在上林苑中故長樂劉氏云終南在鎬京之南也以其在南故云南山班固西都賦云表以太華終南之山太華雖髙而在東不若終南在前舉頭則見故周多以南山言之終南何有有紀有堂程子曰紀稜角堂平寛傳曰堂畢道平如堂也箋曰畢終南山之道名君子至止黻衣繡裳黻音弗傳曰黒與青謂之黻五色備謂之繡朱氏曰黻之狀亞兩已相戾也疏曰黻皆在裳衣大名言衣與裳異其文耳佩玉將將音鏘朱氏曰將將佩玉聲壽考不忘補傳曰戒之無忘乃勸之必取也終南有廉角處又有平寛處亦誇言其山之美也言此土地命服出於天子之賜襄公宜壽考而勿忘也亦勸戒之也説者多以山有草木為興有條有梅其説猶可通至紀堂則無説矣今考詩中凡一句各指一物者興也葢興則意在於物故每句中專指其一以寓丁寧之意如山有榛隰有苓之類是也凡一句疊言二物者皆賦也葢賦則敷陳其物之多意在有之一字而不在於所指之物故疊言之如有熊有羆但言獸之多有鱣有鮪但言魚之多有驪有黄但言馬之多别無興也此詩不泛説山而指終南正是平王所賜之地詩人之意在終南不在條梅紀堂也終南二章章六句黄鳥哀三良也國人刺穆公以人從死而作是詩也曰秦穆公詩襄王時疏曰穆公任好徳公之子於襄公為玄孫之子左傳文六年秦伯任好卒以子車氏之三子奄息仲行鍼虎為殉皆秦之良也國人哀之為之賦黄鳥殺人以葬環其左右曰殉不刺康公而刺穆公是穆公命從已死此人乃自殺從之任音壬朱氏曰春秋傳云秦穆公之不為盟主也宜哉死而棄民先王遺世猶貽之法而況奪之善人乎今縱無法以遺後嗣而又收其良以死難以在上矣君子是以知秦之不復東征也又按史記秦武公卒以人從死者六十六人至穆公遂用百七十七人而三良與焉葢特其初特出於戎翟之俗而無明王賢伯以討其罪於是習以為常則雖穆公之賢而不免論其事者亦徒閔三良之不幸而歎秦之衰至於王政不綱諸侯擅命殺人不忌至於如此則莫知其為非也嗚呼俗之敝也乆矣其後始皇之葬後宫皆令從死工匠生閉墓中尚何怪哉董氏曰陳乾昔魏顆從其治命不以為殉君子美之康公得無罪乎詩人方責穆公死而棄民故舉其重者乾音干東坡蘇氏和陶淵明三良詩曰此生泰山重忽作鴻毛遺三子死一言所死良已微賢哉晏平仲事君不以私我豈犬馬哉從君求葢帷殺身固有道大節要不虧君為社稷死我則同其歸顧命有治亂臣子得從違魏顆真孝愛三良安足希仕宦豈不榮有時纒憂悲所以靖節翁服此黔婁衣此秦夷狄之俗雖居我岐豐變於夷矣交交黄鳥李氏曰交交飛而往來之貌曹氏曰黄鳥聲音顔色之美人所愛悦猶三良為人之所愛也止于􅁄誰從穆公子車奄息車音居傳曰子車氏奄息名維此奄息百夫之特王氏曰特特出也臨其穴箋曰穴壙也惴惴其慄傳曰惴惴懼也箋曰慄悼也彼蒼者天殱我良人殱音尖徐音纎傳曰殱盡也今考莊十七年經書齊師殱于遂注云盡殺之也如可贖兮人百其身興也三良為國人所愛猶黄鳥然黄鳥交交然飛而往來止於􅁄木得其所也今良臣從死非其所也誰從穆公死乎有子車氏名奄息也此奄息乃百夫之中特出者而乃從死是可惜也秦人傷之臨其壙穴之上惴惴然恐懼而悼慄呼天而愬之曰盡殺我善人乎此奄息之死若可以他人贖代之則當以百人之身贖之言百人不如一賢也奄息為百夫之特故願以百身贖之朱氏曰三人死非其義詩人特哀之而已死不為義不足美也交交黄鳥止于桑誰從穆公子車仲行音航箋曰仲行字也疏曰傳以奄息為名仲行亦名維此仲行百夫之防曹氏曰言其壯勇可禦百夫之侮臨其穴惴惴其慄彼蒼者天殱我良人如可贖兮人百其身交交黄鳥止于楚誰從穆公子車鍼虎鍼音鈐疏曰鍼虎亦名維此鍼虎百夫之禦今曰禦猶防也臨其穴惴惴其慄彼蒼者天殱我良人如可贖兮人百其身黄鳥三章章十二句晨風刺康公也疏曰康公罃穆公任好子罃音鸎忘穆公之業始棄其賢臣焉曰秦康公詩襄王時康公本心既失無所不薄也觀此詩見棄而不忘君知其人之賢矣鴥彼晨風鴥音聿傳曰鴥疾飛貌釋鳥曰鸇晨風鸇音氈陸璣曰似鷂黄色燕頷句喙嚮風搖翅乃因風飛急疾擊鳩鴿燕雀食之句音鉤山隂陸氏曰列子云鷂之為鸇鸇之為布榖布榖乆復為鸇也禽經云好風好雨今鸇亦去來有時程子曰以晨風興君子者取其去來之疾鬱彼北林傳曰鬱積也北林林名也未見君子憂心欽欽如何如何忘我實多興也此穆公舊臣所作言晨風之鳥鴥然疾飛入于鬱積茂盛之北林喻已初慕秦國之盛大而趨赴之也今穆公死而康公立我舊臣廢棄不用不得親近進見拳拳之忠日望君之召已故言未見君子而憂心欽欽然不忘其敬也望之乆而杳然無聞故問之云如何乎如何乎復歎多是不記憶我矣言不復得見也此所謂予日望之而王莫予追也山有苞櫟音歴櫟柞櫟也橡斗也釋木曰櫟其實梂梂音求臼釋曰梂盛實之房也孫炎曰櫟實橡也陸璣曰秦人謂柞櫟為櫟河内人謂木蓼為櫟即橡斗也言有梂彚自裏椒榝之屬也其子房生為梂木蓼子亦房生故説者或曰木蓼也此秦詩宜從方士之言柞櫟是也東海及徐州謂之木蓮其葉始生食之味辛其梂子八月中成摶以為燭明如胡麻燭研以為羹肥如胡麻羹榝音殺今曰詩有二柞櫟唐鴇羽苞栩亦曰柞櫟其子曰皂斗與此相似苞解見唐鴇羽隰有六駮音剥疏曰郭璞引山海經云冇獸名駮如白馬黒尾鋸牙音如鼓食虎豹陸璣疏云駮馬梓榆也其木皮青白駮犖遙視似駮馬故謂之駮馬下章云山有苞棣隰有樹檖皆山隰之木相配不宜云獸王肅云言六㯫所見而言也未見君子憂心靡樂音洛如何如何忘我實多興也山有叢生之柞櫟隰有駮木其數六山隰有草木可以大國而無賢人乎山有苞棣傳曰棣唐棣也解見何彼穠矣隰有樹檖音遂釋木曰檖赤羅郭璞曰今楊檖也陸璣曰一名山梨實如梨但小而酸耳一名鹿梨一名鼠梨極有脆美者山隂陸氏曰其文細宻如羅故曰羅又有白者赤羅文􅁄白羅文緩雖皆文木赤羅為上未見君子憂心如醉今曰昏而不醒也如何如何忘我實多詩記曰秦之寡恩於晨風權輿二詩見之晨風三章章六句無衣刺用兵也秦人刺其君好攻戰好去聲亟用兵亟音器疏曰康公以文七年即位十八年卒按春秋文七年晉人秦人戰于令狐十年秦伯伐晉十二年晉人秦人戰于河曲十六年楚人秦人滅庸見於經傳者已如是是其好攻戰也令平聲而不與民同欲焉今曰秦康公詩頃王時朱氏曰襄公以王命攘戎狄報君父之讎故征伐不休而詩人美之康公令狐河曲之戰修私怨逞小忿故好攻戰亟用兵而詩人刺之今考康公唯初年令狐之役在襄王時辛丑魯文七襄三十二其後伐晉甲辰魯文十頃二戰河曲丙午魯文十二頃四皆頃王時此詩刺亟用兵則不在令狐初戰之時矣補圖列之襄王豈曰無衣與子同袍今曰子者行五相爾汝也傳曰袍襺也襺古顯反亦作繭疏曰玉藻云纊為襺緼為袍純用新緜名為襺雜用舊絮為袍王于興師六月箋曰于曰也修我戈予戈解見候人傳曰矛長二丈疏曰謂酋矛也夷矛長二丈四尺記又云攻國之兵用短守國之兵用長此言興師之用二丈之矛今曰不必專指為酋矛也與子同仇陳氏曰仇怨也秦人苦康公之亟用兵而述古以刺之謂古者戍役在行陳之間語其同事者曰吾君豈以汝無衣而與汝同袍乎然有王命以興師則修治戈矛與汝同其仇怨而不敢憚也謂不必遺衣以為惠而大義自不可違耳此述襄公之事也今康公非有王命而逞私忿豈衆心之所同哉豈曰無衣與子同澤箋曰澤䙝衣近汗垢朱氏曰澤裏衣也以其親膚近垢澤故謂之澤王于興師修我矛㦸箋曰㦸車㦸常也疏曰常長丈六與子偕作傳曰作起也豈曰無衣與子同裳王于興師修我甲兵與子偕行傳曰行往也無衣三章章五句渭陽康公念母也康公之母晉獻公之女文公遭麗姬之難麗音离難去聲未反而秦姬卒穆公納文公康公時為大子大音泰贈送文公于渭之陽念母之不見也我見舅氏如母存焉及其即位思而作是詩也曰秦康公詩襄王時范氏曰見舅而思其母此人之情也人能充是心則孝亦無不至矣若康公者未能充之也然其以是心而作是詩亦足以為孝矣念母者康公之良心也既而不能自克亟修晉怨此之謂失其本心我送舅氏釋親曰母之昆弟曰舅曰至渭陽箋曰秦是時都雍至渭陽者葢東行送舅氏於咸陽之北疏曰雍在渭南榖梁傳曰水北為陽何以贈之路車乘黄乘去聲董氏曰巾車金路以封同姓象路以封異姓革路以封四衛木路以封蕃國皆諸侯也故人君之車曰路車朱氏曰四馬皆黄也送舅涉渭至水之北送之逺也何以贈舅氏乎唯路車乘馬而已歉然猶以為薄意有餘也如采菽云雖無予之路車乘馬也見殷勤繾綣於舅而思母之意隠然於不言之中矣我送舅氏悠悠我思何以贈之瓊瑰玉佩瑰古回反傳曰瓊瑰玉次石疏曰瓊者玉之美名非玉名也瑰是美石之名也成十七年左傳聲伯夢或與己瓊瑰瓊解見衛木𤓰曹氏曰玉佩珩璜琚瑀之屬補傳曰以瓊瑰為佩也送舅而有所思則思母也此詩念母而不言母但言見舅而勤拳不已自有念母之意讀之者但覺其味悠然深長也瓊瑰玉佩雖贈之貴矣然未足以舒我心之思也渭陽二章章四句權輿刺康公也忘先君之舊臣與賢者有始而無終也曰秦康公詩襄王時由伐木而觀晨風權輿周秦氣象判然矣於我乎句夏屋渠渠傳曰夏大也蘇氏曰渠渠深廣也今也每食無餘于嗟乎句于音吁不承權輿傳曰承繼也釋詁曰權輿始也陳氏曰造衡自權始造車自輿始言康公其初之待我在渠渠然深廣之大屋其後待賢之意寖衰供億寖薄賢者毎食而無餘即飲食一節以見其待賢之意也衰非責其禮也於是歎之言不能承繼其始也朱氏曰楚王戊不設醴穆生去之曰豈為區區之禮哉於我乎句每食四簋疏曰簋是瓦器亦是木為之圓曰簋内方外圓也以盛黍稷方曰簠内圓外方也以貯稻粱皆容一斗二升公食大夫禮是國君與聘客禮食故宰夫設黍稷六簋今惟四簋葢謂之每食則燕食耳非禮食也今也每食不飽于嗟乎句不承權輿李氏曰不飽非特無餘矣見有始無終也權輿二章章五句詩緝卷十二
