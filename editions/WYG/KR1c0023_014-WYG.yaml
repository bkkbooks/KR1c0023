body:
  text: 詩緝卷十四宋嚴粲撰檜國風譜曰檜者古髙辛氏火正祝融之墟國在禹貢豫州外方之北滎波之南居溱洧之間祝融氏名黎其後八姓惟妘姓檜者處其地焉周夷王厲王之時檜公不務政事而好絜衣服大夫去之於是檜之變風始作其國北鄰於虢王肅云周武王封祝融之後於濟洛河潁之間爲檜子檜曹思周道疾亂也檜世次莫考詩不言何君曰夷厲之間者鄭譜也平王初鄭武始滅檜前乎平何以知其非幽也當幽之時仲爲檜君史伯云檜仲恃險言不刺仲也前乎幽又何以知其非宣也周道復興之時不得有匪風之思也非幽非宣夷厲當之矣羔裘大夫以道去其君也國小而迫君不用道好絜其衣服好去聲逍遥遊燕而不能自彊於政治故作是詩也按譜當夷厲之間諌不行言不聽則去爲臣之道也此大夫之去正爲其不能自畺於政治耳詩言衣裘之鮮絜所以形容其宴安無爲之意非以絜其衣服爲大故而去之也羔裘逍遥狐裘以朝音潮蘇氏曰狐白裘也今曰狐裘有白有青有黄玉藻云君衣狐白裘錦衣以楊之此狐白裘也玉藻又云君子狐青裘豹褎𤣥䌮衣以楊之此狐青裘也玉藻又云狐裘黄衣以禓之此狐黄裘也鄭氏以狐白之上加皮弁服天子以日視朝諸侯在天子之朝亦服之以黄衣狐裘爲大蜡之後作息民之祭則服之黄衣黄冠而祭息田夫也引此爲證以狐青爲臣下之服諸侯不服之玉藻稱君子狐青裘注以君子爲大夫士也此詩狐裘不指何色鄭氏以爲黄衣狐裘謂檜君以祭服而朝也蘇氏以爲狐白謂檜君以朝天子之服而聽其國之朝也二説不同狐青爲臣下之服非檜君所服檜君好絜其衣服亦必不服狐黄當從蘇氏以爲狐白然詩人之意不在此也褎與袖同蜡音乍亦作䄍豈不爾思勞心忉忉音刀齊甫田傳曰忉忉憂勞也羔裘孤白裘皆諸侯之服檜君服之非過也此大夫去之者謂檜國之微迫於大國之間將有危亡之禍爲檜君者當深思逺慮孜孜汲汲求所以爲自彊之計今乃服其羔裘逍遥暇豫服其狐裘以之視朝而已此外不能有所爲是偷安歲月坐而待亡也大夫諫而不聽故去之雖去國而不忘君故言我豈不思爾乎實思之而勞心忉忉也舊説緇衣羔裘諸侯之朝服也檜君乃服之以遊燕錦衣狐裘諸侯朝天子之服也檜君乃服之以聽其國之朝故大夫去之此非大惡其大夫何爲而遽去乎此大夫非以羔裘狐裘爲大故而以逍遥翺翔爲可憂也羔裘翺翔傳曰翺翔猶逍遥也狐裘在堂傳曰堂公堂也疏曰謂正寢之堂人君出視朝乃退適路寢以聽大夫所治之政豈不爾思我心憂傷服其狐裘塊然在堂而已不能有所爲也故憂傷之羔裘如膏音告今曰膏之也日出有曜豈不爾思中心是悼凡人憂勞戒懼則不暇鮮其衣禹惡衣文王卑服衛文大布之衣是也今檜君羔裘之色潤澤如以脂膏漬之日出照之則有光曜其衣服之鮮明如此其志慮凡近可見矣安其危而樂其亡故我心傷悼之也羔裘三章章四句素冠刺不能三年也范氏曰檜當夷厲之時已如此則孔子孟子之世可知也自夷厲之時上下相習而廢禮乆矣孔子存此序即他日所以告宰予者其關於人倫風教者大矣庶見素冠兮李氏曰毛以素冠爲練冠謂練布使熟其色益白是以謂之素三年之喪十有三月而練冠既練則衣亦練故曰素衣素韠也鄭衣素冠爲既祥素紕之冠謂經傳之言素者皆爲白絹未有以布爲者則知素冠非練也黒經白緯曰縞其冠用縞以素爲紕故謂之素冠也至於素衣則素裳也毛氏謂思見練服練是十三月之服未足以見其不能三年也不如鄭氏之説爲有據玉藻云縞冠素紕既祥之冠也注紕縁邊也既祥祭而服之喪服小記云除成喪者其祭也朝服縞冠注成成人也士冠禮主人𤣥冠朝服絹帶素韠鄭氏以素爲祥服皆木於禮本注紕音皮棘人欒欒兮欒音鸞傳曰棘急也欒欒瘠貌朱氏曰喪事欲其縱縱爾哀遽之狀音總勞心慱慱兮慱音團傳曰慱慱憂勞也素冠者縞冠素紕之冠也既祥祭則服之今不行三年之喪則無服此冠者故詩人云庶幸見服素冠者是棘急哀遽之人欒欒然瘠今無此人可見故我勞心慱慱然憂勞也庶見素衣兮箋曰除成喪者其祭也朝服縞冠朝服緇衣素裳然則此言素衣謂素裳也疏曰裳而言衣衣是大名曲禮云兩手摳衣謂摳裳我心傷悲兮聊與子同歸兮若得見服此素衣之人欲與子同歸愛慕之辭也庶見素韠兮韠音畢箋曰祥祭朝服素韠者韠從裳色朱氏曰韠蔽􅂰也以韋爲之冕服謂之韍其餘曰韠我心藴結兮藴音􅁢朱氏曰藴結者思之不解也聊與子如一兮三年之喪天下之通義人心之同然也與子同歸與子如一得我心之同然也素冠三章章三句隰有萇楚萇音長疾恣也國人疾其君之滛恣而思無情欲者也隰有萇楚釋草曰萇楚銚弋銚音遥郭璞曰今羊桃也陸璣曰一名銚弋葉如桃而光尖長而狹花紫赤色其枝莖弱過一尺引蔓于草上疏曰或云鬼桃猗儺其枝猗儺阿那之上聲疏曰猗儺枝條柔弱也夭之沃沃夭音妖沃音屋傳曰夭少也今曰厥草惟夭桃之夭夭皆少之意其葉沃若爲潤澤之意草木生意方盛則沃然潤渾樂子之無知樂音洛李氏曰樂記好惡無節於内知誘於外注知猶欲也興也萇楚始生猶能自立長尺以上則引蔓于草上故言隰有萇楚其枝條猗儺然柔弱牽蔓如人之既長多欲而可惡也囘思其夭少沃沃然生意方盛之時如人之少時無知欲而可愛也男女居室人之大倫非可絶也然不能以禮節之而至於肆情縱欲則不如少小無知之爲愈所以甚言滛恣之可疾也詩記曰生意沃沃此所謂赤子之心也此檜君未有知識末有室家之時也隰有萇楚猗儺其華夭之沃沃樂子之無家箋曰謂無室家之道今曰行露云誰謂女無家隰有萇楚猗儺其實夭之沃沃樂子之無室朱氏曰無室猶無家隰有萇楚三章章四句匪風思周道也國小政亂憂及禍難去聲而思周道焉詩記曰匪風下泉思周道之詩獨作於曹檜何也曰政出天子則彊不陵弱各得其所政出諸侯則徴發之煩供億之困侵伐之㬥唯小國偏受其害所以睠懷周宗爲獨切也戰國時房喜謂韓王曰大國惡有天子而小國利之以此二詩驗之其理益明賈誼欲衆建諸侯而少其力雖其言畧而不精亦可爲少知治體矣匪風思周而宣王中興天下謳吟思漢而光武再造其浹洽於人心者深矣匪風發兮錢氏曰發風大起也今曰俗呼大風爲風發陳氏曰迟烈也匪車偈兮偈音挈廣韻音桀傳曰掲疾驅也陳氏曰軒輊不定張子曰人之不安常如在風中車上顧瞻周道箋曰廻首曰顧朱氏曰周道適周之路也中心怛兮怛都逹反傳曰怛傷也此檜國之人憂及禍難言非風之大作也非車之疾驅也我廻首反顧昔日周道之盛心自傷怛也言生於亂世非風非車自如風中車上之不得安傷今而思古也晉王尼暮宿車上常歎曰滄海横流處處不安以車上不安喻世之亂也舊説匪風非有道之風匪車非有道之車今不從匪風飄兮飄音標本注符遥反又必摇反從又音匪車嘌兮嘌音漂批驕反朱氏曰嘌摇不安之貌顧瞻周道中心弔兮傳曰弔傷也今考釋天云扶摇謂之猋孫云廻風從下上曰猋郭云㬥風從下上此詩言風之㬥當音標與猋同音也釋天又云廻風爲飄與猋同音義别蓋廻風謂之飄其廻風自下而上則謂之猋誰能亨魚亨音烹傳曰烹魚煩則碎治民煩則散溉之釡鬵溉音槩鬵音尋傳曰溉滌也疏曰鬵是甑非釡類亨魚用釡不用甑雙舉者以其俱是食器故連言耳張子曰溉沃之使水多也氷寛則魚不壊政亦務寛錢氏曰亨魚者滌其釡鬵而巳無事煩碎誰將西歸箋曰檜在周之東故言西歸懷之好音陳氏曰懷安也今曰好音猶好語也治民若亨小鮮誰能亨魚而溉滌其釡鬵乎誰將西歸鎬京而安我以好音乎言唯周道平易人若歸之是好消息將有平治之望也匪風作於夷厲之時周猶都鎬故言西歸匪風三章章四句詩緝卷十四
