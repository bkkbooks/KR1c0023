body:
  text: 詩緝卷二十四宋嚴粲撰魚藻之什小雅魚藻音早刺幽王也言萬物失其性王居鎬京鎬豪之上濁將不能以自樂音洛故君子思古之武王焉此詩止刺幽王後序因詩有在鎬之文遂云思武王耳魚在在藻箋曰藻水草也長樂劉氏曰夏月之時淺水生藻補傳曰水必淺涸然後魚在藻間此乃魚窘迫之狀喻民處亂世其蹙迫恐懼亦若魚之在藻也藻解見采蘋有頒其首頒音焚傳曰頒大首貌補傳曰首大而尾長乃魚之瘠者王在在鎬今曰王幽王也豈樂飲酒豈樂音愷洛箋曰豈亦樂也興也水深則魚樂所謂躍淵縱壑相忘於江湖者也今魚何在乎淺水生藻而魚在焉露其頒然之大首猶言魚在于沼亦匪克樂喻民之窮蹙窘迫也幽王何在乎在鎬京豈樂而飲酒民安而後君安今民失其所而王獨樂其能乆乎孟子所謂雖有臺池鳥獸豈能獨樂哉魚在在藻有莘其尾莘音詵傳曰莘長貌王在在鎬飲酒樂豈潛魚願深渺今既露其首復驚逝而露其莘然之長尾葢在淺水之處故逃竄窘迫首尾俱見也魚在在藻依于其蒲補傳曰蒲生於岸始依此以匿其形耳王在在鎬有那其居那音儺箋曰那安貌藻猶在水之中蒲生近岸則水又淺矣愈更窘促也幽王在鎬安然以居不知危亡之將至也魚藻三章章四句采菽音叔刺幽王也侮慢諸侯諸侯來朝音潮不能錫命以禮數徴㑹之而無信義數音朔君子見微而思古焉䟽曰周本紀云褒姒不好笑幽王欲其笑萬方故不笑幽王為烽燧大鼓有㓂至則舉燧火諸侯悉至而無㓂褒姒乃大笑幽王欲恱之數舉烽火其後不信益不至幽王之廢申后去太子申侯怒乃與繒西夷犬戎共攻幽王幽王舉烽火徴兵兵莫至遂殺幽王驪山下繒音睛國名也采菽采菽箋曰菽大豆也采其葉以為藿菽解見小宛筐之筥之筐音匡筥音舉筐筥解見采蘋君子來朝何錫予之予音與雖無予之路車乘馬乘去聲䟽曰賜同姓以金路異姓象路解見韓弈又何予之𤣥衮及黼傳曰𤣥衮卷龍也白與黑謂之黼卷音捲箋曰𤣥衣而畫以卷龍也䟽曰龍首卷然謂之衮衮則畫之黼則刺之諸公之服自衮冕而下侯伯自鷩冕而下子男自毳冕而下司服注云九章初一曰龍次二曰山次三曰華蟲次四曰火次五曰宗彞皆畫以為繢次六曰藻次七曰粉米次八曰黼次九曰黻皆絺以為繡則衮之衣五章裳四章凡九也鷩畫以雉謂華蟲也其衣三章裳四章凡七也毳畫虎蜼謂宗彞也其衣三章裳二章凡五也絺衣粉米無畫也其衣一章裳二章凡三也𤣥冕者衣無文裳刺黻而已是以謂之𤣥焉鷩音鱉毳尺銳反蜼位柚壘三音朱氏曰黼如斧形刺之於裳也詩記曰上公之服九章𤣥者衣之色也衮者畫之於衣九章之第一章也黼者繡之於裳九章之第八章也𤣥衮及黼皆謂上公之服也王饗諸侯以太牢其鉶􅃵之芼牛則以藿藿菽豆之葉也言采菽葉而盛之筐筥知用太牢之盛禮以饗諸侯也饗則有車馬衣服之賜以為宥故言此諸侯之來朝也有何物以錫予之雖無以予之尚與之以路車及駟馬有車馬以賜之而言無予之葢其意猶以為薄也車馬之外又有何物予之又以𤣥衣畫龍之衮及刺斧之黼裳好之之意無已也衮黼上公之服舉尊者言之古者懐諸侯之道如此而今不然也觱沸檻泉觱沸音必弗檻銜之上濁傳曰觱沸泉出貌釋水曰檻泉正出正出湧出也李巡曰水泉從下上出曰湧泉言采其芹音勤箋曰周禮芹菹鴈醢釋草曰芹楚葵郭璞曰今水中芹菜山隂陸氏曰一名水英芹潔白而有節其氣芬芳而味不如蓴之美故列子以為客有獻芹者鄉豪取而嘗之蜇於口慘於腹也蜇音浙君子來朝言觀其旂其旂淠淠音譬徐音沸傳曰淠淠動也鸞聲嘒嘒音諱王氏曰嘒嘒言其聲之細聲之細則無敢馳驅故也載驂載駟驂七南反駟音四蘇氏曰既駕而三之曰驂四之曰駟君子所届長樂劉氏曰届至也觱沸然正出之檻泉我明王使人於此水中采其芹菜以為饗諸侯之菹也諸侯來朝之時觀其旌旂則淠淠然動其車馬鸞鈴之聲又嘒嘒然細言雍容中節也見其驂駟之馬是諸侯來朝而至也赤芾在股芾音弗股音古傳曰諸侯赤芾邪福赤芾詳解見曹候人朱芾解見采芑箋曰脛本曰股邪幅在下幅今音逼舊音福今考内則幅及桓二年左傳帶裳幅舄幅偪字異皆音逼箋曰邪幅如今行縢也幅束其脛自足至膝故曰在下䟽曰縢緘也言行而緘束之彼交匪紓朱氏曰交際也傳曰紓緩也天子所子樂只君子樂只音洛止天子命之樂只君子福禄申之諸侯來朝服其赤芾而在股又著邪幅偪束其脛而在下彼交際於天子恭敬齊遬不敢紓緩天子由是賜予之樂哉此諸侯天子之所錫命而福禄之所申重也維柞之枝柞音鑿曰柞櫟也即唐鴇羽所謂栩也解見鴇羽曹氏曰柞堅忍之木其新葉將生故葉乃落葢附著之甚固也其葉蓬蓬傳曰蓬蓬盛貌樂只君子殿天子之邦殿顛之去聲傳曰殿鎮也樂只君子萬福攸同解見蓼蕭平平左右平音駢傳曰平平辯治也䟽曰堯典平章百姓書傳作辯章則平辯義通朱氏曰左右諸侯之臣也亦是率從興也柞有枝枝有葉蓬蓬然盛葉以芘枝枝以衛榦枝葉相承而根本堅固喻諸侯及其臣上下相承以衛天子而國家乂安也故曰樂哉此諸侯能鎮天子之邦也樂哉此諸侯均受其福其左右之臣亦皆平平辯治相率以從王命也長樂劉氏曰氣脉者朝廷之寵命也葉之蓬蓬者根本氣脉之所及然葉之蓬蓬反以衛其根株而為之堅固猶天子寵錫諸侯俾之茂盛反能殿天子之邦而益朝延之固也汎汎楊舟紼纚維之紼縭音弗离傳曰紼繂也纚緌也繂音律䟽曰孫炎云繂大索也李巡云􅛢竹為索所以維持舟者􅛢亦作繂郭璞曰緌繋也樂只君子天子葵之葵音逵傳曰葵揆也䟽曰天子之於諸侯命賜有多少或以恩或以功當須揆度多少而與之樂只君子福禄膍之膍音毗傳曰膍厚也優哉游哉亦是戾矣傳曰戾至也興也楊舟浮於水上汎汎然無所定舟人以紼而纚維之喻諸侯離合不常天子以恩禮維持之也樂哉此諸侯天子能揆度其親踈隆殺之宜而錫予之序所謂錫命以禮也又厚之以福禄宜其優游自得而戾止於天子之庭矣何幽王之不然也左傳云王命諸侯名位不同禮亦異數如虢公晉侯朝王皆賜玉五㲄音角馬三疋君子以為非禮又以鞶鑑賜鄭遂失鄭伯之心皆是不能揆度其宜也事見莊十八年采菽五章章八句角弓父兄刺幽王也不親九族解見王葛藟而好䜛佞好去聲骨肉相怨䟽曰骨肉謂族親也以其父祖上世同禀血氣而生如骨肉之相附今曰西漢燕刺王旦傳云今王骨肉至親敵吾一體刺音辢故作是詩也詩記曰前漢書杜鄴云人情恩深者其養謹愛至者其求詳夫戚而不見殊孰能無怨此常棣角弓之詩所為作也此詩皆言王無恩於骨肉骨肉怨之欲王厚親親之恩以消平之也騂騂角弓騂息營反韻作觪傳曰騂騂調和也翩其反矣翩音篇朱氏曰翩反貌兄弟昬姻無胥逺矣箋曰胥相也興也騂騂然調利之角弓其體往來張之則内嚮而來弛之則外反而去喻親族親之則附踈之則離今王踈逺親族親族之心皆離猶弓之弛翩然而反矣王於兄弟同姓之親昬姻異姓之親不宜相踈逺如是也爾之逺矣民胥然矣今曰民猶人也指族人也詩書稱先民皆訓人箋曰胥皆也爾之教矣民胥傚矣爾幽王踈逺親族之人不以骨肉為念則親族之人亦皆自相踈逺矣由此爾實教之以偷薄故人皆視傚之也此令兄弟令去聲箋曰令善也綽綽有裕綽處若反裕音諭傳曰綽綽寛也裕饒也不令兄弟交相為瘉音愈傳曰瘉病也王無恩於親族親族之中有令善者固綽綽然寛裕不以介意其不善者則相與怨讟而為患矣民之無良箋曰良善也相怨一方朱氏曰彼一方也錢氏曰一方猶一隅也受爵不讓錢氏曰酒爵也至于已斯亡今曰失意杯酒之間以亡其身如漢田蚡灌夫是也坊記云觴酒豆肉讓而受惡民猶犯齒兄弟有因杯酒得罪而怨者此為持平之論以解之言凡人之不善者其相怨各執一偏不能參彼已之曲直故但知怨其上而不思已過然其端甚微或止因受爵失辭遜之節而或至於亡其身亦可念矣欲王闊略兄弟之小過也相怨一方即序所謂骨肉相怨也老馬反為駒解見漢廣不顧其後如食宜饇食音嗣饇於之去傳曰饇飽也如酌孔取兄弟小過䜛人乘間而入遂指老馬為駒顛倒是非不顧忌其後矣䜛言無實乆則自敗而小人不恤也小人肆為䜛間如食者但欲飽飲酌者但知多取豈復更有斟酌言不顧親踈輕重之義也毋教猱升木毋音無猱奴刀反箋曰毋禁辭陸璣曰猱獼猴也楚人謂之沐猴老者為􅙱長臂者為猿􅙱厥縳反音􅙱今曰柳子厚憎王孫文云猨之德静以常王孫之德躁以囂猱即王孫也杜詩覓胡孫是也如塗塗附傳曰塗泥也附著也君子有徽猷傳曰徽美也箋曰猷道也小人與屬音属箋曰連屬也䜛人為惡如獼猴升木本自能之無所事教王今又信任之是教獼猴升木也骨肉以小嫌得罪而又使䜛人交鬭之如塗泥又以塗泥附著之則相與為一牢不可破矣君子如用美道則小人皆連屬而相親况骨肉乎雨雪瀌瀌雨音諭瀌音標從韻䟽曰瀌瀌雪盛貌見晛曰消晛年之去傳曰晛日氣也莫肯下遺箋曰遺讀曰隨式居婁驕婁音屢今曰居如居之不疑之居解見下篇居以凶矜詩記曰屢驕猶所謂屢空言其驕之非一也王既信䜛則兄弟之間遂成疑忌如雨雪瀌瀌而盛隂氣凝積也雪雖盛纔見日氣則消融非難去也喻兄弟一見王有恩意則疑怨皆釋然矣柰王莫肯以恩下及骨肉數數驕慢居之不疑言無遷改也雨雪浮浮王氏曰積之高則浮浮見晛曰流傳曰流而去也如蠻如髦舊音毛當音謀傳曰蠻南蠻也䟽曰髦西夷之别名牧誓云及庸蜀羌髳微盧彭濮人彼髳此髦音義同我是用憂王親骨肉如夷狄然是無可囘之意我是用憂之也角弓八章章四句菀柳菀音鬱刺幽王也暴虐無親而刑罰不中去聲諸侯皆不欲朝音潮下同言王者之不可朝事也有菀者柳傳曰菀茂本也不尚息焉箋曰尚庶幾也上帝甚蹈音悼䟽曰王肅孫毓皆以上帝為斥王傳曰蹈動也曹氏曰躁動之貌無自暱焉傳曰暱近也俾予靖之歐陽氏曰靖安也後予極焉傳曰極至也興也諸侯之欲朝者言有同儕告之曰有菀然茂盛之柳行道之人豈不庶幾就之而止息乎猶王者有芘下之德諸侯豈不欲依歸之以求芘乎今王方肆暴虐甚躁動而不常無往暱近之以自取禍遂使我且安靖以待其改然後至周以朝葢教以避禍之計也上帝斥王也諸侯之欲朝者聞人言而遂止則皆不朝矣有菀者柳不尚愒焉愒音棄韻亦作憇傳曰愒息也上帝甚蹈無自瘵焉瘵音再鄭音際傳曰瘵病也俾予靖之後予邁焉李氏曰邁往也有鳥高飛亦傅于天傅音附鄭氏曰傅至也彼人之心補傳曰彼人乃諸侯自指其同列也于何其臻箋曰臻至也曷予靖之居以凶矜此諸侯見同儕教以避禍遂言鳥則能高飛至天不在人間彼亦人耳而教我不朝其心欲何所至乎歎人心無所繋屬其咎有在矣故又歎言爾何為使我靖以待之乎王方自居以凶暴驕矜不肯遷改也詩記曰於是乎絶意於王室矣居以凶矜即角弓所謂式居婁驕也傅說告高宗云惟厥攸居政事惟醇自古聖賢之論治亂毎言夫居也菀柳三章章六句都人士周人刺衣服無常也古者長民衣服不貳長音掌從容有常從七容反以齊其民則民德歸壹傷今不復見古人也復扶又反彼都人士朱氏曰王都也今曰士對女而言之謂男子也狐裘黄黄䟽曰禮記緇衣引此詩註云黄衣則狐裘大蜡之服也息民之祭服此狐裘則是尊貴之服矣詩記曰玉藻云君子狐青裘豹褏𤣥綃衣以裼之狐裘黄衣以裼之註云君子士大夫也黄衣大蜡時臘先祖之服也褏亦作袖綃音消其容不改出言有章朱氏曰章文章也行歸于周行去聲萬民所望音亡一章述古之長民者序所謂衣服不貳從容有常以齊其民也彼指古人稱彼以形此也京師首善之地四方所視傚此詩又周人所作故述王都之俗士謂男子也言古者都人之男子其貴者冬則衣狐裘黄黄然其容貌既有常言語又有法度文章其德行歸於忠信表裏如一故為下民所仰望而取法也士若專以為民則萬民所望非庶民之事若專以為士大夫則下章臺笠非士大夫之服故士者通貴賤之稱凡詩中以士對女者皆謂男子耳女也不爽士貳其行有依其士思媚其婦維士與女以穀我士女皆是也此都人士對君子女言之亦指男子彼都人士臺笠緇撮緇音資撮七活反曰臺莎草也解見南山有臺傳曰緇撮緇布冠也箋曰緇布冠儉且節也䟽曰撮是小持其髻而已玉藻云始冠緇布冠自諸侯以下達冠而敝之可也則此應始冠而敝之今都人以為常服者士以上冠而敝之庶人則雖得服委貌因而冠之而儉者服緇布故詩人舉而美焉彼君子女䟽曰都人有君子之德者其家之女綢直如髮綢音籌釋文曰綢繆也錢氏曰言其髮美解頥新語曰其首飾綢直一如髪之本然謂不用髪髢為高髻之類我不見兮我心不說音恱二章述王都之民俗序所謂民德歸壹也言古者都人之男子其賤者以臺草為笠以緇布為冠撮持其髪謂之緇撮見儉素也彼君子家之女其為髻密而直如其本髮亦儉素也密是其髪生之密直亦髪之本性緊梳則順其髪性之直故曰密直如髪疾時奢滛故我不見如此之風俗我心思之而憂也解頥新語曰説者以綢直如髪為女子情性密緻操行正直如髪之本末無隆殺頗為穿鑿且女子性情操行豈外人所能知下章卷髪如蠆髪則有旟則不能為説安有一詩三言髪而以一為比二為賦可乎彼都人士充耳琇實琇音秀解見衛淇彼君子女謂之尹吉鄭音姞毛如字箋曰尹氏姞氏周室昬姻之舊姓也䟽曰節南山云尹氏大師常武云王謂尹氏昭二十三年尹氏立王子朝是其世為公卿明與周室為昬姻也又宣三年左傳鄭右癸云吾聞姬姞耦其子孫必蕃姞吉人也后稷之元妃也言姬姞耦明為舊姓以此知尹亦有昬姻矣既世貴舊姓昬連於王室家風不替是有禮法矣朝如字李氏曰周之所謂尹吉如晉之所謂王謝也我不見兮我心苑結苑音允徐音鬱箋曰苑猶屈也積也瑱以琇為之塞實其耳此及下章皆指男子之貴者尹氏姞氏有禮法之家也人見此都人之女皆謂之尹姞氏之女也彼都人士埀帶而厲傳曰厲帶之埀者䟽曰埀帶之貌彼君子女卷髮如蠆卷音權蠆勑邁反釋文曰通俗文云長尾為蠆短尾為蝎箋曰蠆螫蟲也尾末揵然似婦人髪末曲上卷然螫音釋揵音牽舉也䟽曰禮歛髪無髢而有曲者以長者盡皆歛之不使有餘而短者若鬢傍不可歛則因曲以為飾故不同也我不見兮言從之邁箋曰邁行也男子之帶埀而為厲女之髪末卷曲如蠆之尾是不可得見也得見則我從之行邁也匪伊埀之箋曰伊辭也帶則有餘匪伊卷之髮則有旟音餘傳曰旟揚也我不見兮云何盱矣箋曰盱病也士非故欲埀此帶自有餘而埀也女非故欲卷曲此髮髮自旟揚也言古之為容者亦從其自然而非強之也我不見此人云何乎今已病矣都人士五章章六句采緑刺怨曠也幽王之時多怨曠者也李氏曰序云幽王之時多怨曠者也則是刺幽王也非是刺怨曠者也時多征役乆勞于外其所以怨曠也終朝采緑傳曰自旦及食時為終朝曰緑木賊也釋草曰菉王芻箋曰易得之菜也郭璞曰蓐也蓐音辱陸璣曰草也其莖葉似竹青緑色高數尺今淇澳傍生如草其草澀礪可以洗攪笏及盤枕利於刀錯俗呼為木賊彼士人謂為緑竹不盈一匊音菊傳曰兩手曰匊予髪曲局傳曰局卷也薄言歸沐李氏曰薄辭也興也緑易得之草終朝采之而不滿兩手之匊怨曠而心不在焉故也婦人夫不在家不為容飾髮乆不櫛則曲局而不舒展庶幾其夫之歸而沐之望之之辭也終朝采藍盧談反箋曰藍染草也䟽曰藍可以染青月令仲夏無刈藍以染不盈一襜尺瞻反傳曰襜衣蔽前也五日為期六日不詹音瞻朱氏曰詹與瞻同去時約以五日而歸今六日而不見時未乆而怨何也古者新昬三月不從政此新昬者之怨辭也之子于狩箋曰之子謂其君子也于往也言韔其弓韔音暢小戎傳曰韔弓室也䟽曰謂射訖弛弓納于韔中也之子于釣言綸之繩䟽曰綸謂與之作繩也繩以生絲為之言其夫在家之時往獵射訖我則為之納弓于韔中往釣我則為之綸作其繩今逺行從役乆而不歸思其如此而不可得也其釣維何䟽曰承上章釣文在下接而申之維魴及鱮魴音防鱮音叙魴解見陳衡門鱮解見敝笱維魴及鱮薄言觀者觀今如字舊音貫程子曰薄言發語辭言其君子在家之時釣得魴鱮之魚傍有觀看者以人觀其夫善釣為榮也今乆不歸故思而述之采緑四章章四句黍苗刺幽王也不能膏潤天下膏音誥卿士不能行召伯之職焉召音邵䟽曰召伯召穆公也芃芃黍苗芃音蓬芃芃從補傳棫樸解隂雨膏之悠悠南行朱氏曰悠悠逺行之意召伯勞之勞去聲首章總言營謝平淮二役葢營謝平淮二役皆南行之事也興也南方去周最逺故周人以南方之役為勞四月之刺是也宣王之時召穆公既營謝邑又平淮夷頻有事于南戍役勞矣而穆公能推宣王德意以慰藉撫存之故荐逺役而民不怨幽王君臣不恤其民此詩思古言芃芃然短小而盛之黍苖有隂雨以膏潤之悠悠然南行之人有召穆公以勞慰之刺今不然也我任我輦任音壬輦音璉箋曰有負任者有輓輦者䟽曰任謂器物人所負持輦車人輓以行我車我牛箋曰有將車者有牽傍牛者傍去聲䟽曰此轉運載任則是大車以駕牛者也在前曰牽在傍曰傍上文將車謂車中有牛而將之此牛不任轅中故别牽傍之我行既集箋曰集猶成也葢云歸哉丘氏曰葢不定辭也二章言營謝之役葢任輦車牛是工役之事也召穆公之營謝也知役夫之勞故皆呼而諭之曰我負任者我輓輦者我將車者我牽傍牛者俟我南行營謝之功已成葢云歸哉示以歸期安其心也我徒我御箋曰士卒有步行者有御兵車者我師我旅箋曰五百人為旅五旅為師春秋傳云諸侯之制君行師從卿行旅從我行既集葢云歸處三章言平淮之役葢徒御師旅是兵行之事也肅肅謝功箋曰肅肅嚴正之貌朱氏曰謝功謝邑之事也謝解見崧高召伯營之箋曰營治也烈烈征師箋曰烈烈威武貌召伯成之四章以下又總言營謝平淮二役肅肅然嚴整者謝邑之功實穆公營治之言營謝也烈烈然威武者征行之師實穆公成之言平淮也原隰既平傳曰土治曰平泉流既清傳曰水治曰清召伯有成王心則寧營謝有徹田土之事平淮有徹疆土之事皆相其原隰之宜通其水泉之利此功既成宣王之心則安寧矣黍苗五章音四句隰桑刺幽王也小人在位君予在野思見君子盡心以事之隰桑有阿䟽曰下濕曰隰桑宜在濕潤之所隰之近畔宜桑以今驗之實然也曹氏曰桑有衣被人之德傳曰阿美貌其葉有難音儺傳曰難然盛貌既見君子其樂如何樂音洛興也桑嘉木也可以為衣故南山有桑以喻賢者今桑之在隰枝條阿阿然而美其葉又難然而盛喻君子在野雖處窮約而英華發外也我若見此君子其樂如何哉樂君子如此見其惡小人深矣隰桑有阿其葉有沃長樂劉氏曰謂長茂光潤如膏之沃也既見君子云何不樂隰桑有阿其葉有幽如字傳曰幽黑色也䟽曰言桑葉茂盛而柔輭則其色純黑既見君子德音孔膠傳曰膠固也王氏曰其德音之所及人附離之甚膠固也心乎愛矣遐不謂矣箋曰遐逺也今曰謂相與語也中心藏之何日忘之心乎言由中也詩人言我出於中心愛此君子以君子逺在郊野不得相與語也凡懐人者满懐欲言思得一見而傾寫之也我藏之於心何日而忘之乎謂思慕君子常在念也舊説謂為思竭忠愛以裨補之賢者相與固有切磋忠告之益但此詩方思賢者以鄙在位之小人未暇言忠告之意隰桑四章章四句白華音花周人刺幽后也箋曰幽后褒姒也幽王取申女以為后取如字箋曰申姜姓之國也又得褒姒而黜申后褒姒解見正月故下國化之以妾為妻以孽代宗孽魚列反箋曰孽支庶也宗適子也䟽曰樹木斬而復生謂之孽以適子比根榦庶子比枝孽而王弗能治周人為之作是詩也為去聲箋曰王不能治已不正故也曹氏曰孽妾子謂伯服也褒姒所生宗適子謂宜臼也申后所生白華菅兮菅音姦傳曰白華野菅也已漚為菅郭璞曰菅茅屬陸璣曰似茅而滑澤無毛根下五寸中有自粉者柔韌宜為索韌音刃與肕同䟽曰野菅漚之謂之菅固謂在野未漚者為野菅白茅束兮之子之逺去聲箋曰之子刺幽王也俾我獨兮陳氏曰我申后也下同興也白華柔韌宜為索則刈取之漚以為菅白茅不可用則以纒束白華而已菅喻后茅喻妾以賤承貴宜也今幽王亂貴賤之序而逺我使我窮獨失所也周人代申后言之英英白雲傳曰英英雲貌露亦有雲䟽曰以今觀之有雲則無露無雲乃有露露亦有雲者露雲氣微不映日月不得如雨之雲耳非無雲也若露濃霧合則清旦為昬亦是露之雲也露彼菅茅天步艱難程子曰天步時運也之子不猶程子曰猶如也首章既以菅茅喻后妾次章言王之恩澤當均及之如白雲之覆露菅茅皆蒙潤澤也今天運艱難而幽王不如是也幽王不道而歸之天運謂已所遭之不幸耳滮池北流滮符彪皮流二反傳曰滮流貌箋曰豐鎬之間水北流䟽曰言其北流是目所覩豐在豐水西鎬在豐水東豐鎬之間唯豐水也今曰此止言池非指豐水也浸彼稻田嘯歌傷懐念彼碩人丘氏曰碩人謂幽王也池水滮然北流則止能浸彼在北之稻田耳喻幽王之澤有所偏也申后既黜嘯歌而至於傷懐以念王也鄭氏以碩人為褒姒詩記從丘氏以為幽王此詩皆代申后之言則嘯歌傷懐當為申后念王也下文言念子懆懆視我邁邁亦夫婦之辭也念與此念字同樵彼桑薪錢氏曰取薪曰樵卭烘于煁卭音昂烘火東反煁音諶傳曰卬我也烘燎也煁烓竈也烓音恚郭璞曰今之三隅竈也䟽曰烓者無釜之竈其上燃火謂之烘本為此竈止以燃火照物若今之火爐也維彼碩人實勞我心桑者人之所賴以衣不宜以為薪今樵取之以為薪又不以供㸑炊而乃烘燎于烓竈止以照物猶棄妻之失職故申后念王而心勞也鼓鐘于宫䟽曰鼓擊也聲聞于外聞音問念子懆懆音慘驂之上説文七倒反釋文曰懆懆愁不申也視我邁邁王氏曰邁邁然逺我而不顧也擊鼓于宫其聲則聞于外喻宫庭之事不可掩也我念王則懆懆而愁不申王視我則邁邁而不顧曹氏曰鼓鐘于宫雖人之所不見而聲聞于外不可掩也幽王之廢申后必加以難明之罪人之所不見者而其心本主欲立褒姒則外之所明聞也豈可掩哉有鶖在梁鶖音秋傳曰鶖秃鶖也山隂陸氏曰性貪慾狀如鶴而大長頸赤目其毛辟水毒頭高八尺善與人闘好㗖蛇劉楨魯都賦云緑鷁葱鶖鶖色葢青也䟽曰梁魚梁也有鶴在林維彼碩人實勞我心鶖似鶴而貪濁非鶴比也今鶖據魚梁而飽鶴逺引在林而饑喻褒姒進而申后黜王清濁無别矣我申后念王而心勞矣鴛鴦在梁戢其左翼解見鴛鴦之子無良二三其德鴛鴦在魚梁之上以右翼掩其左翼舉其雄者言之鴛鴦能好其匹之子無良不一其德鴛鴦之不如也有扁斯石扁音褊傳曰扁乘石貌王乘車履石蘇氏曰扁卑貌䟽曰隷僕云王行則洗乘石鄭司農云乘石所登上車之石也履之卑兮之子之逺俾我疷兮疷音抵傳曰疷病也有扁然而卑之乘石王履之以升車為用甚卑下喻妾之賤也顧欲貴之於人上可乎今之子逺我而進彼使我病也曹氏曰漢成帝欲用趙飛燕為后劉輔諫曰腐木不可以為柱卑人不可以為主白華八章章四句緜蠻微臣刺亂也箋曰微臣謂士也古者卿大夫出行士為末介大臣不用仁心遺忘微賤不肯飲食教載之飲食音䕃嗣故作是詩也緜蠻黄鳥傳曰緜蠻小鳥貌黄鳥解見葛覃止于丘阿傳曰丘阿曲阿也䟽曰丘之曲中道之云逺我勞如何飲之食之教之誨之命彼後車朱氏曰後車副車也謂之載之興也古者大臣出使于外士之微賤者為介紹此詩言緜蠻然小之黄鳥止於丘之曲而託息焉喻微臣依託於卿大夫也我微臣跋涉逺道其勞如此將如之何所望卿大夫能體恤飲食教誨車敗則命後車以載之乃今不然也緜蠻黄鳥止于丘隅箋曰丘隅丘角也豈敢憚行箋曰憚難也去聲今曰憚辭難也畏不能趨王氏曰趨疾行也飲之食之教之誨之命彼後車謂之載之緜蠻黄鳥止于丘側箋曰側旁也豈敢憚行畏不能極箋曰極至也飲之食之教之誨之命彼後車謂之載之緜蠻三章章八句􅉚葉􅉚音互大夫刺幽王也上棄禮而不能行雖有牲牢􅛰餼􅛰音邕字亦作饔餼音戲錢曰牛羊豕為牲繋養者曰牢熟曰饔腥曰餼生曰牽䟽曰牲可牽行餼是已殺不肯用也故思古之人不以微簿廢禮焉觀賔之初筵知幽王君臣沈湎滛液過於燕飲故此詩極言簡儉之意以刺之若曰誠苟在焉亨􅉚燔兎可以為禮何必酒池肉林長夜之飲乎葢欲収歛之非欲開廣之也後序謂幽王有牲牢􅛰餼而不肯用失之矣幡幡􅉚葉幡音翻傳曰幡幡􅉚葉貌采之亨之亨音烹箋曰亨熟也君子有酒酌言嘗之瓠葉新生幡幡然可采取之亨熟之君子有酒以此為菹與賔客酌而嘗之亦足以行禮何必縱情過度乎行禮不止於􅉚兎極言簡儉之意耳有兎斯首蘇氏曰有兎斯首言一兎也李氏曰兎以首言猶魚以尾言也炮之燔之炮音庖燔音煩傳曰毛曰炮䟽曰地官封人云毛炮之豚注云爓去其毛而炮之傳直言炮當是合毛而炮之爓似鹽反曹氏曰新殺則合毛而炮之錢氏曰凡肉置火中曰炮爇之曰燔近火曰炙炮燔解見楚茨君子有酒酌言獻之蘇氏曰獻主人酌賔也有此一兎雖非盛饌然或置火中而炮之或加置火上而燔之君子有酒以此為殽酌以獻賔亦足以行禮有兎斯首燔之炙之炙音隻炙解見楚茨君子有酒酌言酢之傳曰酢報也箋曰酢者賔既卒爵洗而酌主人也有兎斯首燔之炮之君子有酒酌言醻之醻音讎傳曰醻道飲也䟽曰醻者欲以醻賔而先自飲以道之此舉醻之初其賔飲訖進酒於賔乃謂之醻也􅉚葉四章章四句漸漸之石漸音䜛下國刺幽王也戎狄叛之荆舒不至箋曰荆謂楚也舒舒鳩舒鄝舒庸之屬鄝音了䟽曰殷武云維汝荆楚已并言之是楚之稱荆亦已久矣傳有舒鳩舒鄝舒庸又有舒龍謂之羣舒乃命將率東征率衰之去役乆病於外故作是詩也漸漸之石傳曰漸漸山石高峻維其高矣山川悠逺維其勞矣武人東征箋曰武人謂將帥也不皇朝矣朝音潮言過漸漸然險峻之山石維其高大矣又歴山川之悠遠維其勞苦矣我武人東征乆處于外不得朝見天子雖在勞苦之地不忘君也漸漸之石維其卒矣卒鄭音崒在律反毛子恤反箋曰卒崔嵬也解見十月之交彼卒作崒山川悠逺曷其没矣傳曰没盡也武人東征不皇出矣言所登歴何時可盡徧也深入險阻之地恐不得復出也有豕白蹢音的傳曰豕豬也蹢蹄也釋獸曰四蹢皆白􅘻􅘻音孩胡來反䟽曰駭者躁疾之言白蹢名之為􅘻是躁疾於餘豕駭與􅘻字異義同烝涉波矣箋曰烝衆也錢氏曰豕涉波見道路之間多有停潦月離于畢䟽曰離歴也俾滂沱矣武人東征不皇它矣它音他豕性負塗常時雖白蹢者亦汚於塗不見其白今武人行役見豕白蹢而羣然涉水是乆雨而停潦多故豕蹢濯其塗而見白也停潦尚多雨歇未乆而月離于畢則又將雨矣厭苦多雨之辭也征役者以雨為苦言不皇它及惟雨是憂耳漸漸之石三章章六句苕之華苕音條華音花大夫閔時也幽王之時西戎東夷交侵中國師旅並起因之以饑饉君子閔周室之將亡傷已逢之故作是詩也陳氏曰此詩其辭簡其情哀周室將亡不可救矣詩人傷之而已苕之華曰此苕陵苕也非陳防有鵲巢所謂旨苕也釋草曰苕陵苕黄華蔈白華茇蔈音標茇蒲末反舍人曰黄葉名蔈白華名茇陸璣曰一名鼠尾生下濕水中七八月中葉紫似今紫草葉可染皁煑以沐髪即黒䟽曰如釋草之文則苕華本自有黄有白而箋云陵苕之華紫赤而繁葢就紫色之中有黄紫白紫耳及其將落則全變而黄芸其黄矣芸音云傳曰苕將落則黄心之憂矣維其傷矣興也陵苕之華將落則芸然其黄言如周室之將亡黯然憔悴也我心所憂者傷周室之將亡也苕之華其葉青青音菁知我如此不如無生華已盡落唯葉青青然知我所遇之世如此不如不生之愈也牂羊墳首牂音莊墳音汾傳曰牂牝羊也墳大也三星在罶音柳箋曰三星心星也罶解見魚麗人可以食鮮可以飽鮮上聲言物産蕃息者多舉牝言之凡牝獸胎孕則腹大而見而首小今牝羊大首則是其身瘠而不孕也笱中有魚則水動而不見星今心之三星見於魚笱之中是設笱而不得魚也亂亡之代地愛其寳物産凋耗氣象蕭條故人僅可以食而少有得飽者召南小星三五在東傳以三為心唐綢繆三星在天傳以為參此詩三星無傳綢繆言昬姻之候故毛取十月參見東方三星之大而易見者莫如心此當為心也苕之華三章章四句何草不黄下國刺幽王也四夷交侵中國背叛背音佩用兵不息視民如禽獸君子憂之故作是詩也何草不黄箋曰自歲始草生而出至歲晚矣何日不行何人不將鵲巢傳曰將送也經營四方自初春草青行役至秋無草不黄宜可休息矣今乃無一日不行役無一人不將送於道路以經營四方勞苦之甚無人不將指行役之衆也何草不𤣥長樂劉氏曰草之黄者又黑腐何人不矜音關箋曰無妻曰矜哀我征夫獨為匪民至冬則草之黄者又變而黑腐矣從役者乆不得歸故謂之矜哀我征夫豈非民乎若以民視之則不虐之如禽獸矣匪兕匪虎兕詞之上濁解見卷耳率彼曠野䟽曰率循也傳曰曠空也哀我征夫朝夕不暇承上章匪民言征夫非兕非虎何以使循曠野而朝夕不得閒暇也有芃者狐芃音蓬丘氏曰毛尾長貌率彼幽草有棧之車棧殘之上濁今曰春官巾車云士乘棧車庶人乘役車注棧車不革輓而漆之役車方箱可載任器以共役傳以為此有棧之車役車也䟽曰毛義以為此棧是車狀其説不分曉不若徑以為士之棧車也行彼周道狐則芃然毛尾長循彼幽草之中人非禽獸今士乘棧車行於周之道路與禽獸同非特民也何草不黄四章章四句詩緝卷二十四
