body:
  text: 詩緝卷十五宋嚴粲撰曹國風譜曰曹者禹貢兖州陶丘之北地名周武王既定天下封弟叔振鐸於曹今濟隂定陶是也其封域在雷夏荷澤之野昔堯嘗遊成陽死而葬焉舜漁於雷澤民俗始化其遺風厚重多君子務稼穡薄衣食以致蓄積夾於魯衛之間又寡於患難末時富而無教乃更驕侈十一作世當周惠王時政衰昭公好奢而任小人曹之變風始蜉蝣音浮由刺奢也昭公國小而迫疏曰昭公班僖公夷子無法以自守陳氏曰有法則儉無法則奢好奢而任小人好去聲陳氏曰儉則寡欲寡欲則小人無所投奢則多欲多欲則小人得以中其欲而自售小人得志則其國家必有危亡之禍而彼致禍之人亦且立而觀之耳因而挻之耳孰與圖其難而共其憂哉李氏曰小人事君必逄君以奢侈君既奢侈驕恣則舉國將惟我所爲此小人之志也是以好奢者其所任必小人補傳曰蜉蝣之詩不及小人序諸詩者以其將無依知其所用皆小人故不足恃將無所依焉曰曹昭公詩惠王時奢則國必弊大猶不堪況小而迫乎刺奢而言衣裳楚楚舉一端耳蜉蝣之羽范光曰蜉蝣糞中蝎蟲釋蟲曰蜉蝣渠畧郭璞曰似蛣蜣身狹而長有角黄黑色叢生糞土中朝生暮死豬好噉之蛣音詰陸璣曰大如指長三四寸甲下有翅能飛夏日隂雨時地中出今人燒炙噉之美於蟬也衣裳楚楚傳曰楚楚鮮明貌今曰楚楚猶今言濟楚也賓之初筵言籩豆有楚同心之憂矣於我歸處音杵詩記曰葢欲如楚􅇗尹申亥舍靈王於家之爲也興也蜉蝣小蟲雖其羽鮮明而朝生夕死不乆也猶昭公小國之君雖整飾其衣裳楚楚然鮮明而迫於大國亦不能乆也我心憂其然若其危亡而無所依其於我歸處乎見當時在位無一可倚仗者蓋慘然以亡國爲憂矣補傳曰不必言小人意自見於言外也蜉蝣之翼采采衣服程子曰采采華飾也心之憂矣於我歸息蜉蝣掘閲疏曰此蟲土裏化生掘地而出今曰更閲謂升騰變化也麻衣如雪箋曰麻衣深衣也疏曰諸侯之禮夕深衣傳曰如雪言鮮潔心之憂矣於我歸説歸税箋曰舍息也蜉蝣三章章四句候人刺近小人也共公逺君子而好近小人焉共音恭逺去聲疏曰共公襄昭公班子今曰曹其公詩襄王時彼候人兮傳曰候人道路送迎賓客者疏曰夏官候人上士六人下士十有二人徒百有二十人身何戈祋謂候人之屬非候人之官長也何戈與祋何河之上濁祋音對傳曰何掲也疏曰掲擔掲也詩記曰曲禮疏云戈鉤矛㦸也如㦸而横安刃但頭不嚮上爲鉤也直刃長八寸横刃長六寸接柄處長四寸並廣二寸冬官戈柲六尺有六寸註柲猶柄也柲音祕傳曰祋殳也殳音殊殳解見衛伯兮彼其之子其音記三百赤芾音弗今曰芾字當作韍古字通也蔽膝之韍從韋黼黻之黻從黹采菽箋曰芾太古蔽膝之象也冕服謂之芾其他服謂之韠以韋爲之采菽箋曰古者佃漁而食因衣其皮先之蔽前後之蔽後後王易之以布帛而猶存其蔽前者重古道不忘本也士服爵弁以韎韐配之則服毛者以芾配之故知冕服謂之芾芾韠俱是蔽膝之象其制則同但尊祭服異其名耳傳曰一命緼芾黝珩再命赤芾黝珩三命赤芾葱珩大夫以上赤芾乗軒緼音温赤黄之色黝音酉黑色疏曰玉藻説韠之制云下廣二尺上廣一尺長三尺其頸五寸肩革帶博二寸芾之形制亦同於韠别言之則祭服謂之芾他服謂之韠一命至葱珩皆玉藻文彼賢人爲候人之屬掌道路送迎賓客何掲其戈與祋供勞賤之事彼小人乃有三百人皆服赤色之芾何爲者也曹蕞爾國而小人衆多如此君子何所容乎晉文公入曹數之以不用僖負羈而乘軒者三百人詩即史也事見左傳僖二十八年李子曰一小人用事猶不可况於三百乎維鵜在梁鵜音題郭璞曰鵜鶘也好羣飛沈水食魚故名洿澤俗呼之爲淘河鶘音胡陸璣曰鵜形似鶚而大其鳴自呼喙長尺餘直而廣口中正赤頷下胡大如數升囊若小澤中有魚便羣共抒水滿其胡而棄之令水竭盡魚在陸地乃共食之故曰淘河喙虚穢反山隂陸氏曰魚不畏鵜鶘不濡其翼彼其之子不稱其服稱去聲興也鵜鶘當入水中食魚今乃在魚梁之上竊人之魚以食未嘗濡濕其翼如小人居髙位竊禄不稱其服也維鵜在梁不濡其咮音晝傳曰咮喙也彼其之子不遂其媾溝之去曹氏曰遂終也今曰屯封匪宼婚媾言好合也補傳曰小人見利而爭先利盡而交疎赤芾三百小人以利合者暫焉耳豈能終遂其好合哉必自相攻也薈兮蔚兮薈煨之去蔚音畏程子曰薈蔚草木鬰茂之狀南山朝隮曹氏曰隮升也婉兮孌兮傳曰婉少貌孌好貌季女斯饑薈然蔚然草木盛多樵者朝升於南山之上而采之婉孌然少好季女不妄從人幽居而饑喻小人肆志趨利於上君子守道而困窮於下也候人四章章四句鳲鳩鳲音尸刺不壹也在位無君子用心之不壹也今曰曹共公詩襄王時鳲鳩在桑曰鳲鳩布榖也即郯子所謂鳲鳩氏司空也鳲鳩平均故爲司空平水土釋鳥曰鳲鳩鴶鵴音吉菊亦作秸鞠秸音戛郭璞曰今布榖也江東呼穫榖方言云戴勝陸璣曰一名擊榖一名桑鳩仲春鷹所化爲鳩也或謂之題肩齊人謂之擊正山隂陸氏曰一名摶黍江東呼爲郭公馮衍逐婦書云口如布榖言其多聲也李氏曰今乃鴝鵒也舊説凡十一名李氏與舊説異姑兼存之其子七兮今曰但謂鳲鳩於其子使之各得養無使偏而已不必以爲朝從上而下暮從下而上也淑人君子其儀一兮其儀一兮心如結兮興也鳲鳩養子平均如一喻古人用心之一也蓋善人君子其儀有常而專一由其心如物之結言堅固也此詩以鳲鳩均養起興刺爲政之不均而言威儀帶弁何也蓋夫人容貌服飾之間皆可以覘其心之所存其心平則見於起居動作之間皆有常度曾子所貴乎道者三皆以驗其中之所養非徒曰容貌顔色辭氣而巳也都人士衣服不貳從容有常以齊其民與此詩之意同鳲鳩在桑其子在梅淑人君子其帶伊絲其帶伊絲箋曰伊絲謂大帶也大帶用素絲有雜色飾馬其弁伊騏音其傳曰弁皮弁也騏騏文也疏曰知此是皮弁者周以韋弁以即戎冠弁以從禽弁絰又是弔凶之事且不得與絲帶相配唯皮弁是視朝之常服馬之青黒色謂之騏此字從馬則弁色如騏馬之文也絰音迭鳲鳩常在桑其子或飛在梅或飛在棘或飛在榛子無常處而母不離於桑以有常待之也其帶以絲爲之其弁則有騏文有常服也蘇氏曰從其在梅則失其在棘從其在棘則失其在榛是故居一以待之而無不及者李氏曰若也母無常處則其子不知所在其服有常見其心之一鳲鳩在桑其子在棘曰棘酸棗也解見邶凱風淑人君子其儀不忒朱氏曰差忒也其儀不忒正是四國其心一故其儀不差忒可以正四方之國矣鳲鳩在桑其子在榛榛解見邶簡兮淑人君子正是國人正是國人胡不萬年四方之逺猶且觀而象之況國人乎思古人不可復見曰何不使之萬年壽考乎鳲鳩四章章六句下泉思治也曹人疾共公侵刻下民不得其所憂而思明王賢伯也今曰曹共公詩襄王時詩言田萊多荒以見民之不得其所序推原其故以爲其君侵刻之所致也鄭褰裳思大國之見正蓋齊桓未霸也鄭忽出奔在魯桓十一年歲在庚辰齊桓始霸在魯莊十五年歲在壬寅曹共之時晉文霸業方盛襄王命之爲侯伯下泉顧思明王賢伯何邪曹固可罪而文於曹虐矣執其君分其田以私憾故觀駢脅事見僖二十三年將甘心焉僅以貨免文寜能帖曹乎下泉愧木𤓰矣詩記曰程氏易剥上九傳曰諸陽消剥已盡獨有上九一爻尚存如碩大之果不見食將有復生之理上九亦變則純隂矣然陽無可盡之理變於上則生於下無間可容息也隂道極盛之時其亂可知亂極則自當思治故衆心願戴於君子君子得輿也詩匪風下泉所以居變風之終也陳氏曰亂極而不治變柩而不正則天理滅矣聖人於變風之極則繫之以思治之詩以示循環之理以言亂之可治變之可正也詩記曰匪風下泉皆思周道之詩然匪風作於東遷之前此一時也下泉作於齊桓之後此又一時也洌彼下泉洌音列今曰列旁三㸃者從水也清也潔也旁二㸃者從冰也寒也易井冽寒泉食爲潔當從水此洌彼下泉及大東有洌氿泉傳皆訓寒則當從冰今字乃從水當爲凊也與大東有冽氿泉異也傳曰下泉食爲潔當從水浸彼苞稂郎梁二音王氏曰苞叢生也傳曰稂童梁也疏曰禾之秀而不實者曹氏曰田業多荒可知愾我寤歎愾音慨箋曰愾歎息之意也念彼周京泉源深逺則流清今洌然而清者是下流之泉也泉流自上而下可以及物宜其灌良苗也今其所浸乃叢生之稂稂莠之盛見田野荒蕪民不得其所也曹人愾然寤覺而歎思念周京厭亂而思治也匪風思周而宣王中興下泉思周而周不復興無其人也洌彼下泉浸彼苞蕭曰蕭香蒿也牛尾蒿也解見蓼蕭愾我寤歎念彼京周疏曰周京與京周京師一也因異章而變文耳苞蕭苞蓍言田􅅕之間野草叢密也洌彼下泉浸彼苞蓍音尸朱氏曰蓍筮草也陸璣曰似蘋蕭青色科生愾我寤歎念彼京師芃芃黍苗隂雨膏之膏音告四國有王郇伯勞之郇音荀勞去聲傳曰郇伯郇侯也疏曰邭侯爲伯也左傳富辰稱畢原酆郇文之昭也知郇伯是文王之子也嫌是伯爵故言郇伯郇侯也今曰毛以爲二大伯鄭以爲牧下二伯孔以爲大伯唯有周召無郇侯者當從鄭也田野荒蕪所見惟稂莠蕭蓍之類因思周之盛時五榖熟而風雨時芃芃然盛之黍苗得隂雨以膏澤之四國既有明王又得郇侯爲伯以勞來之傷今不復見也下泉四章章四句詩緝卷十五
