body:
  text: 詩緝卷三十六宋嚴粲撰商頌譜曰商者契所封之地至湯則受命武王封㣲子啟為宋公其封域在禹貢徐州泗濵西及豫州盟豬之野自從政衰散亡商之禮樂七世至戴公時當宣王大夫正考父者校商之名頌十二篇於周太師以那為首歸以祀其先王孔子録詩之時則得五篇而已乃列之以備三頌盟音孟朱氏曰太史公云宋襄脩仁行義欲為盟主其大夫正考父美之故追道契湯髙宗之所以興作商頌盖本韓詩之説諸儒多惑之者今考此頌皆天子之事非宋所冇且其辭古奥亦不類周世之文而國語閔馬父之言亦與今序合韓詩太史公之説謬矣張子云商頌之辭粹曹氏曰契為堯司徒敷五敎賜姓子氏封之於商今上雒商是也在漢屬𢎞農郡十四世而至湯凡八遷都湯始居商丘後徙居亳從先王居蓋帝嚳嘗都之也自湯十九世而至盤庚其間又復五遷盤庚始居河北其後遷河南復居亳之殷地即湯之故都也後世或稱商或稱殷或兼稱殷商先儒謂商有三亳二在梁國一在河洛之間故榖熟為南亳湯所都也䝉為北亳亦曰景亳湯所受命也偃師為西亳所謂河洛之間盤庚所遷也按九域志云今南京有亳城古景亳也本帝嚳之墟湯從都之有髙辛城有帝嚳髙辛氏廟有湯廟有伊尹冢南京去亳三十里則北亳其是歟其後武王伐紂成王黜殷殺武庚封㣲子於宋以主殷祀宋即商丘唐火正閼伯之墟契孫相土因之湯亦嘗居焉後雖遷都於亳而商丘寔為湯後且合於契初受封之號故稱商云解頥新語曰或者謂周成王始封熊繹於荆至周惠王之時魯僖公元年始有楚號遂疑商時未有荆楚乃欲假此以實韓氏宋襄公之説殊不思荆自帝嚳九州已有荆州之名至禹貢分别山川則荆及衡陽為荆州乃在南即荆楚也荆岐既旅至于荆山乃在西盖雍州之荆非荆州之荆也詩人以有二荆故以荆楚别荆岐耳既自古有荆孰謂周封熊繹始有荆哉那乃河反祀成湯也㣲子至于戴公䟽曰凡十君除二及餘八君是㣲子之後七世至戴公也其間禮樂廢壊箋曰禮樂廢壊者君怠慢於為政不脩祭祀朝聘養賢待賔之事有司忘其禮之儀制樂師失其聲之曲折由是散亡也有正考甫者䟽曰孔子七世之祖得商頌十二篇於周之大師大音㤗譜曰周用六代之樂故得有商頌以那為首疏曰祀成湯之樂歌也大師先以那為首矣猗與那與猗音伊與音余潜箋曰猗與歎美之辭猶言美哉也傳曰那多也今曰桑扈受福不那置我鞉鼓置如字鄭作植鞉音桃朱氏曰置陳也商人尚聲臭味未成滌蕩其聲樂三闋然後迎牲即此是也傳曰鞉鼓樂之所成也疏曰王制云天子賜諸侯樂則以柷将之賜伯子男樂則以鞉将之注云柷鞉皆所以節樂是樂成亦由鞉也曹氏曰置則方設之而已既設而奏之春官小師掌敎鞉柷敔塤簫管弦歌又眡瞭凡樂事播鞉擊頌磬笙磬皆以鞉為先鄭康成注大射禮云賔至則摇鞉以奏樂故天子賜伯子男樂則以鞉将之是以商人亦首奏焉頌如字奏鼓簡簡箋曰簡簡和大也今曰執競降福簡簡衎我烈祖衎看之去聲傳曰衎樂也箋曰烈祖湯也疏曰湯是殷家有功烈之祖湯孫奏假音格毛如字歐陽氏曰湯孫斥主祀之時王爾自太甲以下至紂皆可湯孫不知所斥者何王爾今曰傳謂湯為人子孫今不從朱氏曰假感格也綏我思成箋曰綏安也安我心所思而成之謂神明來格也禮記云齊之日思其居處思其笑語思其志意思其所樂思其所嗜齊三日乃見其所為齊者祭之日入室僾然必有見乎其位周旋出户肅然必有聞乎其容聲出户而聽愾然必有聞乎其嘆息之聲此之謂思成齊音齋僾音愛鞉鼓淵淵王氏曰淵淵深也深以言其聞之逺嘒嘒管聲嘒音諱朱氏曰嘒嘒清亮也王氏曰細也既和且平依我磬聲傳曰依倚也王氏曰殷尚聲箋曰磬玉磬也與玉磬之聲相依玉磬尊故異言之疏曰磬非樂之主而云依磬聲明此異於常磬非石磬也書云戞擊鳴球謂玉磬也朱氏曰玉磬堂上升歌之樂也張子云玉磬聲之最和平者可以養心也其聲一定始終如一無隆殺也盖鞉鼓管籥作於堂下其聲依堂上玉磬之聲於赫湯孫於音烏歐陽氏曰於赫湯孫者謂於赫湯之孫也不應自稱盛美之孫以誇其先祖穆穆厥聲箋曰穆穆美也疏曰穆穆然而美者共樂之音聲庸鼓有斁庸如字依作鏞斁音亦傳曰大鐘曰庸斁斁然盛也解見靈臺箋曰斁斁然有次序萬舞有奕音亦萬舞解見邶簡兮今曰毛鄭以奕為閑習王氏以為綴兆衆大今從王奕解見車攻我有嘉客箋曰嘉客謂二王後及諸侯來助祭者亦不夷懌今曰夷平也懌恱也自古在昔錢氏曰自古謂古已後也在昔謂今已前也先民有作温恭朝夕執事有恪傳曰恪敬也顧予烝嘗疏曰秋嘗冬湯孫之将蘇氏曰将奉也曹氏曰自古在昔先民有作者先王有作於前也顧予湯孫也商人尚聲故猗與那與歎而多之美其設此鞉鼓也鞉雖小鼓所以節樂故首言之既設此鼓而後奏之簡簡然其聲和大以衎樂有功烈之祖成湯也時王湯孫奏樂以感格于祖考祭祀則思其祖考若神不來格則所思不遂今神明來格是安我所思而成之也其鞉鼓之聲淵淵然深其管聲嘒嘒然清亮皆和平不相奪倫又依此玉磬之聲也歎美此赫赫成湯之孫其作樂祭祀之時其聲穆穆然美鏞與鼓斁斁然盛為萬舞者奕奕衆大二王之後及諸侯來助祭者亦不平夷悦懌乎先民猶言前人也作承上文謂作樂也言聲樂之盛非今日始作之乃古昔之時前人所作也謂湯之功大人聞其樂而恱懌其來乆矣今温恭於朝夕之間執事必敬以省眡烝嘗之祭者乃湯孫之所将奉也謂湯之澤無窮故子孫世世奉祀焉那一章二十二句烈祖祀中宗也箋曰中宗殷王大戊湯之𤣥孫也有桑穀之異懼而脩德殷道復興故表顯之號為中宗疏曰祀中宗之樂歌也禮王者祖有功宗有德不毁其廟嗟嗟烈祖補傳曰言烈祖而云嗟嗟以簡朴故也若周頌則言於穆於皇乃近於文矣箋曰功烈之祖成湯今曰那衎我烈祖亦成湯有秩斯祜音户傳曰秩常也蘇氏曰秩秩無窮之福箋曰祜福也申錫無疆傳曰申重也及爾斯所箋曰及女之此所女中宗也言承湯之業能興之也朱氏曰斯所猶言此處也今曰及猶與也猶生甫及申之及既載清酤音户傳曰酤酒也賚我思成傳曰賚賜也思成解見那亦有和羮箋曰和羮者五味調腥熟得節疏曰昭二十年左傳晏子云和如羹焉水火醯醢鹽梅以烹魚肉燀之以薪宰夫和之齊之以味濟其不及以洩其過君子食之以平其心君臣亦然故曰亦有和羮既戒既平燀闡展二音齊音劑又如字曹氏曰鉶羮也詩故曰祭之物備矣其曰和羮則合衆味而成者惟羮為然既戒既平朱氏曰戒宿戒也平平和也詩記曰儀禮載祭祀燕享者毎始言羮定盖以羮熟為節然後行禮定即戒平之謂也此所謂既載清酤亦有和羮皆言祭之始也鬷假無言鬷音椶假鄭音格毛如字傳曰鬷總也箋曰假至也今曰𤣥鳥四海來假時靡有爭綏我眉壽黄耉無疆約軧錯衡軧音祁解見采芑八鸞鶬鶬音鏘箋曰鸞在鑣四馬則八鸞鶬鶬聲和也八鸞解見采芑䟽曰鄭於秦風駟鐵之箋云置鸞於鑣異於乗車禮記云鸞在衡則鄭以乗車之鸞必在衡而此云鸞在鑣者以鸞之所在經無正文而殷周或異故從舊説以為在鑣以示不敢質也以假以享我受命溥将蘇氏曰溥且大也歐陽氏曰我時王受天命溥将自天降康箋曰下平安之福豐年穰穰如羊反執競傳曰穰穰衆也疏曰穰穰毎物豐多也朱氏曰天降以豐年黍稷之多使得以祭也來假來饗歐陽氏曰上云以享者謂諸侯來助致享於神也下云來饗者謂神來至而歆饗也降福無疆顧予烝嘗湯孫之将疏曰中宗之饗此祭由湯之功故本言之雖中宗之子孫亦是湯逺孫故亦得言湯孫也嗟乎我烈祖成湯有秩秩之常福以申錫後人之無窮也時祀中宗故以此所指中宗故及爾中宗者謂湯創之中宗興之商祚乆長皆湯及爾中宗為之故以中宗配創造所以大中宗之功也今我祀中宗之時既載清酒於樽以酌獻故神明賜我所思而成之謂其來格也亦有和羮其事既戒謹而不茍其味既和平而適宜執事之臣總至而無譁又不交侵其職位以有紛爭所以神明安我以眉壽黄耉之福也諸侯來助祭者其車以皮纒約其軧又有文錯之衡其八鸞之聲鶬鶬然和以此格神以此獻神我時王受天命廣大天降以康安之福使豐年黍稷之多穰穰然也年豐則民安故以年豐為降康亦謂之康年也以格神而神來格以享神而神來饗降以無窮之福也今省顧烝嘗之祭無所不致其謹者乃湯孫之所将奉辭與那頌同而意各有所主那美湯此詩美中宗謂湯之子孫世世奉烝嘗之祭者以中宗中興之功也烈祖一章二十二句𤣥鳥祀髙宗也箋曰髙宗殷王武丁中宗𤣥孫之孫也有鳴雉之異又懼而脩德殷道復興故亦表顯之號為髙宗云䟽曰祀髙宗之樂歌也此詩祀髙宗而先述祖德謂其能中興不墜先烈也天命𤣥鳥傳曰𤣥鳥鳦也鳦音乙李氏日燕也其色黑故謂之𤣥鳥降而生商傳曰春分𤣥鳥降湯之先祖有娀氏女簡狄祈于郊禖而生契故本其為天所命以𤣥鳥至而生焉箋曰契有功封商䟽曰記其祈福之時美其得天之命故言天命𤣥鳥使下生商也𤣥鳥之來非從天至而謂之降者重之若自天來然宅殷土芒芒箋曰湯始居亳之殷地而受命國日益以廣大疏曰殷是亳地之小别傳曰芒芒大貌古帝命武湯箋曰有威武之徳者成湯正域彼四方今曰以四方為疆域方命厥后鮮于氏曰隨其所在之方而命羣后也朱氏曰方命厥后四方諸侯無不受命也奄有九有傳曰九有九州也箋曰覆有九州為之主也商之先后疏曰先后成湯也受命不殆疏曰殆危也在武丁孫子傳曰武丁髙宗也疏曰毛以為湯受天命所以不至危殆者在武丁善為人之孫子也武丁孫子武王靡不勝毛音升鄭音去聲疏曰毛以為武丁善為人之孫子行其武德之王道無所不勝任之也龍旂十乘去聲龍旂解見出車箋曰十乘者二王後八州之大國疏曰八州大國謂州牧也大糦是承糦音熾箋曰糦黍稷也李氏曰武丁中興諸侯莫不助祭于京師邦畿千里傳曰畿疆也維民所止曽氏曰人於其所歸赴則止焉商之盛時邦畿千里民所歸之也肇域彼四海疏曰肇當訓為始王肅云殷道衰四夷來侵至髙宗然後始復以四海為境域也朱氏曰言王畿之内民之所止不過千里而其封域則極乎四海之廣也四海來假音格箋曰假至也來假祁祁箋曰祁祁衆多也景員維河員毛音圓鄭音云傳曰景大也員均也朱氏曰河商所都如盤庚民不肯涉河以遷即此河也景員維河則以諸侯輻湊而至于河也殷受命咸宜百禄是何河之上濁傳曰何任也箋曰謂擔負天之多福契母簡狄於春分𤣥鳥至之日祈于髙禖而生契故推本言之謂殷之興非人所能為也乃天命此𤣥鳥使下而生此商國契封於商其後因之以為一代有天下之號言生商謂生契也契封於商而商因以興是生契所以生商也其後子孫遂居亳之殷地國土芒芒然廣大謂湯也始居亳殷也古者上帝命其威武之湯令其正域於四方謂以四方為界域天下一統也湯承帝之命乃隨其方以施命令於諸侯遂覆有九州即所謂域彼四方也以四方為界域則九州在其中矣天命湯以四方為域湯能命其諸侯而奄有九有成天意也先后即成湯成湯之興天實命之其後中微天命幾危矣武丁能振起之故言成湯所受天命不至於危殆者在武丁能為人之孫子盡繼述之義也又言武丁所以能為人之孫子者以有威武之王徳無所不勝任故當時諸侯服從皆來助祭有建龍旂者十乗於祭之時有大黍稷之食諸侯奉承而進之也十乘舉諸侯之尊者言之謂二王後及八州之牧也邦畿之内地方千里維是民之所安止也言民志定也湯本以四方為域今言始以四海為域者殷道中微侯國有畔者故疆土非先王之舊至髙宗中興始復之也京師諸夏之根本王畿之内人心安定則四海之大皆在統理之内故四海皆來朝覲其至也祁祁然而多河都有廣大均平之象諸侯輻湊則京師氣象盛大於是總美殷家前後相承受天之命無有不宜能負何天之百福謂成湯至髙宗也或以武丁孫子為武丁之孫子然子孫祀其先王而夸言已之武徳義未為安况武丁之後無顯王乎今考自湯至盤庚五遷湯遷亳仲丁遷囂河亶甲居相祖乙遷耿盤庚又遷亳亳囂皆在河南相耿皆在河北自盤庚之後傳三世至武丁又傳四世至庚丁凡八世皆居亳庚丁之子武乙始去亳徙河北此詩所言河正指亳也亳有三蒙為北亳榖熟為南亳偃師為西亳湯自南亳遷西亳盤庚所遷即西亳偃師是也𤣥鳥一章二十二句長發大禘也禘音第疏曰大禘之樂歌也王氏曰雝序以為禘大祖周無四時之禘故也今曰大禘則商有四時之禘故也四時之禘為小則禘其祖之所自出為大横渠張氏曰禘其祖之所自出則禘嚳吕氏曰古者天子諸侯三年䘮畢皆合先祖之神而享之以生時有慶集之懽死應備合食之禮故時祭之外復為禘祫也虞夏商皆以間歲為之周則五年而再盛祭濬哲維商濬音峻傳曰濬深也李氏曰猶書所謂濬哲文明也惟其徳之深故不溺於褊淺惟其徳之明故不至於昏塞商之先世皆有深智之徳長發其祥箋曰長猶乆也乆發見其禎祥矣洪水芒芒傳曰洪大也禹敷下土吕氏書說曰禹先分布九州之土地規畫既定然後用工方外大國是疆傳曰諸夏為外疏曰對京師為外也疆謂弼成五服之時也詩言商興所由止須言契而已乃述禹敷下上者以契禹俱事帝堯皆有大功故将欲論契先言洪水也幅隕既長幅音福隕音圓徐音雲傳曰幅廣也隕均也疏曰幅如布帛之廣也禹平治水土中國既廣平且長也有娀方将娀音菘傳曰有娀契母也将大也疏曰有娀契母之姓婦人以姓為字箋曰禹敷下土之時有娀氏之國亦始廣大帝立子生商今曰子女也大明大邦有子疏曰天為之生立其子而使之生商謂天上祐契使賢而生有商國也有深濬明哲之徳者維我商家也乆發見其興王之祥矣時未興王其祥先見也蓋自洪水芒芒禹分布下土而治之其方外諸夏之大國皆畫其疆界各正其守使中國廣大均平而且長逺當此之時契母有娀氏之國方大而天為之立其子簡狄使之生商商者一代有天下之號生商謂生契也契封於商而商因以興是生契所以生商也此非祥之乆發見乎𤣥王桓撥傳曰𤣥王契也撥治也疏曰國語云𤣥王勤商十四世而興𤣥王為契明矣國語又云我先王后稷又曰我先王不窋是其為王之祖非追號為王也歐陽氏曰書稱格王寧王盖古人往往以美稱加王爾𤣥者深微之謂也老氏言𤣥之又𤣥是矣不必為黑也蘇氏曰桓武也受小國是逹受大國是逹王氏曰受小國是逹受大國是逹者隨所受大小能逹其道也逹與在邦必逹同意率履不越王氏曰循行無所踰也錢氏曰不越於道遂視既發相土烈烈相去聲傳曰相上契孫也烈烈威也海外有截箋曰截整齊也相土居夏后之世承契之業入為王官之伯出長諸侯其威武之盛烈烈然疏曰相土止為一國之君而已不得威行海外今云海外有截故知入為王官之伯出長諸侯也僖四年左傳管仲說太公為王官之伯云五侯九伯汝實征之以夾輔周室是王官之伯分主東西得征其所職之方分主東西則威加一靣而已而云四海者不知所主何方故緫舉四海言之截然整齊謂守其所職不敢内侵外畔也王肅云相土在夏為司馬之職掌征伐也說春秋者亦以太公為司馬之官與鄭異𤣥王尊契之稱𤣥者稱其徳之深微也契桓武而能撥治受小國大國皆能逹其道無徃不宜循行於道無所踰越從容中道也斯民遂視傚之而發發矣契之孫相土入為王官之伯出長諸侯其威武之盛烈烈然海外率服截然整齊帝命不違蘇氏曰達去也至于湯齊蘇氏曰至湯而王業成與天命㑹焉湯降不遲傳曰不遲言疾也蘇氏曰湯之所以自降下者甚敏而不遲聖敬日躋傳曰躋升也李氏曰湯能降已不遲故徳日進昭假遲遲假毛音格鄭音暇上帝是祗箋曰祗敬也帝命式于九圍傳曰九圍九州也李氏曰帝命之為法於天下也商自契以來天命所嚮未嘗去之然自湯而後與天齊謂王業至此而成天命至此而集天人適相符合也湯之謙抑所以自降下者甚敏而不遲故聖敬之徳日以躋升也敬為聖人之敬言至誠也日躋言至誠無息也徳日新又日新是聖敬日躋之實即文王之純亦不已也其昭格於天遲遲甚緩言湯無心於得天付之悠悠也湯無所覬倖故唯上帝是敬其誠專一然天自命之以為法於天下使為王也受小球大球音求傳曰球玉也王氏曰小國大國所贄之瑞也為下國綴旒綴徐張衛反本音輟箋曰綴猶結也旒旌旗之垂者也結定其心如旌旗之旒縿著焉縿音杉著直略反疏曰綴著於縿也襄十六年公羊云君若贅旒然言諸侯反繫屬於大夫也此言綴旒文與彼同秋官大行人及考工記說旌旗之事皆云九旒七旒爾雅說旌旗云練旒九是旌旗垂者名為旒也詩故曰旂所垂為旒衆旒所著為縿何天之休何上聲不競不絿音求箋曰競爭也傳曰絿急也不剛不柔敷政優優傳曰優優和也百禄是遒慈秋反傳曰遒聚也湯受小國大國所贄之瑞諸侯心繫天子如旌旗之旒綴著於縿諸侯皆服屬於我此所以負荷上天之福也湯又不爭競不急躁不太剛猛不太柔弱陳政敎則優優而和故百禄聚而歸之受小共大共毛音恭鄭音拱王氏曰小國大國所共之貢也今曰無逸萬邦惟正之供為下國駿厖駿音峻一音俊厖莫邦反傳曰駿大也厖厚也曹氏曰小國大國共貢賦所以享上也然皆出於民力惟薄取之而不使其傷財害民則厚下之道也何天之龍鄭作寵如字敷奏其勇不震不動不戁不竦戁奴版反傳曰戁恐也悚懼也百禄是總湯受小國大國之共貢惟薄取之所以大厚天下非謂既受而復散之也故能何天之榮寵又陳進其勇不震驚不摇動不戁恐不悚懼毅然以天下自任此百禄所以總而歸之也武王載斾蒲貝反傳曰武王湯也斾旗也䟽曰載其旌旗曹氏曰載斾則指其所伐之國也有䖍秉鉞音越補傳曰䖍敬也今曰鉞揚也解見公劉如火烈烈則莫我敢曷王氏曰曷者誰何之謂也苞有三蘖五葛反傳曰苞本也蘖餘也朱氏曰蘖旁生萌蘖也言一本生三蘖本則夏桀蘖則韋也顧也昆吾也莫遂莫逹九有有截箋曰齊壹截然韋顧既伐昆吾夏桀箋曰韋豕韋彭姓也顧昆吾皆己姓也三國黨於桀惡湯先伐韋顧昆吾夏桀則同時誅也有威武之王成湯載其旗斾䖍敬以秉持其鉞恭行天討也其威勢如猛火烈烈之盛莫敢誰何者一本生三蘖桀為亂首韋也顧也昆吾也以惡相濟然莫能遂逹其惡於是九州截然齊一以歸于湯湯則先伐韋顧次伐昆吾夏桀也昔在中葉傳曰葉世也有震且業疏曰震懼也傳曰業危也業業有考見常武錢氏曰書云肇我邦于有夏若苖之有莠若粟之有秕小大戰戰岡不懼于非辜所謂震且業也允也天子降予卿士箋曰下予之卿士謂生賢佐也疏曰言卿士者三公兼卿士也卿士又解見十月之交實維阿衡傳曰阿衡伊尹也箋曰阿倚也衡平也伊尹湯所依倚而取平故以為官名實左右商王左右音佐又箋曰商王湯也劉氏曰禘于太祖則功臣與祭故言伊尹也昔在中世湯未興之前國弱而震懼危業信哉天愛湯而子之乃為之生賢降予以卿士卿士謂誰實維伊尹為阿衡之官而佐助成湯以定天下也長發七章一章八句四章章七句一章九句一章六句殷武祀髙宗也疏曰祀髙宗之樂歌也撻彼殷武撻音闥傳曰撻疾意也曹氏曰言其兵威神速所謂迅雷不及掩耳也朱氏曰殷武殷王之武也錢氏曰謂殷之有武者莫髙宗若也奮伐荆楚傳曰荆楚荆州之楚國也疏曰周有天下始封熊繹為楚子於武丁之世不知楚君何人也李氏曰荆楚在商周之時為夷狄之國世亂則先叛世治則後服當湯之時必不敢抗衡中國及商室中微往往為中國患此髙宗所以討之也罙入其阻罙音彌阻音爼傳曰罙深也箋曰阻險阻也裒荆之旅裒蒲侯反傳曰裒聚也有截其所曹氏曰王師所在截然無敢犯之者猶常武所謂截彼淮浦王師之所也湯孫之緒朱氏曰湯孫謂髙宗也撻然而疾者殷王之武也奮伐荆州之楚國深入其險阻之地裒聚其衆伐罪而安其民也故所伐之處所截然齊一此湯孫髙宗之功業謂其功足以繼湯也維女荆楚女音汝居國南鄉昔有成湯自彼氐羗氐音低箋曰氐羗夷狄國在西方也莫敢不來享箋曰享獻也莫敢不來王箋曰世見曰王疏曰氐羌逺夷一世而一見於王秋官大行人云九州之外謂之蕃國世一見謂其國父死子繼及嗣王即位乃來朝是之謂世見也曰商是常朱氏曰此商之常禮也二章言責楚之義爾荆楚居國南方比之氐羌則近國耳成湯之時自彼氐羌猶莫敢不來獻享莫敢不來朝見謂此禮是商之常也况汝荆楚曷敢不至哉天命多辟音壁下同傳曰辟君也箋曰多衆也衆君諸侯也設都于禹之績箋曰禹平水土弼成五服而諸侯之國定是以云然歲事來辟箋曰來辟猶來王也勿予禍適音謫傳日適過也稼穡匪解音懈既伐荆楚諸侯畏服故言天命諸夏之君凡建國于禹功之内者咸以歲事來見於王以祈王之不譴曰予稼穡匪解庶可以免咎矣王氏曰髙宗能治夷狄故天下無有不服天命降監箋曰降下也下民有嚴不僣不濫不敢怠遑命于下國封建厥福傳曰封大也上章言天命諸侯朝于天子此章言天命天子以察諸侯天命髙宗降監諸侯之國有嚴敬其民賞不敢僣刑不敢濫不敢怠遑者則命于下國而封殖之以福也此章從王氏也舊說謂天降監於民命湯由七十里以王天下此詩首章便從髙宗說起言自彼成湯者述髙宗援湯以責楚之辭耳非專述湯事也不當於此章攙入成湯上下章文意皆不貫矣商邑翼翼傳曰商邑京師也錢氏曰翼翼整治貌翼翼考見采薇四方之極赫赫厥聲䟽日赫赫顯盛也濯濯厥靈疏曰濯濯光明也李氏曰大也壽考且寧以保我後生商邑之治翼翼然嚴整乃四方之中言政敎取正於此也聲譽赫赫乎顯盛威靈濯濯乎光明髙宗中興之盛如此宜享壽考康寧之福而且可以安後嗣子孫也陟彼景山疏曰景山大山也松栢丸丸傳曰丸丸直也也錢氏曰圓直是斷是遷斷音短傳曰遷徙也疏曰謂徙之來歸也方斵是䖍斵音卓疏曰方正也釋文曰斵斫也傳曰䖍敬也錢氏曰䖍盡力也松桷有梴丑連反傳曰梴長貌旅楹有閑箋曰旅衆也疏曰閑大也錢氏曰閑整也寢成孔安升彼大山取松栢丸丸然圓直者斬斷之遷徙之又方正而斵之工匠之事莫不䖍敬以松為屋之榱桷梴然而長其衆楹柱有閑然而大廟中之寢既成以安高宗之神也此蓋廟成始祔而祭之之詩也殷武六章三章章六句二章章七句一章五句詩緝卷三十六
