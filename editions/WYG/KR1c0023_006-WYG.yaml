body:
  text: 詩緝卷六宋嚴粲撰衛國風説已見邶粲曰漢志河内朝歌縣注云紂所都周武王弟康叔所封更名衛淇奥音郁美武公之徳也疏曰武公和僖侯子有文章又能聴其規諫以禮自防故能入相于周相去聲疏曰為卿士也美而作是詩也曰衛武公詩幽王時朱氏曰按國語武公年九十有五猶箴儆於國曰自卿以下至於師長苟在朝者無謂我老耄而舍我必恪恭於朝以交戒我又作賔之初筵抑之詩以自儆疏言淇奥之詩或幽或平未可知也補圖屬之平歐陽補圖今定為幽衛武享國五十有五前為宣後為平何以知淇奥之中為幽也蓋淇奥美武公之入相其入相幽也武公既入作賔之初筵以刺時入者入為卿士時指幽也武公入相於幽至平而進為公孔氏謂幽王之時武公以為卿士是也衛武詩二鄘柏舟在初年為宣衛淇奥在入相後為幽舊説幽無變風非矣瞻彼淇奥釋文曰淇奥水也解見邶泉水傳曰奥隈也長樂劉氏曰謂水涯彎曲之地李氏曰左傳昭公二年北宫文子賦淇澳其字従水與奥通綠竹猗猗音伊傳曰猗猗美盛貌朱氏曰淇上多竹漢世猶然所謂淇園之竹是也詩記曰左思三都賦序云見緑竹猗猗則知衛地淇奥之産有匪君子傳曰匪文章貌粲曰匪斐同大學作斐如切如磋七河反韻通作瑳傳曰治骨曰切治象曰磋如琢如磨傳曰治玉曰琢治石曰磨瑟兮僴兮僴還之上濁曹氏曰瑟縝密也如瑟彼玉瓚之瑟説文云僴武貌剛毅之意也補傳曰荀卿云陋者俄且僴釋之者引説文云晉魏之間謂猛為僴赫兮咺兮咺喧之上大學作喧音同傳曰赫明徳赫赫然曹氏曰咺聲譽之喧傳也補傳曰説文與字書皆謂朝鮮以兒啼不止為咺蓋衆口喧然譽武公之善不止也有匪君子終不可諼兮諼音喧傳曰諼忘也興也衛稱淇園之竹故以其猗猗美盛興武公之文章也匪然文章之武公如切磋琢磨以成其器骨象玉石雖美材非磨礱不成器亦猶人有美質必問學以成徳問學之功必積漸致之故取治骨象玉石用工之深者喻之武公能自治如此故瑟兮縝密僴兮剛毅赫兮明徳之著見咺兮聲譽之喧傳此匪然文章之武公民終不能忘之也大學云瑟兮僴兮者恂慄也毛以僴為寛大與大學異今不従瞻彼淇奥綠竹青青音精與菁音義同傳曰青青茂盛貌有匪君子充耳琇瑩音營傳曰充耳謂之瑱天子玉填諸侯雜以玉石瑱天之去聲釋文曰琇石之次玉者錢氏曰瑩玉色之榮也粲曰瑩鮮絜也琇瑩猶齊著言瓊瑩瓊華瓊英也會弁如星會音鱠箋曰會謂弁之縫中飾之以玉皪皪而處狀似星也天子服皮弁以日視朝縫去聲皪本又作礫音歴疏曰在朝君臣同服弁師云王之皮弁㑹五彩玉璂注云皮弁之縫中每貫結采玉十二以為飾謂之璂又曰諸侯及孤卿大夫之皮弁各以其等為之注云侯伯璂飾七子男璂飾五玉亦三采武公本畿外諸侯入相于周自以本爵為等則玉用三采而璂飾七也璂音其瑟兮僴兮赫兮咺兮有匪君子終不可諼兮武公入相于周服皮弁以趨天子之朝其充耳之瑱乃美石之琇瑩而鮮絜又㑹縫其皮弁其玉飾如星言徳稱其服也瞻彼淇奥緑竹如簀音責程子曰如簀言密比粲曰檀弓云大夫之簀與注謂牀第即牀棧也棧助諫反有匪君子如金如錫朱氏曰金錫言其鍛鍊之精純錢氏曰金錫鍊之精乃可作器如圭如璧朱氏曰圭璧言其生質之温潤寛兮綽兮程子曰寛𢎞裕也綽開豁也粲曰書無逸云不寛綽厥心猗重較兮猗音倚重平聲較音角釋文曰猗依也傳曰重較卿士之車疏曰輿人注云較兩輢上出式者則較謂車兩傍今謂之平較但周禮無重較單較之文輢音倚車傍也又音意吕和叔曰古者車箱長四尺四寸三分前一後二横一木下去車牀三尺三寸謂之式又於式上二尺二寸横一木謂之較去車牀凡五尺五寸古人立乗平常則憑較若應為敬則落手憑下式而頭得俯詩補傳曰較髙五尺五寸式髙三尺三寸較既出於式上故曰重較朱氏曰言其徳稱是重服也善戯謔兮不為虐兮今曰左思吳都賦言鄱陽暴謔則為虐矣如簀言如牀棧之密比也金錫言鍛鍊之甚精圭璧言器質之可貴又有寛裕綽豁之徳而倚車之重較以君子之徳而乗君子之器也較式皆乗車所憑較在式之上故曰重較人於謹言之時鮮有過失至於戯謔笑談之際従容相忘易以自縦言語之過常必由之今於戯謔之際而不為虐見和而不流非以戯謔為美也朱氏曰言其寛廣而自如和易而中節也蓋寛綽無斂束之意戯謔非莊厲之時皆常情所忽而易致過差之地也然猶可觀而必有節焉則其動容周旋之間無適而非禮亦可見矣淇奥三章章九句考槃音盤刺莊公也疏曰莊公揚武公和子不能繼先公之業使賢者退而窮處音杵曰衛荘公詩平王時前人用賢以建功業棄而不用則不能繼之矣此序與秦晨風序意同考槃在澗傳曰考成也槃樂也山夾水曰澗粲曰或見槃字従木遂以為器非也民訖自若是多槃與盤同此言成樂在澗猶云園日涉以成趣耳碩人之寛箋曰碩大也獨寐寤言粲曰既寐而寤既寤而言皆獨自耳永矢弗諼音喧箋曰矢誓也諼忘也朱氏曰自誓不忘此樂也補傳曰自誓而以永言有終焉之意窮處山澗之中而成其槃樂者乃是碩大之賢人其心甚寛裕雖在寂寞之濵而無枯瘁之色戚戚之意易所謂肥遯也深山窮谷無有游従獨自寐獨自寤獨自言其離索寂寞如此然賢者處之泰然永誓不忘此樂所以形容其遺佚不怨之意也舊説以弗諼弗過弗告皆為賢者􅅵畝不忘君之意其義亦正但與上文槃樂寛大之意不類故此詩不過極言賢者山林之樂以見其時之不可為而賢者無復有意於仕所以刺其君之不能用也孔叢子云於考槃見遯世之士而無悶於世考槃在阿傳曰曲陵曰阿碩人之薖音科傳曰薖寛大貌獨寐寤歌永矢弗過音戈粲曰過經過也賢者之窮處其既寐而寤既寤而歌無往非獨而自得其樂永誓不復他往居之而安也如龎徳公居峴山之南未嘗入城府也考槃在陸釋地曰髙平曰陸碩人之軸鄭音逐毛音迪補傳曰軸卷也猶言卷而懐之粲曰軸説不一毛以為進鄭以為病蘇氏以為盤桓不行皆不若補傳為長獨寐寤宿永矢弗告協韻音谷朱氏曰不以此樂告人賢者成樂於陸如軸之卷收藏不用也既寐而寤既寤復宿無往非獨言其離索獨居非一朝暮也然賢者自得其樂永誓不告於人賢者之隠惟恐人之知也然永矢弗諼永矢弗過永矢弗告亦作詩者形容其髙舉逺遯有終焉之意耳賢者不自言其如此也考槃三章章四句碩人閔莊姜也莊公惑於嬖妾使驕上僭上常之上濁莊姜賢而不答終以無子國人閔而憂之曰衛莊公詩平王時此詩無一語及莊姜不見答之事但言其族類之貴容貌之美禮儀之備又言齊地廣饒士女佼好以深寓其閔惜之意而已唯大夫夙退無使君勞二語㣲見其意而辭亦深婉風人之詞大抵然也然當時衛人知其事者一讀其詩便已黙悟矣首序題以閔莊姜有左傳可證説詩若不用首序則以此詩為美莊姜可乎碩人其頎音祈箋曰碩大也朱氏曰大人尊貴之稱傳曰頎長貌衣錦褧衣二衣今皆如字褧傾之上聲音頃字亦作絅箋曰褧襌也國君夫人當翟衣而嫁錦衣在塗所服襌音丹粲曰上衣舊去聲鄭丰如字句同音宜同也對裳錦褧裳上裳亦如字褧襌衣也以縠為之加於錦衣之上中庸所謂衣錦尚絅惡其文之著也齊侯之子衛侯之妻東宫之妹傳曰東宫齊太子也疏曰東宫太子所居也名得臣繫太子言之明與太子同母邢侯之姨蘇氏曰邢周公之後傳曰妻之姊妹曰姨譚公維私疏曰春秋譚子奔莒則譚子爵白虎通曰伯子男臣子於其國中襃其君為公傳曰姊妹之夫曰私有碩尊大貴之人頎然而長其衣以錦為之上加襌衣在塗服之以来嫁者乃是齊侯之子嫁為衛侯之妻言匹敵也又是齊東宫太子得臣之妹與太子同母嫡夫人所生言貴出也又邢侯呼己為姨己呼譚公為私言其娣妹皆嫁於諸侯也邢譚互言之耳風人不直言荘姜不見答之事但首章歴述其親族欲讀之者知其為荘姜則不見答之事國人自知之不待察察言之矣手如柔荑音題朱氏曰茅之始生曰荑膚如凝脂疏曰脂有凝有釋散文則膏脂皆總名對列即内則注云脂肥凝者曰脂曰膏領如蝤蠐音酋齊傳曰領頸也曰蝤蠐蝎也粲曰釋蟲云蟦蠐螬蝤蠐蝎又云蝎蛣􅔒又云桑蠧孫炎及疏以為蟦蠐也蠐螬也蝤蠐也蛣􅔒也桑蠧也蝎也一蟲而六名也以在木中白而長故以比頸如上所言皆一物耳郭璞云蠐螬在糞土中蝎在木中故山隂陸氏以為蟦蠐也為一物蝤蠐也為一物蝤蠐也蝎也蛣􅔒也又為一物姑兩存之然蝤蠐為蝎則同也蟦音焚蛣􅔒音詰屈齒如􅉚犀􅉚音互傳曰􅉚瓣瓣補遍反又蒲莧反朱氏曰瓠中之子也螓首蛾眉螓音秦傳曰螓首廣顙而方舍人曰螓小蟬也箋曰螓謂蜻蜻蜻音精釋蟲曰蚻蜻蜻蚻音札疏曰此蟲額廣而且方朱氏曰蛾蠶蛾也其眉細而長巧笑倩兮倩音茜傳曰倩好口輔疏曰笑之貌美在於口輔美目盼兮盼匹莧反傳曰盼白黒分荘姜其手如茅荑之柔其膚滑白如脂膏之凝頸白而長如木中蝤蠐之蟲齒白而整如􅉚中之子首如螓蟲之首額廣而且方也眉如蠶蛾之眉勾曲如畫細而長也其巧笑則倩兮美好其美目則盼兮白黑分明荘姜容貌之美如此君何為不答乎碩人敖敖音翺曹氏曰釋文云敖出遊也通作遨則敖敖是優游舒徐之意説于農郊説音税疏曰説舍也傳曰農郊近郊也四牡有驕音蹺傳曰驕壮貌朱幩鑣鑣幩音焚鑣音標傳曰幩飾也人君以朱纒鑣且以為飾粲曰鑣謂馬銜外鐵也一名扇汗鑣鑣非一鑣也清人駟介麃麃武貌無邉傍載驅行人儦儦衆貌従立人傍此鑣鑣従金傍義各異翟茀以朝茀音弗朝音潮傳曰茀蔽也疏曰婦人乗車不露車之前後設帳以自隠蔽謂之茀因以翟羽為飾蓋厭翟也次其羽使相厭厭音葉粲曰春官巾車云厭翟勒面繢總注云勒面謂以如玉龍勒之韋為當面飾也上文注云龍駹也以白堊飾韋雜色為勒總著馬勒直兩耳與兩鑣繢畫文也詩翟蔽以朝蓋厭翟也蔽音弗又音必世反大夫夙退無使君勞此碩人敖敖然優游舒徐自齊来嫁于衛説舍於近郊整其車服而後入四馬驕然而壯每馬之鑣皆有朱色之飾故曰鑣鑣又以翟羽為車之蔽茀以此入君之朝見其雍容閑雅禮文之備也莊姜以禮来嫁不應不見答豈吾君疲於政事而未暇與夫人相親耶若是則諸大夫聴朝者宜且早退無使吾君勞於聴㫁可也君之不答莊姜以惑於嬖妾之故而此詩以為勞於政事所致母之不安其室以淫風流行之故而凱風以為勞苦而然風人之辭㣲婉矣河水洋洋傳曰洋洋盛大貌北流活活音括又如字錢氏曰活活水流貌疏曰左傳云賜我先君履西至于河河在齊西北流也補傳曰以河之流喻齊國之盛大施罛濊濊罛音孤濊音豁傳曰罛魚罟朱氏曰濊濊罟入水聲補傳曰施罟喻荘公求昏於齊鱣鮪發發鱣鮪音旃委發音撥鱣鱑也大魚似鱘疏曰大魚似鱏而短鼻口在頷下體有邪行甲無鱗肉黄大者長二三丈江南呼為黄魚陸璣曰鱣身形似龍鋭頭背上腹下皆有甲今於孟津石磧上釣取之大者千餘斤可蒸亦中羮􅌜又可作鮓其子可為醤􅌜音山隂陸氏曰鱣肉黄俗謂之玉板粲曰本草以鱣為黄魚是也鱏今俗作鱘即鱘黄鮓是也鮪曰鮪鮥也似鱣鮥音洛陸璣曰鮪形似鱣而色青黒頭小而尖似鐵兠鍪口亦在頷下大者不過七八尺一名鮥肉色白味不如鱣也説文曰魚著網尾撥撥然補傳曰鱣鮪喻荘姜来歸葭菼揭揭葭音加菼貪之上貪他含切揭音傑曰葭蘆葦又名華一物而四名菼薍萑又名騅亦一物而名四竝解見七月薍頑之去萑音完傳曰揭揭長也補傳曰葭菼喻親迎禮容之盛庶姜孽孽魚結反粲曰庶出為孽孽孽者衆多之貌庶士有朅音挈董氏曰庶士其媵臣也傳曰朅武壮也粲曰朅與伯兮朅兮音義同齊北西至于河故舉河水言之謂河水洋洋然盛大在齊之西而北流之貌活活然言齊據大河其國盛大猶季札言泱泱乎大風也施魚罟於河中其入水聲濊濊然而得鱣鱑鮪鮥之大魚其魚著網掉尾發發然喻莊公求昏於齊而得貴女猶衡門以河魴喻齊姜也河上葭蘆與菼薍之草揭揭然長喻荘姜来歸庶姜姪娣孽孽然衆多庶士媵臣揭揭然武壮也以齊國之大姜女之貴媵送之盛無一不滿人意君何為不答乎碩人四章章七句氓音萌刺時也宣公之時禮義消亡淫風大行男女無别遂相奔誘華落色衰華音譁復相棄背音佩或乃困而自悔喪其妃耦喪去聲妃音配故序其事以風焉風音諷美反正刺淫泆也曰衛宣公詩桓王時刺時則上所化也男女之合不以正則不可以久雖悔何及所以戒也非美也氓之蚩蚩音癡傳曰氓民也朱氏曰蓋男子不知其誰何之稱也蚩蚩無知之貌抱布貿絲貿音茂傳曰布幣也箋曰幣所以貿買物也釋文曰貿交易也匪来貿絲来即我謀箋曰即就也送子涉淇淇解見邶泉水至于頓丘傳曰丘一成為頓丘疏曰成重也譜䟽曰頓丘在朝歌紂都之東也朱氏曰頓丘地名也粲曰漢志東郡有頓丘縣師古云以丘為縣也丘一成為頓丘謂一頓而成也或曰一重之丘也匪我愆期傳曰愆過也子無良媒將子無怒将音鏘箋曰将請也秋以為期一章述始者已為男子所誘而已許之奔也言有一氓我本不識其為何人但見其蚩蚩然無知抱持其幣而為我買絲怨而深鄙之也此氓非来買絲但来就我謀為室家也此氓来誘我欲便挈我以歸我未成行此氓責我以愆期我乃送之涉淇水至于頓丘謂之曰非我過子之期也子無善媒以先告我故我行計未辦請子無怒以秋為期當従子以往言已初為遲疑為男子所迫趣乃許之也朱氏曰士君子立身一敗而萬事瓦解者何以異此乗彼垝垣音危袁箋曰乗登也傳曰垝毁也朱氏曰垣牆也以望復關李氏曰復關關名蘇氏曰氓之所在也不見復關泣涕漣漣音連釋文曰漣漣泣貌粲曰漣漣涕出接續之貌既見復關載笑載言爾卜爾筮體無咎言傳曰體兆卦之體疏曰謂龜兆筮卦也二者皆有繇辭繇音宙占辭也粲曰春官占人云凡卜簭君占體注云體兆象也周公云體王其罔害簭筮同以爾車来以我賄遷傳曰賄財也二章述已為男子所惑而遂奔之也言本以秋為期期既至矣乃登彼壊牆以望此復關之人未見此復關之人則泣涕漣漣既見此復關之人則載笑載言是我為所惑也爾卜之於龜筮之於蓍其兆卦之體皆無凶咎之辭言與我宜為室家爾遂以車来而我以其賄財遷徙従子而往謂男子假卜筮以要已遂罄其資以従之也桑之未落其葉沃若説文曰沃灌溉也朱氏曰沃若潤澤貌于嗟鳩兮于音吁曰鳩鶻鵰也鶻音骨又如字鵰音嘲解見小宛無食桑葚音甚諶之上濁釋文曰葚桑實也傳曰鳩食桑葚過則醉而傷其性于嗟女兮無與士耽音儋粲曰耽溺好也士之耽兮猶可説也箋曰説解也女之耽兮不可説也箋曰婦人維以貞信為節三章述其既奔而悔也桑之未落其葉沃然潤澤喻情眷歡洽之時也鳩嗜桑葚之甘則食之不已猶女愛男情眷之濃而為其所誘故歎鳩無食桑葚女無與士耽樂為淫也士之耽猶可解説女子一失身於人無可解説矣蓋言其既奔之後不待愛弛旋即愧悔已無及也朱氏曰婦人深愧悔之辭主言婦人惟以貞信為節一失其正則餘無可觀耳非真以士之耽為可説而恕之也桑之落矣其黄而隕傳曰隕墮也自我徂爾箋曰徂往也三嵗食貧淇水湯湯音商傳曰湯湯水盛貌漸車帷裳漸音尖朱氏曰漸漬也箋曰帷裳童容也疏曰以帷障車之傍如裳也丈夫車立乗則有蓋無帷裳女也不爽傳曰爽差也士貳其行去聲士也罔極曹氏曰罔極言不可測知二三其徳四章述其愛弛而見棄也桑落而黄隕喻情眷衰弛之時也自我往爾男子之家三嵗食貧者之食不嫌淡薄今我見棄而歸渡此淇水湯湯然而盛漸漬其車之帷裳因自歎女未嘗差爽其所守而自貳其行士心無極不可測知由其徳二三不専一故也士也罔極所謂怨靈脩之浩蕩也罔極為無窮之意善惡皆可言之魏園有桃謂我士也罔極為志念無窮極蓼莪昊天罔極為父母之徳無窮極青蠅讒人罔極桑柔民之罔極與此士也罔極皆為反覆無窮極三嵗為婦靡室勞矣箋曰靡無也曹氏曰無為室家而受如是之勞者夙興夜寐靡有朝矣朱氏曰無有一朝不然者言既遂矣至于暴矣兄弟不知咥其笑矣咥音戯又音迭朱氏曰咥笑貌静言思之躬自悼矣五章述其将至家而羞見兄弟也言我三嵗為爾婦無有為室如是之勞者早起夜卧無有一朝不然者初與爾謀為室家惟恐不諧其言既遂爾乃以暴虐加我我兄弟不知之耳若知我見暴如此必咥然笑我也始為所誘今為所暴故恐兄弟笑之此承上文漸車帷裳見棄而歸在途自念之辭羞見兄弟也故言静而思之躬自痛悼而已此婦蓋父母不存唯有兄弟耳及爾偕老老使我怨淇則有岸隰則有泮毛音判鄭讀為畔傳曰泮陂也陂音卑箋曰畔崖也總角之宴傳曰總角結髮也李氏曰宴安樂也言笑晏晏傳曰晏晏和柔也信誓旦旦今曰旦旦明也昊天曰旦之旦不思其反反是不思亦已焉哉六章述其怨而自解之辭言始也将與汝偕老今我未老而已見棄若我従爾至老其彼暴戾必有甚者愈使我怨也淇水則有岸隰則有陂泮何汝心之無泮岸不可知也即上章所謂罔極也我自總角成人之初與爾宴樂言笑晏晏然和柔信誓旦旦然明曾不思其反覆一至於此反覆至此是始焉不思之過今則無如之何矣故曰亦已焉哉詩有總角丱兮為男子未冠内則云男女未冠笄者冠去聲總角衿纓衿琴之去猶結也是總角為未冠笄者内則注又云收髮結之故毛以為結髮要知此詩但言自少為爾婦也蘇子卿詩結髮為夫妻李善云結髮始成人也取笄冠為義其説是也舊説以老使我怨為今老而見棄據此詩言總角之宴則此婦人始笄便為此氓之婦又言自我徂爾三嵗食貧又言三嵗為婦是止及三年便見棄不應便老也氓六章章十句竹竿衛女思歸也解見邶泉水適異國而不見答思而能以禮者也曰衛宣公詩桓王時婦人以夫家為歸者也衛女既嫁異國而反思衛國之樂蓋於異國不得其所則思故鄉也此雖不言其夫家之不見答而觀其思歸之切如此則其情不言可知矣風人之辭也籊籊竹竿籊音剔傳曰籊籊長而殺也殺色界反以釣于淇淇解見邶泉水補傳曰思兒童遊釣之樂豈不爾思逺莫致之衛女思歸述其幼時出遊見儕輩兒童有執籊籊然長殺之竹竿以釣于淇水者是可樂也我今豈不思衛乎以道逺莫能至也泉源在左吕氏曰泉水即衛州共城之百泉也共音恭淇水在右吕氏曰淇水出相州林慮縣東流泉水自西北来注之左右蓋主山而言之相衛之山東面故以北為左南為右慮音廬女子有行解見邶泉水逺兄弟父母逺去聲幼時出遊泉源淇水之間甚可樂也自歎女子出適於人則雖父母兄弟之至親且疎逺矣安得復至少時游戯之所乎淇水在右泉源在左巧笑之瑳七我反傳曰瑳巧笑貌朱氏曰瑳鮮白色笑而見齒其色瑳然猶所謂粲然皆笑也佩玉之儺那之上錢氏曰儺柔緩也粲曰腰身褭儺也我思遊二水之間與其女伴巧笑露齒瑳然鮮白珮玉而身褭儺是可樂也淇水滺滺音由傳曰滺滺流貌檜楫松舟檜音括又音鱠曰檜栝也傳曰檜柏葉松身疏曰禹貢杶榦栝柏注云柏葉松身曰栝與此一也釋文曰楫橈也或謂之櫂釋名云楫捷也撥水行舟疾也橈音饒櫂亦作棹駕言出遊以寫我憂寫解見邶泉水我思淇水滺滺然流有檜楫松舟遊於其中是可樂也我安得乗車出遊於其地而可以除憂乎再三極言衛國之樂則知其有所不樂於此矣此詩全不説不見答之意但末語著一憂字使人玩味之而其情自見矣竹竿四章章四句芄蘭芄音九刺恵公也疏曰恵公朔宣公晉子閔公二年左傳云初恵公之即位也少社預云蓋年十五六驕而無禮大夫刺之曰衛恵公詩桓王時衛恵公鄭昭公皆見逐恵公拒天子之師以入衛春秋不言復然以其終得國也故出入皆稱衛侯忽以世子當立然以其終失國也故出入皆稱忽此聖人書法之嚴也首序稱恵公稱忽皆用春秋書法知經聖人之手矣芄蘭之支曰芄蘭蘿摩也釋草曰雚芄蘭雚音貫箋曰芄蘭柔弱常蔓延於地陸璣曰芄蘭一名蘿摩幽州人謂之雀瓢蔓生葉青緑色而厚摘之白汁出食之甜脆䰞為茹滑美其子長數寸似瓠子䰞音煑今考本草枸把條陶隠居注云去家千里勿食蘿摩枸把雚一名芄蘭郭云雚或傳寫誤也朱氏曰支枝同童子佩觿傳曰觿所以解結成人之佩也疏大曰内則云子事父母左佩小觿右佩觿下别云男女未冠笄者故知成人之佩内則注云觿貌如錐以象骨為之其鋭端可以解結也雖則佩觿能不我知補傳曰其智不足以知人也容兮遂兮朱氏曰容兮遂兮舒緩放肆之貌粲曰容雍容也離騷云遵赤水而容與祭義云及祭之後陶陶遂遂如将復入然是不忍遽去舒徐之貌陶音遙垂帶悸兮悸葵之去錢氏曰悸心動也興也芄蘭蔓生支葉柔弱以喻恵公之幼弱不能自立也觿者成人之佩人君治成人之事雖童子猶佩之恵公雖則佩成人之佩然其材能則不足以知我也雍容舒遂徒服衣垂帶而悸悸然執心不定言其放肆驕傲未知其趨嚮也芄蘭之葉童子佩韘音攝傳曰韘玦也玦音決亦作決疏曰決鉤弦也以象骨為之挟矢時著右手巨指以鉤弦能射御則佩韘粲曰玦車攻作決夏官繕人作抉又解見車攻雖則佩韘能不我甲程子曰甲長也補傳曰其仁不足以長人也容兮遂兮垂帶悸兮其材能不足以君長我也芄蘭二章章六句河廣宋襄公母歸于衛思而不止故作是詩也粲曰恵公懿公之間恵王時詩箋曰宋桓公夫人衛文公之妹生襄公而出疏曰所以義不得往者以夫人為先君所出其子承父之重與祖為一體母出與廟絶曹氏曰禮為出母期而為父後者無服襄公為桓公後嗣夫人見黜於先君則為絶於宋廟矣義不可以復至宋也然母子之恩則不可絶范氏曰夫人之不往義也天下豈有無母之人歟有千里之國而不得養其母則人之不幸也為襄公者將若之何生則致其孝沒則盡其禮而已衛有婦人之詩自莊姜至於襄公之母六人焉皆止於禮義而不敢過也夫以衛之政教淫僻風俗傷敗然而女子猶知有禮而畏義如此者蓋以先王之化所及也詩記曰説苑云宋襄公為太子請於桓公曰請使目夷立公曰何故對曰臣之舅在衛愛臣若終立則不可以往味此詩而推其母子之心蓋不相逺所載似可信也不曰欲見母而曰欲見舅者恐傷其父之意也母之慈子之孝皆止於義而不敢過焉不幸處母子之變者可以觀矣箋謂宋襄即位其母思之而作河廣之詩疏因以為衛文公時非也衛都朝歌在河北宋都睢陽在河南自衛適宋必涉河衛自魯閔二年狄入衛之後戴公始渡河而南河廣之詩言誰謂河廣一葦杭之則是作於衛未遷之前矣時宋桓猶在襄公方為世子衛戴文俱未立也舊説誤矣疏以河廣屬衛風當為衛人所作非宋襄公母所親作然宋襄公母本衛女又歸衛而作此詩不屬之衛何所屬乎誰謂河廣一葦杭之葦音偉杭亦作航音同葭蘆葦解見七月傳曰杭渡也誰謂宋逺跂予望之跂音棄韻亦作企音起粲曰跂舉踵也腳跟不著地跟音根夫人義不可以往宋而設為或人以逺沮己巳為辭以解之誰謂河水廣而令我勿渡乎但以一束蘆葦浮之水上則可以杭渡而過不為廣也誰謂宋國逺而令我勿往乎我跂其足則可以望之不為逺也欲往之切故謂逺為近若真欲往宋者思子之情隠然於言外矣誰謂河廣曽不容刀箋曰小船曰刀粲曰舠字音刀小船也古字通用誰謂宋逺曽不崇朝箋曰崇終也行不終朝而至亦喻近河廣二章章四句伯兮刺時也曹氏曰是役也王為主而衛人従焉故不専刺宣公而云刺時也言君子行役為王前驅為去聲過時而不反焉曰衛宣公詩桓王時箋曰衛宣公之時蔡人衛人陳人従王伐鄭伯也事見左傳桓五年范氏曰居而相離則思期而不至則憂此人之情也文王之遣戍役周公之勞歸士其詩皆叙其室家之情男女之思以閔之故其民悦而忘死聖人能通天下之志是以能成天下之務兵者毒民於死地者也孤人之子寡人之妻傷天地之和致水旱之災故聖王重之如不得已而行則告以歸期念其勤勞哀傷􅃤怛不啻如在已是以詩美之則言其君上之閔恤刺之則録其室家之怨思以為人情不出乎此也師出而人情之怨如此其敗宜矣是役也春秋不書戰敗諱之也伯兮朅兮朅音挈箋曰伯君子字也粲曰朅與庶士有朅音義同邦之桀兮伯也執殳音殊傳曰殳長丈二而無刃疏曰戈殳㦸矛皆挿於輢此云執之者在車當挿用則執之輢音􅀝車傍也又音意為王前驅婦人自言其夫朅然而武壮為邦之英傑今乃執殳為王前驅而従征役也自伯之東疏曰此時従王伐鄭鄭在衛之西南而言東者時蔡衛陳三國兵至京師乃東行伐鄭也首如飛蓬蓬解見騶虞豈無膏沐詩記曰膏所以膏首面沐蓋潘也左氏傳遺之潘沐杜預注云潘米汁可以沐頭魯遣展喜以膏沐勞齊師則非専婦人用也潘音翻誰適為容適音滴為去聲或如字傳曰適主也朱氏曰傳云女為悦已容婦人夫不在無容飾自伯之東行伐鄭我髮不梳如飛亂之蓬草非無膏與沐然誰主為容飾乎其雨其雨朱氏曰其者冀其將然之辭杲杲出日杲音藁錢氏曰杲杲日色明也願言思伯粲曰願念也甘心首疾粲曰頭痛也時以秋伐鄭秋暑之時艱於得雨故因以起興曰其雨矣其雨矣乃杲杲然日復出喻望其夫之歸而復不歸也我念而思伯憂思之過以生首疾而甘心焉不以為悔也焉得諼草焉音煙諼音喧粲曰孔氏以諼訓為忘非草名然毛氏云諼草令人忘憂是有其物也按本草有萱草云令人好歡樂無憂嵇叔夜養生論亦云合歡蠲忿萱草忘憂愚智所共知也諼本又作萱説文作藼或作蘐皆従草則為草名無疑矣言樹之背音佩沈又如字傳曰背北堂也疏曰房室所居之地總謂之堂房半以北為北堂房半以南為南堂也項氏曰儀禮士昏禮云婦洗在北堂有司徹云主婦北堂願言思伯使我心痗音每又音悔傳曰痗病也人謂諼草忘憂何處可得之我欲植之北堂玩之以銷憂今我念而思伯至於心病恐非諼草所能療也伯兮四章章四句有狐刺時也衛之男女失時喪其妃耦焉喪去聲妃音配古者國有凶荒則殺禮而多昏殺所戒反㑹男女之無夫家者所以育人民也曰衛宣公詩桓王時有狐之詩桃夭摽有梅之變也有狐綏綏音雖粲曰綏本訓安則綏綏定安之意也狐性多疑綏綏則獨行而遲疑也在彼淇梁解見邶谷風心之憂矣之子無裳興也狐性淫又多疑毎涉河冰且聴且渡故言疑者稱狐疑也今在淇水之梁綏綏然獨行而遲疑有求匹之意喻無妻之人也時婦人喪其妃耦憂是子無裳蓋欲與之為室家而託言與之作裳也有狐綏綏在彼淇厲傳曰厲深可厲之旁王氏曰岸近厲曰厲心之憂矣之子無帶有狐綏綏在彼淇側心之憂矣之子無服有狐三章章四句木𤓰美齊桓公也衛國有狄人之敗出處于漕處音杵漕音曹齊桓公救而封之遺之車馬器服焉遺音位衛人思之欲厚報之而作是詩也曰衛文公詩恵王時疏曰衛立戴公以廬于漕齊桓公使公子無虧帥車三百乗甲士三千人以戍漕歸公乗馬祭服五稱牛羊豕雞狗皆三百與門材歸夫人魚軒重錦三十兩戴公卒文公立齊桓公又城楚丘以封之與之繫馬三百稱去聲衣單複具曰稱重錦錦之熟細者以二丈雙行故曰兩三十兩三十匹也木𤓰美桓公衛人之情也春秋不與桓公専封所以尊王也投我以木𤓰徐氏曰𤓰有𤓰瓞桃有羊桃李有雀李此皆枝蔓也故言木𤓰木桃木李以别之報之以瓊琚音居粲曰傳云瓊玉之美者疏云瓊是玉之美名非玉名也説文云瓊赤玉也姑兼存之傳曰琚珮玉名解見鄭女曰雞鳴匪報也永以為好也好去聲人方危亡困急之中有能恵頋之者其感必倍齊桓有存亡之功衛深徳之故因其車馬器服之遺而述其欲報之厚言我衛人當為狄所滅之時但有遺我以木𤓰㣲物者猶當報之以瓊琚且曰此非足為報欲以結好於永久且況齊桓之贈遺如此其厚則報之當如何此感其救患之恩設為𤓰瓊不等之喻非以尋常施報論也此所謂木𤓰猶言蕪蔞亭豆粥蔞音閭嘑沱河麥飯也嘑音呼投我以木桃報之以瓊瑤音遙傳曰瓊瑤美玉説文曰美石疏曰三者皆玉石雜也今曰公劉維玉及瑤匪報也永以為好也投我以木李報之以瓊玖音疚釋文曰玖玉黑色疏曰丘中有麻𫝊云玖石次玉者是玖非全玉也匪報也永以為好也木𤓰三章章四句詩緝卷六
