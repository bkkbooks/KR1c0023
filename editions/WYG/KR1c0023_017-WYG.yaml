body:
  text: 詩緝卷十七宋嚴粲撰鹿鳴之什小雅譜曰小雅大雅者周室居西都豐鎬之時詩也程子曰自鹿鳴以下二十二篇各賦其事而用之其周公之爲乎與二南同也陳氏曰周家之治至於文武其禮文浸以煩縟故周公因一事以作一詩其目二十有二以發揚其誠意太史録之其後或舉是事則復歌是詩焉朱氏曰正小雅燕饗之樂也補傳曰季札觀周樂歌大雅則曰文王之徳歌小雅則曰周衰有遺民意其一時觀樂豈能盡歌工人於大小雅間取其一二以審其音耳大雅所歌必受命等篇故曰文王之德小雅所歌必思古等篇故曰周衰有遺民正小雅二十二篇皆中庸尊賢親親體羣臣柔遠人懷諸侯爲天下國家之大經非政之小也鹿鳴燕羣臣嘉賔也既飲食之飲食音䕃嗣又實幣帛筐篚音匡匪以將其厚意疏曰飲有酬賔送酒之幣食有侑賔勸飽之幣然後忠臣嘉賔得盡其心矣古者上下交而爲泰於鹿鳴諸詩見之儀禮註云鹿鳴君與臣下及四方賔燕之樂歌也故序以羣臣嘉賔兼言之詩不言羣臣唯言嘉賔則總謂羣臣爲嘉賔以禮待臣之厚也詩中求規益序所謂盡心謂忠告無隱也上下之情不通則忠臣嘉賔雖欲盡心以告君而其勢分隔絶有不可得者義在得字非爲必待燕而後盡其心也杜甫云聖人筐篚恩實欲邦國活得古人用詩之意矣􅊯􅊯鹿鳴􅊯音幽程子曰􅊯􅊯和聲也食野之苹音平傳曰苹蓱也箋曰藾蕭也藾音賴陸璣曰葉青白色莖似箸而輕脆始生香可生食又可蒸食脆七嵗反我有嘉賔今曰總稱羣臣及賔客也鼓瑟吹笙瑟解見闗雎廣雅曰笙以匏爲之十三管列匏中而施簧管端李氏曰瑟者包羲氏所作笙簧女媧氏所作吹笙鼓簧簧解見王君子陽陽疏曰吹笙之時鼓其笙中之簧今曰鼔謂動其聲易繫辭鼓之以雷霆注鼓動也吹笙則動其簧而發聲承筐是將箋曰承猶奉也傳曰筐篚屬將行也人之好我好去聲示我周行示毛如字鄭作寘行毛如字鄭音航朱氏曰周行大道也傳曰周至也周行有考見巻耳興也鹿得野苹而􅊯􅊯然和聲呼其類以共食之興君有飲食召羣臣嘉賔與之燕樂也我有此嘉賔爲之鼓其瑟吹其笙吹笙之時動其笙中之簧又奉承箱篚以盛幣帛而將其意情文相稱驩欣交通庶乎人之好愛我者示我以大道矣以告我者爲相愛蓋道之使言也燕禮於旅也語所以通下情求規益豈曰耽樂飲酒乎哉釋草苹有二種一云苹蓱其大者蘋此水生之苹也解見采蘋一云苹藾蕭郭璞云今藾蒿也此陸生之苹也即鹿所食是也􅊯􅊯鹿鳴食野之蒿呼毛反蒿解見蓼莪我有嘉賔德音孔昭德音解見假樂視民不恌音挑朱氏曰恌薄也曹氏曰視民與視民如傷同義君子是則是傚我有㫖酒嘉賔式燕以敖傳曰遨遊也今曰言其禮之從容也嘉賔教益於我皆有德之言甚昭明矣其視民則不薄之謂所言皆仁厚也雖君子之人猶法則之視傚之言可爲善類之師表也我與之燕飲而遨遊庶乎從容款洽而有磨礱浸潤之益非徒遊燕而已箋破上章示我之示爲寘故以此章視民之視爲示今皆如字則此視爲瞻視之視􅊯􅊯鹿鳴食野之芩音琴傳曰芩草也陸璣曰莖如釵股葉如竹蔓生澤中下地鹹處牛馬亦喜食之我有嘉賔鼓瑟鼓琴鼓瑟鼔琴和樂且湛音耽字又作耽傳曰湛樂之久也我有㫖酒以燕樂嘉賔之心非徒養其氣體也以之燕飲而樂其心庶其罄竭而無隱耳鹿鳴三章章八句四牡勞使臣之來也勞使並去聲疏曰事畢來歸也有功而見知則說矣說音悅李氏曰四牡五章皆言其勞則是深知之矣人臣之事皆職分所當爲不計其君之知不知也此特序詩者之辭以爲使臣有馳驅之勞而其君能深體之其心之喜說當如何非使臣必待見知而後說也四牡騑騑音非傳曰騑騑行不止之貎周道倭遲倭音威詩記曰使臣初發自周道以往傳曰倭遲回遠之貎豈不懷歸王事靡盬音古李氏曰王事者公事也解見唐鴇羽我心傷悲使臣既還文王燕饗以勞之而歌是詩焉述其在途之情而設爲使臣自道之辭若曰我乘四牡騑騑然行而不止由岐周之道而往他國倭遲然回遠我豈不思歸乎特以王事不可以不堅固不敢狥私以廢公是以我心自傷悲耳所悲之事謂念父母也下章言之文王未嘗稱王而言王事者諸侯受天子之命以治其國西伯受天子之命以統諸侯使臣往來皆王事也朱氏曰爲臣者奔走王事特以盡其職分之當爲何敢自以爲勞哉然君之心則不以是而自安也臣勞於事而不自言君探其情而代之言上下之間可謂各盡其道矣傳曰思歸者私恩也靡盬者公義也傷悲者情思也箋曰無私恩非孝子也無公義非忠臣也君子不以私害公不以家事辭王事范氏曰臣之事君也必先公而後私君之勞臣也必先恩而後義四牡騑騑嘽嘽駱馬嘽音灘駱音洛傳曰嘽嘽喘息之貌白馬黒鬛曰駱嘽嘽考見崧高山隂陸氏曰今之駱馬最耐勞豈不懷歸王事靡盬不遑啓處音杼釋言曰啓跪也釋曰莊子云擎跽曲拳說文云跽長跪也跽音起傳曰處居也項氏曰古者席地故有跪有坐跪即起身居則坐也孝經居吾語汝坐而有所敬則跪今曰跪者雙膝著地而直身也坐者雙膝著地而坐也李氏曰大意爲不暇居處之義駱馬耐勞苦今以勞之故猶嘽嘽然喘息人勞可知矣翩翩者鵻翩音篇鵻音追朱氏曰翩翩飛貌鵻俗字也當作隹凡鳥之短尾者皆隹屬曰鵻鵓鳩也即郯子祝鳩氏司徒也鵻一鳥而十四名鵻也隹其也鵓鳩也祝鳩也鳺鴀也䳕鳩也鵾鳩也楚鳩也鳻鳩也荆鳩也乳鳩也鵴鳩也􅝣鳩也䳫鳩也隹其亦作鵻騏鳺鴀音孚浮亦作夫不䳕音浮鵾音昆鳻音汾鵴音菊􅝣音役䳫音葵左傳注曰祝鳩孝故主教民陸璣曰如小鳩山隂陸氏曰壹宿之鳥鳩性慈孝慤謹故聽聲考詳篇云雀聲􅃤毒鳩聲慈念鳲鳩性壹而慈祝鳩性壹而孝鵻鳥之短尾總名也載飛載下箋曰載則也集于苞栩音許曰栩柞也櫟也杼也解見唐鴇羽王事靡盬不遑將父傳曰將養也興也設爲使臣之言謂在途之時思念父母因見孝鳥鵓鳩其飛貌翩翩然或飛或下集止於叢生之栩木鵓鳩性壹飛止不離常處故得遂其孝養我以王事不可不堅固行役無常處不暇將養其父鵓鳩之不如也翩翩者鵻載飛載止集于苞杞音起曰杞枸杞也一名枸檵枸音苟檵音計今曰本草有枸杞一名仙人杖一名西王母杖山谷有顯聖寺庭枸杞詩云養成九節杖持獻西王母天随子又言常食杞菊東坡有後杞菊賦即此杞也其根名地骨其莖榦三五尺作叢春作羮茹㣲苦相傳蓬萊縣南丘村多枸杞髙者一二丈王事靡盬不遑將母詩有三杞將仲子無折我樹杞栁屬也有臺南山有杞湛露在彼杞􅁄山木也此詩集于苞杞雅杕杜北山言采其杞四月隰有杞桋枸杞也駕彼四駱載驟駸駸驟愁之去駸音侵釋文曰驟馬步疾也今曰走馬曰馳不馳而步疾爲驟錢氏曰駸駸馬前進貌豈不懷歸是用作歌將母來諗音審箋曰諗告也疏曰左傳云辛伯諗周桓公設爲使臣之言謂我駕彼四駱疾步而驟駸駸然前進豈不念親而懷歸乎所以作此歌詩以養母之情來告於君也此詩本君令作之以勞使臣非使臣所作然五章皆設爲使臣自述之辭故末章託言使臣作此詩以來告蓋臣有此勞苦之情不敢自言君探其情而代之言示君之知其涉苦以勞之也獨言將母承上章之文也四牡五章章五句皇皇者華君遣使臣也李氏曰先遣而後勞則皇皇者華當在四牡之前蓋三百篇之本末多有顛倒者如載馳衞懿公之詩乃在於文公之後清人鄭文公之詩乃在於突忽之前葛藟平王之詩乃在於桓王之後皇皇者華君遣使臣之詩乃在於四牡之後而豳風之破斧乃在於東山之後雖其顛倒如此亦非詩之本意也詩記曰作是詩以遣使臣在文王時至於周公制禮作樂之後凡遣使臣無不用是詩以遣之也送之以禮樂曹氏曰燕以遣之所謂禮也歌以樂之所謂樂也言遠而有光華也疏曰光顯其君常不辱命於彼歐陽氏曰稱美其能將君命爲國光華於外爾程子曰天子遣使四方以觀省風俗采察善惡訪問疾苦宣道化於天下下國蒙被聲教是以光華遣使以禮樂歸又勞之體羣臣也皇皇者華傳曰皇皇猶煌煌也疏曰草木之華于彼原隰釋地曰廣平曰原下濕曰隰今考釋地云高平曰陸傳於原陸皆曰高平當以釋地爲正駪駪征夫駪音莘傳曰駪駪衆多之貌箋曰征夫衆行夫也李氏曰使臣之屬也每懐靡及今曰懐念也興也使臣還則勞之遣則勉之言皇皇然光明者草木之華于彼原隰之間猶使臣能將命爲國光華於遠近也駪駪然衆多之行人皆敏於赴功每念不及於事唯恐不逮也征夫如此使臣可知遣使之初預道其忠勤以勉其能然也曹氏曰說者以爲使臣被君之光寵以出遠近高下皆有光華此爲使臣之辭則可以爲君遣之之辭則不可我馬維駒音俱解見漢廣六轡如濡音需箋曰如濡言鮮澤也李氏曰羔裘如濡載馳載驅周爰咨諏沮之平歐陽氏曰周徧也箋曰爰於也釋詁曰諏謀也程子曰採察求訪使臣之職范氏曰王者遣使於四方教之以咨諏善道將以廣聰明也所乘之馬維駒在手之六轡其鮮澤如水沾濕之乘是車馬馳驅疾行當周徧其所而詢問之以廣人君之耳目亦勉之也諏謀度詢皆訪問之意不必分咨事咨難之類我馬維騏騏解見小戎六轡如絲李氏曰如絲言調直也載馳載驅周爰咨謀我馬維駱駱解見四牡六轡沃若說文曰沃灌溉也補傳曰沃潤澤也今曰猶如濡也載馳載驅周爰咨度音鐸我馬維駰音因傳曰隂白雜毛曰駰駰詳解見駉六轡既均傳曰均調也載馳載驅周爰咨詢音荀皇皇者華五章章四句常棣音弟燕兄弟也閔管蔡之失道故作常棣焉疏曰左傳富辰云昔周公弔二叔之不咸故封建親戚以藩屏周召穆公思周徳之不類故紏合宗族於成周而作詩曰常棣之華鄂不韡韡外傳云周文公之詩曰兄弟鬩于牆外禦其侮則此詩自是周公所作但召穆公虎見厲王之時兄弟恩疏重歌此周公所作之詩以規之耳故鄭答趙商云凡賦詩者或造篇或誦古朱氏曰文武之際固有燕兄弟之詩矣周公以管蔡之爲亂也故制作之際更爲是詩委曲致意以申兄弟之好蓋燕兄弟者文武之政而閔管蔡者周公之心也夫燕兄弟之詩當極其和樂以篤兄弟之好而此詩専言死䘮急難之事其志切其詞哀蓋處兄弟之變孟子所謂其兄闗弓而射之則已垂涕泣而道之之義也文武燕兄弟之詩雖不可見然意其詞氣和平必異於此故序者以閔管蔡之失道發之讀此詩知後序亦有不可廢者矣常棣之華曰常棣也玉李也釋木曰唐棣栘常棣棣栘音移舍人曰唐棣一名栘常棣也一名棣郭璞曰今關西有棣𣗳子如櫻桃可食程子曰今玉李也華鄂相承甚力李氏曰何彼穠矣言唐棣之華與論語所舉偏其反而則爾雅所謂栘也此常棣與采薇言維常之華則爾雅所謂棣也鄂不韡韡鄂音諤韡音偉箋曰承華者曰鄂疏曰鄂比於弟華比於兄錢氏曰鄂與蕚同傳曰韡韡光明也凡今之人范氏曰言舉世之人也莫如兄弟興也玉李其華繁宻其鄂豈不韡韡然光明乎華以覆鄂鄂以承華華鄂相承覆而光明猶兄弟相承覆而榮顯也凡今之人與我交接者皆莫如兄弟之至親也凡今之人總言下文朋友妻子也一章發端姑言兄弟之常而辭氣抑揚之間已有感歎不盡之意其斯周公之心乎死喪之威傳曰威畏也兄弟孔懷傳曰懐思也原隰裒矣裒薄侯反傳曰裒聚也王氏曰不得保其常居患難之時也兄弟求矣一章以華鄂相輝喻兄弟之求顯姑以安樂之時言之既而斷以凡人皆不如兄弟則安樂之時未足以見其情之切至於是二章以下皆以死喪急難之事驗之死喪可畏怖之事他人未必相念維兄弟甚相思念也方困窮流離羣聚於原野之時維兄弟則相求以相依也詩記曰䟽其所親而親其所䟽此失其本心者也故此詩反覆言朋友之不如兄弟蓋示之以親䟽之分使之反循其本也本心既得則由親及䟽秩然有序兄弟之親既篤而朋友之義亦厚矣初非薄於朋友也苟雜施而不孫雖曰厚於朋友如無源之水朝滿夕除胡可保哉脊令在原令音零曰脊令雪姑也釋鳥曰䳭鴒雝渠郭璞曰雀屬也飛則鳴行則摇陸璣曰大如鷃雀長脚長尾尖喙背上青灰色腹下白頸下黒如連錢故杜陽人謂之連錢鷃音晏山隂陸氏曰義訓云䳭鴒錢母物相感志云俗呼雪姑其色蒼白似雪鳴則天當大雪極爲驗矣程子曰言䳭鴒首尾相應兄弟急難之際其相應如是也兄弟急難如字又去聲每有良朋況也永歎平聲又去聲傳曰況兹也脊令飛則鳴行則摇在原者是其行時也非在原不見其行故以在原言之脊令行而在原則摇其身首尾相應如兄弟急難相救也世以手足喻兄弟亦謂如左右手之相救一體同氣天性自然至親至切之喻也每猶凡也當急難之時凡有良朋於此長歎而已未必能相救也李氏曰林回云彼以利合此以天屬也夫以利合者廹窮禍患害相棄也以天屬者廹窮禍患害相収也小宛取義在於飛則鳴故曰題彼脊令載飛載鳴此詩取義在於行則摇故曰脊令在原程子以爲脊令首尾相應是也鄭氏以爲水鳥宜在水中在原則失其常處故飛鳴以求其類非也今雪姑非水中之鳥若失其常處而飛鳴以求其類凡鳥皆然何獨脊令哉兄弟䦧于牆䦧許歴反傳曰䦧狠也外禦其務如字讀者又音侮今曰禦止也務猶事也箋曰訓誨也每有良朋烝也無戎曹氏曰烝衆也傳曰戎相也相去聲兄弟或不相得鬬狠於牆内非令兄弟也然有他人來侵侮之則同心以外禦爲務不以小忿而敗親也當他人侵侮之時良朋雖衆然無相助者言兄弟之不令者猶勝朋友之良者也朱氏曰此章正爲管蔡啟商之事而發以明兄弟恩情之篤也喪亂既平既安且寧雖有兄弟不如友生情義之輕重當於死生患難之時觀之若喪亂既平安寧無事之時則以爲兄弟不如友生矣何不於死喪患難之時觀之乎或謂友生約我以禮義兄弟所不如非此詩重兄弟之意或曰及其安寧乃謂兄弟不如友生可乎文意不順儐爾籩豆儐音鬢傳曰儐陳也飲酒之飫飫之去聲蘇氏曰飫饜也兄弟既具和樂且孺樂音洛程子曰孺親慕之義小兒親慕父母謂之孺子生患難之時惟兄弟義重則平安之時不可忘兄弟也宜燕兄弟以親睦之儐陳爾之籩豆飲酒至於饜飫兄弟具集和樂而相親慕也妻子好合好去聲如鼔瑟琴兄弟既翕傳曰翕合也和樂且湛音耽鹿鳴傳曰湛樂之久也薄俗多知妻子之愛而忘兄弟之重故言爾於妻子好合和睦如鼓瑟琴其聲相應然必兄弟翕合相聚然後其樂湛久也兄弟不相合而唯樂其妻子其樂淺矣宜爾室家樂爾妻帑音奴依字吐蕩反經典通爲妻帑字傳曰帑子也是究是圖亶其然乎傳曰亶信也承上章之文言爾能與兄弟翕合則可以宜爾之室家樂爾之妻帑爾試窮究之圖謀之庶幾信吾之言乎蓋必深長思之而後以吾言爲然也家室言妻帑所在妻帑即室家之人也此詩専以死喪急難之事明兄弟恩義之至切雖朋友妻子皆不如兄弟之重八章之中勤拳反覆蓋周公處兄弟之變其事雖已往而懇切哀傷之心其痛猶未定也詩中雖不言管蔡之事而閔管蔡之心惻然溢於言辭之表矣坡詩云周公與管蔡恨不茅三間此最說得周公之心出常棣八章章四句伐木燕朋友故舊也自天子至于庶人未有不須友以成者親親以睦友賢不棄不遺故舊則民德歸厚矣後序之言無害於理而以說此詩則支離矣伐木丁丁陟耕反音近争劉氏曰丁丁聲相應也鳥鳴嚶嚶音嬰箋曰嚶嚶兩鳥聲也出自幽谷傳曰幽深也遷于喬木傳曰喬高也嚶其鳴矣求其友聲箋曰遷處高木者呼其尚在深谷者相彼鳥矣相去聲箋曰相視也猶求友聲矧伊人矣傳曰矧況也不求友生神之聽之終和且平程子曰和謂相好今曰平謂不争興也山中伐木其聲丁丁然相應是與人共伐之有朋友之義焉鳥在木上聞伐木之聲則嚶嚶然驚鳴而飛自深谷之中遷徙于他木之上其驚飛倉卒之際猶不忘其類作求其友之聲喻朋友相求相援也視彼鳥之無知尚作求友之聲況以人而不求友生乎神聽聞之言吾儕相與爲友當終久相與和平也伐木許許音虎朱氏曰許許衆人共力之聲淮南子云舉大木者呼邪許蓋舉重勸力之歌也釃酒有藇釃音師藇徐之上濁傳曰以筐曰釃以藪曰湑藇美貎䟽曰筐竹器也藪草也漉酒者或用筐或用草用草者用茅也僖四年左傳云爾貢包茅不入王祭不供無以縮酒是也既有肥羜音紵除之上濁傳曰羜未成羊也郭璞曰今俗呼五月羔爲羜以速諸父箋曰速召也朱氏曰諸父朋友之同姓而尊者傳曰天子謂同姓諸侯諸侯謂同姓大夫皆曰父異姓則稱舅䟽曰禮記注云稱之以父與舅親親之辭也長曰伯少曰叔天子稱朝廷公卿則無文蓋依諸侯之例寧適不來微我弗顧傳曰微無也箋曰顧念也於粲灑埽於如字舊音烏灑緦之上埽音譟傳曰粲鮮明貎陳饋八簋饋音匱簋音軌簋解見權輿曹氏曰八簋言其盛也正義以爲周官掌客云五等諸侯簋皆十二又公食大夫禮用六簋毛云天子八簋者據待族人設食之禮而言耳然序云朋友故舊何止族人此乃文王詩其事猶在商世周禮皆出於周公制作以後豈得拘以爲制哉既有肥牡䟽曰肥羜之牡以速諸舅寧適不來㣲我有咎傳曰咎過也上章以伐木共事爲朋友之義故下章每言伐木以題之言伐木者衆人共力其聲許許然有朋友相資之義也以筐釃酒而去其糟其酒藇然而美又有肥羜以召同姓朋友曰諸父者而燕樂之寧使彼適然有故而不來無使言我不顧念也於是粲然鮮明灑埽其室庭陳其飲食有八簋之盛又有肥牡以召異姓朋友曰諸舅而燕樂之寧使彼適然有故而不來無使我有過咎也伐木于阪音返阪解見東門之墠釃酒有衍上去二音今曰衍水溢也言酒之滿籩豆有踐解見伐柯兄弟無遠上去二音朱氏曰兄弟朋友之同儕者民之失德乾餱以愆餱音侯字亦作糇今曰餱乾食也公劉乃裹餱糧王制乾豆注云乾謂腊之以爲豆實䟽云豆實非脯而云乾者謂作醢及臡先乾其肉腊音昔臡音泥有酒湑我湑須之上傳曰湑莤之也莤音縮釋文曰與左傳縮酒同義謂以茅泲之而去其糟泲音濟子禮反今曰即毛氏上文以藪曰湑也無酒酤我酤鄭音沽又音顧毛音户箋曰酤買也䟽曰論語酤酒市脯不食坎坎鼓我宛丘傳曰坎坎擊鼓聲蹲蹲舞我蹲音逡傳曰蹲蹲舞貎迨我暇矣箋曰迨及也飲此湑矣釃酒有衍而滿籩豆有踐而成行列朋友同儕曰兄弟者無有䟽遠皆使召之而與之燕也民之失德者不能厚朋友故舊之禮或因乾餱之食不分於人以𫉬愆過此可爲戒故我命有司設燕者曰有酒則爲我以茅莤之無酒則爲我酤買之非必無酒設言縱使無酒猶當酤之篤於朋友不以有無爲辭也下文言飲此湑知不待酤也又令鼓人坎坎然爲我擊鼓又令舞人蹲蹲然爲我興舞今正及我閒暇矣與朋友飲此所湑之酒也當燕飲之時言此者見恩厚之意常存前此特未得暇耳示殷勤也此言無酒設言之耳前漢食貨志羲和魯匡言承平之世酒酤在官和㫖便人非經意也一詩之内凡言我皆燕朋友者自我也曰微我有咎微我弗顧迨我暇矣及湑我酤我鼔我舞我皆同鄭氏以爲族人陳王之恩則是臣答君之辭非君燕臣之辭矣君燕臣之樂歌但當述已待臣之意不當述其臣感已之辭也伐木三章章十二句毛氏六章六句今從劉氏每章首言伐木是也天保下報上也君能下下以成其政今考下下本註俱去聲韻註上字音暇降也自上而下也下字遐之上濁底也元在物下也然上濁讀爲去聲臣能歸美以報其上焉箋曰下下讀鹿鳴至伐木皆君所以下臣也臣亦歸美於上以答其歌蘇氏曰人君以鹿鳴以下五詩宴其羣臣天保者豈以答是五詩於其燕也皆用之歟此報上之樂歌也謂答上篇五詩以相成也天保定爾箋曰保安也朱氏曰爾指君也亦孔之固傳曰固堅也俾爾單厚單鄭音丹毛音亶今曰俾爾猶卷阿言俾爾彌爾性箋曰單盡也何福不除音筯程子曰除有消去之義其受之也皆若消去而未嘗有朱氏曰除舊而生新也俾爾多益補傳曰曰厚亦取厚下之意曰益亦取益下之意以莫不庶箋曰莫無也傳曰庶衆也天下無德外之福故詩人祝君以福必本之以德言天安定爾位亦甚堅固矣使爾每事盡厚則何等福不消受也使爾多行利益則民物無不蕃庶也厚謂忠厚益謂利益於民損上益下則益矣損下益上則損矣民物蕃庶即君之大福也此詩曰厚曰益曰榖皆以俾爾言之祝君之德也曰除曰庶曰宜曰興曰增皆以無不莫不言之祝君之福也俾爾單厚則欲其每事皆厚俾爾多益則欲其每事皆益俾爾戩榖則欲其每事皆善謂有一之未厚未益未善則不足爲君德之全歸美之中有責難者寓若盡以爲言福禄則全篇皆容悅之辭豈古者君臣相與之義邪凡詩人頌福多兼德言之天保定爾俾爾戩榖戩音剪朱氏曰戩與剪同盡也榖善也言盡善云者猶其曰單厚多益也罄無不宜傳曰罄盡也受天百禄降爾遐福傳曰遐遠也維日不足使爾盡善則無所不宜宜君宜王宜民宜人宜兄宜弟無所不順也故能受天之百禄降爾以遐遠之福滿招損謙受益故福禄雖盛而不自止足所謂吉人爲善維日不足也天保定爾以莫不興如山如阜如岡如陵釋地曰高平曰陸大陸曰阜大阜曰陵如川之方至以莫不增上言福除矣庶矣宜矣此又欲其福之興興言興盛也如山之高矣又復如山脊之岡則愈高矣如阜之大矣又復如大阜之陵則愈大矣此所謂興也山阜岡陵猶有定體故又欲其福之增增言加益也川本源深流長而方至則又盛長之初其增不可量也吉蠲爲饎蠲音鵑饎音熾傳曰吉善也蠲潔也饎飲酒也是用孝享傳曰享獻也禴祠烝嘗禴音藥䟽曰自殷以上則禴禘烝嘗王制文也至周則去夏禘之名以春禴當之更名春曰祠曹氏曰此詩云禴祠烝嘗蓋追作於成王世耳于公先王箋曰先公謂后稷至諸􅉦􅉦音籌又音舟䟽曰文王時祭所及先公不過祖紺亞圉后稷而已言后稷至諸􅉦者廣舉先公之數不謂祭盡及先公也紺音贛朱氏曰先王謂大王以下也文王時周未有曰先王者此詩非武王時作則或周公所更定者歟君曰卜爾今曰君即先公先王也朱氏曰卜猶期也錢氏曰前知也萬壽無疆吉善蠲潔以爲酒食是用致其孝敬之心以獻享之夏禴春祠冬烝秋嘗以四時祭於先公先王也先公先王言其爾得萬壽無窮之福此謂嘏辭也神之弔矣弔音的傳曰弔至也詒爾多福詒音移傳曰詒遺也遺音位民之質矣程子曰質實也日用飲食羣黎百姓箋曰黎衆也李氏曰羣黎百姓當以爲民徧爲爾德此章承上章祭祀言神以來至矣遺爾君以多福民皆質實矣智巧不生日用飲食而已故羣衆百姓皆爲爾德淳質則近德機巧則近賊也上既曰民下復曰羣黎百姓申廣言之見無一民之不爲爾德也德者民心之所自有而曰徧爲爾德者民因君而全其天則民心之天與君心之天更無差别故民之德皆君之德猶曰莫匪爾極也如月之恒音衡胡登反舊亦作縆古鄧反今不從今曰恒常也久也如日之升如南山之壽今曰終南山也考見秦終南不騫不崩騫音愆傳曰騫虧也如松柏之茂無不爾或承前既言其福興矣增矣此又欲其永久日月南山松柏皆永久之物也然月盈則虧如月之恒欲其常盈而無虧也日中則昃如日之升言其方升而未昃也日月猶有虧昃又如終南山之壽不騫虧不傾壞則可謂堅固矣然人君之福非享之一身而已又如松柏之茂無不承其庇覆者則天地鬼神山川羣臣百姓草木禽獸無不賴之毛鄭以恒爲上弦今考恒字無弦義唯絙字訓弦索亦作縆音亘古鄧反恒與絙其字與音義皆不同易恒卦止爲常久之義天保六章章六句采薇遣戍役也箋曰戍守也文王之時西有昆夷之患北有玁狁之難玁狁音險允難去聲箋曰玁狁今匈奴也以天子之命命將率將去聲率衰之去箋曰天子殷王也遣戍役以守衞中國故歌采薇以遣之出車以勞還勞去聲還音旋杕杜以勤歸也杕音第程子曰上能察其情則雖勞而不怨雖憂而能勵矣范氏曰予於采薇見先王以人道使人後世則牛羊而已矣采薇出車杕杜諸詩周之所以興也漸漸之石苕之華何草不黃諸詩周之所以衰也言遣戍役者主師衆言之其實遣將率戍役同歌采薇併將率遣之故詩中兼言君子小人也三詩述其往返始終之辭大略相似但采薇是遣之之始預道其勞苦而因以勉之出車杕杜則述其已事之勞而慰之耳采薇采薇薇解見草蟲䟽曰二月時薇亦作止傳曰作生也錢氏曰起也薇始生也曰歸曰歸嵗亦莫止莫音暮箋曰莫晚也丁寧歸期定其心也嵗莫解見唐蟋蟀䟽曰出車云春日遲遲薄言還歸則此戍役以明年之春始得歸矣期云嵗莫莫實未歸錢氏曰嵗莫則念歸人情之常靡室靡家玁狁之故不遑啟居解見四牡不遑啟處玁狁之故總遣將士設爲將士自道之言曰我今從戍正是春月采取薇菜之時其薇菜亦已作而生矣曰何時歸乎曰何時歸乎連言之者念歸之切自計當在嵗晚也雖託爲軍士自計之辭亦因示歸期以安其心也男有室女有家今男不得以室爲室女不得以家爲家述其情思也又不暇啓居述其勞苦也皆以玁狁之故言不得已而用兵非上之人毒我也此以義曉之而託於軍士之自道若其心之已諭耳程子曰毒民不由乎上則人懷敵愾之心矣補傳曰西漢志謂懿王時戎狄交侵中國被其苦詩人歌之曰靡室靡家玁狁之故謂懿王時重歌此詩以勞士卒耳采薇采薇薇亦柔止程子曰始長而柔曰歸曰歸心亦憂止憂心烈烈今曰如火烈烈言内熱也載饑載渇箋曰載則也我戍未定靡使歸聘傳曰聘問也遣戍之時薇始生其後薇始長而柔脆則可食矣感時物之變念歸而憂憂心烈烈而内熱重以饑渇勞苦甚矣我戍守之事未得安定無人可使歸問其家之安否將率受命之日則忘其家託爲將士自道之辭而勉之以義也采薇采薇薇亦剛止曹氏曰薇剛則老硬不可食矣曰歸曰歸嵗亦陽止箋曰十月爲陽時坤用事嫌於無陽故名此月爲陽王事靡盬不遑啟處憂心孔疚音究傳曰疚病也我行不來箋曰來猶反也薇始長而柔今又剛矣十月爲陽歸期當在十月之後即上章所言嵗莫也十月以後至十二月皆可稱嵗莫憂心雖甚病而我之役未可以歸亦託於其自道而勉之也十一月一陽生十月新陽胎萌故曰陽月猶四月莠葽以物成於隂而四月微隂胎萌故也彼爾維何爾乃禮反傳曰爾華盛貎維常之華傳曰常常棣也解見常棣彼路斯何王氏曰路戎路也君子之車箋曰君子謂將率戎車既駕戎車解見六月四牡業業烝民箋曰業業動也今曰動而不息之意有考見雲漢豈敢定居一月三捷傳曰捷勝也程子曰言速也彼爾然而華盛者維何木之華乎維是常棣之華也彼路車者斯何人之車乎維是君子將率之車也此詩兼遣將率故以常棣之華喻君子車飾之盛君子既駕此戎車以出征而四牡之馬業業然動而不息豈敢安居乎其心自期一月之間三戰而三捷耳此託於將士自期之辭以勉其立功之速也駕彼四牡四牡騤騤音葵今曰𫝊於此云騤騤彊也於桑柔云不息也經四牡騤騤凡四出今皆以爲不息君子所依程子曰依止也朱氏曰猶乘也小人所腓音肥箋曰小人戍役也程子曰腓從動之義今曰腓足肚也易咸卦咸其腓如足之腓身動則随而動也四牡翼翼錢氏曰翼翼整肅貌象弭魚服弭音敉傳曰象弭弓反末也箋曰弭以象骨爲之以助御者解轡紒宜滑也服矢服也紒音計又音結䟽曰弭者弓弰之名是弓之末弭弛之則反曲故云弓反末也繩索有結用以解之故曰所以解紒也左傳云歸夫人魚軒服䖍云魚獸名則魚皮又可以飾車也弰音梢陸璣曰魚獸似猪東海有之豈不日戒玁狁孔􅁄箋曰􅁄急也駕彼四牡其四牡騤騤然不息此戎車者將率之所依止戍卒之所從動帥乘輯睦可知矣遣將率戍役同歌是詩故以君子小人兼言之又四牡翼翼然整肅其弓弰曰弭以象骨爲之其矢服以魚獸之皮爲之軍既閑習器械又備於時將士豈不日相警戒乎玁狁之難甚急不可不討也亦託於將士自道之辭而因以警勑之昔我往矣楊柳依依傳曰楊栁蒲栁也栁解見秦車鄰錢氏曰依依栁柔弱之貌今我來思李氏曰思語辭也雨雪霏霏雨音諭霏音妃傳曰霏霏甚也釋文曰雨雪貌行道遲遲傳曰遲遲長逺也載渴載饑我心傷悲莫知我哀言昔我往征戍之時蒲柳依依然柔弱即首章所言采薇之時也今我來歸遇雪下霏霏然即首章所言嵗亦莫止也首尾申言之亦丁寧以安其心也此言霏霏想像而預言之耳我行道遲遲然長遠又困於饑渴我心甚傷悲矣莫有知我之哀苦者文王遣戍而言莫知其勞苦乃所以深言其知之也傳曰君子能盡人之情故人忘其死采薇六章章八句出車勞還率也勞去聲還音旋率衰之去餘同箋曰遣將率及戍役同歌同時欲其同心反而勞之異歌異日殊尊卑也禮記云賜君子小人不同日程子曰此詩所賦自受命至還歸其事有序大要在歸功將率采薇方遣行之初而預道其將來之勞苦見深體之心也出車杕杜當還歸之後而追述其已往之勞苦示不忘之意也我出我車于彼牧矣釋地曰郊外曰牧自天子所王氏曰天子紂也董氏曰文王爲西伯雖得専征必以王命行之謂我來矣召彼僕夫傳曰僕夫御夫也謂之載矣王事多難去聲維其棘矣箋曰􅁄急也文王命南仲伐昆夷玁狁成功而還述其始事以勞之託爲將率自道之辭言我駕出我之戎車往彼郊外之牧地者蓋有人來自商王之所命我爲此行也我是以召御車僕夫令使裝載而往也興師出於王命名正言順矣非文王之私也王事多難昆夷玁狁並起爲患其𫝑甚急非生事好功也將率可謂能體國矣一章述其前時之忠敬以慰勞之也我出我車于彼郊矣李氏曰郊與牧義同設此旐矣傳曰龜蛇曰旐䟽曰此及下傳鳥隼曰旟交龍爲旂皆春官司常文也建彼旄矣傳曰旄干旄朱氏曰建立也箋曰建之戎車䟽曰旄在地巳屬之於干旄言建旐亦同建之也彼旟旐斯旟解見􅅠干旄朱氏曰鳥隼龜蛇曲禮所謂前朱雀而後𤣥武也楊氏曰師行之法四方之星各随其方以爲左右前後進退有度各司其局則士無失伍離次矣補傳曰至周官則建此各有等今並建之意商以前用此法耳胡不旆旆音佩朱氏曰旆旆飛揚之貎董氏曰禮云德車結旌武車綏旌綏謂垂舒之也綏耳佳反憂心悄悄鍬之上邶柏舟傳曰悄悄憂貌僕夫況瘁音萃箋曰況兹也瘁憔悴也設爲將率之辭言我出車往彼郊地之時人競於趨事或設旐於干或建旄於車車上載干干上設旐干首有旄旄旐互言之耳言此旐彼旄見一時並設也彼旟與旐何有不旆旆然飛揚者乎言皆旆旆然飛揚軍容甚張也軍容雖甚張然臨事而懼故憂心悄悄然僕夫左右之人亦爲之憔悴則將率可知矣二章述其前時之戒懼以慰勞之也繼旐曰旆旐以全帛爲之續旐末爲燕尾者名之爲旆言旆之本體也左傳建而不旆言張旆也此胡不旆旆乃飛揚之貌生民荏菽旆旆亦揚起也王命南仲傳曰王殷王也南仲文王之屬往城于方傳曰方朔方近玁狁之國也䟽曰朔方地名朱氏曰今靈夏州西夏所據之地曹氏曰即六月所爲侵鎬及方是也出車彭彭音棚今曰經中唯載驅行人彭彭必旁反音如邦自餘彭彭皆如字出車詩出車彭彭傳云馬貌蘇氏曰壯盛北山四牡彭彭傳云不得息大明駟騵彭彭䟽云强盛烝民四牡彭彭無傳箋云行貌韓奕百両彭彭無傳無箋駧以車彭彭傳云有力有容其說不一然不得息即行之意行而不息亦由壯盛其意一也旂旐央央如字又音英傳曰交龍爲旂央央鮮明也朱氏曰交龍爲旂所謂青龍也補傳曰所謂旌旗動色武夫生氣也天子命我城彼朔方程子曰禦戎狄之道守備爲本不以攻戰爲先也赫赫南仲程子曰赫赫德名顯盛也玁狁于襄如字或作攘傳曰襄除也今曰如不可襄也之襄文王以殷王之命命南仲爲將往築城於朔方名正順氣𫝑增倍故南仲出車彭彭然壯盛其旂與旄央央然鮮明乃稱王命以令衆曰天子命我來築城於朔方也師直爲壯矣朔方之地爲玁狁所侵軼今王命南仲驅去玁狁以城之而已不事窮蹙之也赫赫然顯盛之南仲能除玁狁而驅之出境述其功也三章述其前事之奮揚以慰勞之也詩記曰兵事以哀敬爲本而所尚則威二章之戒懼三章之奮揚並行而不相悖也昔我往矣黍稷方華箋曰朔方之地六月時也䟽曰曰方生華也曹氏曰復以六月自北徂西而伐西戎也今我來思李氏曰思語辭也雨雪載塗雨音諭𫝊曰塗凍釋也王事多難去聲不遑啓居解見四牡豈不懷歸畏此簡書傳曰簡書戒命也鄰國有急以簡書相告則奔命救之䟽曰古者無紙有事則書之於簡謂之簡書長樂劉氏曰謂王命載之以竹簡也采薇首章言玁狁之故則遣戍専爲玁狁此詩不及戰事而言玁狁于襄是玁狁不待戰而自遁北方已定矣既而西戎復興於是以簡書就命南仲移師伐西戎此章述南仲承命西伐之事也言我昔自朔方而往伐西戎當黍稷方華六月之時也今我自伐西戎歸而在道雪落釋爲塗泥春初之時也初謂止伐玁狁期於嵗莫可以畢事而歸因有西伐之命遂致遷延春初猶在道也往返道路如此之久蓋以王事多危難不暇啓處我心豈不思歸乎畏此告急之簡書故奔命相救不得還也簡書謂移師西伐之命也采薇言往自周北戍之時也此言往自朔方西伐之時也采薇言來初期歸時也此詩言來自西戎歸而在道之時也下章言春乃至家耳喓喓草蟲喓音腰趯趯阜螽趯音剔螽音終解並見召南草蟲朱氏曰此章言其室家相望之情也未見君子箋曰君子斥南仲也憂心忡忡音充擊鼔䟽曰忡忡爲憂之意既見君子我心則降戸江反箋曰降下也赫赫南仲薄伐西戎當南仲出征在外之時其室家思望之喓喓草蟲六句與召南義同既見君子亦望其歸之辭也故曰此赫赫然顯盛之南仲伐西戎而未歸也此章鄭氏以爲近西戎之諸侯望王師之至然上章述已伐西戎歸而在道此章覆說未至西戎諸侯望之則其言無倫序當從朱氏春日遲遲卉木萋萋卉音諱韻又音毁傳曰卉草也䟽曰萋萋茂美也倉庚喈喈音皆采蘩祁祁曰蘩白蒿也蘩解見采蘩祁祁考見七月執訊𫉬醜程子曰訊問也其魁首當訊問者箋曰醜衆也今曰醜謂徒黨來降者薄言還歸還音旋赫赫南仲玁狁于夷傳曰夷平也箋曰時亦伐西戎獨言平玁狁者玁狁大故以爲始以爲終上章言其未歸也室家望之此章言其既歸也室家喜之春初在道春深乃至故言春日遲遲然陽氣舒緩草木萋萋然茂美黄鸝喈喈然和鳴采蘩以生蠶者祁祁然衆多於此之時執其魁首之可問者又𫉬其醜衆之降服者乃赫赫然顯盛之南仲平玁狁而還歸也叙景物之暄妍稱將率之功伐皆喜而道之也蘩以生蠶婦人之事述其所見知爲室家之言也獨言玁狁不言西戎者舉出師所主也采􅉮不戰亦言執訊𫉬醜此詩亦不戰而言之也出車六章章八句杕杜勞還役也勞去聲還音旋范氏曰出車勞率故美其功杕杜勞衆故極其情先王以已之心爲人之心故能曲盡其情民忘其死以忠於上也此詩首末皆序其室家思望之情以勞之也有杕之杜曰杜赤棠也解見唐杕杜有睆其實睆還之上濁傳曰睆實貌吕氏曰杜之有實秋冬之交也王事靡盬繼嗣我日日月陽止陽解見采薇女心傷止征夫遑止興之不兼比者也戍役來歸追述未還之時室家思望之情以勞之示上之知其勞也言杕然特生之杜有睆然之實是秋冬之交婦人感時物之變而思其君子之未得歸故言王事不可不堅固我征夫行役以日繼日無有休息之期以至日月陽止嵗將莫矣婦人之心憂傷矣征夫閒暇可歸矣望之之辭也言日月陽止者以采薇遣戍之初期以嵗亦陽止而歸也有杕之杜其葉萋萋丘氏曰萋萋新葉王事靡盬我心傷悲卉木萋止女心悲止征夫歸止杕杜萋萋然生新葉則春又將莫矣自秋冬之交即望其歸既而嵗莫不至爽初期矣今至春莫猶以王事之故而使我心傷悲也草木皆萋然有葉矣女心傷悲矣征夫可以歸矣亦望之之辭也陟彼北山言采其把今曰枸杞也三把考見四牡王事靡盬憂我父母丘氏曰君子之父母也檀車幝幝音闡傳曰幝幝敝貌四牡痯痯音管傳曰痯痯罷貌罷音皮征夫不遠北山之枸杞可采而食則春莫矣時物之變如此而君子久役未歸以王事不可不堅固至貽我父母之憂檀車幝幝然而敝四牡痯痯然而疲征夫不遠而當歸也亦望之之辭鄭云杞非常菜也孔氏云杞木本非食菜皆不明言其爲何物以采言之當是枸杞吕氏朱氏以爲春莫杞可食杞之可食者惟枸杞也婦以事舅姑爲職汝墳勉其夫以正則曰父母孔邇蓋謂不必憂家也此詩望其夫之歸則曰憂我父母蓋謂父母思之當早歸也汝墳則下之人明其義此詩則上之人體其情各盡其道也匪載匪來憂心孔疚期逝不至傳曰逝往也䟽曰往過也而多爲恤傳曰恤憂也卜筮偕止箋曰偕俱也㑹言近止征夫邇止庶幾其歸且不遠矣既而車則不装載人則不來歸所以憂心甚病也約歸之期已過而猶不至使我多爲憂恤矣本期嵗莫則歸而春深猶未至是其期已過也於是或卜之龜或筮之蓍二者皆占問之其言㑹合皆云近矣則庶幾征夫之歸近矣此詩四章皆不言戍役來歸之事唯述其未歸之時室家思望之切如此則今日之歸其喜樂爲何如也所以慰勞之也杕杜四章章七句魚麗音离美萬物盛多能備禮也文武以天保以上治内采薇以下治外始於憂勤終於逸樂音洛故美萬物盛多可以告於神明矣告音梏朱氏曰此燕饗通用之樂歌極道物多且盛見主人禮意之勤以優賔也文武無逸樂之事逸樂亦非文武之心所謂終於逸樂後序衍說也開後世人主怠政之漸矣或曰始終通言周興之本末始於憂勤言其初創造之艱難也終於逸樂言其效謂其後功成治定遺後人以太平也所謂既醉太平鳬鷖守成皆成王之事而文武憂勤之效也文武之時頌聲未作此詩燕饗之樂歌非告神明之詩而曰可以告亦要其後而言之耳然周公戒成王以無皇耽樂是人主雖當逸樂之時不可有逸樂之心況治未及成周者可不兢兢業業乎䟽曰時雖太平猶非政洽頌聲未興未可以告神明但美而欲許之故云可以可以告神明猶言頌聲可作耳此非告神明之詩也文王之風終於騶虞序以爲王道成則近於雅矣文武之雅終於魚麗序以爲近於頌矣程子曰六月序云魚麗廢則法度缺矣物不足則不能備法度也曹氏曰物之生於最多者莫如魚故牧人之夢以衆維魚矣爲豐年之兆魚麗于罶音栁傳曰麗歴也罶曲梁也寡婦之笱也䟽曰曲薄也以薄爲魚笱其功易成故號之寡婦笱耳非寡婦所作也今曰周勃傳織薄曲師古注葦薄爲曲也鱨鯊音嘗沙傳曰鱨揚也鯊鮀也鮀音駝郭璞曰鯊今吹沙也陸璣曰鱨一名黄揚今黄頰魚是也似燕頭魚身形厚而大長頰骨正黄魚之大而有力解飛者鯊魚狹而小常張口吹沙故曰吹沙山隂陸氏曰鱨今黄鱨魚也性浮而善飛躍故一曰揚也鯊性沈大如指狹圓而長有墨㸃文常沙中行亦於沙中乳子故張衡云縣淵沈之鯊鰡也字指云鰡鯊屬異物志云吹沙長三寸許背上有刺螫人海物異名記云鯊似鯽而狹小鰡音留見張平子歸田賦君子有酒句舊以君子有酒㫖爲句今從朱氏䟽曰君子指武王㫖且多箋曰㫖美也魚麗于罶魴鱧音禮曰魴鯿也解見陳衡門釋魚曰鱧鯇鯇音睆今曰毛氏以鱧爲鮦本草云蠡一名鮦今黒鯉魚道家以爲厭者也郭璞云鱧鮦山隂陸氏云鱧今𤣥鯉與蛇通氣是郭璞陸氏皆同毛說以鱧爲今之烏鯉魚也今不從舍人云鱧名鯇陸璣云鱧鯇也似鯉頰狹而厚是舍人與陸璣皆以鱧爲今之鯇魚也今從之鮦音同又音寵亦作䱰蠡音禮君子有酒多且㫖魚麗于罶鰋鯉鰋音􅅯曰鯉似鮎也鮎音拈今曰毛氏及前儒皆以鮎釋鰋惟郭璞以鰋鮎各爲一魚鰋今􅅯額白魚也鮎别名鯷本草鮧一名鮎魚一名鯷魚是鮧鮎鯷爲一魚不言是鰋見郭璞與本草合毛傳質略當言似鮎耳本草鯉魚脊中鱗一道數至尾無大小並三十六鱗有赤鯉有白鯉有黄鯉三種君子有酒㫖且有捕魚者以寡婦笱施之水中而魚麗歴於其中者有鱨揚有鯊鮀有魴鯿有鱧鯇有似鮎之鰋有三十六鱗之鯉以六魚略言之見魚之多耳寡婦笱以薄爲之苟簡易成非工緻之器又施於水中以待魚之自至而其魚靡所不有萬物盛多可知矣君子又有酒美而且多以之行禮無不備也孔氏以鱨鯊皆爲大魚陸璣以鱨爲大魚鯊爲小魚山隂陸氏以鱨鯊皆爲小魚山隂陸氏又云鱨魚黄魴魚青鱧魚𤣥鰋魚白鯉魚赤又云鱨鯊小魚魴鱧中魚鰋鯉大魚又云鱨鯊長魚魴鱧之魚則一方一圓鰋鯉之魚則一俯一仰又鱨鯊魴其性浮鱧鰋鯉其性沈意謂五色之備而小大長短浮沈之不同也然詩人言鱨鯊魴鱧鰋鯉不過如潛頌言有鱣有鮪鰷鱨鰋鯉多著魚名以見魚之多非謂止有此六魚也此六魚一一爲之說則潛六魚豈又皆有說乎鱨鯊大小猶未有定說不必泥可也傳曰太平而後微物衆多取之有時用之有道則物莫不多矣古者不風不暴不行火草木不折不芟斧斤不入山林豺祭獸然後殺􅆩祭魚然後漁鷹隼擊然後罻羅設是以天子不合圍諸侯不掩羣大夫不麛不卵士不隱塞庶人不數􅅈􅅈必四寸然後入澤梁故山不童澤不竭鳥獸魚鼈皆得其所然暴音僕罻音畏數七欲反䟽曰風暴謂北風也芟蓋葉落而盡似芟之也皆十月也不圍之使迊恐盡物也梁止可爲防於兩邊不得當中皆隠塞迊音匝物其多矣維其嘉矣多則患其不善今既多而又嘉矣物其㫖矣維其偕矣蘇氏曰偕齊也詩記曰㫖即所謂嘉也物雖嘉㫖然陸産或不如水産之盛澤物不如山物之蕃猶未可以言偕也變嘉言㫖㫖即嘉也㫖而偕則無不美也物其有矣維其時矣有言無一或缺即所謂偕也物既偕又有適當其時然後盡善今既有而且得其時矣詩經說禮多言時魚麗維其時矣楚茨孔惠孔時頍弁爾殽既時賔之初筵以奏爾時生民胡臭亶時蓋時者適其時之宜三時不害而奉酒醴以告神魚麗楚茨生民所謂時也君子之食惟其時物不時不食頍弁賔之初筵所謂時也雖所言有廣狹皆謂適其宜也詩記曰所謂時者不専爲用之之時也苟非國家閒暇内外無故則物雖盛不能全其樂矣魚麗六章三章章四句三章章二句南陔音該今曰李善注補亡詩云陔隴也吕向云南方養萬物方此以戒養故取之爲名孝子相戒以養也養音様白華孝子之潔白也華黍時和嵗豐宜黍稷也有其義而亡其辭箋曰此三篇者鄉飲酒燕禮用焉曰笙入立于縣中奏南陔白華華黍是也孔子論詩雅頌各得其所時俱在耳篇第當在於此遭戰國及秦之世而亡之其義則與衆篇之義合編故存至毛公爲詁訓傅乃分衆篇之義各置於其篇端云又闕其亡者以見在爲數故推改什首遂通耳而下非孔子之舊縣音𤣥釋文曰此三篇蓋武王之時周公之禮用爲樂章吹笙以播其曲孔子刪定有三百一十一篇内遭戰國及秦而亡子夏序詩篇義合編故詩雖亡而義猶在也毛氏訓傳各引序魁其篇首故序存而詩亡䟽曰有其義而亡其辭此二句毛氏著之也子夏得爲立序則時未亡以六月序知次在此處也孔子之時尚在漢氏之初已亡故知戰國及秦之世而亡之也董氏以爲笙入者有聲而無詩非失亡之乃本亡也此說非也樂以人聲爲主人聲即所歌之詩也若本無其辭則無由有其義矣序本因其辭以知其義後亡其辭則惟有序所言之義存耳詩緝卷十七
