body:
  text: 詩緝卷四宋嚴粲撰谷風刺夫婦失道也衞人化其上淫於新昏而棄其舊室夫婦離絶國俗傷敗矣曰衞宣公詩桓王時朱氏曰皆述逐婦之辭也宣姜有寵而夷姜縊是以其民化之習習谷風錢氏曰習習連續不斷之貎谷風谷中之風也補傳曰谷風者由大谷而起也以隂以雨黽勉同心黽音閔粲曰黽勉猶勉彊也力所不堪心所不欲而勉彊為之皆謂之黽勉此詩言勉力耳不宜有怒采葑采菲葑音封菲音匪葑曰葑蔓菁也菘類也蔓音萬釋草曰須葑蓯蓯音總釋文曰郭璞云今菘菜也按江南有菘江北有蔓菁相似而異蔓音萬本又作蕪菁音精疏曰葑也須也蕪菁也蔓菁也葑蓯也蕘也芥也七者一物也曹氏曰本草圖經云蔓菁生北土四時俱有春食苖夏食心秋食莖冬食根北人將菘子種之北土初一年半為蕪菁菲曰菲葍類也葍音福陸璣曰莖麤葉厚而長有毛三月中蒸䰞為茹滑美可作羮爾雅謂之蒠菜今河内人謂之蓿菜䰞音煑蒠音息蓿音夙粲曰釋草云菲芴郭璞云土𤓰也釋草又云菲蒠菜郭璞云菲草生下濕地似蕪菁是郭以芴與蒠菜為二物也陸璣以為一物即菲也芴也蒠菜也土𤓰也蓿菜也五者一物也其狀似葍而非葍葍䔰也郭云根如指正白可啖芴似之芴音勿䔰音富無以下體錢氏曰凡菜茹近地之莖葉多黄腐不可食徳音莫違徳音解見假樂及爾同死興也來自大谷之風大風也桑柔詩大風有隧有空大谷盛怒之風也宋玉風賦大風盛怒於土囊之口注曰土囊谷口也又習習然連續不斷所謂終風也又隂又雨無清明開霽之意所謂曀曀其隂也皆喻其夫之暴怒無休息也我黽勉盡力於家事與爾同心爾不宜以暴怒加我如此也人之處事寧無小小違誤如葑菲常食之菜不可以其近地黄腐之莖葉遂棄其上而不采猶夫婦之間亦不當以小過而棄其善當期好音無違至於偕老今爾心有所溺而厭於我則我小有違誤無往不逢其怒是以惡而棄其善也舊説谷風為生長之風以谷為榖固已不安又以習習為和調喻夫婦和同説此詩猶可通至小雅谷風二章言維風及頽頽暴風也非和調也三章言草木萎死非生長也其説不通矣詩多以風雨喻暴亂北風其涼喻虐風雨凄凄喻亂風雨漂摇喻危大風有隧喻貪故風雅二谷風邶下文言以隂以雨喻暴怒猶終風且曀喻州吁之暴也雅下文言維風及雨喻恐懼猶後人以震風凌雨喻不安也行道遲遲中心有違不逺伊邇薄送我畿音祈芣苢傳曰薄辭也傳曰畿門内也詩記曰韓愈譴瘧鬼詩云白石為門畿蓋以畿為門閫也誰謂荼苦荼音徒傳曰荼苦菜也粲曰陸璣云生山田及澤中得霜甜脆而美顔氏家訓云荼葉似苦苣而細然則荼雖苦亦可食但非美菜耳其甘如薺齊之上濁詩記曰本草云薺味甘人取其葉作葅及羮亦佳宴爾新昏傳曰宴安也如兄如弟上章言本望與其夫偕老此章述其見棄言我行道遲遲有不忍去之意者念事與心違也故夫之送我乃不逺而甚近纔至門畿而已無恩之甚誰謂荼菜苦乎比我之見棄其情甚苦則荼猶甘如薺菜甚言已之苦也故夫安其新娶之妻其恩如兄弟以新棄舊矣經有三荼一曰苦菜二曰委葉三曰英荼此詩誰謂荼苦及唐采苓云采苦采苦緜堇荼如飴之荼皆苦菜也良耜以薅荼蓼之荼委葉也解見良耜鄭出其東門有女如荼英荼也解見出其東門鴟鴞予所捋荼傳云菼苕疏云薍之秀穗亦英荼之類薅音蒿薍頑之去聲涇以渭濁疏曰漢書地理志云涇水出今安定涇陽縣西开頭山東南至京兆陽陵入渭溝洫志云涇水一石其泥數斗潘岳西征賦云清渭濁涇开苦見反又音牽又地理志隴西首陽縣注鳥鼠同穴山在西南渭水所出東至船司空入河船司空京兆縣也詩記曰詩人多述土風此衞詩而逺引涇渭者蓋涇濁渭清天下所共知如云海鹹河淡也湜湜其沚湜音殖説文曰湜湜水清見底宴爾新昏不我屑以傳曰屑潔也朱氏曰以猶與也毋逝我梁毋音無傳曰逝之也梁魚梁疏曰毋禁辭有狐傳曰石絶水曰梁敝笱云敝笱在梁候人云維鵜在梁鴛鴦云鴛鴦在梁白華云有鶖在梁皆鳥獸所在非人所往還之處皆非橋梁矣蓋為堰以鄣水空中央承之以笱毋發我笱音茍傳曰笱捕魚竹器我躬不閱音恱傳曰閱容也遑恤我後箋曰恤憂也涇濁而渭清今涇反以渭為濁何不視渚沚之處湜湜然其清見底而誣以為濁可乎喻新昏不善而反以我為不善由夫為其所惑也今其夫安於新昏不以我為潔而與之我雖見棄猶念其家之物謂新昏毋往我魚梁毋發我魚笱既而自歎曰我身且不見容何暇憂後事乎就其深矣方之舟之方解見漢廣就其淺矣泳之游之泳解見漢廣朱氏曰浮水曰游何有何亡黽勉求之凡民有喪匍匐救之匍音蒲匐白服二音説文曰匍手行也匐伏地也棄婦陳其往時治家勤勞之事言已隨事難易皆盡心力而為之如水深則或乘方泭或乘舟船水淺則或濳行而泳或浮水而游其於家事不計其有與亡惟彊勉求為之耳不特治其家如是又周睦其鄰里鄉黨凡民有凶禍之事則匍匐以救之我於汝家可謂盡力矣不我能畜許六反傳曰畜養也反以我為讎既阻我徳賈用不售賈音古售音授韻釋曰售賣物出手也昔育恐育鞠音菊錢氏曰育養子也傳曰鞠窮也及爾顛覆音福箋曰顛覆盡力於衆事既生既育比予于毒我於汝家勤勞如此汝既不能畜養我而反以我為仇讎其心既阻絶我之善故雖勤勞如是而不見取如賣物之不售昔者生育男女惟恐生育而貧窮慮食指之衆也故與爾顛覆盡力以營家業今既生育矣乃反比我於毒螫音釋毒蟲也惡而棄之此婦人有子而被棄也我有㫖蓄傳曰㫖美也箋曰蓄聚也疏曰冬月蓄采也亦以御冬御如字徐音禦傳曰御禦也宴爾新昏以我御窮有洸有潰洸音光潰音繢傳曰洸洸武也潰潰怒也項氏曰説丈洸水涌也其勇如水涌水之潰者其勢横暴而四出故怒之盛者為潰潰考見召旻既詒我肄音異箋曰詒遺也程子曰肄習也不念昔者伊余來塈音餼韻又音暨傳曰塈息也我有㫖美之蓄菜以禦冬月乏無時也至春蔬新美則不食矣今子安爾之新昏亦但以我禦窮苦之時至於富厚則棄我矣洸洸然武潰潰然怒既遺我以暴而習以為常矣曾不念我昔者之來息時也怨其忘前日之共艱苦也舊説追言始時接禮之厚尋繹上下文意不然谷風六章章八句式微黎侯寓于衞箋曰黎侯為狄人所逐棄其國而寄於衞衞處之以二邑因安之董氏曰晉伯宗數赤狄罪曰奪黎氏地則狄侵黎其亦舊矣陳氏曰黎在上黨壺闗縣蓋衞附庸也故此二詩黎臣所作而得為衞也其臣勸以歸也曰衞宣公詩桓王時補𫝊曰以詩作於衞地故編之衞風時狄已退黎侯可以歸而不歸猶望衞之助已也其臣知衞宣之不足頼故勸以歸式微式微箋曰式發聲也胡不歸微君之故胡氏曰微不有也故猶事也李氏曰以微視之如無有也胡為乎中露粲曰中露猶中林中谷倒其辭也傳以中露泥中皆為衞邑今不從王氏曰言有霑濡之辱而不見芘覆李氏曰凡人之失國者曰越在草莽黎侯為狄所逐寓于衞而又不見禮微之又微者也故言微乎微乎君何不歸乎彼以微視吾君之事如無有矣失國大故也衞人以微視之不以吾君之事為事也無望其救患矣君何為處此露中乎言徒取霑濡之辱也式微式微胡不歸微君之躬胡為乎泥中王氏曰言有陷溺之難而不見拯救李氏曰卑賤曰辱在泥塗衞人不唯輕視吾君之事且輕視吾君之身矣何為處此泥中乎言徒取陷溺之辱也式微二章章四句旄丘旄音毛責衞伯也曰牧下二伯也狄人迫逐黎侯黎侯寓于衞衞不能脩方伯連率之職率衰之去箋曰衞爵毎稱侯今云伯者時為州伯也周之制使伯佐牧春秋傳云五侯九伯侯為牧也疏曰王制云五國以為屬屬有長十國以為連連有帥三十國以為卒卒有正二百一十國以為州州有伯殷之州長曰伯虞夏及周曰牧周謂之牧而云方伯者以一州之中為長故云方伯若牧下二伯不得云方伯也王制雖殷法周諸侯之數與殷同亦十國為連此宣公為二伯非方伯又非連率而責之者以連率屬方伯若諸侯有被侵伐者使其連屬救之宣公為州伯佐方伯不使連屬救之也知宣公非州牧而為牧下二伯者以周之州長曰牧若是當言責衞牧也黎之臣子以責於衞也曰衞宣公詩桓王時衞世家康叔之後皆稱伯至頃侯稱侯太史公以為頃侯賂周夷王夷王命衞為侯索隠非之云康誥稱命爾侯于東土又云孟侯則康叔初封已為侯也至子康伯即稱伯者謂為牧下二伯非至子即降爵為伯也旄丘之葛兮傳曰前高後下曰旄丘何誕之節兮傳曰誕闊也叔兮伯兮補傳曰叔伯尊稱也何多日也興之不兼比者也黎臣子之初至衞見旄丘之上有葛初生其節甚宻及其後也葛長而節闊故歎云何其節之闊也感寄寓之久也尊稱衞臣而問之曰叔兮伯兮何其多日而不見救也君臣一體不斥其君而責其臣婉辭也何其處也處音杵必有與也何其久也必有以也朱氏曰或有他故言何其安處而不來乎必將紏合諸侯而相與同救我也何其時之久乎意其或有他故而未暇也苟無他故何為不見救乎宛轉委曲以盡人之情也狐裘蒙戎傳曰大夫狐蒼裘朱氏曰言客久而裘敝矣粲曰左傳䝉戎作尨茸尨又音蒙杜預註云亂貌言裘之敝也如蘇秦説秦不行黒貂裘敝匪車不東叔兮伯兮靡所與同始望其有相與同救者既久而不來則姑以為有故而未暇及其終不見救也乃以情責之言我黎之臣子旅寓日久狐裘敝壊蒙戎然雜亂其藍縷之狀可見矣所寓在衞之西非不乘車而東以告于衞而衞之諸臣無與我同其憂者衞人不恤黎患謂利害不切於已耳不知夷狄無厭唇亡齒寒黎實衞之附庸利害同之衞人不思同患之義是以有熒澤之敗黎在衞西為狄所逐入衞境而寓亦在西耳故往衞則東舊説越衞國而寓于東非也𤨏兮尾兮王氏曰𤨏細也尾末也流離之子粲曰流移他處離去本國也叔兮伯兮褎如充耳褎音又傳曰褎盛服也曹氏曰漢䇿今子夫夫褎然為舉首顔師古註云褎然盛服貎箋曰充塞也言𤨏細兮尾末兮此黎之君臣乃流離遷徙之人也亦可憐矣而衞之諸臣曾不念之凡盛服則有瑱名為充耳非真塞其耳也此責其不能聽已之訴遂譏其褎然盛服如真以瑱塞其耳而無聞也至是然後盡其辭焉旄丘四章章四句簡兮刺不用賢也衞之賢者仕於伶官箋曰伶官樂官也伶氏世掌樂官而善焉故號樂官為伶官皆可以承事王者也曰衞宣公詩桓王時簡兮簡兮箋曰簡擇也方將萬舞箋曰將且也詩記曰萬舞二舞之總名也干舞者武舞之别名也籥舞者文舞之别名也文舞又謂之羽舞鄭康成據公羊傳以萬舞為干舞蓋公羊釋經之誤也春秋書萬入去籥言文武二舞俱入以仲遂之喪於二舞之中去其有聲者故去籥焉公羊乃以萬舞為武舞與籥舞對言之失經意矣若萬舞止為武舞則此詩何為獨言萬舞而不及文舞即左氏載考仲子之宫將萬焉婦人之廟亦不應獨用武舞也然則萬舞為二舞之總名明矣日之方中疏曰祭祀旦明行事不用日中此為教舞也在前上處碩人俁俁音語傳曰碩大也俁俁容貎大也公庭萬舞衞君簡擇其人方且以為萬舞而習之當日之方中在舞位之前列者有碩大之人俁俁然容貎之大在公庭而為萬舞也此人氣體充偉所養可知又在日中至明之時前列易察之地而衞君終不知其賢况在側微者乎是可刺也曹氏曰賢者在稠人之中如珠之在沙玉之在石豈難識哉有力如虎執轡如組音祖朱氏曰轡今之韁也如組解見鄭大叔于田左手執籥音藥傳曰籥六孔釋文曰以竹為之長三尺執之以舞疏曰郭璞云如笛三孔而短小廣雅云七孔鄭於笙師及少儀明堂位註皆云三孔賔之初筵云籥舞笙鼔公羊傳云籥者何籥舞是也右手秉翟音狄疏曰翟羽謂雉羽也赫如渥赭音握者傳曰赫赤貎渥厚漬也箋曰赭丹也疏曰秦終南顔如渥丹公言錫爵箋曰祭有畀煇胞翟閽者惠下之道煇音運胞音庖閽音昏疏曰皆祭統文彼又云煇者甲吏之賤者胞者肉吏之賤者註云煇周禮作韗蓋磔皮革之官周禮韗人為鼓鮑人為甲禮記是諸侯兼官故韗為甲吏也鮑音朴此章述賢者才藝之美有力如虎言其才武也執轡如組文之齊比言其藝能也賢者才藝如此今乃左手執管籥右手秉翟羽而舞文舞也此碩人容色赫然而赤如厚傅丹君徒賜其一爵而已以待賤者之道待賢也山有榛音臻陸璣曰榛栗屬也字或作蓁木有二種山隂陸氏曰實如小栗隰有苓音零傳曰下濕曰隰釋草曰蘦大苦孫炎曰今甘草也山隂陸氏曰一名國老粲曰即唐采苓也云誰之思西方美人粲曰西方西周也左傳宣公晉以隠四年即位周已東遷故思西周箋曰美人賢者詩記曰江左諸人喜言中朝名臣亦此意也彼美人兮西方之人兮興也傳不言興今從朱氏西方美人指西周之人物也彼美人兮指衞之碩人也詩人將美衞之賢者先述西周人物以擬之謂山則有榛隰則有苓山澤之生草木猶盛朝之出人物也今我所思者誰乎唯思西周之美人也人物盛衰與世道相為升降唯西周全盛之時乃有厖碩之材東遷以降則人物眇然矣下句乃美衞之賢者言彼衞國之美人真西周之人而非今世之人也西周之時乃有此人物不謂於衞之偏方下國而見之也序所謂可以承事王者也極言賢者人品之高見衞之不用可刺矣簡兮三章章六句泉水衞女思歸也嫁於諸侯父母終思歸寧而不得故作是詩以自見也見音現曰衞宣公詩桓王時箋曰國君夫人父母在則歸寧没則使大夫寧於兄弟楊氏曰思歸發乎情也其卒也不歸止乎禮義也泉水竹竿俱衞女思歸而分屬邶衞者皆采詩者隨所得之地而繫之也毖彼泉水毖音祕傳曰毖然流也吕氏曰泉水即今衞州共城之百泉也亦流于淇吕氏曰淇水出相州林慮縣東流泉水自西北來注之慮音廬疏曰三國之境地相連接故邶云亦流于淇鄘云送我乎淇之上矣衞云瞻彼淇奥三國皆言淇也曰前漢地理志云河内共國北山淇水所出東至黎陽入河林慮即河内隆慮縣改曰林慮也衞氓云送子渉淇竹竿云淇水在右有狐云在彼淇梁衞風言淇不止淇奥共音恭有懐于衞靡日不思箋曰靡無也孌彼諸姬孌音臠傳曰孌好貎諸姬同姓之女朱氏曰謂娣姪也聊與之謀箋曰聊且略之辭興也衞女思歸于衞言彼毖然而流之泉水亦流入於衞國之淇已獨不得歸于衞是泉水之不如也我之懐念於衞無日而不思矣有孌然美好同姓之娣姪聊與之謀其可歸否以其從已同來故與謀之出宿于泲擠之上傳曰泲地名曹氏曰漢地理志東郡臨邑有泲廟師古云泲即濟水字王氏曰泲禰蓋父母之國地名朱氏曰自衞來嫁所經之道飲餞于禰泥之上傳曰祖而舎軷飲酒於其側曰餞禰地名軷音跋軷解見生民女子有行曹氏曰行出適也粲曰列女傳魯寡陶嬰黄鵠歌云雖有賢雄兮終不重行逺父母兄弟逺去聲問我諸姑傳曰父之姊妹稱姑遂及伯姊粲曰姊稱伯姊猶兄稱伯兄也泲禰衞之郊也衞女思歸追念其始來嫁之時出宿于衞地之泲飲餞于衞地之禰既以出適於人則與父母兄弟相逺不復得至鄉國之地矣今父母終唯姑姊尚存問其安否感親之没而念骨肉之存者也今考衞成公後遷東郡濮陽泲屬東郡則亦衞地也禰無所見與泲竝言亦衞邑可知箋以泲禰皆為所嫁國適衞之道所經今不從不若王氏朱氏為長出宿于干飲餞于言傳曰干言所適國郊也朱氏曰適衞所經之地載脂載舝音轄疏曰載則也釋文曰舝車軸頭金也粲曰脂言塗脂也舝言設舝也離騷舉干􅋴而竝馳朱氏集註云􅋴轂内之金也一云轄也按廣韻鎋舝同釋云車軸頭鐵也韻略十五轄亦作鎋見􅋴即舝也車不駕則脫軸頭之舝將行乃設之以脂膏塗其舝使滑澤也􅋴音犬還車言邁還音旋粲曰還復返也傳曰邁行也遄臻于衞遄市専反傳曰遄疾也臻至也不瑕有害箋曰瑕猶過也干言所嫁國之郊也上章言自衞來嫁之時宿餞于衞地之泲禰此章言復欲歸衞則亦宿餞于所嫁國之干言為我塗脂為我設舝回轅而行則疾至於衞矣未為瑕過而有害也何為不可歸乎此女子纒緜之情也泲禰干言非一時宿餞之地泲禰之下以女子有行言之則為嫁時曾宿餞之地也干言之下以遄臻于衞言之則為思歸而欲宿餞之地也言向由泲禰宿餞而來嫁今豈不可由干言宿餞而歸寧乎東郡有發干縣曹氏疑即此干衞後遷東郡則亦衞地然與下文還車意不聮屬不若毛氏朱氏為長讀詩者但以載脂載舝為以脂膏塗其舝兩載字不分明載脂謂未設舝於車之時先以脂膏塗其舝其用在脂故曰載脂也載舝謂塗舝既畢乃設舝於車其用在舝故曰載舝也載脂一事載舝又一事毛氏云脂舝其車以二事言也我思肥泉傳曰所出同所歸異為肥泉補傳曰肥泉同出而異歸猶我雖出於衞而不復歸兹之永歎思須與漕音曹傳曰須曹衞邑也曹氏曰漢地理志東郡有須昌縣故須句國也句音劬粲曰漕邑鄘地也在河南有考見擊鼔我心悠悠駕言出遊以寫我憂傳曰寫除也粲曰寫謂傾而除之也曲禮云器之溉者不寫肥泉自衞而來所渡之水也故思此而長歎須與漕自衞而來所經之邑也故又悠悠然長思之安得乘車出遊於其地而可以寫除其憂乎泉水四章章六句北門刺仕不得志也言衞之忠臣不得其志爾曰衞宣公詩桓王時不得志不得行其所志也王事適我政事一埤益我蓋皆賢勞猥賤之事非諫行言聴也出自北門憂心殷殷粲曰殷殷憂之衆也終窶且貧窶渠之上濁釋言曰窶貧也李氏曰窶貧兼言之以見其貧之甚也莫知我艱已焉哉天實為之謂之何哉此忠臣行役出自北門言我心之憂殷殷然衆多我仕不得志貧而又貧誰知我逺役之艱苦者蓋從事獨賢之歎也然歸之於命故自決云已焉哉天實為之謂之何哉無所歸怨也但言其貧窶則不見知於君可知矣非計利禄也王事適我箋曰國有王命役使之事傳曰適之也政事一埤益我埤音皮錢氏曰一猶専也傳曰埤厚也我入自外室人交徧謫我謫音責傳曰謫責也已焉哉天實為之謂之何哉王命役使之事既適於我矣衞國之政事又専埤厚增益於我矣我行役自外而歸而室家之人交徧責我見其勞苦而不免於貧家人婦子之情不能無怨也然忠臣歸之於命而已夫勞而不辭貧而不怨室人交責之而不易其守非忠臣乎哉補傳曰役使不均上不見知室人交責下亦不見知是莫知我艱也王事敦我傳曰敦厚也釋文曰韓詩云迫也政事一埤遺我遺音位傳曰遺加也我入自外室人交徧摧我傳曰摧沮也已焉哉天實為之謂之何哉北門三章章七句北風刺虐也衞國竝為威虐百姓不親莫不相攜持而去焉曰衞宣公詩桓王時程子以此詩為君子見幾而作非謂百姓相攜而去也北風其涼傳曰寒涼也雨雪其雱雨音諭雱音滂粲曰自上而下曰雨傳曰雱盛貌惠而好我好去聲粲曰以恩惠相與也攜手同行其虛其邪余徐二音程子曰虛寛貎邪緩也既亟只且亟音棘只音止且音沮之平𫝊曰亟急也程子曰只且辭也興也衞之虐政如北風之寒涼而又雨下其雪雱然而盛其虐甚矣我將與所親厚之人以恩惠相好者攜手同行去而避之也是尚可少寛乎尚可少緩乎既急也哉不可不􅄩去也其虛其徐則猶有眷戀故國之意既亟只且則暴虐已甚不復可以少留矣至此而後決為去計是欲留者其本心決去者不得已也李氏曰孔子去魯曰遲遲吾行也去父母國之道也今必有大不忍於此而奪其情也北風其喈音皆𫝊曰喈疾貌雨雪其霏音非𫝊曰霏甚貎惠而好我攜手同歸𫝊曰歸有徳也其虛其邪既亟只且莫赤匪狐莫黑匪烏𫝊曰猶小弁莫高匪山莫浚匪泉惠而好我攜手同車其虛其邪既亟只且莫赤莫黑言無有赤黑於此者謂最赤最黑也最赤者非狐乎最黑者非烏乎狐也烏也皆貪殘不祥之物見其色而可知矣猶衞之無道不難辯也宜􅄩去之詩記曰同車不必指貴者特協韻耳北風三章章六句静女刺時也衞君無道疏曰衞君宣公也夫人無徳匏有苦葉箋曰夫人夷姜也曰宣公詩桓王時當時皆為淫泆之行故曰刺時其本則上所化也静女其姝音樞曹氏曰游女閭閻負販之女不暇隠屏者也故時出於江漢之上静女則仕族之女常處深閨幽静之中不可得而見者𫝊曰姝美也俟我於城隅愛而不見搔首踟蹰音馳厨粲曰踟蹰行不進也躊躇猶豫也踟蹰亦躊躇之意首章男女相期而未遂也静女仕族處深閨幽静之中宜能正潔自守者今淫風流行有静女其色姝美約我於城隅隠僻之地既而失約不至故愛之而不得見搔其首而意踟蹰然欲去不去也或謂雖正静之女亦俟我於城隅既已淫奔不得為正静矣静女其孌音臠𫝊曰孌好貎貽我彤管彤音同箋曰彤赤也李氏曰古者鍼有管樂亦有管不知彤管何物也解頥新語曰舊説古者后夫人必有女史彤管之法古以刀為筆未有用毫毛者安得有管故書謂之畫蓋以刀筆刻畫於簡至秦䝉氏始以毫毛製筆故漢以來始有竹簡寫之之説左氏所稱取彤管焉亦止取贈物之意非有取於女史也曹氏曰彤漆之管蓋樂器之屬彤管有煒音偉𫝊曰煒赤貎說懌女美此女贈男之物也静女孌然而美遺我赤色之管以結殷勤其管煒然而赤男子謂我非恱此彤管之美乃恱此女色之美也自牧歸荑音題張子曰牧牧地也不耕種之牧地則多草木根芽粲曰歸孔子豚之歸猶贈也𫝊曰荑茅之始生也洵美且異洵音荀箋曰洵信也匪女之為美美人之貽此男贈女之物報彤管之贈也來自牧地而贈此女以荑此荑信芳美而且異於常荑矣然未足以比女色之美姑以是為美人之贈耳静女三章章四句新臺刺衞宣公也納伋之妻箋曰伋宣公世子作新臺于河上而要之要音腰粲曰要勒也遮也猶孟子使數人要于路之要李氏曰宣公上烝夷姜生伋為娶於齊宣公聞其美欲納之恐其不從故於河上作新臺而要之國人惡之惡烏路反而作是詩也曰衞宣公詩桓王時二南變而為邶猶泰變為否也至新臺二子乘舟三綱五常之道盡矣新臺有泚音此徐七禮反傳曰泚鮮明貎河水瀰瀰音敉傳曰瀰瀰盛貎燕婉之求傳曰燕安也婉順也籧篨不鮮籧篨音渠除鮮上聲傳曰籧篨不能俯者戚施不能仰者釋訓曰籧篨口柔也戚施靣柔也疏曰籧篨戚施本人疾之名故晉語曰籧篨不可使俯戚施不可使仰是也但人口柔者必仰靣觀人之顔色而為辭似不能俯之人因名口柔者為籧篨靣柔者必低眉下人媚以容色似不能仰之人故名靣柔者為戚施曹氏曰説文以籧篨為麤竹席竹席之為用常仰而不能俯也箋曰鮮善也此詩齊人所作也宣公作新臺泚然鮮明在河水瀰瀰然盛之處齊女來嫁至此為公所要故齊人之送女者言我齊女之來本求燕安婉順之人謂伋也乃得此籧篨不能俯其疾不善之人謂宣公也以惡疾之人稱之深惡之辭也燕婉之求自齊人言之故以籧篨戚施醜詆衞君而無嫌非衞人之辭也新臺有洒催之上錢氏曰洒鮮潔貎河水浼浼音毎錢氏曰浼浼水濁流貎燕婉之求籧篨不殄傳曰殄絶也蘇氏曰病而不死者也惡之欲其死齊人恚怒之辭也若衞人則非所宜言矣魚網之設鴻則離之粲曰易離麗也註云麗猶著也蓋一隂附著于二陽之中燕婉之求得此戚施設魚網者宜得魚鴻反麗焉言所得非所求也猶我齊女以禮來求世子而得宣公也新臺三章章四句二子乘舟思伋夀也衞宣公之二子争相為死為去聲箋曰宣公為伋取齊女而美公奪之生夀及朔朔與其母愬伋於公令伋之齊使賊先待於隘而殺之夀知之以告伋使去之伋曰君命也不可逃夀竊其節而先往賊殺之伋至曰君命段我夀有何罪賊又殺之國人傷而思之作是詩也曰衞宣公詩桓王時衞自宣公殺伋夀以朔為世子代立是為惠公左右公子怒朔之讒殺太子伋乃作亂立黔牟惠公奔齊其後諸侯復納惠公黔牟奔周惠公怨周之容黔牟與燕伐周立子頽為王惠王奔溫及惠公卒子懿公立百姓大臣猶以殺伋之故皆不服狄乘其釁殺懿公而滅衞嗚呼衞之亂極矣父子兄弟君臣之間相戕相賊不惟流毒子孫啓侮啓狄以之殺身亡國其餘殃所漸且稔王室之禍蓋綱常道盡天地幾於傾陷矣推原亂根始於夫婦之不正袵席之禍一至此邪以是知詩首闗雎聖人之意深逺矣二子乘舟汎汎其景如字或音影願言思子箋曰願念也中心養養傳曰養養憂不知所定自衞適齊必渉河言伋夀二子乘舟渉河以適齊其影汎汎然何所歸乎為其將見殺顧其影而憐之也我念而思之中心養養然憂不知所定也伋夀之事其國人實深傷之詩人不言其他而慘然哀痛悲思之意具見矣二子乘舟汎汎其逝傳曰逝往也願言思子不瑕有害言二子汎汎然從此逝矣痛其往而不返也詩人深求其心之無他而恕之故曰不為瑕過而有害也曾子小杖則受大杖則走以二子為不瑕有害恕之之辭也王氏曰二子死非其所不得為無瑕䧟父於不義不得為無害雖然其心豈有他哉二子乘舟二章章四句詩緝卷四
