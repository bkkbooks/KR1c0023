body:
  text: 詩緝卷三十宋嚴粲撰雲漢仍叔美宣王也箋曰仍叔周大夫也春秋桓公五年天王使仍叔之子來聘宣王承厲王之烈朱氏曰烈暴虐也内有撥亂之志䟽曰何休注公羊云撥猶治也遇烖而懼側身修行去聲䟽曰側反側也憂自不安欲銷去之去上聲天下喜於王化復行復扶又反百姓見憂䟽曰百姓見被憂矜故作是詩也宣王即位初年遇旱未有施設天下已喜於王化復行者以其有憂民之心而預期之也解頥新語曰宣王興起他未及施為首以百姓為憂可謂知本矣故天下已深喜之謂其能復行王化也昔春秋之時宋大水魯使弔焉曰孤實不敬天降之災又以為君憂拜命之辱既而聞之曰公子御説之辭也臧孫達曰是宜為君有䘏民之心夫列國之公子出其言善君子謂其可以為君則宣王因旱而憂百姓王化復行何疑之有御説音禦悦倬彼雲漢倬音卓桑柔傳曰倬明大貎箋曰雲漢天河也䟽曰河精上為天漢曹氏曰或謂水氣在天為雲水象在天為漢或謂箕斗間為漢津雲出漢津謂之雲漢皆非也夫雲合散不常漢則隨天而轉漢之在天似雲而非雲故曰雲漢也史遷云漢者金之散氣其本曰水張衡云水精為漢左傳昭十七年星孛及漢梓慎云漢水祥也雨者水之施也天將雨其兆先見於漢昭回于天箋曰昭光也傳曰回轉也䟽曰水氣精光也曹氏曰天漢起于東方經尾箕之間是為漢津委蛇向西南行至七星南而没此其回旋之度也王曰於乎音嗚呼何辜今之人天降喪亂饑饉薦臻薦音荐傳曰薦重也臻至也靡神不舉箋曰靡無也靡愛斯牲曹氏曰左傳謂天災有幣無牲此諸侯之禮耳若祭法所謂祈禳於坎壇雩宗祭水旱皆用少牢天子則有牲矣宗鄭讀為禜榮敬反圭璧既卒傳曰卒盡也寧莫我聽協句平聲箋曰寧曽也宣王憂旱夜不能寐起觀天象以占雨候見倬然明大之雲漢精光回旋於天夜晴無雲則天河明未有雨候也宣王於是歎傷曰嗚呼今之人何罪乎而天降此喪亂使饑饉重至謂頻年旱也我之禱雨無有神而不舉祭之者牲玉皆所以供祭祀牲則不敢愛圭璧則用之已盡神曽莫我聴乎此詩多用寧字或訓曽或猶偏或為願辭或訓安不可執一今隨文解之旱既大甚大音泰藴隆蟲蟲王氏曰藴隆藴積隆盛䟽曰釋訓云蟲蟲熏也郭璞云旱熱熏炙人也不殄禋祀自郊徂宮箋曰宫宗廟也上下奠瘞音瘞傳曰上祭天下祭地䟽曰奠謂置之於地釋文曰瘞埋也靡神不宗箋曰宗尊也后稷不克錢氏曰克勝也上帝不臨耗斁下土斁音姤箋曰斁敗也寧丁我躬曹氏曰説文云寧願辭也傳曰丅當也天乆不雨旱既大甚矣其旱氣藴積隆盛蟲蟲然其熱熏人我為禱雨之故禋祀未甞止絶從郊而至宗廟上祭天下祭地奠其禮瘞其物無有神而不尊祀之者在宫之神莫尊於后稷非不臨顧我而力不足以勝旱災在郊之神莫尊於上帝力足以勝旱災而不肯臨顧我與其為旱以秏敗下土寧使災禍當我之身此至誠慘怛之辭也李氏曰史記宋世家熒惑守心宋之分野也景公憂之司星子韋曰可移於相景公曰相吾之股肱曰可移於民公曰君者恃民曰可移於嵗公曰嵗飢民困吾誰為君子韋曰天髙聴卑君有愛人之言三熒惑宜有動於是候之果徙三度旱既大甚則不可推吐雷反今曰不可推如孟子言王無罪嵗宋景公不欲移災於股肱之意兢兢業業傳曰兢兢恐也業業危也今曰業業危動恐懼也烝民四壮業業鄭氏以為動當為動而不息常武赫赫業業毛氏以為動當為震動可畏此詩及召旻兢兢業業長發有震且業毛氏皆以為危當為危動恐懼三説不同皆動之意如霆如雷霆解見采芑周餘黎民靡有孑遺䟽曰釋訓云孑然孤獨之貎言無有子然得遺漏而不餓病者曹氏曰説文云子無右臂曰孑言其獨也昊天上帝則不我遺䟽曰不遺留其意將欲盡殺也胡不相畏先祖于摧在雷反宣王言旱既大甚皆已不徳所致不可推其過於他人承上文寧丁我躬之意也吾心兢兢然而恐業業然而危如聞霆之奮擊雷之𤼵聲也周之民多死亡矣今所餘之衆民又將無有孑然孤獨而存者矣昊天上帝不使我有遺類何不畏先祖之業摧落乎庶天以先祖之故而矜念之也旱既大甚則不可沮音咀傳曰沮止也今曰自沮也赫赫炎炎傳曰赫赫旱氣也炎炎熱氣也云我無所大命近止大命解見蕩靡瞻靡顧羣公先正傳曰先正百辟卿士也箋曰雩祀所及者䟽曰正長也先世為官之長月令仲夏乃命百官雩祀百辟卿士有益於民者則不我助父母先祖胡寧忍予今曰寧猶偏也宣王言旱既大甚我當多方思所以救之不可自沮禱祈不應則人易以自沮而怠心生反覆此詩宣王欲銷天變之意愈堅愈鋭可謂不自沮矣旱氣赫赫然熱氣炎炎然宣王憂之之甚曰我措身無所矣大命將近謂國將亡也曽無瞻視而顧念之者古者有徳之羣公先世為官之正長凡雩祀所及者則皆不我佑助父母與先祖之靈何其偏忍於我而不見救乎旱既大甚滌滌山川滌音敵傳曰滌滌旱氣也山無木川無水䟽曰蓋以少而不茂非全無也錢氏曰洗也山無木川無水如滌之然旱魃為虐魃音䟦傳曰魃旱神也如惔如焚惔音談傳曰惔燎之也䟽曰焚燎皆火燒之名我心憚暑憂心如熏傳曰熏灼也䟽曰熏灼俱焚炙之義羣公先正則不我聞昊天上帝寧俾我遯今曰寧願辭也旱乆則山枯川竭故如滌濯然旱魃之神為此虐害如火之惔燎焚燒我心畏憚暑旱其憂心如為火所熏灼羣公先正曽不聞知而見察昊天上帝如厭棄我則寧使我遯去以避賢者無以我故而使百姓受害也旱既大甚黽勉畏去黽音閔錢氏曰黽勉猶勉強也胡寧瘨我以旱瘨音顛箋曰瘨病也憯不知其故憯驂之上錢氏曰憯痛也祈年孔夙方社不莫音暮昊天上帝則不我虞箋曰虞度也敬恭明神宜無悔怒始欲遯去既又念民命方急當思救之故黽勉於此不敢去也天何偏病我以旱乎水旱之災皆由政失必有以自取之但痛哉不知其何故而致此也知其故則當速改矣惟不知其故因念恐有得罪於神祗者我祈豐年則甚早祭四方與社又不晚豈上天不度知我心乎我敬事神明如是當不恨怒於我而降此旱災也曹氏曰月令云孟冬天子祈來年于天宗大割注云天宗謂日月星辰也大割者大殺羣牲而割之也又云孟春天子以元日祈榖于上帝注云謂以上辛郊祭天也春官籥章氏凡國祈年于田祖龡豳雅擊土鼓以樂田畯注云田祖始耕田者謂神農也后稷配食焉夫自去嵗之孟冬已祈今嵗之豐稔其祀至於上帝日月星辰神農后稷無不偏及可謂夙矣載芟春籍田而祈社稷曲禮云天子祭四方嵗徧則方與社亦不莫矣旱既大甚散無友紀箋曰人君以羣臣為友鞫哉庶正鞠音菊箋曰鞫窮也庶正衆官之長也今曰鞫與南山曷又鞠止之鞠字異音義同皆窮極也南山言淫亂之極此詩言勞苦之極疚哉冡宰疚音救箋曰疚病也窮哉病哉者言勞倦也趣馬師氏趣篘之上趣馬解見十月之交今曰師氏地官中大夫膳夫左右今曰天官上士二人中士四人下士八人靡人不周今曰周徧也周爰咨諏之周傳以為救今不從無不能止今曰無猶毋也言毋自謂不能而止不為也瞻卬昊天卬音仰云如何里十月之交悠悠我里箋曰里居也今曰田里也旱則田里無聊也鄭訓憂破字作悝不若從本字人君以臣為友相與綱紀四方者今羣臣以救旱之急於常務之可緩者不暇整之故云散無友紀也自庶官之長冡宰之官皆究心於禱祈賑救之事或奉行之或討論之夙夜不遑以致勞瘁故云窮哉病哉也窮極言勞苦之極也庶正冡宰既皆勞瘁下至趣馬也師氏也膳夫也左右之臣也靡不周徧謂無一人不勞瘁也人皆勉力救荒無有自謂不能而遂止者宣王瞻仰昊天而歎曰田里之間將如何乎必有愁歎之聲矣憂民之辭也舊説以窮哉疚哉為諸臣勤於事而困於食庶正冡宰位髙禄厚恐未至此又以周為賙給羣臣救荒當先及小民不應但賙給有位也傳曰嵗凶年榖不登則趣馬不秣師氏弛其兵馳道不除祭事不縣膳夫徹膳左右布而不修大夫不食梁士飲酒不樂䟽曰師氏掌使其屬率四夷之隷各以其兵服守王之門外且蹕朝在野外則守列是掌近王之兵故令弛其兵也徹膳者天子日食大牢令减損之左右君之左右摠謂諸臣不修者無所修作瞻卬昊天有嘒其星嘒音諱傳曰嘒衆星貎大夫君子昭假無贏假音恪贏音盈吕氏曰贏餘也大命近止無棄爾成何求為我為去聲以戾庶正傳曰戾定也瞻卬昊天曷惠其寧宣王以旱之故夜不能寐瞻仰昊天不見雲興而唯見嘒然之衆星未有雨證也於是呼其臣而勉之曰大夫君子我之所以昭格於天以禱雨者已無贏餘矣然未得雨則死亡將近不可遂已而棄其前勞更思所以禱祈必得雨而後止所謂則不可沮也若此者非求為我之一身乃所以定衆正也未有民不寧而庶官定者也瞻卬昊天何時惠我以安寧乎雲漢八章章十句崧髙崧音崧尹吉甫美宣王也箋曰尹吉甫申伯皆周之卿士也尹官氏曹氏曰尹官也以官為氏天下復平復音服又扶又反能建國親諸侯䟽曰能建國親諸侯雖為申伯𤼵文要是總言宣王之美褒賞申伯焉朱氏曰中國名申伯出封于謝尹吉甫送其行之詩也崧髙維嶽傳曰崧髙貎嶽四嶽也東嶽岱南嶽衡西嶽華北嶽恒駿極于天駿音峻傳曰駿大也極至也維嶽降神生甫及申今曰鄭氏注孔子閒居云仲山甫及申伯也維申及甫維周之翰傳曰翰榦也解見維周之楨四國于蕃方元反王氏曰蕃言扞蔽四方于宣王氏曰宣言敷播首章以仲山甫比申伯也詩人之意謂申伯佐宣王中興闗國家之運則其生必不凡故設為神異之辭言崧然而髙竦者嶽也其山駿大極至于天維此嶽降其神靈以生仲山甫及申伯也當時仲山甫為相申伯亞於山甫此詩為美申伯而以山甫並言蓋謂申伯與山甫伯仲間耳借山甫以大申伯也維此申伯及山甫皆為周室之翰榦四國則于以蕃蔽其患難四方則于以宣布其徳澤蓋山甫兼總内外之任而申伯則專主蕃宣之職也此詩首章主申甫而言謂申甫之生必有所自來故推原於嶽降以尊之非申甫實為嶽神也舊説謂姜氏之先主四嶽之祀嶽神福興其子孫則執着於嶽降之文以辭害意矣此詩言嶽降申甫猶烝民言天生仲山甫耳鄭氏注禮既以甫為山甫而牋詩乃以甫為甫侯自為異義且申伯光輔中興而逺取周道始衰之甫侯以匹之非所以褒揚申伯也蓋泥嶽神福四嶽之子孫謂申甫皆姜姓耳或者疑甫為字申為國則名稱不類故以申甫皆為國不知古人文辭難以例拘舜典稱稷契稷以官契以名漢稱絳灌絳以封邑灌以姓皆不類也亹亹申伯箋曰亹亹勉也李氏曰按史記周本紀申者乃侯爵也以其為方伯故謂申伯今曰方伯者一州之牧王纉之事纉音纂箋曰纉繼也李氏曰王纉繼之以事如北門政事一埤益我于邑于謝王氏曰國之所都亦曰邑傳曰謝周之南國也䟽曰申伯先受封於申國本近謝今命為州牧故改邑於謝今曰西漢地理志申國在南陽宛縣後漢地理志謝城在南陽棘陽縣東北百里申謝其地相近南國是式䟽曰南國謂謝旁諸國式則為一州之牧王命召伯傳曰召公也䟽曰以常武之序知召伯是召穆公也王肅云召公為司空主繕治案黍苗序云卿士不能行召伯之職然則營築城郭召伯所主定申伯之宅登是南邦錢氏曰登升也自卿士為牧伯故曰登世執其功傳曰功事也次章述封謝也申伯亹亹然勉於職故王繼之以事其任益重也往邑謂去京師而就國邑也往謝指其邑之所在也先虚言之後實言之也申伯為一州之牧使南國有所法式王於是命司空召穆公先營謝邑以定申伯之居申伯元為諸侯今為州牧於謝是升此南邦也世世執守其功長為牧也詩人之辭多以一事分兩節言之如載脂載舝止是脂舝一事耳今言載脂則謂塗脂於舝言載舝則謂設舝於車是剥是菹止是以𤓰為菹一事耳今言是剥則謂以刀削𤓰言是菹則謂淹𤓰為菹于周于京止言周京一事耳今言于周則指國言于京則指國所都之地此于邑于謝語勢正與于周于京同牋以上于為往下于為於今不從王命申伯式是南邦因是謝人以作爾庸箋曰庸功也王命召伯徹申伯土田李氏曰徹什一之法也公劉遷于豳邑而徹田為糧今申伯之改邑于謝亦必徹其土田錢氏曰厲王後徹法漸壊故使召伯正之王命傅御錢氏曰王命申伯傳相及治事之官遷其私人傳曰私人家臣也錢氏曰遷謂禮遣之三章申上章營謝之事也王又告申伯以改邑之意云我欲使汝為法於此南邦今因此謝邑之人而為國以起爾之功言尊顯之也召公於時猶尚未𤼵王又命召伯云汝往謝邑凡申伯土田以徹法定其税賦十取其一王又命申伯傅相及治事之官遷其家臣而資遣其行也申伯之功召伯是營有俶其城俶音觸王氏曰俶始也錢氏曰始作之也寢廟既成既成藐藐釋文亡角反錢氏曰藐藐髙廣貎王錫申伯四牡蹻蹻音臄傳曰蹻蹻壯貎今曰本訓舉足行髙故為壯貎鉤膺濯濯鉤膺解見采芑䟽曰案巾車金路鉤樊纓九就同姓以封申伯異姓而得此賜者以其命為侯伯故得車如上公樊讀作鞶錢氏曰濯濯鮮明也四章述召伯既營謝及王錫遣申伯也申伯城謝之事乃召伯所營始作其城郭又作寢與廟以定其人神所處此寢廟既成矣既成之貎藐藐然髙廣也王將遣申伯乃賜以四牡之馬蹻蹻然強壯又賜以馬婁頷之金鉤及在馬膺前之樊纓皆濯濯然鮮明也王遣申伯路車乗馬乗去聲傳曰乗馬四馬也我圖爾居莫如南土錫爾介圭䟽曰毛以為栢圭九寸鄭以為圭長尺二寸謂之介詩記曰介圭在周官雖天子所服韓奕云以其介圭入覲于王則當時諸侯之瑞圭蓋介之為言大也詩人恃美大其圭而稱之非周官之介圭也以作爾寳傳曰寳瑞也䟽曰毛以為瑞謂所執之玉鄭以介圭非諸侯所執故以為寳往近王舅近音記傳曰近已也箋曰近辭也䟽曰如彼己之已也下云王之元舅知姜氏生宣王南土是保箋曰保守也五章申述錫遣之事也王𤼵遣申伯之國賜之以路車即上文鉤膺金路也賜以一乗之馬即上文四馬蹻蹻也申伯以異姓受金路異恩也故侈君之賜而申複言之也王因告申伯我謀爾之所居無如南土之最善又特賜汝以大圭為汝所執之瑞申伯侯爵當賜信圭七寸耳稱介圭亦侈君賜而美大言之也寳玉以分同姓申伯以異姓受賜亦異恩也王又命之曰往已王舅當於南土是保守也舊説以上賜四牡鉤膺是私恩此又以正禮賜之按周禮巾車金路有鉤本以封同姓申伯以異姓受此賜侈矣乃止為私恩名器無乃䙝乎此詩多申複之辭既曰王命召伯定申伯之宅又曰申伯之功召伯是營既曰南國是式又曰式是南邦既曰于邑于謝又曰因是謝人以作爾庸既曰王命召伯徹申伯土田又曰王命召伯徹申伯土疆既曰謝于誠歸又曰既入于謝既曰登是南邦世執其功又曰南土是保既曰四牡蹻蹻鉤膺濯濯又曰路車乗馬此詩每事申言之寓丁寧鄭重之意自是一體難以一一穿鑿分别也申伯信邁箋曰邁行也王餞于郿餞音賤郿音眉又音媚箋曰餞送行飲酒也䟽曰郿于漢屬右扶風在鎬京之西也申在鎬京之東南自鎬適申塗不經郿申伯還南還音旋謝于誠歸王命召伯徹申伯土疆以峙其粻峙音齒粻音張錢氏曰峙猶聚也式遄其行遄市專反箋曰遄速也六章述申伯往謝也申伯於是信行矣郿在鎬京之西申在鎬京之東自鎬適申塗不經郿時王至豐册命申伯於文王之廟故行餞送之禮于郿申伯北就王命于岐周乃旋反而南行其于謝邑誠然歸之矣言信邁誠歸蓋申伯志在王室宣王恩隆元舅人疑其未必往謝故言信邁誠歸謂果然成行也前此申伯未𤼵之時王已豫命召伯以徹法税其疆土預峙具其糧食令自京至國無缺乏用是以速申伯之行使在道不留滯也郿豐皆在鎬京之西其地相近王命申伯為州牧改邑於謝必册命於文王之廟故告廟畢而飲餞于郿也祭統云賜爵禄必於太廟召詔王朝歩自周則至于豐注云文王之廟在豐命諸侯必至豐告廟于周受命亦豐廟也郿即董卓所築郿塢漢志音媚申伯畨畨音波畨書作番音義同曹氏曰秦誓云番番良士孔安國以番番為勇武貎然下文以仡仡勇夫為所不欲則不當以番番為勇武蓋耆艾之狀也今曰秦誓以旅力既愆為畨畨則為耆艾可知也既入于謝徒御嘽嘽音灘傅曰徒行者御車者朱氏曰嘽嘽衆盛也考見四牡周邦咸喜蘇氏曰周人也戎有良翰箋曰戎猶汝也翰榦也不顯申伯傳曰不顯顯也王之元舅文武是憲箋曰憲表也言為文武之表式七章述申伯至謝此方送行而豫道其事也申伯畨畨然耆艾既已入於謝邑其徒行者御車者嘽嘽然衆盛普天王土侯國皆周邦也南方諸國喜得良牧於是相慶曰汝有良翰蔽矣州牧得人諸國皆頼之也申伯為南國所悦如此豈不光顯乎申伯為王之長舅文人武人皆以為表憲言其文武足法也申伯之徳柔惠且直䟽曰柔惠安順也揉此萬邦揉柔之去聲又上聲錢氏曰揉謂柔伏之曹氏曰漢公孫𢎞云揉曲木者不累日顔師古注云揉謂矯而立之也蓋柔曲而使之直耳䟽曰周無萬邦因古有萬國舉大數耳聞于四國聞音問吉甫作誦箋曰詩者工師樂人誦之以為樂曲其詩孔碩箋曰碩大也其風肆好蘇氏曰肆極也以贈申伯箋曰贈送也八章言作詩送行也臣道以柔順為體然必貴乎正直所以為全美萬邦若有不服之國申伯為牧能揉之使順其聲譽聞達于四方今我作是工師之誦其詩之辭甚大其風足以感動人之善心又極其好以此贈申伯之行也所言王室依頼諸侯表式皆天下安危之大計是其詩之大也美其功以勉之是其風之好也王氏曰吉甫作此詩以贈申伯而序以為美宣王則王之美於是乎在蓋唐史臣賛裴度云非度破賊之難也任度之為難也申伯信賢矣任申伯者豈不賢乎崧髙八章章八句烝民尹吉甫美宣王也任賢使能周室中興焉中去聲䟽曰大宰八統三曰進賢四曰使能注云賢有善行者也能多材藝者也是賢能相對為小别散則皆相通也此不言任用山甫者見王所使任非獨一人而已故言賢能以廣之宣王命仲山甫築城于齊而吉甫作詩以送之也天生烝民傳曰烝衆也有物有則傳曰物事也則法也民之秉彛音夷箋曰秉執也傳曰彛常也好是懿徳好去聲傳曰懿美也天監有周箋曰監視也昭假于下假音格箋曰假至也保兹天子生仲山甫傳曰仲山甫樊侯也䟽曰言仲山甫是樊國之君爵為侯而字仲山甫也周語稱樊仲山甫諌宣王韋昭云食采于樊僖二十五年左傳説晉文公納定襄王王賜之樊邑則樊在東都之畿内也杜預云經傳不見畿内之囻稱侯者天子不以此爵賜畿内也如預之言畿内本無侯爵傳言樊侯不知何所案據首章言天生仲山甫也天生衆民具形而有物禀性而有則則即帝則也以其具於吾身與生俱生不可踰越故謂之則如有耳目則有聰明有父子則有慈孝皆天理之不可踰也民皆秉此常性故皆好此懿徳於均禀同賦之中而有賢者獨鍾氣之粹焉是有闗於國家盛衰之數而非偶然也今天視有周之徳昭明假至於下故保佑此宣王而生仲山甫之賢以輔佐其中興之功也有周總一代言之天子指宣王也言由先世積徳之乆故天眷宣王為生賢佐也孔子閒居舉維嶽降神生甫及申曰此文王之徳也謂文武之徳施及後世故天生申甫以佐中興與此詩意同此詩欲美山甫故謂山甫天實生之若所禀獨厚於人者要之仲山甫能勿喪耳楊氏曰近取諸身百骸九竅達之於君臣父子兄弟夫婦朋友皆物也而各有則焉視聴言動必由於禮一身之則也為君而止於仁為臣而止於敬為子而止於孝為父而止於慈此君臣父子之則也夫婦有别長㓜有序朋友有信此夫婦長㓜朋友之則也皆天理之常也民秉其常則莫不好徳所謂惟皇上帝降衷于下民者如此其生仲山甫也亦若是而已矣仲山甫之徳柔嘉維則箋曰嘉美也令儀令色箋曰令善也小心翼翼箋曰翼翼然恭敬古訓是式箋曰古訓先王之遺典也威儀是力蘇氏曰力勉也天子是若傳曰若順也明命使賦傳曰賦布也次章備舉仲山甫之徳其徳柔和而嘉美不過其則言柔得中也令儀則動止雍容令色則容貎温粹見於外者無不善矣又小心翼翼然恭敬表裏如一也又能惟先王之訓典是法惟一身之威儀是勉惟天子之所行是順天子有明命則使山甫布之山甫令儀令色則動容周旋中禮矣猶曰威儀是力何也有徳者固威儀之所自形而謹其威儀者亦所以檢攝而養其徳也故致禮以治躬則莊敬外貎斯湏不莊不敬而易慢之心入之矣可不勉歟大臣以道事君而曰天子是順何也順者臣道也坤道也坤元承天順也六二直方亦順也事君盡禮順也有犯無隠亦順也將順正救皆出於忠愛無往非順也周語稱樊仲山甫諌宣王然則天子是若非靣從容悦之謂也王命仲山甫式是百辟音壁箋曰百辟百君也纉戎祖考箋曰戎猶汝也繼汝先祖先考李氏曰山甫祖考甞居是官矣今曰戎毛氏訓大鄭氏訓汝今以戎雖小子戎有良翰之類當從鄭念兹戎功之類當從毛王躬是保箋曰保安也出納王命朱氏曰出承而布之也納行而復之也錢氏曰出謂王所施行出之於下納謂羣臣奉請復命納之于上王之喉舌傳曰喉舌冢宰也箋曰如王口喉舌親所言也䟽曰丄云式是百辟故為冡宰舜命龍特立納言之官即今之納言也與此出納王命者異賦政于外四方爰𤼵箋曰莫不𤼵應三章備舉仲山甫之職也王命仲山甫曰我以汝為諸侯之法式纉繼汝先祖先考而保安我王躬出王命則承而布之納王命則行而復之作王之喉舌賦布其政教於畿外使四方於是𤼵應出納則居中以通逹上下之情賦政則出外以經營四方之治詩記曰仲山甫之職外則總領諸侯内則輔飬君徳入則典司政本出則經營四方式云者表率儀法之謂也保云者保其身體傳之徳義之謂也此章蓋備舉仲山甫之職肅肅王命李氏曰肅肅嚴也仲山甫將之傳曰將行也邦國若否音鄙釋文曰否惡也舊方九反仲山甫明之既明且哲以保其身夙夜匪解音懈今曰解怠也以事一人四章申上章賦政之事也言肅肅然而嚴者王命也仲山甫將而行之諸侯之有賢否者仲山甫則辨而明之山甫既明又哲下以保全其身謂善處功召無悔吝瑕疵之可指又早夜不解怠以奉事天子詩記曰明亦哲也並言之則明者哲之𤼵哲者明之實也既明且哲而後可以保身甚矣保身之難也説者或謂仲山甫事宣王則保身者非全身逺害之謂蓋誤矣保身乃已事豈為治亂而増損哉身體髪膚受之父母不敢毁傷本非末節也至於偷生徇私養小失大如是而全身逺害則君子賤之耳仲山甫在宣王之時羣臣之任遇莫先焉而省察其身奉事其主亦無一毫怠忽信所謂小心翼翼矣朱氏曰保身蓋順理以守身非趨利避害而偷以全軀之謂也錢氏曰於一事有見亦可以言明至于哲則無不見也明至於哲盡見天下之理則動容周旋無不中禮而下可保身上能事君不必專在逺害也人亦有言柔則茹之茹音孺又音汝箋曰柔猶濡毳也毳昌鋭反本又作脆廣雅曰茹食也䟽曰取采之入口名為茹曹氏曰茹者吞啗之名若茹草茹毛然凡魚肉柔也則吞啗之剛則吐之箋口剛坚强也曹氏曰骨骾則吐棄之維仲山甫柔亦不茹剛亦不吐不侮矜寡矜與鰥音義同不畏彊禦解見蕩五章言其剛柔不偏也人有甞言謂物之柔者人則茹食之物之剛者人則吐出之喻陵弱而畏彊也惟仲山甫則柔不茹而剛不吐不侮鰥寡不畏彊禦也䟽曰不侮不畏即是不茹不吐既言其喻又言其實以充之人亦有言徳輶如毛輶音酉又音由箋曰輶輕也民鮮克舉之鮮上聲我儀圖之箋曰儀匹也維仲山甫舉之愛莫助之衮職有闕傳曰衮冕者君之上服也箋曰衮職者不敢斥王之言也維仲山甫補之六章推尊其徳足以格君也人有常言謂徳之在人根於固有反而求之其輕如毛非難能也而民少能舉之者自暴自棄也吉甫於儀匹之中圖謀之求其能舉徳者乃維仲山甫能舉之人有不及則頼良朋切磋之助有愛其人之心則亦思効忠益以助之今吉甫之心雖愛山甫而欲助之而山甫全徳吉甫無可以致其助也王之職有闕失仲山甫能補之使無闕也衮職者斥王也仲山甫出祖箋曰祖者將行犯軷之祭也曹氏曰顔師古注漢書云祖者送行之祭因饗飲焉昔黄帝之子纍祖好逰而死於道故後人祀以為行神其祭設軷於門外是出門而後祖祭故云出祖也四牡業業箋曰業業動也今曰動而不息之意有考見雲漢征夫捷捷每懐靡及四牡彭彭音棚今曰牋以此為行貎即不息之意考見出車八鸞鏘鏘鸞解見采芑箋曰鏘鏘鳴聲王命仲山甫城彼東方傳曰東方齊也古者諸侯之居逼隘則王者遷其邑而定其居蓋去薄姑而遷於臨菑也䟽曰史記齊世家云獻公元年徙薄姑都治臨菑計獻公當夷王之時與此傳不合遷之言未必實也補傳曰竊意夷王時雖遷而城郭未為周備故宣王城之歟七章言城齊之役也王命山甫城齊遂為祖道之祭而行其所乗之四馬業業然動而不息其所從之行夫捷捷然而敏常恐不及事也其所乗之四馬彭彭然而行八鸞之聲鏘鏘然而鳴所以為此行者王命仲山甫令往築城於東方之齊國蓋去薄姑而遷臨菑也四牡騤騤音逵今曰桑柔傳云騤騤不息也八鸞喈喈音皆錢氏曰喈喈和鳴也仲山甫徂齊式遄其歸吉甫作誦穆如清風箋曰穆和也仲山甫永懷以慰其心八章言作詩送行也山甫往齊而周人望之欲速其歸不欲其乆於外也吉甫自言我作此工師之誦穆穆而和如清微之風可以化養萬物山甫心在王室其在外多有所懷思以此詩慰安其心也烝民八章章八句詩緝卷三十
