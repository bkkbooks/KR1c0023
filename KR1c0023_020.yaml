body:
  text: 詩緝卷二十宋嚴粲撰節南山之什小雅釋文曰從此至何草不黄凡四十四篇前儒申毛皆以爲幽王之變小雅節南山節如字又音截詩記曰按左傳韓宣子來聘季武子賦節之卒章杜氏謂取式訛爾心以畜萬邦之義然則此詩在古止名節也家父刺幽王也父音甫箋曰家父字周大夫也疏曰春秋之例天子大夫稱字桓七年天王使家父來求車上距幽王之卒七十五嵗古人以父為字或累世同之幽王宫湼宣王子項氏曰幽王時為亂者皆宣王時故家率犬戎以攻幽王者崧髙之申伯也為趣馬以亂朝者韓奕之蹶父也為卿士而貪殘擅政為大師而迷民誤國者常武之皇父尹氏也四人雖未必皆其身亦必無皆死之理以此知人才維上所用唐之裴矩即隋之佞人魏之華歆即漢之名臣也節南山刺師尹所為不平專援引小人也宣王在位四十六年大雅所美諸臣皆初年輔佐中興者幽王時未必存蓋皆其子孫也節彼南山傳曰節髙峻貌曰維南山也考見秦風終南維石巖巖傳曰巖巖積石貌赫赫師尹傳曰赫赫顯盛貌尹氏為大師大音泰李氏曰春秋書尹氏卒譏世卿也其後尹氏立王子朝則尹氏之為世卿其來甚久民具爾瞻傳曰具俱也瞻視也憂心如惔音談又音炎傳曰惔燔也王氏曰内熱之謂也不敢戯談國既卒斬卒子律反朱氏曰卒終也蘇氏曰斬絶也何用不監平聲箋曰監察也首章言師尹失民望也興也鎬京面對終南故以所見起興言節然髙峻之終南山其積石巖巖然為國之望猶赫赫然顯盛者是大師尹氏民俱瞻仰之也職位之重如此宜有以副天下之望今民見其所為皆憂心内熱如火之惔燔至不敢戯言懼其以疑似而加誹謗之罪也是時周雖未亡而終歸於亡矣王何不察也常武王謂尹氏箋云尹氏天子世大夫也宣王時尹氏為内史幽王時為大師者非子則孫耳節彼南山有實其猗音伊蘇氏曰山之實草木是也傳曰伊長也疏曰緑竹猗猗是草木長茂之貌故為長也赫赫師尹不平謂何天方薦瘥薦音荐瘥音鹺才何反讀作切磋之音者非傳曰薦重也瘥病也疏曰薦與荐文異義同喪亂𢎞多傳曰𢎞大也民言無嘉憯莫懲嗟憯驂之上錢氏曰憯痛也次章言師尹之病在於不平也山之髙峻其氣平均如一則草木之生於其上者無不猗然而長今汝師尹其勢非不赫赫然顯盛其如不平何謂其職位如山之髙峻而不能如山之生物均平也由汝所為不平故天方降此荐至之病死喪禍亂甚大而且多是天怒也方者言方來未已也民無善言惟聞怨讟是人怨也此可憯痛而不懲創嗟閔無改悔之意也禮言冢宰均邦國書言冢宰均四海大臣之事唯在均平公溥也此詩原幽王之辭由於師尹究師尹之惡在於不平而已下言秉國之均昊天不傭式夷式已君子如夷既夷既懌昊天不平皆此意也尹氏大師大音泰維周之氐音抵傳曰氐本也解頥新語曰爾雅云氐星名天根也說者謂亢下繫於氐如木之有根字不必作柢秉國之均傳曰均平也四方是維天子是毗音皮箋曰毗輔也俾民不迷不弔昊天弔如字朱氏曰弔愍也李氏曰此所謂不弔昊天正如書所謂不弔左氏傳成七年吳代郯郯成季文子曰中國不振旅蠻夷入伐而莫之或恤無弔者也夫遂引此詩弗弔昊天之言為證襄十三年吳侵楚喪君子以吳為不弔亦引此章不弔昊天杜氏注云不為昊天所恤則不弔為不恤明甚不宜空我師空音控朱氏曰不宜久在曠我大師之官三章言大師重任惟在均平尹氏不平不稱其任也尹氏為大師國之安危所基是周之根本也爾秉持國之均平不宜有所偏私能均平則外以維持四方内以毗輔天子使民不迷惑矣今師尹所為不平民無所赴愬唯呼天而告之曰昊天不見愍弔乎不宜曠我大師之官也非其人而處其位與無人同故謂之空東萊書說云非無其人之謂曠而非其人之為曠也弗躬弗親釋文曰弗不也庶民弗信弗問弗仕今曰仕謂官使之也下文有膴仕一章二仕字當歸一勿罔君子釋文曰勿莫也式夷式已式微箋曰式𤼵聲也傳曰夷平也王氏曰已廢退也今曰論語三已之孟子士師不能治事則已之無小人殆傳曰殆危也今曰論語佞人殆𤨏𤨏姻亞傳曰𤨏𤨏小貌釋親曰壻之父為姻婦之父為婚兩壻相謂為亞劉熈釋名曰一人取姊一人取妹相亞次也則無膴仕膴音武傳曰膴厚也四章言師尹之不平在於逺君子而任小人也師尹於政事不躬為之不親臨之而信任非人庶民不信之也此由所見之偏謂君子徒有虛名而無實用也然君子豈真不可用哉特不用之耳既不詢問之不官使之勿誣罔君子以為不可用也小人豈真可用哉聽之則其言若可喜而用之則必敗迺事當平其心勿偏信之察知其姦則廢退之無信用小人而至於危殆其國也𤨏𤨏然么麽之姻亞無以親暱而厚任用置之大位也大臣官使人材當昭布公道乃於君子則弗仕唯姻亞則膴仕所謂不平也都人士彼君子女謂之尹吉鄭氏以為尹氏周室昏姻之舊姓然則此尹氏慿藉昏連王室以處大位如後世外戚擅權者𤨏𤨏姻亞則其所引親黨也舊說以君子指王非也此君子正對下文小人言之謂人之邪正也君子所見者逺若迂濶若遲鈍世每訕笑之以為不可用不知用之則安富尊榮小人所見者近敏捷可以集事諛佞可以恱意世主每甘心焉不知小人用則國危矣勿誣罔君子以為不可用勿信任小人以自取危殆文意瞭然權姦欲擯斥君子君子無罪可指唯以好名無實排之所以罔君子者千載一揆也昊天不傭音衡傳曰傭均也今考字一音容傭賃也此讀作容音非降此鞠訩音菊凶朱氏曰鞠窮也訩亂也今曰釋文云訩訟也衆語也衆語訩訩亂之象也項籍傳天下匈匈師古云讙擾之意匈匈即訩也昊天不惠今曰惠愛也惟天惠民今不惠也降此大戾音麗箋曰戾乖也君子如届音戒今曰君子即上文君子也箋曰届至也俾民心闋苦穴反傳曰闋息也君子如夷箋曰夷平也惡怒是違蘇氏曰違逺也五章言唯用君子可以已亂也民罹師尹之害而歸之於天曰昊天不傭均而降此窮極之亂昊天不惠愛而降此大乖戾謂天生小人以禍天下也所以救此禍者唯在用君子而已幽王信用小人故君子去之君子若至則民心自息矣君子若平夷其心則民心之惡怒皆逺矣所患君子不至耳至則所為必平夷刺師尹不平也不弔昊天亂靡有定式月斯生俾民不寧憂心如酲音呈傳曰病酒曰酲今曰猶黍離言中心如醉誰秉國成不自為政卒勞百姓六章憂亂也呼天而告曰不見愍弔乎昊天也亂未有所定日月愈生亂益甚也使民不得安寧我憂心如病酒而不醒矣國之有成乃法度紀綱一成而不可變人主所操執天下所遵守者今誰秉持之乎師尹實秉持之而乃不自為政信任姻亞羣小用事終勞苦我百姓也駕彼四牡四牡項領傳曰項大也我瞻四方蹙蹙靡所騁蹙音足騁音逞箋曰蹙蹙縮小之貌七章思避亂也家父知禍亂之將作思欲駕此四牡而去之其四牡大領非不肥壯然我視四方蹙蹙然縮小無可馳騁之地是以留而不去蓋世亂則一身無所容若見天地之狹如唐人詩云出門即有礙誰謂天地寛也彼特為一身言之此則為天下國家言之也方茂爾惡朱氏曰茂盛也相爾矛矣相去聲箋曰相視也既夷既懌音亦如相醻矣醻音讎韻亦作酬八章言小人情狀也小人方茂其惡謂盛怒之時則相視其矛㦸如欲持之以相殺傷此由不能平其心也若能夷平恱懌則同僚相與歡然如賔主之相醻酢何至相疾如仇讎哉此詩式夷式已君子如夷皆言君子則既夷既懌亦規之以善也舊說夷懌為小人喜怒不常今不從昊天不平我王不寜不懲其心覆怨其正九章十章推原亂本在於王心也師尹不平而歸之於天言天實為此不平者謂天生小人也即上章所謂昊天不傭也天下不寧而歸之於王言王實為此不寧者謂王任小人也即上章所謂俾民不寧也王信任小人由其心之蔽惑今王心不自懲創而反怨正救之者言不能從諫改過也不懲其心即下章式訛爾心承我王言之指王心也舊說不懲其心指尹氏式訛爾心乃指王今以為皆指王家父作誦今曰誦歌誦也僖二十八年左傳云聽與人之誦注聽其歌誦以究王訩箋曰究窮也式訛爾心箋曰訛化也以畜萬邦畜許六反箋曰畜養也家父自顯其字云已作此歌誦以窮究王致訩亂之由乃是王心之未回王庶幾改化其心以養萬邦謂心一悔悟則本原既正而萬物皆理矣師尹安得容其姦乎陳氏曰尹氏厲威使人不得戯談而家父既作詩復表其詩出於己以身當尹氏之怒而不辭者蓋家父周之世臣義與國俱存亡故也李氏曰人不足與適也政不足與間也惟大人為能格君心之非蓋用人之失政事之過雖皆君之非然不必先論也惟格君心之非則政事無不知善矣用人皆得其當矣詩記曰致亂者雖尹氏而用尹氏者則王心之蔽也節南山十章六章章八句四章章四句正月正音政大夫刺幽王也項氏曰正月將亂之時君子憂之雨無正既亂之後君子去之正月憂亂之作也正月繁霜傳曰正月夏之四月解頥新語曰或疑四月不應有霜考之漢武帝元光四年四月隕霜殺草晉武帝咸寧九年四月隕霜傷粟麥我心憂傷民之訛言箋曰訛偽也詩記曰凡譸張為幻以罔上惑衆者皆謂之訛言亦孔之將傳曰將大也念我獨兮憂心京京王氏曰京京大也哀我小心癙憂以痒癙音鼠痒音羊吕氏曰癙憂幽也與下䑕思泣血文雖小異義亦同也長樂劉氏曰鼠病而憂在於穴内人所不知也傳曰痒病也正月建已純乾用事正陽之月也當長養之時乃有繁多之霜肅殺之氣災變甚異我心覩此己憂傷矣民又出訛偽之言所言甚大繁霜則天令乖訛言則民思亂而君臣上下安其危而利其菑曽不覺悟念我孤特一人為王憂之京京然其憂甚大謂憂國將亡而非一已之私憂也哀哉我小心畏謹幽憂而至於痒病也已獨憂之而衆皆不察故謂之幽憂父母生我胡俾我瘉音庾傳曰瘉病也不自我先蘇氏曰自從也不自我後好言自口莠言自口莠音酉王氏曰莠惡也榖謂之善則莠惡可知也今曰與巧言出自口矣同意憂心愈愈蘇氏曰愈愈益甚之意是以有侮人窮則呼父母言父母生我何為使我瘉病乎不出我之前不居我之後適當其時是我生之不幸也好言謂說好莠言謂說惡訛言之人好惡惟其口之所出本非由中之言無真實也我見其變亂是非將有禍敗憂心愈愈然益甚而小人反見侮謂我為張皇過慮也憂心惸惸音瓊王氏曰惸惸獨也念我無禄陳氏曰禄福也無禄猶言不幸也今曰左傳無禄獻公即世民之無辜并其臣僕并音併朱氏曰并俱也箕子云商其淪喪我罔為臣僕哀我人斯于何從禄今曰即上文無禄之禄瞻烏爰止于誰之屋惸惸然獨憂念我之無福也遭國將亡民之無罪辜者皆將見虜以為臣僕矣哀我今之人將復於何所而獲福乎瞻視烏鳥之飛不知其將止於誰之屋喻民將歸於誰君乎郭林宗曰不知瞻烏爰止于誰之屋耳瞻彼中林傳曰中林林中也侯薪侯蒸箋曰侯維也薪蒸解見無羊蘇氏曰其殘之也甚矣大家世族散為皂隷亦猶是也民今方殆視天夢夢音蒙釋訓曰夢夢亂也錢氏曰無聞知也既克有定靡人弗勝鄭如字毛音升有皇上帝朱氏曰皇天也伊誰云憎興也林以竹木叢聚得名宜有喬木今斧斤伐之所存唯薪蒸喻虐政所殘其民凋弊也方民之危殆無所赴訴視天若夢夢然罔聞知此特天之未定耳少焉天定則福善禍滛人未有不為天所勝者惟皇上帝所憎者誰歟天之所以為大非有所憎其為天所勝者皆人自取禍耳謂山蓋卑為岡為陵民之訛言寧莫之懲召彼故老訊之占夢訊音信傳曰訊問也具曰予聖誰知烏之雌雄山則髙矣而或謂山為卑然有為山脊之岡者有為大阜之陵者而謂之卑可乎喻小人訛言變亂是非以賢為否如此而王曽不懲止之乃召彼宿舊元老但問之占夢之事其所問不急也李義山詩云可憐夜半虚前席不問蒼生問鬼神亦此意也君臣迷甚皆自謂聖如烏鳥之雌雄無以相别也歐陽氏曰凡禽鳥之雌雄多以其首尾毛色不同而别之鳥之首尾毛色雌雄不異人所難别詩記曰孔叢子子思言於衛侯曰君之國事將日非矣公曰何故曰有由然焉君出言自以為是而卿大夫莫敢矯其非卿大夫出言亦自以為是而士庶人莫敢矯其非君臣既自賢矣而羣下同聲賢之賢之則順而有福矯之則逆而有禍如此則善安從生詩曰具曰予聖誰知烏之雌雄抑似君之君臣乎謂天蓋髙不敢不局傳曰局曲也疏曰曲身也謂地蓋厚不敢不蹐音積傳曰蹐累足也說文曰小歩也維號斯言號音豪釋文曰號大呼也有倫有脊傳曰倫道脊理也哀今之人胡為虺蜴音毁亦虺蝮也解見斯干今考蜥蜴上音析下音亦陸於此蜴星歴反字又作蜥是以蜴為蜥也誤矣釋魚曰蠑螈蜥蜴蜥蜴蝘蜓守宫也蠑音榮螈音元蝘音演蜓音殄釋曰說文云在草曰蜥蜴在壁曰蝘蜓方言云秦晉西夏謂之守宫其在澤中者謂之蜥蜴南楚謂之蛇醫或謂之蠑螈東方朔云非守宫則蜥蜴案此諸文是在草澤中者名蠑螈蜥蜴在壁者名蝘蜓守宫也博物志云以器養之食以真朱擣萬杵以㸃女人體終身不滅耦則落故號守宫人謂天為髙而我不敢不曲身傴僂而行懼壓也人謂地為厚而我不敢不累足小步而行懼䧟也天地必無壓䧟喻身處亂世禍出意外不可謂必無之事而不懼也我大呼而出此言人孰不疑其言之過然實則有倫有理何也蓋當時羣小肆毒以害人無所不至不可不慮故言可哀今之人何故為虺蜴之行務欲傷害人乎詩記曰家語云孔子讀詩至于正月六章惕然如懼曰彼不逹之君子豈不殆哉從上依世則道廢違上離俗則身危時不興善已獨由之則曰非妖即妄也故賢者既不遇恐不終其命焉桀殺龍逄紂殺比干皆是類也詩曰謂天蓋髙不敢不局謂地葢厚不敢不蹐此言上下畏罪而無所自容也瞻彼阪田阪音反箋曰阪田崎嘔嶢埆之處有菀其特菀音鬱小弁疏曰菀茂也釋文曰特獨也天之扤我扤音兀傳曰杌動也如不我克箋曰克勝也彼求我則如不我得執我仇仇釋文曰仇讎也亦不我力朱氏曰力猶用力也視彼險阪瘦薄之田而有鬱然特盛之苖天又為風雨以扤動之惟恐其不勝猶昏亂之朝君子孤立而小人多方以攻之也小人初用事則以賢者有譽望而援引之以美觀聽所謂求我以為法徒好名耳非真有任賢之心也其始求我唯恐不得既而議論不合則空執留之視為仇讎不用力於我矣知賢當力薦之既用當力主之庶賢者得展所藴今不我力則貌敬而情疎賢者之迹不安矣安能當羣小之攻乎重言仇仇者言不一仇之無往而不忤其意枘鑿不相入薫蕕不同器也鄭氏云有貪賢之名無用賢之實是也心之憂矣如或結之疏曰結纒結也今茲之正王氏曰邪正之正胡然厲矣李氏曰厲危也燎之方場燎音療箋曰火田為燎寧或滅之赫赫宗周傳曰宗周鎬京也襃姒烕之襃保之平姒音似烕音血傳曰襃國也姒姓也烕滅也我心之憂如有纒結之者其憂不可解也所憂者以今之正道何其危也邪道勝則正者危君子不安也火之燎於原其勢方盛寧有能滅之者今赫赫然昌盛之宗周襃姒乃以一婦人而滅之是可傷也時未滅而知其必滅也歐陽氏曰此詩上七章皆述王信訛言亂政至此始言滅周主於襃姒者謂王溺女色而致昏惑推其禍亂之本以歸罪也終其永懐又窘隂雨窘羣之上濁傳曰窘困也其車既載乃棄爾輔疏曰輔是可解脫之物蓋如今人縳杖於輻以防輔車載輸爾載箋曰輸隳也隳音麾將伯助予將音鏘傳曰將請也伯長也周之將亡如火之將滅矣我永思其終又如行道之遇隂雨其車既重載乃棄其車輔如此則必䧟於泥濘隳敗其車中之所載然後請長者助我已不及事矣喻平時棄賢不用國危而後求賢則已晚矣無棄爾輔員于爾輻員音云輻音福傳曰員益也朱氏曰輔所以益輻也釋文曰輪轑也轑音老今曰冬官輪人云輻也者以為直指也屢顧爾僕箋曰屢數也僕將車者也不輸爾載終踰絶險曽是不意喻王勿棄其車輔以益其輻又頻顧視將車之僕戒勑之庶幾不隳敗爾之所載奈何終踰絶險之地曾不以為意而覆敗必矣魚在于沼傳曰沼池也亦匪克樂音洛潛雖伏矣亦孔之炤音灼箋曰炤炤易見也憂心慘慘驂之上傳曰慘慘猶戚戚也念國之為虐魚相忘於江湖者也今在於池沼非其所樂矣喻君子立於衰亂之朝亦非所樂也魚之深潛雖云藏伏然沼之水淺亦甚炤然易見無所逃於網罟之害喻君子雖自韜晦亦未必能避患也然君子不專為一身之安危其憂心慘慘然愁戚者唯念國之行虐政而民罹其害耳詩記曰文中子遊馬頰之谷遂至牛首之谿登降信宿從者樂姚義竇威進曰夫子遂得潛乎文中子曰潛雖伏矣亦孔之炤威曰聞朝廷有召子議矣文中子曰彼求我則如不我得執我仇仇亦不我力義曰其車既載乃棄爾輔威曰終踰絶險曾是不意文中子喟然遂歌正月終焉既而曰不可為矣彼有㫖酒又有嘉殽洽比其鄰比音備傳曰洽合也疏曰比親比也昏姻孔云昏姻解見節南山王氏曰云稱說其善也念我獨兮憂心慇慇傳曰慇慇然痛也彼小人也小人有㫖酒嘉殽以和洽親比其鄰里親戚昏姻其言云云甚稱譽之而我孤獨自傷憂心慇慇然痛者哀小人之樂其憂也李氏曰昔人有言曰燕雀處堂母子相安自以為樂也突決棟焚而子母恬然不知禍之將及也今國勢如此而小人之徒乃羣居飲酒以相樂殆燕雀之類也仳佌彼有屋佌音此傳曰佌佌小也錢氏曰佌佌屋之小也蔌蔌方有榖蔌音速傳曰蔌蔌陋也錢氏曰蔌蔌榖之小也民今之無禄天夭是椓夭平聲椓音卓朱氏曰椓害也哿矣富人哿歌之上傳曰哿可也哀此惸獨厲王之亂民之室廬蓄積蕩然矣宣王勞來還定於是彼有佌佌然之小屋方有蔌蔌然之少榖正望繼其後者愛養培植之今乃不幸又逄幽王之亂是天為夭孽以椓害之也富人猶可惸獨可哀矣李氏曰衰亂之世要其極也貧富俱受其禍此言一時之虐政富者之財猶可以勝其求貧者愈不堪也正月十三章八章章八句五章章六句十月之交大夫刺幽王也疏曰毛以為刺幽王鄭以為刺厲王毛公大儒明於訓詁篇義誠自刺厲王無縁横移其弟改為幽王李氏曰鄭氏以十月之交雨無正小旻小宛皆當為刺厲王之詩蓋以此篇之中疾豔妻煽方處又幽王之時司徒乃鄭桓公友非此篇之所云畨維司徒故以此為厲王之詩蘇氏以為不然鄭桓公在幽王時與畨維司徙先後用事又襃姒以色居位謂之豔妻其誰曰不可當從此說觀鄭氏以詩所言襃氏與畨維司徒為厲王之詩其下雨無正小旻小宛亦以為厲王其意以謂四序皆言大夫疑是一人之作其說未之敢信也十月之交刺用七子以致災變也十月之交曰十月建亥之月也蘇氏曰十月為純隂故謂之陽月純陽而食陽弱之甚純隂而食隂壯之甚傳曰交日月之交㑹疏曰謂朔日也朔月辛卯日有食之疏曰日食者月食之也何休云不言月食之者其形不可得而覩故疑言日有食之周天三百六十五度四分度之一日月皆右行於天一晝一夜日行一度月行十三度十九分度之七二十九日有餘而月行天一周追及於日而與之㑹交㑹而日月同道則食月或在日道表或在日道裏則不食矣又厯家為交食之法大率以百七十三日有竒為限然月先在裏則依限而食者多若月在表則依限而食者少杜預見其參差乃云日月動物雖行度有大量不能不少有盈縮故有交會而不食者或有頻交而食者此得之矣歐陽氏曰日君道也月臣道也望而至於黄道是謂臣干君明則陽斯蝕之朔而至於黄道是謂臣壅君明則陽為之蝕十月之交於厯當蝕君子猶以為變詩人悼之然則古之太平日不蝕星不孛葢有之矣若過至未明月或變行以避之或五星潛在日下禦侮以救之或渉交數淺或在陽厯陽盛隂微則不蝕或徳之休明而有小眚焉則天為之隠雖交而不蝕四者皆徳之所由生也先儒又謂交而食陽微而隂乘之也交而不蝕陽盛而隂不能掩也此則係乎人事所感蓋臣子背君父妾婦乘其夫小人陵君子夷狄侵中國所感如是則隂盛陽微而曰為之食矣李氏曰唐書志云以厯推之在幽王之六年亦孔之醜傳曰醜惡也彼月而微箋曰微不明也此日而微朱氏曰晦朔而日月之合東西同度南北同道則月揜日而日為之食望而日月之對同度同道則月亢日而月為之食今此下民亦孔之哀首章言日食之變也十月建亥日月交㑹當月之朔其日辛卯日為之食以純隂之月而日復為月所掩見隂壯之盛此其為變亦甚醜惡矣葢彼月食而不明未為醜此日食而不明則為醜也傷敗將至災異先出故此下民將罹其禍而可哀也鄭氏以十月為周正乃夏之八月詩皆夏正獨以此為周正可乎四月維夏六月徂暑夏正之明證也况此十月日食在幽王之六年鄭氏失考耳日月告凶不用其行箋曰行道度也不用之者謂相干犯也朱氏曰不用其行者月不避日失其道也四國無政不用其良彼月而食則維其常此日而食于何不臧朱氏曰隂亢陽而不勝猶可言也隂勝陽而揜之不可言也次章言天災人禍相㑹也日月告以凶證而不由其道謂月揜日也四方無政事而不用其善謂暴亂又作也因天變而修人事則可以轉災為祥今天變既如彼人事又如此郭林宗所謂夜觀乾象晝察人事天之所廢不可支也此主言日食而云日月告凶者謂月侵於日而食也日月之食皆為變然以陽侵隂獨為常事以隂侵陽何其不善也􅏎􅏎震電􅏎音葉傳曰􅏎􅏎震電貌震雷也不寧不令去聲朱氏曰令善也十月而雷電山崩水溢災異之甚百川沸騰傳曰沸出也騰乘也山冢崒崩崒徂恤反濁音也讀作逡之入次清音非傳曰山頂曰冢箋曰崒者崔嵬釋曰山巔之末其峰巉巖今曰漸漸之石維其卒矣卒與崒同髙岸為谷深谷為陵哀今之人胡憯莫懲憯驂之上錢氏曰憯痛也三章言日食之後災異荐至也雷電􅏎􅏎然者常也而十月見之則不安不善是天道乖矣百川之水皆沸溢而相乘山頂崒然崔嵬者又皆崩落髙岸䧟為深谷深谷出為髙陵又皆於十月見之是地道亂矣變異荐臻哀哉今幽王君臣何為處可痛而莫懲創也皇父卿士父音甫箋曰皇父字也今曰皇父家伯仲允三人皆不著其姓也葢其妻黨隠三年左傳云鄭武公莊公為平王卿士注云卿士王卿之執政者畨維司徒箋曰畨氏也家伯維宰箋曰家伯字也宰冢宰也仲允膳夫箋曰仲允字也膳夫上士也掌王之飲食膳羞棸子内史棸音鄒箋曰棸氏也内史中大夫也掌爵禄廢置殺生子奪之法蹶維趣馬蹶音鱖趣蒭之上箋曰蹶氏也今曰夏官趣馬下士注云趣養馬者也楀維師氏楀音矩箋曰楀氏也師氏中大夫也掌司朝得失之事豔妻煽方處豔音熖煽音扇處音杵傳曰豔妻襃姒也美色曰豔煽熾也四章言致災由任羣小也故歴數其人有字皇父者為卿士而執政畨氏為司徒字家伯者為冢宰字仲允者為膳夫棸氏子為内史蹶氏為趣馬楀氏為師氏此七子者以豔妻襃姒其勢熾盛之時依附以進身方處勢位未有轉動則災異無消去之理矣羣小根據必有内寵主之所以難去也抑此皇父朱氏曰抑𤼵語辭豈曰不時陳氏曰不問其非時胡為我作朱氏曰作動也不即我謀朱氏曰即就也徹我牆屋田卒汙萊音烏來朱氏曰卒盡也傳曰下則汙髙則萊疏曰汙者池停水之名禮記云汙其宫而瀦焉是也萊者草穢之名皇父以親寵封於畿内既封即築都邑令邑人居之役之不以時先毁牆屋而後令遷邑人廢其家業故述其情以告之曰予不戕今曰爿傍從斤者音鏘方銎斧也此爿傍從戈者音牆殺也殘也銎音芎禮則然矣五章六章專言皇父首惡也用民之力當於農隙抑此皇父所為豈肯言其非時乎何為動我以遷徙而不先就我謀乃徑徹毁我之牆屋使我田不獲治下者盡為汙池髙者盡為草萊乃曰我不戕殘汝下供上役禮則然矣古者興功動衆謀及庶人順民心也皇父孔聖作都于向啇之去傳曰向邑也疏曰左傳說桓王與鄭十二邑向在其中杜預云河内軹縣西有地名向上則向在東都之畿内也朱氏曰向今孟州河陽縣是也擇三有事傳曰三有事國之三卿疏曰皇父封於畿内當二卿今立三有事是増一卿以比列國也亶侯多藏去聲傳曰亶信侯維也不慗遺一老慗銀之去釋文曰爾雅云慗强也且也俾守我王擇有車馬以居徂向幽王君臣具曰予聖故皇父亦以聖自居詩人因其自聖而譏之謂爾皇父甚聖矣其作都邑於所封之向邑擇立三卿已非畿内之制又所擇者信維聚歛多藏之人其作向邑既成令公卿大夫盡往送之不彊留一老使之守衛我王又擇民之富有車馬者以往向邑而居知有私邑不復知有王室皇父所謂孔聖者如此黽勉從事黽音泯不敢告勞無罪無辜䜛口嚻嚻音遨箋曰嚻嚻衆多貌下民之孽音闑疏曰孽災害也匪降自天噂沓背憎噂沓背音撙踏佩傳曰噂猶噂噂沓猶沓沓說文曰噂聚也陳氏曰噂聚談也蘇氏曰沓重複也職競由人傳曰職主也七章言已被䜛也已自勉以從王事固不敢告勞以言功也無罪無辜而讒口嚻嚻然衆多是將求免其過而不可得也下民之災害非自天降噂噂聚談沓沓重複多言以相恱而背則相憎專力為此者人也悠悠我里箋曰里居也王氏曰我所居里今曰悠悠逺也里鄉里也周禮五鄰為里亦孔之痗音昧又音悔傳曰痗病也四方有羨延之去傳曰羨餘也今曰此羨訓餘當作余箭反諸本作徐箭反則訓慕誤也我獨居憂民莫不逸我獨不敢休天命不徹王氏曰徹通也我不敢傚我友自逸八字句八章言已欲去不得也仕不得志則思其鄉里悠悠然道逺而未得歸亦甚病矣已不得去故慕得去而在外者謂彼四方之人皆有羨餘我獨居此憂愁之地民莫不得優㳺自逸我獨不敢休息天命不通無可奈何勉之而已不敢傚我友自逸潔身而去也觀雨無正昔爾出居知幽王之時大夫有出外避禍者此詩末章與雨無正末章意同皆不得去羨已去者疏曰其友與王無親故舎王而去已則王之親屬故不敢傚也十月之交八章章八句雨無正音政大夫刺幽王也雨自上下者也衆多如雨而非所以為政也歐陽氏曰古之人於詩多不命題而篇名往往無義例其或有命名者則必述詩之意如巷伯常武之類是也今雨無正之名據序曰雨自上下者也言衆多如雨而非政也今考詩七章都無此義與序絶異當闕其所疑劉諌議曰嘗讀韓詩有雨無極序云雨無極正大夫刺幽王也比毛詩篇首多雨無其極傷我稼穡八字補傳曰詩之命名皆摘取詩中之語獨雨無正巷伯常武酌賚般六篇特出詩人之意非有序以𤼵之雖孔子亦不能知其為何詩也韓詩篇首多二句是詩前二章皆十句加以二句己不可信據今序之文以求詩人之言亦可見非所以為政之意此詩刺刑罰不中忠言不用遂致人心離散所謂衆多如雨也或以此詩名而疑序且詩名不用詩語者多矣何獨此詩也浩浩昊天浩音藁又音鎬昊音鎬王氏曰浩浩廣大流通之意今曰釋文云浩浩大水貌不駿其徳駿音峻傳曰駿長也降喪饑饉音僅傳曰榖不熟曰饑蔬不熟曰饉斬伐四國旻天疾威旻音閩弗慮弗圖舎彼有罪舎音捨既伏其辜若此無罪淪胥以鋪平聲傳曰淪率也箋曰胥相也鋪徧也首章言刑罰不中也人窮則呼天曰浩浩然廣大之昊天何為不駿長其徳乃降喪亂饑饉以斬伐天下也既生之乃斬伐之是其徳不長久也天既迅烈威虐王當恐懼脩省庶可以囘天意今乃不思慮不圖謀彼有罪而伏辜者姑捨勿論若此無罪者而使之淪率相引而鋪徧皆得罪焉何其無分别也周宗既滅靡所止戾傳曰戾定也正大夫離居箋曰正長也王氏曰周官八職一曰正六官之長是也莫知我勩音曵傳曰勩勞也三事大夫李氏曰徐安道以謂周官云三事暨大夫舉三公及大夫也莫肯夙夜邦君諸侯莫肯朝夕朝如字又音潮錢氏曰朝朝見也夕暮見也庶曰式臧覆出為惡傳曰覆反也次章言人心離散也周之宗族既滅將有易姓之禍天下未有安定也周時雖未滅而敗壊之極知其必滅也正大夫六官之長也此作詩之大夫言其長離居去位以避其禍莫知我之從王而勞勩也又三公及其餘大夫莫肯夙興夜寐以勤王事者邦君諸侯莫肯朝暮省王者人心離散國危如此庶幾曰王今改過用善乃反出而為惡威虐愈甚也如何昊天辟言不信辟音闢傳曰辟法也如彼行邁釋文曰邁逺行也則靡所臻朱氏曰臻至也凡百君子箋曰謂衆在位者各敬爾身胡不相畏不畏于天三章言已忠言不用也君子見王不悛呼天而告之曰如何乎昊天我之告王者皆法度之言王終莫肯信不信法度之言則必信非法之言如人迷途而逺行倀倀然我不知其所至矣既已憂之則又告其衆在位之君子言羣臣當自敬其身勿茍合以長其惡今何為上下不相畏乎不畏人是不畏天也戎成不退傳曰戎兵也饑成不遂傳曰遂安也曾我暬御暬音薛箋曰曾但也傳曰暬御侍御也今曰曾則也但亦則之意音如字憯憯日瘁憯驂之上瘁音萃傳曰瘁病也凡百君子莫肯用訊箋曰訊告也聽言則荅譖言則退四章言羣臣無忠告也兵戎之禍已成而其勢不退言外患之熾也饑困之災已成而其生不遂言内憂之迫也但我暬御小臣憯憯憂之日益瘁病而衆在位之君子莫肯以禍亂將至告王者至於聽人之言則應荅之謂聽人言時事則己酬應之以為信然是其心非不知亂之將至也但私議於所親厚而不以告王耳人有譖言及己則奉身而退矣哀哉不能言匪舌是出吹之去維躬是瘁哿以能言哿歌之上傳曰哿可也巧言如流俾躬處休五章斥巧佞也幽王惡直言而好巧言哀哉賢者之不能言謂能直言而不能巧言也惟不能巧言以阿上意故言則忤物非出於舌而但已也將躬受其病矣謂言出而禍隨也可矣小人之能言者巧佞之言如水之流無所凝滯使其身處於安樂之地積順生愛也維曰于仕傳曰于往也孔棘且殆箋曰棘急也云不可使得罪于天子亦云可使怨及朋友六章言亂世進退皆有咎也今維曰仕往耳曾不知仕之甚急而且危也正直者謂之不可使將得罪於天子諛佞者謂之可使又見怨於責善之友從道則違時從時則違道寧得罪於天子不可得罪於公議也謂爾遷于王都曰予未有室家鼠思泣血思音伺王氏曰鼠思幽思也范氏曰凡物之多畏者唯鼠為甚傳曰無聲曰泣血疏曰淚出於目猶血出於體故以淚比血禮記云子臯執親之喪泣血三年無言不疾昔爾出居誰從作爾室七章責引去者也時有大夫去朝者其友之留者思而呼之曰爾可遷居于王都也去者不從以王都無室家為辭留者於是謂我憂思而至於泣血無一言而不見憎疾於人也且爾昔之出居於外誰為爾作室乎能作室於外而乃謂王都無室家何哉我之此言爾必憎疾葢言切中則人所惡也補傳曰詳味此詩可謂衆多如雨非為政之道也雨無正七章二章章十句二章章八句三章章六句詩緝卷二十
