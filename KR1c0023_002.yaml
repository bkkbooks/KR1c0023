body:
  text: 詩緝卷二宋嚴粲撰召南國風說已見周南釋文曰召在岐山之陽扶風雍縣南有召亭朱氏曰今雍縣析為岐山天興二縣未知召亭的在何縣或謂召南諸侯之風為太王王季之化故曰先王之所以教然摽梅野麕騶虞序皆言被文王之化當從朱氏以為文王也鵲巢夫人之德也朱氏曰文王之時關雎麟趾之化行於内諸侯蒙化以成其德而其道亦始於家人故其夫人之徳如是當時之人詠歌而羙之當必為一人而作然周公取以為法明夫人之德皆當如是則其義不主於所指之人故序者持曰夫人之德而已國君積行累功行去聲以致爵位夫人起家而居有之䟽曰起自父母之家德如鳲鳩歐陽氏曰非鳴鳩乃可以配焉言夫人之德亦以見文王齊家之化行於諸侯非專羙夫人也維鵲有巢箋曰鵲之作巢冬至架之至春乃成䟽曰月令十二月鵲始巢山陰陸氏曰鵲作巢取在木杪枝不取墮地者故一曰乾鵲淮南子云太陰所建蟄蟲首穴而處鵲巢向而為戶又曰蟄蟲鵲巢皆向太一蓋鵲巢開戸向太一而背嵗故博物志云鵲背太歲也先儒以為鵲巢居而知風蟻穴居而知雨鵲歲多風則去喬木巢旁枝故能髙而不危也俗說鵲巢中必有梁見鵲上梁者必貴今二鵲共衘一木置巢中謂之上梁維鳩居之曰鳩拙鳩也直謂之鳩者也舊說以為鳲鳩秸鞠布穀戴勝非也秸鞠音戛菊鳲鳩别解見曹風鳲鳩歐陽氏曰今所謂布穀戴勝者與鳩絶異惟今人直謂之鳩者拙鳥也不能作巢多在屋瓦間或於木上架結木枝初不成窠便以生子往往墜雛今鵲作巢甚堅既生雛散飛則棄而去容有鳩來處彼空巢之子于歸朱氏曰之子指夫人歸解見桃夭百兩御之兩音亮御音迓傳曰百兩百乘也諸侯之子嫁於諸侯送御皆百乘䟽曰車有兩輪故稱兩御夫家迎之也興也鵲巢冬架春成用力勞矣而鳩乃居之譬國君之致爵位非一日之故其積累難矣而是子之嫁乃以車百兩迎之安然來居夫人之位風人意在言外凡言人之賢但稱其服飾之羙此言夫人之德亦但稱其坐享成業是其有德以稱之自見於言外矣非文王齊家之化何以致此詩記曰夫人坐享成業非有婦德者殆無以堪之也朱氏曰南國諸侯被文王之化能正心脩身以齊其家其女子亦被后妃之化故嫁於諸侯而其家人羙之維鵲有巢維鳩方之解頥新語曰方之以為其所也之子于歸百兩將之傳曰將送也䟽曰父母家人送之也維鵲有巢維鳩盈之傳曰盈滿也箋曰言衆媵姪娣之多也䟽曰公羊傳云諸侯一娶九女二國往媵之以姪娣從補傳曰味盈之之言可見夫人不姤忌之子于歸百兩成之朱氏曰成謂成其禮也鵲巢三章章四句采蘩音煩夫人不失職也夫人可以奉祭禩則不失職也夫人之職在於奉祭禩言可以者謂有夫人之德也左氏傳云苟有明信澗溪沼沚之毛蘋蘩蕰藻之菜可薦於鬼神所謂可者不在物而在人也于以采蘩傳曰于於也釋草曰蘩皤蒿皤音婆孫炎曰白蒿也陸璣曰春始生可䰞香羙又可蒸及秋名曰蒿䰞煑同山陰陸氏曰蒿青而髙蘩白而繁白蒿葉麤於青蒿從初生至枯白於衆蒿今俗謂之蓬蒿可以為菹七月采蘩祁祁所以生蠶也箋曰以豆薦蘩菹粲曰祭統云夫人薦豆于沼于沚音止傳曰沼池也釋水曰小洲曰陼小陼曰沚陼渚同䟽曰蘩非水菜言沿沚者謂於其旁采之也曹氏曰采之必於沼沚山澗就以潔之也于以用之公侯之事傳曰事祭事也長樂劉氏曰尊祭禩故直謂之事春秋有事於太廟是也賦也言於何處采蘩乎或沼池或沚渚於其旁而采之也於何處用之乎於諸侯祭禩之事而用之也此言夫人之職而可以奉宗廟之意自見矣于以采蘩于澗之中傳曰山夾水曰澗䟽曰澗之中亦謂於曲内采之非水中也于以用之公侯之宮傳曰宮廟也曹氏曰莊二十三年丹桓宮楹明年刻桓宫角注云宮廟也被之僮僮音同曰被首飾也即天官追師副編次之次也副編次解見鄘君子偕老追音堆編音匾又如字䟽曰剔賤者或刑者之髮以被婦人之紒為飾因名髲鬄焉紒音計髲音避鬄音第亦作髢粲曰天官内司服后六服褘衣揄翟闕翟謂之三翟與鞠衣展衣褖衣為六也首飾則有副編次三翟為祭服首皆服副鞠衣告桑之服展衣朝王及見賔客之服首皆服編褖衣進朝於王之服首則服次凡諸侯夫人於其國衣服與王后同王公夫人得禕衣以下侯伯夫人得揄翟以下被即次也夫人祭禩不應服次曹以為此在商時故與周禮異禕音暉揄音摇鞠音菊展音戰禮記作襢禒音彖周禮翟音狄傳曰僮僮竦敬也長樂劉氏曰歩雖移而服不動之貌夙夜在公朱氏曰公公所也謂宗廟之中非私室也被之祁祁傳曰祁祁舒遲也去事有儀也薄言還歸還音旋粲曰還如字者復也音旋者復返也故還歸皆當音旋字亦作旋釋文於邶泉水還車言邁云此字例音旋更不重出夫人服首飾之被僮僮然竦敬夙夜在公所而助祭及祭畢則又服其被祁祁然舒遲而旋歸有餘敬也此形容夫人孝敬宗廟周旋中禮其德可見矣朱氏曰祭義云及祭之後陶陶遂遂如將復入然不欲遽去愛敬之無已也陶音摇采蘩三章章四句草蟲大夫妻能以禮自防也自后妃及夫人自夫人及大夫妻皆文王齊家之化也喓喓草蟲喓音腰傳曰喓喓聲也草蟲常羊也襗蟲曰草蟲負蠜蠜音煩陸璣曰大小長短如蝗奇音青色好在茅草中作聲山隂陸氏曰蓋草蟲鳴阜螽躍而從之故阜螽曰蠜草蟲謂之負蠜也趯趯阜螽趯音剔螽音終傳曰趯趯躍也曰阜螽者蝗也蠜也即螽斯也解見螽斯未見君子憂心忡忡音充傳曰忡忡猶衝衝也粲曰擊鼓憂心有忡䟽引出車憂心忡忡為憂之意亦既見止傳曰止辭也亦既覯止覯溝之去傳曰覯遇也我心則降戶江反傳曰降下也興也召南之大夫行役在外其妻獨居聞草蟲喓喓然而鳴見阜螽趯趯然躍而從之感物類之相從而思其君子故言今未見君子則我憂心忡忡然他日亦既見矣亦既遇矣我心方降下而息其念慮也觸物感時而謹身以待其歸所謂以禮自防也陟彼南山言采其蕨音厥釋草曰蕨虌虌音鼈郭璞曰初生無葉可食陸璣曰山菜也周秦曰蕨齊魯曰虌未見君子憂心惙惙音輟朱氏曰惙惙憂也亦既見止亦既覯止我心則説音悦言有升南山而采蕨者矣感節物之新而思其君子也陟彼南山言采其薇音微陸璣曰亦山菜也莖葉皆似小豆蔓生其味亦如小豆藿可作羮亦可生食今官園種之以供宗廟祭禩也山陰陸氏曰禮芼豕以薇記云鉶芼十藿羊苦豕薇是也項氏曰薇今之野豌豆苖也蜀人謂之巢菜東坡改名為元修菜是也豌音剜未見君子我心傷悲亦既見止亦既覯止我心則夷傳曰夷平也粲曰風雨傳云悦也人喜悦則心平夷其意一也那頌所謂夷悦也草蟲三章章七句采蘋音頻大夫妻能循法度也能循法度則可以承先祖供祭禩矣共音恭采蘋采蘩之推也王氏謂所薦之物所采之處所用之器所奠之地皆有常而不變所謂能循法度此猶未盡詩之意蓋法度者儀物也能循者敬也非敬則儀物之常何足為美乎于以采蘋傳曰蘋大䓑也䓑本又作萍一本作萍音平釋草曰䓑其大者蘋項氏曰栁惲所謂汀洲采白蘋者水生而似萍者也宋玉所謂起於青蘋之末者陸生而似莎者也南澗之濵音賔傳曰濵厓也于以采藻音早曰藻水菜也傳曰聚藻也䟽曰左傳云蘋蘩蕰藻之菜蕰聚也故言聚藻陸璣曰生水底有二種其一種葉似雞蘇莖大如筯長四五尺其一種莖大如釵股葉似蓬蒿謂之聚藻藻聚生故謂之聚藻也此二藻皆可食熟煮挼去腥氣米麫糝蒸為茹佳羙荆揚人饑荒可以充食山陰陸氏曰藻水草之有文者其字從澡自潔如澡也書云藻火粉米藻取其清火取其明也山節藻梲蓋藻非特取其文亦以禳火今屋上覆橑謂之藻井風俗通云殿堂宫室象東井形刻作荷菱水草也所以厭火與此同義橑僚老二音今曰毛鄭引昏義云古者婦人先嫁三月教以婦徳婦言婦容婦功教成祭之牲用魚芼之以蘋藻言蘋藻不特可以為豆菹亦可以芼羹也于彼行潦音老傳曰行流也説文曰潦雨水也于以盛之盛音成維筐及莒音舉傳曰方曰筐囿曰筥曹氏曰筐筥皆竹器也于以湘之傳曰湘烹也今曰韓退之盤谷歌云盤谷之泉可濯可湘用此湘字維錡及釡錡音蟻釜音輔傳曰錡釜屬有足曰錡無足曰釜于以奠之傳曰奠置也宗室牖下傳曰宗室謂太宗之廟也朱氏曰室前東戸西牖牖下則室中西南隅所謂奥也曹氏曰正祭設於奥誰其尸之傳曰尸主也有齊季女齊音齋傳曰齊敬也季少也朱氏曰少而能敬尤見其質之羙而化之所從來者逺矣賦也此詩三章當通作一意看言大夫之祭其宗廟也采蘋於南澗之濵厓采藻於流行之雨潦所薦常物耳盛此蘋藻於筐莒又烹之於錡釡所用常器耳又奠之於宗廟牖下所謂西南隅之奥亦常儀耳然誰其主此事乎乃齊敬之大夫妻也謂儀物特其常而其人之能敬所以可貴也左傳云苟有明信澗溪沼沚之毛蘋蘩蕰藻之菜筐筥錡釜之器潢汙行潦之水可薦於鬼神言在誠而不在物深得詩人之意也詩記曰所為者非一端所歴者非一所矣煩而不厭久而不懈循其序而有常積其誠而益厚然後祭禩成焉季女之少若未足以勝此而實尸此者以其有齊敬之心也大夫之妻未必果少特言敬持敬則雖少女猶足以當大事云耳今考本草水萍有三種其大者曰蘋葉圎濶寸許季春始生可糝蒸以為茹其中者曰荇菜其小者曰水上浮萍江東謂之薸毛氏以蘋為大萍是也郭璞以蘋為今水上浮萍即江東謂之薸是以小萍為大萍誤矣蘋可茹而薸不可茹豈有不可茹之薸而乃用以祭禩乎左傳云蘋蘩蕰藻之菜蘋藻皆菜則可茹之物非薸也今薸止可養魚薸音瓢采蘋三章章四句甘棠羙召伯也召音邵䟽曰風雅正經皆不言美此云羙召伯者二南文王之風唯不言美文王耳召伯之教明於南國詩補傳曰甘棠皆以為武王之詩謂文王雖分岐為周召采地實未嘗往莅其國至武王克商始分陜召伯聼訟已非文王之世而此詩又作於召伯既去之後抑不知文王化被南國而召伯聽訟之日又能推明其教行露既繫之文王甘棠雖在召伯既去之後亦未必作於武王之時不若繫之文王武王分周召為二伯詩稱召伯是作於武王之時也作詩雖在後明教前乎此矣二南皆文王詩也蔽芾甘棠芾音沸曹氏曰蔽芾䕃翳茂盛也曰甘棠白棠也釋木曰杜赤棠白者棠樊光曰白者為棠赤者為杜郭璞曰甘棠今之杜棃陸璣曰小如指酢味可食酢亦作酣說文曰醶也醶力減反山隂陸氏曰陸璣以為赤棠與白棠同耳但子有赤白羙惡白色為棠甘棠也赤棠子澁而酢無味俗語曰澁如杜是也勿翦勿伐今曰翦謂齊斷其枝釋文云伐斬木也謂斬伐其幹召伯所茇音跋箋曰茇草舍也朱氏曰止於其下以自蔽猶草舍耳非真作舍也賦也召公當文王為西伯之時奉命出使於召南之國觀省風俗布宣教令嘗止於甘棠之下至武王分陜之後召公為伯召南之人思召公往日之教因愛其所止之樹故言甘棠蔽芾然茂盛勿翦斷其枝勿斬伐其榦此召伯嘗茇舍於其下不可去之也召公所歴不止一處所憩亦不專在棠下詩人偶因其嘗憩之木而起興耳鄭氏謂不重煩勞百姓止舍小棠之下而聽斷者衍文也蔽芾甘棠勿翦勿敗音拜又如字粲曰敗謂殘壞之召伯所憩音器徐音熈之去傳曰憩息也豈特不可伐去亦不可殘壞之也蔽芾甘棠勿翦勿拜錢氏曰拜謂攀下也攀下其枝如人之拜粲曰謂低屈之挽其枝以至地也召伯所說音稅傳曰說舍也始則相戒不可斬伐而去之中則相戒豈特不可斬伐但殘壞之亦不可終則相戒豈特不可殘壞但低屈之亦不可愛之愈深䕶之愈至也甘棠三章章三句行露召伯聽訟也衰亂之俗㣲貞信之教興彊暴之男不能侵陵貞女也召公聽訟尚有彊暴侵陵之事是紂之舊染猶存而文王之化猶未純被之日也厭浥行露厭浥音葉邑傳曰厭浥濕意也行道也豈不夙夜謂行多露興也召南之國有男侵陵於女而女不從男遂誣女以有室家之約而召伯聽其訟此詩述女子自訴之辭言厭浥然而濕者行道之露也我豈不欲早暮而行乎以行道多露之濡已故懼而不敢也喻違禮而行必有汙辱我所以不從男子之侵陵也誰謂雀無角何以穿我屋誰謂女無家女音汝何以速我獄傳曰速召也雖速我獄室家不足誰謂鼠無牙楊氏曰牙牡齒也鼠無牡齒何以穿我墉音容傳曰墉墻也誰謂女無家何以速我訟雖速我訟亦不女從此言女子被誣非遇召伯則不能自明也謂猶言也雀有咮而無角咮音晝釋文曰咮鳥口也鼠有齒而無牙事有可疑而實不然者唯明者能辨之誰言雀之無角乎雀若無角何以能穿我屋也然雀之穿屋實以咮非以角也誰言鼠之無牙乎鼠若無牙何以能穿我墉墻也然鼠之穿墉實以齒非以牙也人見男女之訟孰不疑其有室家之事猶見雀之穿屋而疑其有角見鼠之穿墉而疑其有牙故謂誰言汝男子於我無室家之事乎若無室家之事何以召我獄訟也然雀實無角鼠實無牙男子乃是侵陵實無室家之事唯召公之明能察其情而決其訟使正女之志得以自伸故繼言汝男子雖召我獄而室家之道終不足謂誣我以訟此非室家之道不與汝為夫婦也行露三章一章三句二章章六句羔羊鵲巢之功致也朱氏曰在位節儉正直本於國君夫人正身齊家以及其國之效故曰鵲巢之功致也召南之國化文王之政在位皆節儉正直德如羔羊也呂氏曰徳如羔羊如羔羊之詩也粲曰猶言好賢如緇衣國君齊家而及國其本由於闗雎故曰化文王之政羔羊之皮傳曰小曰羔大曰羊䟽曰大夫之裘宜言羔而已兼言羊者協句也傳以羔羊並言故以小大釋之素絲五紽音紽曰紽縫也縫音逢傳曰古者素絲以英裘紽數也又曰總數也䟽曰謂紽總之數有五非訓紽總為數紽亦縫也織素絲為組紃以英飾裘之縫中紃亦組之類素絲非線也紃音旬曹氏曰一裘之功必合衆皮而成故其縫殺不一補傳曰合五羊之皮為一裘循其合處以素絲為英飾也百里奚衣五羊之皮蓋倣古制錢氏曰兩皮之縫不易合故織白絲為紃施之縫中連屬兩皮因以為飾粲曰䟽云韠與裳同色衣與冠同色黑冠朝服冠黒則服亦黒故用黒羔皮為裘而以緇布為衣以裼之袒而有衣曰裼見美也以緇布衣覆之使可裼也必覆之者裘䙝也其上乃加朝服此緇衣羔裘諸侯日視朝之服卿大夫朝服亦服之其所異者君則純色臣則以他物飾其褎所謂羔裘豹褎羔裘豹袪是也裼音錫褎音袖退食自公朱氏曰自從也公公朝也委蛇委蛇音威移箋曰委蛇委曲自得之貌廣漢張氏曰重言委蛇舒泰而有餘裕也賦也言召南在位之臣服此羔裘以趨朝有素絲織為組紃於五處縫中縫中之縫音奉紽縫而飾之紽縫之縫音逢朝畢自公朝退食於私家委蛇然舒泰而自得在公之謹飭勉強可能也退食而委蛇則顯微無間也服飾有常俯仰無愧節儉正直之意隱然可見矣羔羊之革傳曰革猶皮也䟽曰說文謂獸皮治去其毛曰革對文則異散則通素絲五緎音域傳曰緎縫也縫音逢委蛇委蛇自公退食羔羊之縫當音奉舊亦音逢素絲五總音驄䟽曰總亦縫也縫音逢委蛇委蛇退食自公羔羊之縫言其縫中也總縫謂縫之也羔羊三章章四句殷其靁殷音隱靁亦作雷勸以義也召南之大夫李氏曰召南之大夫謂西陜諸國之大夫也黄氏曰文王之時召公未分陜曰召南之國曰召南之大夫皆後世作序者之辭而非當時作詩者之辭也逺行從政不遑寧處音杼其室家能閔其勤勞勸以義也殷其靁傳曰殷靁聲也在南山之陽傳曰山南曰陽何斯違斯傳曰違去也莫敢或遑傳曰遑遐也粲曰或者間或之義不敢或遑則無一時之暇矣振振君子振音真傳曰振振信厚也振振有考見螽斯歸哉歸哉錢氏曰哉疑辭興之不兼比者也傳不言興今從朱氏召南大夫之妻感風雨將作而念其君子言殷然之靁聲在彼南山之南何為此時違去此所乎蓋以公家之事而不敢遑暇也所謂勸以義也遂稱振振信厚之君子歸哉歸哉冀其畢事來歸而不敢為决辭知其未可以歸也從事獨賢而無怨唯信厚者能之殷其靁在南山之側何斯違斯莫敢遑息振振君子歸哉歸哉殷其靁在南山之下何斯違斯莫或遑處傳曰處居也振振君子歸哉歸哉殷其靁三章章六句摽有梅摽飄之上男女及時也及時解見桃夭召南之國被文王之化男女得以及時也此詩述女子之情欲得及時而嫁蓋紂之淫風既微而婚姻以正女無異志必待聘而後行所謂被文王之化也摽有梅傳曰摽落也粲曰摽本訓擊邶柏舟寤辟有摽是也此詩謂擊而落之其實七兮求我庶士箋曰庻衆也迨其吉兮箋曰迨及也興也述女子之情言擊落之餘尚有殘梅其實之在木者惟七則其零落者多矣興女子盛年難乆當及時以嫁無使華色之衰落如彼梅也於此衆士之中求擇之以為婚姻當及此時日之吉懼良辰之難得而易失也補傳曰詩人但喜其得以及時耳摽有梅其實三兮求我庶士迨其今兮傳曰今急辭也在者三則向之七又落其四時過而不留不可緩矣故言及今可以成婚不拘時日之吉也摽有梅頃筐墍之頃音傾墍音餼頃筐解見卷耳傳曰墍取也粲曰墍字從土本訓塗今言取者謂取之於地霑地濕也求我庶士迨其謂之歐陽氏曰謂相語也摽落之後有梅在地今以欹筐就地取之蓋盡落而無在木者時愈過而女心切矣男當先求於女今反欲遣媒妁以語男家也摽有梅三章章四句小星惠及下也夫人無姤忌之行去聲惠及賤妾進御於君知其命有貴賤能盡其心矣小星樛木之化也嘒彼小星嘒音諱傳曰嘒㣲貌三五在東補傳曰毛謂三心五噣噣即柳也天文志星經以柳為八星又心以三月見於東噣以正月見於東詩人言一時所見則五非噣明矣或又以三五喻夫人然夫人一而已不當有三五噣音晝箋曰在東在天也粲曰綢繆三星在天傳云在天謂始見於東方也列星始見於天則在東方始見於東喻始進御於君也肅肅宵征傳曰肅肅疾貌宵夜也征行也粲曰鴻雁肅肅其羽唐風肅肅鴇羽皆疾也夙夜在公箋曰夙早也曰公君所也寔命不同寔音植傳曰寔是也興也傳不言興今從朱氏言嘒然而㣲者衆無名之小星也或三或五始見於東方如我衆妾肅肅然夜行之疾以進御或早行或夜往以在公所而不敢當夕者是命之貴賤與夫人不同也傳以三五指心柳三作特三柳本非五不必指心柳也朱氏曰衆妾進御於君不敢當夕見星而往見星而還故因其所見以起興嘒彼小星維參與昴參音森傳曰參伐也昴留也䟽曰參白虎宿三星直下有三星銳曰伐其外四星左右肩股也則參實三星故綢繆傳云三星參也以伐與參連體參為列宿統名之若同一宿然伐亦為大星與參互見皆得相統故周禮熊旂六旒以象伐注云伐屬白虎宿與參連體而六星故言參伐也昴六星留言物成就繫留也補傳曰參昴比小星為大蓋以喻娣媵也肅肅宵征抱衾與裯音儔傳曰衾被也裯襌被也襌音單詩記曰禮記玉藻注襌無裏箋曰抱衾裯待進御寔命不猶傳曰猶若也參昴雖大星然其星非一亦止可喻娣媵夫人一而已言小星之中參昴為大小星不敢比參昴猶我衆妾不敢比娣媵貴賤有等級也小星二章章五句江有汜音祀美媵也媵音孕䟽曰媵妾也古者嫁必姪娣從謂之媵士婚禮云雖無娣媵先言姪若無姪娣猶先媵是士有姪娣但不必備爾勤而無怨嫡能悔過也嫡音的䟽曰嫡謂妻也文王之時江沱之間沱音駝有嫡不以其媵備數媵遇勞而無怨嫡亦自悔也程子曰不以媵備嫡妾之數而侍君江沱之間以所見起興董氏以序為失詩㫖非江有汜釋水曰決復入為汜釋水凡水決之岐流復還本水者名汜之子歸不我以范氏曰以之為言用也詩記曰不使大臣怨乎不以之以不我以其後也悔興也江則有汜興嫡妻則當有媵也今之子嫡妻之嫁歸始不我用其後乃悔也江有渚音煑釋水曰小洲曰渚渚作陼傳曰水岐成渚之子歸不我與詩記曰吾不與也之與不我與其後也處音杵朱氏曰處安也江有沱傳曰沱江之别者釋水曰水自河出為灉漢為潛江為沱釋曰皆大水分出别為小水之名也䟽曰禹貢梁州荆州皆有沱潛者蓋以水從江漢出者皆曰沱潛所以二州皆有也之子歸不我過音戈詩記曰言不我顧也不我過其嘯也歌箋曰嘯蹙口而出聲今考王風字作歗此字作嘯補傳曰嘯長吟也朱氏曰嘯以舒憤懣之氣言其悔時也歌則得其所處而樂矣王風云條其歗矣列女傳云倚柱而歗皆悲歎之聲也詩記曰始則悔寤中則相安終則相歡言之序也江有汜三章章五句野有死麕音君惡無禮也惡烏路反天下大亂彊暴相陵遂成淫風被文王之化雖當亂世猶惡無禮也野有死麕説文曰麕麞也陸璣曰青州謂之麏春秋傳云麋興於前是也山隂陸氏曰崔豹古今注云鹿有角而不能觸麞有牙而不能噬麞如小鹿而美語云四足之美有麃即麞也白茅包之傳曰包裹也有女懷春傳曰懷思也粲曰春者天地交感萬物孳生之時聖人順天地萬物之情令媒氏以中春㑹男女故女之懷婚姻者謂之懷春吉士誘之曹氏曰吉善良也比也俗有淫奔者此詩述聞者惡之之辭言野外有死麕人欲取其肉而食之猶以白茅包裹之恐為物所汚有女子懷春而欲嫁善良之士何不以禮娶之乃誘之乎無禮者豈是吉士但羙其稱以責之言汝本善良何乃為此猶今責人者言謹厚者亦復為之林有樸􅈪二字音僕速樸又音卜野有死鹿白茅純束純音豚又徒本反釋文曰純聚也與屯音義同粲曰束縳也有女如玉樸􅈪小木可以薪野有死鹿可以食人猶有白茅純聚而包束之况有女如玉乃不以禮娶之而誘之乎舒而脫脫兮脫音退駾音同傳曰舒徐也脫脫舒遲也無感我􅍤兮􅍤音稅傳曰感動也􅍤佩巾也疏曰内則子事父母婦事舅姑皆左佩紛􅍤註紛􅍤拭物之巾也無使尨也吠尨音忙說文曰尨犬之多毛者此述惡無禮者語淫奔之人汝宜舒徐脫脫然無疾行以近我無感動我之佩巾無驚我之尨其人相近未必便動其􅍤未必便使尨吠但深惡而欲逺之所謂與惡人處若將凂焉者也野有死麕三章二章章四句一章三句何彼襛矣襛音戎韻又音濃羙王姬也雖則王姬亦下嫁於諸侯車服不繫其夫曹氏曰春官巾車掌王后之五路自重翟以至輦車凡五等重翟之次即厭翟也内司服掌王后之六服自褘翟以至褖衣凡六等褘翟之次即揄翟也凡婦人車服各繫其夫之尊卑惟王姬貴盛故特不繫其夫而下王后一等則車用厭翟服用揄翟矣按侯伯夫人皆厭翟碩人所謂翟茀以朝是也今言車服不繫其夫下王后一等則所嫁非諸侯故詩稱齊侯之子明其非諸侯也厭音葉褘音揮褖音彖揄音搖下王后一等猶執婦道以成肅雝之德也詩稱王姬之車必非文王之女當從毛氏以為武王之女也武王之詩當為雅而不當為風然此詩三章只是風體又詩中專言女德正與二南同科非雅之類當時采詩之官得之於召南之地以為武王之女下嫁召南之國能執婦道成其肅雝之徳皆本於文王太姒之化故以其詩列於召南而為文王之風甘棠之詩亦作於武王之世而為文王之風皆推本言之何彼襛矣朱氏曰襛盛也說文曰衣厚貌唐棣之華棣音第曰唐棣薁李也蘡薁也即七月之薁也蘡音嬰釋木曰唐棣栘栘音移郭璞曰今白栘也似白楊陸璣曰馬季云薁李也山隂陸氏曰其華反而後合詩曰偏其反而凡木華皆先合而後開惟此華先開而後合秦晨風云山有苞棣粲曰七月䟽鬱是車下李薁是薁李陸璣以唐棣為薁李則薁李非車下李矣璣又云薁李一名爵梅亦名車下李本草有郁李注亦云一名爵李一名車下李則薁李又有車下之名蓋由二者相類故名稱相亂也鬱薁解見七月曷不肅雝王姬之車協韻尺奢反又音居興也言何彼襛襛然而盛乎乃唐棣之華也興王姬下嫁車服之盛羙也不繫其夫故以為盛羙而誇之王姬雖車服之盛羙而不以貴盛自驕故言豈不肅敬雝和乎乃王姬之車也王姬不可見唯見其車故指車以言車中之人朱氏曰夫使人望其車而知其敬且和也則其根于中者深而發於外者著矣何彼襛矣華如桃李平王之孫傳曰平正也疏曰平王文王也徳能平正天下曹氏曰猶書稱武王為寧王齊侯之子朱氏曰言齊一之侯猶易之康侯禮之寧侯也何彼襛襛然而盛如桃李之華乎乃文王之孫適齊一之侯之子也桃李亦喻王姬車服之盛故先言文王之孫言文王之孫者以見王姬肅雝之徳其源流有自來也故此詩為文王之風其釣維何維絲伊緡音民傳曰伊維也緡綸也朱氏曰絲合而為綸齊侯之子平王之孫言釣魚如何乎維絲維綸也釣者以絲綸而得魚猶娶者以六禮而得妻此齊侯之子娶平王之孫也釣喻娶者故先言齊侯之子何彼襛矣三章章四句騶虞鵲巢之應也鵲巢之化行人倫旣正朝廷旣治天下純被文王之化則庶類蕃殖蒐田以時仁如騶虞則王道成也朱氏曰文王之化始於闗雎而至於麟趾則其化之入人深矣形於鵲巢而及於騶虞則其澤之及物廣矣蓋意誠心正之功不息而久則其熏烝透徹融液周徧自有不能已者非智力之私所能及也故序以騶虞為鵲巢之應而見王道之成其必有所傳矣天下純被文王之化以大較言之謂所及者廣耳其實商王猶在未能純被也彼茁者葭茁則劣反葭音加傳曰茁出也䟽曰草生茁茁然出曰葭蘆葦又名華一物而四名葭葦之初生者葭解見七月蒹葭薍三物十一名有考見秦蒹葭一發五豝音巴粲曰吉日發彼小豝謂發矢則中之一發言殺一而已傳曰豕牝曰豝于嗟乎騶虞于音吁曰騶虞者騶御及虞人也賦也言彼茁茁然而出者初生之葭也於彼草生之時召南國君出而田獵虞人翼五豝以待公之發翼驅也發矢則必中然止於一發仁心之至不忍盡殺故也田獵則騶御及虞人咸在作詩者呼騶虞之官而嗟歎之言有盡而意無窮蓋三歎國君之仁心而知其為文王之化也詩記曰彼茁者葭彼茁者蓬記蒐田之時蓋曹子桓所謂勾芒司節和風扇物草淺獸肥之時也一發五豝一發五豵獸之多而取之少也反三隅而觀之則天壤之間和風充塞庶類蕃殖交於萬物有道而恩足以及禽獸者皆可見矣月令季秋天子乃教於田獵命僕及七騶咸駕鄭氏云七騶謂趣馬主為諸官駕説者也說音稅成十八年左傳晉悼公使程鄭為乘馬御六騶屬焉使訓羣騶知禮是騶為騶御也朱氏孟子解以虞人為守囿之吏故齊景公田則招虞人是虞為虞人也禮記射義云天子以騶虞為節樂官備也謂騶御虞人皆不乏人則皆備可知毛氏以騶虞為義獸白虎黑文不食生物陸璣山隂陸氏皆和之司馬封襌文云囿騶虞於珍羣且謂般般之獸般斑同白質黑章晉張華又謂騶虞具五采乘之日行千里皆祖毛氏也今不從漢武帝時建章宫後有異物出焉其狀如麋東方朔云此騶牙也或附㑹此騶虞即騶牙非也爾雅無騶虞彼茁者蓬傳曰蓬草名山隂陸氏曰蓬蒿屬草之不理者也其葉散生如蓬末大於本故遇風輒拔而旋説苑云秋蓬惡於根本而羙於枝葉秋風一起根且㧞矣是以君子務本也莊子云夫子猶有蓬之心也夫蓬善轉旋非直達者也商子云飛蓬遇飄風而行千里乘風之勢也故古者觀浮木而知為舟觀轉蓬而知為車朱氏曰其華似柳絮聚而飛如亂髪也一發五豵音㚇傳曰豕一歳曰豵于嗟乎騶虞朱氏曰鵲巢至采蘋言夫人大夫妻以見當時國君大夫被文王之化而能脩身以正其家也甘棠以下又見由方伯能布文王之化而國君能脩之家以及其國也然文王明德新民之功至是而其所施者溥矣騶虞二章章三句詩緝卷二
