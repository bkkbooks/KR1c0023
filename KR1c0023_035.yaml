body:
  text: 詩緝卷三十五宋嚴粲撰魯頌譜曰魯者少昊摰之墟也周公歸政成王封其元子伯禽於魯其封域在禹貢徐州大野䝉羽之野自後政衰國事多廢十九世至僖公當周惠王襄王時而遵伯禽之法養四種之馬牧於坰野尊賢祿士修泮宫守禮教僖十六年冬會諸侯于淮上謀東略公遂伐淮夷僖二十年新作南門又修姜嫄之廟至於復魯舊制未遍而薨國人美其功季孫行父請命於周而作是頌疏曰修泮宫春秋不書者修謂舊有其宫修行其教學之法功費微少非城郭都邑例所不書也春秋經傳僖公無伐淮夷之事案左傳僖十六年冬公㑹諸侯于淮未歸而使師取項公為齊所止十七年方始得還傳曰書曰公至自㑹猶有諸侯之事焉且諱之也經傳無伐淮夷文者當是史脫漏修姜嫄之廟春秋不書者魯國舊有此廟更修理之用功少例所不書也朱氏曰魯今襲慶東平府沂密海等川即其地也夫子云魯之郊祀非禮也周公其衰矣而程子亦云成王之賜伯禽之受皆非也蓋不與其僣也然則刪詩之際何取乎此而著于篇乎曰著之所以見其僣也春秋書郊禘大雩雉門兩觀猶是意也削之則沒其實矣抑魯於天子禮樂有得用之文而是頌之作又嘗請命于天子而為之其辭特以贊美當時之事其體猶列國之風非若商周天子之頌用於祭祀以詠歌先祖之功烈也聖人於此以為其文若可以無嫌者故其文豫之而實則不豫也况夫子魯人亦安得而削之哉或曰魯之無風何也先儒以為時王褒周公之後比於先代故巡守不陳其詩而其篇第不列於大師之職是以宋魯無風其或然歟或謂夫子有所諱而削之則當時列國大夫賦詩相屬及吳季子觀周樂於魯皆無曰魯風者其說不通矣曹氏曰明堂位云成王命魯公世世祀周公以天子之禮樂祀帝于郊配以后稷天子之禮也若魯公果受成王之命則當自伯禽以後踵而行之矣由伯禽至僖公几十冇八世考諸春秋史記皆未嘗行郊禮而惟僖公行之豈成王之命獨豫加於僖公歟故知其僣自僖公始也夫以諸侯而僣天子之禮天子雖不能討而天亦吐之是以僖三十一年夏四十郊不從乃免牲宣三年春郊牛之口傷改十牛牛死乃不郊成七年春鼷鼠食郊牛角乃不郊襄元年春鼷鼠食郊牛角定十五年鼷鼠食郊牛角牛死皆改十牛然則天之不歆其祀亦可見矣夫祭天天子之大禮也而猶敢僣焉則其僣而作頌抑其次也魯頌頌之變也周之王也積纍深久由風而雅雅而頌及其衰也至懿風始變至厲雅始變至平雅遂亡頌聲之息前乎風雅之變矣越桓莊僖惠至襄而魯乃有頌雅頌天子之詩也頌非所施於魯况頌其郊乎考其時則非揆其禮則誅汰哉克也不如林放矣聖筆不刪其以著魯之僭而傷周之衰歟是故雅變而亡頌亡而變雅之亡甚於變頌之變甚於亡也駉實風耳存其頌名而謂之變頌可也駉古熒反頌僖公也疏曰舒瑗云魯不合作頌故每篇言頌明生於不足也僖公名申莊公子閔公卒季友立之當惠王襄王時僖公能遵伯禽之法儉以足用寬以愛民疏曰儉以足用寬以愛民說僖公之德與務農重榖為首引於經無所當也務農重榖牧于坰野坰駉同音魯人尊之於是季孫行父請命于周父音甫箋曰季孫行父季文子也朱氏曰請命之事不見於春秋豈行父使人請之歟而史克作是頌箋曰史克魯史也疏曰此頌之作在僖公薨後知者以大夫無故不得出境上請天子追頌君德雖則羣臣發意其行當請於君若在僖公之時不應聽臣請王自頌已德明是僖公薨後也文六年行父始見於經十八年史克名見於傳則克於文公之時為史官矣然則此詩之作當在文公之世其年月不可得而知也駉頌序云史克作是頌廣言作頌不指駉篇則四篇皆史克作閟宫云新廟奕奕奚斯所作自言奚斯作新廟耳而漢世文人班固王延壽之等謂魯頌是奚斯作之謬矣文十八年左傳稱季文子使太史克對宣公知史克魯史也此雖昔名為頌而體實國風非告神之歌故有章句也孔氏考魯頌作於僖公身後非也今觀閟宫等篇多未有事實而願其如此如曰俾爾耆艾黃髮兒齒曉然為生前祝頌之辭蓋生前作之後乃聞之天子以文過耳未必得請而後作也牧馬一事耳頌於何有駉駉牡馬傳曰駉駉良馬腹幹肥張也在坰之野傳曰坰逺野也邑外曰郊郊外曰野野外曰林林外曰坰箋曰必牧於坰野者避民居與良田也周禮云以官田牛田賞田牧田任逺郊之地李氏曰坰之野其水草甚美既不害於農又使馬得其所養詩言務農重榖但觀牧馬於逺方之地則可見矣薄言駉者程子曰薄言發語辭劉氏曰薄言者聊言之而已有驈有皇驈音聿釋畜曰驪馬白跨驈黃白皇跨苦化反疏曰孫炎云驪黑色郭璞云跨髀間所跨據之處皇解見東山髀比陛二音有驪有黃傳曰純黑曰驪黃騂曰黃疏曰其驪與黃爾雅無文月令孟冬駕鐵驪象時之色檀弓云夏后氏尚黑戎事乘驪騂赤色也黃騂謂黃而雜赤色者以車彭彭如字音棚考見出車蘇氏出車解曰彭彭壯盛也思無疆曹氏曰思無疆言其思之廣也思馬斯臧箋曰臧善也有駉駉然腹幹肥張之牡馬其牧養之乃在逺野之坰不以妨農也略言其駉駉者是何馬乎乃有驈皇驪黃之四色用之以駕車則彭彭然壯盛此由僖公思慮廣大無疆所思乃至於馬牧之得所而馬思善然僖公未能思無疆也駉駉牡馬在坰之野薄言駉者有騅有駓騅音追駓音丕釋畜曰蒼白雜毛騅黃白雜毛駓郭璞曰騅即今騅馬也駓今之桃華馬也疏曰二者皆云雜毛是體有二色之毛相間雜上云黃白曰皇黃騂曰黃止一毛色之中自有淺深與此二色者異有騂有騏音其傳曰亦黃曰騂蒼祺曰騏疏曰騂騏爾雅無文騂為純赤色上云黃騂曰黃謂黃而微赤此云赤黃曰騂謂赤而微黃騏者黑色之名蒼騏曰騏謂青而微黑今之驄馬也以車伾伾音丕傳曰伾伾有力也思無期曹氏曰思無期言其思之久也思馬斯才傳曰多材也朱氏曰材力也駉駉牡馬在坰之野薄言駉者有驒有駱驒音駝駱音洛釋畜曰青驪驎驒白馬黑鬛駱驎音鄰郭良忍反疏曰孫炎云色有淺深似魚鱗也郭璞云色有淺深班駁隱𥻘今之連錢驄也鬛謂馬之騣也有駵有雒駵音留亦作騮雒音洛傳曰赤身黑鬛曰駵黑身白鬛曰雒疏曰駵雒爾雅無文駵為赤色若身鬛俱赤則騂馬故赤身黑鬛曰駵即今之駵馬也以車繹繹音亦傳曰繹繹善走也思無斁音亦箋曰斁厭也無厭倦也思馬斯作蘇氏曰作奮起也駉駉牡馬在坰之野薄言駉者有駰有騢駰音因騢音遐釋畜曰隂白雜毛駰彤白雜毛騢孫炎曰隂淺黑也郭璞曰駰今之泥驄也彤赤也有驔有魚驔音簟傳曰豪骭曰驔骭間之去音莧疏曰驔爾雅無文骭者膝下之名謂毫毛在骭而白長釋畜曰一目白瞷二目白魚瞷音間郭璞曰似魚目以車袪袪起居反傳曰袪袪强健也思無邪朱氏曰詩三百一言以蔽之曰思無邪蓋取諸此蘇氏曰昔之為此詩者則未必知此也孔子讀詩至此而有㑹於其心是以取之蓋斷章云爾思馬斯徂箋曰徂猶行也駉四章章八句有駜音弼頌僖公君臣之有道也箋曰有道者以禮義相與之謂也有駜止述燕飲序辭衍矣有駜有駜傳曰駜馬肥彊貌詩記曰興僖公有臣之壯盛也駜彼乘黃乘去聲疏曰四馬曰乘黃黃馬也夙夜在公箋曰早起夜寐在於公之所錢氏曰在公家也在公明明李氏曰職事皆修明振振鷺振振解見周頌振鷺鷺于下歐陽氏曰振鷺取其能自修潔翔集有威儀也曹氏曰于下其初翔而集也鼓咽咽音淵傳曰咽咽鼓節也朱氏曰鼓聲之深長也醉言舞錢氏曰言語助蘇氏曰僖公於是燕之以禮樂士之來者如鷺之集其醉者或起舞以相樂和之至也于胥樂兮樂音洛箋曰于於也胥皆也有駜然而肥强者維何乎其駜然肥强者是彼一乘之黃馬也連言有駜非一馬也馬肥强則致逺喻臣壯盛則勝任也其臣自早逮夜在於公家其在公家相與修明其職言忠勤也僖公於是燕之以禮樂羣臣之來燕者皆修潔而有威儀如振振然羣飛之白鷺翔集而來下也燕樂之時鼓聲咽咽然深長其醉者或起舞以盡其歡於是君臣之間皆喜樂也有駜有駜駜彼乘牡王氏曰牡剛强之材也夙夜在公在公飲酒箋曰言臣有餘敬君有餘惠振振鷺鷺于飛箋曰飛喻羣臣醉欲退也鼓咽咽醉言歸于胥樂兮有駜有駜駜彼乘駽音絢釋畜曰青驪駽孫炎曰色青黑之間郭璞曰駽今之鐵驄也夙夜在公在公載燕箋曰載之言則也自今以始句歲其有君子有榖句箋曰榖善也詒孫子于胥樂兮羣臣既燕而祝頌其君以為自今以始歲事其當豐稔君子僖公有善道可以遺孫子於是君臣皆喜樂也有駜三章章九句泮水泮音判頌僖公能修泮宫也曹氏曰泮宫閟宫皆魯所舊有僖公因而修之非大功業故春秋不書思樂泮水樂音洛也王氏曰思語辭也傳曰泮水泮宫之水天子辟雍諸侯泮宫箋曰辟雍者築土壅水之外圓如壁四方來觀者均也泮之言半也半水者蓋東西門以南通水北無也疏曰辟雍者築土為堤以壅水之外使圓如璧釋器云肉倍好謂之璧孫炎云肉身也好孔也身大而孔小然則璧體圓而內有孔此水亦圓而內冇地是其形如璧也言四方來觀者均則辟雍之宫內有館舍外無牆院也泮宫必疑南有水者以行禮當南面而觀者宜北面蓄水木以節觀者宜其先節南方故知南有水而北無也好去上二聲冬官玉人注云璧孔也薄采其芹音勤箋曰芹水菜也解見采菽魯侯戾止臣工傳曰戾至也言觀其旗其旗茷茷音斾李氏曰茷茷飛揚也錢氏曰茷茷草葉多貌旗下垂如葉之多也鸞聲噦噦音誨呼㑹反王氏曰噦噦有節也朱氏曰和也無小無大從公于邁箋曰于往也邁行也李氏曰漢明帝開辟雍冠帶搢紳之人圜橋門而觀聽者蓋億萬計魯人以僖公能修泮宫而喜之言樂哉此泮水我往觀之而采其水中之芹也非以采芹為樂樂其修泮宫而託采芹以言之也僖公來至此泮宫我則觀其所建之旗其旗茷茷然飛揚其鸞鈴之聲噦噦然有節稱其儀物之美者喜其來至之辭如所謂聞車馬之音見羽旄之美舉欣欣然有喜色也國人無幼無長皆從公往行而至泮宫以觀行禮言人心翕然樂從之也思樂泮水薄采其藻音早藻解見召南采蘋魯侯戾止其馬蹻蹻音矯傳曰蹻蹻言强盛也其馬蹻蹻其音昭昭音沼李氏曰見其聲音之好音者聲也今曰孟子云何其聲之似我君也載色載笑傳曰色溫潤也王氏曰載色載笑洪範所謂而康而色也黃氏曰即之也溫匪怒伊教曹氏曰猶夫子循循然善誘人也僖公在泮宫笑語其聲音昭昭然明亮載色而和載笑而樂未嘗有怒唯教之而已思樂泮水薄采其茆音卯曰茆蓴也傳曰鳬葵也鳬音符疏曰陸璣疏云茆與荇菜相似葉大如手赤圓有肥者著手中滑不得停莖大如匕柄葉可以生食又可鬻滑美江南人謂之蓴菜或謂之水葵諸陂澤水中皆有曹氏曰醢人有茆菹麋臡以為朝事之豆魯侯戾止在泮飲酒既飲㫖酒永錫難老疏曰天長與之以難老之福順彼長道屈此羣醜王氏曰屈服也醜衆也僖公既來至泮宫則與羣臣飲酒既飲美酒皆祝頌僖公願天長錫之以難老之福順從長逺之道以屈服此魯國之羣衆也穆穆魯侯疏曰穆穆美也敬明其德敬愼威儀維民之則箋曰則法也允文允武昭假烈祖假音格朱氏曰假感格也烈祖周公魯公也靡有不孝自求伊祜音戶穆穆然美者僖公也能敬明其德又敬謹其威儀內外皆善為下民之所法則也信有文矣信有武矣昭格於功烈之祖周公伯禽也僖公所行無不盡其孝道以此得福乃自求之也明明魯侯克明其德既作泮宫淮夷攸服矯矯虎臣矯居表反箋曰矯矯武貌今曰蹻蹻王之造字異音義同在泮獻馘音國解見皇矣淑問如臯陶音遙箋曰淑善也疏曰善問獄者在泮獻囚傳曰因拘也疏曰所馘者是不服之人須武臣之力殺其人而取其耳故使武臣如虎者獻之所囚者服罪之人察獄之吏當受其辭而斷其罪故使善聽如臯陶者獻之有明明之德者僖公也能益明其德既作泮宫之後將伐淮夷而服之有矯矯然威武如虎之臣於此泮宫獻其所已殺而截其左耳以為馘者又有善問獄之臣如臯陶者於此泮宫獻其所生執而囚之者古者受成于學故出征執有罪反釋奠于學以訊馘告詩人因其修泮宫可以為獻功之地而頌禱之耳自此以下皆然非有實事也濟濟多士克廣德心李氏曰夫人心可謂廣矣以其無所不至無所不有也惟其為血氣所使一有毫釐之利則忿而爭其心於是乎隘惟其寬厚未嘗褊躁此其心所以廣也桓桓于征傳曰桓桓武貌狄彼東南狄音剔釋文曰狄逺也王氏曰攘而逖之蘇氏曰古狄逖通曹氏曰敵人畏而逺之箋曰東南斥淮夷蒸蒸皇皇箋曰蒸蒸猶進進也李氏曰皇皇大也曹氏曰其並進而嚮敵也蒸蒸然其合衆而為大也皇皇然不吳不揚吳如字又音話吳解見絲衣李氏曰揚輕揚也不告于訩音凶箋曰訩訟也李氏曰左傳襄公二十六年楚子侵鄭鄭皇頡戍之出與楚師戰敗穿封戍囚皇頡公子圍與之爭之正於伯州犂伯州犂曰請問於囚乃立囚伯州犂曰所爭君子也其何不知上其手曰夫子為王子圍寡君之貴介弟也下其手曰此子為穿封戌方城外之縣尹也誰獲子囚曰頡遇王子弱焉蓋爭其功者戰士之常也僥幸一勝萬死一生之間惟圖厚賞而已則其爭功無所不至在泮獻功濟濟然衆盛之多士能廣大其德心並無褊躁忿爭之失桓桓然有威武之容而往行征伐攘逺彼東南之淮夷使之不得侵近邊境此多士勇於嚮敵蒸蒸然而進其勢之合皇皇然而大不吳而喧譁不揚而輕浮無有告於治訟之官者無爭訟也唯在泮宫之內獻其戰功而已角弓其觩音求箋曰觩然言持弦急也蘇氏曰弓健貌束矢其搜音嵬傳曰五十矢為束疏曰孫卿論兵云魏氏武卒衣三屬之甲操十二石之弩負矢五十箇是一弩用五十矢矣孫則毛氏之師故從其言以五十矢為束也大司寇云入束矢於朝注云古者一弓百矢其百箇與則鄭意以百矢為束尚書及左傳所言賜諸侯以弓矢者皆云彤弓一肜矢百以一弓百矢故謂束矢當百箇而在軍之禮重弓以備折壞或亦分百矢以為兩束故不易傳也其發則搜然而徑箋曰搜然言徑疾也蘇氏曰矢疾聲戎車孔博朱氏曰博廣大也徒御無斁箋曰無厭倦也既克淮夷孔淑不逆箋曰淑善也式固爾猶箋曰猶謀也淮夷卒獲言角弓觩然而健一束五十之矢皆發之其聲搜然言徑疾也其戎車甚博大徒行者御車者皆兢勸而無厭倦故能克勝淮夷甚善而不逆者兵凶戰危疑於逆而不善今僖公伐所當伐以順而動也自今益審固其謀猶則淮夷可以盡獲也皆頌禱之辭翩彼飛梟翩音篇梟音遙傳曰翩飛貌曰梟怪鴟也解見陳墓門集于泮林疏曰泮林泮水之林食我桑黮音甚字亦作椹傳曰黮桑實也懷我好音箋曰懷歸也憬彼淮夷憬坰之上李氏曰說文云憬覺悟也來獻其琛敕金反傳曰琛寶也元龜象齒傳曰元龜尺二寸疏曰漢食貨志云龜不盈尺不為寶大賂南金賂音路傳曰賂遺也南謂荊揚也遺音位箋曰大猶廣也廣賂者賂君及卿大夫也荆揚貢金三品疏曰左傳襄二千五年晉帥諸侯伐齊齊人賂晉侯自六止五吏三十帥三軍之大夫百官之正長師旅及處守者皆冇賂金三品彼注云銅三色王肅以為金銀銅有翩然而飛者惡聲之梟鳥今來集止於泮水之林食其桑實乃改其鳴歸就我以善音喻淮夷慕泮宫之化改惡從善也淮夷世為魯患未必慕泮宫之化詩人張言泮宫之美以為淮夷亦將來慕也能悟覺而從化者彼淮夷也今就魯國獻其琛寶有尺二寸之大龜有象齒又大遺以南方之金亦頌禱之辭泮水八章章八句閟宫閟音祕頌僖公能復周公之宇也箋曰宇居也疏曰謂上地居處也蘇氏曰所謂居常與許復周公之宇者人之所以願之而其實則未能也李氏曰魯以諸侯之國而祀姜嫄后稷周之先王不可也郊天之祭亦不可也此詩示誇耀不亦過乎黃氏曰僖公在位三十三年伐邾者四敗莒滅項者一此魯之自用兵也其四年伐楚侵陳六年伐鄭是時齊威公方稱伯主兵率諸侯之師而魯亦與焉爾二十八年圍許是時晉文公方稱伯主兵率諸侯之師而魯亦與焉爾春秋所記凡魯之自主兵者皆邾莒項之小國至於所伐大國皆齊晉主兵則膺戎狄懲荆舒奄龜䝉荒大東荒徐宅至于海邦淮夷蠻貊及彼南夷莫不率從在僖公果冇是乎閟宫止為僖公能修寢廟張大其事而為頌禱之辭猶斯干之意耳序摘詩中復周公之宇一語以題之非事實也閟宫有侐音洫傳曰閟閉也侐清靜也朱氏曰閟深閉也吕氏曰閟宫魯廟非姜嫄廟也實實枚枚蘇氏曰實實鞏固也傳曰枚枚礱密也礱首聾赫赫姜嫄音元箋曰赫赫顯著也其德不回上帝是依無災無害彌月不遲箋曰彌終也終十月而生子不遲晚是生后稷降之百福曹氏曰后稷以此開國以至子孫為帝王所謂百福也黍稷重穋重平聲穋音六今考重字亦作穜穋字亦作稑稙稚菽麥稙音稙稚音雉傳曰先種曰稙後種曰稚疏曰重穋稙稚生熟早晚之異稱耳非榖名先種曰稙後種曰稚當謂先種先熟後種後熟但傳略而不言其熟耳七月傳曰後熟曰重先熟曰穋天官內宰鄭司農注云先種後熟謂之種後種先熟謂之稑是𫝊亦略而不言其𫝊與此互相明也奄有下國朱氏曰堯封之邰也俾民稼穡有稷有黍有稻有秬音巨箋曰秬黑黍也奄冇下土劉氏曰奄有下上書言后稷建邦啓土是也夫如是則民附之而無此疆爾界矣故能奄冇下上也語言稷躬稼而有天下是也奄有下國所以原其始奄冇下土所以要其終纘禹之緒傳曰緒業也錢氏曰至武王遂能奄有天下繼禹之業作者將美僖公追述逺祖上陳姜嫄后稷至於大王文武爰及成王封建之辭魯公受賜之命言其所以有魯之由也魯之羣廟其宫深閟侐然清淨又實實然鞏固枚枚然細密既言其廟遂推本周家所由興言赫赫乎顯著者姜姓之女名嫄也其德不回而有常天用是憑依其身使之有子無災殃無患害彌終十月而生子不遲晚其所生者乃是后稷天降與之以百種之福使之有黍有稷冇先種後熟之重後種先熟之穋先種先孰之稙後種後熟之稚又有菽與麥以此覆有下國而受封於邰使民知稼穡之道也復申說其事有稷黍稻秬後世修后稷之業逐有天下繼禹之業也后稷之孫實維大王大音泰居岐之陽實始翦商箋曰翦所也大王冇王迹故云是始斷商斷音短至于文武纘大王之緒致天之届音戒王氏曰届至也今曰小辨不知所届于牧之野無二無虞箋曰虞度也上帝臨女音汝敦商之旅郭鄭音堆徐如字克咸厥功箋曰敦治也旅衆也咸同也今曰敦商謂治而正之言伐商也伐商之衆謂我之上衆旅猶敦琢其旅之旅十亂一心三下同德是也同其功謂共成其功也后稷之孫實維大王自豳而來居於岐山之南民往歸之初有王迹實始有斷商之萌兆也至于文王武王纘繼大王之緒業前乎此天雖眷周而天命未至及牧野之戰天命至矣實文武之德有以致之故曰致天之届于牧之野也唯天命已至故武王無有疑二無有虞度上帝實臨之上順天心也與伐商之羣衆同其功下順人心也豈武王之私欲哉王曰叔父傳曰王成王也箋曰叔父周公也建爾元子傳曰元首也李氏曰元子封於魯其餘則凡蔣邢茅胙祭焉祭音再俾侯于魯大啓爾宇傳曰宇居也今曰箋謂封以七百里今不從王氏曰孟子云周公之封於魯為方百里也地非不足也而儉於百里李氏曰詩人言大啓爾宇不過諸公侯方百里耳為周室輔乃命魯公箋曰魯公伯禽也俾侯于東箋曰東東藩魯國錫之山川導江鮮于氏曰山川謂境內之山川也土田附庸導江鮮于氏曰孟子云不能五十里不逹於天子附於諸侯曰附庸疏曰論語云夫顓史昔者先王以為東䝉主是社稷之臣顓㬰魯之附庸謂之社稷之臣者以其附屬於魯亦謂魯之社稷李氏曰春秋之時有邾國亦魯之附庸也周公之孫莊公之子傳曰謂僖公也龍旗承祀曹氏曰司常言日月為常王建之交龍為旗諸侯建之僖公雖僣郊天之禮而猶以龍旗承祀不建太常猶不敢全僣天子禮也而明堂位乃曰日月之章則又過矣六轡耳耳六轡解見駟驖箋曰耳耳至盛也春秋匪解音解箋曰春秋猶言四時也疏曰錯舉春秋以明冬夏享祀不忒箋曰忒變也李氏曰差忒也皇皇后帝李氏曰皇皇大之至也箋曰后帝謂天也皇祖后稷享以騂犧傳曰騂赤也犧純也箋曰魯郊祭大配之以君祖后稷其牲用赤牛純色與天子同也李氏曰祭統亦云昔者周公旦有勳勞於天下周公既沒成王康王追念用公之所以勳勞者而欲尊魯故錫以重祭外祭則郊社是也內祭則大嘗禘是也明堂位祭統皆漢儒所作故其所言皆未可信也禮運又曰魯之郊禘非禮也周公其衰矣禮記之書如禮運以為魯不當郊禘如明堂祭統以為魯當郊禘其異同如此當從禮運之說伊川嘗謂說者以周公能為人臣所不能為之功故得用人臣不得用之禮大人臣豈冇不能為之功哉使功業過於周公亦人臣所當為之大下之事非人臣為之而誰為之以此觀之則知賜魯之禮樂者非成王為之春秋書郊多矣大抵譏其僣春秋以為僣而詩乃以為美則知所美非美也左氏云皇皇后帝皇祖后稷君子曰禮謂其先帝而後稷也夫先天而後稷固足以為禮然不知諸侯而用郊禘果可以為禮乎僖公三十一年四月四卜郊不從乃免牲夫以四月之時而卜郊足以見非禮也卜至於四尤以見其非禮安在其為春秋匪解也哉安在其為享祀不忒也哉詩人之言大抵失之誇也詩故曰魯之郊是僖公之僣禮也春秋自隱桓以丅不書郊亦不譏其廢禮知魯之郊自僖公以始其得謂成王以鍚周公乎公羊云魯郊非禮也是饗是宜劉氏曰言其安而通之也與公尸來燕來宜同降福既多周公皇祖箋曰此皇祖謂伯禽也亦其福女秋而載嘗箋曰載始也疏曰毛以多則夏而楅衡楅音福釋文曰楅逼也傳曰楅衡設牛角以楅之也楅之之楅音逼箋曰狄將嘗祭於夏則養牲楅衡以牛角為其觸抵人也秋嘗而言始者秋物新成尚之也疏曰地官封人注云楅設於角衡設於鼻白牡騂剛傳曰白牡周公牲也騂剛魯公牲也疏曰文十三年公羊傳云魯祭周公何以為牲周公用白牡魯公用騂剛犀公不毛何休云白牡殷牲也周公死有王禮謙不敢與文武同也魯公諸侯不嫌也故從周制說文云剛特也白牡謂白特騂剛謂赤特也犧尊將將犧王如字鄭素河反將音鏘朱氏曰犧尊畫牛於尊腹也或曰尊作牛形鑿其背以受酒疏曰將將盛美也毛炮胾羮炮音包胾音恣羮音庚傳曰毛炮豚也胾肉也羮大羮鉶羮也疏曰封人祭祀有毛炮之豚注云爓去其毛而炮之也曲禮注云胾切肉也大羮者煮肉汁不和鉶羮肉味之有菜和者也大羮謂大古之羮鉶羮謂盛之鉶器其大羮則盛之於登爓徐亷反字亦作燖燂湯中瀹肉籩豆大房傳曰大房半體之爼也箋曰玉飾爼也疏曰明堂位云俎有虞氏以梡夏后氏以嶡殷以椇周以房俎注云梡斷木為四足而已嶡謂中足為橫距之象椇謂曲撓之也房謂足下跗也上下兩間有似於堂房然是俎稱房也周語云禘郊之事則有全蒸王公立飲則有房蒸親戚燕享則有殽蒸如彼文次全蒸謂全載牲體殽蒸謂體解節折則房蒸是半體可知禘郊乃有全蒸宗廟之祭唯房蒸耳明堂位稱祀周公於太廟俎用梡嶡此云大房蓋魯公之廟用大房也梡音欵嶡音鱖椇音矩撓音擾跗音孚萬舞洋洋今曰詩記以萬舞為二舞之總名解見邶簡兮箋以為干舞今不從傳曰洋洋衆多也孝孫有慶俾爾熾而昌熾音幟尺志反疏曰熾盛也昌大也俾爾壽而臧箋曰臧善也曹氏曰壽而好德也保彼東方箋曰保安也魯邦是常箋曰常守也不虧不崩疏曰虧損也崩落也箋曰虧崩皆謂毁壞也曹氏曰不虧則如月之常盈不崩則如山之常固不震不騰傳曰震動也騰乘也朱氏曰震騰驚動也皆不安之意曹氏曰不震則如地之常靜不騰則如水之常平三壽作朋箋曰三壽三卿也如岡如陵此說封魯之事成王告周公曰叔父我今立汝首子使之為侯於魯國大開女之土宇言封以百里為周家之藩輔也既告周公乃策命魯公伯禽使為侯於東方之魯國賜之以境內之山川又賜之以境內之土田又賜之以小國之附庸使四鄰小國附屬之至於今日周公之孫莊公之子謂僖公也其車建交龍之旗承奉宗廟祭祀所乘四馬其六轡耳耳然至盛春秋四時非有解怠獻享祭祀無有差忒皇皇至大之天帝及君祖后稷獻享以騂赤純色之牲天與后稷於是歆而饗之安而宜之其降與之以福既甚多矣非特天與后稷降之多福而周公與君祖伯禽亦福於女僖公矣復說祭祀得禮之事將於秋而始嘗祭先於夏而豫養牲其所養之牛設橫木於角以逼之謂之楅衡令其不得抵觸人也所養者是祭周公白色之牡牲與魯公赤色之剛特其祭之時有盛酒之尊其尊腹之上飾畫犧牛將將然而盛美也其饌則有爓去其毛而炮之之豚又有切肉之胾又有大羮鉶羮其食器則有籩豆又有載半體之大俎如堂房然謂之大房鼎俎已陳籩豆已列於是奏樂舞執干戚而為萬舞者洋洋然衆多由此祭祀得禮故祖考祐之令孝孫僖公有福慶也使爾熾盛而昌大使爾壽考而臧善保安彼東方魯國是守不虧損不傾頺不震動不乘騰國有壽考之三卿與作朋友皆如岡陵之固祝其君臣同慶也公車千乘去聲傳曰大國之賦千乘疏曰大國之賦千乘司馬法兵車一乘甲士三人步卒七十二人計千乘有七萬五千人則是六軍矣與下公徒三萬數不合者二者事不同也禮天子六軍出自六鄉萬二千五百家為鄉萬二千五百人為軍地官小司徒凡起徒役無過家一人是家出一人鄉為一軍此則出車之常也天子六軍既出六鄉則諸侯三軍出自三鄉下云公徒三萬自謂鄉之所出非此千乘之衆也此云公車千乘自謂計地出兵非彼三軍之事也二者不同故數不相合李氏曰按司馬法六尺為步步百為畒畒百為夫夫三為屋屋三為井井十為通通十為成成出革車一乘則千乘其地方二百一十六里有竒若以孟子所言周公封於魯地方百里則無緣有千乘也若以明堂位所言封周公於曲阜地方七百里則人不啻有千乘司馬法之言既不合於孟子又不合於禮記不足信也今曰魯頌多夸大之辭不必求其數之盡合也朱英緑縢音騰傳曰朱英矛飾也縢繩也疏曰絲纒而未染之以為矛之英飾弓束以緑繩小戎竹闌緄縢謂約之以繩非訓縢為繩二矛重弓傳曰重弓重於鬯中也箋曰二矛重弓備折壞也公徒三萬箋曰大國三軍合三萬者舉成數也疏曰今以春秋驗之則僖公無三軍襄十一年經書作三軍明以前無三軍也昭五年又書作中軍鄭以周公伯禽之世合有三軍僖公能復周公之宇遵伯禽之法故以三軍解之其實於時唯二軍耳李氏曰天子之國不啻有六軍所用者惟六軍而已大國不啻有三萬公徒所用者惟三萬而已使舉國之人而盡用之則但可以一役苟不幸而敗則安得人人而復用之哉此天子之國所以止用六軍大國所以止用三軍也自伯禽以來已有三軍僖公興其國所以冇公徒三萬觀詩曰大啓爾宇既謂之大啓爾宇豈得無三軍即伯禽以來已有三軍襄公所以作三軍者則以魯國三鄉專魯國之權分三軍以為已之賦故作三軍非是自襄公以來方有三軍也貝胄朱綅胄音宙綅音纎又音侵傳曰貝胄貝飾也朱綅以朱綅綴之疏曰貝者水蟲甲有文章也胄謂兜鍪貝非為胄之物故知以貝為飾朱綅直謂赤線耳謂以朱線連綴甲也蒸徒增增傳曰增增衆也戎狄是膺傳曰膺當也荆舒是懲疏曰楚一名荆羣舒楚之與國箋曰懲艾也艾音刈則莫我敢承傳曰承止也李氏曰泮水之詩美僖公能服淮夷皆無是事而美之則膺戎狄而懲荆舒未必不如其服淮夷也辭如是之重復者蓋祝頌之辭其例如此也俾爾昌而熾俾爾壽而富黃髮台背解見行葦壽胥與試箋曰胥相也曹氏曰老人髮白而更黃背皺如鮐魚皮如是者相與試用則不特三壽作朋而已其所用皆老成之人也鮐音臺俾爾昌而大俾爾耆而艾五蓋反萬有千歲眉壽無有害公之兵車有大國千乘之賦矣每一車上皆有三人右人持矛其矛有朱色之英飾左人持弓其弓有緑色之繩縢約之此朱英緑縢者是二矛重弓也必二必重者備折壞也又公之徒衆有三萬人矣萬二千五百人為軍大國三軍合三萬七千五百人言三萬舉成數也此徒衆其胄以貝飾之其甲又以朱線連綴之進行之徒增增然衆多西戎北狄有來侵者以此膺當之荆楚羣舒叛逆者以此懲創之無有於我敢禦止之者此皆頌祝之辭也又祝使汝昌大而熾盛使汝昌考而富足又髮有黃色背有鮐魚文之壽者相與試其才以為之用欲其所用皆老成人也又重慶之使汝昌而且大使汝耆壽而且老艾萬有千歲得秀眉之壽而無有患害也萬有千歲猶曰千歲萬歲也泰山巖巖疏曰泰山在齊魯之間二國皆以為望也魯邦所詹傳曰詹至也奄有龜蒙箋曰奄覆也傳曰龜山也䝉山也疏曰春秋定十年齊人來歸鄆歡龜隂之田謂龜山之北田也論語說顓史主䝉山也魯之境內有此二山遂荒大東傳曰荒有也箋曰荒奄也大東極東也至于海邦箋曰近海之國也淮夷來同莫不率從魯侯之功言泰山之髙巖巖然魯之邦境所至也又奄有龜山䝉山遂荒奄極東之地至於近海之國淮夷舊不服者亦內向而不為異凡此東方之國莫不相率而順從是魯侯僖公之功也願之之辭也保有鳬繹鳬音符繹音亦字又作嶧傳曰鳬山也繹山也疏曰禹貢徐川嶧陽孤桐謂嶧山之陽有桐木也遂荒徐宅傳曰宅居也曹氏曰禹貢徐州之地而魯宅之故曰徐宅至于海邦淮夷蠻貊音陌及彼南夷疏曰南夷謂荆楚莫不率從莫敢不諾箋曰諾應辭也魯侯是若傳曰若順也僖公又安有鳬山繹山遂荒奄徐州之居至于近海之國若淮夷也南夷之蠻也東夷之貊也又及彼南方之夷荆楚也莫敢不相率而順從莫敢不應諾其命令唯魯侯僖公之是順此亦願之之辭也天錫公純嘏音假箋曰純大也受福曰嘏眉壽保魯居常與許傳曰常許魯南鄙西鄙箋曰許許田也魯朝宿之邑也常或作嘗在薛之旁春秋魯莊公三十一年築臺于薛是與周公有嘗邑許田未聞也六國時齊有孟嘗君食邑於薛疏曰常為南鄙許為西鄙或當有所依據不知出何書也桓元年鄭伯以璧假許田公羊傳許田者何魯朝宿之邑也此魯朝宿之邑曷為謂之許田諱取周田繫之許近許也春秋於僖公之世不書得許田蓋經傳闕漏故無其事也朱氏曰常許皆魯之故地見侵於諸侯而未復者故魯人以是願僖公也復周公之宇魯侯燕喜令妻壽母朱氏曰僖公娶於齊曰聲姜母曰成風宜大夫庶士邦國是有既多受祉黃髮兒齒兒音倪字書作齯箋曰兒齒亦壽證釋文曰兒齒齒落更生細者言天賜僖公以大福使有秀眉之壽而保守魯國又能居常邑與許邑以復周公之故居常許魯之故地而未復者也僖公燕飲而喜樂內有令善之妻壽考之母又外有大夫衆士與之相宜魯之邦國僖公常保有之既多受其福又有黃色之髮落而更生之齒皆壽證也此願其壽考以復魯之侵地宜其室家臣庶以保有其國也徂來之松傳曰徂來山也新甫之柏傳曰新甫山也是斷是度斷音短度音鐸疏曰斬斷之量度之是尋是尺傳曰八尺曰尋松桷有舄桷音角舄音昔傳曰桷榱也舄大貌路寢孔碩傳曰路寢正寢也箋曰碩大也新廟奕奕音亦朱氏曰僖公所修之廟也傳曰新廟閔公廟也箋曰修舊曰新所新者姜嫄廟也疏曰奕奕廣大也奚斯所作疏曰奚斯公子魚也傳曰有大夫公子奚斯者作是廟也箋曰奚斯作者教護屬功課章程也孔曼且碩曼音萬傳曰曼長也萬民是若僖公於是乃修造寢廟取徂來山之松新甫山之柏於是斬斷之於是用八尺之尋十寸之尺以量之既量其材乃用松為榱桷有舄然而大為君之正寢甚寬大而碩又作新廟奕奕然廣大此寢廟乃是公子魚所作謂監護工役之事也此寢廟甚長曼而碩大萬民以為順無咨怨不憚勞也新廟或以為閔公廟或以為姜嫄廟皆不可知或以為新作之或以為修舊而新之然春秋不書則知其非大工役修舊之說得之閟宫八章二章章十七句一章十二句一章三十八句二章章八句二章章十句詩緝卷三十五
