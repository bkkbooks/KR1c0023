body:
  text: 詩緝卷十六宋嚴粲撰豳國風譜曰豳者后稷之曾孫曰公劉者自邰而出所徙戎狄之地名今屬右扶風栒邑公劉以夏后太康時失其官守竄於此地猶修后稷之業勤恤愛民民咸歸之而國成焉其封域在禹貢雍州岐山之北原隰之野至商之世大王又避戎狄之難而入處於岐陽成王之時周公居東思公劉居豳憂念民事至苦之功以此序己志故别其詩以為豳國變風焉邰音台栒音荀疏曰邰今始平盛功縣所治斄城是也國語云昔我先世后稷以服事虞夏及夏之衰棄稷不務我先王不窋用失其官而自竄於戎狄之間不窋后稷之子也韋昭注國語以為不窋當太康之時公劉乃不窋之孫不應亦當太康之世夏之衰也自太康始故繫太康言之周公王朝卿士不得專名一國因其上陳豳公故為豳之變風斄邰同窋知律反詩記曰文中子程元問曰敢問豳風何風也文中子曰變風也元曰周公之際亦冇變風乎曰君臣相誚其能正乎成王終疑則風遂變矣非周公至誠其孰能卒正之哉元曰居變風之末何也曰夷王以下變風不復正矣夫子蓋傷之也故終之以豳風言變之可正也唯周公能之故繫之以正變而克正危而克扶始終不失於本其惟周公乎繫之豳逺矣哉劉氏曰豳實周公詩耳周者畿內國也畿內諸侯上繫於王不得國别風也何不編於魯魯者伯禽封耳周公不之魯也周公作詩意在於豳而周公之詩無所可繫故因謂之豳也何以不列之於雅曰列之於雅是為變雅成王雖始疑周公而終任之君臣之道亦無間矣君子成人之美故不使成王之世有變雅之聲而攝引其詩使還周公也范氏曰豳居風雅之中何也風之所為終而雅之所為始也變風終於曹思明王賢伯之不可得於是次之以豳反之於周公而後至於鹿鳴言周之所以盛者由周公也補傳曰豳周公之詩不列之正風何也豳非周之列國而周公乃為遭變而作不得謂之正風也公劉入於雅七月不入雅何也雅所言王者之事七月之詩以周公之故屈居於風也國史以豳秦皆戎地故豳秦以類而次之孔子處豳於變風之末實尊之也尊之者何變而充正也變風迄豳反周之初世道不終窮也齊豳秦魏唐陳檜曹季札所觀太師樂歌之次第也今詩之次第孔子所定也降秦於唐而挈豳以終之蓋一經聖人之手而旨趣深矣七月陳王業也周公遭變箋曰管蔡流言避於東都故陳后稷先公風化之所由致王業之艱難也疏曰故陳后稷及居豳地之先公其風化之所由緣致此王業之艱難之事處豳地之先公公劉大王之等耳不陳后稷之教今輒言后稷者以先公修行后稷之教故以后稷冠之七月陳豳民農桑之事而首序謂之王業猶孟子謂之王道也蓋周以農事開國而豳者豐鎬之基也周公因管蔡流言將壞成業念先公之初避狄居豳艱難積纍歷十數世之久以致今日何忍一旦壞之所以感悟成王也七月之詩一言蔽之曰豫而已凡感節物之變而修人事之備皆豫為之謀也程子曰七月大意憂深思逺不惟豳風當如此又成王中變自然起發周公言終父意思此詩欲成王知先公先王致王業之由民之勞力趨時稼穡之艱難如此此詩多陳節物大要言歲序之遷人事當及時耳所言或與月令異者月令舉其始此但言其有時不必始有也王氏曰仰觀星日霜露之變俯察蟲鳥草木之化以知天時以授民事女服事乎內男服事乎外上以誠愛下而下以忠利上父父子子夫夫婦婦養老而慈幼食力助弱其祭祀也時其燕饗也節此七月之義也曹氏曰不窋之居於豳未能國也至其孫公劉始立國焉先公兼指公劉而言也七月流火張子曰七月之詩皆以夏正為斷曹氏曰公劉正當夏時所用者夏正也朱氏曰所謂改正朔者以是月為歲首耳月固不易也今曰詩經為夏時傳曰流下也火大火也疏曰左傳張超云火星中而寒暑退服虔云大火心也季冬十二月平旦正中在南方大寒退季夏六月黃昏火心中大暑退躍音剔九月授衣一之日觱發觱音必二之日栗烈傳曰一之日十之餘也一之日周正月也觱發風寒也二之日殷正月也栗烈寒氣也疏曰一之日二之日猶言一月之日二月之日數從一起而終於十更有餘月還以一二紀之也仲冬之月待風乃寒季冬之月無風亦寒朱氏曰一之日謂一陽之月二之日謂二陽之月變月言日言二月之日也錢氏曰謂十一月十二月也無衣無褐音曷箋曰褐毛布也疏曰賤者所服今夷狄作褐皆纎毛為之何以卒歲箋曰卒終也三之日于耜音似疏曰于於也於是始修耒耜釋文曰耜耒下耓也廣五寸耒耜上句木也耓敕丁反句音溝説文曰耜耒端木也耒手耕曲木也今曰繫亂云斫木為耜揉木為耒四之日舉趾音止傳曰豳土晚寒故至周之四月民無不舉足而耕矣疏曰月令季冬命農計耦耕事修耒耜具田器孟春天子躬耕帝籍然則修治耒耜當以季冬之月舉足而耕當以孟春之月今以正月修耒耜二月始耕故云豳土晚寒鄭志答張逸云寒晚溫亦晚故修耒耜始耕皆較中國遲一月也同我婦子饁彼南𤱔饁音葉傳曰饁饋也孫炎曰饁野之餉李氏曰郤缺耕於野其妻饁之是妻饁其夫也有童子以黍肉餉是子餉其父也郤音隙王氏曰𤱔大抵以南為正故每曰南𤱔補傳大田解曰田事喜陽而惡隂南東向陽則茂遂西北傍隂則不實田畯至喜畯音俊傳曰田畯田大夫也甫田箋曰田畯司穡今之穡夫也疏曰釋言云畯農夫也孫炎云農夫田官也一章兩節總言衣食之急也餘章推廣其意豳公教民以衣食為本民從其教勤於務本故感時序之遷汲汲於農桑之務皆先事而豫圖之曰大火心星六月之昏加於正南午位當東西之中至七月之昏則流下而西暑退而寒將至矣至九月霜降始寒可相授以冬衣矣當流火之候而豫興授衣之念非太早計也衣裘若不早備逮至建子一陽之日風寒觱發建丑二陽之日寒氣栗烮無風亦寒當此之時無衣無褐將何以終其歲乎不可大寒而後索衣裘也此言衣為急也建寅三陽之日於是修耒耜建卯四陽之日無不舉足而耕矣豳土氣候晚而多寒故耕事較之中國遲一月也我婦我子同致饋饁於南𤱔之中田大夫職掌農事來至而見其勤農則喜也此言食為急也西北溫晚寒當早也毛言豳土晚寒當謂氣候晚而多寒故耕事遲耳鄭云寒晚非也范氏曰民生本乎衣食天下之務莫實於此矣禮義之所以起孝悌之所以生教化之所以成人情之所以固也故勤儉之俗莫如豳風朱氏曰此章前段言衣之始後假言食之始二章至五章終前假之意六章至八章終後假之意七月流火九月授衣春日載陽箋曰載則也陽溫也有鳴倉庚曰倉庚黃鳥也解見葛覃女執懿筐傳曰懿筐深筐也遵彼微行傳曰微行墻下徑也五𤱔之宅樹之以桑疏曰循微細之徑道爰求柔桑箋曰柔桑稚桑也𧖟始生宜稚桑也春日遲遲傳曰遲遲舒緩也采蘩祁祁曰蘩白蒿也解見采蘩傳曰蘩所以生蠶祁祁衆多也山隂陸氏曰今洗𧖟種尚用蒿今曰采蘩被之祁祁傳云祁祁舒遲也甫田與雨祁祁傳云徐也韓奕祁祁如雲傳云徐靚也皆為舒遲之意此七月及出車采蘩祁祁玄烏來假祁祁皆為衆多女心傷悲朱氏曰豫以逺其父母為悲也殆及公子同歸殆音行錢氏曰殆猶將也疏曰公羊傳説築王姬之館云於羣公子之舍則以卑矣是諸侯之女稱公子也謂公子子也程子曰庶幾得如富貴之子及時而行也葛覃傳曰婦人謂嫁曰歸二章三章皆終首章無衣之意二章述𧖟桑為昏嫁之備也豳民以流火為授衣之漸不可不豫圖之故於春日則求桑而𧖟春為秋計也言春日則巳陽溫矣又有鳴者是倉庚之鳥矣是將𧖟之候也𧖟之新出者女執深筐遵小徑求柔稚之桑以養之𧖟之未出者女當春日舒緩之時祁祁然皆出采蘩草以洗之女心傷悲念𧖟事之勤苦蓋豫為衣裝之備庶幾他日將如女公子及時而嫁也民家以昏嫁為重事用帛尤多故雖自念其勞而不敢憚也舊説謂女感陽氣而思男處子作此想恐非豳風淳固之俗也謂豫有離親之感雖非經意却無害於義七月流火八月萑葦音完偉萑曰中者菼薍萑也生成之異名也又名隼一物而四名也郭云菼似葦而小又云蒹似萑而細是蒹小於萑萑小於葦故曰中者也菼覃之上濁薍頑之去聲疏曰初生為菼長大為薍成則名為萑葦曰大者葭蘆葦也生成之異名也人名華亦一物而四名也疏曰初生為葭長大為蘆成則名為葦山隂陸氏曰明堂位云葦蘥葦管中籥則萑小而葦大矣釋草曰葭葦蒹蒹葭蘆菼薍釋曰葭一名葦即今蘆也葦之未成者葭一名蘆菼一名薍衛碩人疏曰如李巡云蘆薍共為一草如郭云則蘆薍别草大車傳云菼薍也蘆之初生則毛意以葭菼為一草以今驗之則蘆薍别草也疏解見秦蒹葭𧖟月條桑程子曰當蠶長之月也計歲氣之早晚不可指定幾月也箋曰條桑枝落采其葉也疏曰謂斬修於地就地采之也取彼斧斨音鏘疏曰隋銎曰斧方銎曰斨斨即斧也唯銎孔異耳隋湯果反又音駝銎音芎曲容反斤斧受柄處釋文曰隋孔形狹而長也今曰墮山喬嶽之墮吐果反與此隋銎之隋同音釋山云巒山墮釋云凡物狹而長者謂之嶞此言山墮者謂小形狹長者一名巒也墮山與隋銎皆狹長也以伐逺揚猗彼女桑猗音倚徐音伊朱氏曰取葉存條曰猗補傳曰猗倚也猗重較兮猗于𤱔丘皆訓倚今曰倚猶依也就樹采之也釋木云女桑荑桑郭璞云今俗呼桑樹小而條長者為女桑樹七月鳴鵙扃之入釋烏曰鵙伯勞疏曰樊光云春秋伯趙氏司至伯趙鵙也以夏至來冬至去陳思王惡鳥論云伯勞以五月鳴應隂氣之動隂為殘賊蓋賊害之烏也其聲鵙鵙故以其音名云月令仲夏鵙始鳴補傳曰鵙仲夏始鳴至七月則鳴之極而將去矣八月載績疏曰績麻為布績者績麻之名載玄載黃傳曰玄黑而有赤色我朱孔陽傳曰朱深纁裳也祭服玄衣纁裳陽明也今曰載見龍旗陽陽為公子裳曹氏曰祭義云歲既畢矣世婦卒𧖟遂獻繭于夫人及良日夫人繅三盆手遂朱緑之玄黃之以為黼黻文章君服之以祀先王先公敬之至也繅音騷三章述𧖟事終而復始及絲事畢而麻事又起其勤未嘗息而且知義也七月流火民知將寒之候故於八月萑葦既成豫蓄之以為養𧖟之曲薄今年為明年之計也至於明年𧖟長之月乃條其桑謂斬取其條也桑樹之髙大者其枝條逺人而揚起人手所不能及故取斧斨以伐其條然後就地采其葉而棄其條即上文所謂條桑也桑性以斬伐而始茂故條桑者又豫為明年之計也女桑乃桑樹之低小者猗倚也倚取之者不斬其條但就樹以采其葉也上章柔桑乃桑葉之嫩者嫩葉始生未多故以筐箱求之養新出之𧖟耳蠶有新出者又有未出者故同采蘩言之皆言𧖟事之始也此章女桑乃桑樹之小者大樹既條取之小樹又猗取之𧖟已大食故桑之大小取之無遺蓋言𧖟事之成也桑麻之事相接續而起五月伯勞始鳴應一隂之氣至七月猶鳴則三隂之候而寒將至矣故七月聞鵙之鳴先時感事至八月則又緝績其麻也絲麻既成或染之以為玄或染之以為黃其朱色者尤鮮明將供公子之衣裳不敢言為豳公之裳而託言公子也豳民禮義之俗如此張子曰我朱孔陽則己欲為公子裳取彼狐狸則己欲為公子裘民愛豳公待之如家人其愛之深如此女桑小桑樹也郭説甚明物之小者稱女猶今稱女牆也毛云角而束之曰猗疏引左傳諸戎掎之然此猗從犬音倚左傳從才音紀與此異也箋以豳地晚寒故鵙以七月鳴曹氏又引王肅之説五訛為七義皆未安離騷恐鵜鴂之先鳴兮使百草為之不芳朱氏集注云鵙也蓋鴂鵙聲相近隂氣至則先鳴而草死也此與舊説異姑存之鵜鴂音題決四月秀葽音腰釋草曰華榮也木謂之華草謂之榮不榮而實者謂之秀箋曰物成自秀葽始曹氏曰葽逺志也釋草云葽繞蕀蒬注云今逺志也其上謂之小草説文云劉向説葽味苦謂之苦葽木草云逺志一名蕀蒬一名繞葽一名細草四月采根葉隂乾參訂諸説知葽為逺志矣四月陽氣極於上而微隂已受胎於下葽感之而早秀今曰葽毛不指為何草鄭疑為王員陸璣亦無明説唯曹氏以為逺志證據甚明劉向説為苦葽今逺志苦澀之甚醫家以甘草熟鬻之乃可用五月鳴蜩音條曰蜩蟬也諸蟬之總名也今曰釋蟲云蜩蜋蜩螳蜩郭璞引夏小正云蜋蜩者五色具螳蜩者蝘俗呼為胡蟬是蜋蜩螳蜩二種蟬也故爾雅疏云蜩者目諸蟬也今從之詩疏引方言云楚謂蟬為蜩宋謂之螳蜩陳鄭謂之蜋蜩秦晉謂之蟬陸璣又云蟬通語也一曰胡蟬一名姬如方言及陸璣之説則諸蟬皆一物也無區别矣今不從蕩詩如蜩如螳不得以為一物也毛氏於彼傳云蜩蟬也螳蝘也其説是矣於此詩乃云蜩螳者蓋舉其類以相明非以蜩為螳自為異同也螳音唐蜋音郎蝘音偃八月其穫音鑊釋文曰穫刈榖也十月隕蘀音允託傳曰隕墜也疏曰落葉謂之蘀箋曰四者皆物成而將寒之候一之日于貉音鶴箋曰于往也釋獸曰貉子貆貆音喧釋曰字林云貉似狐善睡其子名貆疏曰禮無貉裘唯孔子狐貉以居明貉賤也取彼狐貍為公子裘二之日其同程子曰同謂會聚共事也曹氏曰唯田與追胥竭作載纘武功傳曰纘繼也言私其豵音棕傳曰豕一歲曰豵獻豜于公豜音堅傳曰二歲曰豜大獸公之小獸私之四章終首章無褐之意言取彼為裘以助布帛因及田獵奉上之事也物生於陽而成於隂四月純陽之月極處必反微隂胎萌五行皆胎養在長生之前五月一隂生則亦四月隂胎萌也葽草感之而早秀矣物成自秀葽始也曹氏曰首舉四月者言隂氣之來從微至著蓋有漸也五月一隂生蜩感之而鳴矣八月正秋物成榖之早熟者可刈穫矣十月隂氣極殺氣盛木葉皆隕墜於地而為蘀矣四者皆隂氣漸至而將寒之候也西北地寒非狐貉之厚無以禦之故至隕蘀之時則往取貉皮以為自用之裘取狐貍之皮以為公子之裘賤者以自奉貴者以奉公也孟冬天子已裘此仲冬乃豫取皮乾之為明年用也又因説獵之事至二之日會同以出田獵而繼纘武事歲以為常不忘武也私有其一歲之豵豕而獻其三歲之豜豕于公薄於已而厚於君也舊説夏官大司馬仲冬教大閲豳地晚寒故用季冬此自説豳俗不必律以周禮也五月斯螽動股螽音終曰斯螽蚣蝑也蚱蜢也舊説以為即螽斯非也考見周南螽斯蚣蝑音嵩須釋蟲曰蟴螽蚣蝑廣韻蟴作蜤舍人曰今所謂春黍也陸璣曰豳州人謂之春箕蝗類也長而青長腳長股股鳴者也或謂似蝗而小斑黑其股似玳瑁又五月中以兩股相切作聲聞數十步江東人呼為吒蛨二字音摘麥山隂陸氏曰江東謂之蚱蜢善害田稚六月莎雞振羽莎音簔曰莎雞絡緯也促纖之類也釋蟲曰螒天雞螒音厚樊光曰小蟲黑身赤頭一名莎雞陸璣曰莎雞如蝗而斑色毛翅數重其翅正赤六月中飛而振羽索索作聲或謂之天雞今絡緯蟲是也山隂陸氏曰古今注云莎雞一名絡緯謂其鳴如紡緯也促織一名投機謂其聲如急纖也七月在野八月在宇釋文曰屋四垂曰宇韓詩云宇屋霤也霤力敕反朱氏曰簷下也九月在戶十月蟋蟀入我牀下八字句曰蟋蟀促織也解見唐蟋蟀穹窒熏鼠傳曰穹窮也窒塞也疏曰熏鼠令出其穴塞向墐戶墐音覲傳曰向北出牖也墐塗也庶人華戶疏曰華戶以荆竹織門以其荆竹通風故泥之也嗟我婦子曰為改歲為去聲入此室處五章述既有衣褐則改歲可以禦寒終首章卒歲之意也豳民言五月則斯螽動其股而鳴矣至六月則莎雞振其羽而鳴矣五月一隂六月二隂二蟲先秋作聲感隂氣之萌也自七月在野至十月入我牀下皆謂蟋蟀也七月蟋蟀之蟲在野至八月乃在簷宇之下寒則依人也九月則在室戶之內十月則入我牀下小蟲愈近於人知大寒至矣故穹窮窒塞其室之孔穴熏鼠令出又塞其北向之牖又以泥墐塗荆竹之戶告妻及子言我所以為此者為改歲大寒當入此居處也六月食鬱及薁音郁曰鬱雀李也車下李也唐棣之屬也曰薁薁李也唐棣也櫻薁也鬱類而小别也櫻音纓疏曰劉楨云鬱樹高五六尺其實大如李而正赤食之甜本草云一名雀李一名車下李一名棣則與棣相類晉宫閣銘云華林園中有車下李三百一十四株薁李一株車下李即鬱也薁李即薁也今曰疏云鬱是車下李薁是薁李則薁李非車下李矣陸璣既以唐棣為薁李人云薁李一名車下李本草有郁李人亦云一名車下李則薁李又有車下之名蓋由二者相類故名稱相亂也棣解見召何彼穠矣七月亨葵及菽亨音烹李氏曰葵可茹公儀所拔是也山隂陸氏曰齊民要術云今世葵有紫葵白葵二種左傳云鮑莊子之足不如葵葵猶能衛其足今葵心隨日光所轉輒低覆其根朱氏曰菽豆也菽解見小宛八月剝棗音撲傳曰剝擊也之今曰就樹擊而落十月穫稻稻解見唐鴇羽為此春酒傳曰春酒凍醪也疏曰凍時釀之即酒正三酒中凊酒也冬釀接夏而成以介眉壽箋曰介助也疏曰人老年者必有毛眉秀出也王氏曰眉壽哀矣養氣體焉以助之也七月食瓜八月斷壺疏曰斷取而食之李氏曰壺性蔓生斬之故曰斷傳曰壺瓠也長樂劉氏曰枯者可為壺嫩者可為茹九月叔苴音趨考見關雎傳曰叔拾也苴麻子也采荼薪樗荼音徒樗音攄荼解見綿傳曰樗惡木也疏曰樗唯堪為薪解見伐行其野食我農夫食音嗣六章述老壯之養有厚薄也六月食鬱薁二李七月烹煮葵菜及菽豆八月剝擊樹上之棗而落之十月刈穫禾稻而為凍醪此以上皆以養老介助秀眉壽老之人也七月食瓜八月斷取壺瓠九月叔拾麻子荼苦菜也則采之樗惡木也則薪之此以上皆以為壯者之食故曰以養農夫也優老而薄壯豳俗之厚也朱氏曰自此至卒章皆言農圃飲食祭祀燕樂以終首章後假之意九月築場圃傳曰春夏為圃秋冬為場箋曰場圃同地自生物之時耕治之以種菜茹至物盡成熟築堅以為場十月納禾稼禾解見下黍稷重穋重平聲穋音立黍稷解見王黍離疏曰先種後熟謂之重後種先熟謂之穋重穋詳解見閟宫禾麻菽麥疏曰禾是大名非徒黍稷重穋四種而已麻與菽麥則無禾稱故於麻菽麥之上更言禾字以總諸禾也嗟我農夫我稼既同今日同齊也上入執宫功傳曰入為上出為下李氏曰田野入都邑故謂之上范氏曰宫功公室之役也晝爾于茅今曰于於也於是取茅猶三之日于耜也宵爾索綯傳曰綯絞也疏曰繩之絞也程子曰綯所用蓋屋亟其乘屋亟音棘傳曰乘升也箋曰急當治野廬之屋疏曰上文塞向墐戶是都邑之屋此謂野廬之屋也今曰信南山中田有廬箋云農人作廬於田中以便田事其始播百榖疏曰播種也七章述農事終而復始其勤勞未嘗息也九月豫築圃為場十月則就此場納禾稼於倉其禾有黍有稷有先種後熟之重有後種先熟之穋禾是大名有非一種之禾又有麻有菽有麥農事了畢農夫自相告戒云嗟我農夫稼穡收穫既齊矣野中無事我當上入都邑執公室之役不待督責而從見豳人尊君親上禮義之俗也既執宫功之後又自相戒云晝日於是取茅草將以蓋屋夜則作索綯將以縳屋凡為此者當急升野廬之屋而修之以明年又播百榖也謂之始播終而復始也宫功方畢即治野廬豫為明年之計豳民之敏於趨事如此黍稷麻麥但因納稼之文廣舉禾稼之類以見其多謂至十月則此等諸種皆成熟矣不專是十月納之也月令五月登黍四月登麥非十月也吕氏曰此章終始農事以極憂勤艱難之意孔氏謂取茅索綯以待明年𧖟用與下文乘屋不相接其説固非也諸家雖以取茅索綯為乘屋之用然以屋即是公宫又與始播百榖意不聫接公宫蓋屋必不用茅茅又不可為索綯今以屋為野廬其屋用茅蓋之又作繩索以縳此屋而修治之上下文意始分曉二之日鑿冰沖沖音蟲朱氏曰鑿冰謂取冰於山也左傳曰古者日在北陸而藏冰深山窮谷固隂沍寒於是取之注陸道也謂夏十二月日在虛危曹氏曰沖沖和也三之日納于凌隂凌去聲又音陵傳曰凌隂冰室也疏曰天官凌人十二月斬冰即納之豳土晚寒故正月藏之朱氏曰豳王寒多故正月風未解凍冰猶可藏也四之日其蚤音蚤疏曰其早朝獻羔祭韭疏曰月令仲春獻羔開冰九月肅霜十月滌場滌音敵傳曰滌歸也朋酒斯饗傳曰兩樽曰朋曰殺羔羊躋彼公堂王氏曰公堂人君之堂也傳曰學校也稱彼兕觥兕詞之上濁解見卷耳萬壽無疆傳曰疆竟也竟音境今曰有疆境則有限止無疆境則長逺無限止也末章述祭祀燕饗祝頌之事見君民相親所以為艱難積纍之始也季冬陽氣尚微盛隂固閉不能自達乃豫於深山窮谷鑿取其冰以達之陽氣達而沖沖然和也至孟春乃藏冰於冰室仲春之早朝開冰用之以獻羔祭韭以時韭新出故薦之也將言歲功成而樂之故又言九月有嚴肅之霜十月滌掃其場將以納禾稼也民相戒以速畢場功當設兩樽朋酒以為燕饗之禮相命殺小羊升君之公堂舉兕觥酌公以酒祝之萬壽無疆境也詩記曰豳之先公固容未備無君臣之間曹氏曰十二月陽氣尚微於是鑿冰以達之至二月四陽大壯恐其太過則微陽幾於息滅於是開冰而頒之逮火出而畢賦所以節其過也聖人裁成天地之道有在於此而賓食喪祭因以考其用焉耳獻羔祭司寒也祭韭薦寢廟也補傳曰君民之間上下相親不啻如家人父子周之王叢由於得民世三十年八百其基於此歟國人以羔羊朋酒自詣公堂其禮甚野其意善真雖在立國之初庶事草草然非三代之時安得此風俗也七月八章章十一句鴟梟音笞遙周公救亂也成王未知周公之志公乃為詩以遺王遺音位名之曰鴟梟焉朱氏曰管蔡流言使成王疑周公矣其挾武庚及淮夷以叛蓋以周公為亂也周公雖已滅之然成王之疑未釋則亂未泯也故周公作此鴟梟之詩以遺王告之以王業艱難不忍毁壞之意所以為救亂也三監雖平而君臣之疑未釋則亂猶在也此詩不知者以為公之自明耳曰周公救亂者用春秋書法也此序經聖人之手矣周公既出而作七月未還而作鴟梟既還而作東山著公之出入也鴟梟鴟梟曰鴟梟鴟類也鴟惡聲之鳥鴟梟為鴟類則亦惡聲之鳥也郭璞以為鴟類陸璣以為巧婦陸農師是璞而非璣釋鳥曰鴟梟鸋鴂二字音寧決詩記曰郭景純陸農師得之鸋鴂鴟梟之别名方言云自關而東謂桑飛曰鸋鴂此乃陸璣疏所謂巧婦似黃雀而小其名偶與鴟梟之别名同與爾雅之所載實兩物也毛鄭誤指以解詩歐陽氏雖知其失乃併與爾雅非之蓋末考景純之注耳既取我子無毁我室曹氏曰烏以巢為室如雀入燕室也恩斯勤斯鬻子之閔斯鬻音育義同鴟梟惡聲之鷙鳥喜破鳥巢而食其子託為鳥之愛其巢者呼鴟梟而告之曰汝先已取我子食之矣無更毁我巢也時管叔武庚雖亡為惡之黨猶在喻為惡者既陷管蔡於罪矣無更謀危王室也恩愛勤勞鬻養此子誠可傷閔今既取之其毒甚矣況又毁我巢乎程子曰鴟梟謂為惡者子喻管蔡室喻王室吕氏曰殷民流言中傷周公謀危王室故周公曰管蔡親也爾既以惡汚染使陷於罪是害我兄弟矣又欲謀危王室則不可也逮天之未隂雨傳曰逮及也徹彼桑土音杜朱氏曰徹取也傳曰桑土桑根也綢繆牖戶綢音儔繆莫彪反箋曰綢繆猶纒綿也朱氏曰牖巢之通氣處戶其出入處也今此下民或敢侮豫又託為鳥言我及天未隂雨之時剝取桑根綢繆纒綿其巢之隙穴及出入之戶使之堅固以備隂雨之患以勤勞之故惜此巢室今巢下之民或敢侮慢我欲毁我巢室其可乎王肅曰言先王致此大功至艱難而其下民敢侵侮我周道不可不遏絶以全周室豫手拮據音吉居傳曰拮據撠挶也音戟菊疏曰撠持也撠挶謂以手挶持草也豫所捋荼捋鑾之入荼音徒朱氏曰捋取也傳曰荼萑莒也萑苕音完條疏曰薍為萑荏苕謂薍之秀穗也出其東門箋云荼茅秀然則茅薍之秀其物相類故皆名荼也薍頑之去聲三荼考見邶谷風朱氏曰可藉巢者豫所蓄租程子曰蓄積也租取也豫口卒瘏音徒王氏曰卒盡也傳曰瘏病也曰豫未有室家又託為鳥言豫手拘持者是豫所捋取萑苕也豫所蓄積租取而豫口盡病也我作之至苦如是者曰我未有室家之故也豈可室成而為鴟梟所毁乎周公以喻己不憚勤勞者以王業未成故也豈可業成而為殷民所毁乎手拮據而捋荼蓄租而口卒瘏交錯言之也豫羽譙譙音樵傳曰譙譙殺也殺色界反減削也豫尾翛翛音消傳曰修修敝也豫室翹翹傳曰翹翹危也風雨所漂搖漂音飄豫維音嘵嘵音枵錢氏曰嘵嘵呌呼也又託為鳥言我營巢之苦非特手勞口病也豫羽譙譙然殺減豫尾翛翛然敝敗豫室翹翹然危風雨又漂蕩而搖動之豫恐其隕墜維音嘵嘵然而呌呼也周公以喻己盡瘁經理王室如鳥之作巢甚苦王室新造成王幼沖如鳥巢之甚危殷民又為流言以搖撼之如風雨之漂搖故作此詩以哀鳴如鳥音之嘵嘵也鴟梟四章章五句東山周公東征也周公東征三年而歸勞歸士勞去聲大夫美之故作是詩也一章言其完也二章言其思也思去聲三章言其室家之望女也女音汝四章樂男女之得及時樂音洛君子之於人序其情而閔其勞所以説也説音悅説以使民民忘其死其唯東山乎東山周公所作以勞歸士猶杕杜勞還役也後序言大夫美之非也杕杜述家人望歸之情東山述歸士思家之情其意則一然杕杜之辭簡東山之辭詳蓋周公與歸士居東三年患難同之情之繾綣言之諄復宜與杕杜不同也後序又分一章言其全軍而歸二章言行者之思非也今以前三章皆為述歸士在途思家之情後山詩所謂住逺猶相忘歸近不可忍蓋别家之情於久住之處猶或相忘至於歸心已動行而未至則思家之情最切故序其在途之情以慰勞之采薇出車言今我來思皆言在途之事與此正同末章因述自途而至家故四章皆以我來自東零雨其濛發之我徂東山慆慆不歸慆音叨傳曰慆慆言久也我來自東今曰來歸也零雨其濛疏曰零落也錢氏曰濛濛細雨貌我東曰歸今曰曰歸猶言歸也我心西悲制彼裳衣勿士行枚行王音航毛音衡鄭音銜枚音梅傳曰士事也疏曰大司馬大閲云遂鼓銜枚而進注云枚如著銜之冇繣結項中軍法止語為相疑惑繣音畫又呼麥反蜎蜎者蠋蜎音淵蠋音蜀錢氏曰蜎蜎蟲微動貌傳曰蠋桑蟲也郭璞曰大蟲如指似蠶蒸在桑野敦彼獨宿敦音堆朱氏曰敦獨處不移之貌今曰諺云敦敦不動亦在車下三監在周之東周公自西徂東以征之軍屯必依山為固故以東山言之此詩乃軍士巳歸之後周公不忘其往時之勞歷述其在途思家之情以慰勞之以見上之知其憂勞也人之思家於歸而在途思之最切此設為軍士自道之辭反覆委折曲盡人情之私謂爾軍士在途之時若曰我向之往東山以征三監也慆慆然久而不歸及我來歸自東又道遇細雨濛濛然是尤苦也行役最以雨為苦言雨之濛濛形容得羇旅愁慘之意我自東言歸行而未至我心念家之在西而悲也征役久則衣破敝故思到家之時當更制裳衣願自今勿復從事於行陳而銜枚也在途經行桑野因感所見而自歎曰彼蜎蜎然微動之桑蟲久在桑野之葉中如我敦然不移而獨宿亦在車下也古之用車止則為營衛故士卒宿于車下言獨宿思室家也見上之體其情也蒸有三義衆也進也久也此詩三蒸在者二以為進則可以言蠋不可以言瓜以為衆則喻獨宿不取衆義也此詩皆言久役之情則久義為勝我徂東山慆慆不歸我來自東零雨其濛果裸之實裸力果反釋草曰果裸之實栝樓釋曰果裸之草其實名實即子也疏曰孫炎云齊人謂之天瓜本草云栝樓如瓜葉形兩兩相值蔓延青黑色六月華七月實亦施于宇施音異陳氏曰施延也曰宇屋重也解見七月伊威在室傳曰伊威委黍也陸璣曰一名鼠婦在壁根下甕底土中生似白魚者是也蠨蛸在戶蠨蛸音蕭梢傳曰蠨蛸長踦也踦音欺腳也陸璣曰蟢子也小蜘蛛長腳者俗呼蟢子此蟲來著人衣當有親客至町畽鹿場町音挺畽湍之上本又作疃字又作墥程子曰町畽廬傍畦壠也熠耀宵行熠音揖耀字亦作懼擢疏曰熠耀螢火也不可畏也伊可懷也此章亦述軍士在途遇雨勞苦而思家蓋室廬將近則家事纎悉一一上心此人之情也我久征役無人在家田廬必是荒廢想見栝樓之實蔓延于屋垂之下矣壁落間伊威小蟲必以無人而出行于室矣蠨蛸小蜘蛛必結網當戶矣廬傍畦壠必為麋鹿之場矣螢火夜必飛行室中矣此五物不足畏也乃可懷感也謂久而不歸也此言歸士無室家者聞之趙虛齊云即末章歸而新昏者也我徂東山慆慆不歸我來自東零雨其濛鸛鳴于垤鸛音貫垤音迭陸璣曰鸛似鶴王氏曰垤丘垤也婦歎于室灑掃穹窒灑鰓之上掃音噪我征聿至有敦瓜苦敦音圑程子曰敦圓成之貌蒸在栗薪箋曰蒸久也錢氏曰栗之可為薪者程子曰瓜之苦者人所不取常在其所自我不見于今三年天將隂雨鸛性好水長鳴于丘垤之上亦道間遇雨所見也此時想其婦在家必念行人而悲歎且曰今當灑掃其室窮塞鼠穴我征夫將至矣望我之歸也聿者將遂之辭實未至也又想其婦見有瓜之苦者人所不取敦然圓成久在栗薪之上如我之匏繫于東必歎曰自我不見者今三年矣此皆想其婦在家之歎望蓋行人念家之情如白居易詩云想得家中夜深坐還應説著逺行人也此説歸士有室家者即末章所言其舊如之何也我徂東山慆慆不歸我來自東零雨其濛倉庚于飛熠耀其羽箋曰熠耀鮮明也之子于歸皇駁其馬駁音剝釋畜曰黃白皇駵白駁孫炎曰馬色黃白有黃處有白處駵赤色也駵白有駵處有白處親結其縭音離曰縭婦人帨巾也解見野冇死麕傳曰縭婦人之禕也母戒女施襟結帨禕音暉襟禽之去聲繫佩帶也帨音稅疏曰婦人之禕謂之縭孫炎以符為帨巾郭璞以為今之香纓此言結縭當是帨非香纓也九十其儀朱氏曰九其儀十其儀言其儀之多也其新孔嘉其舊如之何末章述到家之樂以慰恱之言在途遇雨則勞自途至家則喜至家之時適及仲春倉庚之飛其羽鮮明人情和悅與景相會我軍士未受室者可以及時而昏姻此女子之歸于夫家其馬有皇有駁女之母親結其􅍤巾其儀多也其新昏者甚美矣其舊昏相見之歡當如何哉東山四章章十二句破斧美周公也周大夫以惡四國焉惡烏路反傳曰四國管葬商奄也朱氏曰四國四方之國從管蔡之辭者既破我斧今曰易旅卦得其資斧注斧所以斫除荆棘又缺我斨音鏘今曰斧斨解見七月伐木用之非指兵器周公東征四國是皇傳曰皇正也哀我人斯亦孔之將傳曰將大也詩人言兵器必曰弓矢干戈矛戟無專言斧斨錡銶者斧雖兵器所用而以斨並言乃豳民所用以採桑者又錡為鑿屬銶為木屬以類言之知皆非兵器矣周公奉王命以討罪有征無戰四國聞王師之至即窮蹙自守周公又遲之三年不為急攻之計故未嘗從事於戰陳惟行師有除道樵蘇之事斧斨之用為多歷時之久則必敝故此詩言管蔡之亂何能為哉但能破我之斧而已又缺我之斨而已其兵器元無損也蓋周公東征唯四國是正而巳即孟子言征者正也各欲正已也焉用戰彼雖自外於周周公一視同仁均為我民不忿疾之乃哀矜之周公之德如天地之無不覆載豈不大哉大周公所以惡四國也舊説破斧缺斨為戰陳殺戮之多至於如此且東山序云一章言其完也孔氏云東征無戰陳之事然則破斧缺斨非為戰也周公提王師以臨武庚之小醜若用其兵力一鼓滅之何待三年之久乎觀尚書所載周公化商之事勤拳懇惻如父兄之愛其子弟真所謂哀我人斯也若以為殺戮之多至於破斧缺斨則是與之血戰而僅勝之亦疲敝甚矣與下文哀我人斯及吪嘉遒休之意皆不相類血流漂杵孟子所不信揮刀紛紜韓氏之陋也既破我斧又缺我錡音竒傳曰鑿屬曰錡周公東征四國是吪音訛傳曰吪化也哀我人斯亦孔之嘉化之而已不殺之也嘉言德之甚善也既破我斧又缺我銶音求傳曰木屬曰銶之釋文曰韓詩云鑿屬一解云今獨頭斧周公東征四國是遒慈秋反曹氏曰遒聚也哀我人斯亦孔之休聚之言不使之離散失所也休言四國平而天下和也破斧三章章六句伐柯音哥美周公也周大夫刺朝廷之不知也程子曰伐柯乃既得罪人之後周公遲留未歸士大夫刺朝廷不知所以還周公之道詩記曰觀金縢所載二公之知周公至矣今曰朝廷則二公亦與焉蓋大臣與國同休者也主未悟而事未回國人所當責而二公所當受也伐柯如何傳曰柯斧柄也匪斧不克朱氏曰克能也取妻如何取音娶匪媒不得有問伐木以為斧柄者當如何乎非斧則不能其理易知何必問也有問取妻者當如何乎非媒則不得其理亦易知何必問也今欲周公之歸何必問人但以禮迎之而已下章言之伐柯伐柯其則不逺箋曰則法也我覯之子覯溝之去箋曰覯見也之子周公也籩豆有踐釋器曰竹豆謂之籩木豆謂之豆傳曰踐行列貌所伐之柯即此手中之柯比而視之舊柯短則如其短舊柯長則如其長其法則不逺亦易知也我欲見周公當陳其籩豆踐然有行列隆禮以迎之而巳伐柯二章章四句九罭音域美周公也周大夫刺朝廷之不知也補傳曰是詩與伐柯相類然伐柯則言朝廷不能以禮迎周公是詩則言周公不當久處外也九罭之魚鱒魴鱒有之上濁疏曰九罭魚網也孫炎曰謂魚之所入有九囊陸璣曰鱒似鯶而鱗細於鯶赤眼鯶音混曰魴鯿也解見陳衡門我覯之子衮衣繡裳朱氏曰衮衣繡裳九章一曰龍二曰山三曰華蟲雉也四曰火五曰宗彛虎蜼也皆繢於衣六曰藻七曰粉米八曰黼九曰黻皆繡於裳天子之龍一升一降上公但有降龍以龍首卷然故謂之衮也蜼位抽壘三音卷音倦興也言設九罭之常網則僅可以得鱒魴之常魚喻常禮非所以處周公也故我欲見之子周公當用龍衮之衣及絺繡之裳上公禮服往逆之服其服則居其位矣欲朝廷復相之也九罭毛以為小網諸家或以為大網郭璞言有百囊網則九囊者不得為大網又有不及九囊者則九囊亦不為甚小蓋常網也鱒魴毛以為大魚今赤眼鱒及鯿魚皆非大魚鴻飛遵渚傳曰遵循也公歸無所於女信處女音汝處音杵西人欲公之歸謂東人曰鴻飛宜戾天而乃遵循於洲渚周公宜在朝廷而乃留滯於東土豈公歸無其處所遂於汝東土誠安處乎公歸則朝廷有以處之不久留於汝東土也此所以諷朝廷也鴻飛遵陸釋地曰髙平曰陸公歸不復於女信宿程子曰宿安息也豈公歸不復其舊位而於汝東土誠安留乎公歸必復其舊位矣是以有衮衣兮無以我公歸兮無使我心悲兮東人欲公之留答西人曰汝固有裳衣以迎公之歸矣然願無以我公歸而使我心悲也言衮衣者因首章西人欲以衮衣繡裳迎公也九罭四章一章四句三章三句狼跋音撥又蒲末反美周公也周公攝政逺則四國流言近則王不知周大夫美其不失其聖也補傳曰後序推本其初而言之觀詩人之所詠乃周公東歸復辟後事故曰德音不假謂其終始無瑕也狼跋其胡狼解見齊還傳曰跋躐也疏曰狼之老者頷下垂胡朱氏曰胡頷懸肉也載疐其尾疐音致舊又音帝今不從傳曰疐跲也跲其劫反礙不行也今曰疐音致者跲也帝音者木也此詩但當音致中庸言前定則不跲注跲躓也躓音致説文云跲躓躓即疐也釋言曰跋與疐皆顛倒之類進則躐其胡而前倒退則卻頓而倒於尾上公孫碩膚孫鄭音遜毛如字程子曰遜避而弗居也傳曰碩大也膚美也赤舄几几舄音昔詩記曰鄭氏屨人注云王舄冇三等赤舄為上冕服之舄詩云王錫韓侯玄衮赤舄則諸侯與王同復下曰舄禪下曰屨禪音丹王氏曰几人所舄以為安故几几安也程子曰狼獸之貪者猛於求欲故陷於機穽羅縶周公無利欲之敝故雖在危近之地安步舒泰赤舄亦几几然安也異於狼之跋疐矣范氏曰其德備者其容亦盛赤舄几几則其餘可見矣夫神龍或濳或飛能大能小其變化不測然得而畜之若犬羊然有欲故也唯其可以畜之者是以亦得醢而食之凡有欲之類莫不可制焉唯聖人無欲故天地萬物不能易也富貴貧賤死生如寒暑晝夜相代乎前吾豈有二其心乎哉亦順受之而已矣舜受堯之天下而不以為泰孔子厄於陳蔡而不以為戚周公遠則四國流言近則王不知而赤舄几几德音不瑕其致一也興也老狼以貪欲之故陷於機穽其在機穽之時欲進則跋躐其胡欲退則疐跲其尾求脫不能喻人有貪欲則陷於患難進退失措也周公遜其大美不以德盛自矜不以功大自伐無一毫私欲之纍故雖處流言之變其赤舄几几然步履安詳無異平日所謂不失其聖也凡人處利害之變則舉趾不安其常懼者或至於喪屨喜者或至於折屐詩人以赤舄几几見周公之聖其善觀聖人矣狼猛健之獸雖善兵者禦之亦不能免平時不至跋疐其老者雖項下垂胡若在平地亦無跋之之理所言跋胡疐尾者謂其落機穽之時進退求脫不能耳狼疐其尾載跋其胡公孫碩膚德音不瑕箋曰不可疵瑕也程子曰大舜謂汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功使周公有貪欲崇髙得名之心其能得天下之與如是乎惟其處已也夔夔然存恭畏之心存誠也蕩蕩然無顧慮之意所以不失其聖德音所以不瑕也先儒以狼跋疐不失其猛興周公不失其聖奚若虎豹胡獨取狼也古之詩人比興以類也是以香草譬君子惡烏譬小人豈有以豺狼興聖人乎且以上二句言跋言疐安有几几不瑕之義但此詩體與他詩不同故不通耳狼跋二章章四句詩緝卷十六
