body:
  text: 詩緝卷二十九宋嚴粲撰蕩之什大雅蕩唐之上濁召穆公傷周室大壊也厲王無道天下蕩蕩無綱紀文章故作是詩也蘇氏曰蕩之所以為蕩由詩有蕩蕩上帝也詩序以為天下蕩蕩無綱紀文章則非詩之意也傷者傷悼其將亾甚於刺也臣子作詩皆𤼵於憂國之忠欲以感悟其君雖弊壊已極猶庶幾其改圖君臣大義無所逃於天地之間此詩託言文王歎商特借秦為喻耳或謂傷者傷嗟而已非諌刺之比如此殆類後世詞人弔古之作非當時臣子惓惓之義也大序言傷人倫之廢吟詠情性以風其上傷何妨於風刺乎蕩蕩上帝歐陽氏曰蕩蕩廣大也下民之辟音壁傳曰辟君也疾威上帝朱氏曰疾威猶暴虐也其命多辟音僻箋曰邪僻也天生烝民箋曰烝衆也其命匪諶市林反韻亦作忱朱氏曰諶信也靡不有初鮮克有終鮮上聲箋曰鮮寡也克能也周人遭厲王之暴虐呼天而告之曰蕩蕩廣大乎上帝此下民之君也謂天子也今暴虐之上帝何其命之多僻也謂命僻王以為君也疾威者厲王所為而天實命之是天為此疾威也天實為之則無所歸咎矣然天亦豈欲令厲王為惡乎天生衆民其命有不可信者其初皆善而其終鮮善是人自暴自棄非天使之然也王自不為善豈天賦予以惡哉首章説得含蓄至五章七章乃𤼵之朱氏曰蓋殆為無所歸咎之辭而卒自解之如此王氏曰民受天地之中以生所謂命也能者養之以福不能者敗以取禍受天地之中一也則靡不有初敗以取禍者衆則鮮克有終鮮克有終則命靡諶矣文王曰咨傳曰咨嗟也咨女殷商曺氏曰契始封於商其地在上洛湯受命於亳殷其地在䝉故後世或謂之殷今曰殷商併舉之也曽是彊禦曽音増今曰曽則也論語曽是以為孝乎其音層者辭之舒也嘗也彊禦禦人以口給之禦傳曰疆梁禦善也曽是掊克掊音裒釋文曰掊聚歛也曺氏曰歛民財則作威以勝之不恤也曽是在位曽是在服傳曰服服政事也天降淊徳淊音叨傳曰淊慢也李氏曰如淊天之淊女興是力三章以下設為文王歎商之辭蓋陳厲王之失而託之商也文王曰嗟乎嗟汝殷商之君則是彊梁禦善之人則是掊歛好勝之人乃任用之使之居位使之任事天降是淊慢凶徳之人以妖孽天下汝又興起崇任之甚力何哉曺氏曰治生乎君子亂生乎小人而君子小人之生昔人以為各有天命將治則生君子將亂則生小人天降滔徳是將亂而生小人也然而治世未甞無小人亂世亦未嘗無君子厲王之世天非獨生榮夷衛巫之徒也凡伯召穆衛武皆在焉奈王不用何文王曰咨咨女殷商而秉義類朱氏曰而汝也義類猶善道也彊禦多懟音墜朱氏曰懟怨也流言以對寇攘式内侯作侯祝作音詛祝音晝箋曰侯維也傳曰作祝詛也靡届靡究傳曰届極也究窮也汝當秉持善道乃用彊禦作怨之人非善類也此人問之則以流言對非忠言也道途之言豈足信哉小人為盗賊之行是寇攘不在外而在内也人心相疑則詛祝相要無有届極窮究之時忠信之衰也文王曰咨咨女殷商女炰烋于中國炰音庖烋音哮火交反箋曰炰烋自矜氣健之貎斂怨以為徳不明爾徳時無背無側背音輩爾徳不明以無陪無卿傳曰陪陪貳也䟽曰陪貳謂副貳王者則三公也女炰烋自矜氣健于中國斂民之怨乃自以為徳汝所以是非顛倒邪正錯亂不能明爾之徳者由汝背後傍側皆無賢人以引翼之也爾之徳所以不明者由汝無陪貳之大臣又無賢六卿也背側言前後左右也文王曰咨咨女殷商天不湎爾以酒湎音免蘓氏曰沈湎也䟽曰酒誥注云飲酒齊色曰湎不義從式朱氏曰式用也法也既衍爾止蘇氏曰容止也靡明靡晦式號式呼號音豪俾晝作夜天不使爾沈湎於酒而惟不義之事則從而法之也非天使之是汝自為惡也言此者𤼵首章靡不有初鮮克有終之意也爾之容止既自取愆過又無明無晦而飲酒不息呌號讙呼使晝日作夜荒亂甚矣文王曰咨咨女殷商如蜩如螗蜩音條螗音唐今曰蜩者蟬也諸蟬之總名也螗者蝘也螗蜩也蝘音偃蜩螗解見七月如沸如羮小大近喪去聲人尚乎由行内奰于中國奰音備傳曰奰怒也覃及鬼方䟽曰覃及延及也既濟髙宗伐鬼方未知何方飲酒號呼之聲如蜩蟬螗蝘之鳴其笑語沓沓又如湯之沸如羮之熟無小無大皆近喪亡矣而汝等人尚由而行之不改過乎昏亂如此故内致怨怒於中國延及鬼方逺夷亦怒之也文王曰咨咨女殷商匪上帝不時朱氏曰不時不善之時也殷不用舊雖無老成人尚有典刑朱氏曰典刑舊法也曽是莫聴大命以傾今曰盤庚云懋建大命大命謂囻之興亡也不時者猶言厄運非上天為此厄運乃殷自不用其先王之舊法耳亦以𤼵首章靡不有初鮮克有終之意也縱無老成舊臣尚有先王法度可以遵守汝曽莫能聴用遂自傾覆其大命而歸咎於天可乎文王曰咨咨女殷商人亦有言顛沛之揭沛音貝揭音結傳曰顛仆也沛㧞也箋曰揭蹶貎枝葉未有害本實先撥音鉢箋曰撥猶絶也殷鑒不逺在夏后之世古之賢人有言植木將欲顛仆沛㧞揭然而蹶其枝葉未有折傷而本根實先斷絶王者天下之本也天下未有禍敗而王身無道本先撥矣枝葉將從之也殷之鑒戒甚不逺惟在夏后之世謂殷當鑒夏今又當以殷為鑒意在言外也歐陽氏曰謂紂時宗廟社稷猶在天下諸侯未盡叛但王自為惡盈滿而禍敗爾蕩八章章八句抑衛武公刺厲王亦以自警也䟽曰楚語云昔衛武公年九十有五矣猶箴儆於國曰自卿以下至於師長苟在朝者無謂我耄而捨我於是乎作懿以自儆韋昭云懿詩大雅抑之篇也抑讀曰懿如昭之言武公年耄始作抑詩案史記衛世家武公者僖侯之子共伯之弟以宣王三十六年即位則厲王之世武公時為諸侯之庶子耳厲王之世武公為諸侯庶子作此詩刺厲王因以自警至老常誦之也詩補傳得之孔氏謂武公追刺厲王詩記非之以為其在于今興迷亂于政豈追刺之語乎今考年表武公以宣王十六年即位詩記以為其齒四十餘是也䟽以為武公宣王三十六年即位恐誤矣抑抑威儀賔之初筵傳曰抑抑慎宻也維徳之隅傳曰隅㢘也䟽曰隅者角也㢘者稜也角必有稜故云㢘隅以此屋之外角喻人之外貎由内方而外正故觀外而知内人亦有言靡哲不愚庶人之愚亦職維疾王氏曰孔子云古者民有三疾哲人之愚亦維斯戾傳曰戾罪也㢘隅者屋之外角喻人之外有威儀也凡宫室觀其外有㢘隅則知其在内之制必方正也如人外有抑抑然謹宻之威儀則知其在内之徳必嚴正也人有常言無有哲而不愚者哲而自隳其所守則為愚矣惟聖罔念作狂豈可不自謹其威儀哉彼庶人之愚是其禀賦之偏如生而有疾非其罪也主於疾而已唯哲人自廢縱而為愚是則可罪也罪之者以其自取也武公所以自警者切矣抑詩多自警之意所言修身治國平天下之道與中庸大學相表裏首章第一義言威儀之當謹威儀云者聲音笑貎云乎哉容貎顔色曽子所謂道動容周旋中禮孟子所謂盛徳蓋有諸中形諸外也曹氏曰哲人性明本無過惡然而外貎斯須不莊不敬則易慢之心入之矣易慢之心一萌則欲之敗度縱之敗禮何所不至故昔之哲者反化而為愚其罪在此也無競維人箋曰競彊也今曰無競者莫强也孟子云晉國天下莫强焉經中言無競皆同孟子彊字作強四方其訓之傳曰訓教也今曰以為訓也有覺徳行去聲今曰釋文云覺知也悟也猶孟子所謂先覺也四國順之訏謨定命訏音吁傳曰訏大也謨謀也逺猶辰告箋曰猶圖也傳曰辰時也今曰入告爾后于内之告敬慎威儀維民之則箋曰則法也莫彊者人也能得人則四方皆傚之以為訓矣形勢非彊而得人為彊也有覺悟者徳行也有徳行則四國服從之矣欲明明徳者先致其知也用賢修已治道之大端舉矣猶不敢輕出之也其於政事必有訏大之謨以堅定其命令謂先定大討也建謀立畫不貴自用必使深逺之圖得以時時入告謂廣覽兼聽也如是而益謹其威儀以儀形天下則治道備矣朱氏曰大謀謂不為一身之謀而有天下之慮也定審定不改易也命號令也逺圖謂不為一時之計而為長乆之規也其在于今興句錢氏曰今之興者謂厲王補傳曰自厲王興起之初今曰興起也言起而即王位也迷亂于政顛覆厥徳荒湛于酒湛音耽箋曰荒廢也釋文曰湛樂之甚女雖湛樂從女音汝弗念厥紹傳曰紹繼也罔敷求先王箋曰敷廣也克共明刑共音拱王氏音恭傳曰共執也今厲王之興即迷亂于政傾敗其徳政荒則國不治徳喪則身不修皆由荒湛于酒也汝雖湛樂是從獨不思念繼紹之事乎汝不以繼紹為念故不復廣求先王之道而執守明法也肆皇天弗尚如彼泉流無淪胥以亡傳曰淪率也箋曰胥相也夙興夜寐洒埽廷内洒鯉之上埽音譟今曰庭宫中也廷朝廷也廷内指宫庭而字作廷易揚于王庭指朝廷而字作庭古字通用黄氏曰庭内云者微辭也去讒逺色賤貨而貴徳豈非洒埽庭内之意乎䟽曰假廷内不埽以見職事不理耳李氏曰只是修潔其朝廷耳維民之章傳曰章表也修爾車馬弓矢戎兵用戒戎作用逷蠻方逷音惕傳曰逷逺也今曰左傳豈敢離逷王湛樂如此故今皇天不尚其所為君臣皆將滅亡如衆泉之流更相灌注一處決潰則衆流俱竭是淪率相與以亡也今宜改過早起夜寐洒埽宫室之内言閨門之間當修絜而自新也如此則可以表示於民矣又不可忘意外之變故修治其車馬及弓矢戎兵之器用此以戒備兵事之起用此以逷逺蠻方使之不敢來侵庶幾未至於亡耳質爾人民今曰民之質矣之質質爾猶云樸以皇質使之淳也謹爾侯度蘇氏曰侯度天子所以御諸侯之法度也用戒不虞朱氏曰不億度而至之禍也慎爾出話敬爾威儀無不柔嘉詩記曰柔遜順也箋曰嘉善也白圭之玷㸃店二音傳曰玷缺也尚可磨也斯言之玷不可為也王又當質爾人民毋導之以浮靡又當謹其所以御諸侯之法度必如是而後可以戒備不虞之變也其本則在修身故當謹爾之出言敬爾之威儀無不柔順嘉善白玉為圭其有玷缺尚可磨鑢而平鑢音慮言語一有缺失不可復改矣故言不可不謹也無易由言易音異無曰苟矣莫捫朕舌捫音門傳曰莫無也捫持也䟽曰釋詁云朕我也自周以前朕為通言言不可逝矣箋曰逝往也無言不讎朱氏曰讎答也無徳不報惠于朋友箋曰惠順也庶民小子䟽曰小子子弟也今曰酒誥文王誥教小子注云民之子孫也子孫繩繩蘇氏曰繩繩不絶今曰如繩之牽連不絶萬民靡不承由言者自由之言所謂唯其言而莫予違也王無得輕易自由以言無得言曰我出言苟且如是今雖無人執持我舌然言出則往而不可追矣王無有出言而人不讎答之者無有施徳而人不報復之者言必應也王苟能惠順于羣臣朋友下及庶民與其小子則子孫繩繩然相繼不絶而萬民亦莫不承順之矣宜民宜人則福祚無窮也視爾友君子輯柔爾顔輯音集傳曰輯和也不遐有愆箋曰遐逺也相在爾室相去聲朱氏曰相視也尚不愧于屋漏傳曰西北隅謂之屋漏箋曰屋小帳也漏隠也禮祭于奥既畢改設饌于西北隅而䨾隠之處此祭之末也䨾音翡又音肥䟽曰天官幂人職掌帷幕幄帟注云帷幕以布幄帟以繒為之幄在帷幕之内帷幕是大帳幄為小帳禮之有帷幕皆于野張之以代宫室其宫内不張幕也幄則室内亦有之屋漏者室内處所之名可以施小帳而漏隠之處正謂西北隅也言不愧屋漏則屋漏之處有神居之矣故言祭時於屋漏有事之節禮祭于奥中既畢尸去乃改設饌食西北隅䨾隠之處此祭末之時事也幂莫歴反帟音亦曹氏曰爾雅云西北隅謂之屋漏蓋䨾隠之處也凡祭設饌於奥奥室之西南隅尊者所居也既畢然後改設饌於西北隅佐食闔戸牖降所以求神於幽也今祭畢而設饌於屋漏䨾隠之處禮煩力倦或有墮容人雖不覩神實臨之可得而欺邪無曰不顯莫予云覯古侯反傳曰覯見也神之格思傳曰格至也詩記曰思語辭也不可度思度音鐸矧可射思射音亦箋曰矧况也射厭也視爾親友君子之時和柔其顔色以接之庶幾不逺有過此顯明之地人皆知修飭也視爾獨居於室中之時當庶幾無愧于西北隅隠漏之處無曰此非顯明之處而莫予見也當知神之至也不可得而測度豈可厭倦而不敬乎此𤼵心學之奥而以鬼神言之猶中庸言微之顯誠之不可揜也不度不射乃無思無為寂然不動之時程子所謂主一無適尹氏所謂其心収歛不容一物慈湖所謂澄然湛然者也朱氏中庸章句曰隠暗處也微細事也獨者人所不知而已所獨知之地也言幽暗之中細微之事跡雖未形而幾則已動人雖不知而已獨知之則是天下之事無有著見明顯而過於此者是以君子既常戒懼而於此尤加謹焉所以遏人欲於將萌而不使其滋長於隠微之中以至離道之逺也又曰君子戒謹乎其目之所不及見恐懼乎其耳之所不及聞瞭然心目之間常若見其不可離也而不敢有斯湏之間以流於人欲之私而陷于禽獸之域若言防怨而曰不見是圖言事親而曰聴於無聲視於無形蓋不待其證於色𤼵於聲然後有以用其力也又曰道固無所不在而幽隠之間乃他人之所不見而已所獨見道固無時不然而細微之事乃他人之所不聞而已所獨聞是皆常情所忽以為可以欺天罔人而不必謹者不知吾心之靈皎如日月既已知之則其毫髮之間無所潜遁又有甚於他人之知矣又况既有是心藏伏之乆則其見於聲音容貎之間𤼵於行事施為之實必有暴著而不可掩者又不止於念慮之差而已也是以君子既戒謹乎耳目之所不及則此心常明不為物蔽而於此尤不敢不致其謹焉必使其幾微之際無一毫人欲之萌而純乎理義之𤼵則下學之功盡善全美而無斯須之間矣辟爾為徳辟音闢箋曰辟法也俾臧俾嘉淑慎爾止不愆于儀不僣不賊傳曰僣差也鮮不為則鮮上聲投我以桃報之以李彼童而角傳曰童羊之無角者也今曰箋以童羊譬皇后而角喻與政事今不從實虹小子虹音紅傳曰虹潰也曹氏曰蝃蝀也今曰虹謂幻惑也如蝃蝀不正之氣暫見于天須㬰散滅武公時為諸侯之庶子故自稱小子也此章言上行下傚天下皆法爾之徳視傚於爾爾當使之為臧善使之為嘉美毋導之以惡也故必淑善敬謹爾之容止不過愆於威儀不僣差不賊害則少不為人所法則者如人擲我以桃我必報之以李爾為善而民以善應之必然之理也若身不善而責民之善猶索童羊之有角實惑我耳不可信也舊説武公以小子稱厲王如周公稱成王為孺子非也今考楚語云衛武公年九十有五矣猶箴儆於國此言其末年也年表武公終於平王之十三年詩記推武公即位年四十餘其為世子作此詩之時年二三十耳不應斥時王為小子也若以為追刺則前王已往當代臣子尤不得斥為小子矣荏染柔木荏壬之上染上聲曹氏曰荏染柔意也言緡之絲緡音閩傳曰緡被也箋曰被之弦以為弓温温恭人傳曰温温寛柔也維徳之基其維哲人告之話言傳曰話言古之善言也順徳之行其維愚人覆謂我僣覆音福箋曰覆猶反也今曰僣躐也民各有心厲王剛愎拒諌觀其監謗氣象可見故告以有荏染然柔忍之木乃緡被之以絲弦而為弓亦猶温温然寛柔之恭人乃為徳之基本蓋人主必寛柔然後能容受直言而徳日進也其維賢哲之人告之以善言則順其徳而行之其維愚蔽之人反謂我言為僣躐人各有意見何得以汝所見為是而彊王之從也武公以諸侯庶子而論國家之理亂𤼵義理之精微故愚人以為後生僣躐也於乎小子於乎音嗚呼釋文曰凡於乎二字相連皆放此未知臧否音鄙匪手攜之言示之事匪靣命之言提其耳提音啼借曰未知亦既抱子民之靡盈歐陽氏曰靡盈不自滿誰夙知而莫成莫音暮傳曰暮晚也此章武公自警之辭因上章人謂已為僣而内自省也歎言我小子渉歴尚淺誠未知事之善惡然甞親炙於長者矣長者非但攜我之手且示我以已驗之事非但靣命我且提我之耳而告之謂親承其教誨而非剽聞於人也借曰我未有所知亦已抱子為人父矣年齒浸加日月逝矣豈可不汲汲自勵以力踐所聞而侵尋虚老一生邪學問之道患在自滿則不復有進人若能不自盈滿豈有早聞道而晚乃成者乎謂已早聞先生長者之教今當去箇矜字庶能佩服而勿失之此見武公切問近思工夫也舊説以小子為斥王左傳襄公四年魯人之歌云我君小子是古人稱㓜君為小子武公時為世子則不可斥王為小子也至若攜手提耳豈君臣之辭哉或又以為武公老作此詩故呼其同僚為小子武公學問深粹謙抑自處年九十有五猶求益於其國之臣若哆然以老成自處而呼王朝同寮為小子不似武公之氣象也曲禮云長者與之提攜則兩手奉長者之手奉芳勇反負劒辟咡詔之辟音僻咡音二註云傾頭與語又云口耳之間曰咡是攜手提耳皆長者教誥小子之常此詩所言形容親承之意耳正淇奥所美切磋琢磨也昊天孔昭我生靡樂音洛視爾夢夢音䝉傳曰夢夢亂也孫炎云昬昬之貌也我心慘慘驂之上傳曰慘慘憂不樂也誨爾諄諄箋曰口語諄諄然聴我藐藐音莫字亦作貎箋曰藐藐然忽略不用䟽曰不聽受之貎匪用為教覆用為虐借曰未知亦聿既耄音冐傳曰耄老也今曰聿遂也將然之辭昊天甚明照察於我我不樂其生也蓋視王之意夢夢然昏亂我心之憂慘慘然憔悴我誨爾諄諄然詳熟汝聽我藐藐然不入不以我言為教乃反以我為虐借曰我未有所知然亦從此將老矣豈可以吾言為不足聴乎時武公未老故言亦聿既耄猶九月蟋蟀在堂嵗實未莫而言嵗聿其莫也於乎小子告爾舊止箋曰止辭也聴用我謀庶無大悔天方艱難曰喪厥國喪去聲取譬不逺昊天不忒箋曰忒差也回遹其徳䟽曰回遹邪僻也俾民大棘箋曰大棘大困急也又歎言我小子非敢臆説所告爾者皆先世舊章王能聴用我謀庶幾不至於大悔天方艱難將䘮滅其國譬如夏商其類不逺天之福善禍淫豈有差忒哉皆王為邪僻之行使民至於大急自取之也抑十二章三章章八句九章章十句桑柔芮伯刺厲王也箋曰芮伯畿内諸侯王卿士也字良夫䟽曰書序云巢伯來朝芮伯作旅巢命武王時也顧命同召六卿芮伯在焉成王時也桓九年王使虢仲芮伯伐曲沃桓王時也此又厲王之時世在王朝常為卿士故知是畿内諸侯為王卿士也書序注云芮伯周同姓國在畿内則芮伯姬姓也杜預云芮國在馮翊臨晉縣則在西都之畿内也顧命注芮伯入為宗伯畿内而言入者入有二義若對畿内則畿外為入衛武公入相于周是也若對在朝無封爵者則有國者亦為入畢國亦在畿内顧命注亦云畢公入為司馬是也文元年左傳引此云周芮良夫之詩曰大風有隧知字良夫也菀彼桑柔菀音鬱傳曰菀茂盛貎其下侯旬如字又音荀傳曰旬言隂均也捋采其劉捋力活反王氏曰劉殺也殺言盡之也蘇氏曰殘也今曰書盤庚重我民無盡劉左傳䖍劉我邊陲瘼此下民瘼音莫傳曰瘼病也不殄心憂箋曰殄絶也倉兄填兮倉兄填音創況陳蘇氏曰倉悲也説文曰傷也錢氏曰倉讀如愴兄讀如況古文假借未加偏旁也傳曰兄滋也填乆也䟽曰況訓賜也賜人之物則滋多故況為滋也今曰兄與況字同況也永歎訓兹此倉兄及下文亂況斯削訓滋倬彼昊天倬明大貎寧不我矜箋曰矜哀也興也菀然茂盛之桑其葉稚而柔濡其下隂均人息其下者得其芘䕃也及蠶者捋采一朝殘盡之則其樹下之民病於日所暴矣亦猶王剥喪其徳則民不得其芘䕃也君子憂之不絶於心悲愴滋乆而不已於是呼倬然明大之昊天而訴之曰寧不哀矜我乎蘇氏曰桑之為物其葉最盛然及其采之也一朝而盡無黄落之漸言周之盛也如桑之方茂厲王肆行暴虐以敗其成業王室忽然凋弊如桑之既采四牡騤騤音葵傳曰騤騤不息也旟旐有翩旟旐音輿兆翩音篇旟解見鄘干旄旐解見出車錢氏曰翩飛揚也亂生不夷傳曰夷平也靡國不泯音敏傳曰泯滅也民靡有黎音棃今曰黎衆也書黎民於變時雍詩羣黎百姓皆衆也王氏以黎為黒如黔首之義然民靡有黒則不辭矣具禍以燼音盡箋曰具俱也災餘曰燼䟽曰燼是燋燭既然之餘燋音爵於乎有哀於乎音烏呼國歩斯頻傳曰歩行也頻急也曹氏曰國歩猶天歩也天之所行謂之天歩則國步者國之所行也陳氏曰國歩國運也王政不綱諸侯相攻故兵車駕其四牡騤騤然不息所建旟旐翩翩然飛揚禍亂日生而不平夷無國不見殘滅也民無羣衆之聚甚稀踈矣俱遇此禍將為灰燼而無餘矣嗚呼可哀乎國運如此之頻急也四牡騤騤旟旐有翩或考厲王無征伐之事遂以為使臣奔走於道路然味詩之意政是厭苦兵革如杜甫所謂車轔轔馬蕭蕭下言靡國不泯知為諸侯相攻矣國歩蔑資蔑音滅天不我將箋曰將猶養也靡所止疑音逆魚􅕾反朱氏音屹魚乞反今韻畧音疑魚陵反音雖不同皆訓定也云徂何往朱氏曰徂亦往也君子實維今曰君子指厲王秉心無競傳曰競彊也今曰謂自彊也執競武王誰生厲階傳曰厲惡也至今為梗音鯁傳曰梗病也錢氏曰水上浮木壅水者今曰飄蓬斷挭國運困窮無所資頼天不我養無所止定内不得安也云欲往而果何所往外無可向也厲王不自彊以為善復是何人生此禍亂之階至今為梗病乎王實為之也憂心慇慇念我土宇解見卷阿我生不辰箋曰辰時也逢天僤怒僤音亶傳曰僤厚也自西徂東靡所定處音杵多我覯痻音閩又音昏䟽曰覯遇也箋曰痻病也孔棘我圉音語箋曰棘急也傳曰圉垂也䟽曰邊垂也周家土宇昄章今日以侵削矣故我憂心慇慇然念之也我生不得時正逢天之厚怒自恨生於亂世也是時鎬京在西中原在東自西至東無有寧居者言京師及中原皆亂也京師及中國既亂我見其病已多矣而我邊垂又甚急是内外皆不得其安也為謀為毖音秘傳曰毖慎也亂况斯削告爾憂恤箋曰恤亦憂也誨爾序爵箋曰次序賢能之爵李氏曰爵自有序上賢則加以上爵中賢則次之下賢則又次之若小加大淫破義逺間親新間舊則失其序矣誰能執熱逝不以濯今考唐風噬肯來遊朱氏云𤼵語辭蘇氏云噬逝通傳曰濯所以解熱也其何能淑箋曰淑善也載胥及溺箋曰胥相也及與也此教王以用賢言王非不為計謀非不為謹毖然而禍亂滋甚益以侵削是謀之不得其道而所與謀者非人也故我今告爾以當憂恤之事誨爾以次序官爵辨别賢否之道誰能手執熱物而不以水濯之乎以水濯手所以殺其熱欲止亂而不用賢猶欲止熱而不以濯也今王之所任者其何能善乎則相與陷溺於禍難而已如彼遡風遡音素傳曰遡嚮也亦孔之僾音愛傳曰僾唈也唈烏合反箋曰使人唈然不能息䟽曰郭璞云嗚唈短氣也風唈人氣使人不能喘息民有肅心荓云不逮荓音烹徐音絣傳曰荓使也解見小毖牋曰逮及也好是稼穡好去聲力民代食䟽曰司勲云治功曰力則力民謂有功加於民者也錢氏曰代耕而食稼穡維寳箋曰耕種曰稼収歛曰穡代食維好如字君子視厲王之亂如遡嚮於疾風亦甚僾唈使人短氣而不能喘息也民本有恭肅之心而王乃使之怠慢不及事謂奪其農時使不得耕耨也今當好是稼穡言重農也其有功力於民者則使之代耕而食言任賢也蓋稼穡當以為寳而不可輕食禄以代耕者當擇其人之好而不可濫也天降喪亂滅我立王降此蟊賊箋曰蟲食苗根曰蟊食節曰賊稼穡卒痒音羊箋曰卒盡也痒病也哀恫中國恫音通箋曰恫痛也具贅卒荒贅音綴傳曰綴屬也荒虚也䟽曰贅猶綴也朱氏曰言危也春秋傳云君若贅旒然靡有旅力旅力解見北山以念穹蒼王氏曰穹蒼天也天今降此喪亂將滅亡我所立之王謂王室也是以降此蟊賊之蟲使稼穡盡病可哀痛乎中國之人皆贅屬而危矣盡荒虚而空矣羣臣無有盡衆力以念及天意者是代食者其人非好也維此惠君箋曰惠順也民人所瞻秉心宣猶今曰宣布也箋曰猶謀也考慎其相鄭去聲毛如字維彼不順自獨俾臧今曰自獨猶獨自也箋曰臧善也自有肺腸俾民卒狂維此順道之君為百姓所瞻仰内則能秉持其心而有常徳外則宣布其謀而不自用又考察謹擇其輔相維彼不順道之君乃欲用獨自之見而使之善何由得善乎以已自有肺腸行心所欲不謀於衆故使民盡迷惑如狂也自有肺腸即抑詩民各有心也瞻彼中林甡甡其鹿甡音莘傳曰甡甡衆多也朋友已譛今莊䕃反舊音僣不胥以榖箋曰胥相也榖善也人亦有言進退維谷傳曰谷窮也䟽曰谷是山谷墜谷是窮困之義視彼林中其鹿羣輩同行甡甡然衆多今羣臣相讒不能有善禽獸之不如也人亦有言無道之世進退皆窮如䧟山谷然維此聖人瞻言百里錢氏曰聖人聽言迎解其意維彼愚人覆狂以喜覆音福匪言不能胡斯畏忌傳曰胡之言何也聖人於人之言能瞻之於百里之外謂望之而喻其意也若彼愚人禍敗已迫而不自知方且狂迷而喜樂不以為憂如此則雖諄諄然誨之亦不悟矣我非不能言如此畏忌何言王監謗將得罪也維此良人弗求弗迪傳曰迪進也今曰書不迪有顯戮其尚迪果毅注迪進也又夏迪簡在王庭維彼忍心是顧是復䟽曰顧眷也復重也今曰復如顧我復我之復民之貪亂箋曰貪猶欲也寧為荼毒荼音徒䟽曰荼苦菜也毒螫蟲也維此善人王不求索之不進迪之維彼有殘忍之心者王乃顧視而眷念之重復而綢繆之天下之民苦王之政欲其亂亡故寧為荼苦毒螫之行以相侵暴而不之恤也大風有隧大如字鄭音泰隧音遂傳曰隧道也有空大谷維此良人作為式榖今曰式法也榖善也從鄭維彼不順征以中垢音苟今曰征猶攻也曹氏曰征猶討也中垢猶内汚也蓋以閨門之事汚衊之若王鳯之誣毁王商是也衊音蔑大風損物喻小人也其來有隧道必從空大谷中喻小人乗虚而至也若主徳剛明君子道長則國有充實之象小人無由至矣善人所作為之事皆合於法皆本於善無可指摘彼不順之小人乃攻以内汙之事蓋其立朝行已無間可乗唯以曖昧之言誣之使之無由自明耳此小人陷君子之常也大風有隧貪人敗類敗音拜箋曰類等夷也聽言則對箋曰對答也誦言如醉箋曰誦詩書之言匪用其良覆俾我悖音佩箋曰悖逆也今曰韻亦作誖亂也大風有隧道而至如貪人有縁由而至也貪人進則善類敗矣小人好人從已唯聴彼之言則喜而對答之誦古人之言以告之則不悦而如醉不對之矣彼既不用善言而欲使人從已是反使我悖亂於道也䟽曰樂記魏文侯自言端冕而聴古樂則惟恐卧史記稱商鞅説秦孝公以帝道孝公睡而弗應皆是心所不悟如醉然也朱氏曰厲王説榮夷公芮良夫曰王室其將卑乎夫榮公好専利而不備大難夫利百物之所生也天地之所載也而或專之其害多矣此所謂貪人其榮公也歟嗟爾朋友朱氏曰寮友也予豈不知而作今曰即下章既作爾歌之作如彼飛蟲䟽曰蟲是鳥之大名故曰羽蟲三百鳳凰為長時亦弋獲既之隂女隂王如字鄭音䕃女音汝曹氏曰隂蓋覆不暴揚之反予來赫鄭許嫁反毛如字釋文曰亦作嚇音鏬莊子以梁國嚇我是也曹氏曰以言欺人也嗟爾寮友汝蹤跡詭祕我豈不知實事而妄作此詩乎如彼蟲鳥之飛時亦為弋者所得吾之言亦有時而中也予既覆蓋於汝不暴揚汝之事汝反謂予不知而來欺赫予也民之罔極罔極解見衛䇇朱氏曰民之貪亂而不知所止職凉善背涼毛如字鄭音亮背音佩箋曰職主也傳曰凉薄也䟽曰莊三十二年左傳云虢多涼徳朱氏曰善背工為反覆也為民不利如云不克民之回遹職競用力今曰競强也謂强禦也涼言刻薄競言彊禦盗言貪黷三者皆謂小人當時必有所指由此三小人致亂故皆以職言之民之亂無窮極者主由此刻薄之人善為欺背之事也彼為民所不利之事如恐不勝也民之所以邪僻者主由此彊禦之人用力為虐也民之未戾傳曰戾定也職盗為冦涼曰不可覆背善詈音利雖曰匪予既作爾歌民之所以未定者主由此盗臣為冦攘之行也羣小不和自相毁訾其涼者見盗者貪黷已甚亦言其不可而覆背以詈之矣謂其黨亦自知其非也涼背盗而詈之故上章言職涼善背也善詈工於罵也涼者雖歸咎於盗欲自文飾言此亂非我所致然我已作爾歌不可隠諱矣承上章予豈不知而作之意詩記曰此詩本厲王之亂在於用小人故於聴任之際屢致意焉桑柔十六章八章章八句八章章六句詩緝卷二十九
