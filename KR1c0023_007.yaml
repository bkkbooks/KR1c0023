body:
  text: 詩緝卷七宋嚴粲撰王國風譜曰王城者周東都王城畿內方六百里之地其封域在禹貢豫州太華外方之間北得河陽漸冀州之南始武王作邑於鎬京謂之宗周是為西都成王在豐欲宅洛邑使召公先相宅既成謂之王城是為東都今河南是也召公既相宅周公往營成周今洛陽是也成王居洛邑遷殷頑民於成周復還歸處西都至十一世幽王嬖褒姒生伯服廢申后太子宜臼奔申申侯與犬戎攻宗周殺幽王于戲晉文侯鄭武公迎宜臼于申而立之是為平王以亂故徙居東都王城於是王室之尊與諸侯無異其詩不能復雅故謂之王國之變風戲許宜反驪山之下地名亦水名疏曰平王東遷政遂微弱化之所被才及郊畿詩作後於衛頃國地狹於千里故次之於衛也尊之猶稱王在風則卑矣程子曰刑政不能治天下諸侯放恣擅相并滅王迹息矣故雅亡而為一國之風蘇氏曰其風及其境內而不能被天下與諸侯比然其王號未替故不曰周黍離而曰王黍離云李氏曰黍離以下之詩皆是平王之詩也安得謂詩亡然後春秋作乎孟子所謂詩亡者蓋雅頌之詩亡也朱氏曰其地則今河南府及懷孟等州是也補傳曰風之名同於列國而加以王之一字所以尊周亦所以愧周與春秋書王之意一也衛有狄難未幾復振周有犬戎之禍遂致陵夷王之次衛其以此歟正始之化行則以周變商周之所以王而積風為雅也衰亂之俗勝則反周而商周之所以東而雅降為風也王風次衛著盛衰之變也黍離閔宗周也譜曰宗周鎬京也譜疏曰正月赫赫宗周謂鎬京也後平王居洛邑亦謂洛邑為宗周祭統云即宫于宗周謂洛邑也以洛邑謂東都故謂鎬京為西都李氏曰成王之營東都王城則遷九鼎焉成周則居頑民焉平王以來皆居王城至敬王遭子朝之亂王城多子朝之黨敬王不能居於是遷于成周昭二十六年書天王入于成周此宗周成周之辨也朝如字周大夫行役至于宗周過故宗廟宫室盡為禾黍閔周室之顛覆倣徨不忍去而作是詩也倣徨音旁皇疏曰平王詩也平王宜臼幽王子補傳曰序詩者道東周大夫之情狀簡端數語發明一篇終始之義至今讀之使人流涕誰謂詩序可無取哉周東遷而遂微置豐鎬於度外蓋秋風禾黍之感不接于目日逺日忘也其大夫過故國而悲歌徒重千載之太息而已聖人於夷夏之大變蓋三致意焉多方王來自奄至于宗周注云鎬京也周官序言還歸在豐經言歸于宗周指豐邑也唐孔氏云周為天下所宗王都所在皆得稱之故豐鎬洛邑皆可言宗周彼黍離離傳曰彼彼宗廟宫室說文曰黍禾屬而粘者也以大暑而種故謂之黍疏曰黍可為酒離離垂也今曰本草唐本注云黍似粟而非粟也又丹黍米條圖經注云有二種米粘者為秫可以釀酒不粘者為黍如稻之有粳糯耳彼稷之苗曰稷今之穄也穄音祭釋草曰粢稷釋曰粢者稷也曲禮云稷曰明粢是也郭云今呼粟為粢然則粢也稷也粟也止是一物而本草稷米在下品别有粟米在中品又似二物說文曰稷百穀之長今曰本草唐本注云稷即穄也與黍同類孟詵云八穀之中最為下圖經云今所謂穄米也今人不甚珍此惟祠事則用之農家種之以備他穀之不熟則為糧耳苗初生苗而未秀也苖而後秀秀而後實行邁靡靡傳曰邁行也靡靡猶遲遲也中心搖搖疏曰心憂無所附著也楚王謂蘇秦曰寡人心搖搖然如懸旌而無所薄知我者謂我心憂不知我者謂我何求悠悠蒼天傳曰悠悠逺意據逺視之蒼蒼然則稱蒼天此何人哉言鎬京宗廟宫室毁壞而為禾黍之地彼處有黍離離然垂矣彼處又有稷長苗矣連言彼者見無處不然所謂盡為禾黍也周大夫見之而不忍去行邁為之遲遲中心感傷搖搖然無所附著遂言人有知我之情者謂我心有所憂不知我之情者怪我久留不去謂我有何所求也亡國之恨悽然滿目唯呼悠逺之蒼天而訴之曰致此顛覆者是何人乎不斥其人而追恨之深矣言天蒼然悠逺歎其訴而不聞也李氏曰箕子過故殷墟作麥秀之詩曰麥秀漸漸兮禾黍油油與此詩意同漸音杉彼黍離離彼稷之穗音遂亦作穟傳曰穗秀也行邁靡靡中心如醉今曰昏而不醒也知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉朱氏論語解云吐華曰秀是秀為未穗今毛氏所謂秀則已成穗而秀茂與彼秀别彼黍離離彼稷之實今曰實則成穗而堅也行邁靡靡中心如噎音謁今曰噎食窒也知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉苗穟實取協韻耳舊說初見稷之苗中見稷之穟後見稷之實為行役之久前後所見使稷自苗而至於實果為行役之久則不應黍帷言離離也如噎謂氣逆也黍離三章章十句君子于役刺平王也君子行役無期度大夫思其危難以風焉難去聲風音諷李氏曰此大夫蓋同僚也君子于役箋曰于往也不知其期曷至哉雞棲于塒棲音西塒音時傳曰鑿牆而棲曰塒日之夕矣羊牛下來君子于役如之何勿思言此君子往而行役不知期以何時而歸乎言其時之久也且今何所至哉又不知其所至之處言其地之逺也雞棲于塒則日夕矣羊牛又下牧地而來歸皆有休息之時也君子行役乃無休息如之何而使我不思乎言已思之所以風王念之也君子于役不日不月箋曰行役無日月曷其有佸音活傳曰佸㑹也雞棲于桀傳曰雞棲于杙為桀杙音弋橛也橛音掘日之夕矣羊牛下括音聒傳曰括至也君子于役苟無飢渴箋曰苟且也言不可計以日月即序所謂無期度上章所謂不知其期也不知其何時可以佸㑹乎歸期未可望且得無饑渴足矣見不免饑渴也此又所以風之而使察焉者也君子于役二章章八句君子陽陽閔周也疏曰閔傷也蘇氏曰君子以賤為樂則其貴者不可居也雖有貴位而君子不居則周不可輔矣此所以為閔周也君子遭亂相招為祿仕全身逺害而已逺去聲疏曰平王詩朱氏曰君子當衰世知道之不行為貧而仕亦免死而已所以辭尊居卑辭富居貧豈惡富貴而不居哉誠以官尊而祿厚則責重而憂深非吾力之所能堪也是以相招為祿仕雖役於伶官之賤而陽陽自得若誠有樂乎此者其所以全身逺害之計深矣雖非聖賢出處之正然比於不自量其力之不足而昧於榮利以沒身者豈不賢哉此固聖賢之所與也李氏曰老子在周為柱下史梅福在漢為市門卒君子相招為祿仕則在位皆小人矣當是之時貧且賤焉非恥也故詩人不以閔君子而以閔周君子陽陽程子曰陽陽自得之狀李氏曰史記晏子之御意氣陽陽甚自得也補傳曰容充盛貌左執簧音黃疏曰簧者笙管之中金簿鍱也春官笙師注笙十三簧笙必有簧故以簧表笙月令仲夏調竽笙箎簧見三器皆有簧知此非竽箎而必以為笙者以簧之所用本施於笙言笙可以見簧言簧可以見笙故知簧即笙非竽箎也鍱音葉錢氏鹿鳴注曰簧笙之舌也右招我由房傳曰國君有房中之樂箋曰由從也欲使我從之於房中疏曰路寢非燕息之所謂小寢之內作之天子房中之樂以周南諸侯以召南其樂只且樂音洛只音止且沮之平聲又如字箋曰道不行其且樂此而已朱氏曰只且語助聲賢者處於亂世俱為伶官其友陳其相呼執役之事言其君子陽陽自得不以賤事為恥左手執其笙簧右手招我相從於小寢之內將奏房中之樂君子之樂如此而已蓋非所樂而樂焉知時事之不可為矣君子陶陶今如字協韻也舊音遙左執翿音逃傳曰翿纛也箋曰舞者所持謂羽舞也右招我由敖音遨箋曰燕舞之位錢氏曰敖遊也因謂敖處為敖猶周禮云囿遊也其樂只且陶陶自樂貌劉伶酒德頌其樂陶陶亦協醪糟韻君子陽陽二章章四句揚之水刺平王也不撫其民而逺屯戍于母家周人怨思焉箋曰平王母家申國在陳鄭之南迫近強楚王室微弱而數見侵伐王是以戍之朱氏曰先王之訓諸侯有故則方伯連率以諸侯之師討之王室有故則方伯連率以諸侯之師救之天子鄉遂之民供貢賦衛王室已已今平王微弱威令不行於天下無以保其母家乃勞天子之民逺為諸侯屯守故周人戍申者以非其職而怨思也又況申侯實啓犬戎以致驪山之禍乃平王及其臣民不共戴天之讎也今平王知有母而不知有父知其立己為有德而不知其弒父為可怨至使復讎討賊之師反為報施酬恩之舉則其絶滅天理而得罪於民又益甚矣宗廟禾黍曽不以之興懷而唯申國之憂失輕重矣揚之水張子詩曰揚水悠揚緩不流不漂蒲楚弱堪憂不流束薪曹氏曰非薪之彊水弱而已彼其之子其音記朱氏曰其語助也歐陽氏曰謂他諸侯國人之當戍者也不與我戍申今曰前漢地理志南陽宛縣故申伯國朱氏曰申在今鄧州信陽軍之境懷哉懷哉曷月豫還歸哉還音旋興也薪本浮物一束之薪非不可流轉若鑿鑿之白石也而悠揚之水淺弱不能流轉之喻諸侯本非難令而東周衰弱不能號令之也唯其號令不行故彼諸侯之人不與我共戍申國而獨使我周人逺戍久而不得代懷思之哉懷思之哉不知何月我得旋歸乎揚之水不流束楚傳曰楚木也解見漢廣彼其之子不與我戍甫傳曰甫諸姜也疏曰尚書有吕刑之篇禮記引之皆作甫刑孔安國云吕侯後為甫侯周語云申吕雖衰齊許猶在是申與甫許同為姜姓也言甫許者以其俱為姜姓既重章以變文因借甫許以言申其實不戍甫許也六國時秦趙同為嬴姓史記漢書多謂秦為趙亦此類也錢氏曰甫其地未詳懷哉懷哉曷月豫還歸哉揚之水不流束蒲今曰毛以為草鄭以為蒲柳皆蒲草解見陳澤陂蒲柳解見陳東門之楊曹氏曰楚小於薪蒲輕於楚彼其之子不與我戍許傳曰許諸姜也錢氏曰許在今許州朱氏曰今潁昌府許昌縣是也懷哉懷哉曷月豫還歸哉楚愈輕蒲又愈輕至不流束蒲則弱之極矣揚之水三章章六句中谷有蓷音推挽之推吐雷反閔周也夫婦日以衰薄凶年饑饉音覲室家相棄爾疏曰平王詩范氏曰世治則室家相保者上之所養也世亂則男女相棄者上之所殘也其使之也勤其取之也厚則夫婦日以衰薄而凶年不免於離散民之貧國之難也故以閔周中谷有蓷傳曰中谷谷中也曰蓷茺蔚也益母也茺蔚音充尉釋草曰萑蓷萑音追亦作隼李巡曰臭穢草也郭璞曰今茺蔚葉似萑方莖白華華生節問又名益母陸璣曰舊說云菴䕡暵其乾矣暵音罕又音漢乾音干疏曰暵燥也有女仳離仳批之上傳曰别也慨其嘆矣慨音慨嘆音作歎曹氏曰慨嘆聲慨其嘆矣遇人之艱難矣興也蓷草生海濵池澤濕則生旱則死谷中之地隂潤其蓷草宜難旱也今暵燥其乾者矣旱則乾者先燥也興饑饉則貧者先悴也有女見棄與其夫别離慨然發其嘆聲所以慨然而嘆者自傷遇斯人之艱難窮厄也謂見棄者非其夫之得已特以饑饉不能相養故爾曽氏曰無怨懟過甚之辭厚之至也舊說以蓷草暵乾喻夫婦相棄非也此詩但以嵗旱草枯興亂世饑年之憔悴蕭索無潤澤氣象耳由此而致夫婦衰薄遂以相棄故曰遇人之艱難蓋棄妻不怨其夫而以為時之艱難使然舊說以蓷草宜生髙陸生谷中則傷於水非也據本草茺蔚正生海濵池澤其性宜濕傳云蓷隼亦作萑作萑即釋草言萑蓷也大車傳曰菼隼也蓋菼薍萑又名隼一物而四名彼萑音完此萑音追字同而音異毛於此傳言蓷隼者蓋借用隼字非以蓷為菼也曹氏以蓷為菼誤矣中谷有蓷暵其修矣朱氏曰修長也有女仳離條其嘯矣嘯音嘯亦作嘯朱氏曰條條然嘯貌今曰條猶長也江有汜箋曰嘯蹙口而出聲傳曰嘯長吟也條其嘯矣遇人之不淑矣箋曰淑善也詩記曰古者謂死喪饑饉皆曰不淑蓋以吉慶為善事凶禍為不善事雖今人語猶然長茂者亦為所暵興饑饉甚則粗給者亦乏絶矣條條然而長嘯其悲恨深於歎矣不善猶言不幸也中谷有蓷暵其濕矣有女仳離啜其泣矣啜音輟錢氏曰啜泣而縮氣也補傳曰嘯甚於歎泣甚於嘯啜其泣矣何嗟及矣生於濕者又難旱於修者今亦為所暵興富足者亦乏絶矣凶年饑饉之甚貧富皆惟悴也啜然泣而縮氣窮之甚也何所嗟悔而可及謂雖嗟歎而不及於事無益也詩記曰言事已至此末如之何也中谷有蓷三章章六句兔爰閔周也桓王失信疏曰桓王林平王崩太子泄父早死立其子林諸侯背叛背音佩構怨連禍王師傷敗君子不樂其生焉樂音洛朱氏曰左傳隱三年云鄭武公莊公為平王卿士王二於虢鄭伯怨王王曰無之周鄭交質桓王即位將卒畀虢公政鄭祭足帥師取溫之麥又取成周之禾桓五年云王奪鄭伯政鄭伯不朝王以諸侯伐鄭鄭伯禦之戰于繻葛王卒大敗祝聃射王中肩質音致祭音再繻音須射音食中音衆疏曰兔爰本在葛藟之下但簡劄失次耳春秋之例王師不書此繻葛之戰書三國從王伐鄭蓋伐鄭不服也王卒既敗自是王命不行矣有兔爰爰傳曰爰爰緩意雉離于羅曰離麗也解見新臺傳曰鳥網為羅我生之初曹氏曰謂幼稚時也尚無為箋曰尚庶幾也我生之後逢此百罹音離傳曰罹憂也尚寐無吪音訛𫝊曰吪動也今曰無羊或寢或吪訛亦訓動彼吪作訛字異音義同朱氏曰寢而不動以死耳興也兔隂狡善逸雉耿介善鬭有兔爰爰然緩喻鄭人縱恣自如而無如之何也有雉離于羅網之中喻周人為王力戰而受禍也我生之初天下庶幾無事及我生之後逢此百憂有生不如無生庶幾寢寐而不訛動死為愈也有兔爰爰雉離于罦音孚傳曰罦覆車也車赤奢反疏曰釋器曰繴謂之罿罿罬也罬謂之罦罦覆車也繴音壁郭璞曰今之翻車也有兩轅中施罥以捕鳥罥音絹釋曰捕鳥之具孫炎曰掩兔非也我生之初尚無造傳曰造為也我生之後逢此百憂尚寐無覺音教有兔爰爰雉離于罿音衝曰罿即罦也我生之初尚無庸傳曰庸用也我生之後逢此百凶尚寐無聰兔爰三章章七句葛藟音壘王族刺平王也周室道衰棄其九族焉箋曰九族者據已上至髙祖下及𤣥孫之親曹氏曰堯典以親九族孔安國以為髙祖𤣥孫之親杜預以為父族四母族三妻族二合而為九族康成孔穎達從安國說徐安道以頍辨序言不親九族而詩有甥舅角弓序言不親九族而詩及婚姻以杜說為是案周官小宗伯掌三族之别以辨親疏說者為父也子也孫也三者為人屬之正名喪服小記云親親以三為五以五為九上殺下殺旁殺而親畢矣說者謂自己而上親父下親子三也以父親祖以子親孫五也以祖親髙祖以孫親𤣥孫九也則由一而三由三而九皆謂同姓之親耳二詩之序推親親而廣之耳夏氏書解曰髙祖非己所得而逮事𤣥孫非己之所及見惟夏侯歐陽等以為父族四母族三妻族二父族四者父五屬之內一也父之女昆弟適人者及其子二也己之女昆弟適人及其子三也己之女子適人者及其子四也母族三者母之父姓一也母之母姓二也母之女昆弟適人者及其子三也妻族二者妻之父姓一也妻之母姓二也今曰二說不同姑兼存之葛藟在兔爰之下解見兔爰親親周道也棄其九族則周道衰矣陳氏曰周公大封同姓成王內睦九族綿綿葛藟傳曰綿綿長不絶之貌葛藟解見樛木在河之滸音虎釋丘曰岸上滸釋曰岸上平地去水稍逺者名滸傳曰水崖曰滸渤海胡氏曰周南云葛之覃兮施于中谷邶風云旄丘之葛兮何誕之節兮唐風云葛生蒙楚大雅云莫莫葛藟施于條枚然則葛藟又生於山谷丘野之地延蔓於草木條枚之上不生於水崖終逺兄弟逺去聲謂他人父謂他人父亦莫我顧興也葛藟枝蔓聨屬必依木以生喻宗族之依王室也今綿綿然不絶之葛藟不生於丘野而生於河水之滸岸近水之岸善崩將為水所蕩猶王室衰微人將失其所依也此詩刺王不親九族而舉親兄弟之辭以責之親兄弟則同父故言王終逺我兄弟者謂父是他人之父乎不然何為不顧我也知有父則知有兄弟矣今人兄弟之相責望者猶言汝豈不念父之故杕杜曰豈無他人不如我同父意亦同平王視親兄弟且如路人則待九族可知矣舊說平王以他人之父為父非也綿綿葛藟在河之涘音俟上濁釋丘曰涘為崖李巡曰涘一名崖謂水邉也終逺兄弟謂他人母謂他人母亦莫我有母謂是他人母乎莫我有言視之如無也左傳云不有寡君綿綿葛藟在河之漘音脣釋丘曰夷上灑下曰漘孫炎曰平上峭下郭璞曰崖上平坦而下水深者為漘不發聲也終逺兄弟謂他人昆傳曰昆兄也謂他人昆亦莫我聞謂兄是他人之兄乎莫我聞言我責以兄弟之義彼聽之如不聞也葛藟三章章六句采葛懼讒也疏曰桓王詩彼采葛兮一日不見如三月兮興也人臣任事於外則讒間易生今往彼采葛以為絺綌事之至微者時不至久迹無可疑然一日不見於君己懼小人乘間而讒之如三月之久矣蓋讒人衆多君子動輒疑懼略不可以有所為事有大焉者誰敢任之乎李氏曰小人之譛人多因其不見則乘間而讒之如上官桀等謀譖霍光伺光出沐日奏之𢎞恭石顯欲譖蕭望之候望之出沐日上之曹氏曰古語云一日不朝其間容刀彼采蕭兮傳曰蕭所以共祭祀曰蕭者香蒿也牛尾蒿也解見蓼蕭及生民一日不見如三秋兮彼采艾兮艾牛蓋反傳曰艾所以療疾一日不見如三嵗兮采葛三章章三句大車刺周大夫也禮義陵遲疏曰陵遲猶陂陀言廢壞之意陀音弛李氏曰家語云三尺之限空車不能登者峻故也百仞之山重載涉焉陵遲故也王肅注云陵遲猶陂陀也男女淫奔故陳古以刺今大夫不能聽男女之訟焉疏曰桓王詩此詩人述古人能止奔者刺今有淫奔之訟而不能聽也大車檻檻銜之上濁傳曰大車大夫之車檻檻車行聲也錢氏曰尊之言大車補傳曰檻檻有聲可懼毳衣如菼毳尺鋭反吹之去菼覃之上濁疏曰春官司服衮冕鷩冕毳冕希冕𤣥冕鄭注云古天子冕服十二章至周以日月星辰畫於旌旗而冕服九章登龍於山登火於宗彞尊有神明也九章初一曰龍次二曰山次三曰華蟲次四曰火次五曰宗彞皆畫以為繢次六曰藻次七曰粉米次八曰黼次九曰黻皆絺以為繡則衮之衣五章裳四章凡九也鷩畫以雉謂華蟲也其衣三章裳四章凡七也毳畫虎蜼謂宗彞也其衣三章裳二章凡五也希刺粉米無畫也其衣一章裳二章凡三也𤣥者衣無文裳刺黻而已是以謂𤣥焉凡冕服皆𤣥衣纁裳鷩音鷩希本又作絺陟里反蜼位柚壘三音今考益稷注云絺徐音笞鄭音止刺也王氏曰春官典命王之三公八命其卿六命其大夫四命及其出封皆加一等蓋八命加一等所謂上公九命其服以九為節也其未出封則與侯伯同服矣公與侯伯同服則卿與子男同服矣此詩所謂周大夫者卿也司服所謂卿大夫之服自𤣥冕而下者諸侯之卿大夫也菼箋曰菼薍也毳衣之屬衣繢而裳繡皆有五色焉其青者如隼薍頑之去聲今曰毛氏云菼隼也蘆之初生也鄭氏云菼薍也孔氏云孫炎郭璞以蘆薍為二草李巡舍人樊光以蘆薍為一草毛意同李巡之輩鄭易傳為薍又言青者如隼隼鳥青非草名蓋毛所指隼者草也鄭所指隼者鳥也今從鄭蘆薍為二草菼薍萑解見七月豈不爾思畏子不敢古者大夫乘其大車其德尊嚴故聽其車行之聲檻檻然可懼又身服毳冕之衣衣繢而裳繡皆有五色其青色者如初生之菼乘是車服是服以朝享助祭儼然人望而畏之不敢犯禮有女欲奔者云我豈不思汝乎畏此乘大車服毳衣之人故不敢也古之大夫能莊敬以臨民使之無訟則今之大夫有訟而不能聽為可刺也曹氏曰毛公謂大夫服毳冕以決訟毳衣冕服也享王於廟及助王祭祀則服之未有服之以聽訟也大車啍啍音㬀他敦反傳曰啍啍重遲之貌毳衣如璊音門說文曰璊玉赤色疏曰其赤者如璊豈不爾思畏子不奔榖則異室傳曰榖生也死則同穴箋曰謂冢壙中也言古之大夫聽訟之政非但不敢淫奔乃使夫婦之禮有别疏曰內則云禮始於謹夫婦為宫室辨內外男不入女不出謂豫不信有如皎日皎音皎傳曰皎白也言古者男女皆守禮之正生則異室不至相瀆死則同穴從一以終謂豫不信有如皎日觀其自誓之辭所守之堅可知矣此由上之風化使然也大車三章章四句丘中有麻思賢也莊王不明疏曰莊王他桓王子賢人放逐國人思之而作是詩也二留名氏不顯事迹無傳以國人思之知其賢矣丘中有麻彼留子嗟傳曰留大夫氏子嗟字也曹氏曰留本邑名其大夫以為氏彼留子嗟將其來施施箋曰施施舒行貌蘇氏曰庶其肻徐來以從我李氏曰孟子施施從外來子嗟放逐在外國人思之言隱居丘陵之間而殖麻以為生者是彼留氏字子嗟也彼留氏子嗟庶幾施施然舒行而來以從我也猶唐有杕之杜筮肻適我白駒於焉逍遙之意夫賢者放逐於外而使國人私致其愛慕欲其相與遊從而已知莊王不能復用之矣丘中有麥彼留子國傳曰子國子嗟父朱氏曰子國亦字也彼留子國將其來食蘇氏曰庶幾肻來從我食也庶幾從我食猶唐有杕之杜言中心好之曷飲食之之意愛而欲飲食之也君不能養賢而國人欲私致其殷勤以飲食之而已丘中有李彼留之子朱氏曰并指前二人也彼留之子貽我珮玖傳曰石次玉者能遺我美寶疏曰美寶猶美道貽我珮玖欲其遺我以善道也夫賢者宜金玉王度而乃使國人望其私淑於已而已是可歎也張平子四愁詩云美人贈我金琅玕何以報之雙玉盤其序云屈原以珍寶為仁義騷人之辭源流於風也丘中有麻三章章四句詩緝卷七
