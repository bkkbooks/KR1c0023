body:
  text: 詩緝卷二十八宋嚴粲撰公劉召康公戒成王也成王將涖政涖音利戒以民事美公劉之厚於民箋曰公劉后稷之曽孫而獻是詩也箋曰成王始幼少周公居攝政及歸之成王將涖政召公懼成王尚幼稚不留意於治民之事故作詩美公劉以戒之也詩記曰史記云夏后氏政哀去稷不務不窋失其官而奔戎狄之間不窋孫公劉雖在戎狄之間復修后稷之業窋竹律反王氏曰周之有公劉言乎其時則甚微言乎其事則甚勤稱時之甚微以戒其盈稱事之甚勤以懲其逸蓋召公之志也篤公劉傳曰篤厚也今曰公劉克篤前烈釋文曰王云公號劉名也尚書傳云公爵劉名也王基云公劉字也詩故曰周人以諱事神王者祫百世召公不當舉名然則公劉其號也匪居匪康箋曰康安也乃埸乃疆埸音亦信南山傳曰埸畔也董氏曰疆界也埸疆皆田之界畔然詩言乃埸乃疆當有小别疆如封疆所包者廣故王氏於信南山言疆者為之大界然則埸是小界今之小田塍也乃積乃倉積如字董氏曰積委積也此委積音餧恣朱氏曰積露積也乃裹餱糧裹音果餱音侯今曰餱乾食也解見伐木糧米食也于槖于囊槖音託傳曰小曰槖大曰囊疏曰宣二年左傳稱趙盾見靈輒餓為之簞食與肉置諸槖以與之槖唯盛食而已是其小也蕇食與肉置槖是乾餱盛于槖也哀六年公羊傳稱陳乞欲立公子陽生盛之巨囊內可以容人是其大也今曰東方朔傳云奉一囊粟是糧米盛于囊也奉音俸思輯用光輯音集今曰書輯五瑞注云斂也此輯亦聚集之也弓矢斯張干戈戚揚箋曰干盾也盾食允反戈解見曹侯人傳曰戚斧也揚鉞也鉞音越詩記曰左傳工尹路曰君王命剝圭以為鏚柲注鏚斧也柲柄也柲音祕疏曰鉞大而斧小六韜云大阿斧重八斤一名天鉞爰方啓行朱氏曰方猶始也首章述公劉在西戎謀遷於豳也自后稷封於邰傳子不窋夏后氏政衰去稷不務不窋失其官竄于西戎不窋之孫公劉自西戎而遷于豳遷國安民非篤厚者不能故言篤厚乎公劉也以下乃述厚民之事唯篤厚故能厚民也公劉之在西戎不敢居處不敢安寧謂不安於夷狄之陋謀為遷豳之計也將欲遷國必先聚糧治兵故乃埸以治其田之小塍乃疆以治其田之大界乃蓄其露積乃實其倉廪既已富彊乃盛其乾餱于小槖盛其糧米于大囊思以斂集其民而光顯其國遷國則民易離散故必有恩意斂集之也於是弓矢則張之又有干盾戈㦸戚斧揚鉞於是方開路而行以遷於豳焉詩記曰毛鄭以公劉居於邵而遭夏人亂避難遷於豳且以為在邰有疆埸積倉為夏人迫逐乃棄而去考之是章意象整暇不見迫逐之事以國語史記參之蓋自不窋已竄于西戎至公劉而復興疆埸積倉內治既備然後裹糧治兵拓大境土而遷都于豳焉國都雖遷向之疆埸積倉固在其封內也篤公劉于胥斯原傳曰胥相也相去聲今曰聿來胥宇既庶既繁箋曰庶衆也繁多也既順乃宣曹氏曰順樂從也陳氏曰宣導也而無永嘆平聲陟則在巘研之上釋山曰重甗隒甗音巘隒音儼郭璞曰山形如纍兩甗甗甑也釋文曰毛云小山别于大山與爾雅異復降在原何以舟之傳曰舟帶也維玉及瑶音遙今曰瑶美玉也玉泛言之瑶言玉之美者鞞琫容刀鞞音丙琫必孔反亦作鞛鞞琫解見瞻彼洛矣疏曰此傳云鞞下飾以下不言其飾故指鞞之體云下飾也朱氏曰容刀其中容刀也次章述至豳相宅也篤厚乎公劉也往相廣平之原地以居其民其民既庶而衆矣既繁而多矣庶即繁也言庶而又言繁見歸者愈多也衆多則宜意嚮難齊今皆順從而樂遷矣公劉又恐民之初遷有懷不能以自達乃復宣導在下之情欲人人皆得其所也盤庚之民必再三宣導而後順從今既順乃宣則本無扞格而上猶慮其壅蔽也故歡欣交通無有永嘆而不滿者非民咨胥怨之比也民見公劉升則在巘山之上以觀其形勢復下而在原以察其處所反覆相視以民居為重遂言公劉登陟之際何所佩帶乎惟玉及美玉之瑶又有鞞鞘其上飾有琫以容其刀也稱公劉佩服之美者承上文而無永嘆述斯民喜之之情也黃氏曰詩人之情其惡是人也必言其車服之盛佩玉之飾以見其不足以稱之其喜是人也亦必言其車服之盛佩玉之飾以見其足以稱之綿乃宣兼乃畝言之則為宣導溝洫此乃宣承既順言之下云而無永嘆則為宣導下情篤公劉逝彼百泉箋曰逝往也張子曰只看百泉之往處便知地形也瞻彼溥原溥音普箋曰溥廣也乃陟髙岡箋曰山脊曰岡乃覯于京傳曰覯見也箋曰絶髙為之京李巡曰丘之髙大者曰京今曰此乃覯于京非岐周地名之京故鄭氏以為絶髙為之京謂髙丘耳有考見文王京師之野傳曰是乃大衆所宜居也董氏曰所謂京師者始於此其後世因以所都為京師曰嬪于京依其在京則岐周之京也王配于京則鎬京也春秋所書京師則洛邑也皆仍其本號而稱之猶晉之言新絳故絳也公羊以為衆大非也于時處處音杵于時廬旅傳曰廬寄也疏曰地官遺人云十里有廬是舍之名賔客寄舍其中衛戴公廬于漕遺去聲于時言言傳曰直言曰言疏曰謂一人自言蘇氏曰言言施教令于時語語傳曰論難曰語疏曰謂二人相對蘇氏曰語語議政事三章述營度邑居也篤厚乎公劉也其營京邑也自下觀之則往彼衆水所聚之處又望彼漙廣之原自上觀之則升彼南山之岡脊乃見髙大之京丘可居也此京地乃衆民所宜居之野於是經畫以定之於此作民居以處其處者於此作客舍以廬其旅者於此施教令於此議政事各有其所見規模整整也處謂居民旅謂賔旅也百泉衆水也令地理家言衆水所聚為得水也曺氏據杜佑云百泉在漢為朝那縣屬安定郡在唐為百泉縣屬平涼郡魏於其地置原州唐因之當是其地因詩百泉而得名猶因杜詩不夜月臨關後人遂置不夜關耳篤公劉于京斯依蹌蹌濟濟濟齊之上俾筵俾几箋曰俾使也既登乃依毛如字鄭上聲傳曰賔登席依几乃造其曹造音慥箋曰造適也傳曰曹羣也執豕于牢傳曰執豕于牢新國則殺禮也殺所戒反疏曰饗禮當烹太牢以飲賔此唯用豕新至豳地殺禮也晉語云大任溲於豕牢而生文王即牢是養豕之處燕禮羹定乃納賔此賔升乃執豕者其實執豕在登席之前欲使賔與殽酒各自相近故也溲音搜作同小便也酌之用匏音庖傳曰酌之用匏儉以質也疏曰匏是自然之物故云儉且質也食之飲之食音嗣飲音䕃君之宗之傳曰宗尊也四章述宮室既成而落之也篤厚乎公劉也於此髙丘之京依而居之謂宫室既成而安其居也於是與羣臣飲酒以落之其禮容之盛蹌蹌濟濟然公劉使人為之設筵使人為之設几賔已登席坐矣乃依几矣前乎此公劉使人造適其牧豕之羣執豕於牢中以為飲酒之殽其酌此酒用匏為爵公劉之於羣臣既設饌以食之設酒以飲之禮雖簡儉羣臣君之尊之不失敬也篤公劉既溥既長箋曰溥廣也既景乃岡傳曰考于日景參之髙岡今曰地官大司徒正日景以求地中注景如字本或作影非相其隂陽相去聲箋曰相其隂陽寒暖所宜觀其流泉疏曰流泉所以灌溉其軍三單箋曰大國之制三軍以其餘卒為羡今公劉遷於豳民始從之丁夫適滿三軍之數單者無羡卒也羡延之去聲疏曰小司徒云凡起徒役無過家一人以其餘為羡羡謂家之副丁也度其隰原度音鐸徹田為糧箋曰什一而稅謂之徹李氏曰周之徹法最為盡善自公劉始後世從而守之度其夕陽傳曰山西曰夕陽箋曰夕陽者豳之所處也疏曰豳在其山之西不知是何山也書傳說大王去豳踰梁山注云梁山在岐山東北然則豳國之東有大山者其唯梁山乎豳居允荒豳解見豳譜傳曰荒大也五章述辨土宜制軍賦也篤厚乎公劉也所遷之地既廣矣既長矣既揆之日景以定其東西於是升髙岡以相其隂陽寒暖之宜觀其水泉灌溉之利將以治田疇也后稷上公之封大國三軍以其餘卒為羡今丁夫適滿三軍之數唯單而已無羡卒也又於是度其隰田原田之多少以什一之徹法取於民以為糧食地利肥磽不同故必度之而後可以制賦三軍唯單賦法以徹兵食皆不病民厚之至也豳國在梁山之西故言自公劉相此夕陽之地以建豳居信乎其荒大也美其遷國之善也篤公劉于豳斯館傳曰館舍也朱氏曰客舍也補傳曰始言斯館卒言止旅蓋以處新氓也涉渭為亂傳曰正絶流曰亂朱氏曰舟之絶流橫渡者也取厲取煆丁亂反朱氏曰厲砥石也疏曰煆者治鐵之名止基乃理解頥新語曰止基居止之基爰衆爰有夾其皇澗傳曰皇澗名也遡其過澗過平聲傳曰遡嚮也過澗名也止旅乃密今曰止旅來止之旅芮鞫之即芮如鋭反木又作汭鞫音菊蘇氏曰芮水出吳山西北東入涇芮鞫芮水之外也今曰西漢地理志扶風汧縣注云芮水出西北東入涇引此詩為證蘇說是也毛以芮為水涯鄭以為水乏內今不從汧音牽箋曰水之內曰隩水之外曰鞫疏曰即就也末章述處新氓也新氓之至者公劉為作館以居之將作此館舍先使人涉渡渭水乘舟橫渡為亂而過取厲刀之石又取所煆之鐵以治其器用既定居止之基乃疆理其田畝其相續而來者愈多愈有於是或有夾皇澗而在澗兩邊以居者或有遡過澗而開門向水以居者既而來止之旅日以益密皇澗過澗之旁不足以容之於是又就芮水之外而居之詩記曰風氣日開民編日衆規模日廣有方興未艾之象焉周之王業既兆于此矣煆毛氏以為石朱氏以為鐵今考煆打鐵也其字從金碬者礪也其字從石此煆從金則當為鐵嵇康好煆是也公劉六章章十句泂酌泂音迥召康公戒成王也言皇天親有德饗有道也疏曰言為民父母是有道德泂酌彼行潦音老傳曰泂逺也行潦流潦也疏曰行者道也潦者雨水也行道上雨水流聚挹彼注兹挹音邑可以餴饎餴音分字亦作饙饎音熾釋文曰餴蒸米也傳曰餴餾也饎酒食也餾音留疏曰說文云一蒸米也然則蒸米謂之餴餴必餾而熟之非訓餴為餾也豈弟君子民之父母言使人逺往酌取流行之雨潦置之大器待其澄清又挹取之於彼大器之中注之於此小器之中猶可灌沃餴米以為酒食此薄陋之物而可以祭祀使天饗之者由設祭者是豈弟樂易之君子而為民之父母也祭不必用行潦甚言不在物也泂酌彼行潦挹彼注兹可以濯罍音雷傳曰濯滌也罍祭器疏曰春官司尊彛云四時之祭皆有罍是罍為祭器也卷耳云我姑酌彼金罍則饗燕亦有罍以此論祭事故言祭器耳豈弟君子民之攸歸泂酌彼行潦挹彼注兹可以濯溉音槩傳曰溉清也疏曰溉亦洗之使清潔豈弟君子民之攸塈音餼傳曰塈息也泂酌三章章五句卷阿卷音權召康公戒成王也言求賢用吉士也公劉疏曰卷阿末句云矢詩不多維以遂歌是總結之辭三篇次第元是召公作之先後公劉言成王將涖政而獻是詩明下兩篇亦是涖政之時俱獻之也經言君子又言吉士君子者尊貴之稱士者衆多之目其曰藹藹吉士維君子使是吉士者君子所引善類而君子者吉士之宗主也故經以鳳凰之希有喻君子以羽聲之衆多喻吉士也序言求賢用吉士賢指經中之豈弟居子吉士指經中之藹藹吉士也謂求豈弟君子以任用吉士也成周之朝吉士雖衆多不可無大賢以為之統盟公劉泂酌卷阿三詩皆成王涖政康公作之以戒王也周公有明農之請將釋天下之重負以聽王之所自為康公慮周公歸政之後成王涉歷尚淺任用非人故作卷阿之詩反覆歌詠有言之不盡之意欲以動悟成王若曰周公欲歸政矣王所倚仗者誰歟以壯鋭之氣享盛大之業若任用非人將傷大體王當虛心屈己以求豈弟之賢而任之豈弟君子云者乃篤厚純固盛德之人可以彌性而輔君德可以為則而儀百辟可以為綱而總衆職可以任使吉士而司進退人物之權此其責任至重前乎此者周公實任之王盍求其可以任周公之事者而繼之乎苟求其人而未得則周公其可以遂明農之請乎康公所以動悟成王者其辭婉矣周召同心如此乃知周公居東之初成王未悟之日伐柯九罭等詩人心顒顒謂朝廷一日不可無周公在召公必不但默也史傳略耳有卷者阿傳曰卷曲也箋曰大陵曰阿飄風自南飄如字從韻書本注音瓢傳曰飄風回風也疏曰李巡云旋風也檜風云匪風飄兮何人斯云其為飄風彼皆不言自南故以為惡此言從長養之方故為喻善今曰南溫厚之氣風自南則得溫厚之氣故能長養萬物豈弟君子來遊來歌以矢其音傳曰矢陳也今曰釋文云矢陳也直也矢其音謂直陳其音如矢口成文之矢也興也阿不曲則風無自而入故必有卷然之阿而後自南長養之風飄回而入喻人君能虛心屈己而後足致豈弟之大賢也誠使豈弟君子來而與王游來而就王歌以直陳其聲音使之盡吐其所欲言而無所顧慮則薰陶漸染所以養成君德者亦如南風之養物矣伴奐爾游矣伴奐音判喚徐音畔換箋曰伴奐自縱弛之意今曰安肆之意優游爾休矣錢氏曰優遊閒暇貌豈弟君子俾爾彌爾性王氏曰彌者充而成之使無間之謂也釋文曰彌益也似先公酋矣酋音遒慈秋反傳曰似嗣也酋終也承上章言賢者既來游矣爾成王當與之安肆而游處間暇而休息從容欵密與之浹洽則此豈弟之賢必有薰陶漸染之功而使爾彌益其德性以繼嗣先公之業而克終矣彌性非矯揉彊勉之所及唯有德之賢朝夕與之游處久而與之俱化耳不言先王而言先公不忘所起之艱難也爾土宇昄章昄音反韻又音版錢氏曰土疆土也宇宇內也傳曰昄大也蘇氏曰章著也亦孔之厚矣豈弟君子俾爾彌爾性百神爾主矣成王承文武之緒其土宇昄大而章著大則疆理混一章則法度修明亦甚厚而不可加矣豈可任非其人而敗壞之乎惟得豈弟之賢而用之以彌益其德性則百神歆饗之皆以汝為主矣有天下者祭百神社稷宗廟之主也爾受命長矣陳氏曰長纍世已久茀祿爾康矣茀音弗箋曰茀福也豈弟君子俾爾彌爾性純嘏爾常矣嘏音假箋曰純大也蘇氏曰嘏福也爾受天命其傳已久福祿已安矣周以積纍之久而後興故享之而安也然豈可任非其人而斫喪之乎惟得豈弟之賢而用之以彌益其德性則大福爾可常享矣二章三章四章皆言彌性者謂此豈弟之賢關君德之涵養成就而非小有材者所能與也有馮有翼馮音憑傳曰馮依也翼輔翼也蘇氏曰在前則有馬在側則有翼有孝有德以引以翼王氏曰以引引其前以翼翼其左右劉氏曰引其君以當道豫欲左右有民汝翼豈弟君子四方為則箋曰則法也馮翼孝德之人即藹藹吉士也成王左右前後有可為馮依者有可為輔翼者有孝行者有賢德者凡此諸賢王能有之以引導輔翼其身矣然必得豈弟之大賢以為四方之法而儀刑百辟也說者多以四方為則非人臣之事遂以豈弟君子為斥成王然首章來游來歌便說不行吉甫萬邦為憲申伯文武是憲山甫式是百辟嘉賔是則是效皆人臣事也詩記曰賢者之行非一端必曰有孝有德何也蓋人主常與慈祥篤實之人處其所以興起善端涵養德性鎮其躁而消其邪日改月化有不在言語之間者矣故宣王之在內者唯云張仲孝友而蕭望之亦謂張敞材輕非師傅之器皆此意也顒顒卬卬傳曰顒顒溫貌卬卬盛貌箋曰顒顒體貌敬順卬卬志氣髙朗如圭如璋令聞令望聞音問箋曰人聞之則有善聲譽人望之則有善威儀豈弟君子四方為綱箋曰綱者能張衆目外之體貌顒顒然敬順內之志氣卬卬然髙明其德如玉之圭璋表裏純一也人聞之有善聲譽人望之有善威儀此豈弟之君子可以為四方之綱也綱舉則目張謂總提綱維也說者以顒顒卬卬而下為成王非也假樂嘉成王故稱穆穆皇皇此詩以成王初涖政而戒之則不當過為稱譽之辭也鳳皇于飛傳曰鳳皇靈鳥仁瑞也雄曰鳳雌曰皇翽翽其羽翽音誨傳曰翽翽衆多也箋曰羽聲也曹氏曰說文云翽翽飛聲也飛而有聲則衆羽也鳳皇希見之鳥不應羣飛之衆如此則翽翽其羽者乃鳳皇飛而衆鳥從之也說文云鳳飛羣鳥從之以萬數亦集爰止箋曰爰于也藹藹王多吉士蘇氏曰藹藹衆多也維君子使今日此君子即前數章所稱豈弟君子也媚于天子因時鳳至故以喻賢者鳳飛鳥之出乎其類者衆鳥所慕也鳳皇于飛而翽翽然衆羽之聲亦集於所止之地猶大賢用而善類樂附之從其類也今王朝之上吉士藹藹衆多矣然必得大賢君子為之宗主而器使之則聲應氣求各盡其心以媚愛于天子矣言王多吉士是王已有之吉士見於已用者成周人材最盛而可以當鳳皇之喻為人材之統盟者捨周公其誰哉鳳皇于飛翽翽其羽亦傅于天傅音附箋曰𫝊猶戾也藹藹王多吉人維君子命箋曰命猶使也媚于庶人箋曰親愛庶人謂無擾之鳳皇鳴矣于彼髙岡曹氏曰髙岡衆人所見聞也梧桐生矣疏曰梧桐一木耳曰梧桐青桐也山隂陸氏曰梧一名櫬即梧桐也今人以其皮青號曰青桐華淨妍雅極可愛故多近齊閣種之梧櫜鄂皆五焉其子似乳綴其櫜鄂生多或五六少或一二飛鳥喜巢其中莊子所謂桐乳致巢是也今亦謂之梧子于彼朝陽傳曰山東曰朝陽疏曰朝先見日也曹氏曰向陽而易茂也菶菶萋萋菶布孔反傳曰梧桐盛也雍雍喈喈傳曰鳳皇鳴也言今鳯皇已鳴矣其鳴在于髙岡之上衆所聞見喻大賢處髙顯之地非潜伏側陋也此大賢非有道不見如鳳皇非梧桐不棲今梧桐已生矣其生在於朝陽之地向陽則易茂喻今太平之時也有其人又有其時如梧桐菶菶萋萋而茂盛鳳皇雍雍喈喈而和鳴君臣遇合之盛如此也康公所指豈難知哉成王可以默㑹矣君子之車既庶且多箋曰庶衆也君子之馬既間且馳箋曰間習也矢詩不多維以遂歌此君子其車已衆而多矣其馬既間習而能馳矣言其爵位尊顯錫賚已厚所謂大賢可為多士之宗主者此其人也我陳詩之意初無多說只為此一事耳維王歌詠之深味乎吾言可也康公三詩皆作於成王將涖政之初公劉泂酌皆直述之辭唯卷阿宛轉反覆使人再三歌詠而後悟蓋其深意所寓實在此篇也卷阿十章六章章五句四章章六句民勞召穆公刺厲王也江漢箋曰召穆公名處江漢疏曰康公十六世孫朱氏曰厲王名胡成王七世孫疏曰夷王子周語上云厲王虐國人謗王召公告曰民不堪命矣王怒得衛巫使監謗者以告則殺之國人莫敢言道路以目王喜告召公曰吾能弭謗矣乃不敢言召公曰是障之也防民之口甚於防川川壅而潰傷人必多民亦如之是故為川者決之使導為民者宣之使言故天子聽政使公卿至於列士獻詩瞽獻典史獻書師針瞍賦矇誦百工諌庶人傳語近臣盡規親戚補察瞽史教誨耆艾修之而後王斟酌焉是以事行而不悖王不聽彘於是國人莫敢出言三年乃流王於朱氏以此詩乃同列相戒之辭未必專為刺王而發然其憂時感事之意亦可見矣其說是也詩言以定我王又言以為王休又言戎雖小子皆語同列之辭以詩之辭戒同列所以刺王也民亦勞止汔可小康汔欣之入箋曰汔幾也康安也孫炎曰汔近也今曰幾舊音祈易汔至亦未繘井彼注云幾也音祈或音機此詩訓幾為庶幾當音機也繘音聿惠此中國箋曰惠愛也傳曰中國京師也以綏四方箋曰綏安也傳曰四方諸夏也無縱詭隨詭音宄今曰詭詐也懷詐靣從也以謹無良今曰無良不善也式遏冦虐詩記曰一言而喪邦曰惟豫言而莫豫違則詭隨之人誠覆邦家之人也無縱詭隨乃所以謹無良而遏冦虐也憯不畏明憯音慘錢氏曰憯痛也明人所共見也柔逺能邇能毛如字鄭音耐傳曰柔安也今曰以柔撫之中庸所謂柔逺人也能為能其事猶言克家也以定我王穆公戒同列之用事者言國以民為本民勞則國危今周民亦疲勞矣庶幾可以小安之乎京師諸夏之根本愛此京師則可以安天下也對夷狄言之則總諸夏為中國對四方言之則指京師為中國也詭隨者心知其非而詐順從之此姦人也書所謂面從孟子所謂面諛也人見詭隨者無所傷拂則目為善良不知其容悅取寵皆為自利之計而非忠於所事實非善良之士也苟喜其甘言而信用之足以召禍亂致冦虐但權位尊重者往往樂軟熟而憚正直故詭隨之人得肆其志是居上位者縱之為患也今戒用事者無縱此詭隨則可以謹防無良之人用遏止其寇虐此理明甚可痛其不畏明也逺謂夷狄邇謂中國治道略外而詳內夷狄則撫柔之而已中國則禮樂之治甚詳故必能其事也惟柔逺能邇者可以安吾君而何取於詭隨乎民亦勞止汔可小休箋曰休止息也惠此中國以為民逑音求箋曰逑聚也李氏曰言使民無離散也無縱詭隨以謹惛怓惛怓音昏譊箋曰惛怓猶歡譁也補傳曰惑亂人主也式遏寇虐無俾民憂無棄爾勞箋曰勞猶功也以為王休箋曰休美也無縱詭隨之人以防其惛怓惑亂主聽也爾前有功於國今勿棄其前功則為吾君之美謂使其君安富尊榮也不然敗君之事矣民亦勞止汔可小息傳曰息止也惠此京師以綏四國無縱詭隨以謹罔極今曰無有窮極謂無所不至也罔極解見衛氓式遏寇虐無俾作慝傳曰慝惡也敬慎威儀以近有德詭隨之人無所不至所謂罔極也無縱詭隨而必近有德謂逺佞而親賢然非修身則賢不可得而親故必敬謹威儀而後可以近有德民亦勞止汔可小愒音器字亦作憩傳曰愒息也惠此中國俾民憂泄音曵又音薛傳曰泄去也無縱詭隨以謹醜厲傳曰厲惡也補傳曰醜厲猶言醜惡也式遏冦虐無俾正敗箋曰敗壞也無使先王之正道壞戎雖小子箋曰戎猶女也今曰小子指用事之人也而式𢎞大箋曰式用也𢎞猶廣也詭隨之人終必召亂是為醜厲也又戒其同列之用事者云汝雖小子而所用事甚大關於邦之興喪不可不謹也豈可樂佞諛而縱詭隨乎舊說以此詩戎雖小子及板詩小子蹻蹻皆指王小子非君臣之辭今不從二詩皆戒責同寮故稱小子耳民亦勞止汔可小安惠此中國國無有殘李氏曰無殘敗之禍也無縱詭隨以謹繾綣音遣犬蘇氏曰繾綣小人之固結其君者也式遏冦虐無俾正反王氏曰正敗者敗而已未盡反而為不正也正反則無正矣曹氏曰以是為非以惡為善一切相反則亡無日矣王欲玉女是用大諫此詩五章言無良惛怓罔極醜厲繾綣皆極小人之情狀而總之以詭隨蓋小人之媚君子其始皆以詭隨入之其終無所不至孔子所謂佞人殆也召公稱厲王而告之言我欲使爾如玉無瑕可指故用此大諌於王也謂其戒同列者即所以諌王上行而下效故也民勞五章章十句板音版凡伯刺厲王也箋曰凡伯周同姓周公之𦙍也入為王卿士疏曰僖二十四年左傳云凡蔣邢茅胙祭周公之𦙍也瞻卬凡伯刺幽王春秋隱七年天王使凡伯來聘世在王朝蓋畿內之國祭側界反朱氏以此詩為切責其寮友用事之人而義歸於刺王與上篇同味詩意信然上帝板板釋訓曰板板僻也傳曰反也疏曰邪僻即反戾之義下民卒疸丹之上箋曰卒盡也傳曰疸病也出話不然話淮之去朱氏曰不然不合理也為猶不逺靡聖管管李氏曰人苟知有聖人之法度則必戰戰兢兢不敢苟作其心既無聖人則矯誣詐僞何所不至哉箋曰管管以心自恣曹氏曰管小物也蔑棄聖人而管管然自用其私智其所見亦小不實於亶傳曰亶誠也猶之未逺是用大諌一章至五章皆切責寮友之辭厲王邪僻凡伯不欲斥王而歸之於天曰上帝板板然反其常道使下民盡病矣今爾羣臣當有嘉謀嘉猷以扶持之今乃出言不合於理為君謀事又不能逺其心以為無聖人管管然以淺見自用故矯誣詐僞不實於為誠信而僞為誠信惟汝之謀猶不逺我是用作此詩以大陳正於汝也天之方難無然憲憲傳曰憲憲猶欣欣也天之方蹶音貴傳曰蹶動也無然泄泄音曵今曰左傳其樂也泄泄注云舒散也韻泄亦作泄朱氏孟子解云怠緩之貌曹氏以為盤樂怠傲之意其說一也辭之輯矣輯音集傳曰輯和也民之洽矣傳曰洽合也辭之懌矣懌音亦傳曰懌悅也民之莫矣傳曰莫定也今曰求民之莫天方艱難禍亂將作汝衆人無為是憲憲然欣喜而不知憂懼也天方震動民將不安汝衆人無為是泄泄然怠緩而不思勉勵也汝惟不知憂患故各逞私意議論矛盾耳於是又戒之言爾寮友之相與若言辭輯睦而相孚則下民洽比矣若言辭悅懌而相得則下民安定矣謂方時多艱惟同心謀國議論和協則庶幾民可安耳舊說辭為王者出令然尋繹經意上承憲憲泄泄之文下接我雖異事之章皆切責寮友之言中間攙入王者出令之事則上下辭意皆無倫序矣此詩首章責同寮出話不然為猶不逺故二章因戒之以言論之間宜相和協謂爾之出話為猶徒執一己之見者未必有深長之慮而惟寮友之間和同商議庶幾合謀并智可以措民於安耳然愚而自用者終不能舍己而從人故三章言我即爾謀聽我囂囂四章言匪我言耄爾用憂謔謂己以善言告之而不見聽也善言既不見聽乃大言虛誕諛言阿附善人見其如此不肯復言矣故五章言無為夸毗善人載尸也前五章皆說寮友議論不相協猶小旻詩六章其前五章皆說謀猶之不臧也逹觀上下章㫖知辭之輯懌非謂王者出令矣我雖異事及爾同寮傳曰寮官也我即爾謀聽我囂囂音遨傳曰囂囂猶謷謷也謷音敖疏曰謂傲慢其言而不聽之我言維服今曰服行也說命說乃言惟服注云其言皆可服行勿以為笑先民有言詢于芻蕘音饒傳曰芻蕘采薪者疏曰芻者飼馬牛之草蕘者供燃火之草我雖與汝所職之事各異乃與汝同官俱為卿士我就汝謀忠告而善道之汝聽我言乃囂囂然傲慢而不受我所言乃可服行汝無笑之古之賢者有言云有事當謀之芻蕘之人芻蕘之賤尚當謀之況我與汝同寮乎此章言寮友之間議論不合其辭之不輯懌可想見矣天之方虐無然謔謔虛虐反蘇氏曰戲侮也老夫灌灌音貫傳曰灌灌猶款款也疏曰至誠款實小子蹻蹻音臄今曰小子承上章同寮之人指用事之人也傳曰蹻蹻驕貌李氏曰說文舉足高是驕之意匪我言耄音帽爾用憂謔多將熇熇許酷反傳曰熇熇熾盛也李氏曰說文火熱貌不可救藥疏曰如人病甚不可救以藥王氏曰列子云曽不發藥乎左氏云不如吾聞而藥之也天今方將為虐有喪亡之禍汝無如是謔謔然戲侮而不知憂懼也我老夫涉歷已多知亂亡之將至則灌灌然款誠以告汝汝後生小子乃蹻蹻然驕慢安其危而利其菑以我之言為老耄而昏繆也然我所言實非老繆乃女以可憂之事為戲謔耳積惡愈多將熇熇然如火之熾盛不可救止而藥治之也此章又見其議論之不相合矣舊說以小子指王今不從天之方懠音劑傳曰懠怒也無為夸毗夸音誇朱氏曰夸大也毗附也小人之於人不以大言夸之則以諛言毗之威儀卒迷善人載尸王氏曰善人載尸則不言不為飲食而已民之方殿屎殿顛之去郭音玷屎音熙傳曰殿屎呻吟也則莫我敢葵傳曰葵揆也今曰采菽天子葵之喪亂蔑資傳曰蔑無也今曰無以為資言無生生之計也曽莫惠我師夸謂大言虛誕毗謂諛言阿附天今方降威怒汝衆人無為夸大毗附也今衆人之威儀盡迷亂其有號為善人者亦如祭祀之尸不言不為矣天下之民方殿屎呻吟莫有敢揆度其事者民遭喪亂無以為資曽莫有施惠我衆民者皆責之辭也天之牖民曹氏曰說文云在屋曰在牆曰牖音窗錢氏曰開明也如塤如箎塤音喧箎音池塤箎解見何人斯傳曰塤箎言相和也如璋如圭傳曰璋圭言相合也疏曰半圭為璋合二璋則成圭如取如攜傳曰取攜言必從也疏曰物在地上丰舉攜之攜無曰益牖民孔易音異鄭音亦民之多辟音辟無自立辟音闢傳曰辟法也六章泛言治民之道也言人心本虛明以物欲窒之則如牆然冥昧罔覺苟能順天之理以開明人心如開牖於牆復其本然之明也如塤箎之相和塤唱而箎和言必應也如璋圭之相合合二璋而成圭言必同也如往取物之必得如手攜物之必從也攜而必從非别立一道以增益之也因其所固有耳牖民之道甚易也今民雖多邪辟而本然之天自若亦唯因其固有而開明之耳勿自立法以彊之自立法則是益也非天也六章至八章皆責寮友而因以誨王也價人維藩價音界藩音蕃傳曰價善也疏曰藩者園圃之籬大師維垣大今如字舊音泰王氏曰大師大衆也傳曰垣牆也大邦維屏音丙箋曰大邦成國諸侯也大宗維翰王氏曰大宗巨室也傳曰翰幹也幹解見文王維周之楨懷德維寧宗子維城無俾城壞無獨斯畏七章泛言用人之效也言善人所以為藩籬大衆所以為垣牆大邦所以為屏蔽巨室所以為翰幹國家所恃在此數者苟能使懷我之德則無有不寧矣又同姓之宗子所以為城之固亦當保安之勿使此城有壞無至於獨居而可畏懼也敬天之怒無敢戲豫傳曰戲豫逸豫也敬天之渝箋曰渝變也無敢馳驅傳曰馳驅自恣也昊天曰明及爾出王傳曰王往也昊天曰旦傳曰旦明也今曰天曉曰旦故為明信誓旦旦是也及爾游衍延之去又音演傳曰游行也衍溢也八章泛言敬天之誠也言當敬天之威怒無敢戲謔逸豫又當敬天之災變無敢馳驅自恣戲豫即無逸所謂耽樂馳驅即無逸所謂游田也昊天在上人仰之皆謂之明皆謂之旦常與汝出入往來游溢相從視人善惡可不謹乎張子曰此言天心虛靈之氣遍體萬物之中其鑒察如在左右而不遺也詩人之言鬼神也如此又曰天體物而不遺猶仁體事而無不在也板八章章八句詩緝卷二十八
