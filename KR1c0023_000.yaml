body:
  text: 詩緝目録詩類卷一周南關雎后妃之德葛覃后妃之本卷耳后妃之志樛木后妃逮下螽斯后妃子孫衆多桃夭后妃之所致兔罝后妃之化芣苡后妃之美漢廣德廣所及汝墳道化行麟之趾關雎之應卷二召南鵲巢夫人之德采蘩夫人不失職草蟲大夫妻能以禮自防采蘋大大妻能循法度甘棠美召伯行露召伯聽訟羔羊鵲巢之功致殷其靁勸以義摽有梅男女及時小星惠及下江有泛美媵野有死麕惡無禮何彼禯矣美王姬騶虞鵲巢之應自關雎至騶虞二十五篇謂之正風卷三邶風柏舟言仁而不遇緑衣衛莊姜傷巳燕燕衛莊姜送歸妾日月衛莊姜傷巳終風衛莊姜傷已擊鼓怨州吁凱風美孝子雄雉刺衛宣公匏有苦葉刺衛宣公卷四谷風刺夫婦失道式微黎侯寓于衛其臣勸以歸旄丘責衛伯簡兮刺不用賢泉水衛女思歸北門刺仕不得志北風刺虐靜女刺時新臺刺衛宣公二子乘舟思伋壽卷五鄘風柏舟共姜自誓牆有茨衛人刺其上君子偕老刺衛夫人桑中刺奔鶉之奔奔刺衛宣姜定之方中美衛文公蝃蝀止奔相鼠刺無禮干旄美好善載馳許穆夫人閔衛之亡卷六衛風淇澳美武公之德考槃刺莊公碩人閔莊美氓刺宣公之時竹竿衛女思歸芄蘭刺惠公河廣宋襄公母歸於衛思宋伯兮刺時言君子行役有狐刺男女失時木瓜美齊桓公卷七王風黍離閔宗周君子于役刺平王君子陽陽閔周揚之水刺平王中谷有蓷閔周兔爰閔周葛藟王族刺平王采葛懼讒大車刺周大夫丘中有麻思賢人卷八鄭風緇衣美武公將仲子刺莊公叔于田刺莊公大叔于田刺莊公清人刺文公羔裘刺朝遵大路思君子女曰雞鳴刺不說德有女同車刺忽山有扶蘇刺忽蘀兮刺忽狡童刺忽褰裳思見正丰刺亂東門之墠刺亂風雨思君子子襟刺學校廢揚之水閔無臣出其東門閔亂野有蔓草思遇時溱洧刺荒卷九齊風雞鳴思賢妃還刺荒著刺時東方之日刺衰東方未明刺無節南山刺襄公甫田大夫刺襄公盧令刺荒敝笱刺文姜載驅齊人刺襄公猗嗟刺魯莊公卷十魏風葛屨刺褊汾沮洳刺儉園有桃刺時陟岵孝子行役思念父母十畝之間刺時伐檀刺貪碩鼠刺重斂卷十一唐風蟋蟀刺晉僖公山有樞刺晉昭公揚之水刺晉昭公椒聊刺晉昭公綢繆刺晉亂杕杜刺時羔裘刺時鴇羽刺時無衣美晉武公有杕之杜刺晉武公葛生刺晉獻公采苓刺晉獻公卷十二秦風車鄰美秦仲駟驖美襄公小戎美襄公蒹葭刺襄公終南戒襄公黃鳥哀三良晨風刺康公無衣刺用兵渭陽康公念母權輿刺康公卷十三陳風宛丘刺幽公東門之枌疾亂衡門誘僖公東門之池刺時東門之楊刺時墓門刺陳陀防有鵲巢憂讒賊月出刺好色株林刺靈公澤陂刺時卷十四檜風羔裘大夫以道去其君素冠刺不能三年隰有萇楚疾恣匪風思周道卷十五曹風蜉蝣刺奢候人刺近小人鳲鳩刺不一下泉思治卷十六豳風七月周公陳王業鴟梟周公救亂東山周公東征破斧美周公伐柯美周公九罭美周公狼跋美周公卷十七小雅鹿鳴燕羣臣嘉客四牡勞使臣之來皇皇者華君遣使臣常棣燕兄弟伐木燕朋友故舊天保下報上采薇遣戍役出車勞還率杕杜勞還役魚麗美萬物盛多能備禮南陔孝子相戒以養白華孝子潔白華黍時和年豐宜黍稷卷十八南有嘉魚樂與賢南山有臺樂得賢由庚萬物得由其道崇丘萬物得極其髙大由儀萬物之由各得其宜蓼蕭澤及四海湛露天子燕諸侯彤弓天子錫有功諸侯菁菁者莪樂育材六月宣王北伐采芭宣王南征車攻宣王復古吉日美宣王田卷十九鴻鴈美宣王庭燎美宣王沔水規宣王鶴鳴誨宣王祈父刺宣王白駒大夫刺宣王黃鳥刺宣王我行其野刺宣王斯干宣王考室無羊宣王考牧卷二十節南山家父刺幽王正月大夫刺幽王十月之交大夫刺幽王雨無正大夫刺幽王卷二十一小旻大夫刺幽王小宛大夫刺幽王小辨太子之傅刺幽王巧言刺幽王何人斯蘇公刺暴公巷伯寺人刺幽王卷二十二谷風刺幽王蓼莪刺幽王大東刺亂四月太夫刺幽王北山大夫刺幽王無將大車大夫悔將小人小明大夫悔仕於亂世鼓鐘刺幽王楚茨刺幽王信南山刺幽王卷二十三甫田刺幽王大田刺幽王瞻彼洛矣刺幽王裳裳者華刺幽王桑扈刺幽王鴛鴦刺幽王頍辨諸公刺幽王車舝大夫刺幽王青蠅大夫刺幽王賓之初筵衛武公刺時卷二十四魚藻刺幽王采菽刺幽王角弓父兄刺幽王菀栁刺幽王都人士刺衣服無常采緑刺怨曠黍苗刺幽王隰桑刺幽王白華周人刺幽王綿蠻微臣刺亂瓠葉大夫刺幽王漸漸之石下國刺幽王苕之華大夫閔時何草不黃下國刺幽王卷二十五大雅文王文王受命作周大明文王有明德綿文王之興本由太王棫朴文王能官人旱麓受祖卷二十六思齊文王所以聖皇矣美周靈臺民始附下武繼文文王有聲繼伐卷二十七生民尊祖行葦忠厚既醉太平鳧鷖守成假樂嘉成王卷二十八公劉召康公戒成王泂酌召康公戒成王卷阿召康公戒成王民勞召穆公成厲王板凡伯刺厲王卷二十九蕩召穆公傷周室大壞抑衛武公刺厲王亦以自警桑柔芮伯刺幽王雲漢仍叔美宣王卷三十嵩髙尹吉甫美宣王蒸民尹吉甫美宣王韓奕尹吉甫美宣王江漢尹吉甫美宣王卷三十一常武召穆公美宣王瞻卬凡伯刺幽王大壞召旻凡伯刺幽王大壞卷三十二周頌清廟祀文王維天之命太平告文王維清奏象舞烈文成王即政諸侯助祭天作祀先王先公昊天有成命郊祀天地我將祀文王於明堂時邁巡狩告祭柴望執競祀武王思文后稷配天卷三十三臣工諸侯助祭遣於廟噫嘻春夏祈榖於上帝振鷺二王之后來助祭豐年秋冬報有瞽始作樂而合乎祖潛季冬獻魚春薦鮪雍禘太祖載見諸侯始見於武王廟有客微子來見祖廟武奏大武卷三十四閔豫小子嗣王朝於廟訪落嗣王謀於廟敬之羣臣進戒嗣王小毖嗣王求助載芟春籍田祈社稷良耜秋報社稷絲衣繹尸賔酌告成大武桓講武類禡賚大封於朝般巡狩祀四嶽河海卷三十五魯頌駉頌僖公有駜頌僖公君臣有道泮水頌僖公修泮宫閟宫頌僖公能復周公之宇卷三十六啇頌那祀成湯烈祖祀中宗𤣥鳥祀髙宗長發大禘殷武祀髙宗右三百五篇逸詩六篇臣等謹案詩緝三十六卷宋嚴粲撰粲字坦叔邵武人嘗官清湘令是書以吕祖謙讀詩記為主而雜采諸說以明之舊說有未安者則别以已意闡發如論大小雅之别特以其體不同較詩序政有大小之說於理為近又如弼之柏舟舊以為賢人自比粲則以柏舟為喻國以泛為喻無維持之人干旌之良馬四之五之舊以為良馬之數粲則以為乘良馬者四五輩見好善者之多中谷有蓷舊以蓷之暵乾喻夫婦相棄粲則謂嵗旱草枯由此而致離散凡若此類皆深得詩人本意至于音訓疑似名物異同考證尤為精核非空談解經者可比也乾隆四十三年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀詩緝原序敘曰六經皆厄於傳疏詩為甚我朝歐蘇王劉諸巨儒雖擺落毛鄭舊說爭出新意而得失互有之東萊吕氏始集百家所長極意條理頗見詩人趣味然踈缺渙散要未為全書蓋詩於人學自為一宗筆墨蹊徑或不可尋逐非若他經然其流既為騷為選為唐古律而吾聖人所謂可以興觀羣怨孟子所謂以意逆志者悉付之明經家艾軒林先生嘗曰鄭康成以三禮之學箋傳古詩難與論言外之㫖矣艾軒終身不著書遺言閒得於前一輩鄉長老客遊二十年未有印此語者華谷嚴君坦叔早有詩名江湖間甲辰余抵京以同舍生見時出詩緝語我其說大抵與老艾合且曰吾用於此有年非敢有以臆決托諸家而求其是要以發昔人優柔溫厚之意而已余既竦然起敬遂就求全書而讀之乃知其鈎貫根葉疏析條緒或㑹其㫖於數章或發其微於一字出入窮其機綜排布截其幅尺辭錯而理意曲而通逆求情性於數千載之上而興寄所在若見其人而得之至於音訓疑似名物異同時代之後前制度之纎悉訂證精密開卷瞭然嗚呼詩於是乎盡之矣易盡於伊川春秋盡於文定中庸大學語孟盡於考亭繼自今吾知此書與並行也然則華谷何以度越諸子若是哉余嘗得其舊藳五七言幽深夭矯意具言外蓋嘗窮諸家閫奧而獨得風雅餘味故能以詩言詩此箋傳所以瞪若乎其後也余曰艾軒惜不見子君曰子又豈容遺艾軒之言故不自揆而為之敘云爾是年十有二月竹溪鬳齊林希逸書二兒初為周南召南受東萊義誦之不能習余為緝諸家說句析其訓章括其㫖使之瞭然易見既而友朋訓其子若弟者競傳寫之困於筆劄胥命鋟之木此書便童習耳詩之興幾千年於此矣古今性情一也人能㑹孟氏說詩之法涵泳三百篇之性情則悠然見詩人言外之趣毛鄭以下且束之高閣此書覆瓿可也淳祐戊申夏五月華谷嚴粲序黍離中谷有蓷葛藟不用舊說獨能深得詩人優柔之意其他一章一句時出新意大抵宛轉有㫖趣再三玩味實獲我心坦叔可與言詩也已矣初還别換一册幸無我靳甫再拜上啓詩緝條例集諸家之說為詩緝舊說已善者不必求異有所未安乃參以已說要在以意逆志優而柔之以求吟詠之情性而已字訓句義插注經文之下以著所從乃錯綜新舊說以為章指順經文而㸃掇之㸃平聲使詩人紆餘涵泳之趣一見可了以便家之童習耳經文及章指並作大字字訓句義及有所發明並作小注以經文為先後說雖異而可取者附注焉小注毛氏稱傳鄭氏稱箋序注元不著姓氏者皆鄭氏說今並稱箋鄭氏詩譜稱譜孔氏稱疏爾雅稱其篇第如釋鳥釋草之類爾雅疏稱釋諸家稱氏凡草木蟲魚之類舊一說分明者先著之其辭繁及說不一者稱曰以斷之所引諸家諸書皆稱曰其諸家諸書所引則稱云經文音釋注本句之下諸說音釋附本說之下直音多假借以便初學不拘本韻其切字以溫公切韻指掌圖正之凡上聲濁音讀如去聲俗讀作上聲清音非四聲皆有清濁唯上聲濁音與去聲相近如兕字乃上聲與去聲寺字音相近雖係上聲只讀如寺不必讀作死蓋兕乃徐履反徐字屬斜字母用餳涎切係半濁半清按溫公圗其四聲平為詞上為兕去為寺此是重道如讀作死乃屬心字母用新先切係全清誤矣凡上聲濁音及半清半濁音皆與去聲相近讀者多作上聲則以濁為清矣釋文有音切不和者今以韻書為定凡音不言下同省文也一詩內皆同下文音不同者别出古注音義不同者先著所從其不從者附見之題下一句國史所題為首序其下說詩者之辭為後序别詩及他書字訓與本詩字訓同者直引以相證不復著語如蓼蓼者莪直引蓼彼蕭斯詩緝清濁音圖辨音上濁者讀如去聲全清次清全濁不清不濁為清濁四音全清東弓包居逋鳩金顚邊賓知次清通穹胞胠鋪丘欽天篇繽癡全濁同窮庖渠酺求琴田駢頻持不清不濁農顒茅魚模牛吟年眠珉尼平上去入四聲其平聲為全清者其上去入皆為全清其次清全濁不清不濁者亦然全清次清全濁不清不濁平東通同農上董桶動讀如去聲去凍痛洞齈入督秃獨有聲無字四聲唯上聲全濁者讀如去聲謂之重道如同動洞獨動洞是重道蓋四聲皆全濁也動字雖是上聲以其為上聲濁音只讀如洞字今人調四聲者誤云同桶痛秃不知同為全濁其桶痛秃皆為次清清濁不倫矣動奉棒是兕婢被否市恃士仕􅱧俟涘似已祀耜汜姒巨秬虡距炬敘緒嶼鱮芧藇佇䇡杼紵羜輔父腐柱簿部杜戶怙祜岵扈陛蟹亥待逮殆怠倍在牝混但緩踐俴善趙肇兆旐紹皓昊皓鎬浩皥抱道稻皂造坐象丈蕩杏荇靜靖迥泂舅婦阜厚後甚儉芡簟檻范範犯􅓶以上之類竝是上聲全濁讀如去聲溫公指掌圖又有蹤摐從嵩松五音內嵩為全清松為半清半濁今圖止為辨上聲全濁故但取四音言之
