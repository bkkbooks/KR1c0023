body:
  text: 詩緝卷十三宋嚴粲撰陳國風譜曰陳者太皥虙犧氏之墟帝舜之胄有虞閼父者爲周武王陶正武王賴其利器用與其神明之後封其子嬀滿於陳都於宛丘之側是曰陳胡公以備三恪妻以元女大姬其封域在禹貢豫州之東其地廣平無名山大澤西外望方東不及明猪大姬無子好巫覡禱祈鬼神歌舞之樂民俗化而爲之五世至幽公當厲王時政衰大夫滛荒所爲無度國人傷而刺之陳之變風作矣閼音遏嬀音規明音孟明猪即爾雅孟諸覡音檄疏曰左傳史趙云胡公不滛故周賜之姓使禩虞帝則胡公姓嬀武王所賜鄭駮異義云三恪尊於諸侯卑於二王之後樂記云武王未及下車封黄帝之後於薊封帝堯之後於祝封帝舜之後於陳下車乃封夏后氏之後於杞封殷之後於宋則陳與薊祝共爲三恪薊音計朱氏曰今陳州是也陳詩十而七爲滛靈公之事世變已極詩訖於此詩訖於陳靈公下於秦夷之也宛丘刺幽公也疏曰幽公寜愼公圉戒子滛荒昏亂游蕩無度焉曰陳幽公詩厲王時幽公之遊蕩爲人所厭此詩殆蹙額而相告者歟子之湯兮湯如字又去聲李氏曰子稱幽公也傳曰湯蕩也宛丘之上兮傳曰四方髙中央下曰宛丘釋丘曰宛中宛丘疏曰言其中央宛宛然是爲四方髙中央下也郭謂中央隆峻與此傅正反補傳曰宛丘自爲地名洵有情兮洵音荀傳曰洵信也而無望兮今曰望謂威儀也如近之則有望好樂者人之情也欲不可縱樂不可極必以禮節之今子幽公之流蕩在宛丘之上信有好樂之情矣然無威儀可瞻望也滛荒昏亂不復敬謹其威儀民因其出遊見其容貌顔色而生慢昜之心所謂望之不似人君也坎其擊鼓傳曰坎坎擊鼔聲宛丘之下無冬無夏值其鷺羽值持之去朱氏曰值遇傳曰鷺羽可以爲翳翳音意箋曰翳舞者所持言雖祁寒大暑亦遇其遊蕩厭之之辭也坎其擊缶音否方有反傳曰盎謂乏缶盎於良反疏曰郭璞云盎盆也此云擊缶則缶是樂器昜離卦九三不鼔缶而歌則大耋之嗟按坎卦六四樽酒簋二用缶又是酒器也襄九年宋災具綆缶又是汲器然缶是瓦器可以節樂若今擊甌又可以盛水盛酒即今之瓦盆也曹氏曰李斯云夫擊甕叩缻彈筝拊髀而歌烏烏快耳目者眞秦聲也秦王嘗爲藺相如擊缶矣楊惲言家本秦也能爲秦聲酒後耳熱仰天拊缶而歌烏烏缻缶音同髀俾陛二音惲音允宛丘之道無冬無夏值其鷺翿音導傳曰翿翳也宛丘三章四句東門之枌音焚疾亂也幽公滛荒風化之所行男女棄其舊業亟㑹於道路亟音棄歌舞於市井爾曰陳幽公詩厲王時疏曰古者井田之制當井之中以二十𤱔爲廬舍因爲市交易故稱市井曹氏曰幽公滛荒遊蕩嘗爲國人之所患苦及其乆也民更化之痛哉風俗之移人也後序附益講師之説時有失詩之意者一斷之以經可也首序之傳源流甚逺方作詩之時非國史題其事於篇端雖孔子無由知之或欲併首序盡去之不可也古説相傳猶不之信千載之下二以胷臆決之難矣桑中溱洧之詩或謂滛者自言其如此此詩亦爲男女聚㑹而賦其事以相樂蓋不用首序刺奔刺亂疾亂之説耳如此則凡刺詩之作皆滛人動於滛思發爲滛辭非止乎禮義者矣聖人何取滛人之言著之爲經而使天下後世諷誦之邪故凡刺詩皆作者刺滛者非滛者自作也味此詩不績其麻正是誚責之辭非相樂之辭首序未昜盡去也東門之枌傳曰枌白榆也解見唐山有樞宛丘之栩音許曰栩柞也也杼也解見唐鴇羽子仲之子傳曰子仲陳大夫氏今曰子女子也婆娑其下娑音梭張子曰婆娑不必是舞但裴徊翺翔之義士大夫之子不得過市今也遨遊於市井中爾陳都宛丘之側其東門與丘之間乃國之交㑹其處又有枌栩二種之木可以休息故陳大夫子仲氏之女乃婆娑遨遊於其下蓋以相誘説也遊蕩之俗以貴族猶爲之何責於小民乎次章言不績其麻知子仲之子爲指女子也榖旦子差音釵傳曰榖善也䟽曰旦早朝也善曰謂無隂雲風雨箋曰差擇也南方之原李氏曰毛鄭以原爲陳大夫氏不若歐陽氏以爲南方原野其説簡徑不績其麻七月疏曰績緝麻之名市也婆娑既已相誘於是差擇榖善之朝晴明無風雨相㑹于國南之原野其婦人不緝績其麻復由市中遨遊而往所㑹之地何爲也哉榖旦于逝傳曰逝往也越以鬷邁鬷音梭箋曰越於也鬷總也傳曰邁行也視爾如荍音翹郭璞曰荍荆葵也似葵紫色釋草曰荍芘芣二字音毗浮陸璣曰似蕪菁花紫緑色可食微苦澀謝氏曰小草多花少葉葉又翹起貽我握椒於榖善之日往所㑹原野之地男女於是皆往也男女交㑹而相説曰我視女之顔色美如荆葵女乃遺我一握之椒交情好也椒實芬香故以相遺東門之枌三章章四句衡門衡如字誘僖公也朱氏曰誘進也疏曰僖公孝幽公寜子愿而無立志愿音願故作是詩以誘掖其君也箋曰掖扶持也曰陳僖公詩宣王時衡門與魏園桃檜羔裘意同衡門之下疏曰衡古文横字也曹氏曰衡門横一木爲門貧者居之也可以棲遲棲音西傳曰棲遲游息也泌之洋洋泌音秘傳曰泌泉水也疏曰邶風有毖彼泉水知泌爲泉今曰毖彼泉水乃毖然流貌毛以此泌與彼毖字異義同亦當爲泉水之流貌非謂泌爲泉水也朱氏曰洋洋安流廣長貌可以樂饑樂毛音洛鄭音療僖公自謂國小不足以有爲意氣消縮無奮然自立之志故詩人欲誘掖之謂横木爲門雖至淺陋亦可以棲遲游息於其下泌然而流之泉水洋洋然廣長玩之亦可以樂而忘饑喻陳國雖小亦足以有爲孟子曰今滕絶長補短將五十里也猶可以爲善國豈其食魚必河之魴音房曰魴鯿也鯿音邊釋魚曰魴魾魾音丕釋曰魴一名魾江東呼爲鰏陸璣曰今伊洛濟潁魴魚也廣而薄肥甜而少肉細鱗魚之美者也漁陽泉州及遼東梁水魴特肥而厚尤美於中州魴故其鄉語曰居就糧梁水魴魴是也山隂陸氏曰魴今之青鯿也郊居賦云赤鯉青細鱗縮項闊腹蓋弱魚也其廣方其厚褊故一曰魴魚一曰鯿魚魴方也鯿褊也里語曰洛鯉伊魴貴於牛羊言洛以深宜鯉伊以清淺宜魴也河性宜魚故曰河之魴河之鯉豈其取妻取音娶必齊之姜箋曰齊姜姓解頥新語曰姜女子之貴者豈其食魚必河之鯉解見魚麗豈其取妻必宋之子箋曰宋子姓喻不必大國而後可爲政也衡門三章章四句東門之池刺時也疾其君之滛昏而思賢女以配君子也曰陳僖公詩宣王時滛昏不可告語而惟思賢女以配之蓋外此無策矣東門之池傳曰池城池也補傳曰陳風三詩言東門蓋指所見以起興也可以漚麻漚謳之去錢氏曰漚之浸也彼美淑姬疏曰黄帝姓姬炎帝姓姜二姓之後子孫昌盛其家之女美者尤多遂以姬姜爲婦人之美稱董氏曰周姬姓陳因元女以封故詩人猶言淑姫可與晤歌晤音悟箋曰晤猶對也興也東門城池之中可以漚漬其麻麻漚水中朝夕浸漬然後柔韌也韌音刃彼美好之善可與僖公晤對而歌僖公與賢妃相處夙夜警戒庶幾改化也僖公荒滛忠臣良士之言無由可入矣其君子無可奈何但因其好色思得淑女爲其配耦庶幾優柔而漸入之如池之漚麻漸漬而化之也東門之池可以漚紵除之上濁朱氏曰紵麻屬也陸璣曰宿报在地中至春自生不歲種也荆揚之間一歲三収彼美淑姬可與晤語東門之池可以漚菅音姦郭璞曰菅茅屬也陸璣曰柔韌宜爲索解見白華彼美淑姬可與晤言東門之池三章章四句東門之楊刺時也昏姻失時男女多違親迎去聲女猶有不至者也曰陳僖公時宣王時陳東門之楊與鄭丰皆親迎而女不至言刺時猶言刺亂以時使然也東門之楊曰楊蒲栁也解見車鄰其葉牂牂音臧傳曰牂牂然盛貌曹氏曰自九月以後正月以前昏姻正時也楊葉茂盛則春既莫昏以爲期明星煌煌朱氏曰煌煌明貌興之不兼比者也秋冬爲昏姻之時今東門之楊木其葉牂牂然盛則春莫而昏姻失時矣親迎以昏爲期而至明星煌煌然大明夜已深而竟不至滛風行而女有他志也李氏曰毛氏以秋冬爲昏姻之時則以荀子云霜降逆女水冸殺止家語云羣生閉藏乎隂而爲化育之始故聖人以合男女窮天數也霜降而婦功成嫁娶者行焉氷泮而農桑起昏禮殺於此鄭氏以仲春爲昏姻之時則以周官云仲春之月㑹男女之無夫家者觀此兩說毛氏爲勝按匏有苦葉之詩云士如歸妻迨氷未泮是秋冬之間可以嫁娶之時也鄭氏於士如歸妻迨氷未泮以爲請期二月可以昏矣據詩言歸妻則實已逆矣安得以歸妻爲請期乎然據周禮言仲春之月㑹男女之無夫家蓋於下文又言是時也奔者不禁則是於霜降之後氷泮之前使民皆得以行嫁聚之禮及至仲春之月猶有男女之無夫家者則以媒氏㑹之是以有奔者不禁之事先王立决不應專用仲春之月殺色戒反東門之楊其葉肺肺音沛傳曰猶牂牂也昏以爲期明星晢晢音制傳曰晢晢猶煌煌也東門之楊二章章四句墓門刺陳佗也佗音駝疏曰佗文公圉子桓公鮑之弟世家以佗爲厲公躍爲利公按經傳五父與佗一人厲公即是無復利公矣馬遷誤也陳佗無良師傅以至於不義惡加於萬民焉曰陳厲公詩桓王時疏曰春秋桓五年正月甲戌己丑陳侯鮑卒左傳云再赴也於是陳亂文公子佗殺太子免而代之公疾病而亂作國人分散故再赴免音問陳氏曰此詩雖以刺佗乃是書舊之賢者備見始末追咎先君不能爲佗置良師傅致有弑逆之事也觀陳佗親仁善鄰之言見其性質本非不美未幾往鄭涖盟而㰱如忘蓋已有蠱惑之者故詩人歸咎於無良師傅也左傳隠六年鄭伯請成于陳陳侯不許五父諌曰親仁善鄰國之寳也七年陳及鄭平五父及鄭伯盟㰱如忘洩伯曰五父必不免不賴盟矣鄭良佐如陳涖盟亦知陳之將亂也㰱色洽反忘去聲洩息列反墓門有棘曰棘荊棘也解見楚茨斧以斯之傳曰斯析也釋言曰斯離也夫也不良傳曰夫傅相也相去聲夫也猶言此人檀弓曾子曰夫夫也注上音扶下如字猶言此丈夫也國人知之知而不巳程子曰巳去聲今曰論語三已之孟子士師不能治事則巳之謂廢退之也與節南山式夷式已同誰昔然矣興也言他性本非不善以失教導而流於不善如墓道之門人所稀行失於修治而荆棘生之猶孟子言爲間不用則茅塞之矣此墓門既有棘必用斧以斯析之佗有不善必用良師傅以教誨之今傅相之人不良國人皆知之則當去之也知其不良而不去之誰從來如是乎蓋歸咎於前人也夫也謂傅相之人當時必有所指也墓門有梅有鴞萃止鴞戸嬌反泮水音遙鴞怪鴟也鵩也鵂鶹也即瞻仰之爲鴟也鵩音服鵂鶹音休留傳曰惡聲之鳥也陸璣曰鴞大如斑鳩緑色入人家凶賈誼所賦鵩鳥是也今人謂之鵂鶹亦名恮鴟内則云鵠鴞眫古人尚之眫音判注云彈謂脅側薄肉也山隂陸氏曰俗云禍鳥也莊子云見而求鴞炙一曰鵩似鴞則鴞又非鵩矣其肉甚美可為羹􅌜又可爲炙炙音柘􅌜音壑羹􅌜也傳曰萃集也夫也不良歌以訊之傳曰訊告也訊予不顧顚倒思予棘以喻佗後來之爲惡梅以喻佗性質之本美言梅本美木生於墓門荒僻之處而惡聲之鴞乃萃集焉萃集非止一鴞喻羣小附和之衆縱臾之爲惡也縱子勇反史讀曰勇此傅相之人不良有歌其惡以訊告之而不予顧至於顚倒然後思予則悔無及矣墓門二章章六句防有鵲巢憂䜛賊也宣公多信䜛疏曰宣公杵曰莊公林弟君子憂懼焉曰陳宣公詩僖惠之間此詩憂䜛賊者詩人爲賢者憂之也防有鵲巢傳曰防邑也卭有㫖苕卭音窮苕音條傳曰卭丘也記曰後漢地理志陳縣注博物記云卭地在縣北防亭在焉箋曰㫖美也曰此㫖苕苕饒也非小雅苕之華所謂陵苕也疏曰苕之華傳云苕陵苕此傳直云苕草彼陵苕之草好生下濕此則生於髙丘與彼異也陵璣曰苕苕饒也幽州人謂之翹饒蔓生莖如勞正而細葉似蒺蔾而青其莖葉緑色可生食如小豆藿長樂劉氏曰㫖者地荒則草美盛也誰侜予美侜音舟李氏曰説文云侜壅蔽也程子曰予美心所賢者今曰唐葛生言予美則婦人稱其夫此詩予美則詩人稱賢者也心焉忉忉音刀齊甫田𫝊曰忉忉憂勞也興也言防邑有鵲巢卭丘有㫖美之苕饒陳人指其地之所見也鵲巢積累而成喻爲䜛之積漸苕草延蔓而生喻所䜛之浸廣誰壅蔽予所美之賢者使我心忉忉然憂勞也中唐有甓音霹釋宫曰廟中路謂之唐堂塗謂之陳瓴甋謂之甓瓴甋音零滴疏口堂塗堂下至門之徑也唐之與陳廟庭之異名耳其實一也今曰毛以中爲中庭唐爲堂塗不必分也中唐猶言唐中耳郭璞曰甓㼾甎也㼾音鹿卭有㫖鷊音逆鶂音同傳曰鷊綬草也郭璞曰有雜色似綬也誰侜予美心焉愓愓音趯程子曰愓愓懼也中唐乃堂下至門之徑有甓非一甓也亦以積累而成功卭有㫖美之鷊草雜衆色以成文猶䜛言交織以成惑美義與貝錦同防有鵲巢二章章四句月出刺好色也好去聲在位不好德而説美色焉説音恱曰陳宣公詩僖惠之間月出皎兮皎音繳今曰皎月光皎潔佼人僚兮佼音攪僚音了疏曰佼好也今曰孟子云子都之佼傳曰僚好貌舒窈糾兮窈音杳糾喬之上濁傳曰舒遲也窈糾舒之姿也今曰舒而脱脱兮勞心悄兮悄鍬之上傳曰悄戞也錢氏曰黙憂也興也當月出皎潔之時感其所見興佼好之人顔色僚然而好其明艶白晳如月之初出而皎潔其行止舒遲窈糾然姿態之美也思而不可得則勞心悄然憂愁而靜黙也宋玉神女賦云其少進也皎若明月舒其光正用此詩也又云歩裔裔兮曜後堂又云動霧縠以徐歩皆形容舒之意月出皓兮皓音鎬豪之上濁今曰皓月光之白也佼人懰兮懰音栁蘇氏曰懰好也舒懮受兮懮音酉蘇氏曰懮受舒之姿也勞心慅兮慅音草王氏曰慅言不安而慅動月出照兮佼人燎兮燎音療蘇氏曰燎明也舒夭紹兮夭音殀季氏曰夭紹亦舒之姿也勞心慘兮王氏曰慘言不舒而憂愁月出三章章四句株林株音誅刺靈公也疏曰靈公平國共公朔子滛乎夏姬夏遐之上濁疏曰夏姬陳大夫妻夏徴舒之母鄭女也徴舒字子南夫字御叔宣九年左傳稱陳靈公與孔寜儀行父通於夏姬十年經云陳夏徴舒弑其君平國傳云陳靈公與孔寜儀行父飲酒於夏氏公謂行父曰徴舒似汝對曰亦似君徴舒病之公出自其廐射而殺之昭二十八年左傳叔向之母論夏姬云是鄭穆公少妃姚子之子子貉之妹也子貉早死而天鍾美於是楚語云昔陳公子夏爲御叔娶於鄭穆公女生子南子南之母亂陳而亡之是言夏姫所出及夫子名字御如字一音禦貉音陌驅馳而往朝夕不休息焉曰陳靈公詩定王時株林夏南之辭迫切矣而靈公猶不知羞惡也朝爲乎株林傳曰株林夏氏邑也從夏南匪適株林從夏南夏南夏姬之子也夏姬之事太䙝詩人不欲斥言之故託辭於其子謂夏南非有見焉不足往見也今公之命駕何爲欲往株林以從夏南乎又自解之曰必非往株林以從夏南也恐有他往耳依違言之而譏之最切矣補傳曰不斥夏姬而言夏南夏南實主其家國人亦豫憂其禍必作於夏南也駕我乘馬乘去聲説于株野説音税箋曰説舍也乘我乘駒上乘平聲下乘去聲朝食于株始見公之命駕謂必非徃株林以從夏南既而駕一乘之馬則舍説于株林之野乘一乘之駒則又朝食于株元無他往朝朝暮暮只往株林何爲也哉株林二章章四句澤陂刺時也言靈公君臣滛於其國男女相説音悦憂思感傷焉思音伺今曰陳靈公詩定王時王氏曰東門之枌宛丘之應也澤陂株林之應也此詩言寤寐無爲刺靈公君臣惟知好色而不知其他焉知爲作者刺滛者變風多男女之詩或疑似後世艶曲聖人宜刪之非也刺滛之詩非滛者自作乃時人作詩譏刺其如此所謂思無邪也聖人存之以立教使後世知爲不善於隱微之地人得而知之惡名播於無窮而不可湔洗欲其戒謹恐懼也讀詩者能無邪爾思則凛然見聖人立教之嚴矣詩記曰變風始於雞鳴終於澤陂凡一百二十八篇而男女夫婦之詩四十有九抑何多邪曰有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯男女者三綱之本萬事之先也正風之所以爲正者舉其正者以勸之也髮風之所以爲變者舉其不正者以戒之也道之升降時之治亂俗之汚隆民之死生於是乎在録之煩悉篇之重複亦何疑哉彼澤之陂董氏曰澤水之鍾也傳曰陂澤障也障音帳有蒲與荷説文曰蒲似莞而𥚹有脊滑柔而温莞音官蒲山隂陸氏曰蒲水草也生於水厓可以爲席故男執璧言有安人之道也今曰斯干下莞箋云小蒲則莞精蒲麤矣釋草曰荷芙蕖其莖茹其葉蕸其本蔤其華菡萏其實蓮其根藕茹音加蕸音遐蔤音宻陳氏曰皆以美物相依有美一人傷如之何寤寐無爲涕泗滂沱泗音四傳曰自目曰涕自鼻曰泗疏曰經傳言隕涕出涕皆謂淚出於目今曰漸漸之石俾滂沱矣疏以爲雨盛此言涕泗如雨也興也蒲葉柔滑荷花紅艶皆物之美而可愛者彼澤之陂有蒲與荷言美物相依也今有一美好之女不得如蒲荷之相依我心之傷奈之何也或寤而覺或寐而寢更無他事但目涕鼻泗俱下滂沱如雨而已譏而鄙之也彼澤之陂有蒲與蕳音艱傳曰蕳繭也有美一人碩大且卷音權傳曰卷好貌李氏曰盧令其人美且鬈字雖不同其義則一釋文曰鬈髮好貌寤寐無爲中心悁悁音淵傳曰悁悁猶悒悒也蘭是芬香之草喻女美也或疑碩大非婦人之稱遂疑此爲慕賢之詩觀衛風以碩人稱莊姜車牽稱辰彼碩女則詩以碩大稱婦人多矣彼澤之陂有蒲菡萏菡酣之上濁萏談之上濁菡頷憾同音萏禫髧同音傳曰菡萏荷華也有美一人碩大且儼傳曰儼矜莊貌寤寐無爲輾轉伏枕輾音展輾轉解見闗雎朱氏曰伏枕而思也澤陂三章章六句詩緝卷十三
