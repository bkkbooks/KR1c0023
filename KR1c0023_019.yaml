body:
  text: 詩緝卷十九宋嚴粲撰鴻鴈之什小雅鴻鴈美宣王也萬民離散不安其居而能勞來還定安集之勞來還音潦賚旋王氏曰勞者勞之來者來之往者還之擾者定之危者安之散者集之至于矜寡矜音鰥無不得其所焉此詩流民所作述使臣之勤勞能布宣其上之德意也美使臣所以美宣王也王者事業以民為本可以見興復之規模矣鴻鴈于飛傳曰大曰鴻小曰鴈疏曰鴻鴈俱是水鳥其形鴻大而鴈小春則避陽暑而北秋則避隂寒而南曹氏曰喻小大皆離散肅肅其羽傳曰肅肅羽聲也陳氏曰其羽急疾今曰小星肅肅宵征毛以為疾貌則此亦為羽聲之疾也之子于征歐陽氏曰之子使臣也劬勞于野劬音衢傳曰劬勞病苦也爰及矜人矜如字箋曰及此可憐之人哀此鰥寡興也言大鴻小鴈之飛轉徙無定居其羽聲肅肅然急疾如厲王之後民無小大皆奔散也鳥棲皆有常處唯鴻鴈春北而秋南故以喻民之不安其居宣王於是遣使巡行而安集之之子使臣奉命征行病苦于野不敢安寧賙恤之澤及此可憐之人而尤哀念於鰥寡以離散之民皆可念而其中有鰥寡者尤可念也鴻鴈于飛集于中澤傳曰中澤澤中也箋曰猶民見還定安集曹氏曰鴻鴈之趾連蹄不能握木故易以鴻漸于木為失所不安之象書以彭蠡既瀦陽鳥攸居為得其所之子于垣音袁疏曰垣牆也百堵皆作堵音睹傳曰一丈為版五版為堵疏釋傳曰五版為堵謂纍五版也版廣二尺故周禮說一堵之牆長丈髙一丈箋曰春秋傳云五版為堵五堵為雉雉長三丈則版六尺疏釋箋曰五版為堵五堵為雉定十二年公羊傳文也謂接五堵成一雉何休取韓詩傳以版長八尺古之雉制書傳各不得其詳雖則劬勞其究安宅朱氏曰究終也鴻鴈集于澤中喻還定之後民有居止之安也使臣所至使民築其垣牆為安處之計百堵同時而起且勸勉之曰汝今雖劬勞其終有安居也鴻鴈于飛哀鳴嗸嗸音遨釋文曰嗸嗸聲也曹氏曰民初得其所歸皆嗸嗸然赴訴於使者維此哲人曹氏曰民稱使者為哲人謂我劬勞維彼愚人謂我宣驕傳曰宣示也今曰猶宣淫之宣離散之餘初有定居生理未復故如鴻鴈嗸嗸然哀鳴赴訴於使臣使臣能撫恤賑濟之於是流民稱此使臣明哲故能知我之劬勞若使彼愚人為使臣將謂我宣恣其驕求索無厭也此云者指見在之人彼云者設言其人耳曹氏曰見宣王選任之明也鴻鴈三章章六句庭燎音療美宣王也因以針之針音斟釋文曰針諌誨之辭疏曰若病之須針解頥新語曰針猶針砭針音針砭陂驗反董氏曰傳云百官官針王闕此詩其司烜之屬所為乎恆況逺反與嚇兮咺兮同音美其勤也慮其勤之易怠故從而針之夜如何其音基釋文曰其辭也夜未央說文曰央中央也庭燎之光傳曰庭燎大燭也疏曰庭燎者樹之於庭燎之為明是燭之大者秋官司烜云邦之大事供蕡燭庭燎注云樹於門外曰大燭門內曰庭燎不同者以彼燭燎别文則設非一處庭燎以庭名之明在門內故以大燭為門外以文對故異之耳其散則通也郊特牲云庭燎之百由齊桓公始也注云僣天子也庭燎之差公蓋五十侯伯子男皆三十是天子庭燎用百古制未得而聞要以物百枚並而纒束之今則用松葦竹灌以脂膏也君子至止傳曰君子謂諸侯也鸞聲將將音蹌曹氏曰將將聲之大玉藻云朝辨色始入君日出而視之今宣王中夜而起失於太早詩人設為問答之辭曰今夜已如何乎乃夜未半也庭燎已設而有光諸侯皆來朝聞其鸞聲之大將將然蓋來者多而其聲揚也然未辨色則未可以入是太早也所以針之舊說相承以夜如何其為宣王問夜今不從夜如何其夜未艾毛音礙鄭音刈王氏曰未艾未及盡也李氏曰左傳昭元年秦后子云一世無道國未艾也注云絶也則艾為盡意庭燎晣晣音制傳曰晣晣明也朱氏曰小明也君子至止鸞聲噦噦音誨翽翽音同傳曰噦噦徐行有節也曹氏曰噦噦聲之微自夜未半而庭燎已光諸侯先至者待之久矣既而至於夜未盡庭燎晣晣然其光漸小諸侯之繼至者其鸞聲之微噦噦然蓋來者稀而其聲殺也亦針其早也夜如何其夜鄉晨鄉音嚮庭燎有輝音暉朱氏曰有輝天明而光散也今曰易未濟卦其暉吉也程傳云暉光之散也暉輝義同君子至止言觀其旗鄉晨則庭燎光散諸侯之後至者可見其旗於是辨色而始入乃朝之時也何必太早乎舊說皆謂自未央而未艾自未艾而鄉晨為始勤終怠之意如是則此詩作於宣王怠政之日而追述其前時之勤耳是刺而非美矣所謂因以針之者如有常德以立武事因以為戒謂美其武功之方盛而因戒其後之不可以黷武庭燎亦美宣王之勤政而針其勤之大過耳過於勤則不可以常而其終之怠固勢所必至然此詩則未及言怠政之事朝辨色而入末章夜鄉晨正視朝之時不為怠也此詩乃宣王鋭意求治之初其後晏起至煩賢后脫簪乃末年怠政之事非此時也詩記曰宣王其志雖勤然未能安定凝止躍然有喜事之心焉斯其所以不能常也庭燎三章章五句沔水沔音免規宣王也箋曰規者正圓之器也規主仁恩也以恩親正君曰規春秋傳云近臣盡規疏曰圓者周匝之物以比人行周備有不圓匝者規之使成圓正物之器不獨規獨言規者以恩親正君曰規規之使圓則外無亷隅故五行規主東方是主仁恩也規其聽讒而諸侯攜二也沔彼流水傳曰沔水流滿也朝宗于海朝音潮箋曰諸侯春見天子曰朝夏見曰宗疏曰大宗伯注云朝朝也欲其來之早宗尊也欲其尊王禹貢亦云江漢朝宗於海鴥彼飛隼鴥音聿隼音筍晨風傳曰鴥疾飛貌隼解見采芑載飛載止箋曰載之言則也嗟我兄弟邦人諸友莫肯念亂箋曰莫無也誰無父母興也杜詩云衆流歸海意萬國奉君心與此詩意同彼沔然而滿之流水必入於海有朝宗之義喻諸侯雖彊大必朝宗於天子此理之常也其叛服不常如鴥然疾飛之隼或飛或止者必有其故矣含蓄而未言也兄弟指所親邦人指衆人諸友指所厚言兄弟邦人諸友則親疏厚薄識與不識皆在其中矣嗟我親疏厚薄之人無肯思亂者皆願平治也誰無父母乎皆有所顧惜也憂諸侯之背叛而致禍亂將纍其親也沔彼流水其流湯湯音商傳曰湯湯放縱無所入也鴥彼飛隼載飛載揚念彼不蹟音迹釋文迹亦作蹟蹟足跡也傳曰不蹟不循道也今曰不由故迹謂越常也載起載行心之憂矣不可弭忘弭音敉傳曰弭止也水滿而湯湯然猶書湯湯洪水方割喻諸侯彊大而放恣也隼載飛載揚猶諸侯飛揚而不朝事者故念彼不循道之諸侯我坐不能安則起則行此心之憂不可止而忘之也鴥彼飛隼率彼中陵箋曰率循也民之訛言箋曰訛僞也寧莫之懲傳曰懲止也我友敬矣讒言其興一章言載飛載止喻諸侯或朝或不朝者二章言載飛載揚喻諸侯跋扈不朝者此章言率彼中陵喻諸侯循道而來朝者飛止者已無固志飛揚者未有回心率彼者蓋僅有之所當綏懷以勸來者今民之訛言復欲中以飛語而使之不自安豈可不懲止之乎聞來朝之諸侯相與語曰吾輩事王室非不敬矣而讒言方興將如之何是其心亦懷疑懼將不來矣宣王不可不察也諸侯之叛在讒言耳首章之含蓄次章之憂危至末章結句始發之沔水三章二章章八句一章六句鶴鳴誨宣王也董氏曰此詩其師傳所作歟此詩說者多異毛鄭在衆說之先皆謂興求賢必有師承當從之鶴鳴于九皋傳曰皋澤也箋曰澤中水溢出所為坎自外數至九喻深逺也聲聞于野聞音問今曰他人聞知其聲之聞從平聲凡聲聞於人之聞從去聲傳曰言身隱而名著也魚潛在淵或在于渚江有渚傳曰渚小洲也疏曰以魚之出沒喻賢者之進退樂彼之園樂音洛爰有樹檀疏曰檀善樹也解見將仲子其下維蘀音托蘀落葉也解見蘀兮箋曰猶尚賢而下小人它山之石它音拖可以為錯七落反傳曰錯石也可以琢玉今曰揚子不礱不錯焉攸用錯謂治玉也興也鶴鳴于九皋深逺之地其聲聞于外方之野喻賢者身隱名顯也魚或在於深淵或見於淺渚喻賢者去就不常也身隱名顯則難進去就不常則易退皆視人主意嚮何如耳故用捨不可以不審猶彼園之可樂者以上有善木之檀其下則有落葉喻朝廷之上當上賢而下不肖也既得賢者則可以磨礱君德如它山之石可以為琢玉之錯石也程子曰玉之溫潤天下之至美也石之粗糲天下之至惡也然兩玉相磨不可以成器以石磨之而後玉之為器得以成焉猶君子之與小人橫逆既加然後修省畏避動心忍性增益預防而禮義生焉道德成焉吾聞諸邵子云李氏曰漢王符云攻玉以石洗金以鹽濯錦以魚浣布以灰夫物固有以賤理貴以醜化好者矣智者棄短取長以致其功鶴鳴于九皋聲聞于天魚在于渚或潛在淵樂彼之園爰有樹檀其下維榖音谷釋文曰穀從木非從禾也曰榖楮也今楮皮也傳曰榖惡木也疏曰陸璣云幽州人謂之榖桑荆揚交廣謂之穀中州人謂之楮殷中宗時桑榖並生是也今江南人績其皮以為布又搗以為紙謂之榖皮紙潔白光澤其裏甚好其葉初生可以為茹它山之石可以攻玉傳曰攻錯也今曰謂錯治之也鶴鳴二章章九句祈父音畿甫刺宣王也疏曰周語云宣王三十九年戰于千畝王師敗績於姜氏之戎宣王料民太原人不足用乃令祈父出禁衛以從軍此宣王之失非祈父所得専也作者呼祈父而責之所以刺宣王也祈父傳曰祈父司馬也職掌封圻之兵甲釋文曰封圻當作畿字古作祈圻畿同字得通故此作祈尚書作圻李氏曰左傳襄十六年獻子賦圻父其字用酒誥圻字昭十二年子革曰祭公謀父作祈招之詩杜預注云祈父周司馬祈字作詩之祈招音韶疏曰常武美宣王命程伯休父為大司馬此詩所刺者蓋休父卒後他人代之豫王之爪牙疏曰鳥用爪獸用牙以防衛此人自謂王之爪牙以鳥獸自喻也胡轉豫于恤箋曰轉移也傳曰恤憂也靡所止居宣王以宿衛之士從軍宿衛之士不敢斥宣王以司馬掌征伐呼其官而責之曰祈父我乃王之爪牙當為王間守之衛女何移我於憂恤之地使我無所止居乎謂使之從軍在外無定居也軍心之怨如此其敗宜矣此詩作於未敗之前故但言靡所止居有母尸饔也變雅諷刺其上庶其覺悟使宣王聞而改圖未必有千畝之敗也箋曰司馬之屬有司右主勇力之士六軍之士出自六鄉法不取於爪牙之士疏曰司右止言勇力屬焉不言使之守衛夏官虎賁氏其屬者虎士八百人其職云掌先後王而趨以卒伍軍旅㑹同亦如之舍則守王間王在國則守王宫國有大故則守王門虎賁之徒既為宿衛則司右之徒亦為宿衛矣祈父豫王之爪士李氏曰爪牙之士也胡轉豫于恤靡所底止底音止傳曰底至也靡所底止謂逺戍而行役未已祈父亶不聰傳曰亶誠也胡轉豫于恤有母之尸饔音雍傳曰尸陳也熟食曰饔長樂劉氏曰尸主也言有母見無父矣猶穎考叔所謂小人有母也祈父誠不聰何為移我於憂恤我有母在當主為饔以養之汝乃不知是不聰也詩記曰讀是詩見宣王變古制者二焉前兩章既刺其以宿衛之士從征役矣末章復曰祈父亶不聰胡轉豫于恤有母之尸饔有親老而無他兄弟其當免役征在古必有成法責其不聰其意謂此法人皆聞之彼司馬獨不聞乎乃驅吾從戎使吾親不免薪水之勞也責司馬者不敢斥宣王也越勾踐伐吳大徇於軍曰子有父母耆老而子為我死之子父母將轉於溝壑子為我禮已重矣子歸沒而父母之世後若有事吾與子圖之勾踐尚能辨此况周之盛時乎其有定制必矣太子晉諌靈王之辭曰厲始革典十四王矣又曰自我先王厲宣幽平而貪天禍至于今未弭宣王中興之主也至於幽厲並數之其辭雖過觀是詩所刺則子晉之言豈無所自歟祈父三章章四句白駒大夫刺宣王也當時賢能布列白駒一賢之去若未關大體詩人已為宣王惜之蓋見幾也皎皎白駒皎音繳釋文曰皎皎潔白也食我場苗場圃場見七月疏曰此宜云圃而言場者以場圃同地耳言食苗藿則夏時矣縶之維之縶音執傳曰縶絆也維繫也絆音半疏曰僖二十八年左傳云韅靷鞅靽杜預注云在背曰韅在胸曰靷在腹曰鞅在後曰絆則縶之謂絆其足釋文曰繫足曰絆維之謂繫靷也韅靷鞅靽音憲引養半以永今朝山有樞傳曰永引也今曰引猶款也所謂伊人朱氏蒹葭解曰伊人猶言彼人也於焉逍遙焉如字箋曰逍遙遊息也宣王之末不能用賢賢者有乘白駒而去者同朝之大夫惜其去而思之言此皎皎然之白駒若來至我居我則捐圃中之菜苗以食之而無所愛不止於青芻也又縶絆其馬之足維繫其馬胸之靷惟恐其去而不留猶投轄於井之意也以延引今朝謂賢者縱不能久留且得款曲今日亦足矣此皆欲見之而不可得之辭故想像其人而言曰所謂彼人者願其來此逍遙也蓋賢者去之國人思望之意也榖之始生曰苗草之類始生亦曰苗本草多言春夏采苗是也場即圃也言圃中之苗則菜茹之嫩者猶今言菜秧非禾苗也若以納稼在場則不名苗矣下云場藿藿豆葉也亦菜茹之類舊說以伊人逍遙為賢者實來訪於已非也伊人猶言彼人謂其人不在此而想像之稱非覿面之稱也唐有杕之杜刺不能求賢曰彼君子兮噬肯適我中心好之曷飲食之丘中有麻言賢人放逐曰彼留子嗟將其來施施皆望其來而不可得之辭與此詩之意一也皎皎白駒食我場藿音霍曰藿豆葉也用以鉶羮解見小宛縶之維之以永今夕所謂伊人於焉嘉客願其來此為嘉客也皎皎白駒賁然來思賁音祕程子曰賁然光彩疏曰思助語爾公爾侯逸豫無期慎爾優游勉爾遁思遁音鈍字亦作遁今曰易遁卦遁奉身退隱之謂也言願此賢者來訪於已賁然若有榮耀焉亦望之之辭也彼去而已留於是羡賢者退居之樂謂爾賢者若為公為侯則將勤勞國事無有逸豫之期今爾肥遁優哉游哉足以自樂願加保重耳故曰謹爾優游勉爾遁思於此深寓愛賢之意而又以見賢者無入不自得不以得喪嬰其心也舊說爾公爾侯為責公侯與下文爾字不歸一今以四爾字皆指賢者皎皎白駒在彼空谷今曰空谷言寂寥無人之所也生芻一束芻音初釋文曰芻刈草也俗作芻今曰生芻新刈之草所謂青芻也其人如玉毋金玉爾音毋音無而有遐心言賢者逺遁在於無人之空谷所謂寬間之野寂寞之濵也處困窮而享淡薄其飼馬以新刈生草一束而已無榖以秣之然其人之美則如玉也彼去而已留望其音問不相絶曰無自貴重其音聲如金玉然不以遺我而有逺棄我之心也上三章猶望賢者來訪於已末章言賢者晦迹巖谷不可復望其來見止望其寄聲耳極稱其美而為拳拳思慕之辭所以見其人之賢而刺時之不能用也杜詩與奴白飯馬青芻則以草新刈而青者為愛客之厚此詩則以生芻見賢者之處淡薄其意各有所主季文子無食粟之馬唐人詩官清馬骨髙山谷詩貧馬百藖逢一豆藖音間又音莧牛馬食餘草節也皆因馬以見人也白駒四章章六句黃鳥刺宣王也毛鄭以為室家相棄王氏蘇氏以為賢者不得志而去不若朱氏以為民不安其居適異國而不見收恤諸家以無啄我粟為此邦之言不我肯榖復我邦族為去者之言文意斷續朱氏以為皆去者之言朱義為長黃鳥黃鳥無集于榖疏曰榖木也解見鶴鳴無啄我粟啄音卓此邦之人不我肯榖傳曰榖善也今曰書既富方榖言旋言歸曰言辭也復我邦族興也民適異國不得其所無可告語者唯黃鳥可愛平時飛鳴往來於此故於其將去呼黃鳥而告之曰爾無集於我之榖木無啄我之粟矣蓋此邦之人不肯以善道待我我亦不久於此將旋歸復反我邦之宗族矣與黃鳥告别之辭也杜詩岸花飛送客檣燕語留人謂送留惟花燕亦此詩告别惟黃鳥之意也舊說以黃鳥集榖啄粟喻侵迫黃鳥鶯也人所愛玩集木啄粟未為侵害於人黃鳥黃鳥無集于桑無啄我粱此邦之人不可與明言旋言歸復我諸兄不可與明言以橫逆加已不可與之求明白也黃鳥黃鳥無集于栩音許曰栩柞也櫟也杼也解見唐鴇羽無啄我黍此邦之人不可與處音杵言旋言歸復我諸父黃鳥三章章七句我行其野刺宣王也王氏曰此民不安其居而適異邦從其婚姻而不見收恤之詩也朱氏曰使民如此異於還定安集之時也周之盛時以睦姻任恤教道其民風俗醇厚何如也至黃鳥我行其野之詩作則教道微而習俗薄矣君子是以知宣王之後周道之衰也我行其野蔽芾其樗芾音沸樗音樞蔽芾解見甘棠傳曰樗惡木也疏曰七月云采荼薪樗樗唯取薪薪惡木也李氏曰樗者不材之木也莊子云吾有大樹人謂之樗其大枝擁腫不中繩墨其小枝卷曲不中規矩卷音權昏姻之故言就爾居爾不我畜許六反傳曰畜養也今曰邶谷風不我能慉字異音義同復我邦家我從本國而來經行於野見有惡木之樗野中自生非藉人力種植而其枝葉蔽芾然茂盛我猶得休息於其下我以爾是昏姻親戚之故素有恩義交結非野樗之比也今來就爾居爾乃不我養是無恩之甚惡木之不如也爾既不我養今當復反我之邦家矣與之訣也我行其野言采其蓫音蓄傳曰蓫惡菜也箋曰牛蘈也亦仲春時生可采也蘈徒雷反陸璣曰今人謂之羊蹄似蘆蔔而葉長赤鬻為茹滑美也鬻煮同王氏曰蓫惡卉也可以治疾曹氏曰蓫葍皆野生昏姻之故言就爾宿爾不我畜言歸斯復蓫惡菜野生不待栽培猶可治疾我與爾為昏姻有交結之素乃野菜之不如也我歸則復其舊矣我行其野言采其葍音福傳曰葍惡菜也箋曰葍䔰也䔰音富陸璣曰河內謂之蓘幽州謂之䔰燕一名藚其根正白宜著熱灰中溫噉之饑荒之嵗可蒸茹以禦饑或云其花葉有兩種一種葉細而花赤一種葉大而花白復香蓘音衮藚音續不思舊姻求爾新特蘇氏曰特匹也今曰新特謂新親也成不以富蘇氏曰依論語成當作誠亦祗以異祗音支傳曰祗適也今曰朱氏論語解云不足以致富而適足以為異也葍亦惡菜野生猶可禦饑新舊親姻一也今乃棄我之舊姻而求爾之新親責其薄也爾之不我收恤但鄙吝耳此何能以致富適足為異耳親義相賙人道之常爾獨不然是可怪也我行其野三章章六句斯干宣王考室也箋曰考成也疏曰說文云釁血祭也雜記下云成廟則釁之其禮雍人拭羊舉羊升屋自中中屋南面刲羊血流於前乃降是釁廟也雜記云路寢成則考之而不釁注云設盛食以落之歐陽氏曰古人成室而落之必有稱頌禱祝之言如歌於斯哭於斯聚國族於斯謂之善頌善禱者是矣若知斯干為考室之辭則一篇之義簡易而通明矣詩記曰斯干無羊皆宣王初年之詩乃次於刺詩之後何也蓋宣王晚嵗雖怠於政然中興周室之大德豈可以是而掩之乎故復取此二篇以終之也宣王之大雅有美無刺大雅言大體者也論其大體則宣王固一世之賢君也秩秩斯干疏曰斯此也漸卦注云干謂大水之傍今曰秩秩整齊貌幽幽南山傳曰幽幽深逺也長樂劉氏曰鎬京之陽終南之山也考見秦風終南如竹苞矣苞叢生也解見生民如松茂矣兄及弟矣式相好矣好去聲箋曰式用也無相猶矣歐陽氏曰猶圖也謀也鎬京臨大水對終南故宣王作室之地在秩秩然整齊之干岸面對幽幽然深逺之南山言地勢之壯也其盤基之厚如竹之叢生其結架之密如松之茂盛言宫室之美也於是頌禱之願其入居此室之後兄弟各相和好無有相圖者矣西京賦言長安於前則終南太一猶此詩言幽幽南山於後則據渭踞涇猶此詩言秩秩斯干西京賦祖述斯干也鎬在上林苑中此所言干謂大水之傍必鎬水也舊說宣王作室於山澗之間釋文云澗山夾水也亦溝澗然則澗是水之小者稱美天子之宫室必舉山水之大者言之無由舉小澗為發端之辭似續妣祖妣音七傳曰似嗣也箋曰妣先妣姜嫄也曹氏曰祖豈后稷歟築室百堵解見鴻鴈西南其戶傳曰西鄉戶南鄉戶也疏曰天子之宫其室非一在北者南戶在東者西戶孫育云猶南東其畝爰居爰處爰笑爰語箋曰爰於也美作室而言嗣續妣祖者蓋厲王之亂百度廢墜宫室亦壞宣王既以中興王業乃築宫室以復舊觀足以見中興之盛故曰嗣續妣祖若竟土未復雖作宫室不足言嗣續矣百堵言廣且多也或西鄉其戶或南鄉其戶於是居處於是笑語焉約之閣閣音各傳曰約束也閣閣猶歷歷也蘇氏曰上下相承也椓之橐橐椓音卓橐音托疏曰椓以杵築之也蘇氏曰橐橐杵聲也風雨攸除音筯朱氏曰除亦去也鳥鼠攸去君子攸芋音吁傳曰芋大也此章言牆垣之固也築牆之時以繩約束其板閣閣然上下相乘即所謂縮板以載也以杵築椓之其聲橐橐然羣寢既成上下四旁牢密則風雨不能凌暴鳥鼠不能穿穴皆除去君子於是居焉所以為尊且大也曹氏曰君子雍容於其間心廣體胖是以大也所謂居移氣也如跂斯翼跂音起韻又音棄釋文曰跂腳跟不著地跟音根傳曰如人之跟竦翼耳疏曰竦此臂翼然今曰如論語翼如也之翼人舉踵則竦臂翼然如鳥舒翼也如矢斯棘歐陽氏曰棘急也矢行緩則枉急則直謂亷隅繩直如矢行也如鳥斯革歐陽氏曰革變也如翬斯飛翬音輝箋曰伊雒而南素質五色皆備成章曰翬吕氏曰覆以瓦而加丹雘有文采而勢騫舉也君子攸躋傳曰躋升也此章言其堂也其上下嚴正如人跂足直立則聳臂翼如也其四隅如矢行棘急而直也其竦起如鳥驚變而悚顧也其軒翔如雉翬之飛也君子升之以視朝焉言其堂故曰升殖殖其庭殖音植傳曰殖殖平正也疏曰庭宫寢之前庭也有覺其楹傳曰覺高大也箋曰直也疏曰楹柱也噲噲其正噲音快正音政箋曰噲噲猶快快也疏曰寬明快快然吕氏曰正謂正寢噦噦其冥噦音誨蘇氏曰噦噦深廣之貌吕氏曰冥謂室之奧窔也窔音要君子攸寧此章言其室也其宫寢之前庭殖殖然平正也其楹柱覺然髙大也其正寢噲噲然明快也其室之冥奧噦噦然深廣也君子居之而安寧謂燕息優游也言其室故曰寧李氏曰東坡之詩云書窗明快夜堂深下莞上簟莞音官箋曰莞小蒲之席也竹葦曰簟釋文曰草叢生水中莖圓江南以為席形似小蒲而實非也釋草曰莞苻蘺其上蒿疏曰郭璞云莞蒲一草之名蒲粗莞細司几筵有莞筵蒲筵粗者在下美者在上也莞細而用小蒲竹葦曰簟者以常鋪在上宜用堅物故知竹簟也士喪禮云下莞上簟衽如初則平常皆莞簟也其寢卧之席自天子以下宜莞簟同乃安斯寢乃寢乃興箋曰興夙興也乃占我夢吉夢維何維熊維羆音碑疏曰釋獸云羆如熊黃白文黃白色郭璞曰似熊而長頭高腳猛憨多力能拔樹木憨音蚶陸璣曰有黃羆有赤羆大於熊其脂如熊白而粗理不如熊白美也維虺維蛇虺音毁曰虺蝮也蝮音福釋魚曰蝮虺博三寸首大如擘擘博厄反舍人曰江淮以南曰蝮江淮以北曰虺孫炎曰廣三寸頭如拇指有牙最毒山隂陸氏曰虺狀似蛇而小為虺弗摧為蛇奈何舊說蝮蛇怒時毒在頭尾螫手則斷手螫足則斷足蛇之尤毒烈者也一曰蝮與虺異螫音釋考室之時當有頌禱之語以終之如今落成致語上梁文之類居室之慶莫過於子孫之繁衍此人情之至願故頌禱之辭曰願入此室處之後發於夢兆而聞子孫之祥蓋設為之辭非實有是夢也大人占之王氏曰當時在位之大人曹氏曰大人則非占夢之官蓋當時之所尊信也若晉平公夢黃熊入寢門而問諸子産晉文公夢與楚子搏而問諸子犯維熊維羆男子之祥維虺維蛇女子之祥心清神定則有開必先博物通逹則占事知來熊羆猛獸為男之祥虺蛇隂類為女之祥昔人謂占夢無書以意言之殆近是矣然皆設為禱辭耳王氏曰人之精神與天地隂陽流通故夢各以其類至先王置官觀天地之㑹辨隂陽之氣以日月星辰占六夢之吉凶獻吉夢贈惡夢知此則可以言性命之理矣乃生男子載寢之牀箋曰尊之也載衣之裳衣去聲傳曰裳下之飾也載弄之璋音章傳曰半圭曰璋臣之職也其泣喤喤音橫疏曰喤喤聲大也王氏曰其泣之美亦所以為吉祥羊食我之生也聞其聲者知其滅羊舌氏矣食音嗣今曰東坡賀人生子詩云試教啼看定何如今人以兒初生啼聲長而大為福夀朱芾斯皇芾音弗赤芾詳解見曹候人朱芾解見采芑箋曰皇猶煌煌也室家君王古者男女初生即表異之男則寢之牀尊之也衣之下飾之裳臣道也弄之璋玉以他日行禮之事也皆表異其為男子也其泣聲喤喤然大福夀之證皆將服朱芾煌煌然而鮮明有室有家為諸侯為天子矣今考大宗伯以赤璋禮南方注云圭鋭象春物初生半圭曰璋象夏物半死然則圭之首鋭璋則圭體之半也一圭中分則為二璋也瓚有圭瓚璋瓚瓚勺也以圭璋為瓚之柄以祼於宗廟也有璋玉有璋瓚璋玉以禮神及朝聘以為瑞璋瓚以祼宗廟毛以棫朴奉璋為璋玉顧命太保秉璋以酢是人臣行禮奉璋玉之事也鄭以棫朴奉璋為璋瓚郊特牲灌以圭璋是璋瓚亦名璋也此生男弄璋必不用祭器之璋瓚當止是璋玉也孔氏引奉璋以證臣職而毛鄭於彼注其說不同故辨之乃生女子載寢之地箋曰卑之也載衣之裼音替傳曰裼褓也疏曰縳兒被也蘇氏曰即用其所衣而無加也載弄之瓦傳曰瓦紡磚也無非無儀箋曰儀善也婦無所專於家事有非非婦人也有善亦非婦人也唯酒食是議無父母詒罹傳曰罹憂也寢之地以卑之衣之裼褓以賤之弄之紡磚以習其所有事皆表異其為女子也婦人之事無非可譏無善可稱惟議酒食耳無遺父母之憂罹斯干九章四章章七句五章章五句無羊宣王考牧也箋曰厲王之時牧人之職廢宣王始興而復之陳氏曰牧者牧養蓄牲之牢蓄牲之多寡足以表國之盛衰故詩人於其牧成而考之作為禱頌之辭疏曰周官有牧人下士六人府一人史二人徒六十人掌牧六牲而阜蕃其物六牲謂牛馬羊豕犬雞爾牲則具主以祭祀為重馬則祭所用者少豕犬雞則比牛羊為卑故特舉牛羊為美也箋疏所引牧人謂牧人之官也詩所言牧人何簑笠薪蒸者謂牧養牛羊者也誰謂爾無羊三百維羣誰謂爾無牛九十其犉閏之平傳曰黃牛黑唇曰犉爾羊來思今曰來謂來入於牢如言牛羊下來也李氏曰思辭也其角濈濈簪之入傳曰聚其角而息濈濈然王氏曰和也羊以善觸為患故言其和為聚而不相觸也爾牛來思其耳濕濕傳曰呞而動其耳濕濕然呞音癡郭璞曰呞食已復出嚼之也山隂陸氏曰牛病則耳燥安則溫潤而澤故古之善視牛者以耳祭義所謂大夫祖而毛牛尚耳宣王初承厲王之後六畜衰耗人皆言其無牛羊矣及宣王修復牧事牛羊蕃息於是作牧養之牢而落成之言何人謂爾宣王無羊乎每三百為一羣不知幾羣也何人謂爾宣王無牛乎有九十皆犉者其他色不可盡數也矜詫其新有故拒前言無者以解其嘲也爾羊自外而來歸於牢則聚其角濈濈然不相觸也爾牛自外而來歸於牢則呞而動其爾濕濕然牛耳潤澤則無病也羊不歸而聚則不見其角之濈濈牛不歸而息亦不見其呞言來皆所以見牢之成也故首章及之或降于阿或飲于池或寢或訛傳曰訛動也爾牧來思何簑何笠何河之上濁傳曰何揭也揭音竭其謁反或負其餱音侯餱乾食也解見公劉三十維物蘇氏曰物類也傳曰異毛色者三十也疏曰每色之物皆有三十謂青赤黃白黑毛色别異者各三十也爾牲則具疏曰祭祀之牲當用五方之色故汝之祭索則有之此章亦述牛羊來歸之意或降于阿或飲于池或寢息或訛動言此者美其無所驚畏也牧人來歸何簑笠以禦暑雨或齎其乾食從牛羊之所宜適以順其性而蕃息其牲有餘備每色之物皆有三十則祭祀隨索而有也爾牧來思以薪以蒸箋曰粗曰薪細曰蒸以雌以雄爾羊來思矜矜兢兢傳曰言堅强也不騫不崩傳曰騫虧也崩羣疾也王氏曰言羊得其性而無耗敗也言羊而不言牛者羊善耗敗故也言羊不耗敗則牛可知矣麾之以肱傳曰肱臂也畢來既升牧人晝日閒暇則於牧地采薪蒸暮則以來之歸又辨其畜之雌雄者視其多寡之數也爾羊來歸其堅强矜矜兢兢然也不騫虧不羣疾又不待箠楚驅之但麾之以臂皆來升入於牢言馴擾從人意也牧人乃夢衆維魚矣旐維旟矣旐解見出車旟解見鄘干旄大人占之衆維魚矣實維豐年旐維旟矣室家溱溱傳曰溱溱衆也考牧之詩亦當有頌禱之語以終之宣王承饑饉離散之後所願者年豐而民庶也故就牧事上設為牧人之夢非牧人實有是夢也魚麗為萬物盛多之象故為豐年旟旐所以聚衆故為人民蕃庶皆設辭以頌禱耳箋疏謂牧人得此夢而獻於王非也無羊四章章八句詩緝卷十九
