body:
  text: 詩緝卷九宋嚴粲撰齊國風譜曰齊者古少皥之世爽鳩氏之墟周武王伐紂封太師吕望於齊是謂齊太公都營丘後五世哀公政哀荒淫怠慢紀侯譖之於周懿王使烹焉齊之變風始作疏曰漢書地理志云齊郡臨淄縣師尚父所封也臣瓚按臨淄即營丘也今齊之城內有丘即營丘也淄水過其南及東以丘臨水謂之臨淄齊世家云太公卒子丁公伋立卒子乙公得立卒子癸公慈母立卒子哀公不辰立是為五世程子曰君臣上下之分失則人倫亂人倫廢則入於禽獸身為禽獸之行其風可知故次以齊政令僅行於郊畿而畿內之鄭亦自為列國則王室之微甚矣於是乎齊始霸故王鄭之後次以齊也子夏言鄭音好濫淫志衛音趨數煩志趨數音促速齊音敖辟喬志敖辟喬音傲僻驕皆淫於色而害於德齊亦二南之變也雞鳴思賢妃也哀公荒淫怠慢疏曰哀公不辰癸公慈母子故陳賢妃貞女夙夜警戒相成之道也曰齊哀公詩懿王時變風自懿王始豳前此矣其始懿何也君臣相疑則幾於變矣成王悟而周公歸於是乎有雅頌制作之盛而變風之迹泯矣由懿以降變而不復正也宣號興復無能改於風之變也齊哀之荒淫罪也受譖而烹之非政也上下交失變之始也此詩直刺荒淫序言思賢妃者詩人言外之意也雞既鳴矣朝既盈矣朝音潮匪雞則鳴蒼蠅之聲曹氏曰哀公以雞鳴為蒼蠅之聲古者太師奏雞鳴則君當起今雞已鳴矣會集於朝中者已盈滿矣哀公乃謂此非雞之鳴是蒼蠅之聲耳雞鳴與蠅聲不相類見荒淫昏亂也哀公無夜氣之存矣舊説以為古之賢妃警其夫欲令早起誤以蠅聲為雞聲蠅以天將明乃飛而有聲雞未明之前無蠅聲也東方明矣朝既昌矣傳曰昌盛也匪東方則明月出之光曹氏曰哀公以東方明為月出之光蟲飛薨薨音轟朱氏曰薨薨羣飛聲甘與子同夢會且歸矣傳曰會會於朝也無庶豫子憎今曰無庶猶庶無古人辭急倒用也豫子吾子也稱其所眤也愛而稱之之辭也秦風婦愛其夫稱豫美大雅商人愛武王稱豫侯羽蟲羣飛之聲薨薨然天既曉而哀公起已晏矣猶語其所昵曰吾方甘與子卧而同夢迫於視朝而起吾會朝即歸庶無為吾子所憎也此兒女昵昵恩怨爾汝之辭持被入直刺刺顧婢子語之情狀也刺音辣語聲也聖人刪詩著此以見閨門淫昵之私無隱不顯也為戒深矣雞鳴三章章四句還音旋刺荒也曹氏曰書云外作禽荒孟子云從獸無厭謂之荒則荒者謂以田獵而荒棄政事也哀公好田獵好去聲從禽獸而無厭去平二音國人化之遂成風俗習於田獵謂之賢間於馳逐謂之好焉好如字曰齊哀公詩懿王時齊雍容文雅之俗也一旦遷染愈下獵者旁午於道畢事而歸猶意氣勃勃而不自知其非也習俗之陷溺如此哉故曰上之所好惡不可不謹也子之還兮傳曰還便捷之貌曹氏曰謂馳逐之便捷遭我乎峱之間兮峱音猱乃刀切傳曰峱山名曹氏曰在齊之郊並驅從兩肩兮傳曰從逐也獸三嵗曰肩肩亦作豜疏曰大司馬云大獸公之七月云獻豜于公則肩是大獸故言三嵗也揖我謂我儇兮儇音喧許全反傳曰儇利也箋曰譽之者以報前言還也疏曰言其便利馳逐今曰荀子云鄉曲之儇子國人好田成俗俱出田獵而相從既歸而相謂曰以子之便捷還然向來遭我於峱山之間我與子並行驅馬從逐兩獸子乃揖我謂我甚儇利也以子之能尚且見推此自矜於其黨以氣陵之之辭也子之茂兮傳曰茂美也曹氏曰謂才藝之茂美也遭我乎峱之道兮並驅從兩牡兮揖我謂我好兮子之昌兮錢氏曰昌盛壯也遭我乎峱之陽兮朱氏曰山南曰陽並驅從兩狼兮釋獸曰狼牡獾牝狼其子獥絶有力迅獾音歡獥音呌舍人曰狼牡名獾牝名狼其子名獥絶有力者名迅説文曰狼似犬鋭頭白頰髙前廣後陸璣曰其鳴能小能大善為小兒啼聲以誘人其猛健者去之數十步雖善用兵者不能免也揖我謂我臧兮傳曰臧善也詩記曰齊以遊畋成俗詩人載其馳驅而相遇也意氣飛動鬱鬱見於眉睫之間染其神者深矣夫豈一朝一夕所能反哉還三章章四句著音除又音住刺時也時不親迎也迎去聲曰齊哀公詩懿王時禮唯天子不親迎使三公迎后魯哀公曰冕而親迎不已重乎孔子曰合二姓之好以繼先聖之後以為天地宗廟社稷之主君何謂已重乎是諸侯以下皆當親迎也當時皆不親迎此詩言卿大夫士之事舉其中以明上下也俟我於著乎而傳曰俟待也門屏之間曰著釋宫曰門屏之間謂之寧疏曰孫炎云門內屏外人君視朝所寧立處也著與寧音義同充耳以素乎而疏曰塞耳也即所謂瑱也懸當耳故謂之塞耳以素絲為紞也紞懸瑱之繩也紞用雜綵線織之天子諸侯五色臣三色素色分明目所先見故先言之瑱天之去聲紞音膽尚之以瓊華乎而朱氏曰尚加也張子曰充耳非一物先以纊塞後以瓊華加之傳曰瓊華美石士之服也箋曰瓊華石色似瓊也瓊解見衛木瓜疏曰瓊玉之美名華光華也君以玉為瑱臣則不可設為嫁者之辭言其夫待我於夫家門屏之間見其充耳以素絲為紞也其紞之末加以美石如瓊之華謂瑱也服此服飾而止俟我於其家門屏之間而壻往婦家之禮不行矣是不親迎也此詩總言卿大夫士也於著於庭於堂止是待有先後耳毛以為一章述士二章述卿大夫三章述人君今從鄭義詩記曰前漢地理志載齊之風俗曰俟我於著乎而此亦其舒緩之體也雖非此篇意之所主然廣谷大川異制民生其間異俗剛柔輕重遲速異齊皆學者所當觀也詩可以觀其此類歟補傳曰齊人廢親迎之禮安然舒緩俟我於其家門屏之間俟我於庭乎而充耳以青乎而箋曰青紞之青尚之以瓊瑩乎而瑩音滎今曰瓊瑩者美石如瓊之瑩也瑩鮮潔也鄭氏云玉色似瓊似瑩非也曹氏曰英華瑩皆光采也俟我於堂乎而充耳以黃乎而箋曰黃紞之黃尚之以瓊英乎而箋曰瓊英猶瓊華也詩記曰昏禮壻往婦家親迎既奠鴈御輪壻乃先歸俟于門外婦至壻揖婦以入及寢門揖入升自西階齊人既不親迎故但行婦至壻家之禮俟我於著乎而此昏禮所謂壻俟于門外婦至壻揖婦以入之時也俟我于庭乎而庭在大門之內寢門之外此昏禮所謂及寢門揖入之時也俟我於堂乎而升階而後至堂此昏禮所謂升自西階之時也壻道婦入故於著於庭於堂每節皆俟之也著三章章三句東方之日刺衰也君臣失道男女淫奔不能以禮化也曰齊哀公詩懿王時衰謂政衰民散淫風肆行而無忌也東方之日兮傳曰日出東方人君明盛無不照察也彼姝者子姝音樞箋曰姝美也在我室兮在我室兮履我即兮朱氏曰履隨也今曰履訓踐踐其迹而從之故為隨也箋曰即就也興也君猶日也君道明盛則如日出東方無不照察今有姝美之女子來在我之室既在我之室隨我而相就是君道之昏也言我者詩人指淫夫非自我也東方之月兮曹氏曰月終魄于東彼姝者子在我闥兮闥音撻傳曰闥門內也在我闥兮履我發兮傳曰發行也朱氏曰躡我行去也臣猶月也月生於西則其明未盛月出東方亦望後明盛之時也東方之日二章章五句東方未明刺無節也朝廷興居無節號令不時詩記曰此一語贅蓋見詩中有自公令之之文而妄附益之耳挈壺氏不能掌其職焉挈愆之反箋曰挈壺氏掌漏刻者夏官序云挈壺氏下士六人曰齊哀公詩懿王時此詩主刺哀公非刺挈壺氏也李氏曰觀人之政者見其一失則逆料其餘也東方未明顛倒衣裳倒音島顛之倒之自公召之箋曰自從也羣臣之朝辨色始入今東方猶未明自可徐徐入朝而羣臣促遽至乃顛倒其衣裳者由朝人從君所來而召之是興居無節號令不時也東方未晞音希傳曰晞明之始升疏曰晞是日之光氣湛露匪陽不晞謂見日之光而物乾蒹葭白露未晞亦為乾義此言東方未明無取於乾故言明之始升今曰日氣所乾為晞未晞未有日之乾氣則日未出也顛倒裳衣倒之顛之自公令之令去聲朱氏曰令猶召之也折栁樊圃傳曰栁柔脆之木樊藩也圃菜園也折栁以為藩園無益於禁也狂夫瞿瞿音句傳曰瞿瞿無守之貌朱氏曰瞿瞿驚顧之貌曹氏曰瞿瞿左右視也今曰蟋蟀瞿瞿言良士則驚懼之謂也此詩瞿瞿言狂夫則驚愕之謂也西漢吳王濞傳膠西王瞿然駭師古云瞿然無守之貌又檀弓曽子聞之瞿然不能辰夜傳曰辰時也不夙則莫音慕哀公興居無節詩人歸咎於司漏者以諷之謂栁柔脆之木折之以藩籬其菜園豈足恃以為內外之限亦猶瞿瞿然無守之狂夫不能時節其夜之早晚不失之早則失之晚豈足恃以司晝夜之節然非專挈壺氏之罪也所以使之至此者誰歟杜蕢酌而飲師曠李調蕢音快乃所以規晉平也東方未明三章章四句南山刺襄公也疏曰襄公諸兒僖公祿甫子鳥獸之行去聲淫乎其妹箋曰襄公之妹魯桓公夫人文薑也大夫遇是惡作詩而去之曰齊襄公詩莊王時大夫去國其心蓋有大不得已者襄公之惡不可道矣齊之臣子難言之故此詩不斥其君之惡而唯歸咎於魯桓與敝笱意同後序以雄狐為指齊襄故云鳥獸之行非也南山崔崔觜之平子雖反韻作嗺傳曰齊南山也崔崔髙大也雄狐綏綏解見衛有狐魯道有蕩唐之上濁傳曰蕩平易也齊子由歸傳曰齊子文薑也箋曰婦人謂嫁曰歸既曰歸止曷又懷止傳曰懷思也興也魯為望國而在齊之南故指南山以言魯謂南山崔崔然髙大有雄狐綏綏然遲疑而求其匹喻魯桓公求昏於齊也咎其後之不能制而鄙之之辭猶氓詩怨其夫之見棄則述其初來誘己以氓之嗤嗤言之也爾魯桓既求匹於我我齊國遂以文薑嫁之適魯之道蕩然平易衆所觀瞻齊子文薑由此道而嫁歸於魯也既嫁歸於魯矣何為又思齊乎是魯桓不能制之而使至於此也猶敝笱惡魯桓不能防間之意蓋齊人不欲斥言其君之惡而歸咎於魯之辭也辭雖歸咎於魯所以刺襄公者深矣説者多以前二章刺齊襄後二章刺魯桓後二章皆言取妻其為刺魯桓明矣但以前二章為刺齊襄而後二章方刺魯桓上下章辭意不貫兼齊人以雄狐目其君於義有害今解一章以雄狐喻魯桓之求匹二章以屨緌喻魯桓之得耦三章四章以藝麻析薪喻魯桓以正禮取文薑上下章辭意乃歸一齊人不當以雄狐目其君以目魯君則無嫌也葛屨五兩屨音句兩音亮今曰天官屨人注復下曰舄禪下曰屨士冠禮云夏葛屨冬皮屨禪音丹曹氏曰屨人辨外內命夫命婦之命屨功屨散屨注云有纁屨黃屨白屨黑屨散屨謂去飾也所謂五兩者纁黃白黑散也冠緌雙止緌如誰反説文曰緌纓也魯道有蕩齊子庸止傳曰庸用也朱氏曰用此道而嫁於魯既曰庸止曷又從止朱氏曰從相從也葛屨賤而在下五兩每兩二隻言屨之有匹也冠之纓緌貴而在上雙止言屨之有匹也屨與履為兩緌與緌為雙喻貴賤各有匹偶魯桓取文薑是匹敵矣何為不能制之而使從齊襄乎此則非其偶矣藝麻如之何傳曰藝樹也衡從其𤱔衡從音橫蹤曹氏曰齊民要術云種麻得良田耕不厭熟縱橫七遍以上則麻生無葉衡從其𤱔蓋古法也取妻自納采以至親迎必待六禮備而後成昏夫豈苟哉故必告父母而以藝麻為喻也取妻如之何取音娶必告父母既曰告止曷又鞠止鞠音菊傳曰鞠窮也欲樹麻者如之何必縱橫耕治其田𤱔然後可以得麻欲取妻者如之何必先告於父母然後可以得妻言其事隆重而不苟合也今魯桓公之取文薑也既告而成禮矣曷為不能禁止而使之窮極其惡以至此也納之不正則容有不敢制者今魯侯既以正禮納文薑何謂不能裁制之也考之左傳惠公生桓公而薨桓公母仲子亦以隱二年薨桓公三年文薑乃歸魯是桓公取妻之時無父母矣此言告父母謂正禮取之耳析薪如之何匪斧不克傳曰克能也曹氏曰析薪者斷取於彼以供我㸑事既析則於本根不可復合取妻者取他姓之女以供我中饋既嫁則於父母兄弟日逺取妻如之何匪媒不得既曰得止曷又極止析薪者必用斧亦猶取妻者必用媒文薑之惡極矣何為使之至於此極也南山四章章六句甫田大夫刺襄公也無禮義而求大功不修德而求諸侯志大心勞所以求者非其道也曰齊襄公詩莊王時禮義非為求功修德非為求諸侯後序為襄公言之耳無田甫田上田音佃下田如字傳曰甫大也疏曰無田之田墾耕也甫田之田土地也維莠驕驕莠音酉曰莠草似苗也解見大田朱氏曰驕驕茂盛也今曰驕驕桀桀皆言人力不足芟夷不及見其蔓延長茂無如之何如有驕縱桀傲之狀無思逺人補傳曰逺人諸侯也勞心忉忉音刀傳曰忉忉憂勞也比也毛氏以為興今從朱氏言人無得耕治大田耕大田而力不給則莠草茂盛有驕傲之狀矣公無得思逺人思逺人而不至則勞心忉忉然憂勞矣甫田非不可耕逺人非不可致今言無田無思者蓋言襄公求之者非其道耳若謂以若所為求若所欲則必不可得徒勞其心也非謂甫田不可田逺人不可思也思逺人謂求諸侯也無田甫田維莠桀桀音訐傳曰桀桀猶驕驕也無思逺人勞心怛怛旦末反傳曰怛怛猶忉忉也婉兮孌兮傳曰婉孌少好貌總角丱兮丱音慣傳曰總角聚兩髦也丱幼稚也疏曰內則云男女未冠笄者總角襟纓其總聚其髦以為兩角也襟琴之去襟猶結也朱氏曰丱總角貌今曰言兩角如丱字之形未幾見兮幾上聲突而辨兮突屯之入從韻釋文曰凡卒相見謂之突錢氏曰忽見也傳曰辨冠也箋曰加冠謂成人也疏曰周禮掌冠冕者其職謂之辨師則辨者冠之大號有童子婉孌然少好總聚其髮以為兩角如丱字之形未及幾次見之突然已加冠辨猶襄公躐等而躁求也闕黨童子將命孔子曰非求益者也欲速成者也甫田三章章四句盧令音零刺荒也襄公好田獵畢弋好去聲疏曰畢以掩兔網小而柄長形如畢星弋解見鄭女曰雞鳴曹氏曰言田獵以及畢弋則巨細俱舉矣古者禽獸多而人民少或為人害故包羲氏作結繩而為網罟以佃以漁本以為人除害而已後世因以寄軍政焉包音庖而不修民事百姓苦之陳古以風焉風音諷曰齊襄公詩莊王時盧令令傳曰盧田犬也令令纓環聲疏曰戰國䇿云韓國盧天下之駿犬也東郭逡海內之狡兔也韓盧逐東郭繞山三越岡五兔極於前犬疲於後俱為田父之所獲是盧為田犬也環在犬之頷下如人之冠纓也其人美且仁言古之田獵者其盧犬頷下有環為聲令令然以令令形容其環聲若親聞而喜之有聞車馬之音欣欣喜色之意非喜其田犬也以其人之有美德而且有仁恩也猶曰人好鳥亦好也襄公之為人不可道矣國人素薄之見其田獵而陳古以風謂古之田獵者若而人今之田獵者若而人田犬猶古也其人則非矣其人之辭雖指古人其意乃評品襄公之為人而深鄙惡之謂其為何等人也盧重環重平聲傳曰重環子母環也疏曰謂大環貫一小環也其人美且鬈音權傳曰鬈好貌朱氏曰鬚鬢好貌盧重鋂音梅傳曰一環貫二也疏曰一大環貫二小環也其人美且偲音猜傳曰偲才也盧令三章章二句敝笱音苟刺文薑也齊人惡魯桓公微弱不能防間文薑使至淫亂為二國患焉曰齊桓公詩莊王時補傳曰文薑之事齊魯之醜均也南山敝笱意同皆歸咎於魯桓齊臣子之情也此詩魯桓身後所作故首序直言刺文薑也按春秋文薑以桓二年歸魯中間無如齊之事至十八年桓公會齊侯于濼音剝又音洛遂與文薑如齊齊侯通於文薑使彭生殺桓公于車詩人刺不能防間正謂此也今詩言齊子歸止其從如雲不言桓公同往是指桓公身後文薑獨如齊之事自莊二年夫人薑氏會齊侯于禚音酌以後不絶書莊二年會禚四年享齊侯于祝丘五年如齊師七年會防又會榖敝笱在梁笱梁皆解見弼谷風其魚魴鰥毛音關鄭音昆魴解見陳衡門今曰傳以鰥為大魚蓋據孔叢子之説衛人釣於河得鰥魚焉其大盈車遂以魴鰥及鱮皆為大魚箋以魴鰥魚之易制者蓋以魴本中魚與盈車之鰥小大相逺遂以鰥為魚子諸家或從毛或從鄭今魴鱮皆中魚則鰥亦中魚也衛人所釣鰥魚偶得犬者以為大而詫之此詩配魴鱮言之則不必便是其大盈車者入笱中者必非大魚齊子歸止其從如雲從去聲傳曰言盛也興也笱能制魚則魚入而不復可出今以敝笱施於魚梁其中有魴鰥之魚由笱之敝敗不能制之則入而復出喻魯桓微弱不能防制文薑故既嫁而復歸也此詩作於魯桓身後追咎前事也齊子文薑反歸於齊其從之者如雲之盛無復愧恥忌憚也敝笱在梁其魚魴鱮音序徐之上濁曰鱮鰱也今曰疏引陸璣云鱮似魴厚而頭大魚之不美者故里語云網魚得鱮不如啖茹其頭尤大而肥者徐州人謂之鰱或謂之鱅然今鰱鱅又相似而小别鰱頭小鱅頭大也齊子歸止其從如雨如雨點之多言從之者衆猶衆多如雨也敝笱在梁其魚唯唯上聲傳曰唯唯出入不制齊子歸止其從如水一魚或出或入而衆魚隨之唯然順從無復限制也如水言從之者順猶孟子言民歸之如水之就下也敝笱三章章四句載驅齊人刺襄公也無禮義故盛其車服疾驅於通道大都與文薑淫播其惡於萬民焉曰齊襄公詩莊王時載驅薄薄音朴傳曰薄薄疾驅聲也簟笰朱鞹笰音弗鞹苦郭反傳曰簟方文席車之敝曰笰疏曰用竹為席其文必方鞹革也獸皮治去毛曰革以韋靶車也靶音霸魯道有蕩唐之上濁齊子發夕蘇氏曰夕發於魯言有疾驅其車之聲薄薄然以竹簟為車之笰蔽又有朱色之皮革以靶車之前後者乃魯之道路蕩然平易而齊子文薑以夕時發於魯而來齊也其來何為耶不必言及襄公而襄公之惡自見矣車聲之疾駭羣聽也車飾之美繫衆觀也道路坦夷非隱處也無恥甚也舊説上二句言襄公下二句言文薑一章四句之內分作二人辭意斷續碩人説衛侯夫人云翟茀以朝孔氏於彼疏云婦人乘車不露見車之前後設障以自隱蔽謂之茀則婦人之車亦言茀矣今以四句並言文薑文意方貫四驪濟濟驪音離濟隮之上朱氏曰驪馬黑色也曹氏曰所謂鐵驪也傳曰濟濟美貌垂轡瀰瀰泥之上傳曰瀰瀰衆也錢氏曰瀰瀰轡柔貌魯道有蕩齊子豈弟豈音凱傳曰豈樂也弟易也文薑車駕四馬皆是鐵驪之色濟濟然而美其六轡之垂者瀰瀰然而衆樂易安舒恬然無慚恥之色也汶水湯湯汶音問湯音商曹氏曰汶水有二許氏以為出琅邪朱虛縣東泰山東至安丘入濰桑欽以為出泰山萊蕪縣西南入濟班孟堅兩存其説閔子騫曰則吾必在汶上矣説者主桑欽義以為在齊南魯北在汶上者欲如齊也按琅邪泰山二郡皆齊地所有則汶水在齊境矣傳曰湯湯大貌行人彭彭音邦傳曰彭彭多貌今曰經中彭彭字唯此詩音邦多也自餘皆無音並如字音棚俗併讀如邦誤矣魯道有蕩齊子翺翔傳曰翺翔猶倣徉也倣徉音旁羊汶水在齊境自魯至齊必渡汶水言汶水湯湯然大其處行人彭彭然多文薑自魯渡汶水而來其道路蕩然平易衆庶往來觀瞻所繫而文薑翺翔倣徉無恥甚矣舊説謂汶水之上蓋有都焉襄公與文薑所會蓋既以疾驅為襄公則道間必有所會之地以意增之曰蓋有都焉其辭疑矣考春秋薑氏會齊侯之地禚也祝丘也防也榖也無會汶之事禚音酌汶水滔滔音叨傳曰滔滔流貌行人儦儦音標傳曰儦儦衆貌魯道有蕩齊子遊遨朱子曰猶翺翔也載驅四章章四句猗嗟猗音伊刺魯莊公也疏曰魯莊公同桓公允子齊人傷魯莊公有威儀技藝然而不能以禮防間其母失子之道人以為齊侯之子焉齊襄公詩莊王時陳氏曰趙氏春秋云或曰子何以制母乎曰夫死從子通乎其下況國君乎君者人神之主也風教之本也不能正家如正國何若莊公者哀痛以思父誠敬以事母威刑以馭下車馬僕從莫不俟命夫人徒往乎夫人之往也則公威命之不行而誠敬之不至也文薑之事齊襄大惡也南山既歸咎於魯桓敝笱又刺魯桓不能防間其妻猗嗟又刺魯莊不能防間其母皆歸咎於他人蓋不忍斥言其君之惡者齊臣子之情也猗嗟昌兮傳曰猗嗟歎辭疏曰傷歎之聲錢氏曰昌盛壯也頎而長兮頎音祁傳曰頎長貌抑若揚兮錢氏曰若猶而也美目揚兮錢氏曰揚起也言目俊巧趨蹌兮蹌音鏘疏曰曲禮注云行而張足曰趨則趨疾行也傳曰蹌巧趨貌射則臧兮箋曰臧善也齊人傷歎此莊公之貌甚昌而盛壯矣又頎然修長矣抑而揚言進退髙下不失其宜也又美目揚起矣又巧為趨步而蹌然矣又射則臧善矣威儀技藝本是可美之事而傷歎言之有所不滿何也若曰莊公威儀技藝之美無一欠闕所可惜者蓋有在矣文薑之事蓋難言之首章微寓其意於猗嗟之辭而未遽言之也猗嗟名兮朱氏曰名猶稱也美目清兮朱氏曰目清明也錢氏曰言精神不昏也儀既成兮王氏曰成猶備也終日射侯射音石餘如字不出正兮正音征箋曰正所以射於侯中者天子五正諸侯三正大夫二正士一正外皆居其侯中三分之一焉疏曰正者侯中所射之處大射則張皮侯而設鵠賔射則張布侯而畫正正大如鵠三分侯廣而正居一焉侯身長一丈八尺者正方六尺侯身一丈四尺者正方四尺六寸大半寸侯身一丈者正方三尺三寸少半寸正以綵畫為之射人有五正三正二正畫五正之侯者中朱次白次蒼次黃玄居外三正者損玄黃二正者去白蒼而畫以朱緑其外之廣皆居侯中三分之一鄭言中三尺是中央之綵方二尺以外準其采之多少正之廣狹均布之以至於外畔也正與鵠大小同矣鵠乃用皮謂之正者正者正也亦鳥名齊魯之間名題肩為正正鳥之捷黠者射之難中以中為俊故射取名馬大射射鵠賔射射正此言不出正兮據賔射為文也展我甥兮箋曰展誠也姊妹之子曰甥又傷歎莊公名稱之美目視之清明威儀之成備當賔射之時終日射所張之侯不出於侯中之正展誠也為我齊侯之甥又言其為齊侯之子故此説為拒外議之辭譏之深矣猗嗟孌兮傳曰孌壯好貌清揚婉兮朱氏曰清日之美揚眉之美考見鄘君子偕老舞則選兮選去聲箋曰選者謂於倫等最上今曰選猶精也射則貫兮今口貫穿也如貫革之射善射者中物而有力故能貫之射不穿札言不善射也舊以貫為中與上章重復矣四矢反兮箋曰反復也以禦亂兮詩記曰此詩嗟歎再三而莊公所大闕者不言可見矣又傷歎莊公孌然壯好其目清明而其眉揚起婉然而好舞則甚精射則穿貫其革每射四矢皆復其故處射藝之精如此尚足以禦禍亂乃不能防間其母乎莊公弓矢之精觀其以金僕姑射南宫長萬則可見矣始槩言其射之臧下乃詳言其所以為臧不出正兮言其中也射則貫兮言其中而有力也四矢反兮言其再射又中前處也三者所以為臧也變風之體意在言外有全篇首尾皆託之他辭乍讀之茫然不覺所謂但中間冷下一二語自然使人默會如此詩極言其人容貌威儀技藝之美而以歎息之辭發之是其人所不足者必有在於容貌威儀技藝之外矣方此時採得於齊未有序説不知所刺何人所言何事中間有展我甥兮一句只一甥字便見得是刺魯莊公只一展字便見得是人以魯莊為齊侯之子詩人設為諱護之辭以譏之讀者既默會其意乃再諷詠之方見得自猗嗟而下句句稱美處節節是歎息不滿處辭不急迫而意深切矣猗嗟三章章六句詩緝卷九
