body:
  text: 詩緝卷十八宋嚴粲撰南有嘉魚之什小雅陸氏曰自此至菁菁者莪六篇并亡篇三是成王周公之正小雅南有嘉魚樂與賢也樂音洛大平之君子大音泰至誠樂與賢者共之也朱氏曰此亦燕饗通用之樂南有嘉魚南山有臺皆燕賢之樂歌故曰樂與賢樂得賢言以樂樂之也猶射義言騶虞者樂官備也采蘋者樂循法也采蘩者樂不失職也皆以播之樂歌爲樂之也嘉魚謂之與賢以詩言有酒燕賔是與之相親也有臺謂之得賢以詩言邦家之基爲民父母因以致福夀名譽是得之爲用也陳氏曰大平之君意滿志得侈心日生得賢則未必有益於治失賢則亦未必趨於亂是以賢者漸致踈棄不肖者漸致狎昵間有勉彊與賢者共享其樂亦不能久今也至誠樂與賢者共之非天資重厚學與性成不能如是也南有嘉魚傳曰江漢之間魚所産也箋曰南方水中冇善魚烝然罩罩張教反工肅曰烝衆也傳曰罩篧也篧音鷟助角反郭璞曰捕魚籠也李廵曰編細竹以爲罩無竹則以荆謂之楚篧君子有酒丘氏曰君子成王也今曰箋以君子爲斥時在位者今不從嘉賔式燕以樂音洛協句五殺反丘氏曰嘉賔新進之賢也箋曰式用也興也魚深潛者也南方江漢之間産善魚編細竹以爲罩而籠取之羣然罩之又罩而後得之興賢者隱伏於下必人君勤求而後得之也今賢者既至成王有酒與此新至之嘉賔用燕飲而相樂未至則勤求之已至則燕飲之是樂與賢也成周大平持守之時所用之人必先有德立政之書卷阿之詩皆曰用吉士此詩魚曰嘉則味之美瓠曰甘則可以養人鵻爲孝鳥皆喻吉士也左太沖蜀都賦云嘉魚出於丙穴注云丙穴在漢中沔陽縣北有乳穴二所常以三月取之丙地名也山隂陸氏曰嘉魚鯉質鱒鱗肌肉甚美食乳泉出於丙穴穴口向丙故曰丙也如上所言則以嘉爲魚名然下文樛木非木名則嘉魚亦非魚名要之詩人以魚之嘉者瓠之甘者喻賢耳南有嘉魚烝然汕汕音訕傳曰汕汕樔也樔音嘲韻作罺箋曰今之撩罟撩音料又音僚李廵曰以薄取魚也李氏曰山隂陸氏云上籠之如罩下撩之如汕至誠之道也淮南子云罩者抑之罾者舉之爲之雖異得魚一也觀此則知詩人先言罩後言汕者以見其求賢無方也君子有酒嘉賔式燕以衎看之去傳曰衎樂也南有樛木樛音鳩甘瓠纍之瓠音護纍音縲詩記曰瓠有甘有苦甘瓠則可食者也今曰纍纒繞也君子有酒嘉賔式燕綏之箋曰綏安也興也南方有樛然下曲之木故瓠之甘而可食者得上而纒綿之興成王屈已下賢則賢者得以上進固結而不可解也綏之謂燕飲以安之醴酒不設而穆生去蓋禮貌衰則不能安賢者之心也翩翩者鵻音追曰鵻鵓鳩也解見四牡傳曰鵻一宿之鳥箋曰一宿者一意於其所宿之木也喻賢者有専一之意於我烝然來思䟽曰思語辭君子有酒嘉賔式燕又思今曰思皆爲語辭人君之於賢始則多方勤求之繼則禮貌以招延之其後則賢者聞風自至如翩翩然飛者是孝鳥鵓鳩羣然而自來也卷阿言吉士以有孝有徳稱之故此詩以孝鳥喻賢也又思者燕而又燕見交際之款洽所謂至誠樂與也或云思爲語助者上字協韻思慮之思者本字協韵來字與思字協韵然漢廣求思泳思方思皆語助其上字皆不協韻見以古人韵緩二詩皆語辭就以爲韻也南有嘉魚四章章四句南山有臺樂得賢也樂音洛得賢則能爲邦家立大平之基矣爲去聲補傳曰樂與者樂與賢者相處也樂得者樂得賢者爲用也賢者爲立治之本成王之樂樂以天下也南山有臺補傳曰南北指周地之南北也陸璣曰臺莎草也釋草曰臺夫須夫音符今曰以莎草爲衣則謂之簑莎爲草名簑爲衣名莎草又可爲笠北山有萊傳曰萊草也䟽曰陸璣云萊草名其葉可食今兖州人烝以爲茹謂之萊烝以上下類之皆指草木之名其義或當然矣朱氏曰萊草名葉香可食者樂只君子樂只音洛止丘氏曰只辭也邦家之基樂只君子萬夀無期今曰無期言無窮也有期則有時而止興也周地之南山則有臺北山則有萊喻周家得賢之盛隨取隨有樂哉成王可以爲邦家之基本可以得萬物之福而無期也陳氏曰壽夭天也得賢何益於夀曰君子有四時朝夕晝夜節宣其氣勿贏其體苟不近賢者則非鬼非食惑以喪志雖欲夀得乎南山有桑曹氏曰可𧖟以爲衣北山有楊曰楊蒲栁可爲箭笴又可爲屋材解見秦車鄰曹氏曰可爲舟樂只君子邦家之光樂只君子萬夀無疆臺萊桑楊把李栲杻枸楰多其名者喻賢之多而皆有用也得賢之盛則邦之榮懷而福夀名譽之所歸也南山有把音起陸璣曰杞一名狗骨山材也其𣗳如樗理白而滑可以爲函及檢板其子爲木蝱可合藥曹氏曰梓把也三把考見四牡北山有李曹氏曰李可食樂只君子民之父母樂只君子德音不已得賢則澤及於民而民親戴之稱頌之南山有栲音考曰栲山樗也可爲車輻解見唐山有樗北山有杻音紐曰杻檍也可爲弓弩榦解見唐山有樞樂只君子遐不眉夀樂只君子德音是茂箋曰茂盛也遐不眉夀猶云不遐逺眉夀乎秀眉夀證也南山有枸音矩傳曰枳枸也䟽曰釋木無文陸璣曰枸𣗳高大似白楊有子著技端大如指長數寸噉之甘美如飴八九月熟今官園種之謂之木蜜本從南方來其木能令酒薄若以爲屋柱一室之内酒皆少味也北山有楰音庾釋木曰楰鼠梓郭璞曰楸屬也陸璣曰其𣗳葉木理如梑山楸之異者今人謂之苦楸是也曹氏曰宫室之良材樂只君子遐不黃耇音苟傳曰黄黄髪也耇老也䟽曰舍人云老人髪白復黄也樂只君子保艾爾後艾音礙沈音刈傳曰保安也艾養也曹氏曰凡此皆可用之材成王能得之以爲用兼収並蓄巨細不遺國家賴之是以基本堅固事業光華人民有所怙恃而治安彊盛名譽𤼵越福禄無窮不止於其身而且有以燕及子孫是可樂也䟽引宋玉賦枳枸來巢以證毛說然風賦字作枳句李善注橘踰淮爲枳句曲也句音溝非毛義也南山有臺五章章六句由庚今曰李善注補亡詩云由從也庚道也言物並得從隂陽之道理而生也萬物得由其道也崇丘今曰李善注補亡詩云萬物生長於高丘者皆遂其性得極其高大也萬物得極其高大也由儀今曰儀謂用物以禮不暴殄也萬物之生各得其宜也有其義而亡其辭箋曰此三篇者鄉飲酒燕禮亦用焉曰乃問歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀亦遭世亂而亡之燕禮又有升歌鹿鳴下管新宫新宫亦詩篇名也辭義亡皆無以知其篇第之處釋文曰此三篇義與南陔等同依六月序由庚在南有嘉魚前崇丘在南山有臺前今同在此者以其俱亡使相從耳䟽曰言間歌者堂上堂下遞歌不比篇而間取之笙者在笙之中吹案魚麗武王詩也而與嘉魚間歌南陔等三篇亦武王詩也乃在堂下笙歌之是武王之詩得下管用之也蓼蕭蓼音六澤及四海也蓼蕭湛露彤弓皆天子燕饗諸侯之樂歌而其用有别湛露彤弓以顯允君子我有嘉賔稱諸侯之美則爲燕饗諸侯無疑也蓼蕭之詩以零露喻王澤以既見君子稱天子其下皆稱贊天子之辭若天子用之以燕諸侯不應自稱已之美而不稱諸侯之美蘇氏謂人君以鹿鳴五詩燕其臣羣臣以天保答其歌於其燕也皆用之今以蓼蕭之詩亦諸侯答湛露彤弓之歌故本序不言燕諸侯而云澤及四海也諸侯以蕭草自喻君臣之辭也箋以爲四夷之長則拘矣蓼彼蕭斯傳曰蓼長大貌曰蕭香蒿也萩也牛尾蒿也萩音秋零露湑兮湑須之上曹氏曰湑潤澤也既見君子箋曰君子天子也我心寫兮傳曰寫輸寫也今曰心有憂則鬰而不泄如傾寫器中之物則舒快矣燕笑語兮是以有譽處兮處音柞錢氏曰譽名也處所處之位也興也此爲諸侯歌之以答君故以微草自喻言蓼然長大者是彼蕭之㣲草天之零露湑然潤澤無㣲不被喻我諸侯來朝王者推恩以接之無所不及也蕭茂則受露多故以蓼言之也諸侯朝見天子輸寫其心謂傾蓋無留藏也天子與之燕飲而笑語接之以温厚故下情喜恱稱贊天子云宜其有譽有處也有譽則得其名有處則保其位大榮大安也既見者幸辭也喜見之也毛氏曰蕭蒿也釋草云蕭萩李廵云萩一名蕭郭璞曰即蒿也如上所言則蕭即蒿也釋草又云蒿菣蔚牡菣郭璞云菣今青蒿牡菣無子者如上所言則蒿非蕭也山隂陸氏云蒿之類至多陸璣云蕭今人所謂萩蒿或謂之牛尾蒿似白蒿莖麤科生有香氣故祭祀以脂爇之爲香以此言之蒿者總名也曰蕭者蒿之香者也故取蕭祭脂䟽以爲香蒿也凡諸蒿曰蘩者白蒿也曰苹者藾蒿也曰菣者青蒿也曰蔚者牡蒿也馬薪蒿也曰莪者蘿蒿也莪蒿也䕲蒿也角蒿也又有邪蒿蔞蒿之名見蒿之類不一菣去刄反蓼彼蕭斯零露瀼瀼音穰傳曰瀼瀼露蕃貌既見君子爲龍爲光傳曰龍寵也其德不爽傳曰爽差也詩記曰四海諸侯逺近小大親踈亦不齊矣而王者德施之普各稱其分莫不滿足所謂其德不爽也夀考不忘諸侯既見天子而燕飲則爲恩寵爲光耀榮其待遇也於是稱天子之德無有差爽謂待諸侯以禮也願其夀考而不忘於人謂常愛戴之也蓼彼蕭斯零露泥泥上聲傳曰泥泥霑濡也既見君子孔燕豈弟豈音愷箋曰孔甚也傳曰豈樂弟易也宜兄宜弟詩記曰兄弟自同姓諸侯親者言之四海諸侯莫不在其中矣令德夀豈孔燕猶言盛燕謂其禮甚設也盛燕而又豈樂弟易情文俱至也於是稱天子能宜其兄弟之國與之親睦有令善之德夀而且樂也舉同姓之國者以親該踈也蓼彼蕭斯零露濃濃音農又如字傳曰濃濃厚貌既見君子鞗革沖沖鞗音條沖音蟲傳曰鞗轡也革轡首也冲冲垂飾貌䟽曰轡靶也馬轡所靶之外有餘而垂者謂之革鞗皮爲之故云鞗革靶音霸和鸞雝雝今曰和鸞皆銘也毛以爲和在軾鸞在鑣鄭以爲戎車鸞在鑣乘車鸞在衡詩記曰後漢志注云下實周禮注和鸞皆以金爲鈴馬動則鸞鳴鸞鳴則和應舒則不鳴逆則失音故詩云和鸞雝雝言得其和也萬福攸同今曰諸侯同受福賜也天子賜諸侯以車馬其鞗革沖沖然垂飾其和鸞之聲雝雝然和諸侯受福均也采菽言萬福攸同瞻彼洛矣言福禄既同與此一也蓼蕭四章章六句湛露湛直減反天子燕諸侯也朱氏曰文四年左傳寗武子云昔諸侯朝正於王王宴樂之於是乎賦湛露湛湛露斯傳曰湛湛露茂盛貌匪陽不晞音希傳曰陽日也晞乾也厭厭夜飲厭音淹傳曰夜飲私燕也宗子將有事則族人皆侍不醉而出是不親也醉而不出是渫宗也箋曰天子燕諸侯之禮亡此假宗子與族人燕爲說耳燕飲之禮宵則兩階及庭門皆設大燭焉䟽曰主法自當留賔賔則可以辭主諸侯皆當辭出但主得其辭異姓則聽之出同姓則留之飲也燕飲當以晝不醉無歸興也湛湛然茂盛之露非見朝陽則不乾夜飲厭厭然厭足非至醉不歸左傳無厭將及我姜氏何厭之有皆謂飽足厭厭夜飲爲以漸至醉浸漬厭足之意毛以爲安孔釋以爲閑蘇以爲久其意一也湛湛露斯在彼豐草傳曰豐茂也厭厭夜飲在宗載考傳曰夜飲必於宗室朱氏曰宗室蓋路寢之屬也箋曰載之言則也考成也草茂則得露多喻夜飲在路寢而成禮受恩優渥也燕禮云膳宰具官饌于寢東注云寢路寢也當從朱氏湛湛露斯在彼把棘䟽曰把棘之木顯允君子朱氏曰君子指諸侯爲賔者也莫不令德杞棘得露雖厚而枝不低垂喻顯明允信之君子飲酒雖多而德將無醉也其桐其椅音伊解見定之方中其實離離傳曰離離垂也歐陽氏曰喻諸侯在燕有威儀耳豈弟君子莫不令儀桐椅柔木而實離離喻君子飲酒之時有令儀也湛露四章章四句彤弓彤音同天子錫有功諸侯也朱氏曰此天子燕有功諸侯而錫以弓矢之樂歌也書文侯之命彤弓一彤矢百盧弓一盧矢百僖二十八年左傳晉文公敗楚於城濮獻功於王王饗醴命晉侯侑賜彤弓一彤矢百玈弓矢千玈音盧文四年衞寗武子曰諸侯敵王所愾而獻其功王於是乎賜之彤弓一彤矢百玈弓矢千以覺報宴注覺明也以明報功宴樂䟽曰寗武子所言及晉文侯文公所受皆并有玈弓此詩獨言彤弓者以二文皆先彤後玈弓少玈多舉重可以包輕故直言彤弓也有弓則有矢言弓則矢可知故亦不言矢也陳氏曰春秋所載皆謂諸侯有功則王賜之弓矢以旌伐功而已未嘗謂既賜然後得専征也王制言賜弓矢然後征蓋言天子命諸侯征伐故賜弓矢以將王靈耳安得有専征之言乎鄭氏遽謂賜弓矢然後得専征伐由漢而下有無君之心者徼求弓矢之賜脅諸侯而肆其姦者紛然蓋成康啟之也詩記曰所謂専征伐者如四夷入邊臣子簒弑不容待報者其他則九伐之法乃大司馬所職非諸侯所専也與後世疆臣拜表輙行者異矣彤弓弨兮弨音超䟽曰彤赤也爲弓者皆漆之以禦霜露漆之爲色赤黒而已彤既是赤則知玈者爲黒也色以赤者周之所尚故賜弓赤一而黒十以赤爲重耳其體同異未聞傳曰弨弛貌受言藏之李氏曰言語辭也箋曰受出藏之我有嘉賔中心貺之傳曰貺賜也鐘鼓既設一朝饗之箋曰一朝早朝也大飲賔曰饗飲音䕃䟽曰饗者烹大牢以飲賔是禮之大者周語云王饗有體薦燕有折爼公當饗卿當燕是其禮盛也言一朝者言王殷勤於賔早朝而即行禮燕或至夜饗則如其獻數成禮而罷故云一朝元年左傳云鄭饗趙孟禮終乃燕是饗不終日也天子以彤弓賜有功諸侯弨然而弛賜弓不張也令諸侯受藏之示珍重之意也又稱此受賜諸侯爲嘉賔言吾中心至誠貺賜之故陳鐘鼓之樂一朝設饗禮而畀之饗禮用早朝也彤弓非常賜也鐘鼓大樂也饗盛禮也設盛所以重彤弓之賜也彤弓弨兮受言載之傳曰載以歸也箋曰出載之車也我有嘉賔中心喜之鐘鼓既設一朝右之右助也右與宥侑通皆助也莊十八年左傳云王饗醴命之宥注以幣物助歡也僖二十五年二十八年皆云饗醴命宥是饗禮必有賜以爲宥而彤弓則宥之大者也彤弓弨兮受言櫜之櫜音高傳曰櫜韜也韜音叨本又作㢭釋文云弓衣也我有嘉賔中心好之好去聲鐘鼓既設一朝醻之醻音讎傳曰醻報也䟽曰王肅云報功也鄭以醻爲獻醻但酬酢是燕禮其饗禮爲訓共儉爵盈而不飲未必有醻酢也彤弓三章章六句菁菁者莪菁音精樂育材也樂音洛君子能長育人才長音掌則天下喜樂之矣陳氏曰小雅之詩皆因某事而歌某詩菁菁者莪之詩宜何歌乎余以謂天子行禮於學校而宴飲之時則歌此詩焉樂與賢樂得賢樂育材三詩一體皆言以樂樂之育材於學校而燕飲作樂歌此詩焉是樂育材也以君心之樂感人心之樂義理之樂同也詩皆述天下之喜樂而人君樂育之意自見矣菁菁者莪傳曰菁菁盛貌曰莪莪蒿也解見蓼莪在彼中阿傳曰中阿阿中也大陵曰阿既見君子樂且有儀興也莪蒿雖㣲物美而可食故以喻人材言菁菁然茂盛之莪蒿由生於阿中得阿之長養而然喻君子能長育人材無㣲不遂也既見此能育材之君子則不喜樂而有威儀樂見良心之興起有儀見善教之作成說者多以樂且有儀指君子非也既見者幸辭也喜見之也今考詩中既見君子重言二十有二見於九詩汝墳風雨唐揚之水車鄰出車蓼蕭頍弁隰桑及本詩或妻見其夫或國人見賢者或臣見其君凡既見君子之下其接句皆述喜之之情謂見君子者喜非所見者喜也若以樂且有儀爲君子則既見二字無所歸下云我心則喜樂即喜也菁菁者莪在彼中沚音止傳曰中沚沚中也小渚曰沚解見采蘩既見君子我心則喜菁菁者莪在彼中陵傳曰中陵陵中也既見君子錫我百朋箋曰錫賜也古者貨貝五貝爲朋䟽曰言古者實此貝爲貨也五貝者漢書食貨志以爲大貝牡貝幺貝小貝不成貝爲五也言爲朋者謂小貝以上四種各二貝爲朋而不成者不爲朋鄭因經廣解之言冇五種之貝其中以相與爲朋非總五貝爲一朋也賜我百朋言人材既成則厚其禄而用之汎汎楊舟載沈載浮朱氏曰載則也既見君子我心則休箋曰休者休休然今曰休休樂也興也楊舟汎汎然於水中無所維繫或沈或浮未可知也猶人材汎汎然於天下無所依歸或成或壞亦未定也今見此君子能長育之則人材皆可以成就故我心休休然安樂也舊說沈物亦載浮物亦載韓退之亦從之且詩中載馳載驅載笑載言載饑載渇載清載濁載飛載止凡言載皆則也獨以此爲載物於舟非也菁菁者莪四章章四句六月譜曰小雅六月大雅民勞之後皆謂之變雅美惡各以其時正之次也釋文曰從六月至無羊十四篇是宣王之變小雅從節南山至何草不黄四十四篇前儒申公毛公皆以爲幽王之變小雅從民勞至桑柔五篇是厲王之變大雅從雲漢至常武六篇是宣王之變大雅瞻卬及召旻二篇是幽王之變大雅宣王北伐也鹿鳴廢則和樂缺矣四牡廢則君臣缺矣皇皇者華廢則忠信缺矣常棣廢則兄弟缺矣伐木廢則朋友缺矣天保廢則福禄缺矣采薇廢則征伐缺矣出車廢則功力缺矣杕杜廢則師衆缺矣魚麗廢則法度缺矣南陔廢則孝友缺矣白華廢則廉恥缺矣華黍廢則蓄積缺矣由庚廢則隂陽失其道理矣䟽曰由庚以下不言缺者因文起義明與上詩别文武俱言缺周公成王變文焉南有嘉魚廢則賢者不安下不得其所矣由丘廢則萬物不遂矣南山有臺廢則爲國之基隊矣隊墜音義同由儀廢則萬物失其道理矣蓼蕭廢則恩澤乖矣湛露廢則萬國離矣彤弓廢則諸夏衰矣菁菁者莪廢則無禮儀矣小雅盡廢則四夷交侵中國㣲矣李氏曰由庚之詩本在於南山有臺之下今乃列於南有嘉魚南山有臺之前而不依於序者夫詩之見存者其先後不可必其次第如常棣乃周公之詩而列於伐木之後已不可得而知況其亡者又安得而知之乎姑闕之可也朱氏曰成康既没文武之政侵尋弛壞至于夷厲而小雅盡廢矣蓋其人亡其政息雖鐘鼓管絃之聲未衰然其實不舉則無所施以之所謂廢也宣王中興内脩政事外攘夷狄北伐南征復文武之竟土故序詩者詳記其所由廢興者如此以發其端而雅之於經者於是變矣四夷交侵由於小雅盡廢則宣王征伐必内脩以爲之本矣六月棲棲音西箋曰盛夏出兵明其急也朱氏曰六月建未也司馬法冬夏不興師李氏曰棲棲不安也今曰詩經月皆夏正論語丘何爲是棲棲者注云棲棲猶皇皇也黄氏曰人知其上之出於不得已雖六月而人不以爲暴蓋以爲其所以勞我者乃所以安我也戎車既飭音勑箋曰戎車革輅之等也其等有五䟽曰春官巾車掌王之五路革路以即戎故知戎車革路之等也春官車僕掌戎路之萃廣車之萃闕車之萃苹車之萃輕車之萃注云萃猶副也此五者皆兵車所設五戎也戎路王在軍所乗廣車橫陳之車闕車所用補闕之車也苹車所對敵自蔽隱之車也輕車所用馳敵致師之車也是其等有五也吉甫用所乗兵車亦革路在軍所乗與王同但不知備五戎以否萃音倅廣光之去苹薄經反輕去聲䟽曰飭齊正也四牡騤騤音葵桑柔傳曰騤騤不息也考見采薇載是常服箋曰戎車之常服韋弁服也玁狁孔熾音幟傳曰熾盛也我是用急王于出征箋曰于曰也李氏曰左傳無日不討國人而訓之于民生之不易杜元凱以于爲曰䟽曰毛以爲王自征以匡王國箋曰匡正也吉甫受命北征以建未盛夏之月棲棲然不遑安其戎車既皆飭正矣四牡又騤騤然不息乃載是兵事之常服謂韋弁服也韋弁服臨戰乃服未戰在道時載之於車也盛夏不可以出師所以六月行者以玁狁來侵其勢甚熾盛我是用急討之而不敢緩也王命吉甫曰今女出征玁狁以正王國謂攘夷狄以安社稷也汝其勉之此詩作於成功之後而述其受命之始也比物四驪比音備釋文曰比齊同也䟽曰夏官校人云凡大祭祀朝覲㑹同毛馬而頒之凡軍事物馬而頒之注云毛馬齊其色物馬齊其力比物者比同力之物戎事齊力尚彊不取同色而言四驪者雖以齊力爲主亦不厭其同色也故曰駟騵彭彭又曰乗其駟騏田獵齊足而曰四黃既駕是皆同色也無同色乃取異毛耳騏駵是中騧驪是驂是也校音效閑之維則傳曰則法也維此六月既成我服箋曰戎服也我服既成于三十里傳曰師行三十里王于出征以佐天子此同其物擇馬力之齊者乃四驪純黒之馬此馬先已閑習之皆合法則矣維此六月之時既成我戎服即日遂行日行三十里王曰今汝出征以佐天子予一人所倚賴汝其勉之四牡脩廣傳曰脩長也廣大也其大有顒魚容反說文曰顒大頭也曹氏曰脩以言其身之長廣以言其腹背之充顒以言其首之大三者相稱所以成其大也薄伐玁狁以奏膚公錢氏曰奏猶上也今曰書敷奏以言敷同日奏罔功傳曰膚大也公功也有嚴有翼傳曰嚴威嚴也翼敬也共武之服共音恭箋曰共典也服事也共武之服以定王國四牡身長而腹背廣其首顒然而大見軍容之盛武備素脩以此伐玁狁而奏其大功也師之羣帥有威嚴者有翼敬者以典是武事故能制勝而安定王國也范氏曰凡兵事莫尚於嚴莫先於敬玁狁匪茹箋曰茹度也整居焦穫音護箋曰整齊也傳曰焦穫周地接于玁狁者郭璞曰今扶風池陽縣瓠中是也侵鎬及方鎬豪之上濁箋曰鎬也方也皆北方地名䟽曰劉向䟽云來歸自鎬我行永久千里之鎬猶以爲遠鎬去京師千里顔師古云非豐鎬之鎬至于涇陽䟽曰水北曰陽涇解見邶谷風織文鳥章織音志又音饎傳曰鳥章錯革鳥爲章也釋文曰錯革鳥曰旟䟽曰史記漢書之幟與織字雖異音實同錯置也革急也畫急疾之鳥也今曰檀弓夫子之病革矣革音棘白斾央央如字又音英傳曰白斾繼旐者也央央鮮明貌曹氏曰白帛也白斾以絳帛爲斾也以帛續旐末爲燕尾戰則斾之䟽曰白斾謂絳帛九旗之物皆用絳此旟而言旐者散則通名元戎十乗去聲傳曰元大也夏后氏曰鉤車先正也殷曰寅車先疾也周曰元戎先良也䟽曰司馬法文也周禮革路無鉤此特設鉤故以名車也此車備設鉤鞶其行曲直有正故曰先正也寅進也此車能進取逺道故云先疾也元戎言大車之善者以先啓行音航王氏曰軍前曰啓後曰殿元戎十乗以先軍行之前者所謂選鋒也兵法兵無選鋒曰北詩記曰韓嬰章句云大戎者車縵輪馬被甲衡軛之上盡有劒㦸名曰陷陣之車所以胄突先啟敵家之行伍也縵音謾此數狄之罪言玁狁不自揆度乃敢深入吾地整齊而居我焦穫之地閒暇自如無所畏憚也又侵我北方之鎬與方遂侵至於涇水之北涇北去周近矣賊烽之熾如此我於是建旌旗選鋒銳而攘之旗幟之文有隼之章指旟也又以絳帛爲斾央央然鮮明又有大車謂之元戎以十乗在前先啓敵之行陣也戎車既安如輊如軒輊音至朱氏曰輊車之覆而前也軒車之却而後也詩記曰馬援䟽云居前不能令人輊居後不能令人軒注言爲人無所輕重也四牡既佶其乙反箋曰佶壯健之貌既佶且閑䟽曰閑習也薄伐玁狁至于大原大音泰傳曰言逐出之而已朱氏曰大原地名亦曰大鹵今在大原陽曲文武吉甫王氏曰非文無以附衆非武無以勝敵萬邦爲憲兵車既安正矣從後視之如輊覆而前從前視之如軒却而後言車之良也四牡既佶然壯健且復閑習言馬之良也以此伐玁狁至于大原之地驅之出境不窮追也尹吉甫時爲大將於是美之曰有文有武之吉甫乃萬邦以之爲法辦一玁狁餘事耳吉甫燕喜既多受祉音耻傳曰祉福也今曰即王之賞賜也來歸自鎬錢氏曰鎬玁狁所侵之地非鎬京之鎬也曹氏曰吉甫既至大原復往鎬慰撫其民然後歸我行永久飲御諸友飲音䕃傳曰御進也炰鼈膾鯉炰音庖字亦作炮膾音鄶韻亦作鱠今曰釋文云合毛炙物曰炰楚詞招魂胹鼈炮羔胹煑也鼈可煑不可炰今云炰鼈謂火熟之耳或古不同枚乗七發云鮮鯉之膾胹音而說文曰膾細切肉也侯誰在矣傳曰侯維也張仲孝友李廵曰張姓仲字傳曰善父母爲孝善兄弟爲友吉甫既伐玁狁而歸王與之燕而喜樂又多受賞賜王所以燕之者以其來歸自北方之鎬其地遥逺我吉甫之行日月長久故飲之酒而進其同志諸友與俱飲以盡其歡其珍美之饌則以火熟其鼈又以鯉細切而膾之其吉甫諸友之中維誰在矣有張姓仲字其性孝友者在焉孝友者德之本卷阿言吉士曰有孝有德宣王之時朝多賢臣張仲獨以孝友稱則必盛德之士也北伐之功繫夷夏盛衰詩人羙其功而結以張仲孝友之辭蓋有深意存焉豈非養君德者有其人乃攘夷復境之本歟美宣王北伐而以吉甫燕喜終之始終之辭也前日盛暑出師棲棲不遑所以有今日之燕喜也凱還飲至見宣王之成功也范氏曰宣王使吉甫征伐而與張仲居朝所以輔其德也苟無孝友忠信之臣養君之心則雖征伐有功於外而不善之政將出於内朝廷心腹也戎夷四攴也故孝友之臣日納王於善而敦厚之然後戎狄可攘而外患可除矣王氏曰吉甫爲將於外而内無忠順之臣與之同志者輔王耳目而廸其心則妨功害能之人至矣妨功害能之人至則若吉甫者其身之不閱何暇議勝敵哉六月六章章六句采芑音起宣王南征也䟽曰上言伐此云征便辭耳無義例也陳氏曰南征北伐二詩皆繫班師時作六月之辭廹采芑之辭緩六月似討而定采芑似畏而服也薄言采芑程子曰薄言發語辭芣苢傳曰采取也今曰芑嘉榖也解見生民李氏曰毛以薄言采芑爲菜豐水有芑爲草維糜維芑爲榖王氏皆以爲榖補傳曰新田菑畝中鄉不應指菜蓋以田畝善養嘉榖喻周家善養士卒也大雅云豐水有芑詩人於文武士皆以芑爲喻也于彼新田釋地曰田二嵗曰新田孫炎曰新成柔田也于此菑畝菑音緇釋地曰田一嵗曰菑孫炎曰始災殺其草木也䟽曰臣工及易注皆同唯坊記注云二嵗田曰畬三嵗曰新田當是傳寫誤也方叔涖止涖音利傳曰涖臨也其車三千師干之試長樂劉氏曰師衆也干盾也程子曰師干猶今云兵甲也試肄習也今曰講武試其可用方叔率止乗其四騏解見小戎四騏翼翼錢氏曰翼翼整肅貌路車有奭興之入字亦作赩蘇氏曰路車金路也以有奭言赤又巾車鉤樊纓今有鉤有膺知其爲金路箋曰奭赤貌今曰召康公之名音釋與此音異簟茀魚服茀音弗簟茀解見齊載驅魚服解見采薇鉤膺鞗革鞗音條䟽曰春官巾車注云鉤婁頷之鉤也金路無錫有鉤亦以金爲之是鉤用金在頷之飾也膺樊纓也在膺之飾惟有樊纓樊讀如鞶帶之鞶謂今馬大帶纓今馬鞅金路其樊及纓以五采罽飾之而九成巾車云金路鉤樊纓九就同姓以封或方叔爲同姓也方叔元老五官之長是上公也上公雖非同姓或有得乗金路矣罽音計崧高䟽曰膺是馬之胷前鉤是器物以鉤類之謂膺上有飾鞗革解見蓼蕭興也厲王之亂天下蕩蕩如荒榛之地宣王經理弊壞之天下如耕墾荒榛之地以爲田故言取芭榖者於何處乎於彼二嵗之新田於此一嵗之菑畝皆新墾之地也喻宣王取民爲兵随其所取皆新撫之民也既用民爲兵乃命方叔爲將而臨之其車有三千乗侈言兵車之盛也天子六軍不過千乗不必實有三千乗也師衆干盾皆閱試之知其可用於是方叔乃率其士卒而行以南征蠻荆自乗四騏之馬其馬翼翼然甚整肅所駕路車之飾奭然而赤蓋金路也不乗革路者以革路臨戰所乗此時受命以未至戰時也其金路之車以竹簟爲蔽茀其車所載有魚獸之皮以爲矢服其馬有婁頷之金鉤其馬胷膺有樊與纓之飾謂之膺又以鞗皮爲轡首而垂之兵車一乗甲士三人步卒七十二人又二十五人將重車在後三千乗則甲士九千步卒二十一萬六千將重車七萬五千人通三十萬人矣天子六軍出於六鄉萬二千五百人爲軍六軍止七萬五千人無三千乗之數孔氏謂羨卒盡起王氏謂合諸侯之師要之詩人之辭不可泥名數以求之其車三千極言其兵車之盛耳況兵有先聲後實項羽兵四萬號百萬豈一一如其數哉朱氏謂孔氏王氏以文害辭其說是也薄言采芑于彼新田于此中鄉蘇氏曰中鄉民居在焉故其田尤治方叔涖止其車三千旂旐央央解見出車方叔率止約軝錯衡軝音祁傳曰軝長轂之軝也朱而約之䟽曰說文云軝長轂也轂則謂之軝兵車乗車其轂長於田車是爲長轂也言朱而約之謂以朱色纒束車轂以爲飾蓋以皮纒之而上加以朱漆也考工記輪人云容轂必直陳篆必正注云容者冶轂爲之形容也篆轂約也錯雜也雜物在衡是有文飾八鸞瑲瑲音蹌韻亦作鏘朱氏曰鈴在鑣曰鸞馬口兩旁各一四馬故八也傳曰瑲瑲聲也服其命服朱芾斯皇芾音弗傳曰黄朱芾也皇猶煌煌也斯下箋曰天子純朱諸侯黄朱斯干䟽曰芾從裳色祭時服纁裳故芾用朱赤朱深於赤對文則朱赤深淺散則皆謂之朱芾也赤芾詳解見曹候人有瑲葱珩音衡傳曰瑲珩聲也葱蒼也三命皆葱珩䟽曰三命至九命皆葱珩非謂方叔唯三命也軍行建其旂旐央央然鮮明方叔率士卒而行乃乗金車以皮纒約其軝轂有錯雜文采之衡也車行則八鸞瑲瑲然有聲也其身服其受王命之服有黃朱之芾皇然鮮明也又有蒼玉之珩其聲瑲然也方叔嘗伐玁狁威名素著又貴謀賤戰以王師臨小醜故雍容閒暇如此也曹氏曰芾與佩皆非軍中之服路以金路則非戎路馬有和鸞則非戎馬所以然者蓋方叔克壯其猶如呉起將戰不帶劔諸葛武侯臨陣不親戎服羊祜輕裘緩帶而盛著威名杜預身不跨馬而自能制勝故詩人詠其車服之美而已鴥彼飛隼鴥音聿隼音筍晨風傳曰鴥疾飛貌曰隼鶻也鷂屬也箋曰急疾之鳥也釋鳥曰鷹隼醜其飛也翬舍人曰謂隼鷂之屬翬翬其飛疾羽聲也山隂陸氏曰鷂屬也今鷹之搏噬不能無失獨隼爲有準或曰即今所呼爲鶻者其飛戾天傳曰戾至也亦集爰止方叔涖止其車三千師干之試方叔率止鉦人伐鼔鉦音征䟽曰周禮有鐲鐃鐸無鉦也說文云鉦鐃也似鈴柄中上下通然則鉦即鐃也說文又云鐲鉦也鐃也則鐃鐲相類俱得以鉦名之故鼔人注云鐲鉦也形如小鐘是鐲亦名鉦也鐲似小鐘鐃似鈴是有大小之異耳凡軍進退皆鼔動鉦止非臨陣獨然此文在陳師鞠旅之上是未戰時事也鐲音濁鐃音譊董氏曰周官云鳴鐃且却聞鉦而止則鉦鐃二物也但司馬有鐲鐸鐃而不言鉦故前世疑之崔靈恩集註謂征人伐鼔則勇於戰也今詩謂陳師鞠旅則未戰矣安待鉦人爲擊鼔使進哉就如此則亦亂於軍制矣箋曰鉦也鼓也各有人焉互言之耳陳師鞠旅鞠音菊傳曰鞠告也箋曰二千五百人爲師五百人爲旅師旅互言之顯允方叔伐鼓淵淵王氏曰淵淵深也師衆則鼓遠鼓逺則聲深振旅闐闐音田䟽曰古者春教振旅秋教治兵以戎是大事又三年一教隱五年左傳云三年而治兵入而振旅是征伐之時出軍至對陳用治兵禮戰止至還歸用振旅法名異而禮同也釋文云出而治兵尚威武也入而振旅反尊卑也孫炎云出則㓜賤在前貴勇力也入則尊老在前復常法也長㓜出入先後不同而云禮一者坐作進退如一也今曰闐闐衆盛也猶今人言駢闐也鴥然而疾飛者彼隼鶻也其飛能高至天亦集於所止之地喻武勇之士能深入敵陣者皆集於此矣於是鉦人則鳴鉦以静之鼓人則擊鼓以動之言士聽節制也鉦人伐鼓互言之也又陳布其師鞠告其旅誓衆而告之以賞罰使用命也此顯明允信之方叔既以誓衆於是進師其伐鼓之聲淵淵然深也方誓師伐鼓以往即言振旅蓋蠻夷望風畏服不待戰也全師而歸故闐闐然衆盛也陸璣說隼云齊人謂之擊征又謂之題肩或謂之雀鷹春化爲布榖者璣說鳲鳩亦云如此則隼即鳲鳩矣然說鳲鳩不言是隼說隼不言是鳲鳩蓋誤矣隼非鳲鳩也蠢爾蠻荆傳曰蠢動也蠻荆荆州之蠻也程子曰蠢者動而無知之貌大邦爲讎朱氏曰大邦猶言中國也方叔元老傳曰元大也克壯其猶箋曰猶謀也方叔率止執訊獲醜訊音信解見出車戎車嘽嘽音灘朱氏曰嘽嘽衆盛也嘽嘽有考見崧高嘽嘽焞焞音推挽之推又他屯反傳曰焞焞盛也如霆如雷釋天曰疾雷爲霆郭璞曰雷之急疾者謂之霹靂顯允方叔征伐玁狁蠻荆來威蠢動無知者荆州之蠻乃與中國爲怨讎方叔爲國大老能壯其謀不以力勝乃率其士衆執訊獲醜獻功而歸訊謂魁首之可問者醜謂徙黨之降服者其兵車嘽嘽然衆焞焞然盛其威如迅擊之霆如發聲之雷言却敵師還而不困憊也顯明允信之方叔嘗與吉甫同伐玁狁威名已著是以蠻荆聞其名而皆來畏服也出車不戰亦言執訊獲醜此詩亦不戰而言之也或以克壯其猶爲勇決之意今考方叔南征服其命服有瑲葱珩其從容閒暇如此卒使蠻荆聞風畏服不戰而屈之非取其老而勇決若矍鑠翁之爲也易大壯注壯者威盛彊猛之名詩人之意正謂少年輕俊之人往往以勇力求勝未能深謀遠慮唯方叔老成故能尚謀不尚戰以謀爲壯不以力爲壯也六月之詩事勢急廹采芑之詩辭氣雍容蓋北伐則四夷交侵初用兵也南征則北方已服中國麤定方叔乗北伐之威以臨蠻荆也下篇車攻則中興之功成矣采芑四章章十二句車攻宣王復古也宣王能内脩政事外攘夷狄復文武之竟土竟音境脩車馬備器械復扶又反㑹諸侯於東都箋曰東都王城也因田獵而選車徒焉選上聲朱氏曰此詩所賦自脩車馬備器械以下其脩政事攘夷狄則前乎此矣東都洛邑也周公營之而成王㑹諸侯焉我車既攻傳曰攻堅也我馬既同傳曰同齊也宗廟齊毫尚純也戎事齊力尚彊也田獵齊足尚疾也四牡龐龐音聾傳曰龐龐充實也駕言徂東傳曰東洛邑也宣王中興爲東都之㑹詩人喜於復見威儀之盛故鋪張揚厲以見喜談樂道之意上三章皆言脩車馬備器械之事我宣王之車既堅緻矣馬既齊力矣四牡皆龐龐而充實將駕之以往東都也言初發車徒而往東都未言所爲之事也田車既好䟽曰田車田獵之車四牡孔阜程子曰阜肥壯也東有甫草傳曰甫大也䟽曰廣大之草可以田獵駕言行狩此章乃言所爲之事謂田車既好四牡肥壯所以往東者以東有廣大之草今駕車以往將以田獵也猶未言所獵之地也此行以㑹同爲主因講田獵耳詩先言行狩者序事當自内始故先言田獵車馬器械之備而後往行狩其實先㑹同而後田獵也鄭破甫作圃音補云鄭有圃田今不從下章言獵于敖地不應又言圃田也傳曰田者大艾草以爲防或舍其中褐纒旃以爲門裘纒質以爲槸間容握驅而入擊則不得入左者之左右者之右然後焚而射焉天子發然後諸侯發諸侯發然後大夫士發天子發抗大綏諸侯發抗小綏獻禽於其下故戰不出頃田不出防不逐奔走古之道也艾音刈槸音闑綏而佳反䟽曰大芟殺野草以爲防限作田獵之塲殺圍之處未田之前誓士戒衆在其間止舍也其防設周衞而立門以織毛褐布纒通帛旃之竿以爲門之兩傍其門蓋南開並爲二門用四旃四褐也又以裘纒椹質以爲門中之闑闑車軌之裏兩邊約車輪者也門之廣狹兩軸頭去旃竿之間各容一握握人四指爲四寸是門廣於軸八寸也馳走而入門不得徐也其軸頭擊着門傍旃竿則不得入以罰不工也以天子六軍分爲左右雖同舍防内令三軍各在一方其屬左者之左門右者之右門不得越離部伍教戰既畢士卒出門乃驅禽納之於防然後焚此防草而射之焚所芟之草也發發矢射之也舉綏爲表因獻其禽於其下也戰塲有頃數戰者不出其頃界田不出所芟之防奔走謂出於頃防椹音斟之子于苗傳曰之子有司也夏獵曰苗䟽曰時宣王爲夏苗選徒嚻嚻音遨傳曰選數也嚻嚻聲也建旐設旄旐解見出車旄解見鄘干旄搏獸于敖搏音博箋曰敖鄭地今近榮陽詩記曰敖山名晉師救鄭在敖鄗之間士季設七覆于敖前則敖山之下平曠可以屯兵翳薈可以設伏所謂東有甫草即此地也鄗音敲此章乃言所獵之地言有司將往夏獵故先選數車徒無或讙譁唯數者嚻嚻有聲見其静治也於是建旐於車而設旄於旐之首以此車乗之而往將搏取禽獸於鄭之敖即甫草之處也詩記曰宣王之往東都以㑹諸侯爲主因田獵以選車徒而二章三章先言田獵者蓋有司先爲戒其以待㑹同畢而田獵也駕彼四牡四牡奕奕今曰奕奕大也赤芾金舄芾音弗舄音昔傳曰諸侯赤芾金舄舄達屨也赤芾詳解見候人朱芾解見采芑箋曰金舄黄朱色也䟽曰天官屨人注云舄有三等赤舄爲上冕服之舄下有白舄黑舄此云金舄者即禮之赤舄也故箋云金舄黄朱色加金爲飾赤舄則尊莫是過故云達屨言是屨之最上達者也屨人兼掌屨舄是屨爲通名也㑹同有繹傳曰時見曰㑹殷見曰同䟽曰時見者無常期王將有征伐之事則合諸侯而命事焉殷衆也十二嵗王如不廵守則六服盡朝長樂劉氏曰絡繹不絶也上三章皆言脩車馬備器械此章言㑹諸侯首章以我斥宣王此章以彼指諸侯諸侯駕彼四牡而來其馬奕奕然大朝見於王服赤色之芾及金飾之舄其來㑹同者非一絡繹不絶可謂盛矣喜見中興之威儀也此奕奕字毛鄭不解孔氏以爲閒習朱氏以爲連絡布散之意然奕本訓大毛於奕奕寢廟奕奕梁山皆訓大則此亦當爲大曹氏曰夫自夷厲以後諸侯不朝天子久矣今宣王能先自治而脩政事禦外侮而攘夷狄諸侯恒威畏德復來朝㑹而其儀物之盛等威之嚴如此故詩人美之猶後世所謂不意今日復見漢官威儀云耳決拾既佽音次傳曰決鉤弦也拾遂也佽利也䟽曰決著於右手大指所以鉤弦開體遂著於左臂所以遂弦夏官繕人注抉天子用象骨拾韝扞也著於左臂裏以韋爲之決繕人作抉長樂劉氏曰決謂護大指以鉤弦拾謂護左臂以利弦者也今曰決即衞芃蘭所謂佩韘也韘音攝弓矢既調箋曰調謂弓彊弱與矢輕重相得䟽曰適也射夫既同助我舉柴音恣傳曰柴積也上三章言脩車馬備器械將以行獵實未田獵四章言既㑹諸侯此章乃言田獵也田獵之時有鉤弦之決著於右手之大指有遂弦之拾著於左臂決之與拾與手指相利矣弓之彊弱又與矢之輕重相得而調適矣射夫諸侯以下既同力故獲多宣王將舉積禽以爲乾豆賔客之用而得諸侯射獲以助之也四黄既駕兩驂不猗音倚又音縊王氏曰猗不正也不失其馳舍矢如破舍音捨箋曰矢發則中如椎破物也四黄之馬既駕而乗之兩驂之馬又不偏倚言御之良也御者能正其馬不失其馳驅之法而射夫矢發則中如破物然言射之良也蘇氏曰不善射者御者詭遇則獲不然不能也蕭蕭馬鳴錢氏曰蕭蕭静貌悠悠斾旌錢氏曰悠悠緩行貌徒御不驚朱氏曰徒步卒也御車御也驚如漢書夜軍中驚之驚大庖不盈䟽曰大庖君之庖傳曰禽雖多擇取三十焉其餘以與大夫士以習射於澤宫朱氏曰不盈言擇取而用之不極欲也田事既畢軍旅旋歸觀者唯聞馬鳴之聲蕭蕭然而静無他聲也見旌旆之行悠悠然而緩無亂次也徒行者御車者皆不驚擾大庖不盈擇取三十而已張子曰饌雖多而無餘者均及於衆而有法耳李氏曰歐陽公之詩有曰萬馬不嘶聽號令諸蕃無事樂耕耘蘇東坡詩曰令嚴鉦鼔三更月野宿貔貅萬竈烟皆是效此兩句而作也曹氏曰凡事始乎治常卒乎亂今獵罷而歸終始静治傳曰一曰乾豆二曰賔客三曰充君之庖故自左膘而射之逹于右腢爲上殺射右耳本次之射左髀達于右䯚爲下殺面傷不獻踐毛不獻與大夫士習射於澤宫田雖得禽射不中不得取禽古者以辭讓取不以勇力取膘音縹脅後髀前肉也腢音愚謂肩前也髀俾陛二音謂股外䯚音杳水膁也踐音翦膁音歉腰左右虚肉處䟽曰乾豆謂第一上殺者乾之以爲豆實供宗廟也第二殺者别之以待賔客也第三下殺者取之以充實君之庖厨也箋曰射右耳射當爲達亦自左射之達右耳本而死者爲次殺以其逺心死稍遲已微惡射左股髀而達過于右脅䯚爲下殺以其中脅死最遲肉又益惡凡射獸皆逐後從左箱而射之面傷謂當面射之踐毛謂在傍而逆射之二者皆嫌誅降之義不成禽不獻孔氏云惡其害㓜小此不能使獵者無之自君所不取以示教法耳大獸公之非復已物君賜使射故非中不取言嚮者田獵所取用勇力今射者禮樂所取用辭讓也釋文曰何休注公羊自左膘射之達于右腢中心死疾鮮潔也之子于征補傳曰謂有司此之征行有聞無聲聞音問允矣君子䟽曰君子宣王也展也大成箋曰展誠也㑹同之事師徒衆盛由鎬至洛道路悠長非紀律嚴整其擾多矣觀者以田事之終而徒御整肅如此乃深美之曰有司之是役也聞師之行而不聞其聲信矣宣王誠哉其大成也言功業極盛無遺憾也箋曰晉人伐鄭陳成子救之舍於柳舒之上去穀七里穀人不知可謂有聞無聲事在哀二十七年左傳作留舒車攻八章章四句吉日美宣王田也能慎微接下無不自盡以奉其上焉䟽曰留意於馬祖之祈禱是能謹於微細求禽獸唯以給賔是恩降於下詩美田獵耳後序舉三隅言之吉日維戊箋曰戊剛日也朱氏曰以下章推之是日其戊辰歟既伯既禱傳曰伯馬祖也䟽曰夏官校人春祭馬祖夏祭先牧秋祭馬社冬祭馬步注云馬祖天駟先牧始養馬者馬社始乗馬者馬步神爲災害馬者馬祖祭之在春其常也而將用馬力則有用彼禮以禱之馬祖謂之伯伯者長也鄭云馬祖天駟釋天云天駟房也孫炎云龍爲天馬故房四星謂之天駟田車既好四牡孔阜升彼大阜從其羣醜箋曰醜衆也外事用剛日故吉善之日維戊也既伯謂有事於馬祖將用馬力而祭之也既禱謂因祭而禱之願馬之彊健而獲多也以戊日祭而禱之其禱之之辭曰田獵之車既善矣四牡甚阜而肥壯矣車牢馬壯以歴險從禽將升彼大阜從禽獸之羣衆而田獵也此告神以將田獵其實戊日未田也舊說謂禱於馬祖二既字不分曉伯是馬祖之神言既伯是既有事於馬祖謂祭之也猶社是土神方是四方之神言以社以方則是祭社及方也既禱乃謂因祭而禱祈之也吉日庚午朱氏曰庚午亦剛日也既差我馬差音义傳曰差擇也獸之所同箋曰同猶聚也麀鹿麌麌麀音憂麌音語傳曰鹿牝曰麀麌麌衆多也漆沮之從沮音趨李氏曰漆沮二水名也禹貢所謂東㑹漆沮即此漆沮是也故孔氏以漆沮在涇水之東一名洛水與古公自土沮漆别也此漆沮正周禮職方氏所謂雍州其浸渭洛雍州之地非河南之洛也曹氏曰漆沮二水名本太王避狄所徙岐周之地按漢志右扶風有漆縣漆水在縣西東入渭沮一名洛水亦在岐周若漢中郡之沮水則出房陵縣之東山東至郢而入江非此沮也漆沮又考見緜天子之所以吉日庚午既差擇我田獵之馬至於田所獸之所同聚乃有牝鹿麌麌然衆多遂從漆沮二水之傍驅獸而至天子之所也言牝鹿則見蕃息之意瞻彼中原釋地曰廣平曰原中原蓋原中也其祁孔有傳曰祁大也儦儦俟俟儦音標傳曰趨則儦儦行則俟俟錢氏曰緩行若相待也或羣或友傳曰三曰羣二曰友悉率左右以燕天子蘇氏曰燕樂也視彼原中其禽獸形體祁大又甚多有矣其趨者則儦儦而疾走其行者則俟俟若相待或三爲羣或二爲友從王者見禽獸之多於是率其同事左右之人各共其事以樂天子也既張我弓既挾我矢挾音浹又音協儀禮注曰方持弦矢曰挾解見行葦發彼小豝音巴解見騶虞殪此大兕殪音翳兕詞之上濁釋詁曰殪死也朱氏曰兕野牛也解見卷耳傳曰言能中微而制大也䟽曰小者矢中必死小豝苦於不能射中大者射則易中唯不能即死小豝云發言發則中之大兕言殪者射著即死異其文者言中微而制大以御賔客朱氏曰御進也今曰與燕者皆爲賔客不必專以爲諸侯也且以酌醴傳曰饗醴天子之飲酒也䟽曰醴不可専飲天子之於羣臣不徒設醴而已此言酌醴者左傳天子饗諸侯毎云饗醴命之宥是饗有醴者天子飲酒之禮故舉醴言之也曹氏曰莊十八年左傳虢公晉侯朝王王饗醴命之宥杜預云先置醴酒示不忘古也左右既驅禽獸於是張弓挾矢而射之牝豕小則難中乃發而中之野牛大則難死乃一發而殪之言善射也既得禽獸則以爲爼實進於賔客不特可以小小燕飲又且以酌醴而饗舉行盛禮也發謂發矢射之傳云百發百中則發有中否今曰發彼小豝言發則得豝矢無虛發不待言中也醴甘酒少麴多米二宿而熟周官酒正五齊之二曰醴齊五齊味薄所以祭也三酒味厚人所飲也坊記云醴酒在室醍酒在堂則五齊亦曰酒醴味甜於餘齊與酒味殊穆生不嗜酒故元王每置酒常爲穆生設醴見醴與酒味異也饗爲盛禮惟王饗諸侯則設醴示不忘古禮之重也醴音禮詩記曰車攻吉曰皆以蒐狩爲言何也蓋蒐狩之禮所以見王賦之復焉所以見軍實之盛焉所以見師律之嚴焉所以見上下之情焉所以見綜理之周焉欲明文武之功業者觀諸此足矣吉日四章章六句詩緝巻十八
