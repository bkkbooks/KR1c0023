body:
  text: 詩緝卷二十二宋嚴粲撰谷風之什小雅谷風刺幽王也天下俗薄朋友道絶焉伐木之化行則民德歸厚故以俗薄道絶刺其上也習習谷風解見邶谷風維風及雨錢氏曰人行于道遇連續之風又加以雨喻事變之小今曰風雨及頽皆喻恐懼將恐將懼箋曰將且也維豫與女音汝將安將樂音洛汝轉棄豫興也來自大谷之風大風也盛怒之風也又習習然連續不斷繼之以雨喻連變恐懼之時猶後人以震風凌雨喻不安也當處變之時且恐且懼維豫與女同其憂患及得志之後且安且樂女反棄我交道薄矣舊説谷風為生長習習為和調今考二章言維風及頽頽暴風也非和調之類三章言草木萎死無生長之意其説難通矣習習谷風維風及頽徒雷反曰頽風之從上而下者也將恐將懼置豫于懷置音至箋曰置置也將安將樂棄豫如遺箋曰如人行道遺忘物忽然不省存也頽暴風也不斷之風又加以暴風喻事變益甚恐懼之時則置我於心而不忘安樂之時則棄我如遺物不復省存也釋天云焚輪謂之頽扶搖謂之猋郭璞云猋暴風從下上也頽暴風從上下也傳以頽為相扶而上以焱釋頽誤矣習習谷風維山崔嵬音摧詭崔嵬解見周卷耳補傳曰谷風迅暴甚矣維其崔嵬獨存耳喻亂之極無草不死無木不萎音威李氏曰萎衰落也錢氏曰草木皆萎死喻事變之大忘我大德思我小怨大風摧物維戴土之石山崔嵬獨存而其山之草木無不萎死矣喻大患難也此時賴朋友以濟今豈可忘我共患難之大德而思我小怨乎谷風三章章六句蓼莪音六鵝刺幽王也民人勞苦孝子不得終養爾養音樣箋曰不得終養者二親病亡之時時在役所不得見也李氏曰歐陽氏以鄭説為滯泥之甚然觀此詩之言出則銜恤入則靡至則是言孝子行役而喪親之所作也朱氏曰晉王裒以父死非罪每讀詩至哀哀父母生我劬勞未嘗不三復流涕受業者為廢此篇詩之感又如此孝子行役而喪其親故寫其中心之哀千載之下讀之者猶感動也蓼蓼者莪傳曰蓼蓼長大貌今曰蓼彼蕭斯郭璞曰莪莪蒿也亦曰𦾰蒿菁菁者莪傳曰莪蘿蒿也釋草曰莪蘿陸璣曰生睪田漸洳之處葉似邪蒿而細科生三月中莖可生食又可蒸香美味頗似蔞蒿山隂陸氏曰一名角蒿也字説云莪以科生而俄莪俄而蔚直蔚粗而莪細匪莪伊蒿呼毛反釋草曰蒿􅦕􅦕去刃反山隂陸氏曰晏子云蒿草之高者也艾治也蒿亂也莊子云是其於辨也將妄鑿垣牆而殖蓬蒿也蓬蒿以言穢亂管子云嘉穀不生而蓬蒿藜莠茂哀哀父母生我劬勞邶凱風傳曰劬勞病苦也興也始生為莪長大為蒿莪至蓼蓼然長大之時則非莪矣乃蒿也其始為莪猶可食其後為蒿則無用喻父母生長我身至于長大乃是無用之惡子不能終養也此孝子自怨其身之辭也與凱風言棘非美材僅堪為薪之意正同哀傷乎父母生我劬勞病苦無以報之也釋草曰蘩之醜秋為蒿釋云醜類也言蘩蕭蔚莪之類春始生氣味既異故其名不同至秋老成則皆蒿也此説莪蒿甚明以莪形蒿莪美而蒿惡莪始生香美可食至秋高大為蒿則粗惡不可食故菁莪以喻人材而蒿止為鹿食也舊以蒿為青蒿蒿類甚多此泛言蒿耳何知為青蒿乎蓼蓼者莪匪莪伊蔚音尉曰蔚馬薪蒿也蒿之尤粗大者也釋草曰蔚牲􅦕郭璞曰無子者故云牡􅦕陸璣曰三月始生七月有花似胡麻花而紫赤八月有角角似小豆角鋭而長一名馬薪蒿山隂陸氏曰蔚大於蒿哀哀父母生我勞瘁詩人取義多在首章至次章則變韻以成歌此舉蔚以言蒿之粗大耳猶王風揚之水一章言戍申二章三章言戍甫戍許借甫許以言申止是戍申不戍甫許也瓶之罄矣瓶音萍易井卦作瓶罄音慶傳曰罄盡也維罍之恥罍音雷傳曰瓶小而罍大疏曰罍形似壺大者受一斛鮮民之生鮮上聲傳曰鮮寡也今曰單獨之民謂無父母也不如死之久矣無父何怙胡之上濁無母何恃出則銜恤箋曰恤憂也入則靡至箋曰靡無也瓶以汲水罍以盛水瓶小喻子罍大喻父母瓶汲水以注於罍猶子之養父母瓶罄竭則罍無所資為罍之恥猶子窮困則貽親之羞也故歎父母既死身為單獨之民雖生不如死之久矣痛切之言也無父何依怙無母何所倚恃出則銜憂抱終天之恨入則靡至無所歸投故生不如死也井卦言羸其瓶揚雄酒針以鴟夷嘲瓶柳子厚瓶賦以瓶嘲鴟夷蓋鴟夷盛酒器瓶汲水器也罍之用不一周禮鬯人社壝用大罍壝音位則盛鬯也司尊彝祠禴嘗蒸皆有罍及詩卷耳酌彼金罍皆盛酒也儀禮罍水在洗東則盛水也此以瓶罍並言則指罍之盛水者父兮生我箋曰本其氣也母兮鞠我鞠音菊傳曰鞠養也拊我畜我拊音撫畜許六反長樂劉氏曰防其驚也則拊之朱氏曰畜亦養也長我育我長音掌釋文曰育養也顧我復我箋曰顧旋視也復反覆也疏曰顧謂去之而反顧也丘氏曰復反覆不能暫捨也出入腹我箋曰腹懷抱也疏曰謂置之懷抱也欲報之德昊天罔極罔極解見衛氓鞠畜育皆養也所從言之異耳父生母鞠此總言我身是父母所生養下乃詳言父母之恩勤也拊謂以手摩拊其首而防其驚是初生之時初生而言畜養謂乳之也長謂養之稍長則能就口食矣稍長而言育養謂哺之也已而行戲於地父母或去之則回首以顧視之復謂顧之又顧是反覆不能暫捨愛之至也在家容其行戲或自內而出外或自外而入內未可令其自行則抱之於懷此曲盡父母愛子之情也父母之恩如此欲報之以德而父母之恩如天之無窮不知所以為報也今我不及報之痛當奈何也嗚呼讀此詩而不感動者非人子也南山烈烈王氏曰南山之氣烈烈今曰四月箋云烈烈猶栗烈二之日栗烈寒氣也飄風發發飄入字從韻本注音瓢飄風解見匪風傳曰發發疾貌民莫不穀箋曰榖養也我獨何害孝子行役念親之沒瞻南山之烈烈感飄風之發發觸目皆悲傷也故歎民莫不得以養其父母我獨何為遭此害而不得終養乎南山律律王氏曰律律崒律之謂也崒在律反嵂音律飄風弗弗陳氏曰弗弗動貌民莫不穀我獨不卒子恤反箋曰卒終也不得終養父母重自哀傷蓼莪六章四章章四句二章章八句大東刺亂也東國困於役而傷於財談大夫作是詩以告病焉箋曰談國在東魯莊公十年齊師滅談杜元凱云在濟南平陵縣西南疏曰談大夫雖自為已怨而王政大經偏東非談獨然故言東以廣之有饛簋飱音蒙宄孫傳曰饛滿簋貌疏曰禮之通例皆簠盛稻粱簋盛黍稷傳曰飱熟食謂黍稷也曹氏曰人旦則食飯夕則食飱蓋以水澆飯有救棘匕救音求匕音比傳曰救長貌匕所以載鼎實棘赤心也疏曰雜記云匕用桑長三尺鼎實煮肉也古之祭祀享食必體解其肉之胖既大故須以匕載之載謂出之於鼎升之於俎也棘木赤心吉禮用棘雜記言用桑者謂喪祭也胖音判牲之半體周道如砥音紙疏曰砥謂礪石言其平也禹貢云礪砥砮丹今曰禹貢注砥細於礪皆磨石也其直如矢君子所履小人所視眷言顧之眷音眷傳曰眷反顧也解見皇矣潸焉出涕潸音刪涕音體傳曰潸涕下貌興之不兼比者也周之盛時侯國富足其簋中之飱饛然而滿其鼎有棘木之匕救然而長此由周道如礪石之平如箭之直言賦役均也其在上君子則履行之不敢違異以過取其在下小人則瞻視之莫不仰望而依賴此事在上世已往矣今回首反顧之為之潸然出涕傷今不如古也小東大東今曰小東大東止言小國大國之在東者杼柚其空杼除之上濁柚音逐曹氏曰杼梭也説文曰杼持緯者董氏曰柚卷織者朱氏曰柚受經者糾糾葛屨糾音九解見魏葛屨可以履霜佻佻公子佻音挑朱氏曰佻佻輕薄不耐勞苦之貌行彼周行今從毛鹿鳴音如字舊音航朱氏曰周行大路也周行有考見卷耳既往既來使我心疚音救箋曰疚病也言小國大國之在東者其杼柚皆空矣窮乏之甚有服弊壞之屨以繩糾纒之糾而復糾以履霜者乃佻佻然不耐勞苦之公子服之以行彼大路也公子服弊屨以履霜餘人可知矣奔走道路往而復來曾無休息不勝其勞使我心憂而疚病也有冽氿泉冽音列氿音宄傳曰冽寒意也有考見曹下泉釋水曰氿泉穴出穴出反出也注云從傍出也無浸穫薪穫音鑊傳曰穫刈也契契寤歎契音棄徐音挈傳曰契契憂苦也哀我憚人憚多之去徐音但傳曰憚勞也薪是穫薪尚可載也哀我憚人亦可息也興也穫薪以供㸑必暴而乾之然後可用若浸之於寒冽之泉則濕腐而不可㸑矣喻民當撫恤之然後可用若困之以暴虐之政則窮悴而不能勝矣故我契契然憂苦寐而寤覺之時為之嗟歎哀憐我東國勞苦之人也此薪既穫刈以為薪久浸則濕腐可惜及今尚可載以歸而暴之可哀此勞苦之人亦可少休息之也東人之子朱氏曰東人諸侯之人也職勞不來音賚箋曰職主也朱氏曰專主也傳曰來勤也疏曰以不被勞來為不見勤采薇序云杕杜以勤歸西人之子傳曰西人京師人也粲粲衣服傳曰粲粲鮮盛貌舟人之子熊羆是裘私人之子傳曰私人私家人也疏曰謂本無官職卑賤之屬非家臣也今曰嵩高遷其私人為家臣與此別百僚是試傳曰試用也或以其酒不以其漿鞙鞙佩璲鞙玄之上濁璲音遂傳曰鞙鞙玉貌璲瑞也箋曰以瑞玉為佩疏曰禮以玉為瑞信其官謂之典瑞此瑞玉謂所佩之玉不以其長東國之人專主為勞苦而曾不被慰來以下國供賦役為當然不矜念之也西周之人方粲粲然鮮盛其衣服至於操舟者之子亦以熊羆為裘私家賤人之子亦皆試用而為官僚且東人困悴雖貴者猶葛屨以履霜而西人逸樂雖賤者皆美服厚祿言不均也賤人既為官僚我東人行役至周以其用事而致賂焉或有饋之以酒者彼不報之以漿酒猶禮之薄至贈之以鞙鞙然之佩瑞可謂厚矣亦不待之以長逺暫時相恱旋復相背言東西之人不唯勞逸貧富之不均我東人於西人又往往禮之而不見答怨之深矣維天有漢傳曰漢天河也解見雲漢監亦有光監去聲箋曰監視也跂彼織女跂音棄徐音起韻亦作企傳曰跂隅貌疏曰織女三星鼎足望之跂然而成三角終日七襄箋曰襄駕也駕謂更其肆也使旦至暮七辰辰一移因謂之七襄今曰鄭大叔于田云兩服上襄雖則七襄不成報章傳曰不能反報成章也疏曰織之用緯一來一去是反報成章今織女之星駕則有西無東睆彼牽牛睆還之上濁睆明星貌釋天曰河鼓謂之牽牛疏曰爾雅以河鼓牽牛為一星李巡孫炎以為二星不知其同異不以服箱傳曰箱大車之箱也疏曰大車謂平地任載之車兩較之間謂之箱甫田云乃求萬斯箱書傳云長幾亢箱是車內容物之處較音角謂車兩傍解見衛淇奧丘氏曰服箱猶言駕車也東有啓明西有長庚傳曰日旦出謂明星為啓明日既入謂明星為長庚庚續也箋曰啓明長庚皆有助日之名而無實光也疏曰啓明長庚或一星出東西而異名或二者别星未能審也李曰啓明即是太白也長庚不知是何星毛氏云只是一星故後世多用之亦以長庚為太白李白字太白白之生母夢長庚星因以為名韓退之詩云太白配殘月蘇東坡詩亦云長庚至曉猶陪月觀此則是以長庚為太白也鄭漁仲乃謂啓明金星長庚水星金在日西故日將出則東見水在日東故日將沒則西見此詩曰東有啓明西有長庚則又似是二星不得渾為一也不如待知天文者而問之有救天畢傳曰救畢貌畢所以掩兔也天畢畢星也載施之行音航箋曰行列也東人服役夜行不息仰見星漢而訴之於天曰維天有河漢其監視我而有光也我東國杼柚既空無布帛可輸矣但恐織女之星能織作以助供賦耳今織女三星跂然如隅自卯至酉凡歷七辰每辰一駕移而左旋似於織矣然織之用緯一往一來相反報而成章織女之駕徒左旋而不返不能反報而成章也我東國輸載疲矣但恐牽牛之星能代我輸載耳今睆然而明之牽牛不能駕服大車之箱而輸物也我東國營作勞矣今東有啓明西有長庚虛言代日之光實不能助日為晝照我夜作也我東國供億竭矣但恐天畢之星能為我掩捕鳥獸以助供億今畢星救然而長徒施於二十八宿之行列而已維南有箕朱氏曰箕星夏秋之間見於南方不可以簸揚維北有斗曹氏曰斗七星今曰斗七星常見於北故曰北斗或以北斗為二十八宿之斗非也不可以挹酒漿挹音揖傳曰挹㪺也㪺音拘廣雅曰酌也維南有箕載翕其舌箋曰翕猶引也董氏曰箕四星二為踵二為舌踵狹而舌廣故曰翕維北有斗西柄之揭音挈董氏曰斗其方如斗且有柄埀而下揭故曰揭箕星見於南方徒有箕之名不可以簸揚粳粃而輸粟也北方有斗星徒有斗之名不可以挹酌酒漿而供飲也我力竭矣而天不能助我供億何所從出哉箕翕引其舌若有所噬而我東國實無物可噬箕亦徒翕其舌而已斗西揭其柄若挹取於東而我東國實無物可挹斗亦徒揭其西柄而已始言民力已竭止恐自天而降耳猶言天雨鬼輸也終言罄盡無物雖天神下取亦徒然耳甚言其窮空也此所謂告病之辭此詩其作於秋乎露漸為霜雲漢分明斗指西箕在南皆秋時也時唯畢未見因言星及之耳大東舊七章章八句諸家分章不同今作六章四章章八句二章章十二句四月大夫刺幽王也在位貪殘下國構禍構古侯反怨亂並興焉此詩憂世之亂韓詩止以為歎征役未盡詩意四月維夏六月徂暑李氏曰夏之四月六月也傳曰徂往也先祖匪人胡寧忍豫此大夫夏初即有南國之役至於歲莫歷三時之久而未得歸故序其始末以為發端之辭言夏暑時也四月雖未甚熱已是夏矣豈可行役乎我以是月行役至六月徂暑之時一夏冒涉暑途勞苦甚矣怨而無所歸咎曰我先祖非人乎何寧忍使我至此極也怨刺之深如此非止為行役也下章見之秋日淒淒音妻朱氏曰秋日冬日猶云秋時冬時也傳曰淒淒涼風也淒淒考見邶緑衣百卉具腓卉音諱韻又音毁腓音肥傳曰卉草也腓病也箋曰具猶皆也亂離瘼矣瘼音莫丘氏曰離離散也傳曰瘼病也爰其適歸詩記曰爰於也朱氏曰爰家語作奚傳曰適之也首夏于役既而暑往今又轉而秋矣當秋之日淒淒然有寒涼之氣百草皆被凋殘而腓病因以興時政之虐而民皆病也遭亂離之病於何所適歸乎謂今行役未得歸然內外皆亂不知何處是可歸之所也味此詩皆淒悽然憂亂之辭若止是行役之久未遽至怨刺之深如此冬日烈烈飄風發發飄如字從韻書本注音瓢見蓼莪箋曰發發疾貌民莫不穀箋曰穀養也我獨何害行役之久秋又轉而冬矣冬時烈烈而寒飄風又發發而疾虐益甚矣民莫不得遂其安養而我獨何以遭此害乎言已被害尤甚也山有嘉卉箋曰嘉善也錢氏曰卉草也通言之則草木皆卉也李氏曰考工記言天下之大獸五脂者膏者裸者羽者鱗者正猶此詩所謂嘉卉也侯栗侯梅箋曰侯維也廢為殘賊莫知其尤箋曰尤過也山有嘉美之草木是栗是梅也今其山廢為殘賊之地言斫伐其本根無復存留其地荒矣喻良民被殘賊至此不知其何辜也相彼泉水相去聲箋曰相視也載清載濁朱氏曰載則也我日構禍箋曰構猶合集也今曰合集猶言結也曷云能穀今曰穀養也與上文民莫不穀同我視彼泉水猶有時而清有時而濁今我國乃日日結禍猶水之無清時也行役之苦又遭時亂何由遂其生養乎滔滔江漢滔音叨傳曰滔滔大水貌南國之紀朱氏曰綱紀也謂絰帶包絡之也盡瘁以仕瘁音萃箋曰瘁病也今日盡其勞瘁也寧莫我有此大夫行役由西周至于南國因感江漢之水而惓惓不忘於君言江漢之水滔滔盛大為南方之綱紀衆水聮絡而歸之猶王者為天下之宗臣子皆歸心也今我盡瘁以從仕而曾不有我使我久役於外不得朝見於王此大夫在外思君之辭也匪鶉匪鳶鶉音圑字或作鷙鳶音沿鶉傳曰鶉雕也李氏曰若以為鶉鵲之鶉則無戾天之理疏曰雕之大者又名鶚孟康漢書音義云鶚大雕也山隂陸氏曰雕能食草似鷹而大黑色俗呼為皂雕其飛上薄雲漢鳶曰鳶鴟也解見旱麓翰飛戾天匪鱣匪鮪鱣音旃鮪音委鱣鮪解見衛碩人潛逃于淵我非如鶉鳶之能羽飛至天也我非如鱣鮪之能潛逃于淵也不能高飛逺逝必不免於世患矣山有蕨薇隰有把桋音夷本亦作荑傳曰把枸檵也檵音計把檵即枸也三把考見四牡曹氏曰荑茅始生也今曰邶靜女自牧歸荑之荑音題君子作歌維以告哀蕨薇把荑四物皆可食承上章欲逃世患之意思遁迹山林采草木而食之如伯夷食薇四皓茹芝之意作此詩歌以訴其哀其情迫矣釋木雖有桋赤棘之文味此詩上下文意與蕨薇把並言當作荑也四月八章章四句北山大夫刺幽王也役使不均已勞於從事而不得養其父母焉養音樣李氏曰北山大夫不當怨而怨夫子不刪之者蓋所以刺幽王也孔子云公則説人主苟有均平之心則雖征役之重不以為怨補傳曰大東言賦之不均北山言役之不均今曰孟子云是詩也勞於王事而不得養父母也後序與孟子之言合陟彼北山言采其杞李氏曰杞枸杞也三杞考見四牡偕偕士子箋曰偕偕同也士子已之屬也朝夕從事王事靡盬憂我父母役行而陟北山把生可采矣以王事不可不堅固而貽親之憂謂父母憂已行役之勞感時物之變而思念父母也溥天之下溥音普傳曰溥大也莫非王土率土之濵音賔傳曰率循也濵涯也疏曰九州環海之濵是四畔近海之處莫非王臣大夫不均我從事獨賢傳曰賢勞也溥大天下皆王土也循土地之岸濵除海水在外居其中者皆王臣也而於大夫不均平使我從事獨賢勞也四牡彭彭音棚傳曰彭彭然不得息彭彭考見出車王事傍傍音絣傳曰傍傍然不得已今曰鄭清人駟介旁旁字異音義同嘉我未老鮮我方將鮮上聲箋曰鮮善也傳曰將壯也旅力方剛傳曰旅衆也經營四方四牡彭彭然不得息王事傍傍然不得已其行役蓋甚勞矣幸我未老而方壯衆力方剛強耳目聰明手足輕捷尚可以經營四方也不然豈能當此勞苦乎秦誓旅力既愆夏氏解云衆力如目力耳力手足力也或説旅為陳如陳力就列之陳然陳力方剛則不詞矣或燕燕居息傳曰燕燕安息貌或盡瘁事國盡瘁解見四月今曰事國從事於國也或息偃在牀或不已于行自此以下皆言役使不均也或不知呌號音豪詩記曰號呼也或深居安逸或外之呌呼亦不知也或慘慘劬勞或棲遲偃仰棲音西李氏曰有棲遲於家而偃仰者或王事鞅掌鞅央之上傳曰鞅掌失容也疏曰傳以鞅掌為煩勞之狀鄭以鞅如馬鞅之鞅掌以手執物補傳曰鞅掌皆所以拘物謂王事所拘也或湛樂飲酒湛樂音耽洛或慘慘畏咎或出入風議風音諷王氏曰出入風議親信而優遊也曹氏曰風議則任口舌而已或靡事不為北山六章三章章六句三章章四句無將大車大夫悔將小人也箋曰幽王之時小人衆多賢者與之從事反見譛害自悔與小人並無將大車箋曰將猶扶進也疏曰大車平地載任之車也其車駕牛祗自塵兮祗音支疏曰祗適也無思百憂祗自疷兮疷音抵傳曰疷病也君子推挽小人小人既進則譖害於君子如人推挽大車大車既進則塵汙於人故君子悔之也小人進而害君子則可憂多端不必更思之是我自取其病悔無及矣猶今人言勿復更説是我誤也無將大車維塵𡨕𡨕平上二聲朱氏曰𡨕𡨕昏晦也無思百憂不出于熲扄之上朱氏曰熲與耿同小明塵𡨕𡨕則為塵所昏可憂多端不必更思之終不能自明矣無將大車維塵雍兮雍音擁箋曰雍猶蔽也無思百憂祗自重兮箋曰重猶纍也塵雍蔽則小人之勢盛矣是其始將之之過也可憂多端不必更思之是我自纍也無將大車三章章四句小明大夫悔仕於亂世也歐陽氏曰大雅明明在下謂之大明小雅明明上天謂之小明自是名篇者偶為志别爾明明上天照臨下土我征徂西至于艽野艽音求傳曰艽野逺荒之地疏曰艽野地名二月初吉朱氏曰二月建卯月也傳曰初吉朔日也疏曰君子舉事尚早故以朔為吉周禮正月之吉亦朔日也載離寒暑疏曰離歷也心之憂矣其毒太苦大音泰念彼共人共音恭丘氏曰共人謂溫恭之人指隱居不仕者也涕零如雨豈不懷歸畏此罪罟音古傳曰罟網也此大夫征役至于歲莫而未得歸故呼天而訴之曰明明上天照臨下土願見察也我征行徂往於西方至於艽野言其地之逺也自二月朔日始行離歷寒暑言其時之久也心憂愁而未得歸其毒大苦矣仕不得志故悔其出仕念彼溫共之人隱居不仕優遊自適羡之而不可得故涕零如雨之多也豈不思歸乎畏王以刑罪網罟我也昔我往矣日月方除音筯傳曰除除陳生新也疏曰上云二月初吉故言除陳生新謂二月也曷云其還音旋歲聿云莫音暮歲莫解見唐蟋蟀念我獨兮我事孔庶箋曰庶衆也朱氏曰身獨而事衆心之憂矣憚我不暇憚多之去聲徐音但傳曰憚勞也念彼共人眷眷懷顧眷音眷眷解見皇矣豈不懷歸畏此譴怒昔我往時日月方除舊生新二月初也今何時可以還歸乎歲已莫矣而未得歸也念我身獨而事衆是以此心憂愁勞憚在我而不遑暇也念彼共人眷眷然回首反顧恨不得從之俱隱也昔我往矣日月方奧音彧傳曰奧暖也疏曰暖即春溫亦謂二月也曷云其還政事愈戚音足箋曰愈猶益也傳曰戚促也歲聿云莫采蕭穫菽蕭解見蓼蕭菽解見小苑心之憂矣自詒伊戚箋曰詒遺也傳曰戚憂也念彼共人興言出宿豈不懷歸畏此反覆我何時可以還歸乎政事益以促急未有可歸之期今歲莫而采蕭穫菽矣歲窮則行人念歸也我仕非其時自遺此憂戚念彼隱居之人欲起而出宿於外以往從之我豈不思歸乎然畏此反覆而不敢去也反覆謂幽王賞罰無常也嗟爾君子無恆安處怛音衡處音杵箋曰恆常也恆解見天保靖共爾位共音恭王氏曰靖靜也正直是與神之聽之式穀以女音汝箋曰式用也丘氏曰穀祿穀也朱氏曰以猶與也君子仕於亂世凛凛畏罪故悔而思歸然其勢未可以去也則惟敬共以聽天命而已故告其同列曰嗟爾君子豈可憚於勤勞而欲常安處乎但安靖恭敬其職惟正直之道是與則神聽女之所為將用福祿與汝矣何憂於禍至哉蓋以已之自處者告其同志也此欲去不得而為自寬之辭亦以見君昏政亂君子不能自保唯覬神之鑒之耳嗟爾君子無恆安息靖共爾位好是正直神之聽之介爾景福箋曰介助也傳曰景大也小明五章三章章十二句二章章六句鼓鐘刺幽王也幽王為流連之樂而不知禍至之無日也鼓鐘將將音鏘疏曰鼓擊也補傳曰將聲之揚也淮水湯湯音傷朱氏曰淮水出信陽軍桐柏山至楚州漣水軍入海釋文曰湯湯流盛貌憂心且傷淑人君子箋曰淑善也懷允不忘箋曰允信也古者作樂必先擊鐘所謂金奏也今聞幽王擊鐘將將然其聲之揚乃在淮水湯湯然流盛之處當時禍變將作曾不覺悟顧逺離京師為從流忘反之樂詩人為之寒心憂而且傷知禍之必不免也傷其國之將亡而思先王德澤之在人故言善人君子我懷思而允信之不忘於心周家以仁厚立國故以善人君子稱其先王且刺王之暴虐也説者以史無幽王東巡之事遂謂淮水為害幽王作樂而不恤其説亦通然古事亦有不見於史而因經以見者詩即史也鼓鐘喈喈音皆傳曰喈喈猶將將也淮水湝湝音諧蘇氏曰湝湝水流也憂心且悲淑人君子其德不回朱氏曰回邪也今王為流連之樂非德之正也鼓鐘伐鼛音高傳曰鼛大鼓也疏曰鼛即臯也古今字異耳今曰地官鼓人以鼛鼓鼓役事注云長丈二尺冬官韗人云臯鼓長尋有四尺韗況萬反諸家並音運淮有三洲疏曰水中可居曰洲蘇氏曰言水落而洲見也憂心且妯音抽傳曰抽動也淑人君子其德不猶傳曰猶若也作樂當淮水之溢至淮水之降而洲見者三言其久也其流連亦甚矣憂結於心為之妯動念古之善人君子其德不若是也鼓鐘欽欽疏曰欽欽亦鐘聲也錢氏曰聲有節也鼓瑟鼓琴瑟琴解見關雎笙磬同音笙解見鹿鳴詩記曰鹿雅云磬以石為之以雅以南蘇氏曰雅二雅也南二南也以籥不僭音侵箋曰籥舞文樂也疏曰吹籥而舞也簡兮左手執籥右手秉翟以翟或謂之羽舞也籥解見邶簡兮朱氏曰僭亂先鼓其鐘鐘聲欽欽然有節又鼓瑟與琴又吹其笙擊其石磬琴瑟在堂笙磬在下節奏齊同言其和也以奏二雅以奏二南以奏籥舞皆不僭亂也言樂非不善而聽之者自憂傷之以哀心感也鄭氏以雅為萬舞周樂尚武故謂萬舞為雅雅正也今考周樂無雅舞之名毛氏以南為南夷之樂四方之樂不應獨舉南也鼓鐘四章章五句楚茨音慈刺幽王也政煩賦重田萊多荒萊音來疏曰周禮以田易者為萊若使時無苛政則所廢年滿亦當墾之今乃興不易之田並不藝種故言多荒也李氏曰萊者廢田也地官遂人田百畝萊五十畝飢饉降喪民卒流亡疏曰卒盡也祭祀不饗故君子思古焉疏曰信南山言曾孫田之序言不能修成王之業是曾孫為成王矣甫田大田皆言曾孫則所陳古皆成王也此經無曾孫之言而周之盛王致太平者莫過成王則此思古者亦思成王也楚茨信南山甫田大田四篇唯楚茨首章二句言當時所見餘皆全述古事形容其田野修治年榖豐穰祭祀禮樂之備燕飲威儀之美言之反覆而不厭者蓋詩人遐想太平之盛田家之樂惆悵羡慕恨不生乎其時所以傷今而思古也補傳曰四詩非有序以發之人以為正雅矣楚楚者茨錢氏曰楚楚繁鮮貌箋曰茨蒺藜也解見鄘牆有茨言抽其棘抽音瘳朱氏曰抽謂其條抽發補傳曰棘荆棘也自昔何為我藝黍稷我黍與與音餘箋曰與與蕃廡貌錢氏曰和柔貌我稷翼翼錢氏曰翼翼整齊貌翼翼考見采薇我倉既盈我庾維億庾音愈傳曰露積曰庾疏曰庾是未入倉周語云野有庾積億考見魏伐檀以為酒食以享以祀以妥以侑妥拖之上侑音又傳曰妥安坐也侑勸也今曰以妥謂拜尸使安坐也疏曰郊特牲云舉斚角詔妥尸注云妥安坐也尸始入舉奠斚若奠角將祭之尸則詔主人拜安尸使之坐尸即至尊之坐或時不自安則以拜安之是又迎尸使處神坐也詩記曰少牢饋食禮尸升筵祝主人皆拜妥尸尸答拜遂坐尸告飽祝侑曰皇尸未實侑尸又食主人不言拜侑尸又三飯注祝言而不拜主人不言而拜親踈之宜以介景福箋曰介助也首章傷今思古述古者先成民而後致力於神也詩人感田野荒蕪言今有楚楚然繁鮮之蒺藜與枝條抽發之荆棘者此自昔何為之地乎乃我藝種黍稷之地也昔時我所種之黍與與然茂盛所種之稷翼翼然整齊及其收也我倉既盈無所藏之則露積為庾其數至億言其多也成民如此然後致力於神以為酒食以獻享以祭祀以妥尸謂迎尸於室拜而妥安之使處神坐也以侑尸謂勸皇尸之飽也凡此所以助大福也以昔日豐穰之樂如此而今為茨棘之場是可傷而思也經有二棘吹彼棘心園有棘酸棗也解見邶凱風此詩以棘配茨及青蠅以棘為樊非彼酸棗也舊不指為何物今按釋草云茦刺茦音策郭璞云草刺針也釋云方言凡草木刺人北燕朝鮮之間謂之茦自關而西謂之刺江湘之間謂之棘濟濟蹌蹌濟濟之上蹌音鏘傳曰濟濟蹌蹌言有容也疏曰曲禮云大夫濟濟士蹌蹌是有容也祭祀之禮主人自慤而趨其賔客則有容儀趨音促錢氏曰大夫士從君牽牲之容也潔爾牛羊以往蒸嘗箋曰冬祭曰蒸秋祭曰嘗或剝或亨音烹箋曰有解剝其皮者有煮熟之者疏曰天官內饔云凡宗廟之祭祀掌割亨之事則解割其肉是內饔也天官亨人云掌供鼎鑊以給水火之齊職外內饔之㸑亨煮則煮熟之者是亨人也齊音劑或肆或將肆音四傳曰肆陳也箋曰有肆其骨體於俎者有奉持而進之者疏曰天官外饔掌外祭祀之割亨供其脯修刑膴陳其鼎俎實之牲體則肆其骨體於俎是外饔也大司徒云祀五帝奉牛牲羞其肆享先王亦如之又夏官小子職云掌祭祀羞羊肆羊殽肉豆則奉持進之是司徒小子之類也膴音呼刑鉶羹也膴大臠所以祭也肆音剔注豚解也祝祭于枋音絣曰此正祭之枋在廟內也若釋祭之枋則在廟門外箋曰孝子不知神之所在故使祝博求之平生門內之旁待賔客之處疏曰枋謂廟門也知門內者以正祭之禮不宜出廟門也而郊牲牲云直祭祝於主注云直正也謂薦熟時也祭以熟為正又曰索祭祝于枋注云廟門外曰枋彼枋對正祭是明日之名禮器云為枋於外以明日之繹故皆在門外與此不同此枋廟門之名其內得有待賔客之處者聘禮公食大夫皆行事於廟其待之迎於大門之內則天子之禮焉祀事孔明朱氏曰明猶著也先祖是皇傳曰皇大也神保是饗傳曰保安也朱氏曰神保鬼神之嘉號楚辭云思靈保兮賢姱蓋古語也姱音誇叶韻音尸今曰楚辭言神安於賢姱謂附巫身也孝孫有慶長樂劉氏曰孝孫謂天子也今曰序疏云古者謂成王則孔當以孝孫為成王報以介福疏曰介大也萬夀無疆次章述古人助祭之敬謹而神福之也助祭之臣濟濟蹌蹌然有容儀以從君牽牲乃潔其所祀之牛羊以往為冬蒸秋嘗之祭或解剝其皮者或亨煮之者或肆陳其骨體於俎者或奉持而進之者孝子不知神之所在故使祝求之於祊謂廟門內平生待賔客之處也祀禮於是甚明著謂致孝則存政慤則著也夫然故先祖於是美大之神保歆饗之而孝孫有慶矣神報以介大之福萬夀無疆也執㸑踖踖㸑音竄踖音戚韻音迹傳曰㸑饗㸑廪㸑也疏曰祭祀之禮饔㸑以煮肉廪㸑以炊米少牢云饔㸑在門東南北上廪㸑在饔㸑之北踖踖敬謹也為俎孔碩丘氏曰謂載牲體於俎或燔或炙燔音煩炙音隻箋曰燔燔肉也炙肝炙也燔肉炙肝皆從獻之俎也疏曰特牲云主人獻尸賔長以肝從主婦獻尸兄弟以燔從彼燔與此燔同則彼肝與此炙同故云肝炙也燔者火燒之名炙者逺火之稱以難熟者近火易熟者逺之君婦莫莫音麥箋曰君婦謂后也傳曰莫莫言清靜而敬也疏曰九嬪贊后薦徹豆籩是后主供籩豆由后能清靜篤敬故能為豆甚多若簡躁不恭則不能也為豆孔庶傳曰豆謂內羞庶羞也疏曰有徹云宰夫羞房中之羞司士羞庶羞注云房中之羞其籩則糗餌粉餈其豆則酏食糝食庶羞羊臐豕膮皆有胾醢房中之羞內羞也彼大夫賔尸尚有二羞明天子之正祭有二羞矣天子庶羞百有二十品庶衆多也餌音二餈音茨酏音移臐音勳膮音嘵鄭玄注云羊曰臐豕曰膮皆美香之名為賔為客曹氏曰祭終有燕賔之禮不可以不豫備也獻酬交錯箋曰始主人酌賔為獻賔既酢主人主人又自飲酌賔曰酬至旅而爵交錯以遍禮儀卒度如字箋曰卒盡也傳曰度法度也笑語卒獲箋曰古者於旅也語朱氏曰獲得其宜也神保是格傳曰格來也報以介福萬夀攸酢傳曰酢報也三章述祭祀俎豆之盛而神福之也執㸑之人踖踖然敬謹其為俎實之牲體甚大或燔其肉或炙其肝皆從獻之俎也九嬪贊后薦徹豆籩是后主供籩豆莫莫然清靜而敬謹故為內羞庶羞之豆甚多既以豆獻尸又將與賔客相酬獻皆豫備之也其禮儀盡合法度於旅也語其笑語盡得其宜也鬼神來格報以多福而又萬夀以報之也漢藝文志言秦燔滅文章顔氏注云燔燒也然則燔是近火燒之如今之燒肉火熖所及也此詩或燔無傳瓠葉傳云加火曰燔疏以為加置於火上是燔燒之大雅生民傳云傅火曰燔疏以為加火燒之文雖小異為燔燒一也此詩或炙無傳瓠葉傳云炕火曰炙疏以為炕舉也以物貫之而舉於火上以炙之是炙為逺火也傅音附炕苦浪反詩記曰為俎孔碩謂薦熟也或燔或炙謂從獻也鄭氏以為一事誤矣燔肉與炙肝豈得謂之孔碩乎我孔熯矣熯音罕又然之上説文曰熯乾貌今曰中谷有蓷暵其乾矣熯暵同陳氏曰左傳云外強中乾馬勞如是人亦如之久勞而乾竭式禮莫愆董氏曰式用也工祝致告傳曰善其事曰工徂賚孝孫箋曰徂往也傳曰賚豫也苾芬孝祀苾音弼又蒲結反芬音紛釋文曰苾芬馨音也神嗜飲食嗜音視卜爾百福錢氏曰卜前知也今曰天保君曰卜爾如幾如式幾音機曹氏曰幾者吉之先見也式者有常式其所當得也既齊既稷疏曰王肅云齊整也傳曰稷疾也既匡既勑疏曰王肅云匡誠正也蘇氏曰勑戒也永錫爾極陳氏曰極中也中者五福之所聚時萬時億四章述飲福之事也我祭祀甚勞筯力既竭而用禮皆無愆過異於跛倚臨祭矣於是工善之祝致神意以告主人謂致嘏辭也因以所嘏之物往豫之謂飲福受胙也此由孝孫飲食苾芬馨香以之孝敬享祀故神歆饗爾之飲食豫以百種之福使如幾之先見使如式之有常爾之祭祀既整齊既稷疾既誠正既戒勑故錫爾以中其福至於時萬時億之多也不言錫福而曰錫極者詩人祝君以福多言致福之本人君能建其有極則五福備矣錫云者猶曰天誘其𠂻也疏曰少牢嘏辭云皇尸命工祝承致多福無疆于汝孝孫來汝孝孫使汝受祿于天宜稼于田眉夀萬年勿替引之是大夫之嘏辭也天子嘏辭無以言之此永錫爾極時萬時億是其辭之略禮儀既備鐘鼓既戒箋曰戒諸在廟中者以祭禮畢錢氏曰為尸出當奏肆夏也孝孫徂位箋曰徂位孝孫往位堂下西面位也工祝致告傳曰告利成也詩記曰少牢注云利猶養也成畢也言孝子之養禮畢疏曰特牲告利成即云尸謖祝前主人降少牢祝告利成即云祝入尸謖主人降此二者皆祝告主人以利成是致尸意也孝子之事尸有尊親及賔客之義命當由尊者出讓當從賔客來禮畢義由於尸非主人所當先發謖音縮起也神具醉止箋曰具皆也疏曰所祭羣廟非止一神也皇尸載起傳曰皇大也朱氏曰尊稱之也箋曰載則也鼓鐘送尸疏曰鳴鼓鐘以送尸謂奏肆夏也今曰大司樂尸出入奏肆夏神保聿歸諸宰君婦廢徹不遲徹音轍箋曰廢去也尸出而可徹諸牢徹去諸饌君婦籩豆而已錢氏曰諸宰膳夫及其屬也膳夫徹王之胙俎其餘則其屬徹之諸父兄弟備言燕私傳曰燕而盡其私恩五章述祭畢將燕私之事也禮儀既畢備矣鐘鼓既戒為尸出當奏肆夏預設以待之也以祭禮畢主祭孝孫復往堂下西面之位工祝致告利成致尸意言養禮畢也所祭羣廟非止一也神皆醉矣皇尸則起而歸矣鬼神無形言其醉而歸者誠敬之至如見之也鳴鼓鐘以送尸謂奏肆夏也先已戒之至此乃奏之尸節神者也神醉而尸謖送尸而神歸諸宰徹去諸饌君婦徹去籩豆皆敏疾而不遲不以禮終而惰也祭祀畢歸賔客之俎同姓則留與之宴所以尊賔客親骨肉也樂具入奏朱氏曰凡廟之制前廟以奉神後寢以藏衣冠祭於廟而燕於寢故於此將燕而祭時之樂皆入奏於寢也以綏後祿傳曰綏安也爾殽既將傳曰將行也莫怨具慶既醉既飽小大稽首稽音啓箋曰小大猶長幼也董氏曰稽首謂頭拜至地也神嗜飲食使君夀考孔惠孔時箋曰惠順也時解見魚麗維其盡之子子孫孫勿替引之傳曰替廢也引長也六章述燕私之事也祭時在廟燕當在寢故言祭時之樂皆復來入於寢而奏之且於祭既受祿矣故以燕為安受後祿也爾殽既進與燕之人無有怨者而皆歡慶既已醉飽小大長幼稽首曰向者之祭神既嗜君之飲食矣是以使君夀考也又言君之祭祀甚順於禮甚得其時無所不盡祭統所謂外則盡物內則盡志也子子孫孫當不廢替而長行之刺今之廢禮也楚茨六章章十二句信南山刺幽王也不能修成王之業疆理天下以奉禹功故君子思古焉疏曰言成王能強界分理天下之田畝使之勤稼以奉行大禹之功而幽王不能修之非責幽王今奉禹功也長樂劉氏曰天下之士昔為水之所汨而禹決九川距四海濬畎澮距川暨稷奏庶艱食弼成五服至于五千是田法成於禹稷久矣文武既有天下而周公輔弼成王廣五服為九服推后稷之法以踐禹功遂成畎澮於天下疆理者川自六鄉而距于海路自荒服而達于畿之謂也楚茨信南山一體之詩楚茨先從傷今説起而後思古信南山便從思古説起即所以傷今矣信彼南山董氏曰終南山也維禹甸之甸毛音奠鄭音盛傳曰甸治也疏曰南山之旁田野得成平田可種殖者本禹治之禹功實天下盡然而獨言南山者作者指一處以表之其意通及天下也李氏曰井田之法實見於周而乃以為丘甸之法已見於夏后氏之世何也疏云論語説禹盡力乎溝洫與匠人井間有溝成間有洫同也益稷畎澮距川與匠人同間有澮專達于川同也是則丘甸之法禹之所為左傳云少康有田一成有衆一旅則是十里為成非周之賦法也老蘇亦以謂井田之興其始於唐虞之世非唐虞之世則周之世無以成唐虞啓之以至夏商之世稍稍葺治至周而大備孟子云夏后氏丘十而貢殷人七十而助周人百畝而徹其實皆什一也以貢助徹皆本於什一若非丘甸之法何以能行什一之法也今曰李氏據疏辨田制始虞夏是矣疏木申鄭氏丘乘之意要之言禹甸治之則平水患理溝洫皆在其中矣不必破甸為乘也韓奕亦云維禹甸之不專言丘乘矣畇畇原隰上二字從田從勻音如雲傳曰墾辟貌辟音闢曽孫田之傳曰曾孫成王也疏曰曾者重也自曾祖以至無窮皆得稱曾孫長樂劉氏曰周之後王雖皆可稱曾孫然唯成王為尤盛周家強理之政考之周官皆至成王而詳備也周人因暴君慢其經界而思其先王疆理之政捨成王其誰哉姑從毛氏以成王能修后稷之政故稱曽孫我疆我理曹氏曰疆者正其經界蘇氏曰理者分其上宜今考王氏以理為治其溝塗但綿詩乃疆乃理之下又言乃宣乃畝宣為宣道溝洫則理不得為治溝塗矣南東其畝傳曰或南或東成二年左傳曰先王疆理天下物土之宜而布其利故詩曰我強我理南東其畝今吾子疆理諸侯而曰盡東其畝而已唯吾子戎車是利無顧土宜無乃非先王之命也乎首章述成王能奉禹功也禹平治之功不獨終南山以終南在鎬京之南周人朝夕所見故舉終南言之信乎彼南山之野本禹所甸治也禹功人所共推故言信確辭也禹功固信矣然井田之制至周始備故此原隰之間畇畇然墾闢者又曾孫成王井牧之以成田也不稱成王而稱曾孫者周之田制非一世所成自后稷以來世世積纍至成王而後備故繫之后稷而稱曾孫謂能繼后稷之緒也疆之則正其經界理之則分其土宜或南其畝或東其畝順地勢及水之所趨也上天同雲釋天曰冬為上天朱氏曰同雲雲一色也將雪之候如此雨雪氛氛雨音諭氛音芬今曰氛氛雪下貌益之以霡霂音脈木釋天曰小雨謂之霡霂李氏曰杜詩云潤物細無聲亦是小雨也既優既渥優音憂渥音握蘇氏曰瞻卬解曰優多也今曰渥浹洽也既霑既足疏曰霑潤也豐足也生我百穀次章述天時之和也雪為豐年之兆冬將雪則雲一色雪乃氛氛而下至春又益之以霡霂之小雨既優而多既渥而浹既霑而潤既足而豐故得生我之衆穀也疆埸翼翼場音亦傳曰埸畔也錢氏曰翼翼整齊也翼翼考見采薇黍稷彧彧音育傳曰彧彧茂盛貌曾孫之穡伐檀傳曰斂之曰穡以為酒食畀我尸賔畀音袐箋曰畀豫也丘氏曰與尸謂獻熟食并酌齊獻尸是也與賔謂助祭之賔酌齊獻尸尸因酌以酢賔并祭未燕同姓於燕寢是也此祭始終用酒食之事齊音劑夀考萬年三章述秋成祭饗之事也田以井制各有疆界埸畔翼翼然整齊其黍稷彧彧然茂盛農民喜恱歸恩於君以為皆吾君之穡謂秋毫皆君賜也以此黍稷為酒食而祭祀畀我尸與賔則吾君得夀考萬年之福此年豐民樂祝頌其君之辭中田有廬音閭箋曰田中農人作廬以便其田事疏曰古者宅在都邑田於外野農時則出而就田須有廬舍詩記曰後漢注春秋井田記人受田百畝公田十畝廬舍在內貴人也公田次之重公也私田在外賤私也丘氏曰公田百畝內除二十畝為八家治田之廬董氏曰井九百畝其中為公田八家每廬舍二畝半疆埸有瓜疏曰遍檢書傳未見君子稅民瓜以共祭祀者故地官埸人掌國之埸圃而植之果蓏珍異之物以時斂而藏之凡祭祀賔客其其果蓏之屬郊特牲云天子植瓜華不斂藏之種是則天子之瓜自令有司供之不稅於民蓏羅之上聲是剝是菹剝音駁菹音租曹氏曰菹淹菜也今曰是剝謂以刀剝瓜削治之也是菹謂以瓜為菹淹漬之也獻之皇祖箋曰皇君也皇祖先祖也曽孫夀考受天之祐音户四章形容民和之意也農民於田中作廬以便其田事於畔上種瓜瓜新熟願獻於天子俾剝而削治之菹而淹漬之以祭祀而獻皇祖令君得夀考之福也方其削治未定為菹故言是剝及已淹漬知是菹故言是菹天子不賦民瓜此言民喜時物之新不忘君上思欲獻之野人美芹之意民和而後神降之福也祭以清酒丘氏曰清潔之酒從以騂牡騂息營反傳曰周尚赤也享于祖考疏曰享獻也執其鸞刀傳曰刀有鸞者言割中節也疏曰鸞鈴也刀環有鈴郊特牲云割刀之用而鸞刀之貴貴其義也聲和而後斷也以啓其毛箋曰毛以告純也疏曰郊特牲云毛血告幽全之物貴純之道也注云幽謂血也楚語觀射父曰毛以示物韋昭云物色也是毛以告純取其血膋音聊箋曰血以告殺膋以升臭疏曰韋昭云明不因故也膋者腸間脂也以脂膏合之黍稷置之蕭乃以火燒之合其馨香之氣是升臭也郊特牲云取膟膋燔燎升首報陽也祭義云卿大夫鸞刀以刲取膟膋則此亦卿大夫也膟音律刲音奎五章述祭祀割牲之事也祭祀以清潔之酒加以赤色之牲乃令卿大夫執特其有鈴之刀以開其牲之皮毛以告純也又取其血以告殺取其脂膋以升臭也清酒二出箋以旱麓清酒既載為三酒之清酒以此詩祭以清酒為非三酒之清酒此詩之清謂玄酒也酒謂鬱鬯五齊三酒也疏謂載則盛之尊中可言三酒之清酒祭神三酒乃諸臣之所酢不用之以獻神故此詩清酒非三酒之清酒要之詩人言清酒皆謂清潔之酒猶鳧鷖言爾酒既清烈祖既載清酤鄭氏好以禮説詩率多牽強失詩人平易之旨此因祭字而為異説耳祭義云祭之日君牽牲既入廟中麗于碑卿大夫袒而毛牛尚耳注云麗猶繫也毛牛尚耳以耳毛為上也王氏及長樂劉氏以為王執鸞刀以親殺與祭義異是蒸是享傳曰蒸進也今曰蒸畀祖妣不必以為蒸嘗之蒸苾苾芬芬苾音弼又蒲結反祀事孔明先祖是皇疏曰皇美大之報以介福疏曰介大也萬夀無疆末章述祭祀受福也是進是獻苾苾芬芬香氣上達也祀禮於是則甚明著也先祖於是美大之報以大福而使之萬夀無疆也李氏曰數詩辭雖不同其意則一皆是言福祿之報本於祭祀又本於黍稷也張文潛云受莫大之福而其君有安寧夀考之樂此天下之至美極治之際也而其本出於倉廪之盈原隰之治田廬之修蓋衣食不足於下則禮樂不備於上禮樂廢則亂隨之而起惟田事作而衣食豐衣食豐而禮樂備禮樂備而和平興和平興而人君有安寧夀考之盛此詩人深探其本要其終而言之序如此也此説盡之矣信南山六章章六句詩緝卷二十二
