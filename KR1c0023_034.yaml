body:
  text: 詩緝卷三十四宋嚴粲撰閔豫小子之什周頌閔豫小子嗣王朝於廟也朝音潮箋曰嗣王謂成王也除武王之喪將始即政朝於廟也閔豫小子箋曰閔悼傷之言也李氏曰左傳云寡君少遭閔凶豫不能文是閔者居喪之稱曹氏曰曲禮云天子未除喪曰豫小子然洛誥云豫小子其退即辟于周蓋成王常以冲幼自處故每稱之耳遭家不造箋曰造猶成也李氏曰王氏以為武王天下未集而終嬛嬛在疚嬛音瓊李氏曰此嬛與哀此煢獨之義同嬛嬛者孤獨也左氏亦有在疚之文亦是居喪之稱也王雖朝於廟然去喪未甚逺故猶以死喪之辭為言傳曰疚病也於乎皇考於乎音烏呼箋曰皇考武王也永世克孝蘇氏曰終身能孝念兹皇祖箋曰皇祖文王也陟降庭止箋曰陟降上下也傳曰庭直也張子曰周道如砥其直如矢聖人之心至平至直不難行人自多邪曲耳李氏曰文王俯仰之間皆盡其直道文王之詩云文王陟降在帝左右文王之心俯仰無間無有愧怍洋洋乎如在其上如在其左右而武王之所以繼志述事者亦本於此易曰敬以直內能敬則莫不直矣補傳曰止語辭維豫小子夙夜敬止於乎皇王錢氏曰皇王武王也今曰文王有聲稱文王曰王后武王曰皇王繼序思不忘傳曰序緒也疏曰以世世相繼如絲之端緒故轉為緒成王除喪朝廟感傷而言曰可悼閔乎我小子耳遭武王崩家道未成嬛嬛然孤特在憂病之中未知攸濟也於是述武王繼文王之事於乎可嘆美者我皇考武王終身能孝能念我皇祖文王一陟一降直而無私此武王之所以為孝也直者純乎天理之公也今我小子當早起夜卧敬謹而行之於乎可歎美者我皇王武王也我繼其序思其所行不敢忘也以武王能念文王則我當不忘武王也說者以陟降庭止為若見文王陟降於庭然下篇紹庭上下其義難通大田既庭且碩韓奕幹不庭方周官四征弗庭庭古注皆訓為直庭之為直見於經多矣不必易也閔豫小子一章十一句訪落嗣王謀於廟也傳曰謀者謀政事也訪豫落止傳曰訪謀也落始也朱氏曰訪問也曹氏曰凡宫室始成則落之故以落為始君子以作事謀始始之不謀其終能無違者鮮矣率時昭考傳曰率循也箋曰昭明也疏曰昭考武王也朱解見載見於乎悠哉於乎音烏呼傳曰悠逺也朕未有艾音礙徐音刈什詁曰艾歷也將豫就之曹氏曰將扶將也今曰無將大車箋云將猶扶進也繼猶判渙音喚傳曰猶道也判分也渙散也維豫小子未堪家多難如字協韻去聲紹庭上下箋曰紹繼也疏曰武王能繼文王以直道施於上下陟降厥家朱氏曰家猶言國也休矣皇考箋曰休美也皇考武王也以保明其身朱氏曰保安也明顯也王氏曰保其身無危亡之憂明其身無昏塞之患成王始即王位恐不能繼聖父之業故於廟中與群臣謀之言我謀訪始初之法在率循我明德之考武王固也然所歎者昭考之道悠逺而不可及豫幼稚未有所歷爾群臣幸扶將我以就之尚恐繼其道而判渙不合也又自言豫幼稚小子未堪王室之多難其能紹文王之直道施於上下俯仰於家未嘗少離者唯美哉皇考武王能以此保明其身也李氏曰仰先王之盛德歎眇躬之凉薄苦前哲之髙逺也曽氏曰雖不言繼序思不忘然歎美皇考則此意在其中矣訪落一章十二句敬之羣臣進戒嗣王也陳氏曰嗣王於祭之明口繹賔尸而羣臣與焉既作謀政之詩以發群臣之志而作頌者又設群臣進戒之詩以答之又形容嗣王虛已求言之意為群臣者當何如哉敬之敬之天維顯思李氏曰天之道甚顯善則福之淫則禍之栽者培之傾者覆之未冇善而不獲福也未有惡而不獲禍也天之道顯朱子曰思語辭也命不易哉易毛音異鄭音亦李氏曰惟天有顯道故其命靡常此命所以為不易也無曰髙髙在上陟降厥士傳曰士事也日監在兹箋曰監視也維豫小子不聰敬止解頥新語曰不聞敬天之道也日就月將朱氏曰將進箋曰日就月將言當習之以積漸也學有緝熙于光明王氏曰緝續也熙廣也佛時仔肩佛毛如字鄭音弼仔音茲箋曰佛輔也時是也仔肩任也示我顯德行去聲作頌者設為辟臣進戒之辭曰敬之哉敬之哉敬而又敬勉之以誠之不已也天道甚明禍福不爽故豫奪靡常其介不易保也無謂其髙髙在上逺人而不吾察也王一陟一降之事天無日而不監視于此無微不顯所以不可不敬也於是又設為成王答之之辭曰維我小子未聞敬之之道謂群臣所言當敬之事乃天人精微之理今聞所未聞也所願學焉庶幾日有所成月有所進習之以漸緝續熙廣以至於其道光明我負荷天下其任甚重爾群臣當輔佛我此任有以正救之無為靣從容悅必示我以顯然之德行使我有所則效也輔謂之佛者言正救其失不專順從之也學記云其求之也佛佛不順也猶孟子所謂法家佛士也仔肩為負荷之意故為任生民是任是負黍苗我任我輦皆謂肩任之也或以士為人材然勿士行枚只得訓事古訓不可廢也敬之一章十二句小毖音祕嗣王求助也箋曰天下之事當謹其小小時不謹後為禍大故成王求忠臣早輔助己為政以救患難豫其懲箋曰懲艾也艾音刈而毖後患傳曰毖愼也莫豫荓蜂荓今音烹舊音俜王氏曰荓使也蜂善辛螫曹氏曰成王之遇辛螫也豈有使蜂螫之哉實自求之而已今曰抑莫豫云覯莫無也桑柔荓云不逮毛云荓使也普耕反音烹徐蒲耕反音絣書洛誥伻來以圖及獻卜音義同今毛以荓蜂之荓為􅠺曵孫炎云謂相掣曵之於惡故音俜今從王氏荓蜂為使蜂當音烹說文俜使也則荓讀作俜亦可也􅠺音翅尺制反自求辛螫音釋疏曰辛苦毒螫也肇允彼桃蟲拚飛維鳥拚音藩箋曰肇始也允信也傳曰桃蟲鷦也鳥之始小終大者鷦音焦釋鳥曰桃蟲鷦其雌鴱鴱音艾郭璞曰鷦􅛯桃雀也俗名為巧婦鷦􅛯小鳥而生鵰鶚者也􅛯音苗陸璣疏曰今鷦鷯是也微小於黃雀其雛化而為雕故俗語鷦鷯生雕山隂陸氏曰說苑云鷦鷯巢於葦苕繫之以髮鳩性拙鷦性巧故鷦俗呼巧婦一名工雀一名女匠其喙尖利如錐取茅秀為巢巢至精密以麻紩之如刺襪然故一名襪雀其化輒為鵰鶚紩音秩縫紩也錢氏曰拚與翻同張氏曰猶言初為鼠後為虎不必謂桃蟲化為鳥也今曰此與舊說異姑兼存之未堪家多難傳曰堪任也豫又集于蓼音了箋曰集㑹也疏曰集㑹謂逄遇之也傳曰集于蓼言辛苦也朱氏曰蓼辛苦之物也錢氏曰蓼味辛而苦成王即政而求助於賢臣曰豫其懲創於往時而畏謹後患矣指管蔡之事也人近蜂則被其螫信小人則受其惑蜂不可使前日之事無人使蜂螫我乃我自取其辛螫也我今始信桃蟲之微能翻飛為鳥言小物之能成大不敢不毖也豫未堪王室多難又㑹遇于辛苦之地爾群臣可不助我乎莫豫荓蜂猶云莫豫毒也已古文莫豫莫我之類皆倒提豫我字以便文耳莫我肯德言無肯德於我莫豫荓蜂言無荓蜂於我其他如莫我知莫豫云覯之類皆倒辭也小毖一章八句載芟音衫春藉田而祈社稷也箋曰藉田甸師氏所掌王載耒耜所耕之田天子千畒諸侯百畒藉之言借也借民力治之故謂之藉田疏曰月令孟春天子躬耕帝藉天子祈社稷以仲春與耕藉異月而連言之者雖則異月俱在春時故以春揔之祭法云王為群姓立社曰泰社王自為立社曰王社此二社皆應以春祀之但此為百姓所祭文當主於泰社其稷與社共祭亦當為太社社稷焉載芟載柞音窄箋曰載始也傳曰除草曰芟除木曰柞疏曰隱六年左傳云如農夫之務去草焉芟夷藴崇之是除草曰芟秋官柞氏掌攻草木及林麓是除木曰柞曹氏曰秋官剃氏掌殺草秋繩而芟之除草木是初墾闢而為田者也剃音替繩音孕注含實曰繩芟其繩則實不成其耕澤澤音釋釋文曰耕犂也箋曰澤澤然解散曹氏曰草木之根既去而後耕之土則澤澤然解散矣千耦其藝耦音偶藝音云本又作耘今曰長沮桀溺耦而耕謂二人為耦而並耕此千耦其耘亦謂千人為耦而並耘與十千維耦同釋文曰藝除草也曹氏曰反土之後草木根株有芟柞所不盡者則復耘之其多至于千耦也徂隰徂畛音軫今曰下濕曰隰疏曰地官遂人云十夫冇溝溝上有畛侯主侯伯疏曰侯維也傳曰主家長也伯長子也侯亞侯旅傳曰亞仲叔也旅子弟也侯彊侯以箋曰彊有餘力者地官遂人云以彊豫任氓以謂閒民今時傭賃也豫音與氓音氓疏曰謂其人彊壯治一夫之田仍有餘力能佐助他事者也太宰以九職任萬民其九曰閒民無常職轉移執事鄭司農云閒民謂無事業者轉移為人執事若今時傭力也僖二十六年左傳云凡師能左右之曰以有嗿其饁嗿音鴆他感反饁音葉李氏曰嗿衆人飲食聲箋曰饁饋餉也餉亦作餉式亮反思媚其婦錢氏曰思語助箋曰媚受也有依其士今曰依就也曹氏曰士不辭耕稼之勞而知愛其婦婦不憚饁餉之煩而知依其士有和樂之風焉有略其耜音似傳曰略利也曹氏曰利則入土也深俶載南畝俶音觸俶解見大田南畝解見七月播厥百榖箋曰播猶種也曹氏曰百榖之性其寒暑濕燥髙下早晚各有所宜而水旱豐凶不可豫料故悉種之所以為備也實函斯活函音含箋曰實種子也函含也活生也其種子皆含生氣驛驛其逹驛音亦蘇氏曰驛驛苖生貌箋曰逹出地也有厭其傑厭去聲下同王氏曰厭受氣澤厭足也箋曰傑先長者長音掌疏曰苗之傑也厭厭其苖箋曰厭厭其苗衆齊等也錢氏曰積疊之貌苗齊等動搖厭厭然若積疊之綿綿其麃音標表驕反傳曰麃藝也疏曰孫炎云綿綿言詳密也王氏曰前曰千耦其藝則既耕而藝今曰綿綿其麃則既苗而藝既苗而藝則以綿綿為善恐傷苗也載穫濟濟穫音獲朱氏曰濟濟人衆也曹氏曰衆而整也有實其積音恣又如字箋曰有實實成也今曰上言實函斯活此言有實其積皆以實為榖實萬億及秭音姊為酒為醴蒸畀祖妣以洽百禮四句並解見豐年有飶其香飶音離别之别傳曰飶芬香也詩故曰飶香也謂酒之氣也邦家之光有椒其馨曹氏曰飶椒皆酒醴芬芳之氣疏曰椒是木名非香氣也但椒木氣香作者以椒言香詩故曰椒之氣烈故古者謂椒酒取其香且烈也補傳曰楚辭云奠桂酒兮椒漿胡考之寧傳曰胡壽也考成也李氏曰胡考者老人也士冠禮祝云永享胡考注云胡遐也疏曰僖二十三年左傳云雖及胡耆周盡諡法保民耆艾曰胡胡考老而有成德也解頥新語曰說文云胡生頷垂也又老狼亦垂胡今老者或有此狀故詩人取之匪且有且如字又咀之平傳曰且此也匪今斯今振古如兹傳曰振自也朱氏曰猶言自古有年也此祈社稷之詩言人事已盡神其念之芟柞草木是新墾闢之田專言新墾闢之田者其用力尤難故也始芟以除其草始柞以除其木草木之根既去然後耕犂之其土氣蒸逹釋釋然解散矣既耕犂以反其上猶有草木根株芟柞所不盡者又千人為耦而藝以去之耦以言並作千以言其多或往下濕之隰或往溝上之畛言耕夫遍于原野無曠土也其往者何人乎維主則家長也維伯則長子也維亞則仲叔也維旅則衆子弟也維强則借助之彊壯也維以則傭雇之閒民也言衆力競勸無游民也當饁餉之時有嗿然衆人飲食之聲其耕夫則愛其婦其饁婦則就其夫夫耕婦饁歡然相愛見治世和樂之氣象焉有略然剡利之耜始有事於南畒而耕之前言其耕澤澤謂轉新墾之土此言俶載而耕之謂始耕而將種也前所耕猶荒地今所耕乃成田故稱南畝也百榖皆播種之其種子曰實皆含生氣驛驛然而生出土而條逹乃有厭然受氣澤厭足者是先長傑特之苖也厭厭然齊等者是其衆苖也既苗則又綿綿然詳密而藝之不詳密則傷苖也芟藝麃皆除草也芟與柞並言是新闢為田先除其地上之草木也既耕而言藝是反土之後除其土中之草木根株也既苗而言麃是除其苖間之草也至於成熟則穫刈之濟濟然其人之衆其穀實皆積聚之其數之多有萬與億而及秭也及以為酒以為五齊之醴齊進豫先祖先妣而祭祀所以㑹合其事神之衆禮衆物皆所以為禮而行禮以酒為主也此酒醴有飶然之香氣以饗賔客則時和禮備而為邦家之光有如椒之馨以養耆老則老人之安寧以上皆秋冬豐熟之事而春祭言之蓋以此祈於神也又言非特此方有此豐年也非特今方有今豐年也自古以來皆如此言神之降康久矣繼此以往願其勿替也李氏曰噫嘻豐年其說為略載芟良耜其說為詳蓋祈上帝所以尊之也故其辭略祭社稷所以親之也故其辭詳載芟一章三十一句良耜音似秋報社稷也疏曰經言百室盈止婦子寧止乃是場功畢入當十月之後而專言秋報也者作者先陳人事使畢然後言其報祭其實報祭在秋寧止在冬也畟畟良耜畟音測曰畟畟猶測測也疏曰畟畟是刃利之狀舍人曰畟畟耜入地之貌箋曰良善也耜解見七月俶載南畝播厥百榖實函斯活三句並解見載芟或來瞻女音汝箋曰瞻視也有來視女謂婦子來饁者也錢氏曰視猶省也載筐及筥筐筥音匡舉箋曰筐筥所以盛黍也其餉伊黍餉音餉箋曰豐年之時雖賤者猶食黍疏曰少牢特牲大夫士之祭禮食有黍明黍是貴也玉藻云子卯稷食菜羮為忌日貶而用稷者為賤也賤曰當食稷耳其笠伊糾音九傳曰笠所以禦暑雨也補傳曰糾繚也所以繩繚而成也錢氏曰其緣糾結其鎛斯趙鎛音博趙迢之上濁又如字鏄解見臣工傳曰趙刺也以媷荼蓼音蒿徒了說文曰薅拔田草也疏曰蓼是穢草荼亦穢草非苦菜也釋草云荼委葉王肅云荼陸穢蓼水草然則所由田有原有隰故並舉水陸穢草三荼考見邶谷風箋曰饁者見載糾然之笠以田器刺地媷去荼蓼之事言閔其勤苦刺七亦反荼蓼朽止黍稷茂止穫之挃挃音窒傳曰挃挃穫聲也積之栗栗積音恣今曰聘義言玉云縝密以栗注云栗堅貌是栗栗為堅實之貌其崇如墉箋曰崇髙大也傳曰墉城也其比如櫛比音備櫛側瑟反箋曰比迫也說文曰櫛梳篦總名疏曰其比迫如櫛齒之相次朱氏曰理髮器言密也以開百室箋曰一族同時納榖疏曰地官大司徒五家為比五比為閭四閭為族是百室為一族於六鄉則一族於六遂則一鄼遂人云百夫有洫故知百室共洫間而耕鄼音篡曹氏曰百室在六鄉為族而族師掌以歲時校登其夫家之衆寡在六遂為鄼長掌趣其耕耨與其戒令政事莫不同之故使之同時納榖所以示親睦均有無也趨音促百室盈止婦子寧止殺時犉牡犉閏之平傳曰黃牛黑唇曰犉疏曰地官牧人云凡隂祀用黝牲毛之注云隂祀祭地北郊及社稷也然則社稷用黝牛今用黃者蓋正禮用黝至於報功以社是土神故用黃色仍用黑唇也曹氏曰古之人享其成必思其所自以為百室盈而婦子寧者社稷之功故於是而報焉地之色以黑為正以黃為美故隂祀用黝牲正其義也社稷用犉美其功也黃氏曰載芟言以洽百禮者願其豐年之慶而百神之祀皆無所闕也良耜言殺時犉牡者則專主祭社稷而言也有救其角救音求大東傳曰救長貌傳曰社稷之牛角尺以似以續蘇氏曰興來歲繼往歲也續古之人曹氏曰續古之人則先農先嗇之功永永無窮矣此詩為報社稷必陳農功之本末故當秋時而追述春耕預言冬穫也言農人以畟畟然刃利之善耜始有事於南畒而耕之以播種其百穀其種子曰實皆函生氣而生農人在南畝之時有來省視汝者乃其婦也載其方箱及其圓筥所盛之餉維是黍也黍貴者之食農人食黍見豐年也餉者見農夫所載之笠糾結其緣以鏄鋤之器趙刺其地薅去陸草之荼水草之蓼荼蓼皆穢草既朽敗矣黍稷乃茂盛矣及其成熟乃穫刈之其穫聲挃挃然及積聚之栗栗然堅實所積聚者其崇髙如城雉其比迫如櫛齒於是開一族之百室一時而納之百室既盈矣婦與子則安寧矣年熟民安乃殺是黃牛黑唇之犉牡其角救然而長用之以報祭社稷求嗣歲之豐續古人先農先嗇之功也良耜一章二十三句絲衣繹賔尸也箋曰繹又祭也天子諸侯曰繹以祭之明日卿大夫曰賔尸與祭同日周繹商謂之彤疏曰祭宗廟之明日又設祭祀以尋繹昨日之祭謂之為繹以賔事所祭之尸經之所陳皆繹祭始末之事也髙子曰靈星之尸也疏曰子夏作序唯一句而已後世有髙子者别論他事云靈星之尸言祭靈星之時以人為尸後人以髙子言靈星尚有尸宗廟之祭有尸必矣故引髙子之言以證賔尸之事必是子夏之後毛公之前有人著之髙子者不知何人孟子弟子有公孫丑者稱高子之言以問孟子則髙與孟子同時趙岐以為齊人言髙子蓋彼是也靈星者不知何星漢書郊祀志云髙祖詔御史其令天下立靈星祠張晏云龍星左角曰天田則農祥也晨見而祭之史傳之說靈星唯有此耳未知髙子所言是此否絲衣其紑孚浮反傳曰絲衣祭服也紑潔鮮貌疏曰爵辨之服𤣥衣纁裳皆以絲為之故云絲衣也曹氏曰餘衣皆用布惟冕與爵辨服用絲大夫以上祭服謂之冕士祭服謂之辨其首服辨則其衣用絲故知絲衣為士助祭之服也載辨俅俅載如字又音載辨音卞俅音求箋曰載猶載也辨爵辨也爵辨而祭於王士服也繹禮輕使士疏曰若正祭則小宗伯省牲視滌濯逆齍省鑊告時于王告備于王彼正祭禮重使小宗伯此繹祭輕故使士蓋亦宗伯之屬載辨者俅俅則俅俅人貌則為恭順言卑者恭順則尊者可知齍音咨曹氏曰雜記云大夫冕而祭於公辨而祭於已士辨而祭於公冠而祭於已注云辨爵辨也冠𤣥冠也爵辨冕之次其色赤而微黑如爵頭然其制與冕同而其前不俯傳曰俅俅恭順貌自堂徂基箋曰使士升門堂視壺濯及籩豆之屬降往其基告濯具傳曰基門孰之基孰音孰疏曰釋宫云門側之堂謂之孰孫炎云夾門堂也直言自堂徂基何知非廟堂之基者以繹禮在門不在廟故知非廟堂也郊特牲云繹之於庫門內祊之於東方失之矣繹於門內為失明其當在門外祊以東方為失明其當在西方是祊之與繹一時之事禮器云為祊乎外注云祊祭明日之繹祭也謂之祊者於廟門外之傍因名焉基是門孰之基謂廟門西夾之堂基也祊音絣自羊徂牛傳曰自羊徂牛言先小後大也箋曰又視牲從羊之牛反告充疏曰自堂徂基但言所往之處不言所為之事牛羊但言所視之物不言所往之處互相足也鼐鼎及鼒鼐音耐鼒音兹傳曰大鼎謂之鼐小鼎謂之鼒箋曰已乃舉鼎幂告潔禮之次也鼎圜弇土謂之鼒幂亡歷反弇古掩字兕觥其觩音求兕觥解見卷耳箋曰繹之旅士用兕觥變於祭也曹氏曰旅酬之後恐冇失禮者以此罰之觥解見桑扈疏曰兕觥罰爵觩然徒設無所用之㫖酒思柔朱氏曰思語辭也柔和也不吳不敖吳如字又音話敖去聲傳曰吳譁也李氏曰大聲也曹氏曰言語則謹默而不譁威儀則恭敬而無敖疏祭末舉其不慢則當祭敬明矣胡考之休胡考解見載芟此述繹祭之事上五句言祭之初下四句言禮之末方繹祭之初使士行禮在身之服以絲為衣其衣紑然而鮮潔在首戴爵辨其人俅俅然恭順此士從門堂之上既視壺濯及籩豆又降往於門孰之基告君以濯具也又更視三牲從羊而往牛所以告充也充肥也有大鼎曰鼐小鼎曰鼒又發舉其幂所以告潔也反覆展視所以致勤敬也祭初卑者恭順則尊者可知矣至於祭末旅酬之節兕觥罰爵觩然上曲徒設而不用由此助祭飲美酒者皆柔和不吳而歡譁不敖而倨慢故事如禮無所用罰祭末不慢則當祭敬明矣恭敬獲福冝其得壽考之休也絲衣一章九句酌告成大武也言能酌先祖之道以養天下也說者多以酌即是勺然勺是成王之樂而此詩言告成大武其說難通今考象者文王之舞也故維清象舞之樂章其詩言文王之典武者武王之舞也故武頌武舞之樂章其詩言武王之烈勺是成王之舞樂莫盛於韶勺者謂皆繼治世之事故為樂之盛也若酌頌果為勺舞之樂章必當述成王繼承之事今其詩止述武王用兵創業首序又云告成大武則此酌亦是武舞之樂章非勺舞之樂章矣禮記言十三學舞勺漢禮樂志言周公作勺其字皆單作勺此酌其字從酉傍雖皆為斟酌之義然所斟酌之事則不同勺舞言成王能酌文武之道以保太平之治也此酌頌言武王初則遵養繼則蹻蹻酌其時措之宜也左氏傳以武頌為武之卒章以賚為武之三以桓為武之六朱氏謂桓賚二篇皆大武篇中之一章其言信而有證朱氏又以酌及賚般皆不用詩中字名篇疑取樂節之名如曰武宿夜云耳然則酌與賚般一體亦大武篇中之一章明矣但古今制樂皆㳂襲前王之樂而為之張子謂勺是周公制禮樂時於大武有所增添其說是也如漢武德舞髙祖所作象其除亂蓋武舞也其後孝景采武德舞為昭德舞以尊太宗孝文之廟則為文舞矣周公增損大武以為勺亦猶是也勺舞必自有樂章今不得而考耳講師見此頌名酌遂以酌祖道養天下之說攙入之此正說成王之勺非武王之酌也兼此詩所言遵養亦非謂養天下也於鑠王師於音烏鑠舒灼反朱氏曰鑠盛也疏曰毛以為武王鄭以為文王今曰王師王之造皆武王也遵養時晦傳曰遵率也朱氏曰言武王之初有於鑠之師而不用蘇氏曰退自循養與時偕晦時純熙矣箋曰純大也蘇氏曰熙光也是用大介箋曰介助也蘇氏曰天下無不助之我龍受之箋曰龍寵也李氏曰武王寵而受之蹻蹻王之造蹻音矯造毛音早鄭音慥傳曰蹻蹻武貌造為也載用有嗣李氏曰是用後世嗣續而不絶實維爾公句允師李氏曰其所以傳嗣而不絶者蓋能合天下之公而信於衆也於乎盛哉武王之師也其初有衆而不用退自循養與時偕晦非有心於得天下也既而時大熙明天下之人無不助之武王乃不得已而寵受之於是蹻蹻然威武以興事造業是用嗣續以傳之後世實由爾武王之至公足以信於衆也順天人之心者公也信者公之洽允者信之固也酌一章九句桓講武類禡也禡音罵箋曰類也禡也皆師祭也疏曰武王將欲伐殷講習武事又為類祭於上帝為禡祭於所征之地治兵祭神然後克紂至周公成王太平之時詩人追𫐠其事而為此歌焉王制云天子將出征類乎上帝禡於所征之地春官肆師云類造上帝類禮依郊祀而為之者春官肆師云凡四時之大甸獵祭表貉則為位注云貉師祭也於立表處為師祭祭造軍法者禱氣勢之增倍也其神蓋蚩尤或曰黃帝禡周禮作貉又或為貊字古今之異也甸音田貉莫駕反鄭音陌桓武志也王氏曰桓武志也而曰綏萬邦婁豐年則其為武志也異乎人之武志矣解頥新語曰講武而類于上帝禡于所征之地皆師祭也此為武王伐商之事明矣然是時有其事而無其詩以頌聲未作故也至成王制禮作樂於是作此頌以歌其事以告於武王序詩者謂之武志蓋發明武王將出征而講武焉其志已欲保厥士而用四方定厥家而昭于天後果能如其志可謂善得詩人之㫖也朱氏曰左傳以此為大武之六章綏萬邦箋曰綏安也婁豐年婁音屢箋曰婁亟也誅無道安天下則亟有豐熟之年隂陽和也亟音棄李氏曰綏萬邦言武王之用兵所以安萬邦故能享豐年之報老子云大兵之後必冇凶年軍旅所起荆棘生焉蓋以大兵之後殺戮為多傷天地之和氣此所以凶年也武王之用兵志在於容民畜衆非快一己之私欲蓋為天下除害故能召天地至和之氣所以獲豐年之報也孔氏舉僖十九年左傳云昔周饑克殷而年豐是伐紂之後即有豐年也孔氏徒見左氏之言與詩合然不知周豈有饑哉如其有饑則不足為婁豐年矣天命匪解音懈蘇氏曰天命之於周久而不厭也桓桓武王錢氏曰桓桓威武貌保有厥士李氏曰士與熊羆之士虎賁之士同于以四方克定厥家於昭于天於音烏皇以間之間去聲箋曰皇君也傳曰之間代也今曰多方云有邦間武王克商以安天下數有豐年是天命之於周久而不倦也天命所以不倦者由桓桓然有威武之武王能保有其衆以用之於四方而安定其國家故歎美其德昭明于天遂君天下而代商也桓一章九句賚音賴大封於廟也箋曰武王伐紂時封諸臣有功者疏曰大封則所封者廣宣十二年左傳云昔武王克商而作頌其三曰敷時繹思我徂維求定昭二十八年左傳云昔武王克商光有天下其兄弟之國者十有五人姬姓之國者曰十人皆舉親也廟謂文王廟也祭統云古者明君必賜爵祿於大廟示不敢專也李氏曰宣王之時命孝公為侯伯命之於夷宫亦是不敢自專也為天子者封功臣必告於廟為諸侯者班爵祿亦在於廟衛之周治既服將命則知亦在於廟然不知所任者非人也賚豫也豫上聲言所以錫豫善人也疏曰武王大封功臣以為諸侯周公成王太平之時詩人追述其事而為此歌焉李氏曰語云周有大賚善人是富朱氏曰左傳以此為大武之三章文王既勤止錢氏曰止語辭我應受之傳曰應當也敷時繹思朱氏曰敷布繹習也錢氏曰繹紬也我徂維求定時周之命箋曰是周之所以受天命而王之所由也於繹思於音烏武王既封諸臣於廟因戒勑之言文王勤勞天下至矣我當而受之敷布其事而紬繹思念之不敢忘也敷言所思之廣也我自今以往維求天下之安定而已此周之受天命也又歎使諸臣受封賞者繹思之亦不可忘也念文王創業之難及念上天安民之意則所用皆善人可知矣賚一章六句般音槃巡守而祀四嶽河海也巡守音旬狩蘇氏曰般逰也疏曰武王既定天下巡行諸侯所守之土祭祀四嶽河海之神神皆饗其祭祀降之福祚至周公成王太平之時詩人述其事而作此歌焉中嶽無事故序不言漢書溝洫志云四瀆河為宗然則河為四瀆之長言河可以推之經無海而序言海者海是衆川所為歸經雖不說祭之可知曹氏曰時邁為武王巡守之頌則般頌成王矣於皇時周於音烏箋曰皇君也陟其髙山箋曰陟登也嶞山喬嶽嶞駝之上釋文曰嶞山形狹長也傳曰山之嶞小者也箋曰喬髙也允猶翕河箋曰允信也李氏曰猶謀也傳曰翕合也蘇氏曰翕河大河受衆水者也今曰禹貢河自大陸北播為九河同為逆河注云同合為一大河名逆河然則翕河即逆河也敷天之下箋曰敷遍也裒時之對裒音掊傳曰裒聚也疏曰對配也疏曰配祭之時周之命箋曰遍天之下衆山川之神皆如是配而祭之是周之所以受天命而王也錢氏曰周之所以為百神主也於乎君哉是周家也其巡守所至則登其髙山又及嶞然狹長之小山與喬髙之四嶽皆遍祭之髙山嶞山則祭法所謂山林丘陵能出雲為風雨皆曰神者也喬嶽則四嶽也又以誠信謀猶大河而祭之謀如載謀載惟謂討論其禮也遍天之下凡山川之神皆裒聚而昭對以祀之此周之所以受天命而為神主也對者有對越無愧之意以天命在焉故也般一章七句詩緝卷三十四
